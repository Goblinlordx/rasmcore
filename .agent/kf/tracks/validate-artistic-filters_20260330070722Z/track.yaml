id: validate-artistic-filters_20260330070722Z
title: Artistic Filter Reference Parity Tests & Benchmarks
type: chore
status: pending
created: 2026-03-30
updated: '2026-03-30'
spec:
  summary: 'Add ImageMagick reference parity tests for solarize, emboss, oil_paint, and charcoal to reference_audit.rs, plus
    benchmark entries in bench.rs. Align algorithms with reference where divergence is unnecessary.

    '
  context: 'The 4 artistic filters (solarize, emboss, oil_paint, charcoal) shipped in

    p3-artistic-filters without reference validation — explicitly marked out of scope.

    All other filters in the codebase have IM parity tests in reference_audit.rs.

    This track closes that gap using the existing check_parity_rgb framework.

    '
  codebase_analysis: "- reference_audit.rs has check_parity_rgb() helper that handles IM invocation,\n  MAE computation, and\
    \ graceful skip. Adding filters is ~10-15 lines each.\n- Solarize and emboss should achieve EXACT parity (<0.01 MAE) since\
    \ the algorithms\n  are identical to IM when using the right IM commands.\n- Oil paint and charcoal use different algorithms\
    \ from IM, so ALGORITHM tier\n  thresholds (5.0-15.0) may apply — but where divergence is unnecessary (e.g.\n  bin count,\
    \ intensity formula), align our implementation with the reference.\n- bench.rs already benchmarks blur/sharpen/grayscale\
    \ — adding 4 filters follows\n  the same bench() wrapper pattern.\n- Solarize is a LUT point-op at point_ops.rs:381; emboss\
    \ is a 3x3 convolve at\n  filters.rs:10225; oil_paint is a histogram mode filter at filters.rs:10248;\n  charcoal composes\
    \ sobel+blur+invert at filters.rs:10345.\n- Oil paint uses 20 intensity bins and BT.601 luma; IM likely uses 256 bins.\n\
    \  Aligning bin count and intensity formula could dramatically reduce MAE.\n- Charcoal uses Sobel edge detection; IM uses\
    \ its own edge detect. Aligning\n  the edge detector or parameters could improve parity.\n"
  acceptance_criteria:
  - Solarize parity test in reference_audit.rs with MAE < 0.01
  - Emboss parity test using explicit kernel morphology with MAE < 0.01
  - Oil paint parity test — align algorithm where divergence is unnecessary, document final MAE threshold
  - Charcoal parity test — align algorithm where divergence is unnecessary, document final MAE threshold
  - Where algorithm changes are made, document what changed and why in commit message
  - All 4 filters benchmarked in bench.rs at 256x256
  - All tests skip gracefully when ImageMagick is unavailable
  - cargo test passes (existing + new tests)
  out_of_scope: 'Adding new artistic filters beyond the existing 4.

    SIMD optimization for oil_paint (separate concern).

    Python/OpenCV reference tools (IM-only, matching existing pattern).

    '
  technical_notes: 'Solarize: IM threshold is percentage — -solarize 50% equals byte threshold 128.

    Emboss: Must use -morphology Convolve with our exact 3x3 kernel [-2,-1,0,-1,1,1,0,1,2],

    not IM''s -emboss which uses a different kernel.

    Oil paint: IM uses -paint {radius}; our impl uses 20 intensity bins vs IM''s 256.

    Investigate aligning bin count, intensity formula, and neighborhood shape to reduce MAE.

    If alignment gets us below 5.0 MAE, use ALGORITHM tier; if below 0.01, use EXACT.

    Charcoal: IM uses -charcoal {radius}; both are edge+blur+negate but edge detector

    differs. Investigate whether matching IM''s edge detection approach brings us closer.

    If a fundamental algorithm difference remains, document why and set appropriate threshold.

    '
