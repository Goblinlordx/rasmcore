id: v2-layer-cache_20260404053002Z
title: V2 layer cache (content-addressed, cross-pipeline)
type: feature
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: 'Port V1 LayerCache architecture to V2: external cache created once, injected

    via WIT, content-addressed blake3 hashing, optional quantization, reference-tracked

    eviction. Managed within the library but initialized/owned externally.

    '
  context: 'V1 has a full LayerCache (627 lines): content-addressed via blake3 hash chains,

    cross-pipeline persistence, Q8/Q16/Full quantization, reference-tracked eviction.

    V2 has only SpatialCache (per-pipeline, keyed by node_id+rect, dies with Graph).

    When the user adjusts a single slider in a 5-filter chain, all 5 nodes recompute

    from scratch. With layer cache, only the changed node and its downstream recompute.

    '
  codebase_analysis: 'V1 LayerCache (crates/rasmcore-pipeline/src/layer_cache.rs):

    - blake3 hash chain: source_hash = blake3(data), blur_hash = blake3(source_hash || "blur" || params)

    - CachedLayer stores pixels, width, height, bpp, referenced flag

    - Memory budget with auto-grow to max_budget (1GB default)

    - Quantization: Full (16 bytes/pixel), Q16 (8), Q8 (4) — transparent to consumers

    - API: new(budget), get(hash), store(hash, pixels), cleanup_unreferenced(), stats()


    V1 WIT interface (wit/image/pipeline.wit):

    - layer-cache resource with constructor(capacity), stats(), clear(), set-cache-quality()

    - Pipeline.set-layer-cache(borrow<layer-cache>) for injection


    V2 Graph (crates/rasmcore-pipeline-v2/src/graph.rs):

    - Uses SpatialCache for tile-level caching within a single pipeline instance

    - No content-addressed hashing, no cross-pipeline persistence

    - Nodes do not carry content hashes


    4 existing pending tracks (pipeline-layer-cache, layer-cache-wit, demo-layer-cache,

    webui-wire-layer-cache) were planned for V1 wiring. This track ports to V2.

    '
  acceptance_criteria:
  - V2 LayerCache struct with content-addressed blake3 hash chains
  - External creation and injection via WIT resource (constructor with capacity_mb)
  - Cache persists across pipeline instances (created once, shared across runs)
  - Optional quantization (Full/Q16/Q8) transparent to pipeline
  - Reference-tracked eviction between runs
  - stats() returns entries, hits, misses, size_bytes
  - V2 Graph integrates cache in request_region() — check before compute, store after
  - 5-filter chain with last param changed recomputes only 1 node (not all 5)
  out_of_scope: 'GPU buffer caching (separate concern). CPU optimization. Shader caching.

    '
  technical_notes: "Architecture mirrors V1:\n1. V2 LayerCache struct in rasmcore-pipeline-v2 (can adapt V1 implementation)\n\
    2. Nodes carry content hashes: source_hash from input data, downstream hashes\n   composed from upstream_hash + op_name\
    \ + serialized_params\n3. Graph.request_region() checks layer cache before compute, stores result after\n4. WIT resource:\
    \ layer-cache { constructor(capacity), stats(), clear(), set-cache-quality() }\n5. Pipeline.set-layer-cache(borrow<layer-cache>)\
    \ in V2 WIT\n6. Web workers create LayerCache once at init, inject into each Pipeline\n\nFor GPU path: layer cache stores\
    \ CPU-side f32 pixels. GPU results are read back\nand cached as f32. On cache hit, data is uploaded to GPU if next node\
    \ is GPU.\nThis means layer cache helps even in GPU pipelines by avoiding re-upload of\nunchanged upstream results.\n"
