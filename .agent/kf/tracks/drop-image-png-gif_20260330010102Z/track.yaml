id: drop-image-png-gif_20260330010102Z
title: Drop remaining image features — native WebP decode, ICO, HDR, EXR, DDS
type: refactor
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Replace the remaining image crate usages: WebP decode (use image-webp directly), ICO/HDR encode (write native),
    EXR (use exr crate directly), DDS decode (native). Each swap requires parity tests before the image feature is dropped.
    Eliminate image crate dependency entirely.

    '
  context: 'After Track 1 drops jpeg/png/gif/avif/bmp/qoi/tga/pnm/tiff from

    image features, only webp/dds/exr/ico/hdr remain. This track eliminates

    those and removes the image crate from Cargo.toml entirely.

    '
  codebase_analysis: "Remaining image-dependent codecs after Track 1:\n  - WebP decode: uses image-webp internally. image-webp\
    \ is a standalone\n    crate (3 deps) that can be used directly.\n  - ICO encode: trivial BMP-in-container format. ~50\
    \ lines to write native.\n  - HDR encode: Radiance RGBE format. Simple header + pixel encoding.\n  - EXR encode/decode:\
    \ uses exr crate internally. Can use directly.\n  - DDS decode: uses image DDS decoder. Custom encoder already exists.\n\
    \nAlso need to replace:\n  - image::guess_format() -- write custom magic-byte detection\n  - pixels_to_dynamic_image()\
    \ helper -- remove entirely\n  - image::DynamicImage in remaining encoder paths\n\nThis track depends on the transform\
    \ rewrite (Track 2) completing first,\nsince transform.rs is the other major DynamicImage user.\n"
  acceptance_criteria:
  - Parity test for each codec swap BEFORE dropping the image feature
  - image crate completely removed from Cargo.toml
  - WebP decode uses image-webp crate directly, parity-tested
  - ICO encode is native, parity-tested vs image crate reference
  - HDR encode is native, parity-tested vs image crate reference
  - EXR encode/decode uses exr crate directly, parity-tested
  - DDS decode is native, parity-tested
  - Custom format detection replaces image::guess_format()
  - All parity tests pass
  - Binary size reduction measured and documented (native + WASM)
  out_of_scope: 'AVIF encode (already dropped in Track 1).

    Writing native WebP decoder (image-webp as standalone dep is fine).

    '
  technical_notes: "COVERAGE AUDIT + PARITY TEST PATTERN (same as Track 1):\n  1. Audit the image crate's coverage for each\
    \ format\n  2. Verify our replacement matches or exceeds it\n  3. Write COVERAGE.md documenting: our coverage, image crate\
    \ coverage,\n     full spec coverage, and gaps to target later\n  4. Parity tests must cover all supported variants\n\
    \  5. Assert pixel-exact match (lossless) or MAE < threshold\n\nimage-webp can be added as a direct dependency. It is\
    \ the same crate\nimage uses internally, just without the DynamicImage wrapper.\n\nFormat detection: check magic bytes\
    \ in order (JPEG FFD8, PNG 89504E47,\nGIF GIF8, WebP RIFF/WEBP, BMP BM, TIFF 4949/4D4D, QOI qoif, etc.).\nThis is ~30\
    \ lines of code.\n"
