id: sdk-typescript-runtime_20260331045701Z
title: "TypeScript SDK — Dynamic Runtime + Typegen CLI"
type: feature
status: pending
created: "2026-03-31"
updated: "2026-03-31"
spec:
  summary: |
    Build the TypeScript SDK as an npm package with dynamic runtime (loads any
    WASM module via manifest introspection) and a typegen CLI that generates
    typed wrappers from a specific module.
  context: |
    Architecture: two layers.
    1. Dynamic runtime (committed): RcImageDynamic class uses getFilterManifest()
       to discover filters at load time. apply(name, params) dispatches dynamically.
       encode(format, config) for output. Works with any rasmcore WASM module.
    2. Typed wrapper (generated per-module): RcImage extends RcImageDynamic with
       concrete methods like blur(radius), toJpeg(config). Generated by typegen
       CLI from the module manifest. Embeds manifest hash for version validation.

    The typegen runs in TypeScript/Node — no Rust needed by the consumer.
  codebase_analysis: |
    sdks/typescript/ (after restructure):
    - src/runtime.ts — RcImageDynamic class (dynamic, universal)
    - src/types.ts — FilterManifest, ParamMeta interfaces
    - bin/typegen.ts — CLI: loads WASM, reads manifest, emits typed.ts
    - package.json — @rasmcore/sdk, bin entry for npx rasmcore-typegen

    Consumer workflow:
    - npm install @rasmcore/sdk
    - Dynamic: import { RcImage } from '@rasmcore/sdk'; RcImage.load(module, bytes).apply('blur', {radius: 3})
    - Typed: npx rasmcore-typegen ./rasmcore.wasm > src/rasmcore-typed.ts
             import { RcImage } from './rasmcore-typed'; RcImage.load(module, bytes).blur(3)
  acceptance_criteria:
    - sdks/typescript/src/runtime.ts implements RcImageDynamic with apply() and encode()
    - Runtime loads any WASM module and discovers filters via getFilterManifest()
    - Runtime validates params against manifest metadata (types, ranges)
    - sdks/typescript/bin/typegen.ts generates typed RcImage subclass from WASM module
    - Generated typed class embeds manifest hash and warns on mismatch
    - Terminal methods (toJpeg, toPng, etc.) generated from registered encoders in manifest
    - "npm test passes with at least one smoke test (load, filter, encode)"
    - Package publishable as @rasmcore/sdk
  out_of_scope: |
    Python/Go SDKs (separate tracks). WASM module compilation.
    Publishing to npm. Browser bundling.
  technical_notes: |
    RUNTIME (dynamic):
    ```typescript
    export class RcImageDynamic {
      static load(module: WasmModule, data: Uint8Array): RcImageDynamic;
      apply(filterName: string, params: Record<string, any>): this;
      encode(format: string, config?: Record<string, any>): Uint8Array;
      get manifest(): FilterManifest;
      get info(): ImageInfo;
      fork(): RcImageDynamic;
    }
    ```

    TYPEGEN OUTPUT:
    ```typescript
    import { RcImageDynamic } from '@rasmcore/sdk';
    const MANIFEST_HASH = "0678a1ace1ec5dde";
    export class RcImage extends RcImageDynamic {
      blur(radius: number): RcImage { return this.apply("blur", { radius }) as RcImage; }
      toJpeg(config?: { quality?: number }): Uint8Array { return this.encode("jpeg", config); }
      // ... all filters + encoders from manifest
    }
    ```
