id: skeletonize-convergence_20260409083100Z
title: Skeletonize until convergence — remove fixed iteration limit
type: bug
status: pending
created: 2026-04-09
updated: '2026-04-09'
spec:
  summary: 'Remove the user-facing iterations param from Skeletonize. Default to

    iterating until convergence with a safety cap of min(w,h)/2. Implement

    convergence_check in the GPU executor so the GPU path also stops early.

    '
  context: 'The Zhang-Suen thinning algorithm is defined as iterating until no pixels

    change. The CPU path already has this logic (line 187: if !changed break)

    but is limited by the iterations param (default 50). The GPU path generates

    iterations*2 shader passes with convergence_check set, but the native

    executor (WgpuExecutorV2) ignores convergence_check entirely.


    Result: for images larger than ~100px, 50 iterations may not be enough

    for full convergence. The user has to guess. For the GPU path, convergence

    detection is declared but non-functional.

    '
  codebase_analysis: "CPU path (morphology/skeletonize.rs:146-188):\n- Loop for 0..self.iterations, with early break if !changed\n\
    - Already correct logic, just needs the cap raised\n\nGPU path (morphology/skeletonize.rs:205-248):\n- Generates self.iterations\
    \ * 2 GpuShader passes upfront\n- Each step2 pass has convergence_check: Some(change_buf_id)\n- Uses atomic<u32> change\
    \ counter in reduction buffer\n- WgpuExecutorV2::execute() and dispatch_pass() DO NOT check convergence\n\nGPU executor\
    \ (rasmcore-gpu-native/src/lib.rs):\n- No convergence_check handling in execute() or dispatch_pass()\n- The field is present\
    \ on GpuShader struct but completely ignored\n- Need to: after each pass with convergence_check, read back the\n  buffer\
    \ and skip remaining passes if all zeros\n\nTheoretical max iterations: min(width, height) / 2\n(each iteration can erode\
    \ at most 1 pixel from each side)\n"
  acceptance_criteria:
  - iterations param removed from Skeletonize struct
  - CPU path uses max_iters = min(w, h) / 2 as safety cap
  - CPU path still breaks early on convergence (existing behavior)
  - GPU executor implements convergence_check — reads back reduction buffer after flagged pass, skips remaining if all zeros
  - GPU path generates max_iters * 2 passes with convergence_check
  - Test that small binary shapes converge in fewer passes than max
  - Test that result is identical regardless of iterations cap (as long as sufficient)
  out_of_scope: 'Per-workgroup convergence flags (optimization noted in code comments).

    Other filters that might benefit from convergence_check.

    '
  technical_notes: "CPU change: replace self.iterations with computed max.\n  let max_iters = (width.min(height) / 2).max(1)\
    \ as usize;\n  for _ in 0..max_iters { ... if !changed { break; } }\n\nGPU change in executor: after dispatch_pass(),\
    \ if op.convergence_check\nis Some(buf_id), read back the reduction buffer. If all bytes are zero,\nskip remaining passes.\n\
    \nThe convergence_check readback is a single u32 (4 bytes) — negligible\ncost compared to the compute pass. It requires\
    \ a GPU→CPU sync point\nper flagged pass, which is acceptable for iterative algorithms.\n\nThe reduction buffer must be\
    \ re-initialized to zero before each\niteration pair (step1 + step2). Currently initial_data is set on\nthe first pass\
    \ only. Need to ensure the counter resets.\n"
