  - text: Test convergence on a known shape (cross pattern should converge to single pixel)
    done: true
- phase: GPU executor convergence_check
  tasks:
  - text: Add convergence_check handling to WgpuExecutorV2 dispatch loop
    done: true
  - text: After flagged pass, read back reduction buffer and check for all-zero
    done: true
  - text: Skip remaining passes if converged
    done: true
- phase: Verification
