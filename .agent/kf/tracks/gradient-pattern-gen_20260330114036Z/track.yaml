id: gradient-pattern-gen_20260330114036Z
title: Gradient & Pattern Image Generation
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Add image generation filters for linear gradients, radial gradients,

    checkerboard patterns, and plasma fractal noise. These generate new images

    from parameters (no input required). IM equivalents validated.

    '
  context: 'ImageMagick can generate gradient, plasma, and pattern images directly

    (e.g., magick -size 256x256 gradient: output.png). We have perlin_noise

    and simplex_noise generators but lack gradient and pattern generators.

    These are commonly used as masks, backgrounds, displacement maps, and

    test images.

    '
  codebase_analysis: 'EXISTING GENERATORS:

    - perlin_noise(w, h, seed, scale, octaves) -> Gray8 buffer

    - simplex_noise(w, h, seed, scale, octaves) -> Gray8 buffer

    Both registered, return raw pixel buffers (not wrapped in ImageInfo).


    NEW GENERATORS:

    - gradient_linear(w, h, color1, color2, angle) -> RGB8

    - gradient_radial(w, h, color1, color2, center_x, center_y) -> RGB8

    - checkerboard(w, h, size, color1, color2) -> RGB8

    - plasma(w, h, seed, turbulence) -> RGB8 (diamond-square fractal)


    IM EQUIVALENTS:

    - gradient_linear: magick -size WxH gradient:color1-color2 -rotate angle

    - gradient_radial: magick -size WxH radial-gradient:color1-color2

    - checkerboard: magick -size WxH pattern:checkerboard

    - plasma: magick -size WxH plasma:color1-color2

    '
  acceptance_criteria:
  - gradient_linear generates smooth gradient between two colors at any angle
  - gradient_radial generates circular gradient from center to edges
  - checkerboard generates alternating color squares of configurable size
  - plasma generates fractal noise pattern with configurable turbulence
  - All 4 registered with ConfigParams
  - IM parity test for gradient_linear vs IM gradient (CLOSE tier)
  - IM parity test for radial gradient (CLOSE tier)
  - All support arbitrary dimensions
  out_of_scope: 'Conic/angular gradients. Multi-stop gradients (covered by gradient_map).

    Seamless tiling. Brick/hexagonal patterns.

    '
  technical_notes: 'GRADIENT LINEAR:

    - For each pixel, project onto gradient axis (rotated by angle)

    - t = dot(pixel - origin, axis_direction) / length

    - color = lerp(color1, color2, t)


    GRADIENT RADIAL:

    - t = distance(pixel, center) / max_radius

    - color = lerp(color1, color2, t)


    CHECKERBOARD:

    - color = ((x / size) + (y / size)) % 2 == 0 ? color1 : color2


    PLASMA (diamond-square):

    - Initialize corners with random values

    - Recursively subdivide: diamond step + square step

    - Add random displacement scaled by turbulence * step_size

    - Normalize to [0, 255], map to color gradient

    '
