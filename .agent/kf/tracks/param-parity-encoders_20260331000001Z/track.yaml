  tasks:
  - text: Document JPEG quality scale (our 1-100 vs IM 1-100) with file size comparison at 5 quality points
    done: true
  - text: Document WebP quality scale vs cwebp quality scale
    done: true
  - text: Document TIFF compression options (ours vs IM) and PNG compression levels
    done: true
  - text: Document GIF/APNG animation parameters vs ffmpeg/IM equivalents
    done: true
- phase: Multi-Setting Encode Validation
  tasks:
  - text: JPEG multi-quality validation — encode at q=25,50,75,95, decode via IM, compare PSNR within 1 dB
    done: true
  - text: WebP multi-quality validation — encode at q=25,50,75,95, decode via dwebp, compare pixels
    done: true
  - text: TIFF compression roundtrip — test LZW, Deflate, None for pixel-exact output
    done: true
  - text: GIF animation timing — encode 3 frames at 50ms,100ms,200ms delays, verify via ffprobe
    done: true
  - text: APNG disposal mode validation — test None/Background/Previous disposal vs ffmpeg decode
    done: true
- phase: Documentation
  tasks:
