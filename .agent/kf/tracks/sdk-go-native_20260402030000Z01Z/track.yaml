id: sdk-go-native_20260402030000Z01Z
title: Go native SDK via cgo with GPU support
type: feature
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: |
    Go package wrapping the rasmcore native shared library via cgo.
    GPU acceleration works automatically through the Rust wgpu executor.
  context: |
    Go has no WASM Component Model host support. The native shared library
    (C FFI) is the only viable path. cgo links against librasmcore and
    provides a type-safe Go API. GPU works internally via wgpu.
  codebase_analysis: |
    Existing: sdks/go/ has a manifest-based runtime stub (blocked on wasmtime-go).
    This track provides the NATIVE path via cgo — bypasses WASM entirely.
    The Go API mirrors the Python API pattern.
  acceptance_criteria:
  - Go package wraps librasmcore via cgo
  - Pipeline API works (Load, Filter, Encode)
  - GPU auto-detected when available
  - go test passes with blur + encode roundtrip
  - go get installable
  out_of_scope: |
    Building the C FFI itself (native-shared-lib track).
    Pure Go implementation. WASM bindings.
  technical_notes: |
    Use cgo to link against librasmcore.h and the shared library.
    The header is generated by the native-shared-lib track.
    Go user sets CGO_LDFLAGS to point to the library location.
