id: register-stateless-ops_20260401020902Z
title: Register stateless WIT ops — compare and codec interfaces
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: |
    Extend the annotation + codegen system to generate stateless WIT adapter
    code for compare.wit, encoder.wit, and decoder.wit interfaces. Currently
    these are entirely hand-wired in adapter/mod.rs.
  context: |
    After the transforms track, the remaining hand-wired WIT adapter code is:

    1. compare.wit (5 methods) — psnr, ssim, rmse, mae, delta_e_cie76
       All hand-written in adapter/mod.rs lines 708-763.

    2. encoder.wit (18 methods) — encode_jpeg, encode_png, etc.
       All hand-written in adapter/mod.rs lines 281-512.
       Encoder functions already have #[register_encoder] annotations but
       these do not drive adapter codegen yet.

    3. decoder.wit (7 methods) — detect_format, decode, decode_as, etc.
       All hand-written in adapter/mod.rs lines 232-279.
       Decoder functions already have #[register_decoder] annotations but
       these do not drive adapter codegen yet.

    4. metadata.wit (3 methods) — read_exif, has_exif, read_metadata
       Hand-written in adapter/mod.rs lines 648-704.

    The goal: extend codegen so these annotations generate the stateless
    WIT adapter impl blocks, eliminating hand-wired adapter code. After
    this track, adapter/mod.rs should contain only type conversion helpers
    and the Component struct — all dispatch is generated.
  codebase_analysis: |
    EXISTING ANNOTATIONS (not yet driving adapter codegen):
    - #[register_encoder] in encoder/*.rs files — used by build.rs for
      pipeline write adapter generation, but NOT for stateless encoder.wit
    - #[register_decoder] in decoder/*.rs files — not used for codegen at all

    NO EXISTING ANNOTATIONS:
    - Compare metrics (psnr, ssim, etc.) have no registration annotations
    - Metadata operations have no registration annotations

    ADAPTER CODE TO REPLACE:
    - impl compare::Guest (5 methods, ~55 lines)
    - impl encoder::Guest (18 methods, ~230 lines)
    - impl decoder::Guest (7 methods, ~47 lines)
    - impl metadata::Guest (3 methods, ~56 lines)

    CODEGEN EXTENSION NEEDED:
    - Parse #[register_encoder/#[register_decoder] for stateless adapter
    - New #[register_metric] or #[register_compare] for compare ops
    - New #[register_metadata_op] for metadata ops (or keep hand-written
      given there are only 3 and they are stable)
  acceptance_criteria:
    - Stateless encoder.wit adapter methods generated from #[register_encoder] annotations
    - Stateless decoder.wit adapter methods generated from #[register_decoder] annotations
    - Compare metrics registered via annotation and adapter generated
    - Hand-written impl encoder::Guest removed from adapter/mod.rs
    - Hand-written impl decoder::Guest removed from adapter/mod.rs
    - Hand-written impl compare::Guest removed from adapter/mod.rs
    - Metadata ops either registered or explicitly documented as hand-written infrastructure
    - cargo build succeeds for native target
    - cargo component build succeeds for wasm32-wasip2 target
    - All codec and compare tests pass
  out_of_scope: |
    Adding new codecs, metrics, or metadata operations.
    Changing codec implementations.
    Pipeline write methods (handled by wire-generated-adapters track).
  technical_notes: |
    APPROACH:

    Compare metrics are simple pure functions with uniform signature:
      fn metric(a: &[u8], info_a: &ImageInfo, b: &[u8], info_b: &ImageInfo) -> Result<f64>
    A single #[register_metric(name = "psnr")] annotation + codegen is
    straightforward.

    Encoder/decoder annotations already exist but need codegen extension:
    - Build.rs already parses encoder configs for pipeline write generation
    - Extend to also generate stateless encoder::Guest methods
    - Add similar parsing for decoder annotations

    Metadata ops (read_exif, has_exif, read_metadata) are only 3 methods
    and unlikely to change. Consider keeping hand-written and documenting
    as infrastructure, similar to pipeline lifecycle methods. Decision can
    be made during implementation.

    ORDERING: This track depends on wire-generated-adapters and
    register-transforms completing first. By the time this runs,
    adapter/mod.rs should only contain codec, compare, and metadata
    hand-wired code.
