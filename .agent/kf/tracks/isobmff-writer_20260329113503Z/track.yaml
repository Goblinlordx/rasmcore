id: isobmff-writer_20260329113503Z
title: "ISOBMFF Container Writer — HEIC/HEIF Box Assembly"
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: >
    Implement ISOBMFF container writing in rasmcore-isobmff for HEIC still image
    output. Writes ftyp, meta (with iloc/iinf/iprp), hvcC config, and mdat boxes.
    Validated by roundtrip — write container, parse back with our reader.
  context: |
    rasmcore-isobmff currently only parses ISOBMFF containers. For HEIC encode,
    we need the write direction. The container format is well-defined (ISO 14496-12)
    and independent of HEVC encoding complexity.

    This track is independent of the x265 port tracks — it can proceed in parallel.
    It produces an ISOBMFF container given raw HEVC bitstream bytes and metadata.
  codebase_analysis: |
    Existing in rasmcore-isobmff:
    - assembly.rs — IsobmffFile, ImageItem structs (parser output, can reuse for writer input)
    - types.rs — Ftyp, HevcConfig, ItemProperties, ColorInfo, GridDescriptor
    - boxreader.rs — Low-level box parsing (need write counterpart)
    - properties.rs — Property parsing (ispe, colr, hvcC, etc.)
    - meta.rs — Meta box parsing (iloc, iinf, pitm)
    - ftyp.rs — Ftyp box parsing

    Required boxes for minimal HEIC:
    - ftyp (file type: mif1, heic brands)
    - meta (container for image metadata)
      - hdlr (handler: pict)
      - pitm (primary item)
      - iinf (item info: 1 item, type hvc1)
      - iloc (item location: offset + length in mdat)
      - iprp (item properties)
        - ipco (property container: ispe + hvcC + colr)
        - ipma (property-to-item association)
    - mdat (media data: raw HEVC bitstream)
  acceptance_criteria:
    - Write a minimal HEIC container with flat_64x64_q22.hevc bitstream
    - Our parser (rasmcore_isobmff::parse) successfully reads the written container back
    - All fields match in roundtrip (dimensions, codec config, bitstream bytes)
    - Written container opens in Apple Preview and ffmpeg (ffprobe validates structure)
    - Grid image writing works (multi-tile HEIC)
    - ICC profile embedding works (colr box with prof type)
    - clippy clean, cargo test passes
  out_of_scope: |
    HEVC encoding (separate tracks). AVIF container variant (future).
    Animated HEIF sequences. Thumbnail writing (future enhancement).
    Multi-image HEIF (only primary image).
  technical_notes: |
    Implementation approach:
    1. Add a BoxWriter counterpart to BoxIterator in boxreader.rs
    2. Implement write functions for each box type (ftyp, meta, hdlr, etc.)
    3. The tricky part is iloc — item locations reference mdat offsets,
       so mdat position must be known or placeholders patched after writing
    4. Use a two-pass approach: first pass computes sizes, second writes bytes.
       Or: write to a Vec<u8> buffer, patch offsets at the end.

    Validation:
    - Roundtrip test: assemble container -> parse -> compare all fields
    - External: ffprobe on the written file (structure validation)
    - Visual: open in Apple Preview (if on macOS)

    Reference: ISO 14496-12 (ISOBMFF), ISO 23008-12 (HEIF)
