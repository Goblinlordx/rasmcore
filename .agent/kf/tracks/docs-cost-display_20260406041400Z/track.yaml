id: docs-cost-display_20260406041400Z
title: Display computation cost on docs operation pages
type: chore
status: pending
created: 2026-04-06
updated: '2026-04-06'
spec:
  summary: 'Wire the cost field from the registry dump JSON through the TypeScript

    types to the operation page UI. The Rust side already has cost values

    on all 70+ filters via #[filter(cost = "O(n)")].

    '
  context: 'Every V2 filter registers a cost string via the #[filter(cost = "...")]

    macro attribute. dump_registry exports it to JSON. But the docs site

    TypeScript types (FilterInfo) omit the field, and the operation page

    template does not render it.


    Cost values are already populated on all filters:

    - Point ops: O(n)

    - Spatial: O(n * r) separable, O(n * r^2), etc.

    - Color: O(n) to O(n * k) depending on LUT size

    - Enhancement: parametric costs

    '
  codebase_analysis: 'Rust (complete):

    - registry.rs: OperationRegistration.cost and FilterFactoryRegistration.cost

    - V2Filter macro: parses #[filter(cost = "...")] attribute

    - dump_registry.rs: outputs cost in JSON

    - All 70+ filters have cost values


    TypeScript (gap):

    - docs/site/src/lib/types.ts: FilterInfo interface missing cost field

    - docs/site/src/lib/registry.ts: parses JSON but does not read cost

    - docs/site/src/app/operations/[slug]/page.tsx: does not render cost


    The registry JSON is generated by dump_registry and consumed by the

    docs site build. Adding cost to the TypeScript layer is a 3-file change.

    '
  acceptance_criteria:
  - FilterInfo TypeScript interface includes cost field
  - Registry parser reads cost from JSON
  - Operation page displays cost in metadata section
  - Cost shows for all operations that have one (70+ filters)
  - Operations without cost show nothing (graceful fallback)
  out_of_scope: '- Changing any Rust cost values

    - Adding cost to encoder/decoder pages

    - Performance benchmarking to validate cost claims

    '
  technical_notes: "1. types.ts: Add cost?: string to FilterInfo\n2. registry.ts: Read cost from JSON when building FilterInfo\n\
    3. page.tsx: Render cost in metadata footer (next to category)\n   Format: \"Cost: O(n)\" or \"Cost: O(n * r) separable\"\
    \n"
plan:
