title: HEVC Syntax Decoder Fix — CTU/CU CABAC Correctness
type: bug
status: pending
created: '2026-03-28'
updated: '2026-03-28'
spec:
  summary: Fix CABAC syntax parsing to correctly decode HEVC I-frames. Current implementation exhausts the CABAC stream prematurely
    — context model indices, quad-tree depth handling, and residual coefficient coding need debugging against reference bitstreams.
  context: 'Parity tests fail with ''unexpected end of CABAC stream'' after fixing the slice data offset. The CABAC byte position
    is now correct (verified by manual bit trace), but the syntax parser reads too many bins from the CABAC stream. Root causes:
    incorrect context model index mapping, quad-tree split logic not matching x265 encoder decisions, and residual coefficient
    coding consuming wrong number of bins.'
  codebase_analysis: '- frame.rs: correct CABAC offset (2 bytes for test bitstreams, verified)

    - syntax.rs: coding_quadtree/coding_unit/decode_transform_tree use simplified context indices

    - Context index offsets (SPLIT_CU_CTX_OFFSET etc.) are hardcoded approximations

    - Need to match actual HEVC Table 9-5 through 9-37 context model assignments

    - The checker_256x256 test partially decodes (5.6dB PSNR) suggesting some CUs parse correctly'
  acceptance_criteria:
  - 'All parity tests pass (no #[ignore], no silent failures)'
  - Flat 64x64 HEIC decodes with PSNR > 30dB vs ffmpeg reference
  - Gradient 128x128 HEIC decodes with PSNR > 25dB
  - Checker 256x256 HEIC decodes with PSNR > 25dB
  out_of_scope: ''
  technical_notes: ''
