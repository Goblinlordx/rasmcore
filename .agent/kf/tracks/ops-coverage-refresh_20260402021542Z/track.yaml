id: ops-coverage-refresh_20260402021542Z
title: 'Research: Refresh operations coverage gap — filters, transforms, effects vs IM, libvips, sharp, Pillow, photon_rs'
type: research
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: 'Refresh the stale operations coverage sections of the gap reports (last

    updated Mar 30-31) to reflect significant progress. Add photon_rs as a new

    comparison target. Focus exclusively on filters, transforms, effects, color

    ops, analysis, and drawing — NOT format/codec support.

    '
  context: 'The filter/operation comparison tables in parity-gap-audit.md (Mar 31)

    are significantly outdated. Many items listed as gaps are now implemented:

    high_pass, LAB channel ops, mesh_warp, skeletonize, Harris corner detection,

    template matching, GPU-accelerated filters, TrueType text rendering,

    complex text shaping, and more.


    User wants photon_rs added as comparison target. photon_rs has ~96 functions

    across: color channels, effects (offsets, thresholding, duotone, solarize),

    convolutions (blur, sharpen, edge detect), monochrome, colour space ops

    (HSL, LCh, sRGB), 30+ preset filters, 10 blend modes, text/watermark,

    and basic transforms (resize, crop, rotate, flip). It is WASM-first like

    rasmcore but far narrower — rasmcore has 137+ registered operations with

    GPU acceleration, tile-based pipeline, and native codecs.


    Format/codec coverage is explicitly OUT OF SCOPE for this track.

    '
  codebase_analysis: "Key ops improvements since last report (Mar 30-31):\nSPATIAL: high_pass, GPU-accelerated gaussian_blur/bilateral/spherize\n\
    COLOR: LAB extract L/a/b, LAB sharpen, LAB adjust, GPU 3D CLUT\nDISTORTION: mesh_warp (grid-based with bilinear inverse)\n\
    MORPHOLOGY: skeletonize (Zhang-Suen), GPU-capable\nANALYSIS: Harris corner detection, NCC template matching\nTEXT: TrueType\
    \ font rendering, complex text shaping\nGPU: GpuCapable trait on spatial, distortion, color, morphology filters\nPIPELINE:\
    \ stateless graph description, fan-out/reuse, dynamic overlap\n\nExisting report to update: .agent/kf/_reports/parity-gap-audit.md\n\
    (Section 2: Filter/Operation Comparison Matrix — vs libvips, vs IM)\n\nphoton_rs capabilities to cross-reference:\n- docs.rs/photon-rs\
    \ modules: channels, colour_spaces, conv, effects,\n  filters, helpers, monochrome, multiple, native, noise, text, transform\n"
  acceptance_criteria:
  - Updated operations comparison table with current rasmcore state
  - photon_rs column added to filter/transform/effects comparison tables
  - Every done item verified against actual registered operations
  - Clear identification of remaining gaps (what we still lack)
  - Summary of areas where rasmcore surpasses ALL comparison targets
  - No format/codec rows in the output — operations only
  - No source code, tests, or project files modified
  out_of_scope: 'Format/codec coverage (explicitly excluded). Implementing missing features.

    Modifying source code or tests. Performance benchmarks.

    '
  technical_notes: "APPROACH:\n1. Read param-manifest.json for all registered filters + categories\n2. Read domain modules\
    \ for transforms, analysis ops, drawing ops\n3. Catalog photon_rs operations from docs.rs module listing\n4. Update parity-gap-audit.md\
    \ Section 2 tables in-place\n5. Produce a new .agent/kf/_reports/ops-coverage-matrix.md with:\n   - Category-by-category\
    \ comparison (rasmcore vs IM vs libvips vs\n     sharp vs Pillow vs photon_rs)\n   - Remaining gaps with priority ratings\n\
    \   - Areas of rasmcore leadership\n\nCATEGORIES TO COVER:\n- Blur/sharpen/denoise\n- Edge detection / analysis\n- Morphology\n\
    - Color adjustment (exposure, contrast, saturation, curves, etc.)\n- Color space operations\n- Tone mapping / HDR\n- Distortion\
    \ / warping\n- Transforms (resize, rotate, crop, flip, affine, perspective)\n- Compositing / blending\n- Drawing / text\n\
    - Content-aware (smart crop, seam carve, inpaint)\n- Frequency domain\n- Histogram operations\n- Noise generation\n- Comparison\
    \ metrics (PSNR, SSIM, etc.)\n- Segmentation / labeling\n- Convolution\n- LUT / color grading\n- Dithering\n- GPU acceleration\
    \ coverage\n"
