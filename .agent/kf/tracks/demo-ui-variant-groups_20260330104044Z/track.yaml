  - text: Render group headers as collapsible containers with variant count badge
    done: true
  - text: Render variant items indented within their group container
    done: true
  - text: Render standalone filters directly under category (unchanged behavior)
    done: true
  - text: Add click handler on group headers to toggle expand/collapse
    done: true
  - text: Add reference tooltip (title attribute) on filter items
    done: true
- phase: Styling & Verification
  tasks:
  - text: Add CSS for palette-group-header, palette-group-items, indent, collapse animation
    done: true
  - text: Manual verification — groups collapse/expand, variants add to pipeline, params render correctly
    done: true
