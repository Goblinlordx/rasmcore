id: demo-ui-variant-groups_20260330104044Z
title: Demo UI — Filter Variant Group Navigation
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Update demo pipeline UI to render filters hierarchically using group/variant metadata from param-manifest.json.
    Groups show as collapsible sections within their category; standalone filters render directly under category as before.

    '
  context: 'The param-manifest.json now includes group, variant, and reference

    fields for all 105 filters (from filter-variant-groups track). The

    demo UI currently renders a flat list under each category header.

    Users need to see related variants grouped together — when they

    select "blur", they should see gaussian/bokeh/motion/zoom as

    sub-options rather than 5 separate items cluttering the palette.


    Navigation model:

    - Category (e.g., "Spatial") -> group header (e.g., "blur") -> variants

    - Category -> standalone filter (no group)

    - Clicking a group header expands/collapses its variants

    - Clicking a variant adds it to the pipeline (same as today)

    - Reference/provenance shown as tooltip on hover

    '
  codebase_analysis: "Current UI flow (demo/src/pipeline.js):\n- Line 66-111: loadManifest() fetches /sdk/param-manifest.json\n\
    - Line 169-193: renderPalette() groups by MANIFEST_CATEGORIES[name]\n- Renders: <h3> category header, then flat <div class=\"\
    palette-item\"> per filter\n- PARAM_META stores per-filter param metadata\n- MANIFEST_CATEGORIES maps filter name -> category\
    \ string\n\nManifest structure (per filter):\n{\n  \"name\": \"bokeh_blur\",\n  \"category\": \"spatial\",\n  \"group\"\
    : \"blur\",\n  \"variant\": \"bokeh\",\n  \"reference\": \"physical optic disc/polygon aperture model\",\n  \"params\"\
    : [...]\n}\n\nChanges needed:\n1. Parse group/variant/reference from manifest in loadManifest()\n2. In renderPalette(),\
    \ within each category, sub-group by group field\n3. Render group headers as collapsible containers\n4. Variants as indented\
    \ palette-items within the group\n5. Standalone filters (empty group) render at category level as before\n6. Tooltip with\
    \ reference text on hover\n"
  acceptance_criteria:
  - Filters with a group field are rendered under a collapsible group header within their category
  - Standalone filters (empty group) render directly under their category header
  - Clicking a group header toggles expand/collapse of its variants
  - Each variant shows its variant name (not the full filter name) when inside a group
  - Hovering a filter shows its reference/provenance as a tooltip
  - Groups start collapsed by default (clean initial view)
  - Group header shows count badge (e.g., "blur (5)")
  - Adding a variant to the pipeline works exactly as before (same click behavior)
  - All existing filter params still render correctly when a filter is selected
  out_of_scope: 'Changing the pipeline execution logic.

    Changing param controls or hint rendering.

    Search/filter functionality within the palette.

    Drag-and-drop reordering of groups.

    '
  technical_notes: "Rendering approach:\n\nWithin renderPalette(), after grouping by category:\n1. For each category, collect\
    \ filters into { grouped: Map<group, filter[]>, standalone: filter[] }\n2. Render standalone filters first (or after groups\
    \ — TBD)\n3. For each group: render a <div class=\"palette-group\"> with:\n   - <div class=\"palette-group-header\"> showing\
    \ group name + variant count + toggle arrow\n   - <div class=\"palette-group-items\"> (initially hidden) containing variant\
    \ palette-items\n\nCSS additions:\n- .palette-group-header: similar to palette-item but with arrow indicator\n- .palette-group-items:\
    \ collapsible container (display: none when collapsed)\n- .palette-group-items .palette-item: left padding for indent\n\
    - .palette-item[title]: tooltip via native title attribute for reference\n\nGroup label: use the group field value, title-cased\
    \ (e.g., \"blur\" -> \"Blur\")\nVariant label: use variant field if present, else full filter name\nStandalone label:\
    \ use filter name (same as today)\n"
