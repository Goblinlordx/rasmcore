id: fix-spatial-cache-eviction_20260405231438Z
title: Fix SpatialCache — LRU eviction with entry count + budget bounds
type: bug
status: pending
created: 2026-04-06
updated: 2026-04-06
spec:
  summary: |
    Fix SpatialCache FIFO index corruption bug and replace with LRU
    eviction bounded by both entry count (n * log2(n) where n = node
    count) and byte budget. Whichever limit is hit first triggers
    eviction of oldest entries.
  context: |
    cache.rs lines 74-81: FIFO eviction uses entries.remove() which
    shifts indices, but order Vec retains stale indices. This can
    skip entries (leak) or panic.

    The replacement should be LRU with two eviction triggers:
    1. Entry count limit: n * log2(n) where n = graph node count.
       Keeps recent results warm, bounds total entries.
    2. Budget overflow: byte size limit (existing 16MB default).
       Evicts LRU entries until room for the new entry.

    Budget must be sized so the working set (one result per active
    node) fits without thrashing. If budget < node_count * image_size,
    eviction happens mid-computation. The budget should accommodate
    at least the working set before overflow triggers.
  acceptance_criteria:
    - Replace order Vec with proper LRU tracking (no stale indices)
    - Evict oldest entries on entry count limit (n * log2(n))
    - Evict oldest entries on byte budget overflow
    - Whichever limit is hit first triggers eviction
    - No panic on repeated store/evict cycles
    - Working set (current pipeline nodes) fits without thrashing
    - Unit tests for both eviction triggers
  out_of_scope: |
    Changing cache to use Rc/Arc shared buffers
    Tiled sub-region cache optimization
