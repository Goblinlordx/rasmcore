title: Register pipeline transforms — annotation on impl ImageNode
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Create #[register_transform] annotation for impl ImageNode blocks with

    codegen support. Move resize/crop/rotate/flip/auto_orient/composite/

    icc_to_srgb from hand-wired adapter code to registered + generated

    adapter code. Pipeline infrastructure (new, read, execute, metadata)

    stays hand-written.

    '
  context: "Transform operations (resize, crop, rotate, flip, auto_orient, composite,\nicc_to_srgb, convert_format) are currently\
    \ hand-wired in two places:\n\n1. adapter/pipeline_adapter.rs — hand-written methods that construct\n   node structs and\
    \ add them to the graph (lines 410-671)\n2. adapter/mod.rs — hand-written stateless transform.wit impl (lines 515-613)\n\
    \nThese should use the same annotation-driven pattern as filters. The\nagreed design: annotate the impl ImageNode block\
    \ on the struct:\n\n  #[register_transform(name = \"crop\", config = \"CropParams\")]\n  impl ImageNode for CropNode {\n\
    \      fn info(&self) -> ImageInfo { ... }\n      fn compute_region(&self, ...) { ... }\n  }\n\nThe proc macro:\n- Emits\
    \ the impl block unchanged\n- Emits inventory::submit!() with a StaticTransformRegistration\n- Codegen generates pipeline\
    \ adapter method (construct node, add to graph)\n- Codegen generates stateless adapter method (for transform.wit)\n\n\
    The developer keeps full control of the ImageNode impl (custom dimension\nlogic, coordinate mapping). The annotation only\
    \ drives adapter wiring.\nConstructor convention: Type::new(source, source_info, &Config).\n\nWHAT STAYS HAND-WRITTEN\
    \ (pipeline infrastructure):\n- new(), set_layer_cache() — lifecycle\n- read(), read_frames() — source creation\n- execute(),\
    \ execute_region(), execute_sequence() — execution\n- All metadata_* methods — pipeline state management\n- node_info()\
    \ — introspection\n- write() generic method — format dispatch\n"
  codebase_analysis: 'EXISTING TRANSFORM NODES (nodes/transform.rs):

    - ComposedAffineNode — matrix-based affine transform

    - ResizeNode — lanczos/bilinear/nearest resize

    - CropNode — coordinate-shift crop

    - RotateNode — 90/180/270 rotation

    - FlipNode — horizontal/vertical flip

    - AutoOrientNode — EXIF orientation correction


    OTHER HAND-WIRED NODES:

    - IccToSrgbNode (nodes/color.rs) — ICC profile conversion

    - CompositeNode (nodes/composite.rs or inline in adapter)


    ADAPTER METHODS TO REPLACE (pipeline_adapter.rs):

    - resize (lines 410-443) — constructs ResizeNode

    - crop (lines 445-473) — constructs CropNode

    - rotate (lines 475-497) — constructs RotateNode

    - flip (lines 499-520) — constructs FlipNode

    - convert_format (lines 522-528) — returns NotImplemented

    - icc_to_srgb (lines 530-561) — constructs IccToSrgbNode

    - auto_orient (lines 563-615) — constructs AutoOrientNode

    - composite (lines 617-671) — constructs composite node


    STATELESS ADAPTER TO REPLACE (adapter/mod.rs lines 515-613):

    - impl transform::Guest for Component — 7 methods


    PROC MACRO PATTERN (existing in rasmcore-macros/src/lib.rs):

    - register_filter already creates StaticFilterRegistration + inventory

    - Same pattern applies: register_transform creates StaticTransformRegistration


    CODEGEN PATTERN (existing in rasmcore-codegen):

    - adapter.rs generates filters::Guest impl methods

    - pipeline.rs generates pipeline filter adapter methods

    - Same pattern: generate transform::Guest + pipeline transform methods

    '
  acceptance_criteria:
  - register_transform proc macro attribute defined in rasmcore-macros
  - StaticTransformRegistration struct + inventory collection in filter_registry.rs
  - All transform nodes annotated with
  - Codegen generates pipeline adapter methods for all transforms
  - Codegen generates stateless transform.wit adapter methods
  - Hand-written transform adapter code removed from pipeline_adapter.rs
  - Hand-written transform::Guest impl removed from adapter/mod.rs
  - Pipeline infrastructure methods (new, read, execute, metadata) remain hand-written
  - convert_format either properly implemented or explicitly excluded
  - cargo build succeeds for native target
  - cargo component build succeeds for wasm32-wasip2 target
  - All existing transform tests pass
  out_of_scope: 'Changing the ImageNode trait or node implementations.

    Registering codec or compare operations — separate track.

    Converting filters to struct-annotation style (future consideration).

    Adding new transform operations.

    '
  technical_notes: "DESIGN:\n\nAnnotation on impl ImageNode block:\n\n  #[register_transform(name = \"crop\", config = \"\
    CropParams\")]\n  impl ImageNode for CropNode {\n      fn info(&self) -> ImageInfo { ... }\n      fn compute_region(&self,\
    \ ...) -> Result<Vec<u8>, ImageError> { ... }\n  }\n\nProc macro expands to:\n  - Original impl block (unchanged)\n  -\
    \ Static registration:\n    static REG: StaticTransformRegistration = StaticTransformRegistration {\n        name: \"\
    crop\",\n        config_type: \"CropParams\",\n        node_type: \"CropNode\",\n        ...\n    };\n    inventory::submit!(&REG);\n\
    \nConstructor convention: CropNode::new(source: u32, source_info: ImageInfo, config: &CropParams)\nCodegen looks for this\
    \ signature by convention. The config struct must\nderive ConfigParams (same as filters) for WIT type generation.\n\n\
    CODEGEN OUTPUT:\n- generated_transform_adapter.rs — impl transform::Guest methods\n- Appended to generated_pipeline_adapter.rs\
    \ — pipeline transform methods\n  (or separate generated_pipeline_transform_adapter.rs)\n\nPIPELINE METHOD GENERATION\
    \ PATTERN:\n  fn crop(&self, source: NodeId, config: pipeline::CropConfig) -> Result<NodeId, RasmcoreError> {\n      let\
    \ src_info = self.graph.borrow().node_info(source).map_err(to_wit_error)?;\n      let domain_cfg = CropParams { x: config.x,\
    \ y: config.y, ... };\n      let node = CropNode::new(source, src_info, &domain_cfg);\n      let hash = compute_hash(&upstream_hash,\
    \ \"crop\", &config_bytes);\n      Ok(self.graph.borrow_mut().add_node_with_hash(Box::new(node), hash))\n  }\n\nSTATELESS\
    \ METHOD GENERATION PATTERN:\n  fn crop(pixels: Vec<u8>, info: types::ImageInfo, ...) -> Result<...> {\n      // Full-image\
    \ execution: construct node, execute full rect\n  }\n"
