id: remaining-config-unify_20260401124500Z
title: "Unify remaining positional-arg pipeline ops to use config records"
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: |
    Convert remaining POSITIONAL_ARG_OPS to config records. Zero-param ops
    get empty config records. convertFormat gets a config with target field.
    String/list-param ops (curves, convolve, displacement-map) get config
    records wrapping their args. Goal: eliminate POSITIONAL_ARG_OPS entirely.
  context: |
    After the transform-config-records track, POSITIONAL_ARG_OPS still has
    15 entries: grayscale, convertFormat, convolve, displacementMap, 6 curve
    ops, 4 vs-curve ops, applyCubeLut, applyHaldLut, gradientMap.

    These fall into categories:
    - Zero-param ops used from UI (grayscale) — need empty config records
    - Enum-param ops (convertFormat with pixel-format) — need config record
    - String-param filter ops (curves*, hue-vs-*, gradient-map, applyCubeLut)
      — these have string args in the WIT, need config records wrapping the string
    - List-param ops (convolve with kernel, displacement-map with map-x/map-y)
      — need config records wrapping the lists
    - applyHaldLut already has a config record but is still in the set (bug)

    The approach: update the filter and pipeline codegen to wrap all remaining
    non-config methods with config records. For zero-param ops, generate empty
    records. For string/list params, wrap them in a config record.
  codebase_analysis: |
    Current WIT signatures for remaining positional ops:
      convert-format(source, target: pixel-format)
      curves-red(source, points: string)
      convolve(source, kernel: list<f32>, config: convolve-config)
      displacement-map(source, map-x: list<f32>, map-y: list<f32>)
      apply-cube-lut(source, cube-data: string)
      gradient-map(source, stops: string)

    Zero-param ops in WIT (no config needed currently):
      equalize, normalize, auto-level, invert, depolar, polar,
      tonemap-reinhard, white-balance-gray-world, emboss, evaluate-abs,
      triangle-threshold, otsu-threshold, average-blur, unpremultiply,
      premultiply

    The filter codegen (generate/pipeline.rs) handles extra params (strings,
    lists) via EXTRA_PARAMS lists. The pipeline WIT template has placeholders
    for filter methods. The codegen decides whether a filter uses a config
    record based on whether it has ConfigParams.

    Worker files affected:
      web-ui/src/pipeline-worker.ts — POSITIONAL_ARG_OPS
      web-ui/src/preview-worker.ts — POSITIONAL_ARG_OPS
  acceptance_criteria:
    - convertFormat uses a config record with target pixel-format field
    - Zero-param pipeline ops accept empty config records (or no change needed if already handled)
    - String-param ops (curves, gradient-map, applyCubeLut) use config records wrapping the string
    - List-param ops (convolve kernel, displacement-map) use config records
    - POSITIONAL_ARG_OPS set is empty or removed from both workers
    - All ops go through buildConfig uniformly
    - WASM component builds successfully
    - npm run check passes
  out_of_scope: |
    - Changing the stateless filter API (only pipeline resource methods)
    - Adding new filters or transforms
  technical_notes: |
    For each category:

    1. Zero-param ops: The worker already handles these via the
       no-param check. No WIT change needed — they stay as func(source).
       Just remove from POSITIONAL_ARG_OPS (they arent in it).

    2. convertFormat: Add convert-format-config record with target field.
       Update pipeline WIT and adapter. Remove from POSITIONAL_ARG_OPS.
       Add to PIPELINE_EXTRAS in manifest.ts.

    3. String-param ops: The filter codegen puts extra string params
       outside the config record. Options:
       a) Wrap string in config: curves-red-config { points: string }
       b) Keep as positional but handle in worker specially
       Option (a) is cleaner. Update filter codegen to include string
       params in the config record.

    4. List-param ops: Same as strings — wrap in config record.
       convolve-config already exists but kernel is separate.
       displacement-map needs a config with map-x and map-y lists.

    5. applyHaldLut: Already has config record — just remove from
       POSITIONAL_ARG_OPS (it was incorrectly listed).

    After all changes, POSITIONAL_ARG_OPS should be empty and can
    be deleted. The worker dispatches everything through buildConfig.
