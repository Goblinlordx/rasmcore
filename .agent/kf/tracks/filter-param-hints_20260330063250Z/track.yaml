id: filter-param-hints_20260330063250Z
title: "Filter ConfigParams: Type-Level Hints, Nested Struct Flattening & Manifest Pipeline"
type: chore
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: >
    Introduce reusable ConfigParams sub-structs (ColorRgb, ColorRgba, AngleDeg,
    etc.) with type-level #[config_hint("rc.*")] attributes that auto-propagate
    through the macro, build.rs, and manifest pipeline. Nested struct fields are
    auto-flattened to WIT/manifest and auto-aggregated on the Rust side. Per-field
    #[param(hint = "...")] overrides the type-level hint when needed. Replaces
    scattered separate _r/_g/_b/_a fields with single typed struct fields across
    all filters.
  context: |
    The ConfigParams derive macro already supports #[param(hint = "...")] and
    stores it in ParamDescriptorJson.hint. The demo UI (pipeline.js) already has
    hint-to-control mapping for rc.color_rgb, rc.color_rgba, rc.angle_deg, and
    rc.percentage. However:

    1. build.rs manifest generator drops hints entirely — ParamField has no hint
       member, the parser ignores hint=, JSON output omits it.
    2. Only 1 of ~66 ConfigParams structs uses a hint (colorize with rc.color_rgb).
    3. Many filters represent colors as separate color_r/color_g/color_b/color_a
       u32 fields — verbose, error-prone, and impossible for the UI to group.
    4. Color grading filters have per-channel triplets (slope_r/g/b, lift_r/g/b)
       that are semantically color groups but structurally disconnected.

    The solution: define reusable param-type structs with type-level hints, then
    use them as fields in filter ConfigParams. The macro auto-flattens nested
    structs for WIT and manifest, and auto-aggregates them in adapter glue. The
    hint is intrinsic to the type — a ColorRgba is always a color picker.
  codebase_analysis: |
    Key files:
    - crates/rasmcore-macros/src/lib.rs:229-385 — ConfigParams derive macro
      - Already extracts #[param(hint = "...")] per field (line 321)
      - Generates ParamDescriptorJson with hint field (line 364)
      - Needs: #[config_hint("...")] struct-level attribute, nested struct detection
    - crates/rasmcore-image/build.rs:310-410 — build-time ConfigParams parser
      - ParamField struct (line 310): MISSING hint field
      - parse_config_params_structs (line 320): regex parser, ignores hint=
      - Manifest JSON output (line 156): omits hint
      - Needs: hint field, two-pass parsing for nested struct resolution
    - crates/rasmcore-image/build.rs:68-130 — WIT generation
      - Already flattens [u8; 3] to separate args
      - Needs: flatten nested ConfigParams structs the same way
    - demo/src/pipeline.js:81-99 — hint consumption ✓
      - rc.color_rgb/rgba → color picker
      - rc.angle_deg → angle control
      - rc.percentage → percentage control
    - crates/rasmcore-image/src/domain/filter_registry.rs — ParamDescriptorJson, ParamValue
      - ParamValue already has Color([u8; 3]) variant
    - crates/rasmcore-image/src/domain/filters.rs — 66 ConfigParams structs

    Filters to migrate to nested struct fields:
    Drawing (color_r/g/b/a → pub color: ColorRgba):
      DrawLineParams, DrawRectParams, DrawCircleParams, DrawTextParams
    Fill (fill_r/g/b/a → pub fill: ColorRgba):
      FloodFillParams
    Colorize (target: [u8; 3] → pub target: ColorRgb):
      ColorizeParams (already has hint, migrate to struct type)
    Color grading (slope_r/g/b → pub slope: ColorRgb, etc.):
      AscCdlParams (3 groups: slope, offset, power)
      LiftGammaGainParams (3 groups: lift, gamma, gain)
    Angle fields (f32 → pub hue: AngleDeg, etc.):
      SplitToningParams: highlight_hue, shadow_hue
      SelectiveColorParams: target_hue
      HueRotateParams: degrees
  acceptance_criteria:
    - Reusable param-type structs exist (ColorRgb, ColorRgba, AngleDeg) with #[config_hint("rc.*")]
    - ConfigParams derive macro detects #[config_hint("...")] on struct and emits it via a config_hint() associated fn
    - ConfigParams derive macro detects nested ConfigParams fields and flattens their descriptors with field-name prefix (e.g., color.r)
    - Per-field #[param(hint = "...")] overrides the type-level config_hint when present
    - build.rs ParamField includes hint; parser extracts both type-level and field-level hints
    - build.rs two-pass parsing resolves nested struct types and inlines their fields with prefix
    - param-manifest.json includes "hint" key for every param entry
    - WIT generation flattens nested struct fields (color.r → color-r in WIT)
    - Adapter glue aggregates flat WIT args back into nested structs
    - All drawing filters use pub color: ColorRgba (replacing separate color_r/g/b/a)
    - FloodFillParams uses pub fill: ColorRgba
    - ColorizeParams uses pub target: ColorRgb
    - AscCdlParams uses pub slope/offset/power: ColorRgb
    - LiftGammaGainParams uses pub lift/gamma/gain: ColorRgb
    - Angle params migrated to AngleDeg where applicable
    - Demo UI renders color pickers for all migrated color fields
    - No regression in filters without hints
    - rc.* hint vocabulary documented in code_styleguides/
  out_of_scope: |
    - Deeply nested structs (only one level of nesting supported)
    - New hint types beyond what the demo UI already supports (rc.color_rgb, rc.color_rgba, rc.angle_deg, rc.percentage)
    - Runtime hint validation or enforcement
    - Migrating non-color/non-angle params to typed structs (future work)
    - GPU/SIMD changes — this is metadata/plumbing only
  technical_notes: |
    Design: type-level hints with field-level override

      #[derive(ConfigParams)]
      #[config_hint("rc.color_rgba")]
      pub struct ColorRgba {
          #[param(min = 0, max = 255, default = 255)] pub r: u8,
          #[param(min = 0, max = 255, default = 255)] pub g: u8,
          #[param(min = 0, max = 255, default = 255)] pub b: u8,
          #[param(min = 0, max = 255, default = 255)] pub a: u8,
      }

      #[derive(ConfigParams)]
      pub struct DrawLineParams {
          pub color: ColorRgba,    // ← hint auto-inherited from type
          #[param(min = 0.5, max = 100.0, step = 0.5, default = 2.0)]
          pub width: f32,
      }

    Macro behavior for nested fields:
    - When a field type has a config_hint() method (i.e., is a ConfigParams struct),
      the macro calls Type::param_descriptors() and prefixes each with "fieldname."
    - The type-level hint propagates to all flattened params unless the field has
      an explicit #[param(hint = "...")] override
    - Manifest output: {"name":"color.r","type":"u8","hint":"rc.color_rgba",...}

    WIT flattening:
    - Nested struct field "color: ColorRgba" → color-r: u8, color-g: u8, ... in WIT
    - Same mechanism as existing [u8; 3] unpacking, extended to named struct fields

    Adapter aggregation:
    - Generated adapter code constructs ColorRgba { r: color_r, g: color_g, ... }
      from flat WIT args before calling the domain function

    build.rs two-pass parsing:
    - Pass 1: parse all ConfigParams structs into a HashMap<name, fields>
    - Pass 2: resolve field types — if a field type matches a known struct name,
      inline its fields with prefix and propagate the struct-level hint
    - The struct-level hint is extracted from #[config_hint("...")] attribute

    Filter function signatures will change from:
      fn draw_line(pixels, info, x1, y1, x2, y2, color_r, color_g, color_b, color_a, width)
    to:
      fn draw_line(pixels, info, x1, y1, x2, y2, color: ColorRgba, width)
    The WIT signature stays flat — adapter handles the mapping.
