id: gpu-shaders-wave1_20260403074003Z
title: "GPU shaders wave 1 — point ops, color ops, and simple per-pixel filters"
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: |
    Write WGSL compute shaders for the ~60 easiest filters — point ops,
    color ops, and simple per-pixel operations. These are trivial GPU
    kernels (5-20 lines each) that map 1:1 from input to output pixel.
  context: |
    With the f32 pipeline and GPU F32Vec4 default, adding a GPU shader
    to a filter means it runs entirely in VRAM with zero CPU involvement
    and zero memory transfer overhead. Point ops and color ops are the
    simplest possible shaders — each pixel is independent.

    Currently 17 filters have GPU shaders (mostly spatial/distortion).
    This track adds shaders for the large category of per-pixel ops
    that currently only have CPU paths.
  codebase_analysis: |
    Point ops needing shaders (trivial per-pixel math):
      brightness, contrast, gamma, exposure, levels, posterize,
      sigmoidal_contrast, invert

    Color ops needing shaders (per-pixel color space transform):
      hue_rotate, saturate, sepia, colorize, channel_mixer, vibrance,
      modulate, color_balance, white_balance_temperature, photo_filter,
      selective_color, lab_adjust, lab_sharpen, split_toning, asc_cdl,
      lift_gamma_gain

    Grading ops (per-pixel with LUT or curve lookup):
      curves_master, curves_red, curves_green, curves_blue,
      hue_vs_sat, hue_vs_lum, lum_vs_sat, sat_vs_sat,
      apply_cube_lut, apply_hald_lut, gradient_map

    Effect ops (per-pixel):
      solarize, film_grain, gaussian_noise, uniform_noise,
      salt_pepper_noise, poisson_noise, quantize, dither_ordered,
      dither_floyd_steinberg

    Each shader is a compute kernel that reads one pixel, applies math,
    writes one pixel. The WGSL infrastructure (bind groups, dispatch)
    already exists from the 17 existing shaders.
  acceptance_criteria:
    - WGSL compute shaders for all listed point/color/grading/effect ops
    - GpuFilter trait impl for each filter
    - GPU parity tests — GPU output matches CPU f32 output within epsilon
    - Web UI GPU path uses new shaders when WebGPU available
    - CPU fallback still works when WebGPU unavailable
  out_of_scope: |
    Neighborhood/kernel-based shaders (blur, sharpen, morphology — separate track).
    Complex algorithmic ops (seam carving, connected components — CPU only).
  technical_notes: |
    Template for a point op shader:

    @group(0) @binding(0) var<storage, read> input: array<vec4<f32>>;
    @group(0) @binding(1) var<storage, read_write> output: array<vec4<f32>>;
    @group(0) @binding(2) var<uniform> params: Params;

    @compute @workgroup_size(256)
    fn main(@builtin(global_invocation_id) gid: vec3<u32>) {
        let idx = gid.x;
        if (idx >= arrayLength(&input)) { return; }
        let pixel = input[idx];
        // ... apply transform ...
        output[idx] = vec4<f32>(result.rgb, pixel.a);
    }

    Batch approach: many point ops share the same shader structure.
    Consider a parameterized shader or shader template to avoid
    duplicating boilerplate.
