id: iir-gaussian-blur_20260330111948Z
title: Young/van Vliet IIR Gaussian Blur
type: feature
status: pending
created: 2026-03-30
updated: '2026-03-30'
spec:
  summary: 'Implement Young/van Vliet IIR gaussian blur with infinite support and O(1) per-pixel cost regardless of sigma.
    Wire into shadow_highlight to close the remaining GEGL parity gap (MAE 0.53). Reusable by 9 blur consumers.

    '
  context: 'The shadow_highlight filter achieves MAE=0.53 vs GEGL, with the remaining

    difference traced to FIR vs IIR gaussian blur. GEGL uses Young/van Vliet

    (YvV) IIR which has infinite support and exact gaussian frequency response.

    Our current blur infrastructure uses FIR (libblur for u8, separable kernel

    for f32) which truncates at 3-sigma.


    An IIR gaussian is also faster for large sigma: O(1) per pixel vs O(sigma)

    for FIR. This benefits retinex (sigma up to 250), shadow_highlight (radius

    up to 1500), and any future large-radius blur consumers.

    '
  codebase_analysis: 'CURRENT BLUR INFRASTRUCTURE:

    - blur() at filters.rs:661 — delegates to libblur (FIR, u8 only)

    - gaussian_blur_cv() at filters.rs:6569 — separable FIR, OpenCV-compatible

    - blur_1ch_f32() at filters.rs:6636 — separable FIR on f32 single-channel

    - gaussian_kernel_1d() at filters.rs:6606 — 1D FIR kernel generator

    - libblur crate does NOT support IIR


    CONSUMERS (9 direct callers):

    - shadow_highlight → blur_1ch_f32 (primary target, GEGL parity)

    - retinex_ssr/msr/msrcr → gaussian_blur_cv (3 callers, sigma up to 250)

    - clarity → blur (local contrast)

    - frequency_low/high → blur (frequency separation)

    - sharpen → blur (unsharp mask, small sigma)

    - charcoal → blur (optional pre-blur)


    NO existing IIR infrastructure in the codebase.

    '
  acceptance_criteria:
  - Young/van Vliet IIR gaussian implemented as gaussian_blur_iir_1ch_f32()
  - Matches true gaussian within 1e-4 relative error for sigma 1-500
  - O(1) per pixel (4 forward + 4 backward coefficients, independent of sigma)
  - Wire into blur_1ch_f32 as the default path (replaces FIR separable)
  - shadow_highlight GEGL parity MAE < 0.5 (down from 0.53)
  - Unit test comparing IIR vs FIR output at sigma=1, 10, 50, 100
  - GEGL parity test passes with tighter threshold
  - No regression in existing blur-dependent tests
  out_of_scope: 'Replacing libblur for u8 blur() — that''s a separate optimization.

    Multi-channel IIR (could be added later, this track does single-channel f32).

    Deriche IIR (Young/van Vliet is sufficient and simpler to implement).

    '
  technical_notes: "YOUNG/VAN VLIET IIR GAUSSIAN:\nReference: I.T. Young, L.J. van Vliet, \"Recursive implementation of the\n\
    Gaussian filter\" Signal Processing 44 (1995) 139-151.\n\nAlgorithm:\n1. Compute 4 causal coefficients (b0, b1, b2, b3)\
    \ and scale factor from sigma\n2. Forward pass (causal): y[n] = b0*x[n] + b1*y[n-1] + b2*y[n-2] + b3*y[n-3]\n3. Backward\
    \ pass (anti-causal): same coefficients, reverse direction\n4. Apply horizontally, then vertically (separable)\n\nCoefficient\
    \ computation (van Vliet 1998 improved):\n  q = 0.98711*sigma - 0.96330 (sigma >= 2.5)\n  q = 3.97156 - 4.14554*sqrt(1-0.26891*sigma)\
    \ (0.5 <= sigma < 2.5)\n  b0 = 1.57825 + 2.44413*q + 1.4281*q^2 + 0.422205*q^3\n  b1 = (2.44413*q + 2.85619*q^2 + 1.26661*q^3)\
    \ / b0\n  b2 = -(1.4281*q^2 + 1.26661*q^3) / b0\n  b3 = 0.422205*q^3 / b0\n  B = 1 - (b1 + b2 + b3)\n\nBoundary handling:\
    \ replicate edge pixels (matches GEGL abyss-policy=1).\n\nThe 1D IIR filter is applied as two separable passes (H then\
    \ V),\neach consisting of forward + backward scans. Total: 4 linear scans\nper dimension = 8 scans total, each O(n).\n"
