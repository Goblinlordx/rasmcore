id: jpeg-llm-dct-matched-pair_20260329010909Z
title: JPEG LL&M DCT Matched Pair — Forward + Inverse from libjpeg-turbo
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: Port both forward (jfdctint.c) and inverse (jidctint.c) DCT from libjpeg-turbo as a matched pair. Switch quantization
    to Q*8 convention. Remove trellis 64x compensation. Eliminates all DCT rounding divergence vs mozjpeg.
  context: Current forward DCT uses a direct matrix multiply (O(N^3)) with 14-bit cosine table. The inverse DCT is ported
    from zune-jpeg. These form an imprecise pair — the forward has different rounding from libjpeg-turbo's LL&M butterfly,
    causing ±1-2 coefficient differences that accumulate to ~2dB quality gap on some content. To achieve bit-exact mozjpeg
    parity, both forward and inverse must be from the same algorithm family (LL&M) with matched precision constants (CONST_BITS=13,
    PASS1_BITS=2).
  codebase_analysis: 'dct.rs forward_dct(): matrix multiply, 14-bit table, output normalized (DC = mean*8). dct.rs inverse_dct():
    zune-jpeg port, expects standard-scaled input. quantize.rs quantize(): divides by Q (not Q*8). trellis.rs: uses DCT_SCALE_COMPENSATION
    = 64.0 to compensate for normalized DCT output vs mozjpeg''s 8x-scaled output. Previous attempt failed because: (1) LL&M
    forward was ported but inverse was kept as zune-jpeg — mismatched pair. (2) Quantize was changed to Q*8 but decoder dequantize
    still used Q — values correct but rounding paths diverged. The fix: port BOTH forward and inverse from libjpeg-turbo jfdctint.c/jidctint.c.'
  acceptance_criteria:
  - Forward DCT uses LL&M from jfdctint.c (CONST_BITS=13, PASS1_BITS=2)
  - Inverse DCT uses LL&M from jidctint.c (matched pair)
  - Forward+inverse roundtrip error <= 1 for all 8-bit pixel values
  - Quantization uses Q*8 divisor (libjpeg convention)
  - Trellis DCT_SCALE_COMPENSATION removed (natural 8x scale)
  - Encode-decode PSNR >= 25dB at Q90 for all content types
  - Image crate and mozjpeg can decode our output correctly
  - Quality ratio vs mozjpeg >= 0.98 at Q50-Q95 across all content types
  - All existing lib and parity tests pass
  out_of_scope: SIMD DCT optimization (separate track). Float DCT. Progressive scan optimization.
  technical_notes: 'Approach: (1) Port jfdctint.c forward DCT (LL&M, CONST_BITS=13, PASS1_BITS=2). Output scaled by 8. (2)
    Port jidctint.c inverse DCT (LL&M matched inverse, same constants). Input is dequantized coefficients (Q*coeff). The jidctint
    IDCT includes the 8x descaling and +128 level shift internally. (3) Change quantize() to divide by Q*8. (4) Change dequantize()
    to multiply by Q (unchanged — the IDCT handles the 8x). (5) Remove trellis DCT_SCALE_COMPENSATION (64x factor no longer
    needed). (6) The encoder IDCT (inverse_dct) and decoder IDCT (inverse_dct) become the same function — matched pair. Key
    files: dct.rs (forward + inverse), quantize.rs (Q*8), trellis.rs (remove compensation), decode.rs (uses same inverse_dct).'
