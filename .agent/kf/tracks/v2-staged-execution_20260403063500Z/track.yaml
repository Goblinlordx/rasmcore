id: v2-staged-execution_20260403063500Z
title: V2 staged execution — analysis-driven graph with typed parameter binding
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: 'Multi-stage pipeline execution where analysis nodes produce typed

    parameters that feed into downstream pixel nodes. The pipeline

    validates bindings against node parameter schemas before execution.

    '
  context: 'Problem: some operations depend on data-computed parameters.

    Smart crop: analyze image content → determine best crop rect → crop.

    Auto-exposure: analyze histogram → compute EV adjustment → apply.

    Face-aware liquify: detect face landmarks → parameterize warp.


    The crop rect is unknown until analysis runs. But a static graph

    needs all node parameters resolved before pixel execution begins

    (nodes must report correct info() dimensions for demand propagation).


    Solution: staged execution with typed parameter binding.

    Stage 1: run analysis subgraph → produces typed AnalysisResult

    Stage 2: bind results to downstream node params (validated against schema)

    Stage 3: run pixel graph with all parameters resolved


    The graph is immutable during pixel execution. Parameter resolution

    happens between stages. This preserves the clean demand-driven pull

    model.


    Key requirement: the binding system must be TYPE-SAFE. An analysis

    node declares what type of result it produces (Rect, f32, Vec<Point2D>,

    etc.). A downstream node declares what type each of its parameters

    expects. The pipeline validates that the binding types match before

    execution — no runtime type errors during pixel dispatch.

    '
  codebase_analysis: 'V2 pipeline foundation (rasmcore-pipeline-v2):

    - Node trait: fn compute(request, upstream) -> Vec<f32>

    - NodeInfo: width, height, color_space

    - Graph: add_node, request_region, request_tiled

    - Upstream trait: request(id, rect) + info(id)


    V2 registration system (future):

    - ParamDescriptor: name, type, min, max, default

    - OperationRegistration: metadata + param descriptors

    - Param schema is known at registration time


    Current V1 analysis patterns:

    - smart_crop.rs: computes crop rect, returns DecodedImage (pixel data)

    - harris_corners.rs: returns Vec<Point2D>

    - connected_components.rs: returns labeled image

    - histogram: returns channel histograms

    These all currently run as regular filters and return their results

    embedded in pixel data or as side-channel outputs. No formal

    analysis→param binding exists.


    Professional tool patterns:

    - Nuke: _validate pass resolves dimensions top-down before engine pass

    - Resolve: analysis nodes (face detect, scene detect) run in a pre-pass

    - After Effects: expressions can reference analysis results from other layers

    '
  acceptance_criteria:
  - AnalysisNode trait — produces typed AnalysisResult, not pixels
  - AnalysisResult enum with typed variants (Rect, Scalar, PointCloud, Histogram, Custom)
  - ParamBinding — maps analysis output to a specific param of a specific node
  - Type validation — binding rejected if analysis output type != param expected type
  - Schema validation — bound param values checked against param constraints (min/max/bounds)
  - StagedPipeline — orchestrates analysis stage → bind → pixel stage
  - Cached intermediate — pixel data computed during analysis is cached for the pixel stage
  - Analysis nodes can also declare GPU shaders for acceleration
  - Smart crop example — end-to-end: analyze → bind crop_rect → crop → encode
  - Auto-exposure example — analyze histogram → bind ev_adjustment → apply exposure
  out_of_scope: 'Iterative/convergent analysis (multiple analysis passes that refine each other).

    Dynamic graph topology (adding/removing nodes between stages).

    Real-time analysis feedback (interactive preview during analysis).

    '
  technical_notes: "DESIGN: Typed Parameter Binding\n\n1. ANALYSIS RESULT — typed output from analysis nodes:\n\n   enum AnalysisResult\
    \ {\n       Rect(Rect),                    // crop region, ROI\n       Scalar(f32),                   // exposure value,\
    \ threshold\n       ScalarVec(Vec<f32>),           // histogram, per-channel values\n       Points(Vec<(f32, f32)>), \
    \      // landmarks, corners, keypoints\n       Matrix([f64; 6]),              // detected transform (homography)\n  \
    \     Custom(String, Vec<u8>),       // extensible: type tag + serialized data\n   }\n\n2. ANALYSIS NODE — trait for nodes\
    \ that produce params, not pixels:\n\n   trait AnalysisNode: Node {\n       fn result_type(&self) -> AnalysisResultType;\n\
    \       fn analyze(&self, input: &[f32], w: u32, h: u32) -> AnalysisResult;\n   }\n\n   // AnalysisNode also implements\
    \ Node so it can participate in the\n   // graph for input data. Its compute() returns analysis visualization\n   // (optional).\
    \ Its analyze() returns the typed result.\n\n3. PARAM BINDING — typed link from analysis output to node param:\n\n   struct\
    \ ParamBinding {\n       /// Which analysis node produces the value\n       source_node: u32,\n       /// Which pixel\
    \ node consumes the value\n       target_node: u32,\n       /// Which parameter on the target node\n       target_param:\
    \ String,\n       /// Optional transform: map analysis result to param value\n       /// e.g., Rect → (x: u32, y: u32,\
    \ w: u32, h: u32) decomposition\n       transform: Option<BindingTransform>,\n   }\n\n   enum BindingTransform {\n   \
    \    /// Use the analysis result directly (type must match param)\n       Identity,\n       /// Extract a field from a\
    \ composite result\n       Field(String),  // e.g., \"x\" from Rect\n       /// Apply a function (e.g., clamp, scale,\
    \ offset)\n       Map(Box<dyn Fn(&AnalysisResult) -> ParamValue>),\n   }\n\n4. VALIDATION — before execution:\n\n   fn\
    \ validate_binding(binding: &ParamBinding, graph: &Graph) -> Result<()> {\n       let source = graph.analysis_node(binding.source_node)?;\n\
    \       let target_reg = graph.node_registration(binding.target_node)?;\n       let param_desc = target_reg.param(binding.target_param)?;\n\
    \n       // Type check: analysis output type compatible with param type\n       check_type_compat(source.result_type(),\
    \ param_desc.value_type)?;\n\n       // After analysis runs, also validate value constraints:\n       // param_desc.min\
    \ <= value <= param_desc.max\n       // Rect within source dimensions\n       // etc.\n   }\n\n5. STAGED PIPELINE — execution\
    \ orchestration:\n\n   struct StagedPipeline {\n       graph: Graph,\n       bindings: Vec<ParamBinding>,\n   }\n\n  \
    \ impl StagedPipeline {\n       fn execute(&mut self, sink_node: u32) -> Result<Vec<f32>> {\n           // Stage 1: validate\
    \ all bindings (type check)\n           self.validate_bindings()?;\n\n           // Stage 2: run analysis nodes\n    \
    \       let results = self.run_analysis()?;\n\n           // Stage 3: bind results to params (value validation)\n    \
    \       self.apply_bindings(&results)?;\n\n           // Stage 4: run pixel graph (all params resolved)\n           self.graph.request_full(sink_node)\n\
    \       }\n   }\n\n6. CACHING — analysis shares upstream data with pixel stage:\n\n   The analysis node pulls upstream\
    \ pixel data via the normal\n   graph.request_region(). This data gets cached in the spatial cache.\n   When the pixel\
    \ stage runs and requests the same upstream region,\n   it hits the cache — no redundant decode/compute.\n\n7. SMART CROP\
    \ EXAMPLE:\n\n   // Build graph\n   let source = graph.add_node(decode_node);\n   let analyzer = graph.add_analysis_node(SmartCropAnalyzer\
    \ { ... });\n   let crop = graph.add_node(CropNode::deferred(source));  // params TBD\n   let encode = graph.add_node(encode_node);\n\
    \n   // Bind analysis output → crop params\n   pipeline.bind(ParamBinding {\n       source_node: analyzer,\n       target_node:\
    \ crop,\n       target_param: \"crop_rect\".into(),\n       transform: None,  // SmartCropAnalyzer returns Rect, CropNode\
    \ expects Rect\n   });\n\n   // Execute: analyze → resolve crop_rect → run pixel pipeline\n   let output = pipeline.execute(encode)?;\n"
