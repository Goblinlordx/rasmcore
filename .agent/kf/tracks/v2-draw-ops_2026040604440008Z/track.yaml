spec:
  summary: |
    Port draw_line/rect/circle/ellipse/arc/polygon/text/text_ttf. GPU via compute shader rasterization and distance fields.
  context: |
    GPU-first implementation (WGSL compute shaders primary).
    SIMD-optimized CPU fallback (production quality, not throwaway).
    From V1-V2 filter gap analysis: these filters existed in V1 but
    were not ported to V2 during the pipeline rewrite.
  acceptance_criteria:
    - All filters registered in V2 registry with proper params
    - GPU shader (gpu_shader_body) implemented for each filter
    - CPU fallback with SIMD-friendly loop patterns
    - Docs playground renders each filter correctly
    - Param annotations complete (min, max, step, default)
  out_of_scope: |
    Parity validation against reference tools (separate track)
  technical_notes: |
    Filters: draw_line, draw_rect, draw_circle, draw_ellipse, draw_arc, draw_polygon, draw_text, draw_text_ttf
    Each filter implements the V2 Filter trait with gpu_shader_body()
    and compute(). Use derive(V2Filter) macro for registration.
