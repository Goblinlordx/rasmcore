id: webp-bpred-mode_20260329080001Z
title: VP8 Encoder B_PRED — Per-4x4 Block Intra Prediction
type: feature
status: pending
created: 2026-03-29
updated: '2026-03-28'
spec:
  summary: 'Add B_PRED (4x4 intra prediction) mode to the VP8 encoder. This is the

    dominant quality gap vs cwebp, worth ~10-15 dB for gradient/texture content.

    '
  context: "The VP8 spec defines two luma prediction approaches for keyframes:\n1. I16x16 modes (DC, V, H, TM) — one mode\
    \ for the entire 16x16 macroblock\n2. B_PRED mode — each of the 16 4x4 sub-blocks gets its own prediction\n   mode from\
    \ 10 options (DC, TM, V, H, LD, RD, VR, VL, HD, HU)\n\nOur encoder only uses I16x16 modes. cwebp uses B_PRED extensively\
    \ for\nnon-uniform content like gradients and textures. For a 256x256 gradient,\ncwebp without segmentation or loop filter\
    \ achieves 42.4 dB vs our 27.4 dB.\nThe 15 dB gap is primarily from B_PRED enabling per-block adaptation.\n\nB_PRED allows\
    \ diagonal modes (LD, RD, VR, VL, HD, HU) that can track\nlocal gradient directions within each 4x4 block. I16x16 modes\
    \ apply a\nsingle direction to all 256 pixels, losing within-MB variation.\n"
  codebase_analysis: "ALREADY IMPLEMENTED (predict.rs):\n- Intra4Mode enum with all 10 modes (lines 30-47)\n- predict_4x4()\
    \ function with all 10 mode implementations (lines 190-375)\n- select_best_4x4() SAD-based mode selection (lines 578-598)\n\
    - MacroblockInfo.b_modes: [u8; 16] storage (block.rs line 19)\n- Token encode_block() supports plane_type=3 (Y-with-DC)\
    \ (token.rs)\n\nNEEDS IMPLEMENTATION:\n1. KF_BMODE_PROB context table — 10x10x9 probability array for encoding\n   sub-block\
    \ modes. Each mode is encoded via a 9-node tree, with\n   probabilities depending on the top and left neighbor modes.\n\
    \   Source: libvpx vp8/common/entropy.c kf_bmode_prob[10][10][9]\n\n2. encode_bpred_modes() in bitstream.rs — encode 16\
    \ sub-block modes\n   into the first partition using context-dependent tree traversal.\n   Tree: [-B_DC_PRED, 2, -B_TM_PRED,\
    \ 4, -B_VE_PRED, 6, 8, 12,\n          -B_HE_PRED, 10, -B_RD_PRED, -B_VR_PRED, -B_LD_PRED, 14,\n          -B_VL_PRED, 16,\
    \ -B_HD_PRED, -B_HU_PRED]\n\n3. B_PRED path in encode_macroblock():\n   - Select best mode per 4x4 block using select_best_4x4()\n\
    \   - Compare total B_PRED SAD vs best I16x16 SAD to decide\n   - If B_PRED wins: encode with plane_type=3 (DC stays in\
    \ block)\n   - No Y2 WHT block for B_PRED MBs\n   - Chroma still uses 8x8 prediction (unchanged)\n\n4. B_PRED path in\
    \ reconstruct_macroblock():\n   - Per-4x4 prediction using stored b_modes\n   - Forward DCT + quantize all 16 coefficients\
    \ (including DC at pos 0)\n   - No WHT path\n   - Dequantize + inverse DCT per block\n\n5. Complexity context for B_PRED:\n\
    \   - Y2 context (top[0], left[0]) is NOT updated for B_PRED MBs\n   - Y block contexts use the same top[1..5]/left[1..5]\
    \ tracking\n   - Decoder check (vp8.rs read_residual_data): plane=3 when luma_mode==B\n\nKey decoder reference (image-webp\
    \ vp8.rs):\n- read_macroblock_header: when luma=B, reads 16 sub-block modes from\n  KEYFRAME_BPRED_MODE_NODES[top][left]\
    \ (context-dependent)\n- read_residual_data: when luma=B, uses plane=3 and skips Y2 block\n"
  acceptance_criteria:
  - B_PRED mode selectable per macroblock (compared against I16x16 SAD)
  - 16 sub-block modes encoded with context-dependent probabilities
  - Coefficients use plane_type=3 (Y-with-DC, DC at position 0)
  - No Y2 WHT block for B_PRED macroblocks
  - PSNR improves by at least 8 dB for 256x256 gradient at q75
  - Gradient PSNR at q75 exceeds 35 dB
  - All sizes decode with dwebp and image-webp
  - B_PRED selected for gradient content, I16x16 for solid content
  - Deterministic encoding
  - WASM SIMD tests pass
  - All existing unit tests pass
  out_of_scope: '- Rate-distortion optimized mode selection (use SAD for now)

    - Segmentation / adaptive QP

    - Loop filter integration (separate track)

    - 4x4 sub-block transform size optimization

    '
  technical_notes: "Implementation phases:\n\nPhase 1 — Mode encoding infrastructure:\nAdd KF_BMODE_PROB[10][10][9] table\
    \ to tables.rs. This is the context-\ndependent probability table indexed by [top_mode][left_mode][tree_node].\nSource:\
    \ libvpx vp8/common/entropy.c, BSD-3-Clause.\n\nAdd the B_PRED sub-mode tree: 9 internal nodes mapping to 10 leaf modes.\n\
    Add encode_bpred_modes() to bitstream.rs that encodes 16 modes using\nthe tree with context from top/left neighbor modes.\n\
    \nPhase 2 — Encode path:\nModify encode_macroblock to support B_PRED:\n1. Try I16x16 modes (existing) — compute best SAD\n\
    2. Try B_PRED: for each 4x4 block, select_best_4x4() with neighbors\n   from reconstructed frame. Sum all 16 per-block\
    \ SADs.\n3. If B_PRED total SAD < I16x16 best SAD: use B_PRED\n4. For B_PRED: encode each block with plane_type=3, no\
    \ Y2 block\n\nFor getting 4x4 block neighbors: need above-right pixels (from recon\nframe or from previously reconstructed\
    \ blocks within the same MB).\nProcess blocks in raster order: blocks in row 0 use top MB's bottom\npixels; blocks in\
    \ column 0 use left MB's right pixels.\n\nPhase 3 — Reconstruct path:\nAdd B_PRED variant to reconstruct_macroblock:\n\
    - For each 4x4 block: predict_4x4() with stored mode\n- Forward DCT of full 16 coefficients\n- Quantize with Y_AC quantizer\
    \ (DC at pos 0 uses DC step, not Y2)\n- Dequantize + inverse DCT\n- No WHT path\n\nPhase 4 — Context tracking:\nFor B_PRED\
    \ MBs in the token partition:\n- Skip Y2 block (top[0] and left[0] contexts set to 0)\n- Y blocks use plane=3, context\
    \ from top[1..5]/left[1..5] as before\n- Sub-block mode context: track last mode per column (top) and row (left)\n  for\
    \ the FIRST PARTITION mode encoding (not token partition)\n"
