id: v2-wit-adapter_20260404170900Z
title: "Wire WIT adapter to V2 pipeline — fix web UI"
type: bug
status: pending
created: "2026-04-04"
updated: "2026-04-04"
spec:
  summary: >
    Wire WIT adapter to V2 pipeline. Web UI broken because V1 decode now
    produces f32 but V1 resize/encode only handle u8/u16.
  context: |
    The web UI calls WIT functions (read, resize, writePng, filters) via
    adapter/pipeline_adapter.rs which wraps V1 NodeGraph. After V2 codec
    migration, V1 decode produces f32 pixels but V1 resize (fast_image_resize)
    and V1 PNG encoder only handle u8/u16. Error: "resize from Rgba32f not
    supported by SIMD backend".
  codebase_analysis: |
    - adapter/pipeline_adapter.rs: PipelineResource wraps V1 NodeGraph
    - V1 resize: domain/transform/resize.rs - missing F32x4 pixel type mapping
    - V1 sink: domain/pipeline/nodes/sink.rs - no f32->u8 quantize before encode
    - fast_image_resize 5.5.0 already supports PixelType::F32x4
    - V2 codecs-v2 encoders handle f32->sRGB->u8 quantization internally
  acceptance_criteria:
    - Web UI loads images without error
    - Web UI applies filters and renders preview
    - writePng works end-to-end on f32 pixel data
    - Resize works on f32 data
    - Error messages in preview-worker are human-readable
  out_of_scope: |
    Full V1 removal. Porting remaining V1 filters. GPU dispatch.
  technical_notes: |
    Phase 1 (immediate fix): Patch V1 resize to map Rgba32f->F32x4 in
    fast_image_resize (already supported). Add f32->u8 quantize step in
    V1 sink before calling format encoders. This unblocks web UI immediately.

    Phase 2+ (V2 adapter): Wire PipelineResource to use V2 Graph for the
    full read->process->write cycle. V2 codecs handle f32 natively.
plan:
