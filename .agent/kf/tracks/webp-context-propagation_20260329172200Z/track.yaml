    done: true
  - text: Thread NZ context into PickBestIntra16 (for trellis + dc_nz cost)
    done: true
  - text: Thread NZ context into PickBestIntra4 and PickBestUV
    done: true
- phase: Context Update
  tasks:
  - text: Update top_ctx/left_ctx in Pass 1 loop after each MB (mirror Pass 2 logic)
    done: true
