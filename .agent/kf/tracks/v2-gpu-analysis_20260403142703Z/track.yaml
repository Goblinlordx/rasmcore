id: v2-gpu-analysis_20260403142703Z
title: V2 GPU — multi-pass analysis filters (histogram, CLAHE, NLM, retinex, frequency)
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: 'Add GPU implementations for all analysis-dependent and multi-pass

    filters. These require GPU parallel reduction, multi-dispatch chains,

    or workgroup-level computation. The most complex GPU work.

    '
  context: 'These filters need multiple GPU passes or global image analysis:

    - Histogram-based: compute histogram → derive LUT → apply

    - Frequency: decompose → process bands → reconstruct

    - Non-local: search neighborhoods across large regions

    - Multi-scale: pyramids or iterative refinement


    All are implementable on GPU but require careful multi-pass design.

    The V2 graph executor supports chained dispatches via Vec<GpuShader>.

    '
  codebase_analysis: "Enhancement filters needing multi-pass GPU (14):\n- AutoLevel — histogram → min/max → stretch LUT →\
    \ apply (3 passes)\n- Equalize — histogram → CDF → equalization LUT → apply (3 passes)\n- Normalize — find min/max → stretch\
    \ (2 passes)\n- Clahe — tiled histograms → tiled equalization (many passes)\n- ShadowHighlight — luminance blur + per-pixel\
    \ curve (2+ passes)\n- Dehaze — dark channel min filter → atmosphere estimate → apply (3 passes)\n- NlmDenoise — non-local\
    \ means search (massively parallel but compute-heavy)\n- FrequencyLow, FrequencyHigh — gaussian decomposition (separable\
    \ blur)\n- Clarity — local contrast enhancement (blur + blend)\n- PyramidDetailRemap — Laplacian pyramid (multi-scale,\
    \ many passes)\n- RetinexSsr, RetinexMsr, RetinexMsrcr — multi-scale gaussian + log (multi-pass)\n\nColor filters needing\
    \ special GPU handling (3):\n- KmeansQuantize — GPU k-means clustering (iterative)\n- DitherFloydSteinberg — sequential\
    \ error diffusion (use ordered dither on GPU)\n- LabSharpen — Lab conversion + sharpen + convert back (3 passes)\n\nGPU\
    \ histogram pattern (parallel reduction):\n  Pass 1: Each workgroup computes local histogram in shared memory\n  Pass\
    \ 2: Reduce workgroup histograms to global histogram\n  Pass 3: Compute CDF/LUT from global histogram\n  Pass 4: Apply\
    \ LUT per pixel\n"
  acceptance_criteria:
  - GpuFilter for AutoLevel, Equalize, Normalize (histogram-based, multi-pass)
  - GpuFilter for Clahe (tiled histogram equalization)
  - GpuFilter for ShadowHighlight (luminance blur + curve)
  - GpuFilter for Dehaze (dark channel + atmosphere)
  - GpuFilter for NlmDenoise (non-local means search)
  - GpuFilter for FrequencyLow, FrequencyHigh (separable decomposition)
  - GpuFilter for Clarity (local contrast)
  - GpuFilter for PyramidDetailRemap (Laplacian pyramid)
  - GpuFilter for RetinexSsr, RetinexMsr, RetinexMsrcr
  - GpuFilter for KmeansQuantize (GPU k-means or palette lookup)
  - GpuFilter for DitherFloydSteinberg (ordered dither approximation on GPU)
  - GpuFilter for LabSharpen (Lab convert + sharpen + convert back)
  - Multi-pass filters return Vec<GpuShader> for chained execution
  - All GPU outputs match CPU within reasonable tolerance (some analysis ops may have minor differences due to reduction order)
  - CPU Filter::compute remains as fallback
  out_of_scope: 'Per-pixel (Track 1). Spatial (Track 2). Distortion (Track 3).

    Full GPU FFT implementation (use separable gaussian instead for frequency filters).

    '
  technical_notes: "GPU histogram parallel reduction:\n  // Workgroup-local histogram (256 bins per workgroup)\n  var<workgroup>\
    \ local_hist: array<atomic<u32>, 256>;\n\n  @compute @workgroup_size(256, 1, 1)\n  fn histogram_pass(@builtin(global_invocation_id)\
    \ gid: vec3<u32>,\n                    @builtin(local_invocation_id) lid: vec3<u32>) {\n      // Initialize\n      atomicStore(&local_hist[lid.x],\
    \ 0u);\n      workgroupBarrier();\n      // Accumulate\n      let luma = dot(load_pixel(gid.x).rgb, vec3(0.2126, 0.7152,\
    \ 0.0722));\n      let bin = u32(clamp(luma * 255.0, 0.0, 255.0));\n      atomicAdd(&local_hist[bin], 1u);\n      workgroupBarrier();\n\
    \      // Write to global histogram buffer\n      atomicAdd(&global_hist[lid.x], atomicLoad(&local_hist[lid.x]));\n  }\n\
    \nNLM Denoise GPU:\n  Each output pixel independently searches its search window,\n  computes patch distances, and accumulates\
    \ weighted average.\n  This is O(search_radius^2 * patch_radius^2) per pixel but\n  each pixel is independent — perfect\
    \ for GPU parallelism.\n  May need multiple dispatches for very large search windows.\n\nMulti-pass chaining:\n  GpuFilter\
    \ trait allows returning multiple GpuShader instances.\n  The executor chains them via ping-pong buffers.\n  Analysis\
    \ results (histograms, statistics) stored in extra_buffers\n  between passes.\n"
