id: param-mapper-bridge_20260402075329Z
title: Analysis-to-params mapper bridge with two-pass pipeline orchestration
type: feature
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: 'Add a two-pass pipeline orchestration pattern where analysis results

    from pass 1 are mapped to node params for pass 2. Nodes are declared

    statically; only param values are computed at runtime. Layer cache

    is preserved across passes (no pruning between runs).

    '
  context: 'The composite/sub-graph node system can execute internal pipelines,

    but there is no mechanism to feed analysis results (auto-crop rect,

    auto-levels values) back into processing node configs. This requires

    two full pipeline executions:


    Pass 1: full execution through analysis sink -> AnalysisResult

    Mapper: pure function mapping AnalysisResult -> processing node config

    Pass 2: full execution with configured processing nodes


    The graph topology is static in both passes. Only param values change.

    Layer cache must persist between passes so shared upstream nodes

    are not recomputed.

    '
  codebase_analysis: "Existing infrastructure:\n- SubGraphNode, AnalysisSink, AnalysisResult in pipeline/nodes/subgraph.rs\n\
    - LayerCache in rasmcore-pipeline/src/layer_cache.rs with\n  store(), mark_referenced(), reset_references(), cleanup_unreferenced()\n\
    - finalize_layer_cache() in graph.rs does: reset refs -> mark -> cleanup\n- Layer cache is Rc<RefCell<LayerCache>> shared\
    \ across pipeline runs\n\nGap: finalize_layer_cache() prunes after each run. Between analysis\nand processing runs, cached\
    \ upstream nodes would be evicted.\n\nFix: add store_to_layer_cache() that pushes computed nodes without\npruning. The\
    \ final run calls normal finalize_layer_cache().\n\nParamMapper trait: pure function AnalysisResult -> Box<dyn Any>.\n\
    Built-in mappers: LevelsToCurves, CropRectToCrop, etc.\n\nOrchestrator: AnalyzeAndProcess struct that holds analysis pipeline\n\
    definition + mapper + processing pipeline builder.\n\nFiles to modify:\n- crates/rasmcore-image/src/domain/pipeline/graph.rs\
    \ (add store-only finalization)\n- crates/rasmcore-image/src/domain/pipeline/nodes/subgraph.rs (add ParamMapper + orchestrator)\n"
  acceptance_criteria:
  - ParamMapper trait maps AnalysisResult to typed config
  - Two-pass orchestrator executes analysis then processing
  - Layer cache preserved between passes (no pruning until final pass)
  - Built-in CropRectToCrop mapper (AnalysisResult::CropRect -> crop params)
  - Built-in LevelsToLevels mapper (AnalysisResult::Levels -> levels params)
  - End-to-end test with auto-levels analysis feeding into levels adjustment
  - Cache hit verification in pass 2 for shared upstream nodes
  out_of_scope: 'Plugin-defined mappers (future plugin system concern).

    Incremental/streaming analysis (requires architecture changes).

    '
  technical_notes: "The two-pass pattern is an orchestration concern, not a graph concern.\nThe graph stays static and simple.\
    \ The orchestrator controls:\n1. When to execute\n2. When to store cache (without pruning)\n3. When to finalize cache\
    \ (with pruning)\n\nNew graph method needed:\n  pub fn store_layer_cache_no_prune(&mut self)\nSame as finalize_layer_cache\
    \ but skips reset_references + cleanup.\nJust pushes computed node outputs to cache for the next run to find.\n\nParamMapper\
    \ is generic over output type:\n  trait ParamMapper { type Output; fn map(&self, r: &AnalysisResult) -> Self::Output;\
    \ }\n\nOrchestrator struct:\n  struct AnalyzeAndProcess<M: ParamMapper> {\n      analysis_builder: Box<dyn Fn(&LayerCache)\
    \ -> (NodeGraph, u32)>,\n      mapper: M,\n      process_builder: Box<dyn Fn(M::Output, &LayerCache) -> (NodeGraph, u32)>,\n\
    \  }\n"
