    done: true
  - text: Add color_space_to_cicp() mapping function in png.rs returning (primaries, transfer, matrix, range) tuple
    done: true
- phase: Core Implementation
  tasks:
  - text: Implement write_cicp_chunk() following existing iCCP chunk insertion pattern
    done: true
  - text: Implement write_srgb_chunk() with configurable rendering intent
    done: true
  - text: Wire chunk insertion into encode() based on ImageInfo.color_space
    done: true
  - text: Add mutual exclusion logic — skip iCCP when cICP is written, skip sRGB when cICP is written
    done: true
- phase: Testing
  tasks:
  - text: Unit tests for cICP chunk bytes for each ColorSpace variant
    done: true
  - text: Unit test for sRGB chunk with each rendering intent
    done: true
