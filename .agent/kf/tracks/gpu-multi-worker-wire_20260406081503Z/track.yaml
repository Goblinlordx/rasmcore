id: gpu-multi-worker-wire_20260406081503Z
title: Wire multi-output GPU pipeline in preview worker
type: feature
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: 'Replace processChain + processScope with single execute() path in the

    preview worker. Builds DAG with ref/branch/addDisplay, executes once,

    all displays update from shared GPU computation.

    '
  context: 'Currently the preview worker has two separate code paths:

    - processChain() — runs the filter chain and displays the viewport

    - processScope() — re-runs the entire chain, appends scope filter, PNG


    With the multi-output infrastructure (graph refs, multi-display handler,

    multi-GPU plan), these merge into one: build the DAG with refs and

    branches, attach display targets, execute once.


    Even without GPU scope shaders, the chain is computed only once.

    Scopes read from the cached ref result (CPU readback from the shared

    GPU buffer, or from the layer cache). This eliminates the 3x chain

    re-execution that currently dominates scope render time.

    '
  codebase_analysis: "v2-preview-worker.ts:\n- processChain() builds pipeline, applies chain, GPU dispatch or CPU\n- processScope()\
    \ builds fresh pipeline, re-applies entire chain (!),\n  appends scope filter, renders to PNG\n- Both called separately\
    \ from main thread (App.tsx schedulePreview)\n\nusePreviewWorker.ts:\n- processChain(chain) and processScope(chain, scopeName)\
    \ as separate\n- scopeCanvasRef for scope display\n\nApp.tsx:\n- schedulePreview calls both processChain and processScope\n\
    - handleScopeChange triggers processScope independently\n\nNew flow:\n- Single processMulti(chain, scopes[]) message\n\
    - Worker builds DAG: chain → ref(\"main\") → branch per scope\n- addDisplay for viewport + each scope canvas\n- execute()\
    \ → all compute + all blits in one submit\n- Scope canvases transferred as OffscreenCanvas to worker\n"
  acceptance_criteria:
  - processMulti(chain, scopeNames, displayTargets) replaces dual calls
  - Single chain execution serves viewport + all scopes
  - Scope canvases registered as display targets in GpuHandler
  - GPU path uses executeMulti — one submit for compute + all blits
  - CPU fallback path still works (scopes read from cached chain result)
  - schedulePreview sends one message instead of two
  - Scope panel updates at same rate as viewport (not delayed)
  - No regression in viewport display quality or timing
  out_of_scope: 'GPU scope shaders (histogram/waveform as WGSL compute).

    That is a future optimization on top of this infrastructure.

    '
  technical_notes: "Worker message protocol:\n  { type: 'process-multi',\n    chain: Step[],\n    scopes: string[],      \
    \     // [\"scope_histogram\", \"scope_waveform\"]\n    displayTargets: string[] }  // [\"viewport\", \"histogram\", \"\
    waveform\"]\n\nWorker builds DAG:\n  let pipe = createPipeline(bytes)\n  for step in chain: pipe = pipe[method](config)\n\
    \  pipe = pipe.ref(\"main\")\n  for scope in scopes:\n    pipe = pipe.branch(\"main\")[scope]()\n\nDisplay registration:\n\
    \  Scope canvases transferred via init-scope-display message\n  (same pattern as init-display for viewport canvas)\n\n\
    CPU fallback:\n  If no GPU, execute chain once via CPU, cache result.\n  Then run each scope filter reading from cached\
    \ upstream.\n  Still only one chain execution — scopes read from cache.\n\nApp.tsx simplification:\n  schedulePreview()\
    \ sends one process-multi message.\n  handleScopeChange() sends process-multi with updated scope list.\n  No separate\
    \ processScope call needed.\n"
