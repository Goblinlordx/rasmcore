id: validate-pro-filters_20260330044600Z
title: Reference Parity Tests + Benchmarks for Pro Filters
type: chore
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Add reference parity tests (vs Python/OpenCV/ffmpeg) and criterion benchmarks for all 15 pro filters registered
    in register-filters-pro track.

    '
  context: '15 pro filters (color grading, tonemapping, content-aware) were registered in

    register-filters-pro_20260330041400Z but lack reference validation and benchmarks.

    These are high-value differentiators (ASC CDL, lift/gamma/gain, seam carving,

    smart crop) that need verified correctness against industry-standard tools.

    '
  codebase_analysis: "EXISTING TEST PATTERNS:\n- tests/filter_reference_parity.rs — Python venv (numpy, Pillow, opencv-python-headless)\n\
    \  for reference outputs, compared via MAE/PSNR. Uses run_python_ref() helper that\n  shells out to tests/fixtures/.venv/bin/python3.\n\
    - tests/reference_audit.rs — ImageMagick comparisons via ref_tools::magick_pipeline().\n  Skips gracefully if magick not\
    \ installed.\n- smart_crop.rs already has vips parity tests (vips_smartcrop_pixels helper).\n\nEXISTING BENCHMARK PATTERNS:\n\
    - benches/perf.rs — criterion groups with Throughput::Elements(pixel_count).\n  Tests 256, 512, 1024 image sizes. Uses\
    \ ref_tools::has_tool() for optional\n  comparison against external tools.\n- benches/ref_tools.rs — has_tool(), run_timed(),\
    \ magick_pipeline(), vips_pipeline()\n  helpers (212 lines).\n\nMETRIC HELPERS (already defined in test files):\n- mean_absolute_error(a,\
    \ b) -> f64\n- max_absolute_error(a, b) -> u8\n- psnr(a, b) -> f64\n\nFILTER IMPLEMENTATIONS TO VALIDATE:\nColor grading\
    \ (color_grading.rs):\n  asc_cdl — clamp01((in * slope + offset) ^ power), SOP per ITU-R BT.1886\n  lift_gamma_gain —\
    \ gain * (in + lift*(1-in)) ^ (1/gamma), DaVinci formula\n  split_toning — luminance-based shadow/highlight color blend\n\
    \  curves (master/r/g/b) — monotone cubic spline LUT via Fritsch-Carlson\n  film_grain — hash_noise with midtone emphasis,\
    \ deterministic per seed\nTonemapping (color_grading.rs):\n  tonemap_reinhard — L / (1 + L) per-channel\n  tonemap_drago\
    \ — log(1+L)/log(1+Lmax) with bias power\n  tonemap_filmic — Narkowicz ACES: (x*(a*x+b))/(x*(c*x+d)+e)\nContent-aware\
    \ (smart_crop.rs, content_aware.rs):\n  smart_crop — entropy/attention crop (already has some vips tests)\n  seam_carve_width/height\
    \ — Avidan-Shamir DP seam removal\n  selective_color — HSL hue-range selection + shift/sat/light adjustment\n"
  acceptance_criteria:
  - Each of the 15 pro filters has at least one reference parity test
  - Color grading filters (asc_cdl, lgg, curves) achieve MAE < 0.5 vs Python reference
  - Tonemapping filters achieve MAE < 1.0 vs Python reference (float precision variance)
  - Content-aware filters achieve PSNR >= 25dB or pass visual regression test
  - Film grain is deterministic (same seed produces identical output)
  - Criterion benchmarks exist for all 15 filters at 3 image sizes
  - Benchmarks run ONE AT A TIME (CPU-intensive per user preference)
  - Missing reference tools (ffmpeg, vips, magick, Python) skip gracefully
  - No regressions in existing test suite
  out_of_scope: 'Fixing pre-existing test failures (threshold_tests, WASM integration).

    Multi-image filter validation (blend, inpaint, HDR fusion).

    Performance optimization of any filter (this is measurement only).

    Adding new filter implementations or changing existing behavior.

    '
  technical_notes: 'PYTHON REFERENCES:

    Use inline Python scripts via run_python_ref() pattern from filter_reference_parity.rs.

    The formulas are simple enough to implement in numpy one-liners. Python venv at

    tests/fixtures/.venv already has numpy/Pillow/OpenCV.


    REFERENCE TOOL AVAILABILITY:

    Use ref_tools::has_tool() for optional tool checks. Tests MUST NOT fail when

    external tools are missing — use eprintln!("SKIP — ...") and return early.

    Exception: Python venv is required (panic if missing, matching existing pattern).


    BENCHMARK SIZING:

    - 256x256, 1024x1024, 4096x4096 for point-op filters (fast: grading, tonemap)

    - 256x256, 1024x1024 only for O(n^2) filters (seam carving is too slow at 4096)

    - sample_size(10) for large images to avoid excessive runtime

    - Use Criterion groups with throughput tracking (Elements = pixel count)


    TEST FILE ORGANIZATION:

    Add new test file: tests/pro_filter_parity.rs (follows filter_reference_parity.rs pattern)

    Add new bench group in benches/perf.rs: pro_filter_benchmarks()


    SEAM CARVING NOTE:

    Output dimensions differ from input. Parity test should verify:

    1. Output buffer size matches expected dimensions

    2. Content preservation (high-energy regions survive) via PSNR against naive center-crop

    '
