id: transform-config-records_20260401120200Z
title: "Unify transform WIT to use config records like filters"
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: |
    Convert transform pipeline methods (resize, crop, rotate, flip) from
    positional args to config records in the WIT, matching the pattern used
    by all registered filters. Remove POSITIONAL_ARG_OPS from the web workers.
  context: |
    All 150+ registered filters use config records in the WIT pipeline
    interface (e.g. blur(source, blur-config) where blur-config is a record
    with named fields). But transforms still use positional args:
      resize(source, width, height, filter)
      crop(source, x, y, width, height)
      rotate(source, degrees)
      flip(source, direction)

    This creates a split in the web-ui worker code: a POSITIONAL_ARG_OPS
    set lists ~18 methods that need flat arg spreading, while everything
    else goes through buildConfig(). This is error-prone and the source of
    multiple bugs during the React migration.

    The fix: update the WIT definitions and codegen to generate config
    records for transforms, matching the filter pattern. Then remove the
    POSITIONAL_ARG_OPS set from both pipeline-worker.ts and preview-worker.ts.
  codebase_analysis: |
    Current WIT (wit/image/transform.wit):
      resize: func(pixels, info, width: u32, height: u32, filter: resize-filter) -> ...
      crop: func(pixels, info, x: u32, y: u32, width: u32, height: u32) -> ...
      rotate: func(pixels, info, degrees: rotation) -> ...
      flip: func(pixels, info, direction: flip-direction) -> ...

    Current pipeline WIT (wit/image/pipeline.wit) does NOT list resize/crop/rotate/flip.
    They are generated by build.rs into generated_pipeline_transform_adapter.rs.

    The codegen in crates/rasmcore-codegen/ handles filter config records via
    ConfigParams derive macro. Transforms use a separate manual codegen path
    in build.rs that reads transform node registrations.

    Web workers affected:
      web-ui/src/pipeline-worker.ts — POSITIONAL_ARG_OPS set (18 entries)
      web-ui/src/preview-worker.ts — same POSITIONAL_ARG_OPS set
      web-ui/src/utils/manifest.ts — PIPELINE_EXTRAS hardcodes transform params

    After this refactor:
      - All pipeline methods take (source, config) uniformly
      - Workers use buildConfig for everything, no special cases
      - PIPELINE_EXTRAS in manifest.ts can be removed if transforms get
        registered with ConfigParams like filters
  acceptance_criteria:
    - WIT defines resize-config, crop-config, rotate-config, flip-config records
    - Pipeline WIT methods use config records for all transforms
    - Build.rs / codegen generates config record handling for transforms
    - Rust adapter correctly unpacks config records for transform nodes
    - POSITIONAL_ARG_OPS removed from pipeline-worker.ts and preview-worker.ts
    - All pipeline methods go through buildConfig uniformly
    - PIPELINE_EXTRAS removed from manifest.ts (transforms discovered from manifest)
    - Existing tests pass (cargo test, npm run check)
    - WASM component builds successfully
  out_of_scope: |
    - Other positional-arg methods (curves, displacement-map, etc.) — those
      can follow in a separate track if needed
    - Changes to the stateless filter API (only pipeline resource methods)
  technical_notes: |
    Two-phase approach:

    Phase 1 - Backend (Rust/WIT):
    1. Define config records in wit/image/transform.wit or pipeline.wit:
       record resize-config { width: u32, height: u32, filter: resize-filter }
       record crop-config { x: u32, y: u32, width: u32, height: u32 }
       record rotate-config { degrees: rotation }
       record flip-config { direction: flip-direction }
    2. Update pipeline WIT methods to use config records
    3. Update build.rs transform codegen to generate config-record adapters
    4. Update Rust adapter to unpack config records

    Phase 2 - Frontend (web-ui):
    5. Remove resize/crop/rotate/flip from POSITIONAL_ARG_OPS in both workers
    6. Add ConfigParams-style registration for transforms so they appear
       in param-manifest.json (or keep PIPELINE_EXTRAS for now)
    7. Verify all transforms work through buildConfig path
    8. Run full test suite
