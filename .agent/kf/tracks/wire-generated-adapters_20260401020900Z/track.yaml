id: wire-generated-adapters_20260401020900Z
title: Wire generated pipeline write + mapper adapters
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Include already-generated pipeline_write_adapter.rs and

    pipeline_mapper_adapter.rs, remove hand-written duplicates. The codegen

    system already produces these files — they just need to be included via

    include!() and the hand-written versions deleted.

    '
  context: "The codegen system (rasmcore-codegen) already generates two adapter files\nthat are written to OUT_DIR but never\
    \ included in the source:\n\n1. generated_pipeline_write_adapter.rs — pipeline write methods for all\n   encoder formats\
    \ (write_jpeg, write_png, write_webp, write_avif, etc.)\n   Generated by pipeline_write::generate_adapter_methods() from\
    \ encoder\n   configs parsed from src/domain/encoder/*.rs files.\n\n2. generated_pipeline_mapper_adapter.rs — pipeline\
    \ mapper methods for\n   format-changing operations (sobel, canny, scharr, laplacian, etc.)\n   Generated by pipeline_mapper::generate_mapper_adapter_macro()\
    \ from\n   #[register_filter(..., output_format = \"Gray8\")] annotations.\n\nMeanwhile, pipeline_adapter.rs has hand-written\
    \ versions of write methods\n(write_jpeg lines 672-695, write_png 696-717, write_webp 718-739,\nwrite_bmp 740-749, write_ico\
    \ 750-759, write_qoi 760-769, write_gif\n770-790, write_avif 791-811, write_tiff 813-825).\n"
  codebase_analysis: "GENERATED FILES (already exist in OUT_DIR):\n- generated_pipeline_write_adapter.rs (117 lines) — generates\
    \ fn write_xxx\n  methods that convert WIT config to domain config and call sink::write_xxx\n- generated_pipeline_mapper_adapter.rs\
    \ (88 lines) — generates macro\n  generated_pipeline_mapper_methods!() with fn sobel, fn scharr, etc.\n\nCURRENT INCLUDES\
    \ in pipeline_adapter.rs:\n- Line 20: include!(generated_pipeline_adapter.rs) — filter methods ONLY\n- No include for\
    \ write or mapper adapters\n\nHAND-WRITTEN DUPLICATES in pipeline_adapter.rs:\n- Lines 672-825: write_jpeg, write_png,\
    \ write_webp, write_bmp, write_ico,\n  write_qoi, write_gif, write_avif, write_tiff (9 methods)\n\nBUILD.RS (lines 86-136):\n\
    - Already parses encoder configs from src/domain/encoder/*.rs\n- Already calls pipeline_write::generate_adapter_methods()\n\
    - Already writes generated_pipeline_write_adapter.rs to OUT_DIR\n\nCODEGEN (generate/mod.rs lines 50-55):\n- Already calls\
    \ pipeline_mapper::generate_mapper_adapter_macro()\n- Already writes generated_pipeline_mapper_adapter.rs to OUT_DIR\n\
    \nKEY RISK: The generated write adapter may have slightly different\nsignatures or logic than the hand-written versions.\
    \ Must verify each\nmethod matches before swapping.\n"
  acceptance_criteria:
  - generated_pipeline_write_adapter.rs included via include!() in pipeline_adapter.rs
  - generated_pipeline_mapper_adapter.rs included via include!() in pipeline_adapter.rs
  - All hand-written write methods removed from pipeline_adapter.rs
  - generated_pipeline_mapper_methods!() macro invoked in GuestImagePipeline impl
  - cargo build succeeds for native target
  - cargo component build succeeds for wasm32-wasip2 target
  - Pipeline write tests pass (write_jpeg, write_png, etc.)
  - Pipeline mapper methods are accessible (sobel, canny, etc. on pipeline)
  out_of_scope: 'Registering transform operations (resize, crop, etc.) — separate track.

    Registering stateless WIT ops (transform.wit, compare.wit) — separate track.

    Changing the codegen system itself. Adding new write formats or mapper operations.

    '
  technical_notes: "APPROACH:\n1. Compare generated write adapter methods with hand-written versions to\n   verify functional\
    \ equivalence (config fields, metadata, error handling).\n2. Add include!() for generated_pipeline_write_adapter.rs in\
    \ pipeline_adapter.rs.\n3. Remove hand-written write methods.\n4. Add include!() and macro invocation for generated_pipeline_mapper_adapter.rs.\n\
    5. Update WIT pipeline.wit if mapper methods are not already declared.\n6. Verify both native and WASM builds.\n\nThe\
    \ write adapter generates bare fn methods to be placed inside the\nimpl GuestImagePipeline block. The mapper adapter generates\
    \ a macro\nthat expands to fn methods.\n\nEMPTY FILE FALLBACK: build.rs already writes empty stubs when no\nencoder configs\
    \ or mappers are found, so builds will not break if the\nsource files are missing.\n"
plan:
- phase: Audit Generated vs Hand-Written
  tasks:
  - text: Compare each generated write method with its hand-written counterpart for functional equivalence (config fields,
      metadata, error handling)
    done: true
  - text: Verify generated_pipeline_mapper_adapter.rs macro produces valid method signatures matching pipeline.wit
    done: true
- phase: Wire Write Adapter
  tasks:
  - text: Add include!() for generated_pipeline_write_adapter.rs in pipeline_adapter.rs
    done: true
  - text: Remove all hand-written write_xxx methods from pipeline_adapter.rs (write_jpeg through write_tiff, ~150 lines)
    done: true
  - text: Verify cargo build succeeds and write tests pass
    done: true
- phase: Wire Mapper Adapter
  tasks:
  - text: Add include!() for generated_pipeline_mapper_adapter.rs in pipeline_adapter.rs
    done: true
  - text: Invoke generated_pipeline_mapper_methods!() macro inside GuestImagePipeline impl
    done: true
  - text: Verify pipeline.wit declares mapper methods (sobel, canny, scharr, laplacian, etc.) — add if missing
    done: true
- phase: Verification
  tasks:
  - text: cargo build (native) succeeds with no hand-written write or mapper adapter code
    done: false
  - text: cargo component build (wasm32-wasip2) succeeds
    done: false
extra: {}
