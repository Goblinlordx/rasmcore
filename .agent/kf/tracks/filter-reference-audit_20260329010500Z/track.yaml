id: filter-reference-audit_20260329010500Z
title: Filter/Transform Reference Audit — Validate All Ops Against ImageMagick + Document
type: chore
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: 'Systematic reference validation for all 40+ image processing operations. For each

    operation, generate deterministic test input, run through both rasmcore and

    ImageMagick CLI, compare output via MAE/PSNR, and document which reference

    implementation each operation is aligned with.

    '
  context: 'Currently only 6 operations are validated against external references

    (resize, crop, rotate, flip, grayscale vs ImageMagick; smart_crop vs libvips).

    The remaining 35+ operations have only internal unit tests. For a production

    image processing library claiming vips/ImageMagick parity, every operation

    must be validated against a known-good reference.


    ImageMagick is the primary reference since it''s the most widely available CLI

    tool and supports all operations we implement. libvips is secondary for

    operations where it''s the gold standard (smart_crop, resize quality).

    '
  codebase_analysis: 'tests/parity.rs has the reference test infrastructure:

    - load_fixture()/load_reference() for test images

    - mean_absolute_error()/psnr() for comparison metrics

    - tests/fixtures/generate.sh for ImageMagick reference generation


    Operations needing reference validation (grouped by category):


    Point ops (11): blur, sharpen, brightness, contrast, gamma, invert,

    threshold, posterize, clamp, grayscale (already done), sepia


    Color ops (3): hue_rotate, saturate, colorize


    Convolution (4): convolve (custom kernel), median, sobel, canny


    Histogram (4): equalize, normalize, auto_level, contrast_stretch


    Alpha (6): premultiply, unpremultiply, flatten, add_alpha, remove_alpha, blend (9 modes)


    Geometry (4): rotate_arbitrary, pad, trim, affine


    Composite (1): alpha_composite_over


    Already validated: resize, crop, rotate90/180, flip H/V, grayscale, smart_crop

    '
  acceptance_criteria:
  - Every operation has a documented reference implementation
  - Every operation has a parity test comparing output against the reference
  - tests/fixtures/generate.sh updated to produce all reference outputs
  - Reference comparison document listing each operation + its reference + MAE threshold
  - Exact-match operations (invert, threshold, posterize, clamp, flatten, add/remove alpha, premultiply, unpremultiply) produce
    BIT-IDENTICAL output to ImageMagick
  - Deterministic-math operations (gamma, brightness, contrast, blend modes) produce identical output when using the same
    formula — any difference is a bug to fix
  - Algorithm-dependent operations (blur, median, equalize) match within +-1 per channel with documented reason for each difference
    (kernel rounding, edge handling, CDF normalization)
  - Different-by-design operations (smart_crop, sobel vs edge) document WHY the algorithm differs and validate equivalent
    outcome
  - Operations where we intentionally diverge have documented rationale explaining the specific cause of each differing pixel
  out_of_scope: 'Fixing operations that fail parity (separate bug tracks per operation).

    Adding new operations. Performance comparison (separate track).

    WASM-specific testing.

    '
  technical_notes: "ImageMagick CLI equivalents for each operation:\n\nPoint ops:\n  blur:            magick input.png -blur\
    \ 0x{radius} ref.png\n  sharpen:         magick input.png -sharpen 0x{amount} ref.png\n  brightness:      magick input.png\
    \ -brightness-contrast {bri}x0 ref.png\n  contrast:        magick input.png -brightness-contrast 0x{con} ref.png\n  gamma:\
    \           magick input.png -gamma {value} ref.png\n  invert:          magick input.png -negate ref.png\n  threshold:\
    \       magick input.png -threshold {pct}% ref.png\n  posterize:       magick input.png -posterize {levels} ref.png\n\
    \  sepia:           magick input.png -sepia-tone {pct}% ref.png\n\nColor ops:\n  hue_rotate:      magick input.png -modulate\
    \ 100,100,{hue} ref.png\n  saturate:        magick input.png -modulate 100,{sat},100 ref.png\n  colorize:        magick\
    \ input.png -fill \"rgb(r,g,b)\" -colorize {pct}% ref.png\n\nConvolution:\n  convolve:        magick input.png -convolve\
    \ \"{kernel}\" ref.png\n  median:          magick input.png -median {radius} ref.png\n  sobel:           magick input.png\
    \ -edge 1 ref.png (approximate)\n  canny:           magick input.png -canny 0x1+{lo}%+{hi}% ref.png\n\nHistogram:\n  equalize:\
    \        magick input.png -equalize ref.png\n  normalize:       magick input.png -normalize ref.png\n  auto_level:   \
    \   magick input.png -auto-level ref.png\n  contrast_stretch: magick input.png -contrast-stretch {b}x{w}% ref.png\n\n\
    Alpha:\n  flatten:         magick input.png -background white -flatten ref.png\n  blend multiply:  magick fg.png bg.png\
    \ -compose Multiply -composite ref.png\n  blend screen:    magick fg.png bg.png -compose Screen -composite ref.png\n \
    \ (etc. for each blend mode)\n\nGeometry:\n  rotate_arbitrary: magick input.png -rotate {deg} -background white ref.png\n\
    \  pad:             magick input.png -gravity center -extent {w}x{h} ref.png\n  trim:            magick input.png -trim\
    \ ref.png\n  affine:          magick input.png -affine \"{a},{b},{c},{d},{tx},{ty}\" ref.png\n\nTest methodology per operation:\n\
    1. Generate 64x64 deterministic test image (gradient or checkerboard)\n2. Apply operation via rasmcore\n3. Apply equivalent\
    \ via ImageMagick CLI\n4. Compare outputs via MAE\n5. Assert MAE < threshold (varies per operation — blur is forgiving,\
    \ invert is exact)\n6. Document the reference and threshold in a reference table\n\nMatch expectations by category:\n\n\
    \  EXACT (must be bit-identical — any difference is a bug):\n    invert, threshold, posterize, clamp, flatten, add_alpha,\
    \ remove_alpha,\n    premultiply, unpremultiply, blend modes (Multiply, Screen, etc. when\n    using same integer formula)\n\
    \    → Assert: MAE == 0.0 (zero tolerance)\n\n  DETERMINISTIC MATH (identical output if same formula):\n    gamma (LUT\
    \ from same powf), brightness (same offset), contrast (same factor),\n    grayscale (same BT.709 weights), sepia (same\
    \ matrix coefficients)\n    → Assert: MAE == 0.0 if formulas match, otherwise fix our formula to match\n    → If ImageMagick\
    \ uses a different formula, document which and match theirs\n\n  ALGORITHM-DEPENDENT (+-1 per channel, documented reason\
    \ per pixel):\n    blur (Gaussian kernel size rounding, edge clamp vs reflect),\n    sharpen (unsharp mask radius), median\
    \ (histogram vs sort, border handling),\n    equalize (CDF integer rounding), normalize (percentile calculation),\n  \
    \  hue_rotate/saturate (f32 vs f64 HSV precision)\n    → Assert: MAE <= 1.0, with documented reason for any non-zero pixel\n\
    \    → If MAE > 1.0, create a bug track to investigate\n\n  DIFFERENT BY DESIGN (document rationale, validate equivalent\
    \ outcome):\n    smart_crop (iterative slice vs other), sobel (our 3x3 vs magick edge),\n    canny (parameter mapping\
    \ differences)\n    → Assert: functionally equivalent (same region selected, same edges found)\n    → Document the algorithm\
    \ difference in REFERENCE.md\n"
