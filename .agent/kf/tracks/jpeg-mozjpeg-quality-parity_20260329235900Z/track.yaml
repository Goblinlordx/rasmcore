id: jpeg-mozjpeg-quality-parity_20260329235900Z
title: JPEG mozjpeg Quality Parity — Lambda Tuning + Candidate Strategy + DC Trellis Alignment
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: |
    Close the quality gap with mozjpeg by matching their three key algorithmic
    decisions: content-adaptive lambda with CSF weighting, bit-width candidate
    generation, and DPCM-aware DC trellis with multi-candidate search.
  context: |
    Benchmark shows our trellis produces 0.51x the file size of mozjpeg at Q85
    but at 0.84x quality (41.6 dB vs 49.7 dB). We're over-compressing.

    mozjpeg's advantage comes from three specific differences (per source analysis):
    1. Content-adaptive lambda: lambda = 2^14.75 / (2^16.5 + block_energy), weighted
       by a CSF (Contrast Sensitivity Function) table that gives 57x more weight to DC
       than high-frequency AC. Our adaptive_lambda() is close but may use different constants.
    2. Candidate generation: mozjpeg tests candidates at each bit-width boundary
       (1, 3, 7, 15, ..., 2^nbits-1, rounded_value) — not just round-down/round-up/zero.
       This lets it choose a smaller magnitude that costs fewer Huffman bits.
    3. DC trellis: mozjpeg uses up to 9 candidates per block and multi-state DP. Our
       dc_trellis_pass uses only 3 candidates (round-1, round, round+1).
  codebase_analysis: |
    trellis.rs: adaptive_lambda() uses 2^14.75 / (2^16.5 + mean_sq) which matches
    mozjpeg's formula. But we don't apply per-frequency CSF weighting — all frequencies
    use the same lambda. This means we over-prune low-frequency coefficients (where
    humans are most sensitive) and under-prune high-frequency ones.

    trellis_optimize_ac(): generates candidates as [zero, rounded, rounded-1]. mozjpeg
    generates [zero, 1, 3, 7, ..., 2^nbits-1, rounded] — more options at each bit width.

    dc_trellis_pass(): uses 3 candidates (round-1, round, round+1). mozjpeg uses
    2 + 60/dc_quantval candidates, capped at 9.
  acceptance_criteria:
    - Per-frequency lambda weighting using CSF table (luma and chroma)
    - Bit-width candidate generation matching mozjpeg strategy
    - DC trellis with up to 9 candidates per block
    - Quality ratio vs mozjpeg >= 0.95 at Q85 (up from 0.84)
    - File size within 1.5x of mozjpeg at same quality (up from 0.51x)
    - All existing tests pass with updated thresholds
    - Benchmark chart shows improved alignment with mozjpeg
  out_of_scope: |
    Quantization table changes (separate track). Scan optimization for progressive.
    Vertical DC gradient weighting (mozjpeg default is off).
    Speed optimization (separate track).
  technical_notes: |
    CSF weight table for luma (from mozjpeg jpeg_lambda_weights_csf_luma):
      DC: 3.356, 3.599, 3.209, 2.281, 1.424, 0.881, 0.582, 0.435
      ...down to 0.059 at [7][7]
    Effect: multiply distortion by csf_weight[freq] before comparing to rate.
    Low-frequency distortion is penalized 57x more heavily than high-frequency.

    Bit-width candidates for a coefficient with nbits significant bits:
      candidates = [0, 1, 3, 7, 15, 31, ..., 2^nbits - 1, rounded_value]
    Each represents the maximum value at that bit width. Choosing a smaller
    bit width saves Huffman code bits (fewer magnitude bits).

    DC candidate count: min(9, 2 + 60/dc_quantval). At Q85 with dc_q=5: 14→capped to 9.
    Candidates span [rounded - 4, ..., rounded + 4].
