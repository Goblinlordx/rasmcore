id: webp-simd_20260328062500Z
title: WebP SIMD128 — WASM-Targeted Vectorization of VP8 Hot Paths
type: feature
status: pending
created: 2026-03-28
updated: '2026-03-28'
spec:
  summary: 'Add WASM SIMD128 vectorization to the VP8 encoder''s critical hot paths:

    DCT/IDCT, quantization, color conversion, and SAD. Uses std::arch::wasm32

    intrinsics behind #[cfg(target_arch = "wasm32")] gates. No new dependencies.

    '
  context: 'The rasmcore-webp encoder is pure scalar Rust — correct but unoptimized.

    WASM is the primary deployment target and SIMD128 is universally supported

    in all modern WASM runtimes (wasmtime, V8, SpiderMonkey, JavaScriptCore).


    The .cargo/config.toml already enables target-feature=+simd128 for WASM

    builds, so LLVM auto-vectorization is active. However, auto-vec is unreliable

    for the specific patterns in VP8 (butterfly DCT, fixed-point multiply-shift,

    conditional zero thresholding). Explicit SIMD intrinsics guarantee vectorization

    and let us express the exact operations libwebp''s hand-tuned SSE2 code uses,

    adapted for 128-bit WASM SIMD.


    WASM SIMD128 constraint: 128-bit registers only (no 256-bit like AVX2).

    This matches libwebp''s SSE2 codepath which also uses 128-bit XMM registers,

    so the same algorithmic structure applies directly.

    '
  codebase_analysis: 'Hot-path functions in rasmcore-webp/src/ and their SIMD potential:


    CRITICAL (40% of encode time):

    - dct::forward_dct() — 4x4 butterfly, 4-wide i32 vectors, 2 passes

    - dct::inverse_dct() — MUL1/MUL2 fixed-point rotation, 4-wide i32

    - dct::forward_wht() — pure add/sub butterfly, trivially vectorizable

    - dct::inverse_wht() — same


    HIGH (20% of encode time):

    - quant::quantize_block() — 16 independent multiply-shift-threshold ops

    - quant::dequantize_block() — 16 independent multiplications


    HIGH (30% of encode time, when implemented):

    - color::rgb_to_yuv420() — per-pixel matrix multiply, embarrassingly parallel


    MEDIUM:

    - predict::sad() — sum of absolute differences, classic SIMD pattern

    - predict::predict_16x16_tm() — per-row clip(left + above - corner)

    - predict::predict_8x8_tm() — same for chroma


    LOW (not worth explicit SIMD):

    - predict::predict_4x4_*() — too small (16 pixels), overhead > benefit

    - boolcoder — serial bit operations, inherently sequential


    All functions operate on fixed-size arrays ([u8; 16], [i16; 16], [u8; 256])

    which map naturally to WASM v128 operations (i32x4, i16x8, u8x16).


    WASM SIMD128 available types:

    - v128: generic 128-bit type

    - i32x4: 4 lanes of i32 (ideal for DCT butterfly)

    - i16x8: 8 lanes of i16 (ideal for coefficient operations)

    - u8x16: 16 lanes of u8 (ideal for pixel operations, SAD)

    - i32x4_mul: available (unlike some SIMD ISAs, WASM has i32 multiply)


    Rust access: std::arch::wasm32 module provides all SIMD128 intrinsics.

    Gated behind #[cfg(target_arch = "wasm32")] with scalar fallback for

    native builds (cargo test runs natively, not under WASM).

    '
  acceptance_criteria:
  - DCT forward/inverse use WASM SIMD128 intrinsics (i32x4 butterfly operations)
  - WHT forward/inverse use WASM SIMD128 intrinsics
  - quantize_block uses SIMD128 for parallel coefficient processing
  - dequantize_block uses SIMD128 (i16x8 multiply)
  - SAD function uses SIMD128 (u8x16 absolute differences with horizontal sum)
  - Color conversion (rgb_to_yuv420) uses SIMD128 when implemented (or stub ready)
  - All SIMD functions gated behind
  - Existing tests pass identically — SIMD produces bit-exact same results as scalar
  - WASM component builds and validates with SIMD128 enabled
  - Benchmark comparing scalar vs SIMD on a reference 1080p encode (document speedup)
  out_of_scope: '- x86 SSE/AVX intrinsics (WASM is our target, native uses auto-vec)

    - ARM NEON intrinsics (same reason)

    - std::simd portable SIMD (nightly-only, not stable yet)

    - Trellis quantization or other quality optimizations

    - Boolean coder SIMD (serial algorithm, not vectorizable)

    - 4x4 prediction modes (too small for SIMD benefit)

    '
  technical_notes: "Implementation pattern — dual-path with cfg gate:\n\n```rust\n#[cfg(target_arch = \"wasm32\")]\nuse std::arch::wasm32::*;\n\
    \npub fn forward_dct(src: &[u8; 16], reference: &[u8; 16], out: &mut [i16; 16]) {\n    #[cfg(target_arch = \"wasm32\"\
    )]\n    { forward_dct_simd128(src, reference, out) }\n    #[cfg(not(target_arch = \"wasm32\"))]\n    { forward_dct_scalar(src,\
    \ reference, out) }\n}\n```\n\nThe scalar implementations stay as-is (renamed with _scalar suffix).\nSIMD implementations\
    \ use std::arch::wasm32 intrinsics directly.\nNo new crate dependencies — std::arch is part of the standard library.\n\
    \nKey WASM SIMD128 operations for VP8 DCT:\n- i32x4_add / i32x4_sub: butterfly add/subtract\n- i32x4_mul: fixed-point\
    \ coefficient multiply (2217, 5352, 20091, 35468)\n- i32x4_shr: arithmetic right shift for fixed-point scaling\n- i32x4_splat:\
    \ broadcast constant to all lanes\n- v128_load / v128_store: aligned 128-bit load/store\n\nFor quantization:\n- u32x4_shr:\
    \ unsigned shift for (abs + bias) * iq >> 16\n- i32x4_abs: absolute value for sign extraction\n- v128_and / v128_or: bitwise\
    \ ops for sign restoration\n\nFor SAD:\n- u8x16_sub_sat / u8x16_max: compute |a-b| without overflow\n- i32x4_add: accumulate\
    \ partial sums\n- i32x4_extract_lane: horizontal reduction\n\nTesting: All existing tests run natively (scalar path).\
    \ Add WASM-specific\ntests via the existing wasm-integration test harness to verify SIMD path\nproduces identical results.\
    \ Cross-check: encode same image with scalar\nand SIMD, assert byte-identical output.\n\nBenchmark approach: Use the existing\
    \ benchmark infrastructure. Encode a\n1080p test image 100 times, measure wall-clock time for scalar vs SIMD\nWASM builds.\
    \ Document the speedup factor per function and overall.\n"
