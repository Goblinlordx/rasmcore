id: native-infra-lzw_20260328071602Z
title: Shared LZW Crate — Variable-Width LZW for GIF + TIFF
type: feature
status: pending
created: '2026-03-28'
updated: '2026-03-28'
spec:
  summary: 'Pure Rust LZW compress/decompress (rasmcore-lzw) with variable-width codes. Unlocks native GIF and TIFF LZW mode.
    Perf target: match or beat weezl.'
  context: 'LZW compression needed by GIF and TIFF (LZW mode). Current backend: weezl crate (pure Rust, safe, no SIMD — LZW
    is inherently sequential). Own implementation for full control. Perf target: match or beat weezl. Key: hash table sizing,
    dictionary reset strategy, variable-width code packing.'
  codebase_analysis: ''
  acceptance_criteria:
  - rasmcore-lzw crate with rasmcore-bitio dependency only
  - LZW compress with variable-width codes (2-12 bits)
  - LZW decompress with clear code and EOI handling
  - GIF-compatible mode (sub-block streaming, min code size parameter)
  - TIFF-compatible mode (old-style and new-style byte ordering)
  - Roundtrip tests and Criterion benchmarks vs weezl baseline
  out_of_scope: ''
  technical_notes: 'LZW is inherently sequential — no SIMD benefit. Perf comes from: efficient hash table (open addressing
    or chained), fast dictionary lookup, minimal allocation. GIF variant packs variable-width codes into byte sub-blocks (255
    bytes max). TIFF variant has different byte ordering (old-style vs new-style). Both share the core LZW engine.'
