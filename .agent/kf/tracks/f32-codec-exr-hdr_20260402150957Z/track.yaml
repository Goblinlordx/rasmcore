id: f32-codec-exr-hdr_20260402150957Z
title: "f32 codec entry points — EXR and HDR native f32 decode/encode"
type: feature
status: pending
created: 2026-04-02
updated: 2026-04-02
spec:
  summary: |
    Make EXR and HDR codecs produce and consume f32 pixel data natively,
    eliminating the precision-destroying u8 quantization. These are the
    first two codecs to exercise the f32 pipeline end-to-end.
  context: |
    EXR decoder (decoder/mod.rs:1628-1705) already reads f32/f16/u32 channels
    via the exr crate but immediately crushes to Rgba8:
      (r.clamp(0.0, 1.0) * 255.0 + 0.5) as u8
    EXR encoder (encoder/exr.rs) takes u8 input and converts back to f32
    for writing: pixel as f32 / 255.0. Full round-trip precision loss.

    HDR decoder (decoder/mod.rs:1505-1627) reads RGBE (shared-exponent float)
    but converts to Rgb8. Encoder does the inverse.

    Both codecs are inherently floating-point formats. The u8 quantization
    is an artificial limitation of the current pipeline.
  codebase_analysis: |
    EXR decoder key section (decoder/mod.rs ~line 1670):
    - Reads via exr::prelude::read_first_rgba_layer_from_file
    - get_f32_sample() extracts per-channel f32 from FlatSamples enum
    - Currently: clamp(0.0, 1.0) * 255.0 + 0.5 → u8
    - Change: store f32 directly as bytes in Vec<u8> with Rgba32f format

    EXR encoder (encoder/exr.rs ~line 20-60):
    - Currently: u8 → f32 via / 255.0
    - Change: if input is already Rgba32f, skip conversion entirely

    HDR decoder (decoder/mod.rs ~line 1560):
    - Reads RGBE 4-byte tuples, converts mantissa * 2^(exp-128-8)
    - Currently: clamp * 255.0 → u8
    - Change: store f32 directly with Rgb32f format

    HDR encoder (encoder/hdr.rs ~line 47-65):
    - Currently: u8 → f32 via / 255.0, then pack to RGBE
    - Change: if input is Rgb32f, use f32 directly

    Underlying crates:
    - exr v1.74: full f32/f16/u32 support, no changes needed
    - HDR codec: custom implementation, already uses f32 internally
  acceptance_criteria:
    - EXR decoder outputs Rgba32f when pipeline is in HighPrecision mode
    - EXR decoder outputs Rgba8 in Standard mode (backward compatible)
    - EXR encoder accepts Rgba32f input directly (no u8→f32 conversion)
    - EXR encoder still accepts Rgba8 input (backward compatible)
    - HDR decoder outputs Rgb32f when pipeline is in HighPrecision mode
    - HDR decoder outputs Rgb8 in Standard mode (backward compatible)
    - HDR encoder accepts Rgb32f input directly
    - HDR encoder still accepts Rgb8 input (backward compatible)
    - Round-trip parity test EXR f32 — decode→encode→decode with zero precision loss
    - Round-trip parity test HDR f32 — decode→encode→decode with RGBE-limited precision
    - Cross-format test — EXR f32 decode → pipeline passthrough → HDR f32 encode
    - Three-way validation for EXR — our decode vs exr crate reference at f32
    - Standard mode regression — all existing EXR/HDR tests pass unchanged
  out_of_scope: |
    - Other codecs (JXL, TIFF f32, FITS) — future tracks
    - Filter f32 processing — separate track
    - GPU f32 — separate track
  technical_notes: |
    Precision mode selection: the decoder needs to know whether to output
    f32 or u8. Two options:

    A) Decoder always outputs native format (f32 for EXR/HDR), pipeline
       auto-demotes if precision flag is Standard. Simpler decoder logic.

    B) Decoder checks precision flag and outputs accordingly. Avoids
       unnecessary f32 allocation in standard mode. Better perf default.

    Recommend option B — the decode functions already receive pipeline
    context or can receive a target_format parameter (decode_as exists).

    HDR RGBE note: RGBE shared exponent gives ~1% relative precision.
    The f32 round-trip won't be bit-exact (RGBE encoding is lossy in the
    mantissa) but should be within RGBE precision bounds. Test tolerance
    should reflect this (~1/256 relative error per channel).

    EXR f32 round-trip should be bit-exact for f32-stored EXR files.
    For f16-stored EXR files, decode precision is limited to f16 range.
