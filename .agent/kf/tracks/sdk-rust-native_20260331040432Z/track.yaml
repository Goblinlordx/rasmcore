id: sdk-rust-native_20260331040432Z
title: Rust Native SDK (No WASM, Direct Linking)
type: feature
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: 'rasmcore-codegen emits a Rust fluent builder crate that wraps domain

    functions directly. No WASM — pure Rust linking. Lower priority.

    '
  context: 'For Rust consumers, going through WASM is unnecessary overhead. A native

    Rust SDK that wraps rasmcore-image domain functions with a fluent builder

    API gives Rust users zero-overhead access to all filters. This is generated

    from the same FilterReg/ParamField data as the other SDKs.

    '
  codebase_analysis: "TARGET API:\n```rust\nuse rasmcore_sdk::RcImage;\n\nlet jpeg = RcImage::load(&png_bytes)?\n    .blur(3.0)\n\
    \    .resize(800, 600, ResizeFilter::Lanczos3)\n    .brightness(0.1)\n    .to_jpeg(JpegConfig { quality: 85 })?;\n```\n\
    \nGENERATION:\n- rasmcore-codegen emits src/lib.rs for a rasmcore-sdk crate\n- Each filter becomes a method on RcImage\
    \ that calls domain::filters::X\n- Config structs reused from domain (no WIT translation needed)\n- Pipeline graph used\
    \ internally for lazy evaluation\n"
  acceptance_criteria:
  - rasmcore-codegen --sdk-rs generates crates/rasmcore-sdk/src/generated.rs
  - Fluent builder API wrapping all 115 filters
  - Direct Rust linking (no WASM serialization overhead)
  - Type-safe config structs (reuse domain ConfigParams)
  - Basic smoke test (load, filter, encode)
  out_of_scope: 'Publishing to crates.io. Documentation beyond rustdoc.

    Async API. Streaming API.

    '
  technical_notes: 'Unlike TS/Python/Go SDKs which go through WASM, the Rust SDK links

    directly to rasmcore-image. The generated code just provides ergonomic

    wrappers around the domain functions.


    The RcImage struct internally uses the pipeline NodeGraph for lazy

    evaluation — same as the WASM pipeline but without serialization.

    '
