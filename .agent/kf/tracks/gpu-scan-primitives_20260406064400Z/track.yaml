id: gpu-scan-primitives_20260406064400Z
title: GPU parallel scan/reduce primitives (Blelloch, Hillis-Steele, decoupled lookback)
type: feature
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: 'Reusable GPU compute primitives for parallel scan (prefix sum), reduce,

    and sort. WGSL shaders + Rust builder API in gpu_shaders/ module.

    Dead-code eliminated when unused — zero cost if not referenced.

    '
  context: "The pipeline already has histogram reduction (3-pass zero-atomic) as a\nGPU primitive in gpu_shaders/reduction.rs.\
    \ But there are no general-purpose\nscan (prefix sum) or sort primitives. These are needed for:\n\n- Integral image (2D\
    \ prefix sum) for adaptive threshold at large radii\n- Exclusive scan for stream compaction (sparse filter output)\n-\
    \ Parallel CDF computation (equalize, Otsu — currently O(n) per-pixel)\n- Future: parallel sort for median filter, k-means,\
    \ quantization\n\nStandard GPU algorithms:\n1. Blelloch scan — O(n) work, O(log n) steps, two-pass (upsweep + downsweep)\n\
    2. Hillis-Steele scan — O(n log n) work but fewer barriers, good for small arrays\n3. Decoupled lookback scan (Merrill\
    \ & Garland 2016) — single-pass, uses atomics\n   for workgroup chaining. Best throughput for large arrays.\n4. Parallel\
    \ reduce — simpler than scan, produces single aggregate value\n5. Radix sort — built on scan, enables parallel median,\
    \ quantization\n\nWebGPU supports atomic<u32> in storage buffers — all algorithms are feasible.\nWorkgroup shared memory\
    \ (var<workgroup>) available for local reductions.\n"
  codebase_analysis: "gpu_shaders/reduction.rs (847 lines):\n- ReductionKind enum: ChannelSum, ChannelMinMax, Histogram256\n\
    - GpuReduction builder: build_passes(width, height) -> ReductionPasses\n- 3-pass pattern: local reduce -> global merge\
    \ -> apply\n- ReductionBuffer for persistent cross-pass storage\n- result_reader_wgsl() generates WGSL helper functions\n\
    \nPattern for new primitives: same module structure.\nEach primitive gets a builder (like GpuReduction) that generates\n\
    GpuShader passes. Filters compose primitives via gpu_shader_passes().\n\nWebGPU limits relevant:\n- Max workgroup size:\
    \ 256 (safe default)\n- Max storage buffer: 128MB (plenty for scan arrays)\n- Atomics: atomicLoad, atomicStore, atomicAdd,\
    \ atomicMax, atomicMin,\n  atomicAnd, atomicOr, atomicXor on atomic<u32> and atomic<i32>\n- No atomic<f32> — float reductions\
    \ need u32 bit-cast trick\n"
  acceptance_criteria:
  - Blelloch inclusive/exclusive scan for u32 and f32 arrays
  - Hillis-Steele scan for small arrays (single workgroup)
  - Decoupled lookback scan using WebGPU atomics
  - Parallel reduce (sum, min, max) for u32 and f32
  - 2D prefix sum (row scan + column scan) for integral image
  - Builder API matching GpuReduction pattern (build_passes -> GpuShader list)
  - All primitives tested with known inputs (identity, sorted, random)
  - Zero binary cost when unused (dead code eliminated)
  out_of_scope: 'Radix sort (future track built on scan).

    Filters that use these primitives (separate tracks).

    Non-WebGPU backends (CPU scan is trivial sequential code).

    '
  technical_notes: "Module: gpu_shaders/scan.rs (new, alongside existing reduction.rs)\n\nAPI pattern:\n  let scan = GpuScan::blelloch_exclusive(workgroup_size);\n\
    \  let passes = scan.build_passes(array_length);\n  // passes.pass1 = upsweep, passes.pass2 = downsweep\n  // Result in\
    \ same buffer as input (in-place)\n\n  let scan = GpuScan::decoupled_lookback(workgroup_size);\n  let passes = scan.build_passes(array_length);\n\
    \  // Single pass with atomic status flags\n\nBlelloch scan WGSL:\n  - Upsweep: tree reduce within workgroup (shared memory)\n\
    \  - Store workgroup aggregate to global array\n  - Downsweep: propagate prefix within workgroup\n\nDecoupled lookback\
    \ WGSL:\n  - Each workgroup computes local inclusive scan\n  - Atomically publishes status: AGGREGATE or PREFIX\n  - Looks\
    \ back at preceding workgroups to chain prefix\n  - Requires atomic<u32> flags array (3 states: invalid/aggregate/prefix)\n\
    \n2D prefix sum:\n  - Pass 1: row-wise scan (each row is independent — full parallelism)\n  - Pass 2: column-wise scan\
    \ (each column is independent)\n  - Result: integral image for O(1) rectangle sum queries\n\nFloat reductions via u32\
    \ bit-cast:\n  - atomicMax on u32-encoded f32 (works for positive floats)\n  - For signed floats: flip sign bit before\
    \ atomicMax, flip back after\n"
