id: gpu-cross-node-analysis_20260406211800Z
title: "Pure GPU cross-node analysis ‚Äî zero-readback analysis‚Üírender pipeline"
type: feature
status: pending
created: 2026-04-06
updated: 2026-04-06
spec:
  summary: |
    Enable analysis node A's GPU reduction buffer to be directly readable by
    render node B in a single queue.submit() ‚Äî zero CPU readback for
    analysis‚Üírender pairs like histogram‚Üíauto_levels.
  context: |
    The V2 pipeline has all the pieces for pure GPU analysis‚Üírender but they
    don't connect across node boundaries yet:

    - ReductionBuffer (node.rs:146-156): persistent GPU buffers within a single
      gpu_shaders() chain. ID-based linking across multi-pass shaders works.
    - GpuReduction (reduction.rs): 3-pass pattern (local reduce ‚Üí global reduce
      ‚Üí apply) with Histogram256, ChannelSum, ChannelMinMax. All single-node.
    - GpuExecutor::execute() (gpu.rs:43-93): allocates reduction buffers per
      call, frees after. No cross-call persistence.
    - collect_gpu_chain() (graph.rs:595-627): walks backward collecting
      GPU-capable nodes with single upstream. Stops at node boundaries.
    - render_multi_gpu_plan() (graph.rs:403-533): multi-stage GPU plan with
      StageInput::PriorStage for pixel buffers ‚Äî but NOT reduction buffers.
    - StagedPipeline (staged.rs): AnalysisNode‚ÜíParamBinding‚Üírender. Currently
      CPU-only typed results (Scalar, ScalarVec, etc.), no GPU buffer bridge.

    The gap: when analysis node A finishes its reduction passes, the reduction
    buffer lives in GPU memory. But the current architecture forces a CPU
    readback (execute() returns Vec<f32>), then re-upload for render node B.
    For histogram‚Üíauto_levels, this means: GPU histogram reduce ‚Üí CPU readback
    ‚Üí extract min/max/percentiles on CPU ‚Üí re-upload as uniform ‚Üí GPU apply.

    The fix: let the graph walker detect analysis‚Üírender pairs, concatenate
    their GPU shader chains (analysis passes + render apply pass), and submit
    as one executor call. The reduction buffer stays on GPU throughout.
  codebase_analysis: |
    Key files and current state:

    1. node.rs ‚Äî GpuShader has reduction_buffers: Vec<ReductionBuffer> field.
       ReductionBuffer has id, initial_data, read_write fields. The id-based
       linking already works within a single execute() call.

    2. gpu.rs ‚Äî GpuExecutor::execute() takes &[GpuShader]. Reduction buffers
       are allocated per unique id across the entire ops slice. This means if
       we simply concatenate analysis shaders + render shaders into one ops
       slice, the reduction buffer sharing ALREADY WORKS via matching ids.

    3. graph.rs ‚Äî collect_gpu_chain() stops at node boundaries. Need a new
       collector that recognizes analysis‚Üírender pairs and merges their chains.
       render_multi_gpu_plan() needs a variant that handles merged chains.

    4. reduction.rs ‚Äî GpuReduction::read_buffer() returns a ReductionBuffer
       with the same id but read_write: false. This is exactly what the render
       node's apply shader needs to reference the analysis buffer.

    5. staged.rs ‚Äî StagedPipeline has the right orchestration pattern but
       uses CPU AnalysisResult. Can be extended with a GpuAnalysisResult
       variant that carries buffer IDs instead of scalar values.

    6. WgpuExecutorV2 (gpu-native/src/lib.rs) ‚Äî already handles reduction
       buffers correctly within execute(). No changes needed to the executor
       itself ‚Äî the fix is in the graph walker and shader chain composition.

    7. WASM executor (v2-wasm, web GPU handler) ‚Äî same principle applies.
       The host executor already handles reduction buffers per-call.

    Critical insight: the executor ALREADY supports cross-node reduction
    buffers ‚Äî we just need to stop splitting the chain at node boundaries
    when analysis‚Üírender pairs are detected.
  acceptance_criteria:
    - Graph walker detects analysis‚Üírender node pairs where analysis produces
      reduction buffers and render consumes them via matching buffer IDs
    - Analysis + render GPU shaders are concatenated into a single ops slice
      and submitted via one execute() call
    - Reduction buffers persist across the analysis‚Üírender boundary within
      the merged chain (same buffer ID = same GPU allocation)
    - Histogram‚Üíauto_levels example works end-to-end on GPU with zero CPU
      readback of the histogram data
    - ChannelMinMax‚Üíauto_contrast example works similarly
    - CPU fallback path still works when GPU is unavailable (existing
      StagedPipeline CPU path unchanged)
    - No regression in existing single-node GPU chains
    - WASM and native executors both support the merged chain pattern
  out_of_scope: |
    - Multi-analysis fan-in (multiple analysis nodes feeding one render node)
    - Cross-tile reduction accumulation (separate gpu-tiled-streaming-poc track)
    - New analysis algorithms beyond histogram/min-max/sum
    - StagedPipeline CPU-side typed results (orthogonal, already works)
  technical_notes: |
    The approach is surprisingly simple because the executor already handles
    reduction buffer ID-based linking within a single execute() call:

    1. Add a trait method to Node: gpu_analysis_buffers() -> Option<Vec<ReductionBufferDecl>>
       that declares what reduction buffers this node's GPU chain produces.
    2. Add a trait method: gpu_consumes_buffers() -> Option<Vec<u32>> that declares
       what buffer IDs this node's apply shader reads.
    3. Extend collect_gpu_chain() (or add collect_analysis_render_chain()) to:
       - Detect when downstream node B consumes buffer IDs that upstream node A produces
       - Merge A's analysis passes + B's apply passes into one shader chain
       - Ensure buffer IDs match across the boundary
    4. The merged chain goes into a single execute() call ‚Äî no executor changes needed.
    5. Wire into render_gpu_plan() so the graph automatically uses merged chains
       when analysis‚Üírender pairs are detected.

    For the concrete histogram‚Üíauto_levels case:
    - Analysis node: 2 passes (local reduce, global reduce) writing Histogram256
      buffer with id=0
    - Render node: 1 pass (apply) reading buffer id=0 to compute per-channel
      stretch and apply to pixels
    - Merged chain: 3 passes total, buffer id=0 persists across all three,
      single execute() call, zero CPU readback
