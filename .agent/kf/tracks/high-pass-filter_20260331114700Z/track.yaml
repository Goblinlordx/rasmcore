id: high-pass-filter_20260331114700Z
title: High-pass filter — frequency separation for retouching
type: feature
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: |
    Spatial high-pass filter for frequency separation retouching.
    Subtracts a Gaussian-blurred version from the original, producing
    detail/texture layer. Essential for portrait retouching workflows.
  context: |
    Photoshop's frequency separation technique uses a high-pass filter
    to split an image into a detail layer (high frequencies) and a
    color/tone layer (low frequencies). This enables retouching skin
    texture without affecting color, or color grading without affecting
    texture.

    ImageMagick achieves this via: convert in.png \( +clone -blur 0x{radius} \)
    -compose subtract -composite -level 50%,50% out.png

    rasmcore has Gaussian blur and frequency_low/frequency_high filters
    but no dedicated high-pass that produces the correct 50%-gray-offset
    result needed for frequency separation.
  codebase_analysis: |
    EXISTING:
    - blur() in filters.rs: Gaussian blur via libblur SIMD
    - frequency_low / frequency_high: Laplacian-based, not true high-pass
    - convolve(): arbitrary kernel convolution

    APPROACH:
    - high_pass(pixels, info, radius) = (original - blur(original, radius)) / 2 + 0.5
    - The /2 + 0.5 offset maps the result to [0,1] centered at mid-gray
    - This matches PS and IM behavior for frequency separation
  acceptance_criteria:
    - high_pass filter registered with radius parameter
    - Output centered at 128 gray (no detail = mid-gray)
    - Validated against ImageMagick subtract+level approach (+/-1)
    - Identity check — zero radius produces mid-gray
    - Large radius produces near-original (inverted around gray)
  out_of_scope: |
    Bandpass filter. Fourier transform. Frequency domain filtering.
    Automatic frequency separation into separate layers.
  technical_notes: |
    Formula: high_pass[c] = clamp((original[c] - blurred[c]) / 2 + 0.5, 0, 1)

    The division by 2 compresses the range so it fits in [0,1] without
    clipping. In Photoshop, this is applied as Linear Light blend mode
    to recombine.

    Register as filter with ConfigParams: radius (f32, 1.0-100.0, default 10.0).
