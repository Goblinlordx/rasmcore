    done: true
  - text: Update pipeline.rs to store config struct in node when config_struct is set
    done: true
  - text: Update wit.rs to generate record type + config-based func signature
    done: true
  - text: Unit tests for all 3 generators in both modes (config vs individual)
    done: true
- phase: Integration
  tasks:
  - text: Verify existing filters still compile with individual params (backward compat)
    done: true
  - text: Verify manifest.json unchanged (config detection does not alter manifest)
    done: true
  - text: Full cargo test pass
    done: true
