id: config-struct-codegen_20260331041856Z
title: Codegen Config Struct Support — WIT Records, Adapter, Pipeline Nodes
type: refactor
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: 'Add config_struct support to rasmcore-codegen. Generate WIT record types, adapter config struct signatures, and
    pipeline nodes with config fields. Infrastructure only — no domain function signature changes yet.

    '
  context: 'The codegen currently generates individual parameters for all filter

    functions. ConfigParams structs exist in the domain but are only used for

    manifest metadata. This track adds the infrastructure to generate config

    struct-based code, so the subsequent migration tracks can change function

    signatures incrementally.


    Must wait for codegen-wit-sdk-unify to merge — that track is actively

    restructuring the codegen crate.

    '
  codebase_analysis: 'Current codegen pipeline:

    - parse/filters.rs extracts FilterReg with params as Vec<(name, type)>

    - parse/config_params.rs extracts ConfigParams structs independently

    - generate/manifest.rs links them by naming convention (blur -> BlurParams)

    - generate/adapter.rs generates individual param signatures

    - generate/pipeline.rs generates individual param node fields

    - generate/wit.rs generates individual WIT params


    Changes needed:

    - Add config_struct: Option<String> to FilterReg in types.rs

    - Auto-detect config struct via naming convention in parse phase

    - adapter.rs: when config_struct is Some, generate config-based signature

    - pipeline.rs: when config_struct is Some, store config struct in node

    - wit.rs: when config_struct is Some, generate record type + use in signature

    '
  acceptance_criteria:
  - FilterReg has config_struct field populated by naming convention detection
  - When config_struct is set, adapter generates config-based trait method
  - When config_struct is set, pipeline node stores config struct
  - When config_struct is set, WIT generates record type + uses in func signature
  - When config_struct is None, current individual-param codegen unchanged
  - All existing filters continue to work (no domain changes in this track)
  - Unit tests in rasmcore-codegen verify both paths
  out_of_scope: 'Changing any domain function signatures (next tracks).

    Adding new ConfigParams structs (already done).

    Changing the demo/SDK (follows automatically from WIT changes).

    '
  technical_notes: "Detection strategy: in parse/mod.rs after parsing both filters and\nconfig_params, iterate filters and\
    \ check if param_structs contains\na matching struct name (to_pascal_case(name) + \"Params\").\n\nAdapter generation (config\
    \ mode):\n  fn blur(pixels: Vec<u8>, info: types::ImageInfo, config: filters::BlurConfig)\n    -> Result<Vec<u8>, RasmcoreError>\
    \ {\n      let di = to_domain_image_info(&info);\n      domain::filters::blur(&pixels, &di, config.radius).map_err(to_wit_error)\n\
    \  }\n\nThe adapter still destructures the config to call the domain function with\nindividual params — the domain signatures\
    \ don't change in this track.\n\nWIT record generation:\n  record blur-config { radius: f32 }\n  blur: func(pixels: buffer,\
    \ info: image-info, config: blur-config)\n    -> result<buffer, rasmcore-error>;\n"
plan:
