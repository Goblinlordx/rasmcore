id: stroke-undo_20260407022104Z
title: Tile-based stroke undo stack
type: feature
status: pending
created: '2026-04-07'
updated: '2026-04-07'
spec:
  summary: Stroke-atomic undo with tile-based snapshots. Only tiles overlapping stroke bounding box are captured. Memory-bounded
    with fallback to re-render for old entries.
  context: Drawing requires undo. Each stroke should be a single undo unit. The undo system captures tile-based snapshots
    of only the tiles modified by a stroke, enabling fast undo/redo with bounded memory usage. Integrates with the accumulation
    buffer from the GPU engine.
  codebase_analysis: ''
  acceptance_criteria:
  - UndoStack resource in WIT with push-stroke, undo, redo, clear methods
  - 'Tile-based snapshot: only captures tiles overlapping stroke bounding box'
  - Undo restores pre-stroke tile state, redo re-applies
  - 'Memory budget: configurable max undo entries, oldest entries evicted'
  - 'Round-trip test: draw 3 strokes, undo all 3, verify canvas matches original'
  out_of_scope: Command-based undo (re-render from scratch). Non-stroke undo (filter undo). History branching.
  technical_notes: ''
