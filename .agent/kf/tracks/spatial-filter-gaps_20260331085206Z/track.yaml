id: spatial-filter-gaps_20260331085206Z
title: "Spatial filter gaps — box blur, average, smart sharpen"
type: feature
status: pending
created: 2026-03-31
updated: 2026-03-31
spec:
  summary: >
    Add box blur (separable average kernel), average blur (whole-image
    mean), and smart sharpen (edge-preserving unsharp mask via bilateral).
    Closes 3 PS blur gaps and 1 sharpen gap.
  context: |
    Photoshop has 16 blur types and 5 sharpen types. rasmcore has 8 blur
    types and 1 sharpen type. The 3 simplest PS gaps to close are:

    Box blur: uniform-weight kernel, cheaper than Gaussian. Useful as a
    building block (iterated box blur approximates Gaussian).

    Average: compute whole-image mean color. PS uses this for solid color
    generation from an image.

    Smart Sharpen: edge-aware sharpening that reduces halos. PS's most
    used sharpening tool. Can be built by replacing Gaussian blur in
    unsharp mask with bilateral filter (which we already have).
  codebase_analysis: |
    EXISTING:
    - blur() (filters.rs:812): Gaussian via libblur, SIMD
    - sharpen() (filters.rs:1303): unsharp mask = original + amount*(original - blur)
    - bilateral() (filters.rs:5551): edge-preserving blur, OpenCV parity
    - convolve() (filters.rs:2546): custom kernel convolution

    BOX BLUR:
    - Could use convolve() with uniform kernel, but separable version
      is O(n) instead of O(n*k) — needs dedicated implementation
    - libblur may have box blur support (check crate features)

    SMART SHARPEN:
    - sharpen() uses blur() internally (Gaussian)
    - Replace with bilateral() for edge-preserving variant
    - Add mode param or create separate smart_sharpen filter
  acceptance_criteria:
    - box_blur filter with radius param, separable O(n) implementation
    - average_blur filter that replaces entire image with mean color
    - smart_sharpen filter with amount, radius, sigma_spatial, sigma_range params
    - Box blur matches PS Box Blur output
    - Smart sharpen produces less halo artifacts than standard sharpen
    - All registered with ConfigParams
  out_of_scope: |
    Surface blur (bilateral is close). Shape blur (arbitrary kernel shape).
    Adaptive sharpen (spatially varying).
  technical_notes: |
    Box blur: separable — horizontal pass then vertical pass. Each pass
    uses running sum: add right pixel, subtract left pixel. O(1) per pixel
    regardless of radius.

    Average: sum all pixels, divide by count. Return solid-color image.

    Smart sharpen: same as sharpen() but replace blur() with bilateral().
    Parameters: amount (strength), radius (bilateral sigma_spatial),
    threshold (bilateral sigma_range for edge preservation).
