id: webui-wire-layer-cache_20260403064000Z
title: "Wire up LayerCache in web UI workers for cross-chain caching"
type: bug
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: |
    Web UI pipeline and preview workers never instantiate or attach
    LayerCache, so every processChain call recomputes the full chain
    from scratch. Wire up the existing WASM LayerCache infrastructure.
  context: |
    The WASM component has a fully implemented LayerCache (content-addressed
    cross-pipeline cache using blake3 hashing) exposed via WIT. Three
    prerequisite tracks are completed:
      - pipeline-layer-cache (core implementation)
      - layer-cache-wit (WIT interface)
      - demo-layer-cache (demo integration)

    But the web UI workers (pipeline-worker.ts, preview-worker.ts) never
    call setLayerCache() or setAutoCleanup(). After each writePng, the
    auto-cleanup (default enabled) destroys graph state. The next
    processChain rebuilds everything from scratch — no cache hits.

    This means changing a single parameter on the last node in a 5-node
    chain recomputes all 5 nodes, when it should only recompute the last
    one (upstream nodes have identical content hashes and would cache-hit).
  codebase_analysis: |
    Key files:
    - web-ui/src/pipeline-worker.ts — full-res worker, no LayerCache usage
    - web-ui/src/preview-worker.ts — preview worker, no LayerCache usage
    - wit/image/pipeline.wit:104-116 — layer-cache WIT resource
    - wit/image/pipeline.wit:138-139 — setLayerCache + setAutoCleanup methods
    - crates/rasmcore-pipeline/src/layer_cache.rs — LayerCache impl
    - crates/rasmcore-image/src/adapter/pipeline_adapter.rs:315 — layer_cache default None
    - crates/rasmcore-image/src/adapter/pipeline_adapter.rs:317 — auto_cleanup default true
    - crates/rasmcore-image/src/domain/pipeline/graph.rs:1472-1513 — finalize_layer_cache
    - crates/rasmcore-image/src/domain/pipeline/graph.rs:1552-1564 — cleanup (clears state)

    The SDK JS bindings (generated by jco) already expose:
    - pipeline.LayerCache constructor
    - pipe.setLayerCache(cache)
    - pipe.setAutoCleanup(enabled)
    - cache.stats() returning {hits, misses, entries, bytes}

    Zero references to LayerCache anywhere in web-ui/src/.
  acceptance_criteria:
    - pipeline-worker.ts creates a LayerCache instance at SDK init
    - pipeline-worker.ts calls setLayerCache() on each pipeline instance
    - pipeline-worker.ts disables auto-cleanup via setAutoCleanup(false)
    - preview-worker.ts creates its own LayerCache and wires it up
    - Changing a downstream parameter does NOT recompute unchanged upstream nodes
    - Cache stats (hits/misses) are logged to console for verification
    - No regression in image output quality or correctness
    - Preview latency measurably improves on 3+ node chains (cache hits on upstream)
  out_of_scope: |
    Sharing cache between preview and full-res workers (different image sizes).
    Cache persistence across page reloads.
    Cache memory budget UI controls.
    Changes to the WASM LayerCache implementation itself.
  technical_notes: |
    The fix is straightforward web UI plumbing:

    1. In both workers, after SDK init, create a LayerCache:
       const layerCache = new sdk.pipeline.LayerCache();

    2. After creating each Pipeline instance, wire up the cache:
       pipe.setLayerCache(layerCache);
       pipe.setAutoCleanup(false);

    3. The LayerCache persists across pipeline writes because it is a
       separate WASM resource. Content hashing ensures correct cache
       hits even when the pipeline graph is rebuilt.

    4. Log cache stats after each processChain for debugging:
       const stats = layerCache.stats();
       console.log(`[cache] hits=${stats.hits} misses=${stats.misses}`);

    5. The preview worker already downscales to 400px (PREVIEW_MAX).
       With cache, changing the last param in a chain will only recompute
       that node — all upstream nodes cache-hit on their content hashes.
