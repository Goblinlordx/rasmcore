id: ref-parity-harness_20260412053800Z
title: Parity test harness — validate pipeline filters against reference implementations
type: feature
status: pending
created: 2026-04-12
updated: 2026-04-12
spec:
  summary: |
    Build a test harness that runs every pipeline filter and its corresponding
    reference function on identical inputs, asserting outputs match within
    tolerance. This is the validation layer that makes references meaningful.
  context: |
    We have ~143 reference functions in rasmcore-reference and ~165 pipeline
    filters in rasmcore-pipeline-v2. But zero parity tests exist — nothing
    actually verifies that the reference output matches the pipeline output.
    Without this, references are just more untested code.

    The harness needs:
    1. A mapping table: filter registry name -> reference function
    2. Shared test inputs (gradient, noise, edge cases)
    3. Per-filter tolerance thresholds
    4. A test binary that reports pass/fail per filter
  codebase_analysis: |
    Key APIs:
    - registered_filter_registrations() returns Vec<FilterFactoryRegistration>
      with name, params (ParamDescriptor with default/min/max), factory fn
    - create_filter_node(name, upstream, info, params) -> Box<dyn Node>
    - Graph::new() + add_node() + request_full() to execute pipeline
    - rasmcore_reference::* modules with pub fn taking (input, w, h, ...params)

    The parity test crate depends on both rasmcore-pipeline-v2 and
    rasmcore-reference. It lives at crates/rasmcore-parity-tests/.

    Filter categories with different tolerance needs:
    - Point ops (adjustment, evaluate, color): exact match (1e-6)
    - Spatial ops (blur, sharpen, edge): floating point order (1e-3)
    - Stochastic ops (noise, dither, grain): skip exact match, validate
      statistical properties (mean, variance, range)
    - Generators (solid, gradient, checkerboard): exact output comparison
    - Tools (clone stamp, healing): skip (require interactive input)
    - Analysis (histogram, connected components): non-pixel output
  acceptance_criteria:
    - Parity test crate with mapping table covering all paired filters
    - Shared test inputs (gradient 64x64, noise 32x32, solid colors)
    - Point op filters match reference within 1e-5 tolerance
    - Spatial filters match within 1e-2 tolerance
    - Test report shows pass/fail per filter with max diff
    - Filters without reference are listed as skipped (not failures)
    - All currently-paired filters pass parity
    - cargo test -p rasmcore-parity-tests runs the full suite
  out_of_scope: |
    External tool validation (ImageMagick, OpenCV) — that is the
    reference-tool-crosscheck track. This track validates pipeline vs
    our own reference only.
  technical_notes: |
    The mapping table is a static array of structs:
      struct ParityEntry {
        filter_name: &str,
        reference_fn: fn(&[f32], u32, u32, &ParamMap) -> Vec<f32>,
        tolerance: f32,
        category: ParityCategory, // Exact, Spatial, Statistical, Skip
      }

    For each entry:
    1. Generate test input (gradient or noise based on category)
    2. Build pipeline graph: source -> filter(default_params) -> request_full
    3. Call reference_fn(input, w, h, default_params)
    4. Compare: max_diff(pipeline_output, reference_output) <= tolerance
    5. Report results

    Wrapper functions adapt the reference API (which takes explicit params)
    to the generic (input, w, h, ParamMap) signature.

    The test runs as integration tests in the parity crate, one #[test]
    per filter category to keep output readable.
