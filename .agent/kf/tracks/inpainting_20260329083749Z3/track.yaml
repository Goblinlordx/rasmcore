  out_of_scope: GPU acceleration. Neural network approaches. SIMD optimization deferred to separate track if needed.
  technical_notes: 'Telea: FMM propagates known pixel values into masked region weighted by distance and gradient. Navier-Stokes:
    iterative PDE solving Laplacian of image smoothness along isophotes. Both take image + binary mask + inpaint radius.'
