  summary: 'Two inpainting algorithms from OpenCV: Telea (Fast Marching Method, 2004) and Navier-Stokes (PDE-based isophote
    propagation). Both testable against cv2.inpaint().'
  context: ''
  codebase_analysis: ''
  acceptance_criteria:
