spec:
  summary: Delta E (76/94/2000) color difference metrics, CIE LCH (cylindrical Lab), and CIE Luv color space. All testable
    against colour-science 0.4.7.
  context: ''
  codebase_analysis: ''
  acceptance_criteria:
  - All operations validated against reference implementation (OpenCV/colour-science/GIMP)
  - Reference parity tests added to opencv_parity.rs with fixtures
  - SIMD optimization where applicable (per project feedback)
  - Registered in FilterRegistry with param descriptors
  out_of_scope: GPU acceleration. Neural network approaches. SIMD optimization deferred to separate track if needed.
  technical_notes: 'Delta E 76: Euclidean in Lab. Delta E 94: weighted with kL/kC/kH. Delta E 2000: CIEDE2000 with rotation
    term. LCH: polar(Lab) → (L, C=sqrt(a^2+b^2), H=atan2(b,a)). Luv: XYZ via standard formula with D65.'
