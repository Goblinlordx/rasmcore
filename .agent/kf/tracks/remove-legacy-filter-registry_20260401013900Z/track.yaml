title: Remove legacy FilterRegistry — single-source annotation registration
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Delete the parallel ImageFilter/FilterRegistry/builtin_filter! system from

    filter_registry.rs. All 27 hand-wired filters already have #[register_filter]

    annotations — the legacy runtime registry is unused outside its own tests.

    '
  context: "Two parallel filter registration systems exist:\n\n1. #[register_filter] + inventory + codegen (THE SYSTEM TO\
    \ KEEP):\n   - Proc macro creates StaticFilterRegistration via inventory::submit!()\n   - build.rs parses annotations\
    \ via syn, generates WIT adapter, pipeline\n     nodes, CLI dispatch, param manifest\n   - Detection is link-time via\
    \ inventory crate — just being a cargo\n     dependency is enough, no explicit import needed\n   - This drives ALL runtime\
    \ behavior: WIT dispatch, pipeline graph, SDK\n\n2. ImageFilter trait + FilterRegistry + builtin_filter! (THE SYSTEM TO\
    \ REMOVE):\n   - builtin_filter! macro (filter_registry.rs:462-479) generates struct + impl\n   - 6 manual impl ImageFilter\
    \ blocks for point ops (Gamma, Brightness,\n     Contrast, Invert, Threshold, Posterize) with LUT support\n   - register_builtin_filters()\
    \ (line 910-939) hand-wires 27 filters\n   - FilterRegistry is HashMap<String, Box<dyn ImageFilter>>\n   - UNUSED outside\
    \ its own tests — nothing in adapter, pipeline, or\n     application code references FilterRegistry\n\nSupporting types\
    \ to remove with the legacy system:\n- ImageFilter trait (line 196-262)\n- FilterCategory enum (line 177-190)\n- FilterParams\
    \ struct + ParamValue enum (lines 47-118)\n- ParamDescriptor struct + ParamType enum (lines 120-161)\n- FilterInput struct\
    \ (lines 167-171)\n- builtin_filter! macro (lines 462-479)\n- All builtin_filter!() invocations (~22 entries, lines 486-907)\n\
    - All manual impl ImageFilter blocks (6 point ops, lines 533-696)\n- register_builtin_filters() (lines 910-939)\n- All\
    \ tests using FilterRegistry (lines 941-1068)\n\nTypes to KEEP (used by proc macros and codegen):\n- StaticFilterRegistration\
    \ (line 287)\n- StaticGeneratorRegistration (line 318)\n- StaticCompositorRegistration (line 343)\n- StaticMapperRegistration\
    \ (line 368)\n- ParamDescriptorJson (line 268)\n- inventory::collect!() calls (lines 306, 331, 355, 379)\n- registered_filters/generators/compositors/mappers()\
    \ functions\n"
  codebase_analysis: "EXTERNAL REFERENCES TO LEGACY SYSTEM:\n- FilterRegistry: only filter_registry.rs itself (+ its #[cfg(test)]\
    \ block)\n- ImageFilter trait: only filter_registry.rs\n- builtin_filter!: only filter_registry.rs\n- FilterCategory:\
    \ only filter_registry.rs\n- FilterParams/ParamValue: only filter_registry.rs\n- No adapter, pipeline, CLI, or application\
    \ code uses these types\n\nEXTERNAL REFERENCES TO ANNOTATION SYSTEM (must survive):\n- rasmcore-macros/src/lib.rs: references\
    \ StaticFilterRegistration,\n  StaticGeneratorRegistration, StaticCompositorRegistration,\n  StaticMapperRegistration,\
    \ ParamDescriptorJson\n- rasmcore-filter-spatial/src/lib.rs: calls registered_filters()\n- examples/custom-filter/src/lib.rs:\
    \ calls registered_filters()\n- adapter/mod.rs:616: includes generated_filter_adapter.rs\n\nCROSS-TRACK IMPACT (all 7\
    \ pending tracks assessed):\n- contour-tracing, harris-corner, high-pass, lab-channel-ops,\n  mesh-warp, skeleton-morphology:\
    \ LOW — none reference legacy system,\n  all will use #[register_filter] annotation\n- native-shared-lib: MEDIUM — uses\
    \ codegen dispatch table, not\n  FilterRegistry. Dispatch API (dispatch_filter) is annotation-driven\n  and unaffected\
    \ by this removal.\n\nTESTS TO KEEP (annotation system validation):\n- static_registration_via_proc_macro (line 1070)\
    \ — tests inventory\n- config_params_derive_generates_descriptors (line 1086)\n- config_params_derive_generates_default\
    \ (line 1099)\n\nTESTS TO REMOVE (legacy system only):\n- registry_has_all_builtins (line 947)\n- filter_by_category (line\
    \ 978)\n- apply_filter_via_registry (line 986)\n- custom_filter_registration (line 1009)\n- param_descriptors_populated\
    \ (line 1050)\n- all_filter_names_unique (line 1060)\n"
  acceptance_criteria:
  - All legacy types removed from filter_registry.rs (ImageFilter, FilterRegistry, FilterCategory, FilterParams, ParamDescriptor,
    ParamType, ParamValue, FilterInput, builtin_filter!)
  - All 27 builtin_filter!/manual-impl entries removed
  - register_builtin_filters() removed
  - Annotation-based types preserved (StaticFilterRegistration, ParamDescriptorJson, registered_filters(), inventory::collect!)
  - cargo build succeeds for native target
  - cargo component build succeeds for wasm32-wasip2 target
  - All annotation-system tests pass (static_registration_via_proc_macro, config_params_derive_*)
  - examples/custom-filter still compiles and its test passes
  - docs/extending.md updated to remove references to ImageFilter trait and FilterRegistry
  out_of_scope: '- Changing the #[register_filter] proc macro or codegen system

    - Adding new compile-time validation beyond what removal already provides

    - Modifying any filter implementation functions in filters.rs

    - Changing the inventory crate or StaticFilterRegistration struct

    '
  technical_notes: 'APPROACH:

    This is a pure deletion refactor. No new code needed — just remove the

    legacy parallel system and its tests.


    The key insight: compilation itself becomes the validation. If a filter

    is missing its #[register_filter] annotation, it won''t appear in:

    - generated_filter_adapter.rs (WIT dispatch fails)

    - generated_pipeline_nodes.rs (pipeline can''t use it)

    - generated_cli_dispatch.rs (CLI can''t invoke it)

    - param-manifest.json (SDK doesn''t see it)


    No filter can silently exist only in the legacy registry — removing the

    legacy system makes the annotation system the single source of truth,

    and any gap is immediately visible as a missing WIT function or pipeline

    node.


    INVENTORY DETECTION (answering user question):

    The inventory crate uses linker sections. When #[register_filter] expands,

    it emits inventory::submit!(&STATIC) which places the static in a special

    linker section. At runtime, inventory::iter collects all submissions from

    all linked crates. No explicit import or use statement needed — just being

    a cargo dependency (linked into the binary) is sufficient. This is the

    same mechanism used by frameworks like tracing-subscriber and linkme.


    RISK: Very low. The legacy system is self-contained with no external

    consumers. The annotation system is already the one driving all runtime

    behavior (WIT adapter, pipeline, CLI).

    '
