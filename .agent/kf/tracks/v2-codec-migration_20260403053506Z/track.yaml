id: v2-codec-migration_20260403053506Z
title: V2 codec migration — unified decode→f32 and f32→encode for all 13 formats
type: refactor
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: 'Port all 13 codec formats to unified V2 codec API. Decoders always

    output f32 linear. Encoders always accept f32, apply view transform

    and quantize to output format. No format branching.

    '
  context: "V1 codecs output various formats (Rgb8, Rgba8, Gray8, Rgb32f) and\nthe pipeline has to handle all of them. V2\
    \ simplifies: every decoder\noutputs Rgba32f linear. Every encoder accepts Rgba32f and handles\nquantization internally.\n\
    \nThe ingest pipeline becomes:\n  Codec decode → raw format → Promote (format convert + linearize) → Rgba32f linear\n\n\
    The output pipeline becomes:\n  Rgba32f linear → ViewTransform → Quantize → Codec encode\n\nCodecs that are natively f32\
    \ (EXR, HDR, FITS) skip promote/quantize.\nCodecs that are natively u8 (JPEG, PNG, WebP) get automatic\npromote at ingest\
    \ and quantize+gamma at output.\n"
  acceptance_criteria:
  - All 13 decoders registered via V2 OperationRegistration
  - All decoders output f32 data (native f32 or promoted from u8/u16)
  - sRGB decoders apply linearization at decode (or promote node does)
  - Linear decoders (EXR, HDR, FITS) output linear f32 directly
  - All encoders accept f32 input
  - sRGB encoders apply gamma encoding before quantization
  - EXR/HDR/FITS encoders write linear f32 directly
  - Format auto-detection works with V2 codec registry
  - Multi-frame support (GIF, WebP animated, TIFF multi-page)
  - CPU implementations for all codecs
  out_of_scope: 'New codec formats.

    GPU-accelerated decode/encode (future track).

    Camera RAW decode (future track with IDTs).

    '
