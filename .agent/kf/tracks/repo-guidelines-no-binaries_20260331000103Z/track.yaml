spec:
  summary: |
    Establish and document repository guidelines preventing binary files,
    generated code, and build artifacts from being committed. Add CI
    checks and .gitignore enforcement.
  context: |
    The repo accumulated 10+ MB of generated bindings, fixture binaries,
    and WASM blobs because there were no documented policies or automated
    checks preventing it. This track establishes guidelines, updates the
    code style guides, adds a pre-commit check, and documents the policy
    for future contributors (including AI agents).
  codebase_analysis: |
    CURRENT GUIDELINES:
    - .agent/kf/code_styleguides/ has rust.md, codec-validation.md, param-hints.md
    - No policy on binary files, generated code, or repo size
    - .gitignore covers /target/ and editor files but NOT generated code

    WHAT SHOULD BE DOCUMENTED:
    1. No binary files > 10 KB committed (images, .raw, .wasm, .bin)
    2. No auto-generated code committed (bindings.rs, generated_*.rs)
    3. Test fixtures must be generated programmatically, not committed
    4. Build artifacts (.wasm, .js bundles) belong in .gitignore
    5. Demo SDK builds are ephemeral — built on demand, not committed

    WHERE TO DOCUMENT:
    - .agent/kf/code_styleguides/repo-hygiene.md — new style guide
    - .gitignore — comprehensive patterns
    - CLAUDE.md or equivalent — agent-visible instructions
    - scripts/check-repo-hygiene.sh — automated check
  acceptance_criteria:
    - New code_styleguides/repo-hygiene.md with binary/generated code policies
    - Updated .gitignore with comprehensive patterns for generated files
    - scripts/check-repo-hygiene.sh that fails if binaries > 10 KB are staged
    - CLAUDE.md updated with repo hygiene rules (if exists)
    - Policy documented in product guidelines (if product-guidelines.yaml exists)
    - All current violations identified and listed for remediation
  out_of_scope: |
    Actually removing files (handled by other tracks). CI/CD pipeline setup.
    Git hooks installation (document the hook, don't install it automatically).
  technical_notes: |
    REPO HYGIENE STYLE GUIDE (repo-hygiene.md):

    # Repository Hygiene

    ## No Binary Files
    - Never commit binary files larger than 10 KB
    - Test fixtures must be generated programmatically (see test_fixtures module)
    - Images for tests: use make_gradient_rgb(), solid_rgb(), etc.
    - Exception: font_8x16.bin (1.5 KB embedded bitmap font — too small to matter)

    ## No Generated Code
    - bindings.rs is auto-generated by cargo-component — NEVER commit
    - generated_*.rs files in OUT_DIR — NEVER commit
    - param-manifest.json is build-time output — NEVER commit
    - If a file has "Auto-generated" or "Do not edit" in its header, it should
      not be in git

    ## Build Artifacts
    - *.wasm files belong in target/ or a gitignored output directory
    - demo/sdk/ builds are ephemeral — build with demo/build.sh
    - Node modules (node_modules/) never committed

    ## Adding New Test Fixtures
    1. Write a generator function in the test module
    2. Use LazyLock or inline generation
    3. If the fixture comes from an external tool (e.g., dcraw output),
       document how to regenerate it and keep it under 10 KB

    CHECK SCRIPT (scripts/check-repo-hygiene.sh):
    ```bash
    #!/bin/bash
    # Fail if any staged file is binary and > 10KB
    large=$(git diff --cached --name-only --diff-filter=ACM |
      xargs -I{} sh -c 'test -f "{}" && wc -c < "{}"' 2>/dev/null |
      awk '$1 > 10240 {print}')
    # Check for bindings.rs
    if git diff --cached --name-only | grep -q 'bindings\.rs$'; then
      echo "ERROR: bindings.rs should not be committed (auto-generated)"
      exit 1
    fi
    ```
