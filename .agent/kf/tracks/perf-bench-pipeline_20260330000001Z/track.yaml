id: perf-bench-pipeline_20260330000001Z
title: "Performance Benchmark Pipeline — Decoders, Encoders, Filters vs Reference Tools"
type: feature
status: pending
created: 2026-03-30
updated: 2026-03-30
spec:
  summary: |
    Criterion-based benchmark suite comparing rasmcore decoder/encoder/filter
    performance against reference tools (ImageMagick, libvips, OpenCV, cwebp,
    libjpeg-turbo, ffmpeg). Organized into decoder, encoder, and filter/transform
    groups. Supports running any subset or the full suite, with JSON/Markdown
    report generation.
  context: |
    The project currently has hand-written benchmarks (std::time::Instant) in
    crates/rasmcore-image/tests/bench.rs and parity tests scattered across
    multiple test files. There is no unified way to compare our performance
    against reference implementations, run a subset of benchmarks, or generate
    a report. We need a proper Criterion-based benchmark harness that measures
    our code vs the reference tools on the same inputs and produces comparable
    throughput numbers.
  codebase_analysis: |
    Existing infrastructure:
    - bench.rs uses manual Instant timing (no statistical rigor)
    - scripts/setup-references.sh installs magick, cwebp, libjpeg-turbo, ffmpeg, x265, Python venv
    - scripts/run-reference-tests.sh runs parity tests but not perf benchmarks
    - Parity tests exist for JPEG (parity.rs), WebP (parity.rs), HEVC (parity.rs)
    - Filter parity tests in opencv_parity.rs, filter_reference_parity.rs
    - tests/codec-parity/ has shared helpers (mae, psnr, gradient_rgb, etc.)
    - No criterion dependency anywhere in workspace

    Reference tools available:
    - ImageMagick (magick convert) — decode, encode, filter chains
    - libvips (vipsthumbnail, vips) — decode, encode, filter pipelines
    - cwebp/dwebp — WebP encode/decode
    - libjpeg-turbo (djpeg/cjpeg) — JPEG encode/decode
    - ffmpeg — HEVC decode, general codec ops
    - Python OpenCV — filter operations

    Codec APIs:
    - rasmcore-jpeg: encode(pixels, w, h, format, config), decode(data)
    - rasmcore-webp: encode_pixels(pixels, info, config)
    - rasmcore-image: decode(data), encode(pixels, info, fmt, quality)
    - rasmcore-hevc: feature-gated decode
    - Transforms: resize, crop, rotate, flip
    - Filters: blur, sharpen, grayscale, bilateral, clahe, guided, mertens, etc.
  acceptance_criteria:
    - Criterion benchmark groups for decoders (JPEG, PNG, WebP, HEVC)
    - Criterion benchmark groups for encoders (JPEG, PNG, WebP)
    - Criterion benchmark groups for filters/transforms (blur, sharpen, resize, bilateral, clahe, guided)
    - Pipeline benchmarks comparing multi-op chains vs vips and ImageMagick
    - Each benchmark measures both rasmcore and reference tool on same input
    - cargo bench --bench perf runs the full suite
    - cargo bench --bench perf -- decoder runs only decoder benchmarks
    - cargo bench --bench perf -- encoder/jpeg runs a single encoder
    - JSON and Markdown report generation from Criterion output
    - Report script that collects all results into a single comparison table
  out_of_scope: |
    - WASM benchmarks (native only for this track)
    - Perceptual quality metrics (SSIM, butteraugli) — those are parity tests
    - Modifying any existing codec or filter implementation
    - CI/CD integration (local-only for now)
  technical_notes: |
    Use Criterion.rs for statistical benchmarking. Reference tools are invoked
    via std::process::Command (shell out to magick, vips, cwebp, etc.).
    Benchmark inputs are the canonical test images at multiple sizes (256, 512,
    1024, 2048). Fixture generation is idempotent via hash checks.

    For pipeline benchmarks, compare equivalent operation chains:
    - decode JPEG + resize 50% + sharpen + encode JPEG q85
    - decode PNG + bilateral + clahe + encode PNG
    These are run as single commands in vips/magick and as our pipeline API.

    Group structure in Criterion:
    - decoder/{jpeg,png,webp,hevc}/{256,512,1024}
    - encoder/{jpeg,png,webp}/{256,512,1024}/{q75,q85,q95}
    - filter/{blur,sharpen,resize,bilateral,clahe,guided}/{256,512,1024}
    - pipeline/{decode-resize-sharpen-encode,decode-bilateral-clahe-encode}/{256,1024}

    Report script reads Criterion JSON from target/criterion/ and produces
    a Markdown table and JSON summary comparing rasmcore vs each reference.
