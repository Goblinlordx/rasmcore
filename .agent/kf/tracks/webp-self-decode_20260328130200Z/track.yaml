id: webp-self-decode_20260328130200Z
title: VP8 Self-Decode Verification — Trace, Replay, Find, Fix
type: bug
status: pending
created: 2026-03-28
updated: "2026-03-28"
spec:
  summary: |
    Find the VP8 encoder bug by recording every bool operation during encoding,
    then replaying the output with BoolReader to find the exact divergence point.
    Fix the root cause. Validate at all sizes up to 4096x4096. MUST result in
    a fully working encoder.
  context: |
    Seven previous conformance tracks have fixed reconstruction, probabilities,
    token trees, skip optimization, context tracking, and mode encoding. The
    encoder works at up to 32x32 but fails at 64x64+ with a non-monotonic,
    content-dependent pattern. Every individual component has been verified
    correct in isolation, but the assembled encoder still produces invalid
    bitstreams for larger images.

    The fundamental problem with all previous debugging: we guessed at what
    was wrong. This track takes a deterministic approach — record what the
    encoder writes, replay what the decoder reads, find the first mismatch.

    Key insight: we have BOTH a BoolWriter and BoolReader in boolcoder.rs.
    They roundtrip correctly for arbitrary sequences. If we record the exact
    sequence of (probability, value) pairs that the encoder writes during
    a FULL encode, then decode the output bytes with BoolReader using the
    SAME probability sequence, any mismatch means the encoder and decoder
    disagree on what to write/read at that point.

    The encoder writes two partitions: first partition (frame header + MB modes)
    and token partition (coefficients). We must trace BOTH separately since
    the decoder reads them from two separate bool decoders.
  codebase_analysis: |
    Key files:
    - boolcoder.rs: BoolWriter + BoolReader, verified correct
    - bitstream.rs: encode_frame, encode_first_partition, encode_macroblock
    - token.rs: encode_block (coefficient token encoding)

    The trace approach:
    1. Add a Vec<(u8, bool)> trace log to encode_first_partition and
       encode_macroblock/encode_block
    2. Encode a 64x64 solid gray image (smallest failing case)
    3. Take the output bytes for each partition
    4. Use BoolReader to read each (probability, value) pair from the trace
    5. If BoolReader reads a different value than what was traced,
       print the position and stop — that is the bug location

    This approach is 100% deterministic. The BoolWriter and BoolReader
    are verified to be inverses of each other. If the encoder produces
    bytes that the decoder (using the same probability sequence) reads
    differently, it means the probability sequence the encoder THOUGHT
    it was using differs from what the decoder expects.

    The most likely finding: the encoder and decoder use DIFFERENT
    probability sequences for the same data. This could be because:
    - The first partition and token partition boundaries are wrong
    - The MB mode encoding sequence differs from what the decoder reads
    - The token partition has blocks in a different order
    - Some header field is a different size than expected
  acceptance_criteria:
    - Self-decode trace identifies the exact first divergence point
    - Root cause identified and documented
    - Fix implemented
    - Solid images 16x16 through 4096x4096 decodable by both dwebp and image-webp
    - Gradient images 16x16 through 2048x2048 decodable
    - Ramp content 16x16 through 1024x1024 decodable
    - Quality levels q10/q25/q50/q75/q95 all produce decodable output at 512x512
    - PSNR above 25dB at q75 for 256x256 gradient
    - Determinism verified (encode twice = identical bytes)
    - WASM SIMD path validated via wasmtime
    - Regression test added encoding 1024x1024 and asserting decode
    - All existing unit tests pass
    - Full validate.sh passes
  out_of_scope: |
    - File size optimization
    - Loop filter re-enablement
    - mb_no_coeff_skip re-enablement
    - B_PRED mode support
  technical_notes: |
    Implementation:

    Phase 1: Build the tracing infrastructure
      Add a debug_trace feature flag to rasmcore-webp:
      ```rust
      #[cfg(feature = "debug_trace")]
      thread_local! { static TRACE: RefCell<Vec<(u8, bool)>> = ... }
      ```
      Or simpler: just add a trace parameter to the test.

      For each partition, collect Vec<(u8, bool)> — every put_bit(prob, val)
      call during encoding. Then after encoding, create a BoolReader from
      the output bytes and replay the trace, asserting each read matches.

    Phase 2: Run the trace on the smallest failing image
      Encode 64x64 solid gray (16 MBs, first failing size for solid).
      The trace will have ~thousands of entries. The first mismatch
      reveals exactly which encoding step is wrong.

    Phase 3: Analyze and fix
      The mismatch will be at a specific position in the trace. Map that
      position back to the encoding function:
      - If in the first partition: which header field or MB mode?
      - If in the token partition: which block, which coefficient,
        which tree node?

      Fix the specific encoding step that produces the wrong bit.

    Phase 4: Validate exhaustively
      After the fix, test at all sizes and content types.
      Add regression tests. Run WASM validation.
