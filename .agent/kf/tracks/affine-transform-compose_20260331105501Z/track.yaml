id: affine-transform-compose_20260331105501Z
title: Affine Transform Composition — Single-Resample Quality Optimization
type: feature
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: 'Add an AffineOp trait on transform ConfigParams/nodes that exposes a 2x3 affine matrix. The pipeline optimizer
    composes consecutive affine transforms into a single matrix and resamples once, eliminating multi-pass interpolation quality
    loss.

    '
  context: 'When a pipeline chains resize -> rotate -> flip, each transform

    resamples the image independently. Each resample pass introduces

    interpolation artifacts (softening, ringing). Composing the

    transforms into a single affine matrix and resampling once gives

    both better quality (one interpolation) and better performance

    (one pass instead of N).


    This is how Photoshop and libvips handle transform chains. The

    codebase already has transform::affine() with full 2x3 matrix

    support and bilinear interpolation. All existing transform nodes

    (resize, crop, rotate, flip) are expressible as affine matrices.


    This is a QUALITY optimization first, performance second. The

    single-resample result is measurably sharper than multi-resample.

    '
  codebase_analysis: "EXISTING AFFINE INFRASTRUCTURE (transform.rs):\n- affine(pixels, info, matrix: &[f64; 6], out_w, out_h,\
    \ bg) -> Result\n- Matrix format: [a, b, tx, c, d, ty] representing:\n  x' = a*x + b*y + tx\n  y' = c*x + d*y + ty\n-\
    \ Inverse mapping with bilinear interpolation\n- WASM32 f32x4 SIMD path + scalar f64 fallback\n\nTRANSFORM NODES (pipeline/nodes/transform.rs):\n\
    - ResizeNode: target_width, target_height, filter\n- CropNode: x, y, width, height\n- RotateNode: rotation (R90, R180,\
    \ R270)\n- FlipNode: direction (Horizontal, Vertical)\n- AutoOrientNode: ExifOrientation (8 codes)\n\nAFFINE MATRIX REPRESENTATIONS:\n\
    - Resize: [sx, 0, 0, 0, sy, 0] where sx=tw/sw, sy=th/sh\n- Crop: [1, 0, -x, 0, 1, -y] (translation, output dims = crop\
    \ dims)\n- Rotate90: [0, -1, h, 1, 0, 0] (swap axes)\n- Rotate180: [-1, 0, w, 0, -1, h]\n- Rotate270: [0, 1, 0, -1, 0,\
    \ w]\n- FlipH: [-1, 0, w, 0, 1, 0]\n- FlipV: [1, 0, 0, 0, -1, h]\n\nCOMPOSITION: multiply two 2x3 matrices (treating as\
    \ 3x3 with [0,0,1]):\n- [a1,b1,tx1] * [a2,b2,tx2] = [a1*a2+b1*c2, a1*b2+b1*d2, a1*tx2+b1*ty2+tx1]\n- [c1,d1,ty1]   [c2,d2,ty2]\
    \   [c1*a2+d1*c2, c1*b2+d1*d2, c1*tx2+d1*ty2+ty1]\n\nEWA RESAMPLER (ewa.rs):\n- Uses Jacobian (2x2 differential) for nonlinear\
    \ distortions\n- Orthogonal to affine composition (different transform model)\n- Could potentially use the composed affine\
    \ Jacobian for quality\n  resampling, but that's a stretch goal\n\nRESAMPLING FILTERS:\n- Resize uses fast_image_resize\
    \ (Nearest, Bilinear, Bicubic, Lanczos3)\n- affine() uses bilinear only (hardcoded)\n- Composed transform should use the\
    \ highest-quality filter from the chain\n"
  acceptance_criteria:
  - AffineOp trait exists with to_affine_matrix() method
  - ResizeNode, CropNode, RotateNode, FlipNode implement AffineOp
  - Pipeline optimizer detects consecutive AffineOp nodes
  - Consecutive affine nodes compose into single matrix + one resample
  - Output dimensions correctly computed from composed transform
  - Single-resample output is visually sharper than multi-resample
  - Pixel-difference test showing single-resample has less interpolation loss
  - Resampling filter selection uses highest quality from the chain
  - docs/extending.md updated with AffineOp section
  - implementation-rules.md updated with AffineOp guidance
  out_of_scope: 'Perspective (projective) transforms — only 2D affine (6 params).

    Nonlinear distortions (barrel, swirl) — those use EWA/Jacobian.

    GPU-accelerated resampling. Lanczos for affine() (currently bilinear).

    '
  technical_notes: "DESIGN (follows LutPointOp pattern):\n\n1. AffineOp Trait (in transform.rs or pipeline/graph.rs)\n   ```rust\n\
    \   pub trait AffineOp {\n       /// Return the 2x3 affine matrix [a, b, tx, c, d, ty]\n       /// and the output dimensions\
    \ for this transform.\n       fn to_affine(&self) -> ([f64; 6], u32, u32);\n   }\n   ```\n\n2. Implement on transform\
    \ nodes directly (not ConfigParams, since\n   transform nodes are hand-written, not codegen'd)\n   ```rust\n   impl AffineOp\
    \ for ResizeNode {\n       fn to_affine(&self) -> ([f64; 6], u32, u32) {\n           let sx = self.target_width as f64\
    \ / self.source_info.width as f64;\n           let sy = self.target_height as f64 / self.source_info.height as f64;\n\
    \           ([sx, 0.0, 0.0, 0.0, sy, 0.0], self.target_width, self.target_height)\n       }\n   }\n   ```\n\n3. Matrix\
    \ Composition\n   ```rust\n   fn compose_affine(a: &[f64; 6], b: &[f64; 6]) -> [f64; 6] {\n       // Standard 2x3 matrix\
    \ multiplication (homogeneous)\n   }\n   ```\n   Output dimensions: compute bounding box of transformed corners\n\n4.\
    \ Pipeline Integration\n   Add as_affine_op() to ImageNode trait\n   Transform nodes override it\n   Optimizer walks DAG,\
    \ composes consecutive affine nodes\n   Replaces chain with single ComposedAffineNode\n\n5. ComposedAffineNode\n   Stores\
    \ composed matrix + output dims + resample filter\n   compute_region calls transform::affine() with the composed matrix\n\
    \n6. Quality: use the highest-quality ResizeFilter from the chain\n   (Lanczos3 > Bicubic > Bilinear > Nearest)\n\n7.\
    \ Documentation\n   Update docs/extending.md with AffineOp section\n   Update implementation-rules.md with transform composition\
    \ guidance\n"
