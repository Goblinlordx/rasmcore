id: v2-registration-system_20260403053501Z
title: V2 registration system — unified build-time registration for all operations
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: |
    Single, uniform registration system for filters, codecs, transforms,
    and color space conversions. Everything registers through the same
    trait-based mechanism at build time. Zero built-in exceptions.
  context: |
    V1 has three separate registration systems:
    - #[register_filter] macro for 210 filters (via inventory crate)
    - StaticEncoderRegistration / StaticDecoderRegistration for codecs
    - Manual node creation for transforms (resize, crop, rotate)

    V2 unifies all of these into a single Registration trait. The
    pipeline foundation knows nothing about what's registered — it
    just sees trait objects. A blur filter, a JPEG encoder, and a
    resize transform all register the same way.

    This means the pipeline crate has zero hardcoded knowledge of
    any specific operation. You could ship a pipeline with zero
    filters and add them all via external crates.
  codebase_analysis: |
    V1 registration count:
    - 210 #[register_filter] instances
    - 13 codec formats (separate encoder/decoder registrations)
    - ~7 manual transform node types
    - Build-time codegen in rasmcore-codegen (5,638 LOC) parses these

    V1 codegen pipeline:
    1. build.rs reads source files
    2. rasmcore-codegen parses #[register_filter] attributes
    3. Generates pipeline node structs, WIT interface methods, config records
    4. Writes to OUT_DIR for include!()

    V2 simplification:
    - Unify filter/codec/transform into OperationRegistration
    - Derive macro generates the registration + Node impl
    - No separate codegen for WIT (WIT generated from registrations)
    - inventory crate collects registrations at link time (no build.rs AST parsing)
  acceptance_criteria:
    - Single OperationRegistration trait for all operation types
    - derive(Operation) macro generates registration + Node impl
    - Filter, Codec, Transform are categories within the same system
    - Build-time collection via inventory (no runtime registration)
    - Operation metadata queryable (name, category, params, GPU capability)
    - Parameter descriptors auto-generated from struct fields
    - No hardcoded operation knowledge in pipeline crate
    - Backward compat shim for gradual V1 filter migration
    - CPU and GPU implementations registered through same trait
  out_of_scope: |
    WIT generation from registrations (Track 8).
    Actual filter/codec migration (Tracks 6-7).
  technical_notes: |
    Unified registration:

    #[derive(Operation)]
    #[operation(
        name = "blur",
        category = "spatial",
        kind = "filter",       // filter | encoder | decoder | transform
        gpu = true,
    )]
    struct Blur {
        #[param(min = 0.0, max = 100.0, default = 3.0)]
        radius: f32,
    }

    impl Filter for Blur {
        fn compute(&self, input: &[f32], w: u32, h: u32) -> Vec<f32> { ... }
    }

    impl GpuFilter for Blur {
        fn shader_body(&self) -> &str { include_str!("blur.wgsl") }
        fn params(&self, w: u32, h: u32) -> Vec<u8> { ... }
    }

    // Registration is automatic via derive — no manual inventory::submit!

    The derive macro generates:
    - OperationRegistration with metadata
    - Node wrapper that implements pipeline_v2::Node
    - Parameter descriptors for UI/WIT
    - inventory::submit! for build-time collection

    Query API:
    fn registered_operations() -> Vec<&'static OperationRegistration>
    fn find_operation(name: &str) -> Option<&'static OperationRegistration>
    fn operations_by_category(cat: &str) -> Vec<&'static OperationRegistration>
