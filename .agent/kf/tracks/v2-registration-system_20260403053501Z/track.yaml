id: v2-registration-system_20260403053501Z
title: V2 registration system — unified build-time registration for all operations
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: 'Single, uniform registration system for filters, codecs, transforms,

    and color space conversions. Everything registers through the same

    trait-based mechanism at build time. Zero built-in exceptions.

    '
  context: 'V1 has three separate registration systems:

    - #[register_filter] macro for 210 filters (via inventory crate)

    - StaticEncoderRegistration / StaticDecoderRegistration for codecs

    - Manual node creation for transforms (resize, crop, rotate)


    V2 unifies all of these into a single Registration trait. The

    pipeline foundation knows nothing about what''s registered — it

    just sees trait objects. A blur filter, a JPEG encoder, and a

    resize transform all register the same way.


    This means the pipeline crate has zero hardcoded knowledge of

    any specific operation. You could ship a pipeline with zero

    filters and add them all via external crates.

    '
  codebase_analysis: 'V1 registration count:

    - 210 #[register_filter] instances

    - 13 codec formats (separate encoder/decoder registrations)

    - ~7 manual transform node types

    - Build-time codegen in rasmcore-codegen (5,638 LOC) parses these


    V1 codegen pipeline:

    1. build.rs reads source files

    2. rasmcore-codegen parses #[register_filter] attributes

    3. Generates pipeline node structs, WIT interface methods, config records

    4. Writes to OUT_DIR for include!()


    V2 simplification:

    - Unify filter/codec/transform into OperationRegistration

    - Derive macro generates the registration + Node impl

    - No separate codegen for WIT (WIT generated from registrations)

    - inventory crate collects registrations at link time (no build.rs AST parsing)

    '
  acceptance_criteria:
  - Single OperationRegistration trait for all operation types
  - derive(Operation) macro generates registration + Node impl
  - Filter, Codec, Transform are categories within the same system
  - Build-time collection via inventory (no runtime registration)
  - Operation metadata queryable (name, category, params, GPU capability)
  - Parameter descriptors auto-generated from struct fields
  - No hardcoded operation knowledge in pipeline crate
  - Backward compat shim for gradual V1 filter migration
  - CPU and GPU implementations registered through same trait
  - Contextual param validation at graph build time — params validated against upstream NodeInfo (e.g., crop rect within source
    dimensions)
  - ParamConstraint supports static (min/max) and contextual (upstream.width, upstream.height) bounds
  - Graph::connect() automatically validates params against upstream context, returns error on violation
  out_of_scope: 'WIT generation from registrations (Track 8).

    Actual filter/codec migration (Tracks 6-7).

    '
  technical_notes: "Unified registration:\n\n#[derive(Operation)]\n#[operation(\n    name = \"blur\",\n    category = \"spatial\"\
    ,\n    kind = \"filter\",\n    gpu = true,\n)]\nstruct Blur {\n    #[param(min = 0.0, max = 100.0, default = 3.0, hint\
    \ = \"log_slider\")]\n    radius: f32,\n}\n\nThe derive macro generates:\n- OperationRegistration with metadata\n- Node\
    \ wrapper that implements pipeline_v2::Node\n- ParamDescriptor for UI/WIT/host SDK\n- ParamValidator for contextual validation\n\
    - inventory::submit! for build-time collection\n\nTHREE-LEVEL PARAM VALIDATION:\n\n1. STATIC (at construction):\n   Checked\
    \ by derive macro generated constructor.\n   Uses ParamDescriptor min/max/step constraints.\n   Example: blur.radius must\
    \ be in [0.0, 100.0]\n\n   #[param(min = 0.0, max = 100.0)]\n   radius: f32,\n\n2. CONTEXTUAL (at graph build time):\n\
    \   Checked when node is connected to upstream.\n   Uses ParamConstraint rules that reference upstream NodeInfo.\n   Example:\
    \ crop rect must be within source dimensions.\n\n   #[param(max_w = \"upstream.width\", max_h = \"upstream.height\")]\n\
    \   crop_rect: Rect,\n\n   The constraint evaluator receives upstream NodeInfo and checks:\n   - crop_rect.x + crop_rect.width\
    \ <= upstream.width\n   - crop_rect.y + crop_rect.height <= upstream.height\n\n   Implementation:\n\n   enum ParamConstraint\
    \ {\n       Static { min: f64, max: f64 },\n       ContextualRect { max_w: ContextRef, max_h: ContextRef },\n       ContextualScalar\
    \ { max: ContextRef },\n       Custom(Box<dyn Fn(&ParamValue, &[NodeInfo]) -> Result<()>>),\n   }\n\n   enum ContextRef\
    \ {\n       UpstreamWidth,   // upstream.info().width\n       UpstreamHeight,  // upstream.info().height\n       Literal(f64),\n\
    \   }\n\n   Graph::connect() calls:\n     node.validate_params(&upstream_infos)?;\n\n3. DYNAMIC (at staged execution bind\
    \ time):\n   Checked when analysis results are bound to params.\n   Same validators run, but with runtime-computed values.\n\
    \   Example: smart_crop analyzer returns Rect -> validate against source dims.\n\nAll three levels use the SAME ParamConstraint\
    \ rules. The difference\nis when they run and what context is available.\n\nQuery API:\nfn registered_operations() ->\
    \ Vec<&OperationRegistration>\nfn find_operation(name: &str) -> Option<&OperationRegistration>\nfn operations_by_category(cat:\
    \ &str) -> Vec<&OperationRegistration>\nfn param_descriptors(op: &str) -> Vec<ParamDescriptor>"
