id: webp-crate-scaffold_20260328054401Z
title: rasmcore-webp Crate Scaffold — Workspace, Types, Public API
type: chore
status: pending
created: 2026-03-28
updated: '2026-03-28'
spec:
  summary: 'Create the rasmcore-webp crate as a new workspace member with the module

    structure, public API, core types, and error handling defined by the research

    track. No encoding logic yet — just the skeleton.

    '
  context: 'This crate follows the per-format codec module pattern from product.yaml.

    It will be a standalone pure Rust VP8 encoder with no WIT dependencies.

    rasmcore-image will depend on it for WebP lossy encoding.


    The crate structure comes from the research track design document.

    '
  codebase_analysis: '- Workspace at Cargo.toml already has rasmcore-pipeline and rasmcore-image

    - New member: crates/rasmcore-webp

    - Must follow same edition/version workspace settings

    - No image crate dependency — this is a standalone VP8 encoder

    - Public API: encode(pixels, width, height, config) -> Result<Vec<u8>, Error>

    '
  acceptance_criteria:
  - crates/rasmcore-webp/ directory created with Cargo.toml
  - Crate added to workspace members in root Cargo.toml
  - Module structure matches research design document
  - Core types defined (WebpEncodeConfig, PixelFormat, Error)
  - Public API function signatures defined (encode, returning stub errors)
  - cargo check -p rasmcore-webp compiles successfully
  - cargo test -p rasmcore-webp runs (even if tests are trivial)
  out_of_scope: '- Any actual encoding logic

    - WIT integration (that is in the integration track)

    - Lossless encoding (kept in image-webp)

    '
  technical_notes: "The crate should expose a minimal public API:\n\n  pub fn encode(pixels: &[u8], width: u32, height: u32,\
    \ config: &EncodeConfig)\n    -> Result<Vec<u8>, EncodeError>;\n\nEncodeConfig contains: quality (u8), method (encoding\
    \ speed preset).\nEncodeError is a domain error enum.\n\nInternal modules (from research design):\n- color: RGB to YUV420\
    \ conversion\n- block: macroblock structure and partitioning\n- predict: intra-prediction modes\n- dct: 4x4 DCT and inverse\
    \ DCT\n- quant: quantization tables and quality mapping\n- boolcoder: VP8 boolean arithmetic encoder\n- bitstream: VP8\
    \ bitstream assembly and RIFF container\n- filter: loop filter\n- ratecontrol: quality-to-quantizer mapping\n"
