id: op-docs-macro_20260404083000Z
title: Operation documentation macro and docs builder
type: feature
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: |
    Add doc capture to V2Filter/V2Encoder/V2Decoder derive macros. Struct doc
    comments become operation description, field doc comments become param
    descriptions, and an # Example section becomes the usage example. Docs are
    gated behind a feature flag (zero cost in WASM/bin). A docs builder binary
    renders per-operation pages from the registry.
  context: |
    Operations are defined with derive macros (#[derive(V2Filter)]) and registered
    via inventory. Currently the registration structs (FilterFactoryRegistration,
    EncoderFactoryRegistration, DecoderFactoryRegistration) carry name, category,
    params — but no description, no examples, no param descriptions. Documentation
    lives only in Rust doc comments that are invisible to the runtime/SDK/UI.

    The user wants: documentation defined beside the implementation, automatically
    collected, and renderable into per-operation doc pages. For WASM and normal
    binaries, doc strings should be dropped (zero binary size cost). A separate
    docs builder compiles with docs enabled and generates the output.
  codebase_analysis: |
    Derive macros (crates/rasmcore-macros/src/lib.rs):
    - V2Filter (lines 1088-1246): parses #[filter(name, category)], #[param(...)], generates
      FilterFactoryRegistration + inventory::submit!
    - V2Encoder (lines 1262-1382): parses #[codec(name, display_name, mime, extensions)]
    - V2Decoder (lines 1399-1459): parses #[codec(name, display_name, extensions)]
    - Macros already extract field types and attributes but NOT doc comments

    Registration structs (crates/rasmcore-pipeline-v2/src/registry.rs):
    - FilterFactoryRegistration: name, display_name, category, params, factory (no description)
    - EncoderFactoryRegistration: name, display_name, mime, extensions, params, encode
    - DecoderFactoryRegistration: name, display_name, extensions, detect, decode
    - OperationRegistration: name, display_name, category, kind, params, capabilities
    - ParamDescriptor: name, value_type, min, max, step, default_val, hint (no description)

    dump_registry binary (crates/rasmcore-v2-wasm/src/bin/dump_registry.rs):
    - Serializes registry to JSON for SDK generation
    - Could include doc fields when docs feature is enabled

    Rust doc comments on structs are available to proc macros via #[doc = "..."]
    attributes on the token stream. The macro can extract them.
  acceptance_criteria:
    - Derive macros capture struct-level doc comments as operation description
    - Derive macros capture field-level doc comments as param descriptions
    - Derive macros extract # Example section from struct docs as usage example
    - Doc strings stored in registration structs as &'static str fields
    - Behind cfg(feature = "docs") — compiles to empty strings without the feature
    - WASM build does not include doc strings (no binary size impact)
    - Docs builder binary (cargo run --bin build-docs --features docs) renders pages
    - Each operation gets a page with description, params table, and example
    - dump_registry includes doc fields when built with docs feature
  out_of_scope: |
    Rich HTML rendering or static site generator. Interactive examples.
    Versioning or changelog. Param validation docs beyond what the schema provides.
  technical_notes: |
    Architecture:

    1. Macro changes (rasmcore-macros/src/lib.rs):
       - Extract #[doc = "..."] attributes from struct item (concatenate lines)
       - Split at "# Example" heading: before = description, after = example
       - Extract #[doc = "..."] from each #[param] field
       - Emit these as &'static str fields in the registration struct
       - Gate with: if cfg!(feature = "docs") { "the doc string" } else { "" }
       - Actually, cfg in proc macro output uses: #[cfg(feature = "docs")] on the
         doc string const, with a fallback empty string. Or simpler: always emit
         the string but the registration struct field is Option<&'static str> and
         the macro emits None when docs feature is off.

    2. Registry struct changes (registry.rs):
       - Add to FilterFactoryRegistration: description: &'static str, example: &'static str
       - Add to ParamDescriptor: description: &'static str
       - Add same to Encoder/Decoder registrations
       - Default to "" for all (backward compatible)

    3. Feature flag:
       - Add "docs" feature to rasmcore-pipeline-v2 and rasmcore-macros Cargo.toml
       - Macro checks: if docs feature is enabled, emit actual strings
       - If not enabled, emit empty strings ("")
       - Zero binary impact for WASM builds

    4. Docs builder (new binary: crates/rasmcore-docs/src/main.rs or bin in pipeline-v2):
       - cargo run --bin build-docs --features docs
       - Iterates all registrations via inventory
       - For each op: renders Markdown page with title, description, params table, example
       - Output to docs/operations/ directory
       - Could also output JSON for web-based docs viewer

    5. Annotate existing filters:
       - Add doc comments to brightness, contrast, and 1-2 others as proof of concept
       - Not all filters need docs immediately — empty string is the default
