id: op-docs-macro_20260404083000Z
title: Operation documentation macro and SSG docs site
type: feature
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: |
    Add doc capture to V2 derive macros, gate behind feature flag, and build
    a static site generator that renders per-operation pages plus injected
    manual pages into a deployable HTML documentation site.
  context: |
    Operations are defined with derive macros and registered via inventory.
    Currently the registration structs carry name, category, params — but no
    description, no examples, no param descriptions. Documentation lives only
    in Rust doc comments invisible to runtime/SDK/UI.

    The user wants:
    1. Documentation defined beside the implementation (doc comments on structs/fields)
    2. Automatically collected into registry metadata
    3. Rendered into a static HTML documentation site (SSG)
    4. Per-operation pages auto-generated from registry
    5. Additional manual pages (guides, tutorials) injectable alongside
    6. Zero binary cost for WASM/bin (feature-gated)
  codebase_analysis: |
    Derive macros (crates/rasmcore-macros/src/lib.rs):
    - V2Filter (lines 1088-1246): parses #[filter(name, category)], #[param(...)],
      generates FilterFactoryRegistration + inventory::submit!
    - V2Encoder (lines 1262-1382): parses #[codec(name, display_name, mime, extensions)]
    - V2Decoder (lines 1399-1459): parses #[codec(name, display_name, extensions)]
    - Macros extract field types and attributes but NOT doc comments yet

    Registration structs (crates/rasmcore-pipeline-v2/src/registry.rs):
    - FilterFactoryRegistration: name, display_name, category, params, factory
    - ParamDescriptor: name, value_type, min, max, step, default_val, hint
    - No description/example fields on any struct

    dump_registry binary: serializes registry to JSON, could include doc fields.
    Rust doc comments available to proc macros via #[doc = "..."] attributes.
  acceptance_criteria:
    - Derive macros capture struct doc comments as operation description
    - Derive macros capture field doc comments as param descriptions
    - Derive macros extract # Example section from struct docs as usage example
    - Doc strings stored in registration structs as &'static str
    - Behind cfg(feature = "docs") — empty strings without it
    - WASM build has no binary size increase
    - SSG binary outputs static HTML site to docs/build/
    - Index page lists all operations grouped by category with links to detail pages
    - Each operation gets an HTML page with description, params table, example
    - Cross-linking between operations (see-also references render as clickable links)
    - Auto-generated sitemap.json for programmatic navigation
    - Manual pages from docs/pages/*.md are rendered into the same site
    - Site has navigation sidebar with categories and manual pages
    - dump_registry with docs feature includes doc fields in JSON
  out_of_scope: |
    Interactive examples. Search. Versioning/changelog.
    Complex theming or CSS framework. Client-side JS.
  technical_notes: |
    Architecture:

    1. Macro changes (rasmcore-macros):
       - Extract #[doc = "..."] from struct → description (before # Example)
       - Extract # Example section → example code block
       - Extract #[doc = "..."] from #[param] fields → param description
       - Gate: cfg(feature = "docs") emits real strings, else ""

    2. Registry struct changes (registry.rs):
       - Add description, example to FilterFactoryRegistration
       - Add description to ParamDescriptor
       - Same for Encoder/Decoder registrations
       - Default "" (backward compatible)

    3. SSG docs builder (scripts/build-docs.mjs or crates/rasmcore-docs):
       - Step 1: Run dump_registry --features docs → JSON with doc strings
       - Step 2: Read manual pages from docs/pages/*.md (frontmatter: title, order, section)
       - Step 3: Render HTML using a minimal template:
         - Shared layout: nav sidebar + content area
         - Nav groups: Operations by category + Manual pages by section
         - Operation pages: title, description (rendered markdown), params table, example
         - Manual pages: title, rendered markdown content
       - Step 4: Output to docs/build/ (static HTML + CSS, no JS required)
       - Use a markdown-to-HTML library (marked for Node, pulldown-cmark for Rust)

    4. Manual page format (docs/pages/getting-started.md):
       ```
       ---
       title: Getting Started
       section: Guides
       order: 1
       ---
       # Getting Started
       Content here...
       ```

    5. Build command: scripts/build-docs.sh
       - Builds dump_registry with docs feature
       - Runs SSG script
       - Output: docs/build/ ready to deploy

    Node.js SSG is simpler (marked + handlebars in ~100 lines) and consistent
    with existing SDK generation scripts. Rust binary is an option if we want
    zero external deps.
