id: demo-composition-ui_20260330001201Z
title: Demo Composition UI — Multi-Image Layer Panel
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-29'
spec:
  summary: 'Add a layer panel to the demo pipeline builder for loading multiple images, compositing with blend modes, and
    offset positioning. Each layer is a separate image source that feeds into the pipeline DAG.

    '
  context: "The pipeline builder currently supports single-image linear chains only.\nThe composite operation is explicitly\
    \ skipped in the palette. With the\nmulti-image pipeline track providing blend mode support in the pipeline\nand fluent\
    \ SDK, the demo needs a UI to exercise these capabilities.\n\nCommon use cases:\n  - Watermarking (overlay logo on photo)\n\
    \  - Photo collage (multiple images arranged on canvas)\n  - Layer effects (blend modes between images)\n  - Before/after\
    \ comparison (side-by-side or overlay)\n\nDesign: a layer panel on the left side where users can add image layers.\nEach\
    \ layer has its own source image and can have its own filter chain.\nLayers are composited in order (bottom to top) with\
    \ configurable blend\nmode and offset per layer.\n"
  acceptance_criteria:
  - Users can load multiple images as separate layers
  - Each layer shows a thumbnail preview
  - Layers can be reordered (drag-and-drop)
  - Each layer has blend mode selector (dropdown with all 9 modes + over)
  - Each layer has x/y offset controls
  - Each layer can have its own filter chain applied before compositing
  - Live preview shows the composited result
  - Layer visibility toggle (eye icon)
  - Remove layer button
  - Base layer (bottom) has no blend mode (it is the background)
  - Get Code button generates correct multi-image SDK code
  out_of_scope: 'Layer opacity slider (beyond blend mode). Layer masks.

    Canvas resize/crop for final output dimensions.

    Drag-to-position layers on the canvas (use numeric x/y controls).

    '
  technical_notes: "UI layout change:\n  Add a Layers panel (collapsible) between the palette and the chain area.\n  Each\
    \ layer card shows: thumbnail, name, blend mode dropdown, x/y inputs,\n  visibility toggle, remove button.\n\nPipeline\
    \ construction:\n  Base layer: pipe.read(layer0.bytes) -> apply layer0 chain\n  Layer 1: pipe.read(layer1.bytes) -> apply\
    \ layer1 chain\n  Composite: pipe.composite(layer1_node, base_node, x, y, blend_mode)\n  Layer 2: pipe.read(layer2.bytes)\
    \ -> apply layer2 chain\n  Composite: pipe.composite(layer2_node, composite1_node, x, y, blend_mode)\n  ... and so on,\
    \ folding layers bottom-to-top\n\nCode generation for multi-image:\n  const base = rcimage.load(layer0Bytes).blur(3);\n\
    \  const overlay = rcimage.load(layer1Bytes).brightness(0.2);\n  const result = base\n    .composite(overlay, { x: 10,\
    \ y: 10, blend: 'multiply' })\n    .toJpeg({ quality: 85 });\n"
