id: jpeg-trellis-csf-fix_20260329003541Z
title: JPEG Trellis CSF Fix + Color Precision — mozjpeg Exact Alignment
type: bug
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: 'Fix two root causes of quality gap vs mozjpeg: (1) remove CSF weighting from trellis (mozjpeg mode=1 uses only
    1/Q^2, not CSF*1/Q^2), (2) upgrade color conversion from 8-bit to 16-bit fixed-point matching mozjpeg.'
  context: 'Benchmark shows 0.88x quality ratio at Q50/Q75 and 0.97x at Q85 vs mozjpeg. Deep source analysis of mozjpeg reveals:
    (1) In mode=1 (hardcoded default), mozjpeg''s trellis uses lambda_tbl[i] = 1/(Q[i]^2) only — the CSF weight table is overridden.
    Our code applies CSF * (1/Q^2) which double-weights distortion, causing over-zeroing especially at low quality. (2) Our
    YCbCr color conversion uses 8-bit fixed-point (coefficients * 256) vs mozjpeg''s 16-bit (coefficients * 65536). The 8-bit
    precision has ~0.5% error per coefficient, e.g., Y_R=77/256=0.30078 vs mozjpeg 19595/65536=0.29907.'
  codebase_analysis: 'trellis.rs line ~113: coeff_weight[i] = csf[i] * inv_q2 — should be just inv_q2 to match mozjpeg mode=1.
    The CSF tables (CSF_LUMA, CSF_CHROMA) were added in the quality-parity track but mozjpeg doesn''t actually use them when
    mode=1. color.rs lines 40-42: uses 77/150/29 (8-bit) coefficients. mozjpeg uses 19595/38470/7471 (16-bit). Upgrading to
    16-bit eliminates per-pixel rounding errors.'
  acceptance_criteria:
  - Trellis uses 1/Q^2 weighting only (no CSF) matching mozjpeg mode=1
  - Color conversion uses 16-bit fixed-point matching mozjpeg coefficients
  - Quality ratio vs mozjpeg >= 0.95 at Q50 and Q75 (currently 0.88)
  - All existing tests pass
  - Benchmark chart shows improved alignment across all quality levels
  out_of_scope: DCT algorithm change (separate track). Chroma downsample filter (separate track). Overshoot deringing. EOB
    block-level optimization.
  technical_notes: 'CSF fix: simply change coeff_weight[i] = csf[i] * inv_q2 to coeff_weight[i] = inv_q2 (remove CSF multiplication).
    Keep CSF tables for potential future use but don''t apply them in mode=1. Color precision: upgrade from ((77*r + 150*g
    + 29*b + 128) >> 8) to ((19595*r + 38470*g + 7471*b + 32768) >> 16). Same for Cb/Cr: mozjpeg uses Cb_R=-11059, Cb_G=-21709,
    Cb_B=32768, Cr_R=32768, Cr_G=-27439, Cr_B=-5329, all with >>16 and +32768 for rounding.'
