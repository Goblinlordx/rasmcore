id: extensibility-registry_20260329105000Z
title: Extensibility Registry — Proc Macro + Build Script Codegen for Filters, Codecs, Transforms
type: refactor
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: 'Unified registration system where filters, encoders, decoders, and transforms are registered via proc macro attributes.
    A build.rs codegen step generates WIT interfaces, adapter dispatch, pipeline nodes, and registry from the registered operations.
    Adding a new operation becomes a single-file change.

    '
  context: 'Currently, adding a new filter requires 7 manual file changes:

    1. domain/filters.rs — filter function (domain logic)

    2. filter_registry.rs — builtin_filter! macro

    3. pipeline/nodes/filters.rs — pipeline node struct

    4. wit/image/filters.wit — WIT interface declaration

    5. wit/image/pipeline.wit — pipeline resource method

    6. adapter/mod.rs — filters::Guest impl method

    7. adapter/pipeline_adapter.rs — GuestImagePipeline impl method


    Encoders and decoders have similar manual wiring. This is:

    - Error-prone (miss a file → WASM build fails)

    - Tedious (boilerplate copy-paste for each operation)

    - Not extensible (third parties can''t easily add operations)

    - Feature-flag unfriendly (can''t conditionally include operations)


    The goal: write the domain function, add an attribute, rebuild. Everything

    else is generated. Feature flags control which operations are included.

    '
  codebase_analysis: "Current registration mechanisms:\n- filter_registry.rs: FilterRegistry with builtin_filter! macro and\n\
    \  register_builtin_filters() function. Already has metadata (name,\n  category, params, apply fn). Could be the source\
    \ of truth.\n- encoder/mod.rs: Manual match on format string to dispatch encode.\n- decoder/mod.rs: Manual format detection\
    \ + decode dispatch.\n- adapter/mod.rs: Manual impl blocks for each WIT interface.\n- pipeline_adapter.rs: Manual impl\
    \ for each pipeline method.\n\nExisting patterns to leverage:\n- builtin_filter! macro already generates struct + ImageFilter\
    \ impl\n- simple_filter_node! macro already generates pipeline nodes\n- WIT files are the public API contract (source\
    \ of truth for bindings)\n- build.rs can generate Rust code into OUT_DIR\n- Proc macros can collect metadata at compile\
    \ time\n\nHybrid approach (proc macro + build.rs):\n- Proc macro: #[register_filter], #[register_encoder], etc.\n  Expands\
    \ to registry entry + metadata const. No external file I/O.\n- build.rs: Scans source for registration attributes (via\
    \ syn),\n  collects all metadata, generates:\n  - WIT interface files (filters.wit, encoder.wit, etc.)\n  - Adapter dispatch\
    \ code (impl Guest for Component)\n  - Pipeline adapter dispatch (impl GuestImagePipeline)\n  - Pipeline node wrappers\n\
    - Feature flags: #[cfg(feature = \"nonfree-hevc\")] on registration\n  → conditionally included in codegen output\n"
  acceptance_criteria:
  - Adding a new filter requires only 1 file change (domain function + attribute)
  - Adding a new encoder requires only 1 file change (encode function + attribute)
  - Adding a new decoder requires only 1 file change (decode function + attribute)
  - WIT files are auto-generated from registry metadata
  - Adapter dispatch code is auto-generated from registry
  - Pipeline nodes are auto-generated for simple filters
  - Complex pipeline nodes (custom overlap, format changes) can override auto-generation
  - Feature flags conditionally include/exclude operations
  - cargo component build succeeds with generated code
  - All existing tests pass after migration
  - TypeScript SDK reflects only registered operations
  - Runtime registry queryable (list available filters/codecs)
  - Third-party crate can register filters without modifying rasmcore source
  - Third-party crate can register encoders/decoders without modifying rasmcore source
  - Assembly crate pattern works (combine rasmcore + N plugin crates → one WASM)
  - inventory/linkme collection works across crate boundaries in WASM target
  - ACID TEST — bare-infra build with zero built-in filters/codecs plus one custom filter and one custom codec builds, runs,
    and produces correct output end-to-end
  out_of_scope: 'Runtime dynamic plugin loading (hot-loading .wasm at runtime).

    Hot-reloading of filters during execution. GUI for filter creation.

    Changing the domain function signatures (these stay as-is).

    npm package publishing (separate track).

    '
  technical_notes: "Architecture:\n\n1. PROC MACRO CRATE: rasmcore-macros (new crate)\n\n   #[register_filter(\n     name\
    \ = \"blur\",\n     category = \"spatial\",\n     params = [(\"radius\", f32, 0.0, 100.0, 3.0)],\n     overlap = \"uniform(10)\"\
    ,\n   )]\n   pub fn blur(pixels: &[u8], info: &ImageInfo, radius: f32) -> Result<Vec<u8>, ImageError>\n\n   #[register_encoder(\n\
    \     name = \"jpeg\",\n     format = \"jpeg\",\n     extensions = [\"jpg\", \"jpeg\"],\n     mime = \"image/jpeg\",\n\
    \     config_type = \"JpegEncodeConfig\",\n   )]\n   pub fn encode_jpeg(img: &DynamicImage, info: &ImageInfo, config:\
    \ &JpegEncodeConfig) -> Result<Vec<u8>, ImageError>\n\n   #[register_decoder(\n     name = \"png\",\n     formats = [\"\
    png\"],\n     magic_bytes = [0x89, 0x50, 0x4E, 0x47],\n   )]\n   pub fn decode_png(data: &[u8]) -> Result<DecodedImage,\
    \ ImageError>\n\n   The proc macro expands to:\n   - Original function (unchanged)\n   - Metadata const: FILTER_BLUR_META:\
    \ FilterMeta = FilterMeta { name, category, ... }\n   - Registry entry via inventory::submit! or linkme\n   - Simple pipeline\
    \ node (if overlap specified)\n\n2. BUILD SCRIPT: build.rs\n\n   Runs before compilation. Two modes:\n   a) Parse source\
    \ files with syn to find #[register_*] attributes\n   b) Or: read a generated manifest from proc macro (inventory pattern)\n\
    \n   Generates into $OUT_DIR/:\n   - generated_wit_filters.wit — filter function declarations\n   - generated_wit_pipeline_filters.wit\
    \ — pipeline method declarations\n   - generated_wit_encoders.wit — encoder function declarations\n   - generated_adapter_filters.rs\
    \ — impl filters::Guest dispatch\n   - generated_adapter_pipeline.rs — impl GuestImagePipeline filter methods\n   - generated_adapter_encoders.rs\
    \ — impl encoder::Guest dispatch\n   - generated_registry.rs — register_all() function\n\n   WIT generation example:\n\
    \     For each registered filter:\n       {kebab-name}: func(pixels: buffer, info: image-info, {params...}) -> result<buffer,\
    \ rasmcore-error>;\n\n3. FEATURE FLAGS:\n\n   #[cfg(feature = \"nonfree-hevc\")]\n   #[register_decoder(name = \"hevc\"\
    , ...)]\n   pub fn decode_hevc(data: &[u8]) -> Result<DecodedImage, ImageError>\n\n   build.rs respects cfg attributes\
    \ → HEVC decoder not in WIT when\n   feature is disabled → not in SDK → not in WASM binary.\n\n4. COMPLEX OVERRIDES:\n\
    \n   For filters needing custom pipeline nodes (format changes, complex overlap):\n   #[register_filter(\n     name =\
    \ \"sobel\",\n     category = \"edge\",\n     params = [],\n     custom_node = true,  // skip auto-generated node, use\
    \ manual SobelNode\n   )]\n\n   The developer still writes SobelNode manually, but everything else\n   (WIT, adapter,\
    \ registry) is auto-generated.\n\n5. MIGRATION PATH:\n\n   Phase 1: Create proc macro crate, implement for filters only\n\
    \   Phase 2: Add build.rs codegen for WIT + adapter (filters)\n   Phase 3: Migrate all existing filters to use attributes\n\
    \   Phase 4: Extend to encoders and decoders\n   Phase 5: Extend to transforms\n   Phase 6: Remove all manual adapter/WIT\
    \ code\n\n6. INVENTORY/LINKME PATTERN:\n\n   For collecting registrations without build.rs source scanning:\n   - inventory\
    \ crate: distributed slice, works on all platforms\n   - linkme crate: linker-based collection, zero runtime cost\n  \
    \ Both allow proc macros to submit items that are collected at link time.\n   build.rs reads the collected items to generate\
    \ WIT.\n\n   Preferred: inventory (more portable, WASM-compatible).\n"
  plugin_architecture: "CROSS-CRATE PLUGIN SUPPORT:\n\nThird parties can add custom filters/codecs WITHOUT modifying rasmcore\
    \ source.\nThey create their own crate, depend on rasmcore-macros + rasmcore-image, and\nregister operations using the\
    \ same proc macro attributes.\n\nExample — third-party filter crate:\n\n  # my-filters/Cargo.toml\n  [dependencies]\n\
    \  rasmcore-image = \"0.1\"\n  rasmcore-macros = \"0.1\"\n\n  # my-filters/src/lib.rs\n  use rasmcore_macros::register_filter;\n\
    \  use rasmcore_image::domain::types::*;\n  use rasmcore_image::domain::error::ImageError;\n\n  #[register_filter(name\
    \ = \"custom_tone\", category = \"color\",\n                     params = [(\"warmth\", f32, 0.0, 1.0, 0.5)])]\n  pub\
    \ fn custom_tone(pixels: &[u8], info: &ImageInfo, warmth: f32)\n      -> Result<Vec<u8>, ImageError> {\n      // custom\
    \ logic — no rasmcore source modification needed\n  }\n\nExample — assembly crate (combines rasmcore + plugins):\n\n \
    \ # my-image-app/Cargo.toml\n  [dependencies]\n  rasmcore-image = \"0.1\"\n  my-filters = { path = \"../my-filters\" }\n\
    \  my-codecs = { path = \"../my-codecs\" }  # custom codec support\n\n  # my-image-app/src/lib.rs\n  // Just pull in all\
    \ registrations — build.rs collects across crates\n  pub use rasmcore_image;\n  pub use my_filters;\n  pub use my_codecs;\n\
    \nThe assembly crate's build.rs (provided by rasmcore tooling) scans all\ndependencies for registered operations and generates\
    \ the unified WIT +\nadapter + pipeline code. The resulting WASM component includes both\nrasmcore built-in operations\
    \ AND third-party additions.\n\nThis works via the inventory crate (distributed slices across crate boundaries)\nor via\
    \ a build-time manifest that each plugin crate emits.\n\nFeature flag example — exclude built-in codecs:\n\n  [dependencies.rasmcore-image]\n\
    \  version = \"0.1\"\n  default-features = false\n  features = [\"core-filters\", \"png\", \"jpeg\"]  # no hevc, no webp\n"
