id: extensibility-registry_20260329105000Z
title: Extensibility Registry — Proc Macro + Build Script Codegen for Filters, Codecs, Transforms
type: refactor
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: >
    Unified registration system where filters, encoders, decoders, and transforms
    are registered via proc macro attributes. A build.rs codegen step generates
    WIT interfaces, adapter dispatch, pipeline nodes, and registry from the
    registered operations. Adding a new operation becomes a single-file change.
  context: |
    Currently, adding a new filter requires 7 manual file changes:
    1. domain/filters.rs — filter function (domain logic)
    2. filter_registry.rs — builtin_filter! macro
    3. pipeline/nodes/filters.rs — pipeline node struct
    4. wit/image/filters.wit — WIT interface declaration
    5. wit/image/pipeline.wit — pipeline resource method
    6. adapter/mod.rs — filters::Guest impl method
    7. adapter/pipeline_adapter.rs — GuestImagePipeline impl method

    Encoders and decoders have similar manual wiring. This is:
    - Error-prone (miss a file → WASM build fails)
    - Tedious (boilerplate copy-paste for each operation)
    - Not extensible (third parties can't easily add operations)
    - Feature-flag unfriendly (can't conditionally include operations)

    The goal: write the domain function, add an attribute, rebuild. Everything
    else is generated. Feature flags control which operations are included.
  codebase_analysis: |
    Current registration mechanisms:
    - filter_registry.rs: FilterRegistry with builtin_filter! macro and
      register_builtin_filters() function. Already has metadata (name,
      category, params, apply fn). Could be the source of truth.
    - encoder/mod.rs: Manual match on format string to dispatch encode.
    - decoder/mod.rs: Manual format detection + decode dispatch.
    - adapter/mod.rs: Manual impl blocks for each WIT interface.
    - pipeline_adapter.rs: Manual impl for each pipeline method.

    Existing patterns to leverage:
    - builtin_filter! macro already generates struct + ImageFilter impl
    - simple_filter_node! macro already generates pipeline nodes
    - WIT files are the public API contract (source of truth for bindings)
    - build.rs can generate Rust code into OUT_DIR
    - Proc macros can collect metadata at compile time

    Hybrid approach (proc macro + build.rs):
    - Proc macro: #[register_filter], #[register_encoder], etc.
      Expands to registry entry + metadata const. No external file I/O.
    - build.rs: Scans source for registration attributes (via syn),
      collects all metadata, generates:
      - WIT interface files (filters.wit, encoder.wit, etc.)
      - Adapter dispatch code (impl Guest for Component)
      - Pipeline adapter dispatch (impl GuestImagePipeline)
      - Pipeline node wrappers
    - Feature flags: #[cfg(feature = "nonfree-hevc")] on registration
      → conditionally included in codegen output
  acceptance_criteria:
    - Adding a new filter requires only 1 file change (domain function + attribute)
    - Adding a new encoder requires only 1 file change (encode function + attribute)
    - Adding a new decoder requires only 1 file change (decode function + attribute)
    - WIT files are auto-generated from registry metadata
    - Adapter dispatch code is auto-generated from registry
    - Pipeline nodes are auto-generated for simple filters
    - Complex pipeline nodes (custom overlap, format changes) can override auto-generation
    - Feature flags conditionally include/exclude operations
    - cargo component build succeeds with generated code
    - All existing tests pass after migration
    - TypeScript SDK reflects only registered operations
    - Runtime registry queryable (list available filters/codecs)
  out_of_scope: |
    Third-party plugin loading at runtime (dynamic .wasm plugins).
    Hot-reloading of filters. GUI for filter creation.
    Changing the domain function signatures (these stay as-is).
  technical_notes: |
    Architecture:

    1. PROC MACRO CRATE: rasmcore-macros (new crate)

       #[register_filter(
         name = "blur",
         category = "spatial",
         params = [("radius", f32, 0.0, 100.0, 3.0)],
         overlap = "uniform(10)",
       )]
       pub fn blur(pixels: &[u8], info: &ImageInfo, radius: f32) -> Result<Vec<u8>, ImageError>

       #[register_encoder(
         name = "jpeg",
         format = "jpeg",
         extensions = ["jpg", "jpeg"],
         mime = "image/jpeg",
         config_type = "JpegEncodeConfig",
       )]
       pub fn encode_jpeg(img: &DynamicImage, info: &ImageInfo, config: &JpegEncodeConfig) -> Result<Vec<u8>, ImageError>

       #[register_decoder(
         name = "png",
         formats = ["png"],
         magic_bytes = [0x89, 0x50, 0x4E, 0x47],
       )]
       pub fn decode_png(data: &[u8]) -> Result<DecodedImage, ImageError>

       The proc macro expands to:
       - Original function (unchanged)
       - Metadata const: FILTER_BLUR_META: FilterMeta = FilterMeta { name, category, ... }
       - Registry entry via inventory::submit! or linkme
       - Simple pipeline node (if overlap specified)

    2. BUILD SCRIPT: build.rs

       Runs before compilation. Two modes:
       a) Parse source files with syn to find #[register_*] attributes
       b) Or: read a generated manifest from proc macro (inventory pattern)

       Generates into $OUT_DIR/:
       - generated_wit_filters.wit — filter function declarations
       - generated_wit_pipeline_filters.wit — pipeline method declarations
       - generated_wit_encoders.wit — encoder function declarations
       - generated_adapter_filters.rs — impl filters::Guest dispatch
       - generated_adapter_pipeline.rs — impl GuestImagePipeline filter methods
       - generated_adapter_encoders.rs — impl encoder::Guest dispatch
       - generated_registry.rs — register_all() function

       WIT generation example:
         For each registered filter:
           {kebab-name}: func(pixels: buffer, info: image-info, {params...}) -> result<buffer, rasmcore-error>;

    3. FEATURE FLAGS:

       #[cfg(feature = "nonfree-hevc")]
       #[register_decoder(name = "hevc", ...)]
       pub fn decode_hevc(data: &[u8]) -> Result<DecodedImage, ImageError>

       build.rs respects cfg attributes → HEVC decoder not in WIT when
       feature is disabled → not in SDK → not in WASM binary.

    4. COMPLEX OVERRIDES:

       For filters needing custom pipeline nodes (format changes, complex overlap):
       #[register_filter(
         name = "sobel",
         category = "edge",
         params = [],
         custom_node = true,  // skip auto-generated node, use manual SobelNode
       )]

       The developer still writes SobelNode manually, but everything else
       (WIT, adapter, registry) is auto-generated.

    5. MIGRATION PATH:

       Phase 1: Create proc macro crate, implement for filters only
       Phase 2: Add build.rs codegen for WIT + adapter (filters)
       Phase 3: Migrate all existing filters to use attributes
       Phase 4: Extend to encoders and decoders
       Phase 5: Extend to transforms
       Phase 6: Remove all manual adapter/WIT code

    6. INVENTORY/LINKME PATTERN:

       For collecting registrations without build.rs source scanning:
       - inventory crate: distributed slice, works on all platforms
       - linkme crate: linker-based collection, zero runtime cost
       Both allow proc macros to submit items that are collected at link time.
       build.rs reads the collected items to generate WIT.

       Preferred: inventory (more portable, WASM-compatible).
