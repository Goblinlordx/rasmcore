id: web-ui-preview-worker_20260401114500Z
title: Web UI — Preview worker with downscaled image for fast feedback
type: feature
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Add a second web worker dedicated to preview rendering. On image load it

    resizes to max 400px (longest side), then applies the chain on that small

    image. The preview canvas updates live as the user edits params (debounced),

    while the full-res worker only runs on Apply.

    '
  context: 'Currently the single pipeline-worker processes everything at full resolution.

    Editing params requires clicking Apply to see any result, which is slow on

    large images. Users need fast visual feedback while tweaking sliders.


    The solution: a second worker that loads the same image but immediately

    resizes it to a small preview size (max 400px on longest side). When the

    user edits params, a debounced preview request goes to this preview worker

    which processes the downscaled image quickly. The full-res worker only

    runs when Apply is clicked.


    The existing pipeline-worker.ts already has thumbnail support (THUMB_MAX=256)

    but it only creates a thumb on load — it doesn''t process chains on the thumb.

    The new preview worker is a separate instance with its own Pipeline that

    always works on the downscaled copy.

    '
  codebase_analysis: "Current architecture:\n- web-ui/src/pipeline-worker.ts: single worker, loads full image, processes\n\
    \  chains at full res, has thumbnail creation on load (unused for processing)\n- web-ui/src/hooks/useWorker.ts: manages\
    \ single worker instance, sendMessage,\n  processing state, canvas refs\n- web-ui/src/App.tsx: applyFullChain sends process\
    \ to worker, no preview path\n- web-ui/src/components/ChainNode.tsx: param changes call onParamChange only\n  (schedulePreview\
    \ was removed in recent fix)\n\nThe preview worker will be a copy of pipeline-worker.ts but simplified:\n- On load: resize\
    \ image to max 400px, store as previewBytes\n- On process: always use previewBytes (no full-res path)\n- On result: draw\
    \ to a small preview canvas in the ChainNode editing area\n\nReact integration:\n- New usePreviewWorker hook (similar\
    \ to useWorker but simpler)\n- ChainNode gets a small canvas ref for inline preview\n- App.tsx passes preview worker to\
    \ EffectStack\n- Param changes trigger debounced preview (re-add schedulePreview but\n  routed to preview worker, not\
    \ full-res worker)\n"
  acceptance_criteria:
  - A second web worker (preview-worker.ts) loads and processes at reduced size
  - Preview image is max 400px on longest side, same aspect ratio
  - Param changes in edit mode trigger debounced preview (600ms) on preview worker
  - Preview result displays in a small canvas inside the editing ChainNode
  - Full-res worker only processes on Apply click (unchanged)
  - Preview worker has its own Pipeline instance (separate cache from full-res)
  - Loading a new image initializes both workers
  - Preview worker errors dont block full-res processing
  out_of_scope: '- Shared cache between preview and full-res workers

    - Progressive rendering (showing preview then replacing with full-res)

    - Preview for multi-layer composite (single active layer only)

    '
  technical_notes: "Implementation:\n1. Create preview-worker.ts — simplified pipeline-worker that always\n   resizes on load.\
    \ Message protocol same as pipeline-worker but only\n   supports init/load/process (no export/composite).\n2. Create usePreviewWorker\
    \ hook — lightweight version of useWorker.\n   Manages worker lifecycle, sendMessage, previewCanvasRef.\n   No queue needed\
    \ (latest request wins, cancel previous).\n3. Update ChainNode — when editing, show a small canvas (max 280px wide)\n\
    \   that displays preview worker output.\n4. Re-add schedulePreview in App.tsx but route to preview worker.\n   Debounce\
    \ at 600ms. Only fires when editingNodeId is set.\n5. Update handleAddLayer to send load to both workers.\n\nPreview worker\
    \ message protocol:\n  init -> ready\n  load { imageBytes } -> loaded { info }  (resizes internally)\n  process { chain,\
    \ mode:'preview' } -> result { png }\n  (no export, no composite)\n\nThe preview canvas in ChainNode is a ref passed from\
    \ usePreviewWorker.\nWhen result arrives, it draws to that canvas. The canvas is only visible\nwhen isEditing is true.\n"
