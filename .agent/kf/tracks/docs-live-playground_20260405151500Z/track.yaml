id: docs-live-playground_20260405151500Z
title: 'Docs: live interactive playground per operation'
type: feature
status: pending
created: '2026-04-05'
updated: '2026-04-04'
spec:
  summary: 'Embed the V2 WASM pipeline in docs pages for live rendering. Each operation

    page has an interactive playground: param sliders, live split-view before/after,

    and a code example that updates as the user adjusts values.

    '
  context: 'Current docs have static before/after images rendered at build time with fixed

    showcase params. The user cannot interact or see what different param values do.


    The V2 WASM module already runs in the browser (13MB, loads in the web-ui).

    The same module can be loaded in the docs site. Each operation page would:

    1. Load the reference image into a WASM pipeline instance

    2. Show param controls (sliders, toggles) matching the operation''s ParamDescriptor

    3. On param change, re-run the single filter and update the "after" canvas

    4. Display before/after in the split-view (before = reference, after = live render)

    5. Update the code example to reflect current param values


    This is essentially a per-operation mini version of the web-ui, but focused

    on a single filter with no chain management.

    '
  codebase_analysis: 'Existing infrastructure:

    - V2 WASM component (sdk/typescript/v2-generated/) loads in browser via jco

    - V2 fluent SDK (sdk/typescript/v2-fluent/) wraps pipeline with typed methods

    - Registry provides ParamDescriptor (name, type, min, max, step, default, hint)

    - Web UI already does exactly this: load WASM, build controls, process chain

    - SplitView component exists (or will exist in Next.js migration)


    Key constraint: WASM module is 13MB. For docs, we should lazy-load it only

    when the user interacts with the playground (click "Try it" or scroll into view).

    Initial page load shows the static pre-rendered image. WASM loads on demand.


    The V2 fluent SDK Pipeline.fromRaw(PipelineClass, imageBytes) is the entry point.

    Single filter application: pipe = Pipeline.fromRaw(cls, img); pipe = pipe[method](params); result = pipe.write(''png'')

    '
  acceptance_criteria:
  - Each operation page has an interactive playground section
  - Playground shows param controls generated from ParamDescriptor (sliders, toggles, spinners)
  - Adjusting a param re-renders the filter on the reference image in real time
  - Split-view shows before (reference) vs after (live render) with draggable divider
  - Code example updates live to reflect current param values
  - WASM module lazy-loads on first interaction (not on page load)
  - Static pre-rendered image shown before WASM loads (graceful degradation)
  - Loading indicator while WASM initializes
  - Playground works for paramless filters (just shows the effect, no controls)
  - Debounced rendering (100ms) to avoid excessive re-renders during slider drag
  out_of_scope: 'Multi-filter chain playground. GPU acceleration in docs. Export functionality.

    Mobile touch controls. Filter comparison (side-by-side two different filters).

    '
  technical_notes: "Architecture (assumes Next.js docs site from docs-nextjs-ssg track):\n\n1. Playground React component\
    \ (docs/components/Playground.tsx):\n   - Props: operationName, params (ParamDescriptor[]), referenceImageUrl\n   - State:\
    \ paramValues (Record<string, number|boolean>), wasmReady, rendering\n   - Lazy loads WASM on first render or user interaction\n\
    \   - Renders param controls from ParamDescriptor metadata\n   - On param change (debounced): runs pipeline, draws result\
    \ to canvas\n\n2. WASM loading (docs/lib/wasm-loader.ts):\n   - Singleton: load once, share across all playground instances\n\
    \   - Lazy: import('../public/sdk/v2/rasmcore-v2-image.js') on demand\n   - Returns PipelineClass for Pipeline.fromRaw()\n\
    \   - Loading state exposed as promise\n\n3. Param controls (docs/components/ParamControls.tsx):\n   - Generates slider/toggle/spinner\
    \ for each ParamDescriptor\n   - Maps hint to control type (rc.color_rgb -> color picker, etc.)\n   - Emits onChange with\
    \ updated param values\n   - Shows current numeric value next to slider\n\n4. Live code example (docs/components/LiveCodeExample.tsx):\n\
    \   - Receives operationName + current paramValues\n   - Generates TypeScript snippet reflecting current values\n   -\
    \ Highlights syntax (Prism or similar)\n   - Updates on every param change\n\n5. Integration in operation page:\n   ```tsx\n\
    \   <SplitView\n     before={referenceImageUrl}\n     after={<canvas ref={afterCanvasRef} />}\n   />\n   <ParamControls\
    \ params={op.params} values={paramValues} onChange={setParamValues} />\n   <LiveCodeExample op={op.name} params={paramValues}\
    \ />\n   ```\n\n6. WASM assets: copy V2 WASM + jco SDK to docs/public/sdk/v2/ during build.\n   Next.js serves them as\
    \ static files.\n\n7. Rendering pipeline (in Playground):\n   ```typescript\n   const pipe = Pipeline.fromRaw(PipelineClass,\
    \ refImageBytes);\n   const result = pipe[snakeToCamel(opName)](paramValues);\n   const png = result.write('png');\n \
    \  // Draw PNG to afterCanvas\n   ```\n   Debounced at 100ms. Uses requestAnimationFrame for smooth updates.\n"
