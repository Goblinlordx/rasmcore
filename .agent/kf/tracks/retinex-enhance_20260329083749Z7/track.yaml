spec:
  summary: 'Retinex-based image enhancement: Single-Scale Retinex, Multi-Scale Retinex, and MSRCR (with color restoration).
    Testable against GIMP''s Retinex filter implementation.'
  context: ''
  codebase_analysis: ''
  acceptance_criteria:
  - All operations validated against reference implementation (OpenCV/colour-science/GIMP)
  - Reference parity tests added to opencv_parity.rs with fixtures
  - SIMD optimization where applicable (per project feedback)
  - Registered in FilterRegistry with param descriptors
  - Validated against canonical 7-image test set (gradient, checker, noisy_flat, sharp_edges, photo, flat, highcontrast) where
    applicable
  - Reference fixtures generated from OpenCV/colour-science/GIMP in venv and stored in tests/fixtures/opencv/
  - Parity tier documented in REFERENCE.md (EXACT, F64_LIMIT, F32_ROUNDING, or REF_PRECISION)
  out_of_scope: GPU acceleration. Neural network approaches. SIMD optimization deferred to separate track if needed.
  technical_notes: 'SSR: R(x,y) = log(I(x,y)) - log(G(x,y,sigma) * I(x,y)) where G is Gaussian. MSR: average of SSR at multiple
    scales (typically sigma=15,80,250). MSRCR: MSR + color restoration term C(x,y) = beta * log(alpha * I_c / sum(I_channels)).'
