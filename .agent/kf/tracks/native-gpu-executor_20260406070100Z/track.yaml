id: native-gpu-executor_20260406070100Z
title: Extract native wgpu GPU executor into standalone crate
type: refactor
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: 'Move WgpuExecutorV2 from rasmcore-cli into a new rasmcore-gpu-native

    crate that implements the GpuExecutor trait. Enables other crates

    (pipeline-v2 tests, native SDK) to use GPU execution without

    depending on the CLI.

    '
  context: 'WgpuExecutorV2 (431 lines) in rasmcore-cli/src/gpu_executor_v2.rs is a

    complete, production-ready native GPU executor: wgpu device init, shader

    caching (FNV-1a), ping-pong buffers, reduction buffer persistence,

    convergence checks, and staging readback. But it lives in the CLI crate,

    so rasmcore-pipeline-v2 tests and a future native SDK can''t use it.

    '
  codebase_analysis: 'rasmcore-cli/src/gpu_executor_v2.rs:

    - WgpuExecutorV2 struct with device, queue, shader_cache, buffer pools

    - Implements GpuExecutor trait from rasmcore-pipeline-v2

    - Uses wgpu 24, pollster, bytemuck (all behind gpu feature flag)

    - bench-pipeline binary already uses it for native GPU benchmarks


    rasmcore-pipeline-v2/src/gpu.rs:

    - GpuExecutor trait: execute(), prepare(), max_buffer_size()

    - GpuError enum: NotAvailable, ShaderCompilation, Execution, BufferTooLarge


    Dependencies:

    - wgpu 24 already in workspace (cli crate)

    - pollster 0.4 for async blocking

    - bytemuck 1 for buffer casting

    '
  acceptance_criteria:
  - New crate rasmcore-gpu-native with WgpuExecutorV2
  - Implements GpuExecutor from rasmcore-pipeline-v2
  - rasmcore-cli depends on rasmcore-gpu-native (no code duplication)
  - GPU feature flag preserved (optional dep)
  - try_new() gracefully returns None on machines without GPU
  - bench-pipeline still works using the extracted crate
  - All existing GPU tests pass
  out_of_scope: 'Native SDK (separate track). GPU shader tests (separate track).

    Changing the GpuExecutor trait interface.

    '
  technical_notes: "New crate: crates/rasmcore-gpu-native/\n  Cargo.toml: depends on rasmcore-pipeline-v2, wgpu, pollster,\
    \ bytemuck\n  src/lib.rs: WgpuExecutorV2 + impl GpuExecutor\n  src/buffer_pool.rs: CachedBuffer, ping-pong management\n\
    \nrasmcore-cli changes:\n  Remove gpu_executor_v2.rs\n  Add dep: rasmcore-gpu-native = { path = \"../rasmcore-gpu-native\"\
    \ }\n  Re-export or use directly\n\nrasmcore-pipeline-v2 changes:\n  dev-dependencies: rasmcore-gpu-native (for GPU tests)\n\
    \  No production dependency change\n"
