id: draw-primitives_20260330043303Z
title: Draw Primitives and Text Rendering
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: >
    Add drawing operations (line, rectangle, circle, filled shapes) and basic
    text rendering, leveraging tiny_skia already in the dependency tree via resvg.
  context: |
    libvips has draw_rect, draw_line, draw_circle, text operations. ImageMagick
    has extensive drawing and annotation support. rasmcore has zero drawing
    capabilities. This is a P2 gap that blocks watermarking, annotation, and
    basic graphics overlay workflows.
  codebase_analysis: |
    Key finding: tiny_skia is already available as a transitive dependency via
    resvg (used for SVG rasterization). tiny_skia provides:
    - Pixmap (RGBA8 pixel buffer)
    - PathBuilder (line, quad, cubic bezier)
    - Paint (solid color, anti-aliasing)
    - Stroke (width, cap, join)
    - Transform (affine)
    - Text via integration with fontdb + rustybuzz (resvg already pulls these)

    Current SVG decode in decoder/mod.rs uses resvg::tiny_skia::Pixmap internally
    and converts to DecodedImage. Same pattern works for drawing.

    For text: resvg includes fontdb and text layout. Alternative: add fontdue
    (pure Rust, 50KB, bitmap font rendering) for simpler API without full SVG
    text layout engine.

    Pixel buffer format: filters work with Vec<u8> in RGB8/RGBA8. Drawing
    operations need RGBA8 for anti-aliasing. Convert if needed.
  acceptance_criteria:
    - draw_line(pixels, info, x1, y1, x2, y2, color, width) works
    - draw_rect(pixels, info, x, y, w, h, color, width, filled) works
    - draw_circle(pixels, info, cx, cy, r, color, width, filled) works
    - draw_text(pixels, info, x, y, text, font_size, color) works with default font
    - All draw ops support anti-aliasing via tiny_skia
    - All draw ops registered as filters via #[register_filter]
    - Draw operations work on RGBA8 buffers (auto-convert if RGB8 input)
  out_of_scope: |
    Complex path drawing (bezier curves, arcs) — can be added later.
    Custom font loading from file — use system/embedded default font.
    SVG generation/output. Vector graphics editing.
  technical_notes: |
    Architecture: create domain/draw.rs module that:
    1. Wraps tiny_skia::Pixmap around the existing pixel buffer
    2. Converts DecodedImage RGBA8 <-> tiny_skia Pixmap (zero-copy if possible)
    3. Exposes draw operations as pub fn with simple params
    4. Registers each as a filter for WASM/SDK visibility

    For text rendering, embed a small default font (e.g., DejaVu Sans subset)
    as a const byte array, registered with fontdb on first use. This avoids
    runtime font discovery which is unavailable in WASM.
