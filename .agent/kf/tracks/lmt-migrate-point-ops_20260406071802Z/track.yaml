id: lmt-migrate-point-ops_20260406071802Z
title: Migrate point-op filters to Lmt constructors
type: refactor
status: pending
created: 2026-04-06
updated: '2026-04-06'
spec:
  summary: 'Convert existing point-op filters (exposure, contrast, gamma,

    brightness, levels, etc.) from standalone Filter impls to Lmt

    constructors that emit LmtNode. One at a time with parity validation.

    '
  context: 'With the Lmt type and LMT fusion in place, existing point-op filters

    can be reframed as predefined LMT constructors. Instead of each

    filter having its own compute() and analytic_expression(), they

    become functions that return an Lmt::Analytical(expr) which is

    wrapped in an LmtNode.


    The user-facing API stays identical — .exposure({ ev: 1.0 }) still

    works, the param registry still has typed params. The change is

    internal: the filter struct becomes a thin constructor that produces

    an Lmt value rather than implementing Filter::compute() directly.


    This unifies the execution path: a user-created exposure(ev=1) and

    a loaded .cube LMT flow through the same fusion and dispatch system.

    '
  codebase_analysis: 'Point-op filters to migrate (all in filters/adjustment.rs):

    - Exposure: Mul(Input, 2^ev)

    - Brightness: Add(Input, amount)

    - Contrast: Add(Mul(Sub(Input, 0.5), factor), 0.5)

    - Gamma: Pow(Input, 1/gamma)

    - Levels: Pow(Div(Sub(Input, black), range), 1/gamma)

    - Invert: Sub(1, Input)

    - Posterize: Floor(Mul(Input, levels)) / levels

    - SigmoidalContrast: sigmoid transfer

    - Dodge: Div(Input, Sub(1, amount))

    - Burn: Sub(1, Div(Sub(1, Input), amount))

    - Solarize: conditional inversion


    Grading filters (filters/grading.rs):

    - AscCdl: slope/offset/power — natural Lmt::Cdl

    - LiftGammaGain: convertible to CDL

    - SplitToning: analytical


    Each migration replaces Filter impl with Lmt construction. The

    V2Filter derive macro may need a variant that generates LmtNode

    wrappers instead of FilterNode wrappers.

    '
  acceptance_criteria:
  - All migrated filters produce identical output to pre-migration (pixel-exact for analytical)
  - Inverse chains fuse to identity (exposure +1/-1, brightness +1/-1, invert/invert, gamma 2.0/0.5)
  - Fused identity chains are eliminated from the pipeline (zero compute)
  - Param registry entries unchanged — SDK API is identical
  - Non-migrated filters (spatial, distortion, etc.) completely unaffected
  - Each filter migrated in a separate commit for easy bisection
  out_of_scope: '- Migrating spatial filters (blur, bilateral, etc.) — not LMTs

    - Migrating distortion filters — not LMTs

    - Migrating draw/mask/composite ops — not LMTs

    - Changing the user-facing SDK API

    '
  technical_notes: "Migration pattern per filter:\n\nBefore:\n  impl Filter for Exposure {\n    fn compute(&self, input, w,\
    \ h) -> Result<Vec<f32>> {\n      let m = 2.0f32.powf(self.ev);\n      // manual pixel loop\n    }\n    fn analytic_expression(&self)\
    \ -> Option<PointOpExpr> {\n      Some(Mul(Input, Constant(2.0f32.powf(self.ev))))\n    }\n  }\n\nAfter:\n  impl Exposure\
    \ {\n    fn to_lmt(&self) -> Lmt {\n      Lmt::Analytical(Mul(Input, Constant(2.0f32.powf(self.ev))))\n    }\n  }\n  //\
    \ V2Filter derive generates LmtNode wrapper instead of FilterNode\n\nThe compute() method is no longer needed — LmtNode::compute()\n\
    evaluates the PointOpExpr. The analytical expression IS the\nimplementation, not a separate optimization hint.\n\nMigrate\
    \ in order of complexity:\n1. Invert (simplest — no params)\n2. Exposure (one param, pure multiply)\n3. Brightness (one\
    \ param, pure add)\n4. Contrast, Gamma, Levels\n5. AscCdl (becomes Lmt::Cdl directly)\n6. Remaining: Posterize, Sigmoidal,\
    \ Dodge, Burn, Solarize\n"
