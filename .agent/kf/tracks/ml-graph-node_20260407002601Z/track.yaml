id: ml-graph-node_20260407002601Z
title: ML node integration in pipeline graph with tensor conversion
type: feature
status: pending
created: 2026-04-07
updated: '2026-04-07'
spec:
  summary: 'Implement MlNode in the pipeline graph that calls ml-execute() via the

    host ML interface. Handle output dimension changes (upscale), mask output

    (single-channel to RGBA), and tensor format conversion (f32 RGBA to model

    input format).

    '
  context: "After the ml.wit interface revision, the pipeline needs a graph node that\ncan execute ML inference. This node\
    \ receives f32 RGBA pixels from upstream,\nconverts to the model's expected tensor format (e.g., RGB uint8 NCHW),\ncalls\
    \ ml-execute(), and converts the output back to f32 RGBA.\n\nKey challenges:\n- Tensor layout conversion: pipeline is\
    \ always f32 RGBA interleaved (HWC).\n  Models expect various formats (NCHW float32, NHWC uint8, etc.).\n- Dimension changes:\
    \ upscale models produce larger output. NodeInfo must\n  reflect the output dimensions, not input.\n- Mask output: segmentation\
    \ models produce single-channel output. The node\n  must expand to RGBA (mask in alpha, or grayscale in RGB).\n- Tiling:\
    \ models with fixed input size (e.g., 128x128) need automatic\n  tiling with overlap and seam blending. The model spec\
    \ declares input\n  requirements; the host decides concurrency based on hardware.\n- GPU plan integration: when prior\
    \ node has GPU output, the ml-stage\n  should receive GPU buffer data without unnecessary CPU roundtrip where\n  the host\
    \ supports it.\n\nTiling architecture:\n- Model inputSpec declares: fixedSize (or null for dynamic), overlap\n  pixels,\
    \ and padding mode (mirror/zero/clamp).\n- The tiling engine is a host-side concern. The guest MlNode sends\n  the full\
    \ image; the host tiles, runs concurrent inference (hardware-\n  determined parallelism), blends overlap regions, and\
    \ returns the\n  stitched result.\n- Concurrency is NOT in the model spec — the host estimates it from\n  available GPU\
    \ memory, device class, and model size.\n- Overlap blending uses linear feather to eliminate seam artifacts.\n- Model\
    \ variants (quality vs fast) are exposed as separate entries\n  in ml-capabilities. The application chooses which to use.\n"
  codebase_analysis: 'Files to create/modify:

    - crates/rasmcore-pipeline-v2/src/ml_node.rs (NEW): MlNode implementation

    - crates/rasmcore-pipeline-v2/src/graph.rs: add apply_ml() method

    - crates/rasmcore-pipeline-v2/src/lib.rs: export MlNode

    - crates/rasmcore-v2-wasm/src/lib.rs: wire apply-ml to graph.apply_ml()


    Pattern to follow: FilterNode in filter_node.rs

    - Implements Node trait (info, compute, capabilities, gpu_shaders)

    - Receives upstream via Upstream::request()

    - Stores NodeInfo with potentially different output dimensions


    Tensor conversion needs:

    - f32 RGBA HWC -> f32 RGB NCHW (drop alpha, transpose)

    - f32 RGBA HWC -> u8 RGB HWC (quantize, drop alpha)

    - f32 RGBA HWC -> f16 RGB NCHW (quantize, transpose)

    - Output reverse of above

    - For mask output: single f32 channel -> f32 RGBA (broadcast or alpha)


    GPU plan integration:

    - Add ml-stage variant to multi-gpu-plan (pipeline.wit)

    - The ml-stage carries model-ref + params, host decides GPU vs CPU path

    - Host can keep data on GPU if ML backend supports GPU buffer input

    '
  acceptance_criteria:
  - MlNode implements Node trait with correct NodeInfo (output dims may differ from input)
  - Tensor conversion handles f32/f16/u8 and HWC/NCHW layouts
  - Mask output correctly expanded to RGBA
  - Upscale output has correct dimensions in NodeInfo
  - apply_ml() in Graph creates MlNode and returns node-id
  - MlNode calls ml-execute via host import and handles ml-error
  - When ML not available, returns PipelineError with clear message
  - Unit tests with mock ml-execute
  out_of_scope: 'SDK/host-side ML execution. Model loading/caching. GPU buffer interop

    optimization (host internal). WebNN/ONNX Runtime integration.

    '
  technical_notes: "MlNode structure:\n- upstream: u32 (source node)\n- model: ModelRef { name, version }\n- params: Vec<u8>\
    \ (serialized param buffer)\n- input_desc: TensorDesc\n- output_desc: TensorDesc\n- output_kind: MlOutputKind (Image or\
    \ Mask)\n- output_scale: Option<u32>\n- info: NodeInfo (with output dimensions)\n\nCompute path:\n1. Request f32 RGBA\
    \ pixels from upstream\n2. Convert to model input format (tensor_to_bytes)\n3. Call ml_execute(ml_op)\n4. Convert output\
    \ bytes back to f32 RGBA (bytes_to_pixels)\n5. If mask: expand single channel to RGBA\n6. If upscale: NodeInfo already\
    \ has scaled dimensions\n\nGPU-first ML integration:\n- MlNode is a tiled operation (like spatial filters with tile_overlap)\n\
    - Pipeline tiles input based on model's inputSpec (fixedSize, overlap, padding)\n- Each tile: MlNode calls ml-execute(tile_tensor)\
    \ -> host returns GPU buffer\n- Output buffer feeds directly into next GPU stage (zero-copy when possible)\n- Host handles\
    \ internal copy if inference GPU != pipeline GPU\n- CPU fallback: ml-execute returns raw bytes, MlNode uploads to GPU\n\
    \nFor GPU plan integration, ml-stage becomes a stage in multi-gpu-plan:\nvariant stage-input {\n  pixels(pixel-buffer),\n\
    \  prior-stage(string),\n  ml-inference(ml-stage-desc),  // NEW — host runs inference, returns GPU buffer\n}\nThe host\
    \ receives an ml-stage in the gpu-plan. It runs inference and\nthe result is a GPU buffer that subsequent stages can reference\
    \ via\nprior-stage(name) — same as any other GPU stage output.\n"
