  note_on_tiling: |
    Tiling, overlap blending, and concurrent dispatch are HOST-SIDE concerns,
    not implemented in the guest graph node. The MlNode sends the full image
    via ml-execute; the host's tiling engine handles the rest. Tiling tasks
    belong in the ml-sdk-host track, not here.
