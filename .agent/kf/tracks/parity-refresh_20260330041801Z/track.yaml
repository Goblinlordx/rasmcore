id: parity-refresh_20260330041801Z
title: Refresh Parity Matrix & Format Gap Reports
type: chore
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: >
    Update stale parity-matrix.md and format-gap-analysis.md to reflect actual
    current state — dozens of capabilities listed as missing are now implemented.
  context: |
    Both .agent/kf/_reports/parity-matrix.md and format-gap-analysis.md were written
    2026-03-28 and are now significantly out of date. The parity matrix lists ~60%
    of filters as missing when only ~5 are truly absent. The format gap analysis
    understates decode (18 formats) and encode (16 formats) coverage.
  codebase_analysis: |
    Key discrepancies found between reports and actual state:

    CODECS — reports say missing, actually done:
    - SVG decode (resvg), JXL decode (jxl-oxide), JP2 R/W (justjp2)
    - FITS R/W (rasmcore-fits), HEIC R/W (feature-gated nonfree-hevc)
    - TGA/BMP/QOI/PNM all native crate R/W
    - HDR/EXR/DDS all encode+decode
    Actual: 18 decode formats, 16 encode formats

    FILTERS — reports say missing, actually implemented:
    - gamma, invert, posterize (point_ops.rs)
    - equalize, normalize, auto_level, histogram_match (histogram.rs)
    - CLAHE, Canny, Sobel, Scharr, Laplacian (registered filters)
    - 7 morphology ops (all registered)
    - median, bilateral, guided_filter (registered)
    - convolve, threshold_binary, adaptive_threshold (registered)
    - curves, ASC CDL, lift/gamma/gain, split toning (color_grading.rs)
    - tonemap Reinhard/Drago/Filmic (color_grading.rs)
    - 16 blend modes (filters.rs BlendMode enum)
    - smart_crop, seam_carve, selective_color (content_aware.rs)
    - inpaint (inpainting.rs)
    - quantize, dither_floyd_steinberg, dither_ordered (quantize.rs)
    Actual: 49 registered filters + ~30 unregistered implementations

    COLOR SPACES — reports say 1/13, actually implemented:
    - Lab, Oklab, ProPhoto, Adobe RGB, LCH, Luv, XYZ, Bradford adapt
    - Delta E (76, 94, 2000), white balance (gray world + temperature)
    - ICC extract from JPEG/PNG + ICC-to-sRGB

    METADATA — reports say 0/6, actually implemented:
    - EXIF read+write (metadata.rs)
    - XMP parse+serialize (metadata_xmp.rs)
    - IPTC parse+serialize (metadata_iptc.rs)
    - MetadataSet unified query API (metadata_query.rs)

    TRANSFORMS — reports say 5/14, actually 12+:
    - auto_orient, rotate_arbitrary, pad, trim, affine, undistort all exist

    ImageMagick full format catalog analysis:
    IM claims ~260 format entries, but only ~80-90 are real distinct image formats.
    Inflated by: ~60 aliases/internal formats (MIFF, MPC, PNG8/24/32/48/64, raw
    pixel dumps), ~15 pseudo-format generators (xc:, gradient:, plasma:), ~12
    output-only serialization (HTML, JSON, Braille, fax), ~10 video containers,
    ~5 font rasterizers. libvips supports ~25 format families natively.
    rasmcore covers 20/26 meaningful Tier 1-3 format families.
  acceptance_criteria:
    - parity-matrix.md reflects actual current state with correct done/partial/missing per row
    - format-gap-analysis.md Current Coverage table matches actual SUPPORTED_FORMATS
    - All implemented-but-unregistered functions noted in a new section
    - True remaining gaps clearly identified with accurate priority ratings
    - Full IM/vips format catalog comparison included (categorized by tier)
    - Date updated to 2026-03-30
  out_of_scope: |
    Implementing any new features — this track only updates documentation.
    No code changes to source files.
  technical_notes: |
    Audit methodology:
    1. Grep for SUPPORTED_FORMATS in encoder/mod.rs and decoder/mod.rs
    2. Grep for #[register_filter] annotations — count registered filters
    3. Grep for pub fn in each domain module — identify unregistered functions
    4. Cross-reference each parity-matrix.md row with actual implementations
    5. Update both reports in-place preserving format
    6. Add IM format catalog breakdown (core, modern, pro, RAW, scientific,
       legacy, internal/pseudo) with tier-based prioritization
