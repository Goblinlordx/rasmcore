        done: false
      - text: "Add WASM SIMD128 8x8 transpose for RGBA8 using i32x4 unpack pattern"
        done: false
      - text: "Implement RGB8 transpose via pad-to-RGBA + RGBA transpose + strip-alpha"
        done: false
      - text: "Handle edge tiles (partial rows/columns at image boundaries)"
        done: false
  - phase: "Rotate Integration"
    tasks:
      - text: "Wire rotate_90 as block_transpose + flip_vertical on raw buffer"
        done: false
      - text: "Wire rotate_270 as block_transpose + flip_horizontal on raw buffer"
        done: false
      - text: "Wire rotate_180 as simple full-buffer reversal (no transpose)"
        done: false
  - phase: "Verification"
    tasks:
      - text: "All existing transform parity tests pass (rotate_90, 180, 270)"
        done: false
      - text: "Benchmark rotate_90 at 256/512/1024 — verify near-linear scaling (< 5x per 4x pixels)"
        done: false
