id: brush-engine-cpu_20260407022101Z
title: CPU stamp-based brush engine with dynamics curves
type: feature
status: pending
created: '2026-04-07'
updated: '2026-04-07'
spec:
  summary: Spacing interpolation, dab generation with pressure/tilt/velocity dynamics, Catmull-Rom smoothing. CPU reference
    implementation that the GPU engine mirrors.
  context: 'After WIT types are defined, the pipeline needs a brush engine to convert stroke input + brush params into rendered
    pixels. This track implements the CPU reference engine: spacing interpolation along the stroke path, dab parameter computation
    from dynamics curves, and per-dab stamp compositing.'
  codebase_analysis: Engine lives in crates/rasmcore-pipeline-v2/src/brush/. New module. Uses StrokeInput from the WIT track.
    Dab compositing writes to f32 RGBA accumulation buffer. Dynamics curves use piecewise-linear lookup (same format as grading
    curves). Spacing interpolation is sequential (CPU-bound, low volume).
  acceptance_criteria:
  - 'Spacing interpolation: evenly-spaced dab positions along stroke path'
  - 'Dynamics curves: pressure/velocity/tilt map to size/opacity/angle via piecewise-linear control points'
  - Catmull-Rom path smoothing with adjustable strength
  - 'Dab stamp compositing: parametric circle tip with hardness falloff'
  - 'Scatter support: random perpendicular displacement per dab'
  - 'Accumulation buffer model: f32 RGBA, stroke composited then blended onto layer'
  - 'Round-trip test: draw stroke, verify pixels match expected stamp pattern'
  out_of_scope: GPU rendering. Custom brush textures (parametric circle only). Undo. Presets.
  technical_notes: ''
