id: webp-research_20260328054400Z
title: "Research: VP8 Encoder Architecture — RFC 6386, libwebp, Rust Design"
type: research
status: pending
created: 2026-03-28
updated: "2026-03-28"
spec:
  summary: |
    Deep-read RFC 6386 (VP8 bitstream), WebP container spec, and VP8L lossless
    spec. Study libwebp reference implementation (C, BSD-licensed). Produce a
    design document mapping spec sections to Rust modules, identifying C-specific
    patterns that need Rust-native alternatives.
  context: |
    No pure Rust VP8 lossy encoder exists. The image crate only supports lossless
    WebP (VP8L). To achieve full WebP support in rasmcore without C dependencies,
    we need to implement a VP8 encoder from the specification.

    This research track produces the architectural blueprint that all subsequent
    implementation tracks depend on. It maps the VP8 encoding pipeline to Rust
    modules, identifies data structures, and flags C-specific patterns (pointer
    arithmetic, manual memory management, global state, inline assembly) that
    need Rust-native redesigns.

    Standards and references:
    - RFC 6386: VP8 Data Format and Decoding Guide (the normative spec)
    - WebP Container Specification (Google): RIFF-based container wrapping VP8
    - VP8L Lossless Bitstream Specification (Google): for understanding lossless
    - libwebp source (BSD): Google's reference C implementation
    - libwebp source structure: src/enc/ directory contains encoder modules
  codebase_analysis: |
    - Current WebP encode in domain/encoder/webp.rs uses image-webp (lossless only)
    - New crate rasmcore-webp will be created as a separate workspace member
    - Must integrate via domain/encoder/webp.rs (replace image-webp for lossy,
      keep image-webp for lossless or implement both)
    - butteraugli 0.9 and dssim-core 3.4 already available as dev-dependencies
    - The architecture must follow hexagonal pattern: pure encoder logic with
      no WIT dependencies, thin adapter at rasmcore-image boundary
  acceptance_criteria:
    - Design document produced at .agent/kf/_reports/vp8-encoder-design.md
    - Document maps RFC 6386 sections to proposed Rust module structure
    - Document identifies VP8 encoding pipeline stages with data flow
    - Document catalogs C-specific patterns in libwebp that need Rust alternatives
    - Document specifies Rust-native designs for each identified C pattern
    - Document defines the rasmcore-webp crate public API surface
    - Document includes dependency analysis (what other crates are needed)
    - Document estimates relative complexity per module
  out_of_scope: |
    - Writing any Rust code (this is research only)
    - VP8 inter-frame prediction (video only, not needed for still images)
    - Animation support
    - Alpha channel encoding details (separate from VP8 lossy)
  technical_notes: |
    VP8 encoder pipeline (from RFC 6386, encoder perspective):
    1. Input: raw pixels (YUV420 or RGB converted to YUV420)
    2. Macroblock partitioning: 16x16 macroblocks, each split into 4x4 sub-blocks
    3. Intra-prediction: predict each block from neighbors (DC, V, H, TM, plus
       10 sub-block modes for 4x4)
    4. Residual computation: actual - predicted
    5. DCT: 4x4 Walsh-Hadamard transform on residuals
    6. Quantization: scale DCT coefficients by quality-derived quantizer
    7. Boolean arithmetic coding: entropy-encode quantized coefficients
    8. Loop filter: deblocking filter applied during reconstruction
    9. Rate control: adjust quantizer to hit target quality/size

    Key C-specific patterns to identify in libwebp:
    - Pointer arithmetic for pixel access (Rust: slices with bounds)
    - Global mutable state (Rust: pass state explicitly or use RefCell)
    - Manual memory management (Rust: ownership system)
    - Platform-specific SIMD intrinsics (Rust: safe SIMD via wide or std::simd)
    - Macro-heavy code generation (Rust: generics or const generics)
    - Goto-based error handling (Rust: Result/? operator)

    The design document should be detailed enough that a developer can pick up
    any subsequent track and implement it without re-reading the full RFC.
