id: gpu-shader-lib-crate_20260402001500Z
title: Create rasmcore-gpu-shaders crate — shared WGSL shader library with composition API
type: refactor
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: 'New crate providing reusable WGSL shader fragments (pixel ops, bilinear

    sampling) and composition functions to build complete shaders without

    copy-pasting boilerplate. Migrate all 18 existing shaders to use it.

    '
  context: 'Every WGSL shader in the project duplicates the same pack/unpack and

    sample_bilinear functions. 18 shaders each copy ~15 lines of identical

    code. When we fix a bug in pack() or add a new pixel format, we must

    update every shader file individually.


    The CPU side already solves this — common filter utilities live in

    filters/common/ and are imported via use. WGSL has no module system,

    but Rust-side string composition achieves the same result.

    '
  codebase_analysis: "CURRENT DUPLICATION (crates/rasmcore-image/src/shaders/):\n  fn unpack(pixel: u32) -> vec4<f32>  — identical\
    \ in 18 shaders\n  fn pack(color: vec4<f32>) -> u32    — identical in 18 shaders\n  fn sample_bilinear(fx, fy)       \
    \   — identical in 12 shaders (distortion + motion)\n\nSHADER FILES (18 total):\n  gaussian_blur, box_blur, sharpen, bilateral,\
    \ guided_filter, median,\n  spin_blur, motion_blur, zoom_blur, high_pass, spherize, swirl,\n  barrel, ripple, wave, polar,\
    \ depolar, affine_resample\n\nCURRENT USAGE PATTERN (gpu_impls.rs):\n  shader: include_str!(\"../../../shaders/gaussian_blur.wgsl\"\
    )\n  Each shader is a standalone file with all dependencies inlined.\n\nDEPENDENCY DIRECTION:\n  rasmcore-gpu-shaders\
    \ (new) — owns WGSL fragments + compose API\n  rasmcore-image — depends on rasmcore-gpu-shaders for shader composition\n\
    \  rasmcore-pipeline — unchanged (owns GpuOp/GpuCapable traits only)\n"
  acceptance_criteria:
  - New crate rasmcore-gpu-shaders in workspace
  - WGSL fragments for pixel_ops (pack/unpack) and sample_bilinear
  - compose() function that concatenates fragments + body into complete shader
  - Convenience composition functions for common patterns (with_pixel_ops, with_sampling)
  - All 18 existing shaders migrated to use composition — body files contain only Params + entry point
  - Naga validation in build.rs validates composed shaders (not just fragments)
  - All existing GpuCapable impls updated to use composed shaders via LazyLock
  - No functional change — GPU output identical before and after
  out_of_scope: 'WGSL preprocessor or macro system.

    naga-oil integration.

    New shader functionality (just refactoring existing).

    Changing the GpuOp or GpuCapable traits.

    '
  technical_notes: "CRATE STRUCTURE:\n  crates/rasmcore-gpu-shaders/\n    Cargo.toml\n    src/\n      lib.rs          — pub\
    \ API: constants + compose functions\n      wgsl/\n        pixel_ops.wgsl      — unpack/pack functions\n        sample_bilinear.wgsl\
    \ — bilinear sampling (requires Params with width/height)\n\nCOMPOSITION API:\n  pub const PIXEL_OPS: &str = include_str!(\"\
    wgsl/pixel_ops.wgsl\");\n  pub const SAMPLE_BILINEAR: &str = include_str!(\"wgsl/sample_bilinear.wgsl\");\n\n  /// Compose\
    \ shader from fragments + body. Fragments are prepended in order.\n  pub fn compose(fragments: &[&str], body: &str) ->\
    \ String;\n\n  /// Pixel ops only (pack/unpack). For blur, sharpen, bilateral, etc.\n  pub fn with_pixel_ops(body: &str)\
    \ -> String;\n\n  /// Pixel ops + bilinear sampling. For distortions, affine, motion blur.\n  pub fn with_sampling(body:\
    \ &str) -> String;\n\nSHADER BODY CONVENTION:\n  Body files contain ONLY the filter-specific code:\n    struct Params\
    \ { ... }\n    @group(0) @binding(0-2) var<...> ...\n    @compute @workgroup_size(...)\n    fn main(...) { ... }\n\n \
    \ The pack/unpack/sample_bilinear functions are composed in at the Rust level.\n  Binding declarations stay in the body\
    \ (they are filter-specific).\n\nMIGRATION PATTERN:\n  Before (gpu_impls.rs):\n    shader: include_str!(\"../../../shaders/spherize.wgsl\"\
    ),\n\n  After (gpu_impls.rs):\n    use rasmcore_gpu_shaders;\n    static SPHERIZE_SHADER: LazyLock<String> = LazyLock::new(||\
    \ {\n        rasmcore_gpu_shaders::with_sampling(\n            include_str!(\"../../../shaders/spherize.wgsl\")\n    \
    \    )\n    });\n    // In gpu_ops():\n    shader: &SPHERIZE_SHADER,\n\n  NOTE: GpuOp.shader is &'static str. LazyLock<String>\
    \ provides &str\n  via Deref, but GpuOp needs 'static. Either:\n    (a) Change GpuOp.shader to String (owned) — simplest\n\
    \    (b) Use LazyLock and leak the string — wasteful but works\n    (c) Use Cow<'static, str> — flexible\n  Recommend\
    \ (a): change shader field to String. The executor clones\n  it anyway for shader cache hashing.\n\nSAMPLE_BILINEAR CONSTRAINT:\n\
    \  sample_bilinear reads from binding(0) input array and uses\n  params.width / params.height for bounds. This requires:\n\
    \    - Params struct has width and height as first two u32 fields\n    - Input array is at binding(0)\n  This is already\
    \ true for all existing shaders (it is the convention).\n  Document this contract in the fragment file header.\n\nNAGA\
    \ VALIDATION:\n  Fragments alone are NOT valid WGSL (missing bindings, entry points).\n  Validate only composed shaders.\
    \ The build.rs naga pass should\n  compose each body with its required fragments before validation.\n"
