id: register-filters-core_20260330041359Z
title: Register Unregistered Core Filters (Point Ops, Histogram, Threshold, Color)
type: chore
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Register 15 implemented-but-invisible filters with #[register_filter] + ConfigParams: gamma, invert, posterize,
    equalize, normalize, auto_level, otsu/triangle threshold, grayscale, flatten, quantize, dither (2), white balance (2).

    '
  context: 'Per product.yaml registration-before-completion requirement, every filter must have

    #[register_filter] annotation and appear in param-manifest.json to be visible to

    WASM consumers, the SDK, and the demo UI. Currently 49 filters are registered but

    ~27 additional implementations exist as pub fn without registration. This track

    covers the 15 most fundamental ones.


    Codecs are fully registered — all 16 encode formats and 18 decode formats have

    proper dispatch in SUPPORTED_FORMATS, encoder/decoder modules, and

    supported_formats() functions. No codec registration work needed.

    '
  codebase_analysis: "UNREGISTERED FUNCTIONS TO REGISTER (15 total):\n\npoint_ops.rs — LUT-collapsible per-pixel operations:\n\
    \  1. gamma(pixels, info, gamma_value: f32)         → ConfigParams {gamma_value: f32 [0.1..10.0, default 1.0]}\n  2. invert(pixels,\
    \ info)                           → no params, category \"adjustment\"\n  3. posterize(pixels, info, levels: u8)     \
    \        → ConfigParams {levels: u8 [2..255, default 8]}\n\nhistogram.rs — global histogram operations:\n  4. equalize(pixels,\
    \ info)                          → no params, category \"enhancement\"\n  5. normalize(pixels, info)                 \
    \        → no params, category \"enhancement\"\n  6. auto_level(pixels, info)                        → no params, category\
    \ \"enhancement\"\n\nfilters.rs — auto-threshold wrappers:\n  7. otsu_threshold(pixels, info) → u8              → wrapper\
    \ computes + applies threshold\n  8. triangle_threshold(pixels, info) → u8          → wrapper computes + applies threshold\n\
    \nfilters.rs — color/alpha:\n  9. grayscale(pixels, info)                         → no params, category \"color\"\n 10.\
    \ flatten(pixels, info, bg_color)                 → ConfigParams {bg_r, bg_g, bg_b: u8 [0..255]}\n\nquantize.rs — color\
    \ reduction:\n 11. quantize(pixels, info, palette)                 → ConfigParams {max_colors: u32 [2..256, default 256]}\n\
    \ 12. dither_floyd_steinberg(pixels, info, palette)   → ConfigParams {max_colors: u32 [2..256, default 256]}\n 13. dither_ordered(pixels,\
    \ info, map_size)           → ConfigParams {map_size: u32 [2,4,8,16], default 4}\n\ncolor_spaces.rs — white balance:\n\
    \ 14. white_balance_gray_world(pixels, info)           → no params, category \"color\"\n 15. white_balance_temperature(pixels,\
    \ info, t, tint) → ConfigParams {temperature: f32 [2000..12000], tint: f32 [-1..1]}\n\nREGISTRATION PATTERN (existing\
    \ example from filters.rs):\n  - Add #[derive(ConfigParams)] struct with #[param(...)] fields\n  - Add #[rasmcore_macros::register_filter(name\
    \ = \"...\", category = \"...\")]\n  - Wrapper fn takes FilterInput, extracts params, calls underlying fn\n  - Build script\
    \ auto-discovers annotations → generates WIT + adapter glue\n\nNOTES:\n  - gamma, invert, posterize are LUT-collapsible\
    \ (set is_lut_collapsible = true)\n  - otsu/triangle return u8 threshold values; registered wrappers should compute\n\
    \    threshold then apply it (matching OpenCV THRESH_OTSU/THRESH_TRIANGLE behavior)\n  - quantize/dither need a wrapper\
    \ that runs median_cut() internally to build\n    the palette from max_colors, then applies quantization\n"
  acceptance_criteria:
  - All 15 functions have
  - ConfigParams structs with
  - All 15 appear in generated param-manifest.json after cargo build
  - LUT-collapsible flag set where applicable (gamma, invert, posterize)
  - Existing unit tests pass (cargo test)
  - No new crate dependencies added
  out_of_scope: 'New SIMD paths — these already auto-vectorize via LUT or are non-hot-path.

    New parity tests — existing correctness tests cover the underlying functions.

    Multi-image filters (blend, inpaint) — deferred to pipeline architecture work.

    Pro grading filters (curves, CDL, etc.) — separate track register-filters-pro.

    '
  technical_notes: 'All 15 functions are already implemented, tested, and correct. This track is

    purely about adding the registration annotations and ConfigParams structs to

    make them discoverable through the WASM API.


    For quantize/dither: the existing functions take a pre-built palette. The

    registered wrapper should accept max_colors, call median_cut() to build the

    palette, then call the underlying function. This matches the user-facing

    expectation (user specifies color count, not palette).


    For otsu/triangle: the existing functions return a u8 threshold value. The

    registered wrapper should compute the threshold, then call threshold_binary()

    to produce a binary image.

    '
