id: v2-metadata-wit_20260409104201Z
title: Expose image metadata via WIT interface
type: feature
status: pending
created: '2026-04-09'
updated: '2026-04-09'
spec:
  summary: Add metadata record types to WIT (exif, xmp, icc bytes). Add node-metadata method to pipeline resource. Host SDK
    can read EXIF/XMP/ICC after a read call.
  context: After MetadataSet flows through V2, the host needs to access it via the WIT interface. This enables SDK users to
    read EXIF (orientation, camera model, GPS), XMP, IPTC, and ICC profile data from loaded images without custom parsing.
  codebase_analysis: ''
  acceptance_criteria:
  - WIT metadata record type with exif, xmp, iptc, icc-profile fields (all option<buffer>)
  - node-metadata method on image-pipeline-v2 returns metadata for any node
  - Source resource exposes metadata without rendering
  - SDK Pipeline.metadata getter returns typed metadata object
  - WASM component builds with new WIT types
  out_of_scope: Parsed EXIF field access (structured ExifData). That is host-side SDK parsing of raw EXIF bytes. This track
    only exposes raw bytes.
  technical_notes: ''
plan: []
extra: {}
