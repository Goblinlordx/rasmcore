id: v2-compositor-node_20260410121500Z
title: V2 compositor node — dual-input blend/composite pipeline primitive
type: feature
status: pending
created: '2026-04-10'
updated: '2026-04-10'
spec:
  summary: |
    Add a dual-input compositor node to the V2 pipeline. Currently all filters are
    single-input (one upstream node). Compositing operations (blend two images,
    Porter-Duff alpha composite, displacement map) require two image inputs but
    have no V2 pipeline primitive. The blend filter self-blends as a workaround
    and explicitly references a "composite node" that does not exist.
  context: |
    The V2 pipeline (rasmcore-pipeline-v2) processes images as a DAG of nodes.
    Every node implements the Node trait with upstream_ids() -> Vec<u32> and
    compute(request, upstream) where upstream.request(id, rect) can pull data
    from any upstream. This infrastructure ALREADY supports multi-input nodes.

    However, the Filter trait and FilterNode wrapper are single-input only:
    - Filter::compute(&self, input: &[f32], w, h) — one buffer
    - FilterNode has upstream: u32 (singular)
    - WIT apply-filter takes source: node-id (singular)

    The V1 system had #[register_compositor] and codegen for compositors:
    - rasmcore-macros has register_compositor proc macro (lib.rs:217)
    - rasmcore-codegen parses them (parse/simple_regs.rs)
    - param-manifest.json has compositors: [] slot
    But NO compositor functions are actually annotated in the current codebase.

    The old V1 domain has alpha_composite_over() (rasmcore-image/src/domain/composite.rs)
    operating on RGBA8 — this predates the f32 pipeline.

    The blend filter (filters/composite/blend.rs) explicitly notes:
    "This is a single-input filter... For two-layer compositing, use the
    pipeline's composite node instead." — but that node does not exist.
  codebase_analysis: |
    Key files:
    - crates/rasmcore-pipeline-v2/src/node.rs — Node trait, Upstream trait (multi-input ready)
    - crates/rasmcore-pipeline-v2/src/filter_node.rs — FilterNode (single upstream: u32)
    - crates/rasmcore-pipeline-v2/src/ops.rs — Filter trait (single &[f32] input)
    - crates/rasmcore-pipeline-v2/src/filters/composite/ — blend, blend_if, premultiply, unpremultiply
    - wit/v2/pipeline.wit:396 — apply-filter(source: node-id, name, params) — single source
    - crates/rasmcore-macros/src/lib.rs:217 — register_compositor proc macro (V1, unused)
    - crates/rasmcore-codegen/src/generate/manifest.rs — compositors slot in param-manifest
    - crates/rasmcore-image/src/domain/composite.rs — V1 RGBA8 Porter-Duff (not V2)

    The Node trait's upstream_ids() -> Vec<u32> and Upstream::request(id, rect)
    already support multi-input. CompositorNode just needs to use this.

    GPU shader composition (filter_node.rs IO_F32 fragment) binds one input
    and one output storage buffer. Dual-input shaders need a second input binding.
  acceptance_criteria:
    - Compositor trait in ops.rs with compute(&self, fg, bg, w, h) signature
    - CompositorNode in compositor_node.rs wrapping two upstream IDs, implementing Node
    - WIT apply-compositor(source-a, source-b, name, params) in pipeline.wit
    - WASM adapter implements apply-compositor dispatching to registered compositors
    - V2 derive macro support (#[derive(Compositor)] or #[filter(compositor = true)])
    - At least one real compositor registered — Porter-Duff over (f32 version of existing V1)
    - Blend filter refactored to dual-input compositor (fg + bg instead of self-blend)
    - GPU dual-input IO fragment (io_f32_dual) with load_pixel_a/load_pixel_b
    - param-manifest.json compositors list populated for registered compositors
    - SDK codegen emits applyCompositor() method (TypeScript, Go, Python)
    - Demo worker expandArgs handles apply-compositor calls
    - Existing single-input blend filter preserved as deprecated alias or removed
    - Unit tests for CompositorNode with two upstream sources in Graph
    - Blend parity test — dual-input blend produces correct results for all 25 modes
  out_of_scope: |
    - N-input compositors (>2 inputs) — future extension, not needed now
    - Displacement map filter (uses second image for UV offset) — separate track
    - Layer stack compositing in web UI — already handled client-side
    - Mask-based selective compositing (mask_combine already exists as single-input)
  technical_notes: |
    Approach:
    1. Add Compositor trait alongside Filter in ops.rs — same pattern but two inputs
    2. CompositorNode wraps (upstream_a: u32, upstream_b: u32, info, compositor)
       and implements Node with upstream_ids() -> vec![upstream_a, upstream_b]
    3. compute() calls upstream.request() for both IDs, passes both buffers to
       compositor.compute(fg, bg, w, h)
    4. GPU path: new io_f32_dual.wgsl fragment with input_a and input_b bindings
       at @group(0) @binding(0) and @group(0) @binding(3) (or similar)
    5. WIT: add apply-compositor to pipeline resource interface
    6. Adapter: registry lookup by name, deserialize params, construct CompositorNode
    7. Derive macro: extend rasmcore-macros to support compositor registration
       (could be #[derive(Compositor)] with #[compositor(...)] attributes)
    8. Codegen: extend rasmcore-codegen to generate pipeline nodes and WIT for compositors
    9. The existing self-blend filter can be kept as-is for backward compat
       (it's useful as a single-input effect), but the real blend should be a compositor

    Size matching: both inputs must have the same dimensions. The WIT function should
    error if source-a and source-b have different node-info dimensions. Future work
    could add offset/alignment parameters.
