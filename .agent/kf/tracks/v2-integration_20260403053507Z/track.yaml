title: V2 integration — WIT interface, WASM build, V1 removal
type: refactor
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: |
    Generate WIT interface from V2 registrations, build WASM component,
    update host SDKs, and remove V1 pipeline code. The final track
    that makes V2 the production pipeline.
  context: |
    After Tracks 1-7, all V2 components exist alongside V1. This track:
    1. Generates WIT from V2 operation registrations (replaces V1 codegen)
    2. Builds the WASM component against V2 pipeline
    3. Updates TypeScript/Rust host SDKs for V2 API
    4. Updates web-ui gpu-handler.ts for V2 (f32-only, simplified)
    5. Removes V1 pipeline code, format dispatch, u8-era infrastructure
    6. Final validation: all parity tests, all GPU tests, WASM build

    After this track, the codebase is clean V2 with zero V1 legacy.
  acceptance_criteria:
    - WIT generated from V2 OperationRegistration (auto, not manual)
    - WASM component builds and passes wasm-tools validate
    - TypeScript host SDK updated for V2 API
    - web-ui gpu-handler.ts simplified (f32 only, no BufferFormat dispatch)
    - All V1 format dispatch code removed
    - Zero references to process_via_8bit, is_16bit, PixelFormat in filter code
    - All 2,593 existing tests pass (or equivalents in V2)
    - GPU parity tests pass for all GPU-capable filters
    - ACES validation test vectors pass (from ctlrender reference)
    - V1 pipeline crate deprecated or removed
    - Build time reduced (fewer codegen paths, no format dispatch)
  out_of_scope: |
    New features on V2 (separate tracks).
    Performance optimization beyond V1 parity.
  technical_notes: |
    WIT generation from V2 registrations:

    V1: build.rs parses Rust source AST, generates WIT methods
    V2: derive(Operation) macro emits WIT-compatible metadata
        Build script collects metadata, generates pipeline.wit

    The WIT surface should be organized:
    - interface filters { ... }       // grouped by category
    - interface transforms { ... }
    - interface codecs { ... }
    - resource image-pipeline { ... } // orchestration

    Host SDK changes:
    - TypeScript: all pixel data is Float32Array (no Uint8Array for pixels)
    - Rust: wasmtime host binds f32 buffers
    - gpu-handler.ts: remove BufferFormat, always f32

    V1 removal checklist:
    - rasmcore-pipeline V1 (keep as deprecated, remove when no consumers)
    - PixelFormat enum (remove from pipeline, keep in codec boundary only)
    - process_via_8bit, process_via_standard (delete)
    - validate_format, is_16bit, is_float, is_f32 (delete)
    - io_u32.wgsl, pixel_ops.wgsl (delete — io_f32 only)
    - Q16 EWA internals (replace with f64 native)
    - BufferFormat::U32Packed (delete)
