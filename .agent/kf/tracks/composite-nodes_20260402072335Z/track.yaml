id: composite-nodes_20260402072335Z
title: Composite nodes — pipeline-as-node with input/output refs and analysis sinks
type: feature
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: 'Implement composite nodes that contain an internal pipeline graph with

    input/output reference nodes. Enables analysis sinks (consume pixels,

    output params), pipeline composition (analysis output feeds processing

    input), presets-as-composites, and plugin-defined multi-step operations.

    '
  context: "The pipeline architecture doc (sections 3.3b and 3.3c) defines two\nrelated concepts that need implementation:\n\
    \n1. Analysis sinks — sink nodes that consume pixels and output structured\n   params instead of encoded bytes. Used for\
    \ auto-crop, auto-levels,\n   histogram analysis, etc.\n\n2. Composite nodes — a node whose implementation is itself a\
    \ pipeline\n   with input/output refs. The outer pipeline treats it as an opaque node.\n   Composites can contain analysis\
    \ sinks internally, enabling patterns\n   like auto-crop (analyze edges, extract crop rect, apply crop).\n\nThese unify\
    \ presets, recipes, auto-* operations, and plugin multi-step\nfilters under one mechanism. The three-phase execution model\
    \ (forward\ninfo, backward request, forward pixels) works recursively through\ncomposite boundaries.\n"
  codebase_analysis: 'Existing infrastructure:

    - NodeGraph already supports DAG topology (multiple consumers of one source)

    - ImageNode trait has info(), compute_region(), input_rect(), access_pattern()

    - Sink nodes exist (encoder sinks in pipeline/nodes/sink.rs)

    - Layer cache operates per-node by content hash


    New components needed:

    1. InputRefNode — placeholder that receives pixels from outer graph

    2. OutputRefNode — marks the output of the internal graph

    3. AnalysisSink — trait/interface for sinks that return params

    4. CompositeNode — ImageNode impl that wraps an internal NodeGraph

    5. CompositeBuilder — API for constructing composite node definitions

    6. Serialization — composite definitions as storable/loadable configs

    '
  acceptance_criteria:
  - InputRefNode that acts as pixel source within a composite's internal graph
  - OutputRefNode that marks the composite's output
  - CompositeNode implementing ImageNode (info, compute_region, input_rect derived from internal graph)
  - Analysis sink trait that consumes pixels and returns structured results
  - Pipeline composition API — analysis result feeds into node config
  - At least one concrete analysis sink (auto_crop or auto_levels)
  - Composite node definition serializable to/from config (for presets)
  - Nested composites work (composite containing composite)
  - Layer cache works correctly with composite node boundaries
  - Full test suite passes, WASM build clean
  out_of_scope: 'Plugin-defined composites (depends on plugin node system track).

    Preset UI/management (SDK/UI concern). ML-based analysis sinks

    (depends on ML execution track).

    '
  technical_notes: "CompositeNode implementation:\n\nfn info(&self) -> ImageInfo:\n  Returns self.internal_graph.node_info(output_ref_id)\n\
    \nfn input_rect(&self, output: Rect, bw: u32, bh: u32) -> Rect:\n  Traces backward through internal graph from output_ref\
    \ to input_ref,\n  composing each node's input_rect. Returns what the input_ref needs.\n\nfn compute_region(&self, request:\
    \ Rect, upstream_fn: ...) -> Result<Vec<u8>>:\n  1. Fetch upstream pixels via upstream_fn (for the input_ref)\n  2. Inject\
    \ into internal graph's input_ref node\n  3. Execute internal graph requesting 'request' from output_ref\n  4. Return\
    \ result\n\nAnalysis sink pattern within composite:\n  1. Internal graph materializes through analysis sink\n  2. Analysis\
    \ sink returns params (crop rect, levels values, etc.)\n  3. Params are used to configure a processing node in the same\
    \ graph\n  4. Processing node produces the composite's pixel output\n\nPreset serialization:\n  A composite definition\
    \ = list of (node_type, config, connections).\n  Serializable as JSON/YAML. Loading a preset constructs the internal\n\
    \  graph. No code execution — just graph construction with known node types.\n"
