id: filter-rect-request-foundation_20260331124600Z
title: Filter rect-request model -- codegen + signature change
type: refactor
status: completed
created: '2026-03-31'
updated: '2026-04-01'
spec:
  summary: 'Change all filter function signatures to receive (request: Rect,

    upstream: &mut UpstreamFn, info: &ImageInfo, ...) so each filter

    explicitly requests its own upstream pixels. Remove the overlap

    heuristic and attribute system entirely.

    '
  context: 'Currently filter authors write plain functions (pixels in, pixels out)

    and the codegen system guesses what upstream rect to request based on

    field name heuristics (radius, ksize, sigma, etc.) or explicit overlap

    attributes. This is fragile and invisible.


    The new model: every filter function receives (request, upstream_fn)

    and calls upstream_fn(rect) with whatever rect it needs. Point ops

    pass request through. Spatial ops expand it. The expansion is visible

    right in the filter code -- no hidden codegen layer.

    '
  codebase_analysis: "CURRENT SYSTEM:\n- 134 registered filters in filters.rs (one 20K-line file)\n- 9 explicit overlap attributes\n\
    - Heuristic in codegen detects radius/ksize/sigma/diameter/kw/kh\n- Generated compute_region() calls input_rect() then\
    \ upstream_fn()\n- Filter function never sees Rect or upstream_fn\n\nKEY FILES:\n- crates/rasmcore-image/src/domain/filters.rs\
    \ -- all filter implementations\n- crates/rasmcore-codegen/src/generate/pipeline.rs -- node codegen\n- crates/rasmcore-codegen/src/generate/pipeline_mapper.rs\
    \ -- mapper node codegen\n- crates/rasmcore-codegen/src/generate/adapter.rs -- WIT adapter codegen\n- crates/rasmcore-codegen/src/parse/filters.rs\
    \ -- filter signature parser\n- crates/rasmcore-codegen/src/parse/mappers.rs -- mapper signature parser\n- crates/rasmcore-codegen/src/types.rs\
    \ -- FilterReg struct\n- crates/rasmcore-image/src/domain/filter_registry.rs -- runtime registry (hand-wired)\n\nCALL\
    \ SITES FOR EACH FILTER (all must be updated per filter):\n1. The filter function itself in filters.rs\n2. Generated pipeline\
    \ node (auto-handled by codegen dual-path)\n3. Generated WIT adapter (auto-handled by codegen dual-path)\n4. filter_registry.rs\
    \ builtin_filter! calls (hand-wired, ~22 entries)\n5. Internal cross-calls (one filter calling another, e.g. sharpen calls\
    \ blur)\n6. process_via_8bit closures (16-bit delegation that re-calls the filter)\n7. Test code calling the filter directly\n\
    8. Any external callers (transform.rs, etc.)\n\nNEW SIGNATURE:\n  fn filter_name(\n      request: Rect,\n      upstream:\
    \ &mut UpstreamFn,\n      info: &ImageInfo,\n      config: &FilterParams,  // UNCHANGED -- keep config structs exactly\
    \ as-is\n  ) -> Result<Vec<u8>, ImageError>\n\nTYPES ALREADY ADDED TO filters.rs:\n  use rasmcore_pipeline::Rect;\n  pub\
    \ type UpstreamFn<'a> = dyn FnMut(Rect) -> Result<Vec<u8>, ImageError> + 'a;\n"
  acceptance_criteria:
  - All filter functions receive (request, upstream) as first two params
  - Config structs (BlurParams, etc.) are UNCHANGED -- same fields, same types
  - Codegen handles both old and new signatures simultaneously
  - Build (native + WASM via cargo component build) passes after EACH filter migration
  - Tests pass after EACH filter migration
  - After all filters migrated, overlap heuristic code removed from codegen
  - grep for overlap = in filters.rs returns 0 matches
  out_of_scope: 'Changing filter logic. Changing config structs. Splitting filters.rs

    into multiple files. Changing how mappers work (separate track).

    Making spatial filters actually request expanded rects (future -- for

    now they just do upstream(request) same as point ops).

    '
  technical_notes: 'SEE APPENDIX BELOW FOR PRECISE STEP-BY-STEP PLAN.

    '
