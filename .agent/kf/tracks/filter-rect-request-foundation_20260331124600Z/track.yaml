extra:
  appendix: "================================================================\nAPPENDIX: PRECISE MIGRATION PROTOCOL FOR EACH\
    \ FILTER\n================================================================\n\nSTARTING POINT:\nBranch kf/refactor/filter-rect-request-foundation_20260331124600Z\n\
    has the dual-path codegen and brightness already migrated.\nBuild is green (native + WASM). All tests pass.\n\n----------------------------------------------------------------\n\
    FOR EACH FILTER, A SUBAGENT DOES THIS:\n----------------------------------------------------------------\n\nThe subagent\
    \ works in an isolated worktree branched from the\nimplementation branch (NOT main).\n\nSTEP 1: VALIDATE CURRENT STATE\n\
    \  cargo build -p rasmcore-image\n  cargo component build -p rasmcore-image\n  cargo test -p rasmcore-image --lib <filter_name>\n\
    \  All must pass before touching anything.\n\nSTEP 2: CHANGE THE FILTER SIGNATURE\n  In crates/rasmcore-image/src/domain/filters.rs,\
    \ find the function.\n  Example -- before:\n\n    pub fn contrast(\n        pixels: &[u8],\n        info: &ImageInfo,\n\
    \        config: &ContrastParams,\n    ) -> Result<Vec<u8>, ImageError> {\n        let amount = config.amount;\n     \
    \   ...\n\n  After:\n\n    pub fn contrast(\n        request: Rect,\n        upstream: &mut UpstreamFn,\n        info:\
    \ &ImageInfo,\n        config: &ContrastParams,\n    ) -> Result<Vec<u8>, ImageError> {\n        let pixels = upstream(request)?;\n\
    \        let info = &ImageInfo { width: request.width, height: request.height, ..*info };\n        let pixels = pixels.as_slice();\n\
    \        let amount = config.amount;\n        ...\n\n  RULES:\n  - Replace ONLY \"pixels: &[u8], info: &ImageInfo\" with\n\
    \    \"request: Rect, upstream: &mut UpstreamFn, info: &ImageInfo\"\n  - Add exactly 3 lines after the opening brace:\n\
    \      let pixels = upstream(request)?;\n      let info = &ImageInfo { width: request.width, height: request.height, ..*info\
    \ };\n      let pixels = pixels.as_slice();\n  - DO NOT change config struct params. &BlurParams stays &BlurParams.\n\
    \  - DO NOT change return type.\n  - DO NOT change any other code in the function body.\n\nSTEP 3: FIX INTERNAL CROSS-CALLS\n\
    \  Search for any place THIS filter is called from WITHIN filters.rs:\n    grep -n \"filter_name(\" crates/rasmcore-image/src/domain/filters.rs\n\
    \n  Common patterns:\n\n  a) process_via_8bit closure:\n     BEFORE: process_via_8bit(pixels, info, |p8, i8| contrast(p8,\
    \ i8, config))\n     AFTER:  process_via_8bit(pixels, info, |p8, i8| {\n                 let r = Rect::new(0, 0, i8.width,\
    \ i8.height);\n                 let mut u = |_: Rect| Ok(p8.to_vec());\n                 contrast(r, &mut u, i8, config)\n\
    \             })\n\n  b) Direct cross-call from another filter:\n     BEFORE: let result = blur(pixels, info, 1.0)?;\n\
    \     AFTER:  let result = {\n                 let r = Rect::new(0, 0, info.width, info.height);\n                 let\
    \ mut u = |_: Rect| Ok(pixels.to_vec());\n                 blur(r, &mut u, info, 1.0)?\n             };\n\n  c) process_via_8bit\
    \ passing the function directly:\n     BEFORE: process_via_8bit(pixels, info, sobel)\n     AFTER:  process_via_8bit(pixels,\
    \ info, |p8, i8| {\n                 let r = Rect::new(0, 0, i8.width, i8.height);\n                 let mut u = |_: Rect|\
    \ Ok(p8.to_vec());\n                 sobel(r, &mut u, i8)\n             })\n\nSTEP 4: FIX FILTER_REGISTRY.RS (if applicable)\n\
    \  Search: grep \"filters::filter_name(\" crates/rasmcore-image/src/domain/filter_registry.rs\n\n  If found, change:\n\
    \    BEFORE: filters::contrast(input.pixels, input.info, &filters::ContrastParams { amount })\n    AFTER:  {\n       \
    \         let r = rasmcore_pipeline::Rect::new(0, 0, input.info.width, input.info.height);\n                let p = input.pixels;\n\
    \                let mut u = |_: rasmcore_pipeline::Rect| -> Result<Vec<u8>, ImageError> { Ok(p.to_vec()) };\n       \
    \         filters::contrast(r, &mut u, input.info, &filters::ContrastParams { amount })\n            }\n\nSTEP 5: FIX\
    \ TEST CODE\n  Search: grep -rn \"filter_name(\" crates/rasmcore-image/src/ | grep -v \"^.*:.*pub fn\"\n\n  For each test\
    \ call:\n    BEFORE: contrast(&px, &info, &ContrastParams { amount: 0.5 })\n    AFTER:  contrast(\n                Rect::new(0,\
    \ 0, info.width, info.height),\n                &mut |_| Ok(px.to_vec()),\n                &info,\n                &ContrastParams\
    \ { amount: 0.5 },\n            )\n\nSTEP 6: FIX OTHER CALLERS\n  Search: grep -rn \"filters::filter_name(\" crates/rasmcore-image/src/\n\
    \n  Any file (transform.rs, color_grading.rs, etc.) that calls the filter\n  needs the same wrapping pattern as step 4.\n\
    \nSTEP 7: VALIDATE\n  cargo build -p rasmcore-image           # native build\n  cargo component build -p rasmcore-image\
    \  # WASM build\n  cargo test -p rasmcore-image --lib <filter_name>  # filter-specific tests\n\n  ALL THREE must pass.\
    \ If any fail, fix before proceeding.\n\nSTEP 8: COMMIT\n  git add -A\n  git commit -m \"refactor: migrate <filter_name>\
    \ to rect-request signature\"\n\nSTEP 9: MERGE BACK\n  Merge the worktree branch back to the implementation branch.\n\n\
    ----------------------------------------------------------------\nIMPORTANT WARNINGS (from failed attempts):\n----------------------------------------------------------------\n\
    \n1. DO NOT flatten config structs. &BlurParams stays &BlurParams.\n   The WIT system uses ConfigParams = WIT record.\
    \ Flattening breaks WASM.\n\n2. DO NOT change any code inside the filter body beyond the 3 added lines.\n\n3. DO NOT use\
    \ a script to bulk-migrate. Each filter has unique call sites\n   (process_via_8bit patterns, cross-calls, tests). Do\
    \ them one at a time.\n\n4. The parser skip list uses full.contains(\"request : Rect\") (with space)\n   to avoid matching\
    \ \"DrawRectParams\". Do NOT use full.contains(\"Rect\").\n\n5. ALWAYS check WASM build (cargo component build), not just\
    \ native build.\n\n6. ALWAYS diff the changes before committing. Verify only the intended\n   lines changed.\n\n----------------------------------------------------------------\n\
    FILTER LIST (134 total, brightness already done):\n----------------------------------------------------------------\n\n\
    Get the full list with:\n  grep -n \"register_filter\\|register_mapper\" crates/rasmcore-image/src/domain/filters.rs\n\
    \nEach registered pub fn is one migration unit. Generators (register_generator)\nare NOT included -- they don't take pixels/info.\n\
    \nOrder does not matter since both codegen paths coexist. However, if filter A\ncalls filter B internally, migrating B\
    \ first avoids having to wrap B's call\ntwice (once during A's migration, then again when B migrates). Suggested\norder:\
    \ leaf filters first (no internal cross-calls), then filters that\ncall others.\n"
