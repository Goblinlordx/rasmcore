id: color-crate_20260328070200Z
title: "rasmcore-color — Shared Color Space Conversion Crate"
type: refactor
status: pending
created: 2026-03-28
updated: "2026-03-28"
spec:
  summary: |
    Extract color space conversion into a shared rasmcore-color crate with
    parameterized coefficient matrices (BT.601, BT.709, BT.2020). Refactor
    rasmcore-webp to use it. Both rasmcore-jpeg and rasmcore-webp will depend
    on this crate. Zero external dependencies.
  context: |
    rasmcore-webp currently has an inline color.rs implementing RGB-to-YCbCr
    conversion with hardcoded BT.601 integer coefficients. The upcoming
    rasmcore-jpeg crate needs the exact same conversion. Future codecs
    (AVIF/AV1, HEIF/H.265) will need BT.709 and BT.2020.

    Rather than duplicate the code, extract it into a shared crate that
    both codec crates depend on. The conversion is parameterized by a
    coefficient matrix, with BT.601/BT.709/BT.2020 as named presets.

    BT.601 is mandatory for JPEG (ITU-T T.81) and VP8 (RFC 6386) — the
    decoder on the other end assumes these coefficients. BT.709 is used
    by H.264/H.265/AV1. BT.2020 is used by HDR content. The standard
    to use is dictated by the codec, not by user preference.

    All arithmetic uses integer fixed-point math (no floating point in
    hot paths) matching the existing rasmcore-webp implementation.
  codebase_analysis: |
    Existing implementation in rasmcore-webp/src/color.rs:
    - YuvImage struct with separate Y, U, V planes
    - rgb_to_yuv420(): full-resolution Y, half-resolution U/V via 2x2 averaging
    - rgba_to_yuv420(): strips alpha then delegates to rgb_to_yuv420
    - BT.601 integer coefficients: Y = (66R + 129G + 25B + 128)>>8 + 16
    - Handles odd dimensions with div_ceil(2)
    - 5 tests covering dimensions, odd sizes, black/white reference values

    rasmcore-pipeline (crates/rasmcore-pipeline):
    - Current shared primitives crate (SpatialCache, Rect, Overlap)
    - Color math is a different domain — separate crate is cleaner

    Workspace structure (Cargo.toml):
    - Members: rasmcore-pipeline, rasmcore-image, rasmcore-webp, rasmcore-jxl, wasm-integration
    - Workspace deps: image = "0.25"

    rasmcore-webp/Cargo.toml has zero runtime dependencies (by design).
    Adding rasmcore-color as a dependency is acceptable since it is our
    own code with zero external dependencies — the "zero deps" property
    is preserved transitively.

    BT.601 integer coefficients (used by JPEG, VP8):
      Y  =  ( 66*R + 129*G +  25*B + 128) >> 8 + 16
      Cb = (-38*R -  74*G + 112*B + 128) >> 8 + 128
      Cr = (112*R -  94*G -  18*B + 128) >> 8 + 128

    BT.709 integer coefficients (used by H.264, AV1):
      Y  =  ( 47*R + 157*G +  16*B + 128) >> 8 + 16
      Cb = (-26*R -  87*G + 112*B + 128) >> 8 + 128
      Cr = (112*R - 102*G -  10*B + 128) >> 8 + 128

    BT.2020 integer coefficients (used by HDR):
      Y  =  ( 67*R + 174*G +  13*B + 128) >> 8 + 16
      Cb = (-36*R -  76*G + 112*B + 128) >> 8 + 128
      Cr = (112*R - 101*G -  11*B + 128) >> 8 + 128
  acceptance_criteria:
    - New rasmcore-color crate in workspace with zero external dependencies
    - Parameterized RGB-to-YCbCr conversion with coefficient matrix
    - Parameterized YCbCr-to-RGB inverse conversion
    - Named presets for BT.601, BT.709, BT.2020
    - Chroma subsampling support (4:2:0 with 2x2 averaging, 4:4:4 full resolution)
    - RGBA input support (alpha channel discarded)
    - Gray8 input support (Y-only, no chroma)
    - All integer arithmetic (no floating point in conversion hot path)
    - Handles odd image dimensions correctly
    - rasmcore-webp refactored to depend on rasmcore-color instead of inline color.rs
    - All existing rasmcore-webp tests pass after refactor
    - Reference value tests for BT.601 black/white/primary colors
    - Roundtrip test (RGB -> YCbCr -> RGB within 1 step of original)
  out_of_scope: |
    - Full-range vs limited-range variants (use limited/studio range matching current impl)
    - SIMD optimization (rely on auto-vectorization, SIMD track later)
    - Gamma/transfer function handling (linear math only)
    - ICC profile-based conversion (handled by moxcms in rasmcore-image)
    - HDR tone mapping
  technical_notes: |
    Crate structure:

    crates/rasmcore-color/src/
      lib.rs       — Public API, re-exports
      matrix.rs    — ColorMatrix struct with BT601/BT709/BT2020 constants
      convert.rs   — RGB-to-YCbCr and YCbCr-to-RGB conversion functions
      subsample.rs — Chroma subsampling (4:2:0 averaging, 4:4:4 passthrough)
      types.rs     — YuvImage, ChromaSubsampling enum, PixelFormat

    The ColorMatrix holds 6 integer coefficients (3 for Y, 3 for Cb/Cr share
    the same structure) plus the offset constants (16 for Y, 128 for chroma).

    ```rust
    pub struct ColorMatrix {
        // Y = (yr*R + yg*G + yb*B + 128) >> 8 + y_offset
        pub yr: i32, pub yg: i32, pub yb: i32, pub y_offset: i32,
        // Cb = (cbr*R + cbg*G + cbb*B + 128) >> 8 + c_offset
        pub cbr: i32, pub cbg: i32, pub cbb: i32,
        // Cr = (crr*R + crg*G + crb*B + 128) >> 8 + c_offset
        pub crr: i32, pub crg: i32, pub crb: i32,
        pub c_offset: i32,
    }
    ```

    Usage from rasmcore-webp:
    ```rust
    use rasmcore_color::{rgb_to_ycbcr_420, ColorMatrix};
    let yuv = rgb_to_ycbcr_420(pixels, width, height, &ColorMatrix::BT601);
    ```

    Refactoring rasmcore-webp:
    - Replace `pub mod color;` with `use rasmcore_color`
    - Delete inline color.rs
    - Update imports in any file that used `crate::color::*`
    - The YuvImage type moves to rasmcore-color (re-export if needed)

    The inverse conversion (YCbCr-to-RGB) is needed for reconstructed frame
    output and decoder pipelines. It uses the inverse matrix coefficients.
