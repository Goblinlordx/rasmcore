id: v2-pipeline-foundation_20260403053500Z
title: V2 pipeline foundation — f32-native graph engine with GPU-primary dispatch
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: 'New pipeline engine crate (rasmcore-pipeline-v2) that is f32-native,

    GPU-primary, and knows nothing about specific filters or codecs.

    Pure graph topology, demand propagation, tiling, caching, and dispatch.

    '
  context: 'V1 rasmcore-pipeline is already mostly clean (2,152 LOC, no filter

    knowledge). But the graph walker in rasmcore-image (graph.rs, 4,200 LOC)

    has accumulated format dispatch, GPU/CPU dual-path complexity, and

    hardcoded assumptions about u8/f32 coexistence.


    V2 pipeline foundation starts clean:

    - All pixel data is &[f32] (RGBA, 4 channels, normalized)

    - GPU dispatch is the primary path, CPU is the fallback

    - Graph walker has no format branching — one code path

    - Tiling uses the demand regulator design (layered strategy)

    - Spatial cache operates on f32 tiles natively

    - No PixelFormat enum in the pipeline — format is always f32

    '
  codebase_analysis: 'What to keep from V1:

    - Rect geometry (rect.rs) — clean, reuse as-is

    - Content hashing (blake3) — clean, reuse

    - GpuExecutor trait design — good abstraction, simplify to f32-only

    - Layer cache concept — keep, simplify storage to f32


    What to discard:

    - BufferFormat enum (U32Packed vs F32Vec4) — always F32Vec4

    - SampleFormat enum — always f32

    - GpuConfig.max_full_image_pixels / gpu_tile_size — replace with DemandStrategy

    - All format-dispatch logic in graph walker


    New concepts:

    - DemandStrategy enum (Fixed, AdaptiveMemory, AdaptiveVram)

    - DemandRegulator node (subgraph override)

    - TileHint trait (node advisory)

    - NodeCapability flags (AnalyticFusable, AffineFusable, ClutFusable, GpuCapable)

    '
  acceptance_criteria:
  - New crate rasmcore-pipeline-v2 with zero filter/codec knowledge
  - Graph topology (add_node, connect, upstream_id, walk)
  - Demand-driven tile execution (pull model, configurable tile size)
  - GPU-primary dispatch (GpuExecutor receives f32 tiles, CPU fallback)
  - DemandStrategy with Fixed/AdaptiveMemory/AdaptiveVram modes
  - DemandRegulator node for per-subgraph tile control
  - Spatial cache operating on f32 tile data
  - Layer cache for cross-pipeline reuse
  - Content hashing for cache keys
  - All data paths are f32 — no format dispatch, no PixelFormat enum
  - CPU and GPU implementations for the dispatch engine
  out_of_scope: 'Filter/codec registration (Track 2).

    Color space tracking (Track 4).

    Fusion optimizer (Track 5).

    WIT interface (Track 8).

    '
  technical_notes: "Core traits:\n\ntrait Node {\n    fn info(&self) -> NodeInfo;  // width, height, channels (always 4)\n\
    \    fn compute(&self, request: Rect, upstream: &mut dyn Upstream) -> Result<Vec<f32>>;\n    fn gpu_shader(&self) -> Option<GpuShader>;\
    \  // None = CPU only\n    fn upstream_ids(&self) -> Vec<u32>;\n    fn capabilities(&self) -> NodeCapabilities;\n}\n\n\
    struct NodeInfo {\n    width: u32,\n    height: u32,\n    color_space: ColorSpace,  // tracked per-node\n}\n\n// No PixelFormat.\
    \ Always Rgba f32. 4 channels. Period.\n\nGraph walker:\nfn request_region(&mut self, node_id: u32, request: Rect) ->\
    \ Result<Vec<f32>> {\n    // 1. Check cache\n    // 2. Check GPU capability → dispatch to GPU\n    // 3. Fallback to CPU\
    \ → node.compute()\n    // No format branching. No is_16bit. No process_via_8bit.\n}\n\nGPU dispatch:\n- Always vec4<f32>\
    \ storage buffers\n- io_f32.wgsl is the ONLY I/O fragment (no io_u32)\n- Shader composition: io_f32 + shader body\n- Tile-sized\
    \ dispatch (demand regulator controls size)\n\nDemandStrategy (from design doc):\nenum DemandStrategy {\n    Fixed { tile_size:\
    \ u32 },\n    AdaptiveMemory { budget_bytes: usize },\n    AdaptiveVram { vram_budget_bytes: usize, cpu_tile_size: u32\
    \ },\n}\n"
