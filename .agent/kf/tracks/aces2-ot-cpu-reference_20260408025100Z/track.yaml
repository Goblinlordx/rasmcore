id: aces2-ot-cpu-reference_20260408025100Z
title: ACES 2.0 Output Transform — full reference CPU port from OCIO
type: feature
status: pending
created: 2026-04-08
updated: '2026-04-08'
spec:
  summary: 'Full faithful port of the ACES 2.0 Output Transform from OpenColorIO

    C++ to Rust. Replaces the current Reinhard placeholder. This is the

    reference implementation — the ground truth that the GPU shader will

    be validated against.

    '
  context: 'The current aces2/mod.rs has a simple Reinhard tonemap placeholder

    instead of the real ACES 2.0 algorithm. The full algorithm operates

    in CAM16 perceptual space (JMh) with parametric tonescale, chroma

    compression, and gamut compression. It is approximately 1000 lines

    of C++ in OCIO.


    Source: OpenColorIO/src/OpenColorIO/ops/fixedfunction/ACES2/Transform.cpp

    License: BSD-3-Clause


    The algorithm is entirely per-pixel. The heavy part is initialization

    (cusp table generation via binary search) which runs once per

    configuration, not per pixel.

    '
  codebase_analysis: "Existing code to replace:\n- crates/rasmcore-pipeline-v2/src/aces2/mod.rs: output_transform_fwd()\n\
    \  currently uses v/(v+1) Reinhard — must be replaced with full JMh\n- aces2/cam16.rs, tonescale.rs, compress.rs, params.rs,\
    \ constants.rs:\n  all stub files ready for implementation\n\nOCIO source files to port from:\n- Transform.cpp: main forward/inverse\
    \ functions, initialization\n- Common.h: constants, table types, param structs\n- Key types: JMhParams, ToneScaleParams,\
    \ ChromaCompressParams,\n  GamutCompressParams, SharedCompressionParameters\n- Key functions: init_JMhParams, init_ToneScaleParams,\n\
    \  outputTransform_fwd (the per-pixel algorithm)\n\nPer-pixel algorithm (7 steps):\n1. RGB (AP1) to JMh via CAM16 (cone\
    \ response + adaptation)\n2. Resolve hue-dependent parameters from cusp tables\n3. Chroma normalization (trigonometric\
    \ polynomial)\n4. Tonescale (parametric power curve, applied via achromatic channel)\n5. Chroma compress (toe function,\
    \ hue-preserving)\n6. Gamut compress (boundary intersection, Reinhard remap above threshold)\n7. JMh to output RGB via\
    \ CAM16 inverse\n\nInitialization (once per config):\n- Build CAM16 matrices for input (AP0), reach (AP1), limiting gamut\n\
    - Compute tonescale parameters from peak luminance\n- Build reach_m_table (360 entries, max chroma per hue via binary\
    \ search)\n- Build gamut_cusp_table (360 entries, cusp J/M/gamma per hue)\n"
  acceptance_criteria:
  - Full CAM16 RGB-to-JMh and JMh-to-RGB conversion
  - Parametric tonescale matching OCIO (not Reinhard)
  - Chroma compression with toe functions
  - Gamut compression with cusp tables and boundary projection
  - All initialization/precomputation (tables built once, reused per pixel)
  - Matches OCIO C++ output within f32 precision for standard test colors
  - Test colors include 18% grey, saturated RGB primaries, out-of-gamut, HDR highlights, black
  - SDR (100 nits) and HDR (1000 nits) configurations both validated
  - Pure Rust CPU — no GPU code in this track
  - BSD-3-Clause attribution for OCIO source
  out_of_scope: 'GPU shader (separate track). Inverse transform (future).

    ACES 1.x RRT+ODT (superseded). EOTF encoding (already implemented).

    '
  technical_notes: "Port strategy: translate C++ line-by-line into Rust, preserving\nfunction structure and naming for traceability\
    \ back to OCIO source.\n\nKey data structures to port:\n- f2/f3/m33f types -> [f32; 2], [f32; 3], [f32; 9]\n- Table1D/Table3D\
    \ -> Vec with 363 entries (360 + 3 wrap)\n- JMhParams, ToneScaleParams, ChromaCompressParams, GamutCompressParams\n- SharedCompressionParameters,\
    \ HueDependantGamutParams\n\nKey constants from OCIO:\n- CAM16 viewing conditions (L_A=100, Y_B=20, dim surround)\n- Chroma\
    \ compress weights (8 trigonometric polynomial coefficients)\n- Gamut compress parameters (focus distance, compression\
    \ threshold, etc.)\n\nValidation approach:\n- Port the OCIO test vectors if available\n- If not, generate reference outputs\
    \ by running OCIO Python bindings\n  with known input colors and compare Rust output\n- Test matrix: {18% grey, pure R/G/B,\
    \ saturated cyan/magenta/yellow,\n  super-bright (10x), black, negative values} x {100 nit, 1000 nit}\n"
