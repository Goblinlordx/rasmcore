id: color-transform-formats_20260407074601Z
title: Color transform file format parsers (CLF, CTL, CDL) and camera IDT presets
type: feature
status: pending
created: 2026-04-07
updated: 2026-04-07
spec:
  summary: |
    Add file format support for professional color transform standards:
    CLF (Common LUT Format, ACES standard), CTL (Color Transform Language),
    CDL (ASC Color Decision List). Add camera-specific IDT presets for
    major cinema cameras (ARRI Alexa, Sony, RED).
  context: |
    After the color-transform resource is in place (track 1), this track
    adds the format parsers that allow loading real-world transform files.

    Professional workflows use these formats:
    - CLF (.clf): XML-based, ACES standard for transform interchange.
      Contains process nodes (LUT1D, LUT3D, Matrix, Range, etc.)
    - CTL (.ctl): ACES Color Transform Language (functional notation).
      The official ACES transform distribution format.
    - CDL (.cdl/.cc/.ccc): ASC Color Decision List. Simple XML with
      slope/offset/power/saturation. The universal on-set grade format.
    - .cube: Already supported (reuse existing parser in lmt.rs)

    Camera IDT presets for the most common cinema cameras:
    - ARRI Alexa LogC v3, LogC v4
    - Sony S-Log3/S-Gamut3, S-Log3/S-Gamut3.Cine
    - RED IPP2 (REDWideGamutRGB / Log3G10)
    - Blackmagic Film Gen5
    - Canon Log3 / Cinema Gamut

    These are mathematical transforms (matrix + transfer function),
    not file-based. They are registered as built-in presets.
  codebase_analysis: |
    Existing parsers to reuse/extend:
    - lmt.rs: parse_cube() for .cube files (3D LUT)
    - lmt.rs: parse_clf() for .clf files (basic CLF support exists)

    Existing color math:
    - color_math.rs: transfer functions (sRGB, ACEScct, ACEScc)
    - color_math.rs: 3x3 matrix multiplication, Bradford adaptation
    - color_math.rs: all standard XYZ matrices

    Camera IDTs are typically:
    1. Transfer function: log encoding → linear (e.g., LogC → linear)
    2. Matrix: camera gamut → ACES AP0 or AP1 (3x3 transform)
    Both steps are already supported primitives in color_math.rs.

    CDL is very simple: 4 operations per channel
    out = clamp((in * slope + offset) ^ power) * saturation_factor
  acceptance_criteria:
    - CLF parser handles LUT1D, LUT3D, Matrix, Range, and Log process nodes
    - CDL parser handles .cdl, .cc, and .ccc XML formats
    - CDL applies slope/offset/power/saturation per ASC spec
    - Camera IDT presets for ARRI LogC v3/v4, Sony S-Log3, RED IPP2
    - register-transform with format-hint auto-detects CLF vs CDL vs .cube
    - Roundtrip test IDT -> ODT for each camera preset
    - CLF transforms match reference ACES CLF test suite output
  out_of_scope: |
    Full CTL interpreter (CTL is a programming language - complex parser).
    GPU shader generation for CLF transforms.
    ACES 2.0 Output Transform (separate future track - requires the new
    parametric DRT which is significantly different from ACES 1.x RRT+ODT).
  technical_notes: |
    CLF (Common LUT Format) structure:
    - XML with ProcessList containing ordered ProcessNodes
    - Node types: LUT1D, LUT3D, Matrix, Range, Log, Exponent, ASC_CDL
    - Each node has inBitDepth/outBitDepth (we normalize to f32)
    - Existing parse_clf in lmt.rs handles basic case, needs extension

    CDL (ASC Color Decision List):
    - XML: ColorDecision/ColorCorrection/SOPNode + SatNode
    - SOP: slope (3 floats), offset (3 floats), power (3 floats)
    - Saturation: single float applied via Rec.709 luma
    - Formula: out = clamp((in * slope + offset) ^ power)
    - Then: out = luma + sat * (out - luma)

    Camera IDT presets (mathematical, no file needed):
    - Each is: linearize(transfer_fn) then matrix(camera_gamut_to_aces)
    - ARRI LogC v3: well-documented piecewise log + 3x3 to ACES
    - ARRI LogC v4: different curve constants, same structure
    - Sony S-Log3: standard log curve + S-Gamut3 matrix
    - RED Log3G10: piecewise log + REDWideGamut matrix
    - All matrices available from manufacturer documentation
