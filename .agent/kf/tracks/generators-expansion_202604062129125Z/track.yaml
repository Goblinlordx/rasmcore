id: generators-expansion_20260406212915Z
title: Additional generators — clouds, fractal, patterns
type: feature
status: pending
created: 2026-04-07
updated: 2026-04-07
spec:
  summary: |
    Add cloud_noise, fractal_noise, pattern_fill, solid_color generators.
    All pure GPU compute — no input image needed. Extends the 6 existing
    generators to 10.
  context: |
    GPU-first. Generators produce pixels from parameters alone (no source
    image). Perfect for compute shaders — massively parallel, no memory
    dependencies. Current generators: checkerboard, gradient_linear,
    gradient_radial, perlin_noise, simplex_noise, plasma.
  acceptance_criteria:
    - cloud_noise (Worley + value noise blend with octaves)
    - fractal_noise (multi-octave with lacunarity and persistence params)
    - pattern_fill (tileable pattern from small source texture)
    - solid_color (constant RGBA fill — useful as pipeline building block)
    - GPU shader for each
    - SIMD CPU fallback for each
  out_of_scope: |
    Animated noise (time parameter for video frames)
