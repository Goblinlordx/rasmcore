updated: '2026-03-30'
spec:
  summary: 'Fix all build warnings, resolve dirty bindings.rs in main worktree, and update validate.sh to enforce zero-warning
    builds and demo build verification.

    '
  context: 'Three hygiene issues accumulated during rapid development: (1) The main worktree has a dirty bindings.rs (auto-generated
    by cargo-component, regenerated on every WASM build, committed version stale). (2) There are 7 compiler warnings in rasmcore-image
    (unused variables and a dead struct field). (3) The validation script does not check for warnings during build or verify
    the demo builds.

    '
  codebase_analysis: "DIRTY FILE — crates/rasmcore-image/src/bindings.rs:\n  Auto-generated by cargo-component (wit-bindgen).\
    \ Modified whenever\n  WIT interfaces or filter registrations change. Current committed\n  version is from commit 9c8e346\
    \ (compare.wit addition) but the file\n  has 331 insertions since then from new filter/codec additions.\n  The main worktree\
    \ shows it as modified because kf-merge runs\n  cargo test/build which regenerates it.\n\nWARNINGS — 7 in rasmcore-image:\n\
    \  - unused variable: dst_format (color.rs:498)\n  - unused variable: hald_dim (color_lut.rs or similar)\n  - unused variable:\
    \ half (metrics.rs:187)\n  - unused variable: info (filters.rs or similar)\n  - unused variable: n (decoder/mod.rs:579)\n\
    \  - unused variable: pixels (filters.rs or similar)\n  - dead code: EllipseCoeffs::ulimit (ewa.rs:265)\n\nVALIDATE.SH\
    \ — current checks:\n  1. rustfmt --check ✓\n  1b. cargo-deny licenses ✓\n  2. clippy -D warnings ✓ (catches warnings\
    \ on lint pass)\n  3. domain tests ✓\n  4. parity tests ✓\n  5. WASM build ✓\n  6. WASM integration tests ✓\n  7. TypeScript\
    \ SDK tests ✓\n  Missing: demo build, build -D warnings (vs just clippy)\n\nDEMO BUILD — demo/ is a Vite/JS project:\n\
    \  Requires: npm install in demo/, then npm run build\n  Fails with: vite command not found (deps not installed)\n  Should\
    \ be gated on: node/npm available\n"
  acceptance_criteria:
  - Zero compiler warnings on cargo build --workspace (not just clippy)
  - bindings.rs committed in sync with current WIT/filter state
  - Main worktree clean after merge (git -C main status shows no dirty files)
  - validate.sh includes cargo build --workspace -D warnings check
  - validate.sh includes demo build check (gated on npm availability)
  - All 7 existing warnings fixed (unused vars prefixed with _, dead code removed)
  out_of_scope: 'Fixing pre-existing rustfmt diffs in files not touched by this track. WASM build failures unrelated to warnings.
    CI/CD pipeline changes.

    '
  technical_notes: "FIX 1 — Warnings:\n  - Prefix unused vars with _: _dst_format, _hald_dim, _half, _info, _n, _pixels\n\
    \  - Remove or use EllipseCoeffs::ulimit (it was needed for Vlimit computation\n    but stored in the struct unnecessarily\
    \ — compute inline instead)\n\nFIX 2 — bindings.rs:\n  - Run cargo component build -p rasmcore-image to regenerate\n \
    \ - Commit the updated bindings.rs\n  - Add a note to workflow.yaml or CLAUDE.md about regenerating after\n    WIT/filter\
    \ changes\n\nFIX 3 — validate.sh:\n  Add after the clippy step:\n    echo \"=== 2b. Build warnings check ===\"\n    if\
    \ cargo build --workspace 2>&1 | grep -q \"^warning:\"; then\n      echo \"  FAIL — compiler warnings detected\"\n   \
    \   FAILED=1\n    fi\n\n  Add before TypeScript SDK tests:\n    echo \"=== 6b. Demo build ===\"\n    if command -v npm\
    \ &>/dev/null && [ -d \"demo\" ]; then\n      (cd demo && npm install --silent && npm run build)\n    fi\n\nFIX 4 — Main\
    \ worktree:\n  After committing bindings.rs, the main worktree merge should\n  leave it clean. Verify with git -C main\
    \ status.\n"
