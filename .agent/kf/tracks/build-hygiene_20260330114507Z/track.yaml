id: build-hygiene_20260330114507Z
title: Build Hygiene — Zero Warnings, Clean Worktrees, Full Validation
type: chore
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: >
    Fix all build warnings, resolve dirty bindings.rs in main worktree,
    and update validate.sh to enforce zero-warning builds and demo build
    verification.
  context: >
    Three hygiene issues accumulated during rapid development:
    (1) The main worktree has a dirty bindings.rs (auto-generated by
    cargo-component, regenerated on every WASM build, committed version
    stale). (2) There are 7 compiler warnings in rasmcore-image (unused
    variables and a dead struct field). (3) The validation script does not
    check for warnings during build or verify the demo builds.
  codebase_analysis: |
    DIRTY FILE — crates/rasmcore-image/src/bindings.rs:
      Auto-generated by cargo-component (wit-bindgen). Modified whenever
      WIT interfaces or filter registrations change. Current committed
      version is from commit 9c8e346 (compare.wit addition) but the file
      has 331 insertions since then from new filter/codec additions.
      The main worktree shows it as modified because kf-merge runs
      cargo test/build which regenerates it.

    WARNINGS — 7 in rasmcore-image:
      - unused variable: dst_format (color.rs:498)
      - unused variable: hald_dim (color_lut.rs or similar)
      - unused variable: half (metrics.rs:187)
      - unused variable: info (filters.rs or similar)
      - unused variable: n (decoder/mod.rs:579)
      - unused variable: pixels (filters.rs or similar)
      - dead code: EllipseCoeffs::ulimit (ewa.rs:265)

    VALIDATE.SH — current checks:
      1. rustfmt --check ✓
      1b. cargo-deny licenses ✓
      2. clippy -D warnings ✓ (catches warnings on lint pass)
      3. domain tests ✓
      4. parity tests ✓
      5. WASM build ✓
      6. WASM integration tests ✓
      7. TypeScript SDK tests ✓
      Missing: demo build, build -D warnings (vs just clippy)

    DEMO BUILD — demo/ is a Vite/JS project:
      Requires: npm install in demo/, then npm run build
      Fails with: vite command not found (deps not installed)
      Should be gated on: node/npm available
  acceptance_criteria:
    - Zero compiler warnings on cargo build --workspace (not just clippy)
    - bindings.rs committed in sync with current WIT/filter state
    - Main worktree clean after merge (git -C main status shows no dirty files)
    - validate.sh includes cargo build --workspace -D warnings check
    - validate.sh includes demo build check (gated on npm availability)
    - All 7 existing warnings fixed (unused vars prefixed with _, dead code removed)
  out_of_scope: >
    Fixing pre-existing rustfmt diffs in files not touched by this track.
    WASM build failures unrelated to warnings. CI/CD pipeline changes.
  technical_notes: |
    FIX 1 — Warnings:
      - Prefix unused vars with _: _dst_format, _hald_dim, _half, _info, _n, _pixels
      - Remove or use EllipseCoeffs::ulimit (it was needed for Vlimit computation
        but stored in the struct unnecessarily — compute inline instead)

    FIX 2 — bindings.rs:
      - Run cargo component build -p rasmcore-image to regenerate
      - Commit the updated bindings.rs
      - Add a note to workflow.yaml or CLAUDE.md about regenerating after
        WIT/filter changes

    FIX 3 — validate.sh:
      Add after the clippy step:
        echo "=== 2b. Build warnings check ==="
        if cargo build --workspace 2>&1 | grep -q "^warning:"; then
          echo "  FAIL — compiler warnings detected"
          FAILED=1
        fi

      Add before TypeScript SDK tests:
        echo "=== 6b. Demo build ==="
        if command -v npm &>/dev/null && [ -d "demo" ]; then
          (cd demo && npm install --silent && npm run build)
        fi

    FIX 4 — Main worktree:
      After committing bindings.rs, the main worktree merge should
      leave it clean. Verify with git -C main status.
plan:
  - phase: Fix Warnings
    tasks:
      - text: Fix all 7 unused variable warnings (prefix with _ or remove)
        done: false
      - text: Fix EllipseCoeffs::ulimit dead code (remove field, compute inline)
        done: false
      - text: Verify cargo build --workspace produces zero warnings
        done: false
  - phase: Sync bindings.rs
    tasks:
      - text: Regenerate bindings.rs via cargo component build
        done: false
      - text: Commit updated bindings.rs
        done: false
  - phase: Update Validation
    tasks:
      - text: Add cargo build --workspace warning check to validate.sh
        done: false
      - text: Add demo build check to validate.sh (gated on npm)
        done: false
      - text: Run full validate.sh and verify all steps pass
        done: false
  - phase: Clean Worktree Verification
    tasks:
      - text: Merge to main and verify main worktree is clean
        done: false
extra: {}
