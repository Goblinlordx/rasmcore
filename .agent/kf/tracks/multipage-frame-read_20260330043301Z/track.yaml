id: multipage-frame-read_20260330043301Z
title: Multi-Page and Multi-Frame Read Support
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Add multi-page TIFF read and multi-frame GIF/WebP read — expose frame count, per-frame decode, and frame metadata
    (delay, disposal) through the decoder API.

    '
  context: 'libvips and ImageMagick both support multi-page TIFF and animated GIF/WebP.

    rasmcore currently reads only the first frame/page. This is a prerequisite

    for the animation pipeline (separate research track) and closes a P1 gap

    for TIFF workflows (scanning, publishing).

    '
  codebase_analysis: "Current state:\n- GIF: gif crate supports frame iteration (DecodeOptions::read_info -> Frames)\n  but\
    \ decoder/mod.rs only reads first frame\n- WebP: image-webp crate has AnimDecoder, but only first frame read\n- TIFF:\
    \ tiff crate supports directory iteration for multi-page, not used\n- PNG: no APNG in current image crate version\n- ImageInfo\
    \ has no frame_count or page_count field\n- DecodedImage has no frame metadata\n\nDecoder dispatch at decoder/mod.rs:\n\
    - decode(data) always returns single DecodedImage\n- No multi-frame API exists\n"
  acceptance_criteria:
  - frame_count(data, format) returns total frames/pages without full decode
  - decode_frame(data, format, index) decodes a specific frame/page
  - Frame metadata includes delay_ms, disposal method, and dimensions
  - Multi-page TIFF read works for at least 2-page documents
  - Multi-frame GIF read iterates all frames with correct delays
  - Multi-frame WebP read iterates all frames
  - Existing single-frame decode behavior unchanged (backward compatible)
  out_of_scope: 'Animation playback/compositing (separate track). Multi-frame encode/write.

    APNG support (png crate limitation). Frame-to-frame delta optimization.

    '
  technical_notes: 'New domain types needed:

    - FrameInfo { index: u32, delay_ms: u32, disposal: DisposalMethod, width, height, x_offset, y_offset }

    - DisposalMethod { None, Background, Previous }

    New decoder API surface:

    - frame_count(data: &[u8]) -> Result<u32>

    - decode_frame(data: &[u8], index: u32) -> Result<(DecodedImage, FrameInfo)>

    - decode_all_frames(data: &[u8]) -> Result<Vec<(DecodedImage, FrameInfo)>>

    Each format adapter implements these based on its crate capabilities.

    '
plan:
