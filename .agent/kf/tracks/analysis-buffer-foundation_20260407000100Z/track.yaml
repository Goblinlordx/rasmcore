id: analysis-buffer-foundation_20260407000100Z
title: "Analysis pass foundation — buffer declarations and negotiation pass"
type: feature
status: pending
created: 2026-04-07
updated: 2026-04-07
spec:
  summary: |
    Add the foundational traits and types for cross-node analysis buffer
    sharing. Pure additive — no behavior changes, no existing code modified.
    Establishes the buffer declaration/consumption protocol that later tracks
    wire into the graph walker and GPU dispatch.
  context: |
    The V2 pipeline currently has ReductionBuffer (node.rs:146-156) for
    persistent GPU buffers within a single node's gpu_shaders() chain.
    Equalize, Otsu, and other filters use the 3-pass pattern (local reduce →
    global reduce → apply) internally. This works because all passes share
    buffer IDs within one execute() call.

    For cross-node analysis (histogram node A → auto_levels node B), we need:
    1. Node A to declare "I produce reduction buffer with logical ID X"
    2. Node B to declare "I consume reduction buffer with logical ID X"
    3. A negotiation step that assigns globally unique buffer IDs across
       the merged chain (avoiding collisions between independent analyses)
    4. gpu_shaders() to accept context about available upstream analysis buffers
       so node B can reference the correct buffer ID in its shader

    This track adds the type definitions and trait methods only. No graph
    walker changes, no GPU dispatch changes. Downstream tracks wire these
    declarations into the execution model.

    Reference: .agent/kf/_reports/analysis-render-pass-design.md
    Research track: analysis-render-pass_20260406103200Z (completed)
  codebase_analysis: |
    Files that get new additive code:

    1. node.rs — Node trait gets two new default methods:
       - analysis_outputs() -> &[AnalysisBufferDecl] (default: empty)
       - analysis_inputs() -> &[AnalysisBufferRef] (default: empty)
       These are pure metadata declarations, no execution semantics.

    2. node.rs or new analysis_buffer.rs — New types:
       - AnalysisBufferDecl { logical_id, kind, initial_size }
       - AnalysisBufferRef { logical_id }
       - AnalysisBufferContext { mapping: HashMap<logical_id, resolved_id> }
       - AnalysisBufferKind enum (Histogram256, ChannelMinMax, ChannelSum, Generic)

    3. node.rs — gpu_shaders() gets a new sibling method:
       - gpu_shaders_with_context(w, h, &AnalysisBufferContext) -> Option<Vec<GpuShader>>
       - Default impl: ignores context, calls gpu_shaders(w, h)
       - Nodes that consume analysis buffers override to use resolved IDs

    4. graph.rs — New function (not yet wired into execution):
       - negotiate_analysis_buffers(chain: &[node_id]) -> AnalysisBufferContext
       - Walks the chain, collects all AnalysisBufferDecl, assigns unique IDs,
         builds the context mapping

    Files that are NOT modified:
    - gpu.rs (GpuExecutor trait unchanged)
    - WgpuExecutorV2 (executor unchanged)
    - Any existing filter implementations
    - Any existing gpu_shaders() call sites
    - request_region() execution path

    Safety: all new methods have defaults that preserve existing behavior.
    Existing code continues to work unchanged.
  acceptance_criteria:
    - AnalysisBufferDecl and AnalysisBufferRef types defined
    - AnalysisBufferContext type defined with logical→resolved ID mapping
    - Node trait has analysis_outputs() and analysis_inputs() with empty defaults
    - gpu_shaders_with_context() method on Node with default delegating to gpu_shaders()
    - negotiate_analysis_buffers() function computes unique buffer IDs from declarations
    - Buffer ID collision handling — two independent analyses in same chain get different resolved IDs
    - All existing tests pass unchanged (zero behavior change)
    - Unit tests for buffer negotiation with various topologies
    - Unit tests for ID collision avoidance
  out_of_scope: |
    - Wiring into graph walker or GPU dispatch (Track 2)
    - StagedPipeline CPU path (Track 3)
    - Migrating existing filters to new declarations (Track 4)
    - Actual GPU execution of cross-node chains
  technical_notes: |
    The buffer negotiation protocol:

    1. Each analysis node declares: "I produce buffers with logical IDs [0, 1, ...]"
       Logical IDs are node-local — node A uses id=0, node B also uses id=0.

    2. Each render node declares: "I consume buffers with logical IDs [0, ...]"
       These reference the upstream analysis node's logical IDs.

    3. negotiate_analysis_buffers() walks the merged chain and:
       a. Collects all declared logical IDs from analysis nodes
       b. Assigns globally unique resolved IDs (starting from 1000 to avoid
          collision with any node's internal buffer IDs)
       c. Builds AnalysisBufferContext mapping logical→resolved for each node
       d. Detects conflicts (two producers for same logical ID without
          an explicit consumer boundary between them)

    4. gpu_shaders_with_context() uses the resolved IDs when building
       ReductionBuffer entries. The executor sees globally unique IDs
       and allocates one GPU buffer per unique resolved ID.

    Example:
      Node A (histogram): declares output logical_id=0 (768 u32s)
      Node B (auto_levels): declares input logical_id=0
      Negotiation: assigns resolved_id=1000 for logical_id=0
      Node A's gpu_shaders_with_context: reduction passes use buffer id=1000
      Node B's gpu_shaders_with_context: apply pass reads buffer id=1000
      Merged chain: [A_pass1(1000), A_pass2(1000), B_apply(1000)] → one execute()
