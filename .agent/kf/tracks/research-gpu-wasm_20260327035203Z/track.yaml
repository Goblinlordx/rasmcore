id: research-gpu-wasm_20260327035203Z
title: "Research: GPU Acceleration from WASM via wgpu/WebGPU"
type: research
status: pending
created: 2026-03-27
updated: 2026-03-27
spec:
  summary: |
    Assess the feasibility and current state of GPU compute access from WASM
    modules, focusing on wgpu and WebGPU for media processing workloads.
  context: |
    GPU acceleration is desired for compute-heavy operations like video transcoding
    and image filtering. The wgpu crate provides a unified GPU abstraction that
    works natively (Vulkan/Metal/DX12) and in browsers (WebGPU). We need to
    understand what is actually possible from within a WASM component today.
  codebase_analysis: |
    Fresh project. Research targets external GPU/WASM integration status.
  acceptance_criteria:
    - Document wgpu WASM compilation status and supported features
    - Document WebGPU compute shader availability across browsers and runtimes
    - Assess whether wasmtime or other runtimes support GPU passthrough
    - Identify the gap between native wgpu and WASM-hosted wgpu capabilities
    - Research WASI-webgpu proposal status
    - Document performance characteristics — is GPU from WASM viable for real workloads
    - Produce feasibility assessment with timeline estimates for GPU support
  out_of_scope: |
    Writing GPU compute shaders or building GPU pipelines.
  technical_notes: |
    Key distinction: WebGPU in the browser vs GPU access from a WASI runtime.
    Browser WebGPU is more mature. Server-side WASM GPU access may require
    non-standard runtime extensions. Need to map out both paths.
