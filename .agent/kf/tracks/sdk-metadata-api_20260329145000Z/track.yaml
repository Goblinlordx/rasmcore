id: sdk-metadata-api_20260329145000Z
title: SDK Metadata API — Split Read/Write with Opt-In Passthrough
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: 'Add metadata access to the fluent rcimage SDK. Read operations (metadata(), dump, read) are async and break the
    chain — they parse headers without decoding pixels. Write operations (keepMetadata, setMetadata, stripMetadata) are chainable
    pipeline nodes applied at encode time. Metadata is dropped by default; keepMetadata() opts in to passthrough.

    '
  context: "Image metadata (EXIF, ICC, XMP, IPTC) is embedded in JPEG, PNG, TIFF, WebP\nfiles. The WIT pipeline already supports\
    \ MetadataSet on write operations,\nand the decoder extracts ICC profiles. But the fluent SDK has no way to\nread or modify\
    \ metadata.\n\nThe API uses dot-path string access because metadata fields are format-\ndependent and dynamic — EXIF alone\
    \ has hundreds of tags, XMP is arbitrary\nXML. Static typing isn't feasible at the SDK level.\n\nKey design decisions:\n\
    \n1. READ vs WRITE split: Reading metadata requires async header parsing,\n   so it MUST break the chain (returns a MetadataSnapshot,\
    \ not RcImage).\n   Write operations are deferred pipeline nodes — they don't need header\n   data and are applied at\
    \ encode time.\n\n2. Default-drop: Metadata is NOT carried through the pipeline by default.\n   This is the safe default\
    \ (no accidental GPS leak, etc.). Users must\n   explicitly call keepMetadata() to opt in to passthrough.\n\n3. Language-neutral:\
    \ No closures or callbacks. The split design works\n   identically in TypeScript, Python, Rust, Go, etc. No lambda\n \
    \  limitations or named-function workarounds needed.\n"
  acceptance_criteria:
  - metadata() is async, returns MetadataSnapshot (breaks the chain)
  - MetadataSnapshot.dump() returns full nested object from headers (no pixel decode)
  - MetadataSnapshot.read(path) returns value at dot-path or undefined for valid but absent fields
  - keepMetadata() is chainable, opts in to passthrough of all source metadata
  - setMetadata(path, value) is chainable, adds/overrides a metadata field
  - loadMetadata(obj) is chainable, bulk-sets metadata from a dump()-shaped object (inverse of dump)
  - loadMetadata validates all containers and fields in the object, same error format as setMetadata
  - loadMetadata works without keepMetadata (writes new metadata to clean output)
  - loadMetadata + keepMetadata merges — loadMetadata fields override source fields
  - stripMetadata(path) is chainable, removes field or subtree (only meaningful after keepMetadata)
  - By default (no keepMetadata), output has NO metadata from source
  - setMetadata works without keepMetadata (adds new metadata to clean output)
  - stripMetadata without keepMetadata is a silent no-op (nothing to strip)
  - Modified metadata embedded in output when calling toJpeg/toPng/etc.
  - Formats without metadata support (BMP, QOI) silently ignore metadata ops
  - Dot-paths match dump() structure — container.Field (e.g., exif.Artist, xmp.Creator)
  - EXIF fields accessible (exif.Artist, exif.Make, exif.Model, exif.GPSLatitude, etc.)
  - ICC profile accessible (icc.ProfileName, icc.ColorSpace)
  - XMP fields accessible (xmp.Creator, xmp.Rating, xmp.Description, etc.)
  - IPTC fields accessible (iptc.Headline, iptc.Keywords, etc.)
  - A single file may contain multiple metadata containers (EXIF + XMP + IPTC + ICC)
  - Invalid container name errors with valid containers list (e.g., "asdf" is not a valid metadata container. Valid containers
    are exif, xmp, iptc, icc)
  - Invalid field name errors with valid fields list for that container (e.g., "FakeField" is not a valid EXIF field. Valid
    fields are Artist, Make, Model, ...)
  - Malformed path errors with expected format (e.g., Invalid metadata path "noperiod". Expected format container.Field, e.g.
    exif.Artist)
  - Validation applies to read(), set(), strip(), and loadMetadata() — all reject invalid paths/keys with the same error format
  - Works with JPEG, PNG, TIFF, WebP inputs
  out_of_scope: 'Writing metadata to formats that don''t support it (BMP, QOI, GIF).

    Editing ICC profiles (only preserve/strip). Creating new ICC profiles.

    Full XMP editing (read + basic set only). IPTC editing beyond basic fields.

    '
  technical_notes: "SDK API — Split Read/Write Design:\n\n  // READ — async, breaks the chain\n  const meta = await rcimage.load(jpegBytes).metadata();\n\
    \  meta.dump()\n  // -> { exif: { Artist: '...', Make: '...', GPSLatitude: '...', ... },\n  //      xmp:  { Creator: '...',\
    \ Rating: 3, ... },\n  //      iptc: { Headline: '...', Keywords: [...], ... },\n  //      icc:  { ProfileName: '...',\
    \ ColorSpace: '...' } }\n  meta.read('exif.Artist')  // -> 'John Doe' | undefined\n\n  // WRITE — chainable, deferred\
    \ to encode time\n  await rcimage.load(jpegBytes)\n    .keepMetadata()                          // opt-in: carry source\
    \ metadata through\n    .stripMetadata('exif.GPSLatitude')       // remove GPS fields\n    .stripMetadata('exif.GPSLongitude')\n\
    \    .setMetadata('exif.Artist', 'rasmcore')  // override artist\n    .blur(3.0)\n    .toJpeg({ quality: 85 });\n\n  //\
    \ Without keepMetadata — clean output + new metadata only\n  await rcimage.load(jpegBytes)\n    .setMetadata('exif.Artist',\
    \ 'rasmcore') // adds to otherwise-clean output\n    .blur(3.0)\n    .toJpeg({ quality: 85 });\n\n  // BULK SET — loadMetadata()\
    \ is the inverse of dump()\n  await rcimage.load(jpegBytes)\n    .loadMetadata({\n      exif: { Artist: 'rasmcore', Copyright:\
    \ '2026' },\n      xmp: { Creator: 'rasmcore' }\n    })\n    .blur(3.0)\n    .toJpeg({ quality: 85 });\n\n  // Copy metadata\
    \ between images\n  const meta = await rcimage.load(sourceBytes).metadata();\n  await rcimage.load(targetBytes)\n    .loadMetadata(meta.dump())\
    \           // bulk-set from source\n    .stripMetadata('exif.GPSLatitude')   // but remove GPS\n    .toJpeg({ quality:\
    \ 85 });\n\nPython equivalent (no closures needed):\n\n  # Read\n  meta = await rcimage.load(jpeg_bytes).metadata()\n\
    \  print(meta.dump())\n  print(meta.read('exif.Artist'))\n\n  # Write — identical chainable pattern\n  result = await\
    \ (rcimage.load(jpeg_bytes)\n      .keep_metadata()\n      .strip_metadata('exif.GPSLatitude')\n      .set_metadata('exif.Artist',\
    \ 'rasmcore')\n      .blur(3.0)\n      .to_jpeg(quality=85))\n\nImplementation layers:\n\n1. WASM/Rust: rasmcore-image\
    \ already has:\n   - metadata.rs: ExifOrientation, parse_exif(), parse_xmp()\n   - metadata_iptc.rs: IPTC parsing\n  \
    \ - metadata_set.rs: MetadataSet struct\n   - decoder extracts ICC profile as Option<Vec<u8>>\n   - encoder embeds ICC\
    \ + EXIF via embed_icc_profile(), embed_exif()\n\n2. WIT: Metadata operations on pipeline interface:\n   metadata-snapshot:\
    \ func(source: node-id) -> result<metadata-snapshot, rasmcore-error>\n     Async — parses headers, returns snapshot resource\
    \ with dump/read methods\n   keep-metadata: func(source: node-id) -> result<node-id, rasmcore-error>\n     Pipeline node\
    \ — marks source metadata for passthrough\n   set-metadata: func(source: node-id, path: string, value: string) -> result<node-id,\
    \ rasmcore-error>\n     Pipeline node — records metadata override, applied at encode\n   load-metadata: func(source: node-id,\
    \ json: string) -> result<node-id, rasmcore-error>\n     Pipeline node — bulk-set from JSON object (dump()-shaped), validates\
    \ all keys\n   strip-metadata: func(source: node-id, path: string) -> result<node-id, rasmcore-error>\n     Pipeline node\
    \ — records metadata removal, applied at encode\n\n3. MetadataSnapshot resource (WIT):\n   resource metadata-snapshot\
    \ {\n     dump: func() -> string;          // JSON of all metadata\n     read: func(path: string) -> option<string>; \
    \ // value at dot-path\n   }\n\n4. SDK codegen: generate-fluent-sdk.cjs generates:\n   - metadata() async method returning\
    \ MetadataSnapshot (breaks chain)\n   - keepMetadata() chainable method\n   - setMetadata(path, value) chainable method\n\
    \   - loadMetadata(obj) chainable method (bulk-set, inverse of dump)\n   - stripMetadata(path) chainable method\n\nEager\
    \ execution for metadata():\n  Parses raw bytes headers only — EXIF is in the first few KB of JPEG.\n  No pixel decode.\
    \ Fast for inspection use cases.\n\nDot-path resolution:\n  Paths are exactly two levels: container.Field (e.g., 'exif.Artist',\n\
    \  'xmp.Creator', 'icc.ProfileName'). The first segment selects the\n  metadata container (exif, xmp, iptc, icc). The\
    \ second segment is\n  the field name within that container. Field names use the canonical\n  PascalCase tag names from\
    \ each standard (EXIF tag names, XMP property\n  names, IPTC dataset names). Only supported/known fields are exposed —\n\
    \  unknown tags are omitted from dump() and unresolvable via read().\n"
