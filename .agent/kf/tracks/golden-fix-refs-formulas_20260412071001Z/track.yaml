spec:
  summary: 'Fix reference functions that don''t match golden data: vibrance (wrong HSV

    formula), selective_color/replace_color (HSL convention mismatch), quantize

    (wrong algorithm). Also align golden HSL helpers with pipeline convention.

    '
  context: "Golden validation found these reference/golden mismatches:\n\n1. vibrance: pipeline passes golden but reference\
    \ doesn't (diff=0.21).\n   Reference uses wrong HSV saturation measure.\n\n2. selective_color: both pipeline (0.45) and\
    \ reference (0.04) fail.\n   The golden HSL helpers differ from pipeline's HSL helpers. The golden\n   generator's independent\
    \ HSL implementation has different edge handling.\n\n3. replace_color: same root cause as selective_color (HSL differences).\n\
    \n4. quantize: pipeline uses median-cut palette, golden uses floor quantize.\n   These are fundamentally different algorithms.\
    \ Need either:\n   a) An independent median-cut reference (PIL.Image.quantize), or\n   b) Accept that quantize is validated\
    \ by its own unit tests only.\n\n5. aces_cct_to_cg / aces_cg_to_cct: f32 vs f64 precision in log/exp\n   transfer (diff=0.00003-0.0017).\
    \ Accept with 1e-3 tolerance for\n   ACES transfer functions.\n"
  acceptance_criteria:
  - vibrance reference matches golden (fix reference formula)
  - selective_color golden matches pipeline (fix golden HSL helpers)
  - replace_color golden matches pipeline (same fix)
  - quantize either has independent median-cut reference or is documented as self-validated
  - ACES tolerance set to 1e-3 for transfer function precision
  - All golden tests pass (0 failures)
