  - text: Add inventory::collect! and helper functions (registered_decoders, find_decoder_by_format)
    done: true
  - text: Register all existing decoders via inventory::submit! (preserve detection order via priority)
    done: true
  - text: Rewrite detect_format() to iterate registry by priority, call detect_fn
    done: true
  - text: Add decode_with_hint(data, format) — format hint with optional detect_fn validation
    done: true
  - text: Verify all existing decoder tests pass unchanged
    done: true
- phase: Encoder cleanup
