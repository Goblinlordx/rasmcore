id: cli-v2-migration_20260405000540Z
title: Migrate CLI from V1 NodeGraph to V2 pipeline
type: refactor
status: pending
created: 2026-04-05
updated: 2026-04-05
spec:
  summary: |
    Rewrite rcim CLI (crates/rasmcore-cli/src/main.rs, ~370 lines) to use
    V2 Graph, V2 filter registry, V2 codec read/write, and V2 GPU executor.
    After this migration, rasmcore-cli no longer depends on rasmcore-pipeline (V1)
    or rasmcore-image's V1 NodeGraph.
  context: |
    The CLI currently uses V1 infrastructure:
    - rasmcore_image::domain::pipeline::graph::NodeGraph for graph building
    - rasmcore_image::domain::pipeline::dispatch::dispatch_filter() for filter instantiation
    - rasmcore_image::domain::pipeline::nodes::sink::write() for output encoding
    - rasmcore_pipeline::GpuExecutor (V1 trait) via gpu_executor.rs

    V2 has complete equivalents:
    - rasmcore_pipeline_v2::graph::Graph — graph engine
    - rasmcore_pipeline_v2 filter registry (88 filters via inventory)
    - rasmcore_pipeline_v2 codec registry (all formats via inventory)
    - rasmcore_pipeline_v2::gpu::GpuExecutor (V2 trait) via gpu_executor_v2.rs

    The web UI already uses V2 exclusively. This track migrates the last
    remaining V1 consumer (CLI) so the V1 crate can be removed.
  codebase_analysis: |
    CLI main.rs (372 lines):
    - Lines 14-16: imports from rasmcore_image::domain::pipeline (V1)
    - Line 142: accepts V1 GpuExecutor
    - Line 144: creates V1 NodeGraph
    - Line 152: uses V1 dispatch::list_filters() for metadata
    - Line 196: V1 dispatch::dispatch_filter() creates filter nodes
    - Line 226: V1 sink::write() encodes output

    V2 equivalents available:
    - rasmcore_pipeline_v2::Graph::new() replaces NodeGraph::new()
    - V2 filter registry (inventory-based) replaces dispatch::list_filters()
    - V2 FilterNode::new() replaces dispatch_filter()
    - V2 graph.request_full() + codec write replaces sink::write()
    - gpu_executor_v2.rs already exists alongside gpu_executor.rs

    The CLI also has bench-pipeline binary which already uses V2 Graph.
    This proves V2 is viable for CLI workloads.
  acceptance_criteria:
    - CLI builds and runs using only V2 pipeline types
    - All existing filter names work via V2 filter registry
    - Input/output codec support matches V1 (PNG, JPEG, WebP, GIF, etc.)
    - GPU acceleration works via V2 GpuExecutor
    - CLI help and --list-filters output unchanged
    - rasmcore-cli Cargo.toml no longer depends on rasmcore-pipeline (V1)
    - Existing CLI test cases pass (if any)
  out_of_scope: |
    - Removing rasmcore-pipeline (V1) crate (separate track)
    - Removing V1 code from rasmcore-image (separate track)
    - Adding new CLI features
    - Changing CLI argument syntax
  technical_notes: |
    Migration approach:
    1. Replace NodeGraph with V2 Graph
    2. Replace dispatch_filter() with V2 registry lookup + FilterNode::new()
    3. Replace sink::write() with V2 graph.request_full() + codec encode
    4. Replace V1 GpuExecutor with V2 GpuExecutor (gpu_executor_v2.rs)
    5. Delete V1 gpu_executor.rs after migration
    6. Update Cargo.toml to remove rasmcore-pipeline dep

    The bench-pipeline binary already demonstrates V2 Graph usage in the
    same crate — use it as a reference for the migration pattern.
