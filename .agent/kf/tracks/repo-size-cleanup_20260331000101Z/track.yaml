id: repo-size-cleanup_20260331000101Z
title: Repo Size Cleanup — Gitignore Generated Files, Purge History Blobs
type: chore
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: |
    Remove auto-generated files from git tracking (bindings.rs, WASM blobs),
    update .gitignore, and purge large blobs from git history via git filter-repo.
  context: |
    The repo pack is 10.1 MB. The largest contributors are auto-generated
    bindings.rs (3.7 MB, changes every WIT update), 278 opencv fixture .raw
    files (6.6 MB), and a removed WASM blob still in history (11 MB).
    bindings.rs is regenerated by cargo-component on every build — it should
    never be committed. The WASM blob was committed once and deleted but
    still lives in the git pack.
  codebase_analysis: |
    FILES TO REMOVE FROM TRACKING:
    - crates/rasmcore-image/src/bindings.rs (3.7 MB, auto-generated)
    - crates/rasmcore-image/src/adapter/bindings.rs (0.2 MB, auto-generated)

    GITIGNORE ADDITIONS:
    - **/bindings.rs (generated by cargo-component/wit-bindgen)
    - *.wasm (build artifacts)
    - demo/sdk/ (built WASM + JS bundles)

    HISTORY PURGE:
    - demo/sdk/rasmcore-image.core.wasm (11 MB, deleted but in pack)
    - demo/sdk/rasmcore-image.js (0.8 MB, deleted but in pack)
    - Multiple bindings.rs revisions (each 1-1.8 MB, ~20 revisions)

    IMPACT:
    - After cleanup: repo should be ~2-3 MB instead of 10 MB
    - bindings.rs is regenerated automatically by cargo-component check/build
    - No functional impact on builds
  acceptance_criteria:
    - bindings.rs files removed from git tracking (git rm --cached)
    - .gitignore updated with bindings.rs, WASM, demo/sdk patterns
    - cargo-component check still works (regenerates bindings)
    - git filter-repo purges demo/sdk/*.wasm and old bindings.rs revisions
    - Repo pack size reduced to under 3 MB
    - All tests pass after cleanup
  out_of_scope: |
    Fixture file replacement (separate track). LFS migration.
  technical_notes: |
    ORDER OF OPERATIONS:
    1. Update .gitignore first
    2. git rm --cached bindings files (untrack without deleting)
    3. Commit the gitignore + untracking
    4. Verify cargo-component check regenerates bindings
    5. git filter-repo to purge history (DESTRUCTIVE — requires force push)

    git filter-repo commands:
      pip install git-filter-repo
      git filter-repo --path demo/sdk/ --invert-paths
      git filter-repo --strip-blobs-bigger-than 500K --path crates/rasmcore-image/src/bindings.rs --invert-paths

    NOTE: filter-repo rewrites history. All worktrees and clones must
    re-clone after this. Coordinate with team before executing.
plan:
  - phase: Gitignore & Untrack
    tasks:
      - text: Update .gitignore with bindings.rs, *.wasm, demo/sdk/ patterns
        done: false
      - text: git rm --cached bindings.rs files (both locations)
        done: false
      - text: Verify cargo-component check regenerates bindings on build
        done: false
  - phase: History Purge
    tasks:
      - text: Install git-filter-repo if not available
        done: false
      - text: Purge demo/sdk/ blobs from history
        done: false
      - text: Purge oversized bindings.rs revisions from history
        done: false
      - text: Verify pack size reduced (git gc + git count-objects)
        done: false
  - phase: Verification
    tasks:
      - text: Fresh clone test — verify size is under 3 MB
        done: false
      - text: cargo test passes on clean checkout
        done: false
extra: {}
