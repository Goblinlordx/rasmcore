id: pipeline-wit_20260328012201Z
title: Pipeline WIT Interface — Resource, Read/Write API, Adapter Layer
type: feature
status: pending
created: 2026-03-28
updated: '2026-03-28'
spec:
  summary: 'Add the WIT pipeline resource with node-id based API, read/write public naming,

    per-format write configs. Adapter maps WIT pipeline resource to domain NodeGraph.

    Legacy stateless interfaces become wrappers. WASM + TS SDK tests.

    '
  context: 'The pipeline core engine (Track 1) provides the domain-level node graph and

    spatial cache. This track exposes it via the WIT Component Model as a pipeline

    resource, adds the read/write public API naming, and updates the adapter layer.


    Design reference: .agent/kf/_reports/pipeline-architecture.md (Section 2)


    The pipeline resource owns all nodes internally. Transform functions accept and

    return node-id (u32). The host never sees internal pixel data until write().


    Also exposes Level 2 stateless compute kernels for host-driven parallelism.

    '
  codebase_analysis: 'Current WIT interfaces:

    - wit/image/decoder.wit: decode, detect-format, decode-as, supported-formats

    - wit/image/encoder.wit: encode, encode-jpeg/png/webp, supported-formats

    - wit/image/transform.wit: resize, crop, rotate, flip, convert-format

    - wit/image/filters.wit: blur, sharpen, brightness, contrast, grayscale

    - wit/image/world.wit: exports decoder, encoder, transform, filters


    Current adapter (adapter/mod.rs):

    - Maps WIT types to domain types

    - Calls domain functions directly


    New pipeline WIT adds:

    - pipeline resource with node-id based methods

    - read/write naming (public API)

    - Level 2 compute interface (stateless kernels)

    - Legacy interfaces preserved as wrappers

    '
  acceptance_criteria:
  - New wit/image/pipeline.wit with pipeline resource definition
  - Pipeline resource methods use read/write naming (not decode/encode)
  - Per-format write configs (jpeg-write-config, png-write-config, webp-write-config)
  - node-id type (u32) for node references in pipeline
  - Adapter layer implements pipeline resource using domain NodeGraph
  - Level 2 compute interface (stateless kernel functions)
  - Legacy decoder/encoder/transform/filters interfaces preserved as backward-compatible wrappers
  - World updated to export pipeline + legacy interfaces
  - cargo component build succeeds
  - wasmtime integration tests for pipeline resource (read -> resize -> write-jpeg)
  - TS SDK tests for pipeline resource via jco
  - Existing WASM integration tests still pass (legacy interface backward compat)
  - Existing TS SDK tests still pass
  out_of_scope: '- Operation fusion (future track)

    - Seek cache (future track)

    - WASI-IO stream integration (future track)

    - New format support (separate codec tracks)

    - Host-side parallel orchestrator (host concern, not component)

    '
  technical_notes: "WIT pipeline resource (from design doc):\n```\nresource pipeline {\n    constructor();\n    read: func(data:\
    \ buffer) -> result<node-id, rasmcore-error>;\n    resize: func(source: node-id, w: u32, h: u32, filter: resize-filter)\
    \ -> node-id;\n    crop: func(source: node-id, x: u32, y: u32, w: u32, h: u32) -> result<node-id, rasmcore-error>;\n \
    \   rotate: func(source: node-id, angle: rotation) -> node-id;\n    // ... all transforms and filters\n    write-jpeg:\
    \ func(source: node-id, config: jpeg-write-config) -> result<buffer, rasmcore-error>;\n    write-png: func(source: node-id,\
    \ config: png-write-config) -> result<buffer, rasmcore-error>;\n    write-webp: func(source: node-id, config: webp-write-config)\
    \ -> result<buffer, rasmcore-error>;\n    write: func(source: node-id, format: string, quality: option<u8>) -> result<buffer,\
    \ rasmcore-error>;\n}\ntype node-id = u32;\n```\n\nAdapter implementation:\n- Pipeline resource maps to domain NodeGraph\
    \ + SpatialCache\n- Each pipeline method call adds a node to the internal graph\n- write() triggers execution: iterates\
    \ output regions, pulls through graph\n- RefCell for interior mutability (WIT resource methods receive &self)\n\nLevel\
    \ 2 compute interface reuses existing stateless domain functions directly.\nThese are the same functions that currently\
    \ exist, just exposed under a\nseparate WIT interface name for host-driven parallelism.\n"
