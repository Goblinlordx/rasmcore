id: filter-nodeinfo-access_20260406230819Z
title: Give filters access to NodeInfo via backwards-compatible trait method
type: refactor
status: pending
created: 2026-04-07
updated: '2026-04-06'
spec:
  summary: 'Add compute_with_info(&self, input, info) to Filter trait with default

    delegation to compute(). Update FilterNode to call it. Filters that need

    color-space awareness override the new method. Zero breakage of existing

    178 filter implementations.

    '
  context: 'Filter::compute() only receives pixels, width, height. Filters cannot

    access the working color space. FilterNode already holds NodeInfo (with

    color_space) but does not pass it through. 178 filter implementations

    exist — changing the compute() signature would break all of them.


    A backwards-compatible approach adds a new method with a default that

    delegates to the existing compute(). Only filters that need NodeInfo

    override the new method.

    '
  codebase_analysis: 'FilterNode at filter_node.rs:91-110 calls self.filter.compute(&input,

    width, height). It has self.info: NodeInfo available.


    GpuFilterNode follows the same pattern. gpu_params() also only receives

    width/height but needs color space for luma-aware uniforms.


    The change is:

    1. Add default method to Filter trait (no breakage)

    2. FilterNode calls compute_with_info() instead of compute()

    3. gpu_params() gains &NodeInfo parameter (with default delegation)

    4. Update GpuFilterNode similarly


    Scope: ~4 files changed (ops.rs, filter_node.rs, node.rs). Zero filter

    files touched.

    '
  acceptance_criteria:
  - Filter trait has compute_with_info(input, info) with default -> compute()
  - Filter trait has gpu_params_with_info(info) with default -> gpu_params()
  - FilterNode calls compute_with_info passing its NodeInfo
  - GpuFilterNode calls gpu_params_with_info passing its NodeInfo
  - All existing 178 filters continue to work unchanged
  - One test filter overrides compute_with_info to prove the plumbing works
  out_of_scope: 'Updating existing filters to use NodeInfo. That is for downstream tracks.

    WIT interface changes (NodeInfo already flows through WIT).

    '
  technical_notes: "The backwards-compatible approach:\n\ntrait Filter {\n    fn compute(&self, input: &[f32], w: u32, h:\
    \ u32) -> Result<...>;\n\n    fn compute_with_info(&self, input: &[f32], info: &NodeInfo) -> Result<...> {\n        self.compute(input,\
    \ info.width, info.height)  // default\n    }\n\n    fn gpu_params(&self, w: u32, h: u32) -> Option<Vec<u8>> { None }\n\
    \n    fn gpu_params_with_info(&self, info: &NodeInfo) -> Option<Vec<u8>> {\n        self.gpu_params(info.width, info.height)\
    \  // default\n    }\n}\n\nFilterNode::compute() changes from:\n  self.filter.compute(&input, w, h)\nto:\n  self.filter.compute_with_info(&input,\
    \ &self.info)\n"
