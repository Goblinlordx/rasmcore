id: v2-fusion-optimizer_20260403053504Z
title: V2 fusion optimizer — expression tree IR, affine composition, CLUT fusion
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: 'First-class operation fusion with three fusable categories:

    analytical (expression tree), affine (matrix composition), and

    CLUT (3D lookup table). The optimizer walks the graph, composes

    fusable chains, and lowers to target backend (closure, LUT, WGSL).

    '
  context: "Operation fusion is the OCIO Processor pattern: take a transform\nstack and collapse it into a single execution.\
    \ This eliminates\nintermediate buffers, reduces GPU passes, and preserves precision.\n\nThree fusable categories:\n1.\
    \ Analytical (point ops): brightness, contrast, gamma, exposure,\n   levels, invert → expression tree IR → single f32\
    \ function\n2. Affine (spatial transforms): resize, rotate, flip, crop →\n   matrix composition → single resample pass\n\
    3. CLUT (color ops): curves, color balance, LUT application →\n   3D LUT composition → single tetrahedral interpolation\n\
    \nEach category has its own composition algebra and lowering backends.\nThe optimizer detects chains of same-category\
    \ nodes and fuses them.\n"
  acceptance_criteria:
  - PointOpExpr expression tree IR (Input, Constant, Add, Mul, Pow, etc.)
  - Expression composition via substitution
  - Constant folding and identity elimination optimizer passes
  - lower_to_closure() — f32 CPU evaluation
  - lower_to_lut() — bake to [u8; 256] at output boundary
  - lower_to_wgsl() — emit inlined WGSL for GPU kernel fusion
  - Affine matrix composition (compose two 2x3 matrices into one)
  - CLUT composition (compose two 3D LUTs via tetrahedral interpolation)
  - Graph optimizer detects fusable chains and composes them
  - Fused nodes execute as single pass (one GPU dispatch, one CPU loop)
  - darken+brighten round-trip compiles to identity expression
  - All three fusion categories work on both CPU and GPU
  out_of_scope: 'JIT compilation (LLVM/Cranelift).

    Automatic differentiation.

    Cross-category fusion (e.g., fusing a point op with an affine).

    '
  technical_notes: "Expression tree IR (point ops):\n\nenum PointOpExpr {\n    Input,\n    Constant(f32),\n    Add(Box<PointOpExpr>,\
    \ Box<PointOpExpr>),\n    Sub(Box<PointOpExpr>, Box<PointOpExpr>),\n    Mul(Box<PointOpExpr>, Box<PointOpExpr>),\n   \
    \ Div(Box<PointOpExpr>, Box<PointOpExpr>),\n    Pow(Box<PointOpExpr>, Box<PointOpExpr>),\n    Clamp(Box<PointOpExpr>,\
    \ f32, f32),\n    Floor(Box<PointOpExpr>),\n}\n\nLowering:\n- lower_to_closure: recursive evaluator, f64 intermediate\n\
    - lower_to_lut: evaluate at 256 points\n- lower_to_wgsl: emit WGSL source with inlined math\n\nAffine composition (spatial\
    \ transforms):\n- Same as V1 compose_affine ([f64; 6] outer * inner)\n- ComposedAffineNode with single resample pass\n\
    - V2: always f32 bilinear (no EWA Q16 legacy)\n\nCLUT composition (color ops):\n- Same as V1: compose two 3D LUTs via\
    \ tetrahedral lookup\n- V2: f32 LUT entries (no u8 quantization)\n\nOptimizer walk:\nfn optimize_graph(graph: &mut Graph)\
    \ {\n    fuse_analytical_chains(graph);  // point ops → expression tree\n    fuse_affine_chains(graph);      // transforms\
    \ → single matrix\n    fuse_clut_chains(graph);        // color ops → single 3D LUT\n}\n"
