id: morphology-validation_20260329114401Z
title: Morphological Operations — OpenCV Reference Validation
type: chore
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: |
    Add comprehensive OpenCV parity tests for all 7 morphological operations
    (erode, dilate, open, close, gradient, tophat, blackhat) with all 3
    structuring element shapes. Currently zero reference tests exist.
  context: |
    Morphological operations are fully implemented (erode, dilate, morph_open,
    morph_close, morph_gradient, morph_tophat, morph_blackhat) with Rect,
    Ellipse, and Cross structuring elements. However, NONE have reference
    parity tests against OpenCV. This is a validation gap — we cannot
    confirm correctness without reference comparison.
  codebase_analysis: |
    Implementation in domain/filters.rs. All 7 ops use a common
    structuring element iteration pattern. Three SE shapes: Rect (all ones),
    Ellipse (inscribed ellipse), Cross (+ shape). OpenCV provides identical
    operations via cv2.erode/dilate/morphologyEx with cv2.getStructuringElement.
  acceptance_criteria:
    - Pixel-exact match vs OpenCV for erode with Rect/Ellipse/Cross at radius 1,3,5
    - Pixel-exact match vs OpenCV for dilate with all 3 shapes
    - Pixel-exact match for open, close, gradient, tophat, blackhat
    - Tests cover gradient, checkerboard, and binary mask images
    - Results documented in REFERENCE.md
  out_of_scope: |
    New morphological operations. Hit-or-miss. Skeletonization.
  technical_notes: |
    Use venv Python with OpenCV to generate reference outputs inline (same
    pattern as filter_reference_parity.rs). Key alignment: border handling
    must match OpenCV BORDER_REFLECT_101. Structuring element generation
    must match cv2.getStructuringElement exactly.
plan:
