id: transform-codegen_20260401030200Z
title: Transform codegen — config structs, derive_metadata, generated adapters
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Complete the transform registration system: add ConfigParams structs for

    each transform, add derive_metadata to ImageNode trait, extend codegen

    to generate pipeline adapter methods and WIT declarations from transform

    registrations. Remove hand-written transform adapter code.

    '
  context: "The register-transforms track added #[register_transform] annotations and\ninventory-based discovery, but left\
    \ the adapter code hand-written. This\ntrack completes the codegen pipeline so transforms are fully generated\nlike filters.\n\
    \nThe key design decisions agreed with the user:\n\n1. CONFIG STRUCTS: Each transform gets a ConfigParams struct (like\
    \ filters).\n   The codegen already handles ConfigParams for filters — same pattern.\n   Example: ResizeParams { width:\
    \ u32, height: u32, filter: ResizeFilter }\n\n2. DERIVE_METADATA on ImageNode: Optional method for nodes that alter\n\
    \   pipeline metadata (dimensions, color space, etc.).\n   Signature: fn derive_metadata(&self, upstream: &Metadata) ->\
    \ Option<Metadata>\n   Default returns None (inherit upstream unchanged, zero-cost).\n   Only nodes that modify metadata\
    \ (resize, rotate, icc_to_srgb) clone\n   and modify. The graph calls this after node insertion.\n\n3. ENUM HANDLING:\
    \ The codegen already generates WIT enum declarations and\n   match-arm conversions for encoder enums (TiffCompression,\
    \ PngFilterType).\n   Same pattern applies to ResizeFilter, Rotation, FlipDirection,\n   ExifOrientation.\n\n4. FROM_CONFIG\
    \ CONSTRUCTORS: Each node gets a from_config(source, src_info,\n   &Config) constructor. Codegen calls this uniformly.\n\
    \n5. COMPOSITE (multi-input): Handled via annotation flag\n   #[register_transform(name = \"composite\", multi_input =\
    \ true)] — codegen\n   generates adapter with two source params.\n\n6. FALLIBLE CONSTRUCTION: IccToSrgbNode::new returns\
    \ Result. Annotation\n   flag or codegen detection handles .map_err(to_wit_error)?.\n"
  codebase_analysis: "EXISTING TRANSFORM NODES (already annotated with #[register_transform]):\n- ResizeNode: new(upstream,\
    \ src_info, width, height, filter)\n- CropNode: new(upstream, src_info, x, y, width, height)\n- RotateNode: new(upstream,\
    \ src_info, rotation)\n- FlipNode: new(upstream, src_info, direction)\n- AutoOrientNode: new(upstream, src_info, orientation)\n\
    - IccToSrgbNode: new(upstream, src_info, icc_profile) -> Result\n- CompositeNode: new(fg, bg, fg_info, bg_info, x, y,\
    \ blend_mode)\n\nEXISTING CODEGEN PATTERNS TO REUSE:\n- ConfigParams derive: generates param_descriptors(), Default impl\n\
    - Encoder enum codegen: generates WIT enum + match-arm conversion\n- Pipeline filter adapter macro: generates pipeline\
    \ methods\n- Pipeline write adapter macro: generates write methods\n\nHAND-WRITTEN CODE TO REPLACE:\n- pipeline_adapter.rs:\
    \ resize, crop, rotate, flip, auto_orient,\n  icc_to_srgb, composite (~200 lines)\n- adapter/mod.rs: impl transform::Guest\
    \ (~100 lines)\n"
  acceptance_criteria:
  - ConfigParams structs exist for all 7 transforms with proper field types and defaults
  - ImageNode trait has derive_metadata method (default returns None)
  - Transform nodes implement derive_metadata where needed (resize, rotate, icc_to_srgb)
  - Codegen generates pipeline transform adapter methods from registrations
  - Codegen generates WIT config records and enum declarations for transforms
  - Hand-written transform adapter methods removed from pipeline_adapter.rs
  - Hand-written impl transform::Guest removed from adapter/mod.rs
  - cargo build (native) succeeds
  - cargo component build (wasm32-wasip2) succeeds
  - All transform tests pass
  out_of_scope: 'Changing the ImageNode compute_region or info methods.

    Adding new transform operations.

    Metadata operations (keep/set/strip) — those remain pipeline infrastructure.

    '
  technical_notes: "DERIVE_METADATA DESIGN:\n\n  trait ImageNode {\n      fn info(&self) -> ImageInfo;\n      fn compute_region(&self,\
    \ ...) -> Result<Vec<u8>, ImageError>;\n      fn input_rect(&self, ...) -> Rect { ... }\n\n      /// Derive this nodes\
    \ metadata from upstream.\n      /// Return None to inherit unchanged (zero-cost default).\n      /// Return Some(meta)\
    \ only when this node modifies metadata.\n      /// Clone upstream only when modification is needed.\n      fn derive_metadata(&self,\
    \ upstream: &Metadata) -> Option<Metadata> {\n          None\n      }\n  }\n\nThe graph add_node implementation:\n  -\
    \ Calls node.derive_metadata(&upstream_meta)\n  - If Some(meta), stores the new metadata for this node\n  - If None, reuses\
    \ upstream metadata reference\n\nCONFIG STRUCT PATTERN (same as filters):\n\n  #[derive(rasmcore_macros::ConfigParams,\
    \ Clone)]\n  pub struct ResizeParams {\n      #[param(min = 1, max = 65535, default = 0)]\n      pub width: u32,\n   \
    \   #[param(min = 1, max = 65535, default = 0)]\n      pub height: u32,\n      pub filter: ResizeFilter,\n  }\n\nNODE\
    \ FROM_CONFIG PATTERN:\n\n  impl ResizeNode {\n      pub fn from_config(source: u32, src_info: ImageInfo, config: &ResizeParams)\
    \ -> Self {\n          Self::new(source, src_info, config.width, config.height, config.filter)\n      }\n  }\n\nCODEGEN\
    \ PIPELINE ADAPTER OUTPUT:\n\n  fn resize(&self, source: NodeId, config: pipeline::ResizeConfig) -> Result<NodeId, RasmcoreError>\
    \ {\n      let src_info = self.graph.borrow().node_info(source).map_err(to_wit_error)?;\n      let domain_cfg = ResizeParams\
    \ {\n          width: config.width,\n          height: config.height,\n          filter: to_domain_resize_filter(config.filter),\n\
    \      };\n      let node = ResizeNode::from_config(source, src_info, &domain_cfg);\n      let hash = compute_hash(&upstream_hash,\
    \ \"resize\", format!(\"{config:?}\").as_bytes());\n      Ok(self.graph.borrow_mut().add_node_with_hash(Box::new(node),\
    \ hash))\n  }\n"
