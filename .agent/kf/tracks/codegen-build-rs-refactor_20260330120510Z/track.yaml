id: codegen-build-rs-refactor_20260330120510Z
title: Refactor build.rs — Replace Regex Parsing with syn AST
type: refactor
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: |
    Replace fragile regex-based filter parsing in build.rs with syn AST
    parsing. Fix param-manifest.json generation to use serde_json. Remove
    dead codegen. Automate WIT filter declaration sync.
  context: |
    The build.rs script parses filters.rs using regex/string matching to
    extract filter registrations, ConfigParams structs, and function
    signatures. This is fragile: it breaks on comments in wrong places,
    complex types, multi-line signatures, and formatting changes. Meanwhile,
    the proc macros (rasmcore-macros) already use syn+quote correctly. The
    build.rs should use the same approach.

    Additionally:
    - param-manifest.json is built with string concatenation instead of serde_json
    - A generated adapter file (generated_filter_adapter.rs) is never included
    - WIT filter declarations are printed to stderr for manual copy — no automation
  codebase_analysis: |
    BUILD.RS FRAGILITIES (crates/rasmcore-image/build.rs):
    1. Filter detection: regex on "register_filter(" with "name" in line
       - Breaks if attribute spans lines, or if "name" appears in comments
    2. Function sig extraction: string splitting on commas
       - Breaks on generic types like HashMap<K, V> or tuple params
    3. ConfigParams parsing: "derive" && "ConfigParams" string match
       - Breaks if struct uses non-standard formatting
    4. JSON building: format!() + push_str concatenation
       - Prone to missing quotes, bad escaping, malformed output
    5. Type mapping: hardcoded match on type name strings
       - No exhaustive handling, silent fallthrough

    PROC MACROS (crates/rasmcore-macros/src/lib.rs):
    - Already use syn::parse for AST parsing — CORRECT approach
    - quote! for code generation — CORRECT approach
    - These should NOT be changed

    DEAD CODE:
    - generated_filter_adapter.rs is written to OUT_DIR but never included
    - WIT stderr output is not consumed by any automation

    KEY INSIGHT: syn can parse a full Rust file as syn::File, then walk
    the AST to find #[register_filter] attributes on functions. This is
    the same thing the proc macro does, but at the file level.
  acceptance_criteria:
    - build.rs uses syn::parse_file() to parse filters.rs as AST
    - Filter registrations extracted by walking syn::ItemFn with matching attributes
    - ConfigParams structs extracted by walking syn::ItemStruct with matching derives
    - param-manifest.json generated via serde_json::to_string_pretty()
    - Dead codegen removed (generated_filter_adapter.rs, stderr WIT output)
    - All 113+ filters still appear in param-manifest.json after rebuild
    - No functional changes to runtime behavior
    - Build still completes in reasonable time (syn parse adds ~200ms)
    - Existing tests pass unchanged
  out_of_scope: |
    Proc macro changes (already correct). New filter registration features.
    WIT auto-generation pipeline (separate track if needed). Runtime changes.
  technical_notes: |
    APPROACH:

    1. Add syn and serde_json as build-dependencies:
       [build-dependencies]
       syn = { version = "2", features = ["full", "parsing"] }
       serde_json = "1"
       serde = { version = "1", features = ["derive"] }

    2. Parse filters.rs as AST:
       let source = std::fs::read_to_string("src/domain/filters.rs")?;
       let file = syn::parse_file(&source)?;

    3. Walk the AST to find registered filters:
       for item in &file.items {
           if let syn::Item::Fn(func) = item {
               for attr in &func.attrs {
                   if attr.path().is_ident("rasmcore_macros") || ... {
                       // Extract name, category from attribute args
                       // Extract params from func.sig.inputs
                   }
               }
           }
       }

    4. Walk AST to find ConfigParams structs:
       if let syn::Item::Struct(s) = item {
           for attr in &s.attrs {
               if is_derive_config_params(attr) {
                   // Extract fields, #[param(...)] attributes
               }
           }
       }

    5. Build manifest with serde:
       #[derive(Serialize)]
       struct FilterManifest { filters: Vec<FilterEntry> }
       let json = serde_json::to_string_pretty(&manifest)?;

    BUILD TIME IMPACT:
    - syn parse of ~12K line file: ~100-200ms
    - Acceptable for build.rs (runs once per build, not per compilation unit)
    - Much less than proc macro compilation overhead we already pay
