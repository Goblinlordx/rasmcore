id: analysis-filter-migration_20260407000400Z
title: Migrate existing filters to analysis pass protocol
type: feature
status: pending
created: 2026-04-07
updated: '2026-04-07'
spec:
  summary: 'Migrate existing analysis-capable filters to the new analysis pass protocol.

    GPU-capable filters (auto_levels, equalize, Otsu) declare analysis buffer

    outputs so they participate in cross-node GPU chain fusion. Geometry-changing

    filters (smart_crop, seam_carve) implement analyze() for the staged CPU path.

    Add concrete SmartCropAnalysis node for the end-to-end example.

    '
  context: "After Tracks 1-3, the infrastructure exists but no filters use it.\nSeveral existing filters already have internal\
    \ analysis logic that should\nbe exposed via the new protocol:\n\nGPU buffer analysis (uses Track 2 — zero readback):\n\
    - auto_levels: internally computes ChannelMinMax → apply stretch.\n  Currently a single node with 3-pass gpu_shaders().\
    \ Should declare\n  analysis_outputs() so another node can read the min/max buffer.\n- equalize: internally computes Histogram256\
    \ → build CDF → apply.\n  Should declare analysis_outputs() for the histogram buffer.\n- Otsu threshold: internally computes\
    \ Histogram256 → find threshold.\n  Should declare analysis_outputs() for histogram.\n\nCPU analysis (uses Track 3 — staged\
    \ pipeline):\n- smart_crop (filters/analysis.rs): computes energy map → finds\n  best crop rect. Output is a Rect that\
    \ changes dimensions.\n  Should implement analyze() returning AnalysisResult::Rect.\n- seam_carve (filters/analysis.rs):\
    \ computes seams → removes.\n  Output changes dimensions. Should implement analyze().\n\nNew node needed:\n- SmartCropAnalysis:\
    \ standalone analysis node that produces a Rect.\n  Used in the smart_crop → emboss → smart_crop example.\n  Wraps the\
    \ existing energy/saliency computation from smart_crop.\n\nThis track also validates the full end-to-end flow:\n- GPU\
    \ path: histogram_analysis → auto_levels (zero readback)\n- CPU path: smart_crop → emboss → smart_crop (staged pipeline)\n\
    \nReference: .agent/kf/_reports/analysis-render-pass-design.md\n"
  codebase_analysis: "Files to examine for existing analysis logic:\n\n1. filters/analysis.rs — SmartCrop, SeamCarve filters\n\
    \   - SmartCrop::compute() does energy computation + crop selection inline\n   - Energy computation is reusable for SmartCropAnalysis\
    \ node\n   - SeamCarve has similar inline analysis\n\n2. filters/enhance.rs or filters/color.rs — auto_levels, equalize\n\
    \   - auto_levels: uses ChannelMinMax reduction internally\n   - equalize: uses Histogram256 reduction internally\n  \
    \ - Both currently return gpu_shaders() with all 3 passes bundled\n\n3. filters/edge.rs — Otsu, triangle threshold\n \
    \  - Use Histogram256 reduction + apply threshold\n   - 3-pass GPU pattern already working\n\nMigration pattern for GPU\
    \ filters:\n- Split existing 3-pass gpu_shaders() into:\n  a. analysis_outputs() declaring the reduction buffer\n  b.\
    \ gpu_shaders() returning only the reduction passes (1-2)\n  c. A separate render shader that reads the buffer (pass 3)\n\
    - OR: keep existing behavior AND add declarations for cross-node use\n  (backward compatible — single-node still works,\
    \ cross-node also works)\n\nMigration pattern for CPU filters:\n- Add analyze() method returning the analysis result\n\
    - Keep existing compute() as the render path\n- StagedPipeline calls analyze() separately from compute()\n\nSafety concern:\
    \ splitting existing gpu_shaders() could break current\nbehavior if not done carefully. Prefer additive approach: keep\
    \ existing\nsingle-node behavior, ADD cross-node declarations on top.\n"
  acceptance_criteria:
  - auto_levels declares analysis_outputs() for ChannelMinMax buffer
  - equalize declares analysis_outputs() for Histogram256 buffer
  - Otsu threshold declares analysis_outputs() for Histogram256 buffer
  - smart_crop implements analyze() returning AnalysisResult::Rect
  - SmartCropAnalysis standalone node implemented and registered
  - Integration test: histogram analysis (GPU) → auto_levels render (GPU), single execute() call
  - Integration test: smart_crop → emboss → smart_crop via StagedPipeline
  - All existing filter tests pass unchanged (backward compatible)
  - Existing single-node GPU chains still work (no regression)
  - WASM build succeeds with migrated filters
  out_of_scope: '- New analysis algorithms not already present in the codebase

    - Face detection, object detection (ML-based analysis — future)

    - Auto white balance analysis (separate filter track)

    - Performance optimization of analysis algorithms themselves

    '
  technical_notes: "Backward compatibility strategy:\n\nFor GPU filters (auto_levels, equalize, Otsu):\n- Keep existing gpu_shaders()\
    \ returning all 3 passes (single-node path)\n- ADD analysis_outputs() declaring the reduction buffer\n- ADD gpu_shaders_with_context()\
    \ that, when context is available,\n  returns only the reduction passes (pass 1-2). The apply pass (pass 3)\n  becomes\
    \ the downstream render node's responsibility.\n- When used standalone (no cross-node): gpu_shaders() called, 3 passes,\
    \ works as before\n- When used as analysis source: gpu_shaders_with_context() called, 2 passes,\n  downstream render gets\
    \ the apply pass with resolved buffer ID\n\nFor CPU filters (smart_crop):\n- Keep existing compute() unchanged\n- ADD\
    \ analyze() returning AnalysisResult::Rect\n- StagedPipeline calls analyze() for the staged path\n- Direct compute() still\
    \ works for non-staged usage\n\nSmartCropAnalysis node:\n- Wraps the energy/saliency computation from smart_crop\n- analyze()\
    \ returns Rect\n- compute() is a passthrough (returns input unchanged)\n- This separates \"determine what to crop\" from\
    \ \"do the crop\"\n- Enables: SmartCropAnalysis → Crop → Emboss → SmartCropAnalysis → Crop\n"
