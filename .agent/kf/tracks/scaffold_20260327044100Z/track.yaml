spec:
  summary: |
    Set up the rasmcore monorepo foundation — Cargo workspace, WIT interface
    definitions, cargo-component build configuration, and wasm-tools validation.
  context: |
    This is the first implementation track for rasmcore. The repo is currently
    empty except for .agent/kf/ project management files. This track creates
    the entire project structure that all subsequent tracks build upon.
    The repo serves as the monorepo for the full rasmcore module suite.
  codebase_analysis: |
    Empty repo — only .agent/kf/ exists. Architecture design is in
    .agent/kf/tracks/design-architecture_20260327035205Z/findings/.
    WIT interfaces are drafted in 02-wit-interfaces.md.
    Module structure is defined in 03-module-architecture.md.
  acceptance_criteria:
    - Cargo workspace builds successfully with cargo-component
    - All WIT interface files exist and are syntactically valid
    - rasmcore-types crate compiles with generated bindings from WIT
    - rasmcore-image crate scaffold compiles (stub implementations returning not-implemented)
    - wasm-tools validate passes on built .wasm output
    - Build produces a valid WASM component for wasm32-wasip2 target
    - Workspace structure matches architecture design (wit/, crates/, tests/)
  out_of_scope: |
    Actual implementation of image processing logic — that is the next track.
    Only stub implementations that compile and return not-implemented errors.
    No CI pipeline setup (local build validation only for now).
  technical_notes: |
    Use cargo-component for build since we have custom WIT interfaces.
    The wasm32-wasip2 target must be installed via rustup.
    WIT files go in wit/ at repo root, crates reference them via
    package.metadata.component in Cargo.toml.
    Only scaffold crates needed for Phase 1 (rasmcore-types, rasmcore-image).
    Other crate directories can be created empty or deferred.
