id: docs-nextjs-ssg_20260405150900Z
title: Migrate docs site to Next.js SSG, move Node deps out of root
type: refactor
status: pending
created: '2026-04-05'
updated: '2026-04-05'
spec:
  summary: |
    Replace build-docs.mjs with a Next.js app in docs/ for SPA navigation
    and static export. Move all Node.js deps out of project root into their
    respective subdirs. Root Makefile delegates to subdirs.
  context: |
    Current issues:
    1. Docs site is raw HTML generated by a Node script — full page reload on
       every nav click, sidebar scroll lost, no SPA behavior
    2. Root package.json exists with @asciidoctor/core installed — Node deps
       should not be at project root (it is a Rust workspace)
    3. web-ui/ has its own package.json (correct), but SDK generation scripts
       in scripts/ install deps at root

    Target state:
    1. docs/ is a self-contained Next.js app with its own package.json
    2. web-ui/ keeps its own package.json (unchanged)
    3. scripts/ that need Node deps (generate-v2-fluent-sdk.mjs, etc.) either
       move into their respective subdir or use the subdir's node_modules
    4. Root has NO package.json, NO node_modules
    5. Root Makefile has targets that delegate: make docs, make web-ui, make sdk
  codebase_analysis: |
    Current structure:
    - /package.json — root, has @asciidoctor/core (from build-docs.sh)
    - /node_modules/@asciidoctor — installed at root
    - /web-ui/package.json — React 19, Vite, correct
    - /scripts/build-docs.mjs — raw HTML SSG, imports @asciidoctor/core from root
    - /scripts/build-docs.sh — installs deps at root, runs SSG
    - /scripts/generate-v2-fluent-sdk.mjs — SDK generation, no Node deps needed
    - /scripts/generate-v2-sdk.sh — jco transpile
    - /scripts/build-v2-webui.sh — orchestrates WASM + SDK + web-ui build
    - /Makefile — exists, has web-ui targets only

    docs/ currently has:
    - docs/assets/ — reference photos (keep)
    - docs/operations/ — .adoc files (keep, Next.js reads them)
    - docs/pages/ — manual .adoc pages (keep)
    - docs/build/ — generated HTML output (will become docs/out/ via next export)
  acceptance_criteria:
    - docs/ is a Next.js app with its own package.json and node_modules
    - SPA navigation — clicking sidebar links does not reload the page
    - Static export via next build && next export to docs/out/
    - Sidebar preserves scroll position and highlights active link
    - Split-view before/after widget works (React component)
    - AsciiDoc rendering via asciidoctor.js (dependency in docs/package.json)
    - Registry JSON read at build time (getStaticProps pattern)
    - Manual .adoc pages rendered alongside auto-generated operation pages
    - Root package.json and node_modules removed
    - Root Makefile has docs, web-ui, sdk, and build-all targets
    - make docs runs the full docs pipeline (render examples + next build)
    - make web-ui runs the web UI build
  out_of_scope: |
    Search functionality. Dark/light theme toggle.
    MDX (using AsciiDoc). Deployment pipeline.
  technical_notes: |
    Architecture:

    1. Next.js app (docs/):
       - pages/index.tsx — categorized operation index
       - pages/operations/[slug].tsx — per-operation page (getStaticPaths + getStaticProps)
       - pages/codecs/[slug].tsx — encoder/decoder pages
       - pages/guides/[slug].tsx — manual .adoc pages
       - components/SplitView.tsx — before/after widget (React, no inline script)
       - components/Sidebar.tsx — nav with active link, no scroll reset
       - components/ParamTable.tsx — param table from registry data
       - lib/registry.ts — reads /tmp/v2_registry_docs.json at build time
       - lib/asciidoc.ts — renders .adoc files using asciidoctor.js
       - next.config.js — static export config, basePath if needed

    2. Data flow at build time:
       - render_examples binary → /tmp/docs-examples/*.png
       - dump_registry binary → /tmp/v2_registry_docs.json
       - Next.js getStaticProps reads JSON + .adoc files → props
       - next build → next export → docs/out/ (static HTML + JS)

    3. Root cleanup:
       - Delete /package.json, /package-lock.json
       - Add /node_modules to .gitignore if not already
       - scripts/build-docs.sh → cd docs && npm run build
       - scripts/generate-v2-fluent-sdk.mjs stays in scripts/ (no Node deps)

    4. Makefile:
       ```makefile
       .PHONY: docs web-ui sdk build-all

       docs:
           cargo run --bin render_examples -p rasmcore-v2-wasm --release
           cargo run --bin dump_registry -p rasmcore-v2-wasm > /tmp/v2_registry_docs.json
           cd docs && npm install && npm run build

       web-ui:
           ./scripts/build-v2-webui.sh

       sdk:
           ./scripts/generate-v2-sdk.sh
           node scripts/generate-v2-fluent-sdk.mjs

       build-all: sdk web-ui docs
       ```
