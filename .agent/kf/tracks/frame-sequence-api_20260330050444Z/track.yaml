id: frame-sequence-api_20260330050444Z
title: Frame-Aware Pipeline — Source, Sink, Picking, and Sequence Type
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Extend the pipeline graph with frame-aware source/sink nodes so that

    multi-frame images (GIF, WebP, TIFF) stream through the existing filter

    chain. Frame picking, range selection, and sequence collection are source/

    sink configuration — existing filter nodes are unchanged.

    '
  context: 'The multi-frame read API (frame_count, decode_frame, decode_all_frames)

    exists in the domain layer but is disconnected from the pipeline graph.

    Users want to express operations like "load GIF, pick frame 3, sharpen,

    encode as PNG" or "load GIF, apply blur to all frames, encode as animated

    GIF" as a single pipeline graph rather than manual frame loops.


    The libvips approach (tall-strip stacking) is elegant but causes spatial

    filter bleed across frame boundaries. Instead, frame awareness lives at the

    graph edges: FrameSource selects/emits frames, existing nodes process each

    frame unchanged, FrameSink collects results into a FrameSequence.

    '
  codebase_analysis: "PIPELINE (pipeline/graph.rs):\n  - ImageNode trait: info(), compute_region(), overlap(), access_pattern()\n\
    \  - NodeGraph: Vec<Box<dyn ImageNode>> + SpatialCache\n  - Demand-driven: sink requests region -> pulls through filter\
    \ chain -> source provides\n  - Single-image only — one pass through the graph per execution\n\nEXISTING SOURCE NODES:\n\
    \  - SourceNode in pipeline/graph.rs wraps a DecodedImage\n  - Provides pixels via compute_region(), no frame awareness\n\
    \nMULTI-FRAME DECODER API (decoder/mod.rs):\n  - frame_count(data) -> Result<u32>\n  - decode_frame(data, index) -> Result<(DecodedImage,\
    \ FrameInfo)>\n  - decode_all_frames(data) -> Result<Vec<(DecodedImage, FrameInfo)>>\n\nFRAME TYPES (types.rs):\n  - FrameInfo\
    \ { index, delay_ms, disposal, width, height, x_offset, y_offset }\n  - DisposalMethod { None, Background, Previous }\n\
    \nWIT INTERFACE:\n  - decoder.wit: detect-format, decode, decode-as, supported-formats\n  - No frame types, no frame functions,\
    \ no pipeline frame awareness\n  - adapter/mod.rs: to_wit_image_info, to_wit_pixel_format helpers\n\nKEY DESIGN DECISION:\n\
    \  Frame awareness at the edges only. FrameSource emits frames one at a time,\n  the executor loops, existing filter nodes\
    \ process each frame as a normal\n  image, FrameSink collects (DecodedImage, FrameInfo) pairs. No changes to\n  any filter\
    \ node.\n"
  acceptance_criteria:
  - FrameSelection enum with Single, Pick, Range, All variants
  - FrameSource node that wraps multi-frame decode with frame selection
  - FrameSequence domain type with canvas dimensions and ordered frames
  - Pipeline executor sequence mode that loops over selected frames
  - Single(N) selection produces a single DecodedImage (not a sequence)
  - Pick/Range/All selection produces a FrameSequence via FrameSink
  - Existing single-image pipeline behavior unchanged (backward compat)
  - WIT types for frame-info, disposal-method, frame-selection
  - WIT functions for frame-count, decode-frame, decode-all-frames
  - Adapter wiring for all new WIT functions
  out_of_scope: 'Multi-frame encoding (separate track multiframe-encode).

    Animation playback/compositing/rendering.

    Multi-source composition (interleaving frames from different files).

    Custom timing overrides on FrameSelection (future FrameSelection variant).

    Animated WebP decode in pipeline (can be added later to FrameSource).

    '
  technical_notes: "New types in types.rs:\n  pub enum FrameSelection {\n      Single(u32),\n      Pick(Vec<u32>),\n     \
    \ Range(u32, u32),  // start..end exclusive\n      All,\n  }\n\n  pub struct FrameSequence {\n      pub frames: Vec<(DecodedImage,\
    \ FrameInfo)>,\n      pub canvas_width: u32,\n      pub canvas_height: u32,\n  }\n\nFrameSource node (pipeline/frame_source.rs):\n\
    \  - Wraps raw image bytes + FrameSelection\n  - On each executor iteration, yields the next selected frame\n  - Implements\
    \ ImageNode: info() returns current frame's ImageInfo\n  - compute_region() returns current frame's pixels for the requested\
    \ region\n\nExecutor sequence mode (pipeline/graph.rs):\n  - NodeGraph::execute_sequence(source, selection) -> FrameSequence\n\
    \  - For each selected frame index:\n    1. FrameSource loads frame via decode_frame(data, idx)\n    2. Graph runs one\
    \ full pass (existing demand-driven pull)\n    3. Sink captures (result_pixels, FrameInfo) into FrameSequence\n  - Single\
    \ mode: just calls execute() as today, returns DecodedImage\n\nWIT additions:\n  - decoder.wit: frame-info record, disposal-method\
    \ enum,\n    frame-count, decode-frame, decode-all-frames functions\n  - pipeline.wit: frame-selection variant, execute-sequence\
    \ function\n  - adapter wiring follows existing to_wit_*/to_domain_* pattern\n"
