id: alpha-blend-modes_20260329161705Z
title: Alpha Management + Blend Modes — Premultiply, Flatten, Add/Remove Alpha, Multiply/Screen/Overlay
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: Complete alpha channel management (premultiply, unpremultiply, add, remove, flatten)
    and PDF/SVG blend modes (multiply, screen, overlay, darken, lighten, soft-light,
    hard-light, difference, exclusion). Matches libvips vips_composite() blend modes
    and ImageMagick -compose options.
  context: |
    Current composite.rs only supports Porter-Duff "over" compositing. libvips vips_composite()
    supports 20+ blend modes. ImageMagick -compose supports Multiply, Screen, Overlay,
    Darken, Lighten, ColorDodge, ColorBurn, HardLight, SoftLight, Difference, Exclusion.
    These are essential for layer-based image composition (Photoshop-style blending).
    Alpha management (premultiply/flatten) is needed for correct blending math.
  codebase_analysis: |
    composite.rs has alpha_composite_over() which internally premultiplies, blends, then
    unpremultiplies. This per-pixel pattern extends to other blend modes — just change the
    blend formula. The premultiply/unpremultiply logic is inline; extracting it as public
    functions enables the pipeline to operate in premultiplied space (more efficient for
    chains of blend operations). Flatten replaces alpha with a background color (common for
    JPEG output). Add/remove alpha converts between RGB8 and RGBA8.
  acceptance_criteria:
    - premultiply(pixels, info) converts straight alpha to premultiplied
    - unpremultiply(pixels, info) converts premultiplied to straight alpha
    - flatten(pixels, info, bg_color) composites RGBA onto solid background, outputs RGB8
    - add_alpha(pixels, info, alpha_value) converts RGB8 to RGBA8
    - remove_alpha(pixels, info) strips alpha channel (RGB8 output)
    - blend(fg, fg_info, bg, bg_info, mode, offset_x, offset_y) supports 9+ blend modes
    - Blend modes include Multiply, Screen, Overlay, Darken, Lighten, SoftLight, HardLight, Difference, Exclusion
    - Blend output matches ImageMagick -compose reference within MAE < 0.5
    - Performance within 2x of ImageMagick for blend operations on 4K images
  out_of_scope: |
    ColorDodge, ColorBurn (complex, niche). Dissolve. Component-based modes (Hue, Saturation,
    Color, Luminosity — need HSL conversion from color-adjust track).
  technical_notes: |
    All blend modes operate on premultiplied alpha. Formulas (per channel, normalized 0-1):
    Multiply: a*b. Screen: a+b-a*b. Overlay: if b<0.5 then 2ab else 1-2(1-a)(1-b).
    Darken: min(a,b). Lighten: max(a,b). SoftLight: Photoshop formula. HardLight: Overlay
    with a/b swapped. Difference: abs(a-b). Exclusion: a+b-2ab.
    Final composite: result * fg_alpha + bg * (1 - fg_alpha) for each output pixel.
    Reference: magick fg.png bg.png -compose Multiply -composite ref.png
