spec:
  summary: |
    20 runtime test failures across 3 test suites after V2 migration.
    Investigate each failure, determine if it's a test-side issue
    (API change) or an actual regression (wrong output), and fix.
  context: |
    These tests compile but produce wrong results or panic at runtime.
    They need careful investigation — each failure could be:
    1. Test code calling the wrong API (easy fix)
    2. Test expectations outdated after intentional behavior change
    3. Actual regression in filter output (needs real fix)
  codebase_analysis: |
    Failing suites:
    - parity.rs: 16 failures — distortion filters (barrel, polar, ripple,
      swirl, wave, spherize), grayscale, JPEG quality/determinism tests
    - filter_reference_parity.rs: 2 failures — specific filters TBD
    - photo_enhance_parity.rs: 2 failures — specific filters TBD

    160+ tests pass in 9 other suites, confirming core infrastructure works.
    The failures are concentrated in distortion and codec parity.
  acceptance_criteria:
    - All 16 parity.rs failures fixed or documented as intentional changes
    - All 2 filter_reference_parity.rs failures fixed
    - All 2 photo_enhance_parity.rs failures fixed
    - Zero test regressions in currently-passing suites
  out_of_scope: |
    Test compilation fixes (prerequisite track). New parity tests.
    GPU parity validation.
  technical_notes: |
    Investigation approach per failure:
    1. Run the failing test, capture actual vs expected output
    2. Check git blame — was the filter code changed in V2 migration?
    3. If test-side: update test to use V2 API
    4. If regression: bisect to find breaking commit, fix filter code
    5. If intentional change: update expected values with documented rationale
