title: Fix test compilation — update test suites for V2 API
type: bug
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: |
    4 test files and the lib test module won't compile after V2 migration.
    Update API signatures, imports, and struct constructors to match
    the V2 derive(Filter) pattern.
  context: |
    The V2 migration changed filter signatures from bare functions to
    derive(Filter) structs with CpuFilter::compute(). Test files that
    call filters directly or construct params structs need updating.
    160+ passing tests in 9 other suites confirm the core is working —
    these are test-code-only compilation failures.
  codebase_analysis: |
    Failing test files and error counts:
    - lib tests (125 errors) — inline #[cfg(test)] modules throughout
      domain/filters/ reference old function signatures and removed types
    - pro_filter_parity.rs (5 errors) — references old ConfigParams paths
    - blur_reference_parity.rs (3 errors) — old blur function signature
    - f32_rounding_proof.rs (3 errors) — old filter function calls
    - bench.rs (6 errors) — old benchmark function signatures

    Common error patterns:
    - E0425 cannot find function (bare fn moved to CpuFilter::compute)
    - E0599 no method named compute (wrong type)
    - E0422 cannot find struct (moved module paths)
    - E0603 module is private (visibility changes)
  acceptance_criteria:
    - All 4 test files compile (bench, blur_reference_parity, f32_rounding_proof, pro_filter_parity)
    - Lib tests (#[cfg(test)] modules) compile
    - Previously passing tests still pass
    - No test logic changes — only API signature updates
  out_of_scope: |
    Fixing runtime test failures (separate track). Adding new tests.
    Fixing the actual filter implementations.
  technical_notes: |
    Systematic approach:
    1. Fix each file's compilation errors one at a time
    2. For each error, find the V2 equivalent:
       - Old: filters::blur(&pixels, &info, radius)
       - New: BlurParams { radius }.compute(rect, &mut upstream, &info)
    3. Update struct paths where modules moved
    4. Fix lib test modules last (most errors, most mechanical)
