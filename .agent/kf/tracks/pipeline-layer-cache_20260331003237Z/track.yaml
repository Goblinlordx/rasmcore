id: pipeline-layer-cache_20260331003237Z
title: Pipeline Layer Cache — Content-Addressed Cross-Pipeline Caching
type: feature
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: |
    Add an optional layer cache that persists across pipeline lifetimes.
    Each node's output is keyed by a content hash of its upstream chain
    plus parameters. New pipelines sharing the same cache skip recomputation
    for unchanged prefixes. Cache cleaned on pipeline egress.
  context: |
    Currently, the SpatialCache lives inside NodeGraph and dies when the
    pipeline is dropped. If a user builds a pipeline (decode -> resize ->
    blur -> brightness), writes JPEG, then creates a new pipeline with the
    same source + resize + blur but different brightness, all 3 prior steps
    are recomputed from scratch.

    The proposed LayerCache lives outside the pipeline lifecycle. It maps
    content-addressed hashes to pixel buffers. When a pipeline node's hash
    matches a cached entry, it returns the cached pixels instead of
    recomputing. This is analogous to Docker layer caching: each layer is
    the hash of (parent_hash + this_operation).

    Eviction strategy (v1): on pipeline write completion (egress), remove
    any cache entries not referenced by the current graph. This keeps the
    cache pruned to the "hot path" without complex LRU.
  codebase_analysis: |
    EXISTING INFRASTRUCTURE:
    - SpatialCache in rasmcore-pipeline/src/cache.rs: per-node region cache
      with ref counting and memory budget. Scoped to NodeGraph lifetime.
    - NodeGraph in pipeline/graph.rs: owns nodes + SpatialCache. Pull-based
      execution via request_region(). Cache is checked before compute.
    - ImageNode trait: compute_region(request, upstream_fn) -> pixels.
      Nodes don't know about caching — graph handles it transparently.
    - PipelineResource in adapter/pipeline_adapter.rs: WIT adapter.
      Creates NodeGraph with 16MB cache budget. Exposes read/write/filter ops.

    INTEGRATION POINTS:
    1. NodeGraph::request_region() — INSERT cache lookup before node compute
    2. PipelineResource::new() — ACCEPT optional cache handle
    3. Each node's add_* method — COMPUTE content hash from upstream + params
    4. Pipeline write methods — TRIGGER cache cleanup on completion

    HASH COMPUTATION:
    - Source node: hash = blake3(input_bytes) or hash of (format, dimensions, checksum)
    - Filter node: hash = blake3(upstream_hash || filter_name || param_bytes)
    - Transform node: hash = blake3(upstream_hash || "resize" || width || height || filter)
    - Composite node: hash = blake3(fg_hash || bg_hash || blend_mode || position)

    The hash captures the FULL computation lineage. Two pipelines that build
    the same graph with the same parameters produce the same hashes.

    WASM CONSIDERATIONS:
    - LayerCache must be a WIT resource (opaque handle, host-managed lifetime)
    - Pipeline accepts optional cache-id parameter
    - Cache lives as long as the host holds the handle
    - No filesystem — all in-memory (host can persist if desired)
  acceptance_criteria:
    - LayerCache WIT resource with create/release lifecycle
    - Pipeline accepts optional layer-cache on initialization
    - Content hash computed per node from upstream hash + operation + params
    - Cache hit skips node computation, returns cached pixels
    - Cache miss computes normally and stores result with hash key
    - On pipeline write completion, unreferenced cache entries are cleaned
    - Reusing cache across pipelines skips unchanged prefix nodes
    - Memory budget configurable (default 64 MB for layer cache)
    - Cache statistics exposed (hits, misses, size, entry count)
    - Existing pipeline behavior unchanged when no cache provided
    - Unit test showing cache hit on second pipeline with same prefix
    - Integration test showing speedup when reusing cache
  out_of_scope: |
    Persistent (disk) caching. Distributed caching. LRU eviction (v1 uses
    egress cleanup only). Tile-level caching within a single node. Cache
    sharing across WASM component instances. Automatic cache invalidation
    on source file change (host responsibility).
  technical_notes: |
    ARCHITECTURE:

    ```
    LayerCache (lives outside pipeline)
      entries: HashMap<ContentHash, CachedLayer>
      memory_budget: usize
      memory_used: usize

    CachedLayer
      pixels: Vec<u8>
      info: ImageInfo
      hash: ContentHash
      last_accessed: Instant (for future LRU)

    ContentHash = [u8; 32] (blake3)
    ```

    HASH CHAIN:
    ```
    let src_hash = blake3::hash(&source_bytes);
    let blur_hash = blake3::keyed_hash(src_hash, b"blur|radius=2.0");
    let bright_hash = blake3::keyed_hash(blur_hash, b"brightness|amount=0.1");
    ```

    Actually, simpler: each node stores its hash. When adding a node:
    ```rust
    fn add_blur(&mut self, upstream: NodeId, radius: f32) -> NodeId {
        let upstream_hash = self.node_hash(upstream);
        let this_hash = hash_combine(upstream_hash, "blur", &radius.to_le_bytes());
        // Check layer cache
        if let Some(cached) = self.layer_cache.get(&this_hash) {
            return self.add_cached_node(cached, this_hash);
        }
        // No cache hit — add normal node, record hash for later caching
        let node = BlurNode::new(upstream, src_info, radius);
        let id = self.add_node_with_hash(Box::new(node), this_hash);
        id
    }
    ```

    ON EXECUTION COMPLETION (write_* methods):
    ```rust
    fn write_jpeg(&self, ...) -> Result<Vec<u8>, ...> {
        let pixels = self.graph.request_region(node_id, full_rect)?;
        let encoded = encode_jpeg(&pixels, ...)?;
        // Cache the output of each node in the current graph
        self.cache_current_graph_outputs();
        // Clean entries not in current graph
        self.layer_cache.retain(|hash, _| self.graph_hashes.contains(hash));
        Ok(encoded)
    }
    ```

    WIT INTERFACE ADDITIONS:
    ```wit
    resource layer-cache {
        constructor(memory-budget-mb: u32);
        stats: func() -> cache-stats;
    }

    record cache-stats {
        entries: u32,
        hits: u64,
        misses: u64,
        size-bytes: u64,
    }

    // Extend image-pipeline resource:
    constructor(cache: option<borrow<layer-cache>>);
    ```

    HASHING CRATE:
    Use blake3 (pure Rust, WASM-compatible, fast). Already used widely
    in the Rust ecosystem. ~50KB binary size.
