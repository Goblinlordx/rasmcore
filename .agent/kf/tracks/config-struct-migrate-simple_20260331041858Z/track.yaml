id: config-struct-migrate-simple_20260331041858Z
title: "Migrate Simple Filters to Config Struct Signatures"
type: refactor
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: >
    Change remaining 1-2 param filter signatures to config structs. Complete
    the migration so all parameterized filters use config struct API.
  context: |
    After multi-param filters are migrated, this track handles the simple
    cases (1-2 params). These are lower priority since single-param functions
    like blur(pixels, info, radius) are already clean, but migration gives
    consistency across the entire API.
  codebase_analysis: |
    Simple filters (~75):
    - 1-param: blur, sharpen, brightness, contrast, gamma, hue_rotate,
      saturate, sepia, equalize, normalize, invert, posterize, etc.
    - 2-param: some distortion filters, dither, quantize, etc.
    - 0-param: sobel, scharr, laplacian, emboss, premultiply, etc. (EXCLUDED)

    Zero-param filters are excluded — no config struct needed.
  acceptance_criteria:
    - All filters with 1+ params use config struct signature
    - Zero-param filters unchanged (no config struct)
    - All test call sites updated
    - Full cargo test pass
    - Codegen generates config-based code for all parameterized filters
    - WIT has record types for all parameterized filters
  out_of_scope: |
    Zero-param filter changes. New filters.
  technical_notes: |
    For 1-param filters, the config struct is trivial:
      struct BlurConfig { radius: f32 }
      fn blur(pixels, info, config: &BlurConfig) { ... config.radius ... }

    This is slightly more verbose but gives API consistency.
    Consider whether this is worth the churn — if the team decides
    1-param filters should stay as-is, this track can be skipped.
plan:
  - phase: 1-Param Filters
    tasks:
      - text: Migrate spatial 1-param filters (blur, sharpen, median, etc.)
        done: false
