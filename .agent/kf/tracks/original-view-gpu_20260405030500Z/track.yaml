id: original-view-gpu_20260405030500Z
title: GPU display path for original image view
type: feature
status: pending
created: 2026-04-05
updated: '2026-04-05'
spec:
  summary: 'Use the same GPU display path (renderGpuPlan + executeAndDisplay) for the

    original/before image instead of the 2D canvas drawImage path. A dedicated

    original-view worker runs read() with no filters and blits via WebGPU.

    '
  context: "The preview (processed) image uses a WebGPU OffscreenCanvas with the GPU\ndisplay path: renderGpuPlan → executeAndDisplay\
    \ → blit shader → canvas.\nThe original image uses a separate 2D canvas with drawImage from a PNG\nblob. This creates\
    \ two different rendering paths with different sizing,\ncolor management, and format support.\n\nUsing the same GPU path\
    \ for both ensures:\n- Consistent display across before/after views\n- Formats browsers cannot decode (EXR, HDR, FITS,\
    \ HEIC) display correctly\n  because rasmcore handles decoding\n- Same pan/zoom behavior via the blit shader viewport\
    \ uniform\n- Same color space handling (linear → display via tone mapping)\n- No CSS stretch issues — the shader handles\
    \ image-to-canvas mapping\n"
  codebase_analysis: "Current original image path (App.tsx):\n- File bytes → Blob → createObjectURL → Image.onload → canvas.getContext('2d')\n\
    \  → drawImage. Browser handles decoding. Only works for browser-supported formats.\n\nCurrent preview path (v2-preview-worker.ts):\n\
    - File bytes → WASM read() → filter chain → renderGpuPlan → executeAndDisplay\n  → blit shader → OffscreenCanvas. Works\
    \ for any format rasmcore can decode.\n\nWhat is needed:\n- A second OffscreenCanvas transferred to a worker for the original\
    \ view\n- The worker runs: createPipeline(imageBytes) → renderGpuPlan(sourceNode)\n  → executeAndDisplay with empty shader\
    \ list (passthrough)\n- The gpu_plan passthrough feature (just merged) makes this work: empty\n  shaders list = upload\
    \ pixels + blit directly\n- Pan/zoom synchronized between both canvases via shared viewport state\n\nOptions for worker\
    \ architecture:\nA) Dedicated original-view worker (separate Web Worker)\nB) Reuse preview worker with a second OffscreenCanvas\n\
    C) Reuse preview worker — render original as a zero-filter chain\n\nOption C is simplest: the preview worker already has\
    \ the pipeline\ninfrastructure. Send it a second OffscreenCanvas for the original view.\nWhen the original tab is shown,\
    \ render with an empty chain.\n"
  acceptance_criteria:
  - Original image displays via GPU blit path (not 2D canvas drawImage)
  - Original view matches preview view sizing and positioning
  - Split view shows both canvases with consistent rendering
  - EXR/HDR/FITS images display correctly in original view
  - Pan/zoom works identically on both canvases
  - No stretch or aspect ratio issues
  - No flickering when switching between Current/Original/Split tabs
  out_of_scope: '- Full-res original view (preview resolution is acceptable for now)

    - Color management differences between original and processed

    - Dual-worker architecture (single worker handles both for simplicity)

    '
  technical_notes: "Implementation approach (Option C — reuse preview worker):\n\n1. Transfer a second OffscreenCanvas to\
    \ the preview worker for original view\n   - New message: { type: 'init-original-display', canvas }\n   - Worker creates\
    \ a second GpuHandlerV2 instance (or extends existing\n     one with a second display target)\n\n2. On image load, render\
    \ original via gpu-plan passthrough:\n   - createPipeline(previewBytes) with no filters\n   - renderGpuPlan(sourceNode)\
    \ returns empty shaders + source pixels\n   - executeAndDisplay uploads pixels and blits to original canvas\n\n3. Pan/zoom:\
    \ forward viewport changes to both canvases\n   - Both use the same viewport uniform values\n   - Both blit shaders map\
    \ image → canvas identically\n\n4. Remove the 2D canvas original rendering from App.tsx:\n   - No more Blob → Image →\
    \ drawImage path\n   - No more getWideGamutContext for original canvas\n\n5. Canvas.tsx: both canvases use display-mode\
    \ style (fill viewport,\n   shader handles pan/zoom). No more separate originalStyle.\n\nAlternative: if a second GpuHandlerV2\
    \ instance is too heavy, the\nworker can re-blit the source pixels to the original canvas using\na shared pixel buffer\
    \ (source pixels are already in GPU memory from\nthe first renderGpuPlan call).\n"
