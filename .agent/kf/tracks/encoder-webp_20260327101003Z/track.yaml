spec:
  summary: |
    Fix the WebP encoder to apply quality/lossless config (currently ignored),
    evaluate whether the image crate's pure-Rust WebP encoder produces
    acceptable quality-per-byte vs libwebp, and determine if a backend swap
    is needed. Enforce determinism and validate against ImageMagick.
  context: |
    WebP encoder landscape:
    1. libwebp (Google C reference) — gold standard for lossy WebP
    2. webpx (safe Rust bindings to libwebp) — same quality, Rust API
    3. image crate image-webp — pure Rust, but lossless-only for quality work;
       lossy encoder is basic and may not match libwebp quality-per-byte

    The challenge: no pure Rust lossy WebP encoder matches libwebp quality.
    Options:
    a) Use image crate encoder, validate it is "good enough" (within 1.5x)
    b) If not good enough, evaluate webpx (libwebp bindings) — but this
       introduces a C dependency that will NOT compile to wasm32-wasip2
       without Emscripten
    c) Accept documented limitation for lossy WebP, use pure Rust lossless

    This track must empirically determine which path is right by running
    the quality curve comparison FIRST, then deciding.

    BUG — config not applied:
    - webp.rs line 28: encode uses _config (underscore = unused!)
    - quality and lossless have zero effect on output

    Standards: WebP Container Spec, VP8 (RFC 6386), WebP Lossless Bitstream

    Determinism: pure Rust VP8/VP8L encoder, no randomness.
  codebase_analysis: |
    - webp.rs line 28: uses img.write_to(&mut cursor, ImageFormat::WebP) — ignores config
    - image crate WebPEncoder:
      - WebPEncoder::new_lossless(&mut writer) for lossless
      - WebPEncoder::new_with_quality(&mut writer, quality) for lossy
    - Fix: branch on config.lossless, use appropriate constructor
    - After wiring, run quality curve to determine if quality-per-byte is
      acceptable vs ImageMagick (libwebp)
    - If quality-per-byte is poor: evaluate alternatives
    - Perceptual metrics (dev-dependencies):
      - butteraugli 0.9.0 for quality comparison
      - dssim-core 3.4.0 for regression checks
  acceptance_criteria:
    - WebP encode function uses config (quality and lossless both applied)
    - Determinism test: encode same input twice, output is byte-identical
    - Lossless mode produces pixel-exact roundtrip
    - Quality curve test: encode at q10/q30/q50/q70/q85/q95
    - Quality curve compared against ImageMagick using Butteraugli and DSSIM
    - File size at each quality compared against ImageMagick
    - DECISION GATE: if file sizes exceed 1.5x of ImageMagick at any quality,
      or Butteraugli shows meaningfully worse perceptual quality, document
      the limitation and create a follow-up track for backend evaluation
    - If quality is acceptable: validate curve is monotonic, edge cases pass
    - If quality is not acceptable: document findings with data, recommend path
    - All existing tests continue to pass
  out_of_scope: |
    - Animated WebP
    - WebP alpha channel quality
    - Near-lossless mode
    - Extended file format (XMP, EXIF in WebP)
    - Actually swapping to libwebp bindings (follow-up track if needed)
  technical_notes: |
    This track has a decision gate. The approach is:

    Phase 1: Wire the config (straightforward fix)
    Phase 2: Run quality curve and compare
    Phase 3: Based on results, either validate or document limitation

    Fix approach for webp.rs encode():
      if config.lossless {
          let encoder = WebPEncoder::new_lossless(&mut cursor);
          img.write_with_encoder(encoder)?;
      } else {
          let encoder = WebPEncoder::new_with_quality(&mut cursor, config.quality as f32);
          img.write_with_encoder(encoder)?;
      }

    The pure-Rust image-webp encoder may be significantly worse than libwebp
    for lossy encoding. This is a known limitation of the ecosystem — there
    is no pure-Rust VP8 encoder that matches Google's reference implementation.

    If backend swap is needed in future:
    - webpx (safe libwebp bindings) works on native but NOT on wasm32-wasip2
    - Could use conditional compilation: webpx on native, image-webp on WASM
    - Or accept that WebP lossy quality will be inferior in pure WASM context

    Testing strategy:
    1. Determinism: encode twice = identical bytes
    2. Wire config: quality and lossless actually applied
    3. Quality curve: at q10/q30/q50/q70/q85/q95 vs ImageMagick
       - Butteraugli distance comparison
       - DSSIM comparison
       - File size comparison
    4. Decision: pass/fail against 1.5x threshold
    5. Lossless: pixel-exact roundtrip, file size vs ImageMagick within 2x
