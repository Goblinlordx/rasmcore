id: kf-metadata-styleguide_20260329230501Z
title: Kiloforge Metadata Alignment and Rust Style Guide
type: chore
status: pending
created: '2026-03-30'
updated: '2026-03-29'
spec:
  summary: 'Align kf metadata structure with expected conventions (tdd strict,

    commit strategy, product guidelines) and create a comprehensive Rust

    style guide in code_styleguides/rust.md.

    '
  context: "Our .agent/kf/ metadata is incomplete compared to the expected kf-setup\noutput structure. The reference project\
    \ (commit-invaders) has:\n- workflow.yaml with tdd.strictness, commits.strategy, review, verification\n- product-guidelines.yaml\n\
    - code_styleguides/{language}.md per primary language\n- .gitignore in .agent/kf/\n\nOur project has:\n- workflow.yaml:\
    \ only version, verification command, and phases — missing\n  tdd config, commit strategy, review policy\n- No product-guidelines.yaml\n\
    - code_styleguides/ only has codec-validation.md (domain-specific), no\n  Rust language style guide\n- No .gitignore in\
    \ .agent/kf/\n\nThe Rust style guide is critical because developers and agents need\nconsistent guidance on naming, organization,\
    \ error handling, unsafe\nusage, WASM considerations, and the zero-warning policy.\n"
  codebase_analysis: "Current workflow.yaml:\n  version: \"1.0\"\n  verification:\n    command: \"./scripts/validate.sh\"\n\
    \    description: \"Format check, lint, domain tests, parity tests, WASM build\"\n  phases:\n    - name: implementation\
    \ (current: true)\n    - name: integration\n\nExpected workflow.yaml structure (from kf-setup skill and reference):\n\
    \  tdd:\n    strictness: strict\n  commits:\n    strategy: conventional\n  review: optional\n  verification:\n    checkpoints:\
    \ track_completion\n    commands:\n      - \"./scripts/validate.sh\"\n\nExisting code patterns (from scanning codebase):\n\
    - snake_case for functions/variables (standard Rust)\n- Modules organized by domain (codec, filter, pipeline)\n- Tests\
    \ co-located in mod tests {} blocks\n- Error types per crate using thiserror\n- WASM target: wasm32-wasip1 with cargo-component\n\
    - No unsafe code policy (pure Rust codecs)\n- SIMD via std::arch::wasm32 intrinsics where available\n"
  acceptance_criteria:
  - workflow.yaml includes tdd.strictness strict and commits.strategy conventional
  - product-guidelines.yaml exists with project-specific guidance
  - code_styleguides/rust.md exists with comprehensive Rust conventions
  - Rust style guide covers naming, organization, error handling, testing, WASM, SIMD, and zero-warning policy
  - .agent/kf/.gitignore excludes transient files (lock files, temp)
  - Existing codec-validation.md style guide preserved
  out_of_scope: 'Enforcing style guide rules in CI (that is the zero-warnings track).

    Modifying any source code. This track only creates/updates kf metadata.

    '
  technical_notes: "1. workflow.yaml — Restructure to match expected schema:\n   tdd:\n     strictness: strict\n   commits:\n\
    \     strategy: conventional\n   review: optional\n   verification:\n     checkpoints: track_completion\n     commands:\n\
    \       - \"./scripts/validate.sh\"\n   phases:\n     - name: implementation\n       current: true\n     - name: integration\n\
    \n2. product-guidelines.yaml — Document project-specific constraints:\n   - Pure Rust only (no C/C++ FFI)\n   - WASM-first\
    \ (all code must compile to wasm32-wasip1)\n   - Codec parity requirements (reference validation)\n   - SIMD required\
    \ for all image processing kernels\n   - Zero-copy where possible in pipeline\n\n3. code_styleguides/rust.md — Comprehensive\
    \ guide covering:\n   - Naming: snake_case functions, CamelCase types, SCREAMING_SNAKE constants\n   - Module organization:\
    \ domain-driven, co-located tests\n   - Error handling: thiserror for library errors, anyhow avoided\n   - Testing: unit\
    \ tests in mod tests {}, integration tests in tests/\n   - WASM considerations: no std::fs, no threads (use wasi-threads),\n\
    \     memory-conscious allocations\n   - SIMD: std::arch::wasm32 intrinsics, cfg(target_arch) gating\n   - Zero-warning\
    \ policy: no unused imports, no dead code, no\n     unnecessary casts. Prefix genuinely unused with _\n   - Clippy: all\
    \ default lints enforced, key lints listed\n   - Documentation: doc comments on public API only, not internal\n\n4. .agent/kf/.gitignore\
    \ — Exclude:\n   - *.lock (merge lock artifacts)\n   - _reports/*.tmp\n"
