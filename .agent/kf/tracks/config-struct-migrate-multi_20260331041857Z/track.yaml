id: config-struct-migrate-multi_20260331041857Z
title: Migrate Multi-Param Filters to Config Struct Signatures
type: refactor
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: 'Change function signatures for all filters with 3+ params to take a config struct instead of individual arguments.
    Update all call sites, tests, and adapter destructuring.

    '
  context: 'With codegen infrastructure supporting config structs, this track does

    the actual migration for the highest-value filters — those with 3+

    parameters where a config struct eliminates long argument lists.

    '
  codebase_analysis: 'Filters with 3+ params (estimated ~40):

    - Drawing: draw_line (6 params), draw_rect (7), draw_circle (5), draw_text (5)

    - Grading: asc_cdl (9), lift_gamma_gain (9), split_toning (3)

    - Spatial: bilateral (3), bokeh_blur (3), motion_blur (3), tilt_shift (4), lens_blur (3)

    - Color: colorize (4), channel_mixer (9), sparse_color (varies)

    - Enhancement: clahe (3), retinex_msr (3), vignette (3), shadow_highlight (5+)

    - Threshold: adaptive_threshold (4), canny (3)

    - Distortion: barrel (3), polar/depolar (3+), wave (4+), swirl (3+)

    - Etc.


    Each migration: change fn signature, update all callers (tests, adapters,

    pipeline nodes), verify tests pass.

    '
  acceptance_criteria:
  - All filters with 3+ params use config struct signature
  - All test call sites updated
  - Codegen adapter destructures config to call domain function
  - Pipeline nodes store config struct for these filters
  - Full cargo test pass
  - No regression in param-manifest.json
  out_of_scope: 'Filters with 0-2 params (next track).

    New filter implementations.

    '
  technical_notes: 'Migration per filter:

    1. Change fn signature from blur(pixels, info, r, s, t) to blur(pixels, info, config)

    2. Destructure config at top of function body

    3. Update all test call sites to construct config struct

    4. Verify tests pass for that filter

    5. Commit batch


    Batch by category to keep commits logical.

    '
