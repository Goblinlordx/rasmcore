id: gpu-multi-plan_20260406081502Z
title: Multi-output GPU plan extraction (render-multi-gpu-plan)
type: feature
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: |
    Implement render-multi-gpu-plan in Rust/WIT that returns ordered GPU
    stages with ref dependencies. Each stage specifies input source (pixels
    or prior-stage buffer). Host executes via GpuHandler.executeMulti().
  context: |
    The current render-gpu-plan extracts a single linear GPU shader chain
    for one node. The multi-output design needs a plan covering multiple
    output nodes (viewport + scopes), each potentially branching from a
    shared ref point.

    The plan must be topologically sorted so that upstream stages compute
    before downstream consumers. Ref-based inputs let stages read from
    a prior stage's GPU buffer instead of re-uploading pixels.
  codebase_analysis: |
    graph.rs gpu_plan() (lines 266-304):
    - Runs fusion optimizer
    - Calls collect_gpu_chain(node_id) to walk backward
    - Returns GpuPlan { shaders, input_pixels, width, height }
    - Single node, single chain

    collect_gpu_chain() walks backward from a node collecting GPU-capable
    nodes with single upstream. Stops at first non-GPU or multi-upstream.

    For multi-plan: need to call collect_gpu_chain for EACH target node,
    detect shared prefixes (ref points), and split into stages where
    downstream stages reference prior stage output instead of re-uploading.

    WIT currently has render-gpu-plan returning option<gpu-plan>.
    New render-multi-gpu-plan returns multi-gpu-plan with list<gpu-stage>.
  acceptance_criteria:
    - render_multi_gpu_plan(targets) method on Graph
    - Takes list of (target_name, node_id) pairs
    - Returns ordered list of gpu-stage with correct dependencies
    - Stages sharing a common prefix are deduplicated (computed once)
    - stage-input variant distinguishes pixels upload vs prior-stage ref
    - WIT record multi-gpu-plan with list of gpu-stage
    - WIT method render-multi-gpu-plan on image-pipeline-v2
    - WASM adapter implements the WIT method
    - Existing render-gpu-plan unchanged (backward compatible)
  out_of_scope: |
    GpuHandler executeMulti (separate track). Worker integration.
    GPU scope shaders.
  technical_notes: |
    Algorithm for multi-plan extraction:
    1. For each target, collect_gpu_chain → (source_node_id, shaders[])
    2. Group by common source_node_id (shared prefix detection)
    3. If multiple targets share the same upstream chain:
       - Emit one stage for the shared chain (tagged as ref)
       - Emit per-target stages that read from that ref
    4. If a target has no GPU chain: emit passthrough stage (pixels only)
    5. Topological sort: source stages first, then downstream

    WIT types:
      record gpu-stage {
        target-name: string,
        shaders: list<gpu-shader>,
        input-source: stage-input,
        width: u32, height: u32,
      }
      variant stage-input {
        pixels(pixel-buffer),
        prior-stage(string),
      }
      record multi-gpu-plan {
        stages: list<gpu-stage>,
      }
