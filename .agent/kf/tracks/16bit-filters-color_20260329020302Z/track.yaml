id: 16bit-filters-color_20260329020302Z
title: 16-Bit Spatial Filters, Color Operations, and Blend Modes
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: 'Extend spatial filters (blur, sharpen, convolve, median), color operations (hue rotate, saturate, sepia, colorize),
    alpha operations (premultiply, flatten, blend modes), and 3D color LUT to 16-bit pixel formats.

    '
  context: 'With 16-bit I/O (foundation track) and point ops/histogram (point-ops track)

    complete, the remaining processing operations need 16-bit support. Spatial

    filters and color operations are essential for complete 16-bit editing chains.


    Key insight: most filters already compute in f32 internally, so the main work

    is 16-bit I/O marshalling (u16 byte pairs to/from f32), not new algorithms.

    The 3D color LUT already stores f32 data — only the I/O wrapper changes.

    '
  codebase_analysis: "Filters (filters.rs):\n- blur: delegates to libblur. Need to check if libblur supports u16 input,\n\
    \  otherwise convert u16->f32->blur->f32->u16.\n- sharpen: USM = orig + amount*(orig - blur). f32 arithmetic. Just needs\
    \ I/O.\n- convolve: reflect-padded 2D convolution. f32 arithmetic. Just needs I/O.\n- median: local histogram-based. 256-bin\
    \ histogram becomes 65536-bin for u16.\n- sobel/canny: grayscale-only. Accept Gray16 input, produce Gray16 output.\n-\
    \ premultiply: (c * a + 127) / 255 for u8. For u16: (c * a + 32767) / 65535.\n- unpremultiply: (c * 255 + a/2) / a for\
    \ u8. For u16: (c * 65535 + a/2) / a.\n- flatten: f32 alpha blend. Just needs I/O.\n- blend modes: f32 formulas. Just\
    \ needs I/O normalization (u16/65535.0).\n- add_alpha/remove_alpha: byte manipulation, straightforward for 16-bit.\n\n\
    Color LUT (color_lut.rs):\n- ColorLut3D stores [f32; 3] per grid point. lookup() works in [0,1] range.\n- apply() reads\
    \ u8 pixels, normalizes to [0,1], looks up, denormalizes.\n- For u16: normalize as u16/65535.0, denormalize as val*65535.0+0.5.\n\
    - ColorOp (HueRotate, Saturate, Sepia, Colorize): all work in [0,1] f32.\n  Just needs I/O wrapper.\n"
  acceptance_criteria:
  - blur, sharpen, convolve, median work on Rgb16/Rgba16/Gray16 input
  - Sobel and Canny accept Gray16 input and produce Gray16 output
  - All 9 blend modes work on 16-bit inputs
  - premultiply/unpremultiply use (c*a+32767)/65535 for 16-bit
  - flatten/alpha_composite work on Rgba16 input
  - add_alpha/remove_alpha work for 16-bit formats
  - ColorLut3D.apply() works on Rgb16/Rgba16 input
  - ColorOp (hue_rotate, saturate, sepia, colorize) work on 16-bit
  - All operations auto-dispatch based on pixel format
  - All existing 8-bit tests continue to pass
  out_of_scope: 'New filter algorithms (bilateral, CLAHE, NLM) — separate feature tracks.

    SIMD optimization for 16-bit paths — future optimization track.

    16-bit grayscale conversion weights (use same BT.709/BT.601 as 8-bit).

    '
  technical_notes: 'Most filters compute in f32 internally. The 16-bit path is:

    1. Read u16 byte pairs from Vec<u8>

    2. Normalize to f32 (divide by 65535.0)

    3. Apply existing f32 algorithm (blur kernel, blend formula, etc.)

    4. Denormalize to u16 (multiply by 65535.0, round, clamp)

    5. Write u16 byte pairs back to Vec<u8>


    Exceptions requiring dedicated 16-bit logic:

    - median: histogram-based, needs [u32; 65536] local histogram (256KB)

    - premultiply/unpremultiply: integer arithmetic, different constants


    libblur support: check if libblur accepts u16 buffers. If not, convert

    u16->f32 before blur, f32->u16 after. The f32 path preserves full precision.


    Helper functions needed:

    - read_u16_pixels(bytes: &[u8]) -> impl Iterator<Item = u16>

    - write_u16_pixels(values: impl Iterator<Item = u16>) -> Vec<u8>

    - Or use bytemuck for zero-copy reinterpretation

    '
