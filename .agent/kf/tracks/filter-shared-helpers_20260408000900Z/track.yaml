spec:
  summary: 'Create filters/helpers.rs with deduplicated luminance, HSL conversion,

    and GPU param serialization helpers. Replace 30+ duplicated definitions

    across 9+ filter files.

    '
  context: 'Current duplication across filter files:

    - luminance/luma: 5 independent definitions (effect, enhancement, edge, composite, grading)

    - rgb_to_hsl/hsl_to_rgb: 3 copies (color, grading, scope/analysis)

    - gpu_params_wh/gpu_push_f32/gpu_push_u32: 9 files with identical copies


    grading.rs has a comment: "We duplicate these small helpers here to avoid

    making color module internals pub." This track solves that by creating a

    dedicated helpers module.

    '
  codebase_analysis: "Extraction targets:\n1. pub fn luminance(r, g, b) -> f32 (BT.709: 0.2126R + 0.7152G + 0.0722B)\n   Used\
    \ in: effect.rs, enhancement.rs, edge.rs, composite.rs, grading.rs\n2. pub fn rgb_to_hsl(r, g, b) -> (f32, f32, f32)\n\
    \   pub fn hsl_to_rgb(h, s, l) -> (f32, f32, f32)\n   Used in: color.rs, grading.rs, scope.rs, analysis.rs\n3. pub fn\
    \ gpu_params_wh(w, h) -> Vec<u8>\n   pub fn gpu_push_f32(buf, v)\n   pub fn gpu_push_u32(buf, v)\n   Used in: generator,\
    \ alpha, analysis, distortion, draw, effect, mask, morphology, tool\n"
  acceptance_criteria:
  - filters/helpers.rs created with all shared functions
  - All 30+ duplicate definitions replaced with imports from helpers
  - No functional change — output identical for all filters
  - All existing tests pass
  - WASM build succeeds
  out_of_scope: 'Splitting filter files into individual files (wave 1/2 tracks).

    Changing any filter behavior.

    '
  technical_notes: "New file: src/filters/helpers.rs\nAdded to mod.rs: pub mod helpers;\n\nEach filter file changes from:\n\
    \  fn luminance(r: f32, g: f32, b: f32) -> f32 { ... }\nto:\n  use super::helpers::luminance;\n\nThe hsl_to_rgb helper\
    \ also needs hue_to_rgb extracted (internal helper).\n"
