id: web-ui-react-migrate_20260401100641Z
title: Web UI — Migrate pipeline builder from vanilla TS to React components
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Port all UI from the 1357-line pipeline.ts into React components and hooks.

    Create App, Toolbar, Canvas, RightPanel, LayerPanel, EffectStack, ChainNode,

    ParamControl, StatusBar, ExportSection, CodeModal. Extract hooks for worker

    communication, layer state, and chain management. Add render smoke tests for

    every component. Delete old pipeline.ts when complete.

    '
  context: 'After the scaffold track sets up React + Vitest + Prettier, this track does

    the actual migration. The current pipeline.ts is a monolithic file with ~40

    DOM element IDs and ~50 event listeners, all wired up imperatively. The React

    migration will decompose this into focused components with React state management.


    The user notes that "most is data driven and small components/layout" — the

    pipeline operations, parameters, and categories are all driven by the param

    manifest JSON loaded at startup. Components are mostly presentational with

    state lifted to hooks.


    Test strategy: every component gets a render smoke test (mount and assert no

    crash). No deep behavioral tests for now — the primary gate is "renders without

    blowing up" plus lint/fmt/build passing.

    '
  codebase_analysis: 'Source to migrate: web-ui/src/pipeline.ts (1357 lines after PS-layout track)


    Logical sections to extract:

    1. SDK init + manifest loading (lines 1-210) -> App.tsx + context

    2. Toolbar dropdown menus (lines 302-373) -> Toolbar.tsx

    3. Worker communication (lines 375-585) -> useWorker.ts hook

    4. State management (lines 586-615) -> useLayers.ts + useChain.ts hooks

    5. Image loading + layer management (lines 616-755) -> useLayers.ts + LayerPanel.tsx

    6. Chain rendering + drag (lines 756-1140) -> EffectStack.tsx + ChainNode.tsx + ParamControl.tsx

    7. Preview/processing (lines 1141-1165) -> useWorker.ts

    8. Before/After comparison (lines 1166-1175) -> Canvas.tsx

    9. Export (lines 1177-1200) -> ExportSection.tsx

    10. Code generation (lines 1204-1357) -> CodeModal.tsx + utils/codeGeneration.ts

    11. Panel toggle + section collapse (lines 1340-1357) -> RightPanel.tsx


    Files that stay unchanged:

    - pipeline-worker.ts: already cleanly separated via postMessage protocol

    - types.ts: reused as-is (may add React-specific types)


    Key state to manage via React:

    - layers[] array (images + per-layer chains)

    - activeLayerId

    - editingNodeId

    - isProcessing + queuedRequest

    - imageInfo (dimensions)

    - showingOriginal (before/after)


    The worker integration pattern: a useWorker hook that wraps postMessage/onmessage

    and exposes processChain, exportImage, compositeLayers as async-like functions.

    The hook manages isProcessing, the single-slot queue, and the safety timeout.

    '
  acceptance_criteria:
  - All UI renders via React components (no imperative DOM manipulation in main thread)
  - App.tsx is the root component wrapping Toolbar, Canvas, RightPanel, StatusBar
  - Toolbar.tsx renders brand, badge, operation dropdown menus (Filters/Transform/Effects/Grading)
  - Canvas.tsx renders preview and original canvases with drop zone
  - RightPanel.tsx is collapsible and contains LayerPanel and EffectStack sections
  - LayerPanel.tsx renders layer cards with thumbnails, visibility, blend mode, delete
  - EffectStack.tsx renders chain nodes with drag-reorder via handles (not whole card)
  - ChainNode.tsx renders a single node with edit/remove and inline param controls
  - ParamControl.tsx dispatches to correct input type based on param hint
  - StatusBar.tsx shows dimensions, processing time, op count, errors
  - ExportSection.tsx has format select, quality slider, download button
  - CodeModal.tsx shows generated code with syntax highlighting
  - useWorker hook manages worker lifecycle, postMessage, safety timeout, queue
  - useLayers hook manages layer array, activeLayerId, add/remove/reorder
  - useChain hook manages chain for active layer, addNode/removeNode/moveNode
  - Every component has a .test.tsx that mounts it and asserts no crash
  - npm run check passes (build + lint + fmt + test)
  - pipeline.ts is deleted (all logic migrated)
  - pipeline-worker.ts is unchanged (still works via postMessage)
  - Visual appearance matches the PS-style layout from previous track
  out_of_scope: '- Before/After split view (separate track, will be implemented as React component)

    - Enhanced export menu (separate track, will be implemented as React component)

    - Deep behavioral/integration tests (render smoke tests only for now)

    - CSS modules or styled-components migration (keep inline styles)

    - State management library (React Context + hooks is sufficient)

    - Drag-and-drop library (keep native HTML5 drag API with handle pattern)

    '
  technical_notes: "Component tree:\n  App\n  +-- Toolbar (menus for adding operations)\n  +-- main-layout (flex container)\n\
    \  |   +-- Canvas (preview, original, drop zone)\n  |   +-- RightPanel (collapsible)\n  |       +-- LayerPanel (layer\
    \ cards, add button)\n  |       +-- EffectStack (chain nodes for active layer)\n  |           +-- ChainNode (per node:\
    \ header + params)\n  |               +-- ParamControl (dispatches by type)\n  |       +-- ExportSection (format, quality,\
    \ download)\n  +-- StatusBar (dims, timing, errors)\n  +-- CodeModal (overlay)\n\nState architecture:\n- AppContext provides:\
    \ operations[], layers, activeLayerId, isProcessing, imageInfo\n- useLayers: manages layers state, provides addLayer/removeLayer/setActiveLayer\n\
    - useChain: derives active chain from layers + activeLayerId, provides add/remove/move/update\n- useWorker: wraps Worker\
    \ creation, postMessage, onmessage, safety timeout, queue\n\nWorker hook pattern:\n  const { processChain, exportImage,\
    \ isProcessing } = useWorker();\n  // processChain sends to worker and updates isProcessing state\n  // onmessage callback\
    \ updates canvases via refs\n\nCanvas interaction: use refs for canvas elements (preview, original).\nWorker results write\
    \ directly to canvas via ref.current.getContext('2d').\n\nDrag-and-drop: ChainNode renders a .drag-handle span with draggable=true.\n\
    EffectStack handles dragover/drop on the container. guardDrag (pointerdown\nstopPropagation) stays on all interactive\
    \ controls inside ChainNode.\n\nParamControl is a single component that switches on param.type:\ncolor, toggle, text,\
    \ spinner, log_slider, signed_slider, opacity,\ntemperature, number (default slider), enum. Each renders the appropriate\n\
    input with guardDrag already applied.\n\nMigration order:\n1. Create hooks first (useWorker, useLayers, useChain) — these\
    \ hold the logic\n2. Create leaf components (ParamControl, StatusBar, CodeModal, ExportSection)\n3. Create container components\
    \ (ChainNode, EffectStack, LayerPanel, Canvas)\n4. Create top-level (Toolbar, RightPanel, App)\n5. Wire up index.html\
    \ to mount React, remove old script tag\n6. Delete pipeline.ts\n7. Add render smoke tests for all components\n8. Run npm\
    \ run check\n"
