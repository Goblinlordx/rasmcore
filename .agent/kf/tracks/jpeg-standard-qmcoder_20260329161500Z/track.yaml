id: jpeg-standard-qmcoder_20260329161500Z
title: JPEG Standard QM-Coder — ITU-T T.81 Compatible Arithmetic Encode/Decode
type: bug
status: pending
created: '2026-03-29'
updated: '2026-03-28'
spec:
  summary: 'Replace the custom bit-level arithmetic coder with a standard QM-coder

    implementation (ITU-T T.81 Annex D/F) so our SOF9/SOF10 JPEGs are

    interoperable with libjpeg-turbo, mozjpeg, and ImageMagick.

    '
  context: "The current ArithmeticEncoder/ArithmeticDecoder use a textbook interval\ncoder with underflow counters. While\
    \ it roundtrips correctly, the byte\nformat is proprietary — not the standard QM-coder byte stream from\nITU-T T.81 Annex\
    \ D. This means:\n- External tools CANNOT decode our SOF9 files\n- We CANNOT decode SOF9 files from cjpeg -arithmetic\
    \ or ImageMagick\n- Our SOF9 marker is effectively a lie — it claims arithmetic coding\n  but uses an incompatible format\n\
    \nThis is a correctness bug, not a feature request. Shipping SOF9 markers\nwith non-standard entropy data violates the\
    \ JPEG specification.\n"
  codebase_analysis: "Current implementation (entropy.rs):\n- ArithmeticEncoder: 18-bit interval coder with emit_bit_plus_pending\n\
    - ArithmeticDecoder: matching bit-level reader with read_bit\n- ARITH_PREC=18, ARITH_WHOLE=0x40000, ARITH_HALF=0x20000\n\
    - Uses QE_TABLE for probability estimation (47-entry table)\n- arithmetic_encode_block / arithmetic_decode_block: DC DPCM\
    \ + AC RLE\n  via binary decision trees (custom context model, not ITU-T F.1)\n\nWhat standard QM-coder looks like (studied\
    \ from zenjpeg which ports\nlibjpeg-turbo jdarith.c/jcarith.c, both IJG/BSD licensed algorithm):\n- Decoder init: c=0,\
    \ a=0, ct=-16 (reads 2 bytes during first renorm)\n- Core decode: a-=qe, compare c >= ((a-qe) << ct), shift-based renorm\n\
    - ARITAB: 114-entry packed table (Qe + next_MPS + next_LPS + switch)\n- DC context: 64 stats bins per table (ITU-T T.81\
    \ Figure F.19-F.24)\n- AC context: 256 stats bins per table (ITU-T T.81 Figure F.20)\n- Byte I/O: get_byte with 0xFF stuffing\
    \ and marker detection\n- Encoder: mirror of decoder with carry-propagating byte output\n\nFiles to modify:\n- crates/rasmcore-jpeg/src/entropy.rs\
    \ (replace ArithmeticEncoder/Decoder)\n- crates/rasmcore-jpeg/src/decode_arith.rs (update block decode calls)\n- crates/rasmcore-jpeg/src/lib.rs\
    \ (update encode_mcus_arithmetic)\n"
  acceptance_criteria:
  - Decode SOF9 JPEG files produced by cjpeg -arithmetic (libjpeg-turbo)
  - Decode SOF9 JPEG files produced by ImageMagick
  - Our SOF9 encode produces files decodable by djpeg and ImageMagick
  - Three-way parity test passes for arithmetic mode
  - All existing JPEG tests still pass
  - Roundtrip PSNR > 25dB for arithmetic mode
  out_of_scope: 'Progressive arithmetic (SOF10) decode of external files.

    SIMD optimization of the QM-coder.

    Arithmetic coding optimization (trellis, etc).

    '
  technical_notes: "Implementation approach:\n1. Port the ITU-T T.81 Annex D QM-coder as a new QmEncoder/QmDecoder\n   (algorithm\
    \ from the public standard, not from any copyleft codebase)\n2. Implement ITU-T T.81 Annex F DC/AC context modeling:\n\
    \   - DC: 64 stats bins, context categories from DAC conditioning values\n   - AC: 256 stats bins, EOB/zero-run/magnitude\
    \ per Figure F.20\n3. Replace ArithmeticEncoder/ArithmeticDecoder in entropy.rs\n4. Update decode_arith.rs to use the\
    \ standard DC/AC decode\n5. Update encode path to use the standard QM-coder encoder\n6. Validate against cjpeg -arithmetic\
    \ reference fixtures\n\nKey decoder algorithm (ITU-T T.81 D.2):\n- Init: c=0, a=0, ct=-16\n- Renorm loop: while a < 0x8000\
    \ { ct--; if ct<0 { c=(c<<8)|byte; ct+=8 }; a<<=1 }\n- Decode: temp=a-qe; a=temp; if c >= temp<<ct { LPS } else { MPS\
    \ }\n- Byte input: handle 0xFF stuffing (0xFF00 -> 0xFF), detect markers\n\nKey encoder algorithm (ITU-T T.81 D.1):\n\
    - Init: a=0x10000, c=0, ct=11, buffer=0, sc=0\n- Encode: a-=qe; if MPS { maybe c+=a,a=qe } else { c+=a or a=qe }; renorm\n\
    - Renorm: while a<0x8000 { a<<=1; c<<=1; ct--; if ct==0 byte_out; ct=8 }\n- byte_out: carry-propagating output with sc\
    \ (stacked 0xFF) counter\n- Finish: round c to interval boundary, shift by ct, emit final bytes\n"
