    done: true
  - text: Add SourceNodePixels that wraps raw bytes + format — implements Node with gpu_shader() dispatching to correct conversion
      shader per format, compute() using CPU fallback
    done: true
  - text: Wire SourceResource::from_pixels into the WIT binding layer in crates/rasmcore-v2-wasm/src/lib.rs
    done: true
