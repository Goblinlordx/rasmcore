    done: true
  - text: Add from-pixels static constructor to source resource — accepts list<u8>, u32 width, u32 height, host-pixel-format
    done: true
  - text: Add read-pixels convenience method to image-pipeline-v2 — accepts list<u8>, u32 width, u32 height, host-pixel-format,
      returns node-id
    done: true
  - text: Regenerate WIT bindings via cargo-component and verify compilation
    done: true
