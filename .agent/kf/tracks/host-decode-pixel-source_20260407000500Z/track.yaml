  tasks:
  - text: Create src/shaders/rgba8_srgb_to_f32.wgsl — reads packed u32 storage buffer, unpacks 4x u8, normalizes, applies
      sRGB EOTF, writes vec4<f32>
    done: true
  - text: Create src/shaders/rgba16_to_f32.wgsl — reads packed u32 storage buffer (2x u16 per u32), unpacks, normalizes to
      0-1, writes vec4<f32>
    done: true
  - text: Add pixel_source module in gpu_shaders/ that returns the correct GpuShader based on host-pixel-format, binding raw
      data as extra_buffer[0]
    done: true
