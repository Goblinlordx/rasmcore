id: host-decode-pixel-source_20260407000500Z
title: Host-delegated image decoding via from-pixels with GPU format conversion
type: feature
status: pending
created: '2026-04-07'
updated: '2026-04-06'
spec:
  summary: 'Add WIT interface for host to provide pre-decoded pixels in any common format

    (u8 sRGB, u16 linear, f32) via a host-pixel-format variant. GPU compute shaders

    handle format conversion to f32 linear as the first pipeline node. Zero-copy path:

    raw bytes upload to GPU, convert on GPU, pipeline continues without CPU round-trip.

    '
  context: 'The pipeline currently requires all image data as f32 RGBA. Source decoding happens

    inside WASM via compiled Rust codecs. Host environments (browser, native) have fast

    platform-native decoders (createImageBitmap, ImageIO, WIC) that produce decoded pixels

    in various formats — most commonly u8 RGBA sRGB, but also u16 for 16-bit sources and

    f32 for HDR content.


    There is no way for the host to provide pre-decoded pixels. It must pass encoded bytes

    and let WASM decode. This forces double-decode when the host already has pixels, wastes

    binary size shipping codecs the host handles natively, and misses hardware-accelerated

    decode paths.


    The goal is a clean read-side-only interface where the host provides raw pixel bytes in

    any supported format, and the guest uploads them directly to GPU for conversion to f32

    linear — zero CPU-side f32 allocation.

    '
  codebase_analysis: 'Source resource (crates/rasmcore-v2-wasm/src/lib.rs:90-127): SourceResource stores

    Vec<f32> pixels + NodeInfo. Constructor decodes from bytes via registry. Needs a

    from_pixels variant that stores raw bytes + format and produces a GPU plan for

    conversion instead of CPU decode.


    GPU plan path (crates/rasmcore-pipeline-v2/src/graph.rs:356-394): gpu_plan() collects

    GPU-capable nodes into a shader chain. Format conversion shaders would be prepended as

    the first shader, with raw pixel data passed as extra_buffer (packed for u8/u16).


    Cache hashing (crates/rasmcore-pipeline-v2/src/hash.rs:26-37): source_hash() hashes

    first/last 4KB of encoded bytes. For host-decoded pixels, need a hash function that

    includes format + dimensions + pixel data.


    sRGB transfer functions (crates/rasmcore-pipeline-v2/src/color_math.rs:11-27): CPU-side

    srgb_to_linear() exists. No GPU equivalent. Need WGSL compute shaders for each format.


    WIT interface (wit/v2/pipeline.wit:217-222): source resource has constructor(data,

    format-hint). Need from-pixels static constructor with format variant.

    '
  acceptance_criteria:
  - WIT host-pixel-format variant defines rgba8 (u8 sRGB), rgba16 (u16 linear), and rgba-f32 (f32 linear)
  - source::from-pixels WIT static constructor accepts list<u8> + width + height + host-pixel-format
  - pipeline read-pixels WIT method creates source node from raw pixel bytes without decoding
  - GPU compute shader for rgba8 converts u8 sRGB to f32 linear matching CPU srgb_to_linear() within 1 ULP
  - GPU compute shader for rgba16 converts u16 linear to f32 linear via simple normalization
  - rgba-f32 format is passthrough — no conversion shader needed, direct f32 buffer upload
  - Format conversion shader is first in GPU plan chain — data stays on GPU through entire pipeline
  - CPU fallback path works for all three formats when GPU unavailable
  - Layer cache works with pixel sources — cache hit skips upload and conversion
  - Native SDK exposes Pipeline::open_pixels(bytes, width, height, format) convenience method
  - cargo build and cargo-component build succeed for both native and wasm32-wasip2 targets
  out_of_scope: 'Host-side encoding (write path) — read-only feature. Host capability discovery or

    format negotiation — host simply calls from-pixels with whatever format it has.

    Browser/native host implementation — this track is guest-side only (WIT + Rust + WGSL).

    Additional formats (f16, YUV, planar) — can be added as new variant cases later.

    '
  technical_notes: "WIT design: A host-pixel-format variant (rgba8, rgba16, rgba-f32) tells the guest how\nto interpret the\
    \ raw byte buffer. All data arrives as list<u8> regardless of format —\nthe variant determines interpretation.\n\nGPU\
    \ shaders per format:\n- rgba8: extra_buffer as array<u32> (4 packed u8s per element). Shader unpacks,\n  normalizes to\
    \ 0-1, applies IEC 61966-2-1 sRGB EOTF, writes vec4<f32>.\n- rgba16: extra_buffer as array<u32> (2 packed u16s per element,\
    \ 2 elements per pixel).\n  Shader unpacks, normalizes to 0-65535, writes vec4<f32>. Already linear.\n- rgba-f32: no conversion\
    \ shader. Data is already f32 — upload directly as input buffer.\n\nCPU fallback: existing srgb_rgba8_to_f32_linear()\
    \ for u8, simple division for u16,\npassthrough for f32.\n\nCache key: blake3 hash with domain separator per format (source-rgba8,\
    \ source-rgba16,\nsource-f32) + dimensions + pixel data prefix/suffix (same 4KB strategy as source_hash).\n\nSourceNodePixels\
    \ implements Node trait — gpu_shader() returns the appropriate conversion\nshader based on stored format, compute() uses\
    \ the CPU fallback path.\n"
