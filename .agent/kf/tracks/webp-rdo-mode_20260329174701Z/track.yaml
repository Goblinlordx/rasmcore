id: webp-rdo-mode_20260329174701Z
title: VP8 RDO Mode Selection — Lambda-Weighted Distortion+Rate for Intra Modes
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-28'
spec:
  summary: 'Replace SAD/SATD-based mode selection with full RD cost evaluation. For each

    candidate prediction mode, compute distortion + lambda * estimated_bitrate

    and select the mode with minimum RD cost. Builds on the RDO coefficient

    pruning track for lambda and bitrate estimation infrastructure.

    '
  context: 'Current mode selection uses SAD (16x16) and SATD (4x4) — pure distortion

    metrics with no consideration of encoding cost. This means the encoder picks

    modes that minimize prediction error but may produce expensive-to-encode

    residuals. cwebp evaluates the full encode cost for each candidate mode.


    The B_PRED vs I16x16 decision currently uses a hard-coded 128 SAD bias

    (bitstream.rs line 634). RDO replaces this with actual lambda-weighted

    mode cost + header cost + coefficient cost.

    '
  codebase_analysis: "predict.rs: select_best_16x16() evaluates 4 modes via SAD. select_best_4x4()\nevaluates 10 modes via\
    \ SATD. Both return the min-distortion mode.\n\nbitstream.rs line 634: use_bpred = bpred_sad + 128 < i16_sad — static\
    \ bias.\n\nThe RDO coefficient track provides lambda_from_qp() and estimate_token_bits()\nwhich this track needs. The\
    \ mode cost includes:\n  - Header bits: mode signaling cost (fixed per mode, from RFC 6386 Table 11.1)\n  - Coefficient\
    \ bits: estimated bitrate of encoded residual\n  - Distortion: SSD between original and reconstructed pixels\n"
  acceptance_criteria:
  - RD cost function: cost = ssd_distortion + lambda * (header_bits + coeff_bits)
  - 16x16 mode selection uses RD cost instead of SAD
  - 4x4 mode selection uses RD cost instead of SATD
  - B_PRED vs I16x16 decision uses full RD cost (no static bias)
  - Chroma mode selection uses RD cost instead of SAD
  - Quality ratio vs cwebp improves to >= 0.8 for gradient at Q75
  - Checkerboard quality improves further beyond RDO coefficient track
  - File size competitive with cwebp (within 1.5x for gradients)
  - Encode time overhead acceptable (< 5x total with both RDO tracks)
  out_of_scope: 'Inter-frame prediction (P-frames). Multi-reference RDO. Sub-pixel motion estimation.

    Adaptive lambda per MB (use frame-level lambda).

    '
  technical_notes: "Mode header cost (fixed bits per mode from RFC 6386):\n  I16x16 modes: DC=~1.5 bits, V=~3.5, H=~3.5, TM=~3.5\
    \ (from kf_ymode_tree probs)\n  B_PRED sub-block modes: 3-7 bits each (10 modes with context-dependent probs)\n  Chroma\
    \ modes: DC=~1.5, V=~3.5, H=~3.5, TM=~3.5\n\nRD mode evaluation for 16x16 (replacing select_best_16x16):\n  for each mode\
    \ in [DC, V, H, TM]:\n    predict pixels\n    compute residual\n    quantize + RDO prune coefficients\n    ssd = sum((original\
    \ - reconstructed)^2)\n    bits = header_bits[mode] + estimate_all_block_bits(quantized)\n    cost = ssd + lambda * bits\n\
    \  select min cost mode\n\nRD B_PRED evaluation:\n  i16_cost = ssd_i16 + lambda * (header_bits_i16 + coeff_bits_i16)\n\
    \  bpred_cost = sum(ssd_4x4[i] + lambda * (mode_bits_4x4[i] + coeff_bits_4x4[i]))\n  use_bpred = bpred_cost < i16_cost\n\
    \nPerformance note: RDO mode selection is expensive (encode-decode loop per mode).\nOptimization: skip modes where SAD\
    \ is > 2x best SAD (early termination).\n"
