    done: true
  - text: Create THIRD_PARTY_LICENSES summary table
    done: true
  - text: Create NOTICE file aggregating Apache-2.0 NOTICE contents
    done: true
- phase: CI Guard
  tasks:
  - text: Add cargo-deny configuration (deny.toml) with allowed/denied license lists
    done: true
  - text: Add license check to validate.sh or CI pipeline
    done: true
  - text: Verify check catches AGPL (should flag zenjpeg until replaced)
    done: true
