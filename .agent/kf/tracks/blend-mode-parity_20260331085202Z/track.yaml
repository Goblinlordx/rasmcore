      - text: "Add rgb_to_hsl / hsl_to_rgb helpers if not already available"
        done: false
      - text: "Add Hue mode — take hue from top layer, sat+lum from bottom"
        done: false
      - text: "Add Saturation mode — take saturation from top layer"
        done: false
      - text: "Add Color mode — take hue+saturation from top layer, luminosity from bottom"
        done: false
      - text: "Add Luminosity mode — take luminosity from top layer, hue+sat from bottom"
        done: false
  - phase: "Verification"
    tasks:
      - text: "Reference tests for all 8 new modes against PS/GIMP output"
        done: false
