id: reference-expand-all_20260407073001Z
title: "Expand rasmcore-reference to cover all validatable filters"
type: feature
status: pending
created: 2026-04-07
updated: 2026-04-07
spec:
  summary: |
    Implement reference functions for all remaining filter categories
    (spatial, enhancement, edge, morphology, grading, effect, distortion,
    composite, alpha, mask) based on the authority decisions from the
    catalog track. Expand test inputs and integration tests.
  context: |
    After the authority catalog documents the reference tool for each filter,
    this track implements the actual Rust reference functions. Currently
    rasmcore-reference has 11 point ops + 5 color ops. This track adds
    spatial, enhancement, edge, morphology, grading, effect, distortion,
    composite, alpha, and mask references.

    Each reference function is dead-simple textbook code — the formula
    from the authority document, implemented with zero optimization.
    Color-space aware (linear f32).
  acceptance_criteria:
    - Reference functions for all spatial ops (gaussian, box, median, bilateral, sharpen, etc.)
    - Reference functions for all enhancement ops (equalize, normalize, clahe, etc.)
    - Reference functions for all edge ops (sobel, canny, laplacian, otsu, etc.)
    - Reference functions for all morphology ops (dilate, erode, open, close, etc.)
    - Reference functions for grading ops (curves, cdl, lgg, tone mapping)
    - Reference functions for effect ops (emboss, pixelate, noise, etc.)
    - Reference functions for composite ops (blend modes, premultiply)
    - Reference functions for remaining simple ops (alpha, mask, distortion)
    - Integration tests comparing all new references against pipeline filters
    - Categories documented as no-reference-needed are skipped with comment
  out_of_scope: |
    Cross-validation against external tools (separate track).
    Generator, scope, evaluate, draw, analysis, tool filter references
    (pure math or too application-specific for external reference).
  technical_notes: |
    New source files in rasmcore-reference:
      src/spatial_ops.rs    — convolution, blur, median, bilateral
      src/enhancement_ops.rs — histogram ops, normalization, CLAHE
      src/edge_ops.rs       — Sobel, Canny, Laplacian, thresholding
      src/morphology_ops.rs — structuring element operations
      src/grading_ops.rs    — curves, CDL, LGG, tone mapping
      src/effect_ops.rs     — emboss kernel, pixelate, noise
      src/composite_ops.rs  — Porter-Duff, blend modes
      src/misc_ops.rs       — alpha ops, mask ops, distortion

    For convolution-based ops (blur, sharpen, edge detect), the reference
    must implement the naive nested-loop convolution with explicit kernel
    weights. No FFT, no separable optimization.
