id: gpu-promote-node_20260403083503Z
title: GPU-side promote — upload u8/u16 and promote to f32 on GPU
type: feature
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: 'Move the Rgba8→Rgba32f promotion from CPU to GPU. Upload the smaller

    u8 data (4 bytes/pixel) and promote to f32 (16 bytes/pixel) on GPU,

    reducing transfer cost by 4x for the initial upload.

    '
  context: 'Currently the PromoteToF32 node runs on CPU — it converts decoded u8

    pixels to f32 before any GPU dispatch. This means the CPU→GPU upload

    transfers 16 bytes/pixel instead of 4 bytes/pixel.


    At 4K (3840x2160): uploading u8 = 33MB, uploading f32 = 132MB.

    The promote shader is trivial (v / 255.0 per channel) but the transfer

    savings are significant — especially on bandwidth-constrained devices.


    The benchmark shows GPU transfer is the bottleneck (all per-pixel ops

    take the same ~20ms at 4K regardless of compute complexity). Reducing

    transfer by 4x directly improves latency.

    '
  acceptance_criteria:
  - PromoteToF32 node has a GPU compute shader
  - Upload path sends u8 data and promotes on GPU
  - Transfer size reduced by 4x for the initial source upload
  - Output identical to CPU promote (within f32 precision)
  - Falls back to CPU promote when GPU unavailable
  out_of_scope: 'GPU-side quantize at write (demote f32→u8 on GPU before readback).

    Multi-format promote (u16, f16 — start with u8 only).

    '
  technical_notes: "The shader is trivial:\n@compute @workgroup_size(16, 16, 1)\nfn main(@builtin(global_invocation_id) gid:\
    \ vec3<u32>) {\n    let idx = gid.x + gid.y * params.width;\n    let packed = input_u8[idx];  // u32 RGBA8\n    let r\
    \ = f32((packed >> 0u) & 0xFFu) / 255.0;\n    let g = f32((packed >> 8u) & 0xFFu) / 255.0;\n    let b = f32((packed >>\
    \ 16u) & 0xFFu) / 255.0;\n    let a = f32((packed >> 24u) & 0xFFu) / 255.0;\n    output_f32[idx] = vec4<f32>(r, g, b,\
    \ a);\n}\n\nThe challenge is the mixed buffer formats — input is U32Packed,\noutput is F32Vec4. The executor needs to\
    \ handle asymmetric buffer\nformats for this node (input 4bpp, output 16bpp).\n"
