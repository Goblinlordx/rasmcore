id: analysis-render-pass_20260406103200Z
title: 'Research: Multi-pass analysis-then-render pipeline execution'
type: research
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: 'Validate the existing StagedPipeline design against professional tool

    models (DaVinci Resolve, Nuke, After Effects). Identify gaps between

    what staged.rs provides and what full multi-pass analysis-then-render

    needs. Produce implementation plan with concrete tracks.

    '
  context: "Professional image/video tools use multi-pass execution:\n1. Analysis pass — compute metadata (histogram, face\
    \ ROI, energy map,\n   motion vectors, scene statistics)\n2. Bind pass — apply analysis results as parameters to downstream\
    \ nodes\n3. Render pass — execute pixel pipeline with all params resolved\n\nThis is recursive: input -> smart_crop ->\
    \ emboss -> smart_crop is valid.\nEach analysis node creates a tile barrier (full image materializes),\nanalysis runs,\
    \ then tiling resumes downstream. Multiple analysis nodes\nin a chain create multiple barriers.\n\nDaVinci Resolve additionally\
    \ has:\n- ROI negotiation pass (backwards) before render (forwards)\n- Pre-computed analysis (face tracking, scene detection)\
    \ cached across frames\n- Tile-based render with analysis-aware tile scheduling\n\nNuke adds:\n- Hash pass to detect which\
    \ nodes changed\n- ROI pass to negotiate buffer sizes\n- Render pass with tile-based execution\n\nThe rasmcore V2 pipeline\
    \ already has most of the infrastructure:\n- StagedPipeline with AnalysisNode trait, ParamBinding, type validation\n-\
    \ InputRectEstimate::FullImage for tile barriers\n- GPU multi-pass reduction (histogram, connected components)\n- Demand-driven\
    \ tile execution with spatial/layer caching\n\nWhat is missing: StagedPipeline.execute() implementation, concrete\nAnalysisNode\
    \ impls, recursive analysis chain support, and integration\nof analysis with the graph execution model.\n"
  codebase_analysis: 'staged.rs (existing):

    - AnalysisNode trait: result_type() + analyze(input, w, h)

    - AnalysisResult enum: Rect, Scalar, ScalarVec, Points, Matrix

    - ParamBinding: source_node -> target_node.target_param with transform

    - StagedPipeline: wraps Graph + bindings, validate/analyze/bind/execute phases

    - Type checking: AnalysisResultType compatibility with ParamType

    - Constraint validation: RectWithinUpstream, Range, MaxContext

    - INCOMPLETE: add_analysis_node() is placeholder, execute() not implemented


    graph.rs (existing):

    - request_region handles FullImage by requesting full upstream rect

    - Spatial cache stores materialized full images for downstream tile reuse

    - GPU dispatch via collect_gpu_chain + executor.execute

    - No explicit analysis phase — analysis is embedded in filter compute()


    filters/analysis.rs (existing):

    - SeamCarve, SmartCrop — inline analysis within compute()

    - Comment documents DaVinci/Nuke two-phase model as future architecture

    - Content-aware energy computation done per-pixel in render pass


    gpu_shaders/reduction.rs + analysis.rs:

    - Histogram256 3-pass reduction (proven, working)

    - Connected components with convergence check

    - Multi-pass shader chains with persistent ReductionBuffers

    '
  acceptance_criteria:
  - Design document covering multi-pass execution model
  - Gap analysis between staged.rs and full implementation
  - Professional tool comparison (Resolve, Nuke, AE, PS)
  - Recursive analysis chain design (smart_crop -> emboss -> smart_crop)
  - Tile barrier interaction model documented
  - GPU analysis dispatch design (histogram, energy map on GPU)
  - Concrete implementation plan with track dependencies
  - Assessment of what can be done incrementally vs what requires arch changes
  out_of_scope: 'Implementation code. This track produces a design document only.

    Concrete AnalysisNode implementations (separate tracks from findings).

    '
  technical_notes: "Key design questions to investigate:\n\n1. Recursive analysis chains:\n   - input -> analyze(histogram)\
    \ -> auto_level -> analyze(crop) -> crop\n   - Each analyze node is a tile barrier\n   - Can the same analysis node appear\
    \ multiple times in a chain?\n   - How does caching interact? (same analysis on same input = cache hit)\n\n2. Analysis\
    \ result lifecycle:\n   - When are analysis results invalidated? (upstream param change)\n   - Are they cached in the\
    \ layer cache? (content-hash keyed)\n   - Can analysis results be shared across pipelines? (e.g., face ROI)\n\n3. GPU\
    \ analysis dispatch:\n   - Histogram as AnalysisNode (not just multi-pass filter)\n   - Energy map for seam carving as\
    \ GPU compute\n   - Face detection as CPU analysis (no GPU path)\n   - How does GPU analysis interact with GPU render\
    \ chain?\n\n4. Tile barrier scheduling:\n   - Multiple barriers in a chain: what order do they execute?\n   - Memory:\
    \ full image at each barrier — peak memory = N barriers * image size\n   - Can we pipeline: analyze barrier 1 while rendering\
    \ post-barrier-1?\n\n5. Professional tool passes we should support:\n   - Analysis pass (histogram, face, energy) — YES,\
    \ via AnalysisNode\n   - ROI negotiation pass — PARTIALLY, via InputRectEstimate\n   - Hash/change detection pass — PARTIALLY,\
    \ via content_hash\n   - Convergence pass — YES, via convergence_check on ReductionBuffer\n   - Multi-resolution pass\
    \ — NOT YET, needs pyramid infrastructure\n\n6. Incremental adoption:\n   - Can existing filters (Otsu, auto_level, equalize)\
    \ migrate to\n     AnalysisNode without breaking the current API?\n   - Can StagedPipeline.execute() call Graph.request_full()\
    \ internally?\n   - Can analysis nodes coexist with regular nodes in the same graph?\n\nOutput: .agent/kf/_reports/analysis-render-pass-design.md\n"
