id: codec-trivial-formats_20260328061200Z
title: Trivial Codec Formats — TGA, HDR, PNM, EXR, DDS via image crate
type: feature
status: pending
created: 2026-03-28
updated: '2026-03-28'
spec:
  summary: 'Enable 5 image crate feature flags (tga, hdr, pnm, exr, dds) and wire

    decode+encode dispatch for all 5. DDS encode requires a minimal custom

    writer (uncompressed RGBA DDS) since the image crate has no DDS encoder.

    '
  context: 'The image crate already supports these formats behind feature flags.

    rasmcore currently enables png, jpeg, gif, webp, bmp, tiff, avif, ico, qoi.

    Adding tga, hdr, pnm, exr, dds requires only enabling the feature and

    adding format strings to the decoder/encoder dispatch tables.


    These formats use the generic encode() path — no per-format WIT config

    records needed. They go through DynamicImage and the image crate''s built-in

    encoders.

    '
  codebase_analysis: "- Cargo.toml: add feature flags to image dependency\n- domain/decoder/mod.rs: add format strings to\
    \ SUPPORTED_FORMATS and detect_format()\n- domain/encoder/mod.rs: add format strings to SUPPORTED_FORMATS and encode()\
    \ match\n- No new files needed — these formats use the generic encode/decode path\n- image crate codecs confirmed: TGA\
    \ (encode+decode), HDR (encode+decode),\n  PNM (encode+decode), EXR (encode+decode via openexr), DDS (decode only)\n"
  acceptance_criteria:
  - TGA decode and encode works via generic encode path
  - HDR (Radiance RGBE) decode and encode works
  - PNM (PPM/PGM/PBM) decode and encode works
  - EXR (OpenEXR) decode and encode works
  - DDS decode and encode works (custom uncompressed RGBA DDS writer)
  - All 5 formats detected by detect_format()
  - supported_formats() lists all new formats
  - Roundtrip tests for all 5 formats
  - cargo test passes, cargo component build succeeds
  out_of_scope: '- Per-format WIT config records (use generic encode path)

    - Per-format pipeline write sinks (use generic write path)

    - DDS BC1-7 block compression encode (only uncompressed RGBA)

    - Animation support for any of these formats

    '
  technical_notes: "Feature flags to enable in Cargo.toml:\n  image = { ..., features = [..., \"tga\", \"hdr\", \"pnm\", \"\
    exr\", \"dds\"] }\n\nDecoder changes (domain/decoder/mod.rs):\n  - Add \"tga\", \"hdr\", \"pnm\", \"exr\", \"dds\" to\
    \ SUPPORTED_FORMATS\n  - detect_format() already delegates to image crate — auto-detection works\n\nEncoder changes (domain/encoder/mod.rs):\n\
    \  - Add \"tga\", \"hdr\", \"pnm\", \"exr\", \"dds\" to SUPPORTED_FORMATS\n  - Add cases in encode() match for each format\
    \ using image crate encoders\n  - TGA: image::codecs::tga::TgaEncoder\n  - HDR: image::codecs::hdr::HdrEncoder (requires\
    \ Rgb<f32>, may need conversion)\n  - PNM: image::codecs::pnm::PnmEncoder (PPM subformat for RGB8)\n  - EXR: image::codecs::openexr::OpenExrEncoder\n\
    \nHDR encoding note: The HDR encoder works with Rgb<f32> float data.\nFor u8 input, convert via sample / 255.0. This is\
    \ lossy for LDR content\nbut correct for the format.\n\nDDS encoding note: The image crate has no DDS encoder. Write a\
    \ minimal\nDDS writer that outputs uncompressed RGBA (DXT10 header + raw pixels).\nThe DDS format is simple: 128-byte\
    \ header + pixel data. BC1-7 block\ncompression is out of scope — just uncompressed RGBA for now.\n"
