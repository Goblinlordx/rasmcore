id: pipeline-cache-fusion-consistency_20260401001000Z
title: Fix layer cache + fusion interaction — hash consistency and cache invalidation
type: bug
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Layer cache and fusion need end-to-end validation. The hash chain is actually

    correct (upstream hashing encodes the full computation lineage), but we need to

    verify that: (1) fused node outputs are stored in layer cache during finalize,

    (2) layer cache hits are served correctly on subsequent pipeline runs,

    (3) cache invalidation works when nodes are added/removed/changed.

    '
  context: 'The pipeline has two optimization layers that interact badly:

    1. Layer cache: persists pixel output across pipeline runs, keyed by content hash

    2. LUT fusion: replaces chains of point-op nodes with a single FusedLutNode


    When fusion runs, the FusedLutNode inherits the hash of the LAST node in the

    chain. But the fused output differs from the original single-node output. On the

    next pipeline run, if the layer cache has the old hash, it serves unfused pixels.

    '
  codebase_analysis: "BUGS IDENTIFIED:\n\n1. fuse_point_ops() (graph.rs ~line 348): replaces self.nodes[i] with FusedLutNode\n\
    \   but does NOT update self.node_hashes[i]. The fused node has a different computation\n   than the original, but the\
    \ same hash.\n\n2. cache_hit_nodes not invalidated: add_node_with_hash() populates cache_hit_nodes at\n   construction\
    \ time. Fusion runs later but doesn't clear entries for replaced nodes.\n   request_region() returns stale cached pixels\
    \ for fused nodes.\n\n3. Hash semantics violation: fused output = compose(brightness, contrast, sepia) but\n   hash =\
    \ hash(sepia_only). The hash doesn't represent the full computation lineage.\n\n4. Same bugs exist in fuse_color_ops()\
    \ (~line 459).\n\nFIX APPROACH:\n\nAfter fusion, recompute the hash for each fused node to reflect the actual\ncomputation.\
    \ The fused node's hash should be:\n  hash = compute_hash(upstream_hash, \"fused_lut\", &lut_bytes)\nwhere lut_bytes is\
    \ the composed LUT table (256 bytes for 1D, or CLUT data).\n\nAlso clear cache_hit_nodes and cache_hit_pixels for any\
    \ node that was replaced\nby fusion, since the cached data is for the unfused computation.\n\nALSO: nodes consumed INTO\
    \ a fused chain (the intermediate ones marked in\nfused_into[]) should have their hashes zeroed out so finalize_layer_cache\n\
    doesn't try to store their output (they have no output — they were absorbed).\n\nKEY FILES:\n- crates/rasmcore-image/src/domain/pipeline/graph.rs\
    \ (fuse_point_ops, fuse_color_ops,\n  request_region, finalize_layer_cache)\n- crates/rasmcore-pipeline/src/lib.rs (compute_hash)\n"
  acceptance_criteria:
  - fuse_point_ops() updates node_hashes for fused nodes with correct composed hash
  - fuse_point_ops() clears cache_hit_nodes/cache_hit_pixels for fused node IDs
  - fuse_point_ops() zeroes hashes for consumed (absorbed) intermediate nodes
  - Same fixes for fuse_color_ops()
  - Pipeline run 1 (A->B->C) then run 2 (A->B) produces correct output (not stale fused)
  - Pipeline run 1 (A->B) then run 2 (A->B->C) produces correct output
  - Pipeline run 1 (A->B->C) then run 2 (A->B'->C) with changed B produces correct output
  - Layer cache hits are served for unchanged upstream nodes
  - All tiled_parity tests pass
  - All existing tests pass
  out_of_scope: 'Redesigning the spatial cache (single-buffer-per-node architecture).

    Adding new fusion types beyond existing point-op and color-op.

    Performance benchmarking.

    '
  technical_notes: "The fix is in fuse_point_ops() and fuse_color_ops(). After replacing a node:\n\n1. Compute new hash for\
    \ fused node:\n   let lut_hash = compute_hash(&upstream_hash, \"fused_point_lut\", &lut);\n   self.node_hashes[i] = lut_hash;\n\
    \n2. Clear stale cache entries:\n   self.cache_hit_nodes.remove(&(i as u32));\n   self.cache_hit_pixels.remove(&(i as\
    \ u32));\n\n3. Zero consumed node hashes:\n   for (j, target) in fused_into.iter().enumerate() {\n       if target.is_some()\
    \ {\n           self.node_hashes[j] = ZERO_HASH;\n           self.cache_hit_nodes.remove(&(j as u32));\n           self.cache_hit_pixels.remove(&(j\
    \ as u32));\n       }\n   }\n\nThe upstream_hash for the fused node is the hash of the node that feeds\nINTO the fused\
    \ chain (the first non-point-op upstream). This is available\nfrom chain_root_upstream.\n\nFor fuse_color_ops(): same\
    \ pattern but hash the CLUT data instead of the\n1D LUT table.\n"
