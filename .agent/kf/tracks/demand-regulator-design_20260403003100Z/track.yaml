id: demand-regulator-design_20260403003100Z
title: 'Design: pipeline demand regulator — adaptive flow control for tiled execution'
type: research
status: pending
created: '2026-04-03'
updated: '2026-04-03'
spec:
  summary: Research and design a flexible demand/flow control mechanism. An optional middleware that controls how tile requests
    propagate — dynamically adjusting chunk sizes based on VRAM pressure, memory budget, and throughput. Produces a design
    document with API proposals, not implementation code.
  context: 'The pipeline currently has two fixed-size tiling mechanisms:

    - CPU sink tiles at 512x512 (TileConfig)

    - GPU tiles at 4096x4096 when image exceeds max_full_image_pixels


    Both are global knobs — every node gets the same tile size regardless

    of its compute characteristics. There is no per-node negotiation,

    no adaptive sizing, and no feedback from runtime conditions (VRAM

    pressure, throughput, memory budget).


    User request: an optional, injectable flow control mechanism that can

    sit anywhere in the pipeline to control demand propagation. It should

    be intuitive (simple API for common cases), flexible (per-node or

    per-stage control), and non-invasive (doesn''t complicate simple

    pipelines that don''t need it).'
  codebase_analysis: 'Industry research findings:


    VIPS: demand-driven pull via vips_region_prepare(). User selects sink

    type (screen/disc/memory/strip) which controls granularity. No

    explicit tile size — the sink pulls regions as needed. Minimal memory

    because intermediates are freed after each region pass.


    Nuke: scanline-based with optional tile buffering. Nodes can request

    specific input tile sizes via Tile accessor. Row cache with LRU

    eviction enforces memory limits. Hybrid: automatic scanlines with

    user-tunable tile caching.


    OIIO: explicit ROI per operation. User manually specifies region at

    each stage. No automatic propagation — maximum control, minimum magic.


    Halide: schedule-based compute_at/store_at. Algorithm separated from

    schedule. Auto-scheduler explores optimal configurations. Most

    powerful but most complex.


    GPU TBDR: hardware-automatic tile cache. Developer controls via render

    pass structure (subpasses keep data in tile cache). Tile size is

    hardware-determined, not user-configurable.


    Key insight: rasmcore''s pull-driven model is closest to VIPS. The

    best enhancement would combine VIPS-style demand-driven pulling with

    Halide-style per-node scheduling hints.'
  acceptance_criteria:
  - Design document produced in .agent/kf/tracks/{trackId}/design.md
  - API proposal with code examples for common use cases
  - Decision matrix for visible node vs middleware vs trait approaches
  - Backward compatibility analysis — zero breakage for existing pipelines
  - Memory model analysis — how tile size affects peak memory for representative workloads
  - 'Comparison table: proposed design vs VIPS/Nuke/Halide/OIIO approaches'
  out_of_scope: 'Implementation code. GPU-specific memory probing. Async/parallel tile

    prefetching (separate track). Scanline streaming mode (separate track).'
  technical_notes: "Recommended direction (per user feedback):\n\nLAYERED APPROACH — pipeline strategy + regulator nodes\n\
    \n1. PIPELINE-LEVEL STRATEGY (default behavior)\n   - pipeline.set_demand_strategy(strategy)\n   - Strategies: Fixed(512),\
    \ AdaptiveVram { budget_mb: 64 }, etc.\n   - Sets the baseline tile size for the entire graph\n   - Zero-config default\
    \ is current behavior (Fixed 512)\n   - Covers 90% of use cases without any node insertion\n\n2. DEMAND REGULATOR NODES\
    \ (surgical overrides)\n   - Inserted between processing nodes where different behavior needed\n   - Overrides the pipeline\
    \ strategy for its downstream subgraph\n   - Examples: force larger tiles for a blur chain, force smaller tiles\n    \
    \ for a memory-constrained export branch, set a VRAM budget for a\n     GPU-heavy section\n   - Optional — simple pipelines\
    \ never use them\n\n3. RESOLUTION ORDER (CSS-like cascade)\n   - Check: does this request pass through a DemandRegulator?\
    \ → use it\n   - Else: use pipeline-level strategy\n   - Else: use default (Fixed 512)\n\n4. NODE HINTS (lowest priority,\
    \ informational)\n   - Nodes can declare fn preferred_tile_size() -> Option<TileHint>\n   - The strategy/regulator can\
    \ USE these hints to make better decisions\n   - e.g., a large-kernel blur hints 'I waste 30% of overlap at 512x512,\n\
    \     prefer 1024x1024' — the adaptive strategy can honor this\n\nDesign questions remaining:\n- Does the regulator affect\
    \ only its immediate downstream, or the\n  entire subgraph below it?\n- Can regulators be nested (inner overrides outer)?\n\
    - Should the adaptive strategy probe GPU VRAM at startup or use a\n  declared budget?\n- How does this interact with the\
    \ spatial cache (larger tiles = more\n  cache hits for overlap reuse)?"
plan:
- phase: Demand propagation analysis
  tasks:
  - text: 'Map current demand flow: sink → request_region → GPU/CPU dispatch → upstream. Identify all decision points where
      tile size is fixed.'
    done: false
  - text: Profile memory usage for representative workloads (64MP f32, multi-pass blur chain) at different tile sizes. Establish
      baseline.
    done: false
  - text: Identify which node types benefit from custom tile sizes (neighborhood ops want larger tiles to reduce overlap waste,
      point ops are tile-agnostic).
    done: false
- phase: API design alternatives
  tasks:
  - text: 'Design Option A: TileHint trait on nodes — fn preferred_tile_size() -> Option<TileHint>. Graph walker checks hints
      during demand propagation.'
    done: false
  - text: 'Design Option B: DemandRegulator node — explicit graph node that intercepts requests and re-chunks. User inserts
      where needed.'
    done: false
  - text: 'Design Option C: Pipeline-level strategy — pipeline.set_demand_strategy(AdaptiveVram { budget_mb: 64 }). Global
      with per-node overrides.'
    done: false
  - text: 'Write code examples for each option showing: simple case (no config), medium case (set tile hint on blur), advanced
      case (adaptive VRAM budget).'
    done: false
- phase: Decision and specification
  tasks:
  - text: 'Build decision matrix comparing options across: API simplicity, flexibility, debuggability, backward compat, implementation
      complexity.'
    done: false
  - text: Write design.md with chosen approach, full API surface, memory model, and migration path.
    done: false
  - text: Define implementation tracks that would follow this design (scope, dependencies, rough task count).
    done: false
