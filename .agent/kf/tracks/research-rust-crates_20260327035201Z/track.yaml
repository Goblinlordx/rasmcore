id: research-rust-crates_20260327035201Z
title: "Research: Rust Crate Evaluation for WASM Targets"
type: research
status: pending
created: 2026-03-27
updated: 2026-03-27
spec:
  summary: |
    Evaluate candidate Rust crates across image, video, and data processing domains
    for WASM compilation readiness, pure-Rust availability, and API suitability.
  context: |
    The razm/core vision requires best-in-class Rust libraries that can compile to
    wasm32-wasip2 without C dependencies. We need to verify which crates actually
    meet this requirement and identify gaps where we may need custom implementations.
  codebase_analysis: |
    Fresh project — no existing code. Evaluating external crate ecosystem.
  acceptance_criteria:
    - Evaluate image crate for WASM compilation — document supported formats, limitations
    - Investigate OxiMedia — verify existence, maturity, WASM support claims
    - Evaluate rav1e for AV1 encoding from WASM — performance characteristics
    - Research pure-Rust video decoder options (VP9, AV1)
    - Evaluate Polars WASM support — what subset works, memory constraints
    - For each crate, document C dependency status (pure Rust vs sys crates)
    - Produce a matrix of crate vs capability vs WASM-readiness
    - Identify gaps where no suitable pure-Rust WASM-ready crate exists
  out_of_scope: |
    Building production modules. Small compilation tests are in scope to verify claims.
  technical_notes: |
    Key concern is C/sys dependencies. Many Rust crates wrap C libraries (e.g., image
    uses some C codecs, ffmpeg wrappers). We need to identify which capabilities are
    available in pure Rust and which would require either custom implementation or
    accepting C dependencies compiled to WASM via wasi-sdk.

    For feasibility verification, small cargo-component projects that import a crate
    and compile to wasm32-wasip2 are encouraged.
