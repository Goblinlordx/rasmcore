id: jpeg-trellis-benchmark_20260329234800Z
title: JPEG Trellis Benchmark Suite — Comprehensive Parity + Performance vs References
type: chore
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: |
    Comprehensive benchmark of all JPEG trellis features against mozjpeg/image crate
    references. Covers AC trellis, DC trellis, adaptive lambda, progressive+trellis,
    and optimized Huffman+trellis. Measures file size reduction, PSNR, and encode
    speed across quality levels and image sizes.
  context: |
    Five JPEG trellis tracks have been completed (jpeg-trellis, jpeg-trellis-adaptive,
    jpeg-trellis-dc-progressive, trellis-core, trellis-jpeg) but the parity test
    coverage is minimal: one 32x32 gradient test and one decodability check. We need
    to validate the combined effect of all trellis features against known-good references
    and document the quality/size/speed tradeoffs.

    The reference comparison should use mozjpeg (via cjpeg CLI) when available, and
    the image crate as fallback. mozjpeg is the gold standard for trellis JPEG.
  codebase_analysis: |
    tests/parity.rs has trellis_420() with 32x32 gradient at Q85 vs image crate.
    optimized_huffman_with_trellis() just checks decodability. No tests for:
    - DC trellis effect
    - Adaptive lambda effect
    - Progressive+trellis
    - Quality sweep with trellis
    - Large images with trellis
    - File size reduction measurement (trellis vs non-trellis)
    - mozjpeg reference comparison

    The EncodeConfig has: trellis (bool), adaptive_trellis (bool if exists),
    progressive (bool), optimize_huffman (bool). All combinations need testing.
  acceptance_criteria:
    - Quality sweep at Q25/Q50/Q75/Q85/Q95 with trellis on 256x256 gradient
    - File size comparison trellis vs non-trellis at each quality (expect 5-15% reduction)
    - Progressive+trellis parity test vs image crate
    - DC trellis impact measurement (additional 1-3% savings)
    - Trellis+optimized Huffman combined savings measurement
    - Large image test (512x512 and 1024x1024) with trellis
    - mozjpeg reference comparison when cjpeg available (quality ratio and size ratio)
    - Encode speed measurement (trellis overhead documented)
    - All generated JPEGs decodable by image crate
    - Test results printed to stdout for CI visibility
  out_of_scope: |
    Fixing trellis quality issues (separate bug tracks). Adding new trellis features.
    Visual quality assessment (automated SSIM/PSNR only).
  technical_notes: |
    Reference hierarchy:
    1. mozjpeg via cjpeg CLI (if available): gold standard for trellis JPEG
    2. image crate (always available): baseline comparison

    mozjpeg invocation: cjpeg -quality Q -optimize -outfile out.jpg in.ppm
    (mozjpeg cjpeg enables trellis by default)

    Test matrix:
      Modes: [baseline, baseline+trellis, progressive, progressive+trellis,
              trellis+opt_huffman, trellis+adaptive_lambda]
      Quality: [25, 50, 75, 85, 95]
      Sizes: [32x32, 256x256, 512x512, 1024x1024]
      Patterns: [gradient, checkerboard, solid]

    Output format per test: print PSNR, file size, size ratio vs non-trellis,
    size ratio vs mozjpeg, encode time.
