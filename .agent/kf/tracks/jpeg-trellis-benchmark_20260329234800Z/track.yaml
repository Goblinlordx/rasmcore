  - text: Add trellis+optimized_huffman combined test with size reduction measurement
    done: true
  - text: Add DC trellis impact test (measure additional savings from DC optimization)
    done: true
  - text: Add adaptive lambda test (compare fixed vs adaptive lambda file sizes)
    done: true
- phase: Scale and Reference
  tasks:
  - text: Add large image trellis tests (512x512 and 1024x1024)
