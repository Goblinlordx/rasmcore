id: sdk-host-integration-guide_20260404053004Z
title: SDK host integration guide (GPU, cache, required host facilities)
type: chore
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: |
    Document what host facilities SDK consumers must provide when integrating
    the WASM module: GPU executor (WebGPU/wgpu), and what the module handles
    internally (layer cache, fusion, encoding) vs what requires host wiring.
  context: |
    The V2 WASM module exposes a pipeline via WIT, but certain capabilities require
    host cooperation. New SDK consumers (browser apps, Node.js, Go, Swift) need
    a clear guide on what they must provide vs what works out of the box.

    Current host responsibilities:
    - GPU: Host must provide WebGPU device/dispatch. WASM generates WGSL shaders
      but cannot compile or dispatch them — that is a host-specific operation.
    - Layer cache: Internal to WASM instance (V1 pattern). Created via WIT resource,
      injected into pipeline. Pixel data lives in WASM linear memory. No host
      involvement beyond calling constructor and setLayerCache().

    What works out of the box (no host wiring):
    - All CPU filter execution
    - Analytic fusion and optimization
    - Encoding/decoding (all codecs)
    - Color space conversion
    - Layer cache (once initialized)
  codebase_analysis: |
    - GPU: GpuExecutor trait (pipeline-v2/src/gpu.rs) receives WGSL + params, returns f32 pixels
    - Cache: LayerCache is a WIT resource with constructor(capacity_mb) — entirely within WASM
    - Shader cache: Host-side concern (GPUComputePipeline in browser, ShaderModule in wgpu)
    - The WIT interface (wit/v2/pipeline.wit) is the contract — all methods listed there
    - generate-v2-fluent-sdk.mjs generates TypeScript from registry metadata
  acceptance_criteria:
    - SDK README documents host vs internal responsibilities
    - GPU integration section with browser WebGPU and native wgpu examples
    - Layer cache section showing initialization and injection pattern
    - Shader cache section explaining host-side caching strategy
    - Minimal working example for each host environment (browser, Node, native)
  out_of_scope: |
    Implementing the host facilities (separate tracks). Changing the WIT interface.
  technical_notes: |
    Structure the guide as:
    1. What works out of the box (CPU pipeline, all filters, all codecs)
    2. Optional: GPU acceleration (host must provide)
       - Interface: WASM sends shader source + params, host compiles + dispatches
       - Browser: WebGPU device + GpuHandlerV2 pattern
       - Native: wgpu device + WgpuExecutor
       - Shader caching is host-side (cache GPUComputePipeline / ShaderModule)
    3. Optional: Layer cache (internal, host just calls constructor)
       - Created via WIT resource constructor(capacity_mb)
       - Injected via pipeline.setLayerCache(cache)
       - Lives in WASM linear memory, managed by library
       - Persists across pipeline instances within same WASM instance
    4. What each SDK generator produces and how to extend
