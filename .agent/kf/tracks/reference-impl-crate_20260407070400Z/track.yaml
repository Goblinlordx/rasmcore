id: reference-impl-crate_20260407070400Z
title: "Reference implementation crate — textbook filter ground truth for testing"
type: feature
status: pending
created: 2026-04-07
updated: 2026-04-07
spec:
  summary: |
    New crate crates/rasmcore-reference/ with dead-simple, textbook reference
    implementations of filter operations. Used as dev-dependency for automated
    parity testing. Each function documents the external tool/version used to
    validate it. Procedural test inputs, no committed binaries.
  context: |
    The current filter parity tests (tests/filter_parity.rs) verify our
    implementations against inline formulas — but if the formula is wrong,
    the test passes anyway. Real validation needs a separate reference
    implementation that has been independently verified against production
    tools (ImageMagick, vips, OpenCV).

    The reference crate is:
    - Pure math. No SIMD, no GPU, no optimization. Readable textbook code.
    - Color-space aware. All operations assume linear f32 input (matching
      our pipeline). Reference validation against external tools must also
      use linear-space processing (e.g., IM with -colorspace Linear,
      vips with --linear flag, OpenCV in float32 linear).
    - Each function documents its validation source (tool, version, command,
      color space setting, tolerance achieved).
    - Used only in tests (dev-dependency). Never compiled into production.
    - Procedural test inputs (gradient, solid, noise) — no committed images.
    - The reference is the ground truth. If our optimized implementation
      disagrees with the reference, the optimized code is wrong.
  codebase_analysis: |
    Workspace structure: crates/ contains ~25 crates. Adding rasmcore-reference
    follows the existing pattern. Cargo.toml workspace members list at root.

    Existing test infrastructure:
    - tests/filter_parity.rs: 14 tests comparing against inline formulas
    - tests/gpu_correctness.rs: GPU-specific tests
    - Each filter module has unit tests in #[cfg(test)]

    Filter categories to cover (by priority):
    1. Point ops (12 filters): brightness, contrast, gamma, exposure, invert,
       levels, posterize, solarize, sigmoidal, dodge, burn — pure per-pixel math
    2. Color ops (22 filters): sepia, saturate, hue_rotate, channel_mixer,
       white_balance, vibrance, colorize, etc. — color matrix / HSL math
    3. Enhancement (17 filters): auto_level, equalize, normalize, sharpen,
       clahe, etc. — histogram + spatial
    4. Spatial (14 filters): gaussian_blur, box_blur, median, bilateral,
       etc. — convolution kernels
    5. Others: edge detection, morphology, distortion, grading — complex

    The crate starts with point ops and color ops (Wave 1), then expands.
  acceptance_criteria:
    - crates/rasmcore-reference/ exists as a workspace member
    - Reference implementations for all 12 adjustment (point op) filters
    - Reference implementations for core color ops (sepia, saturate, hue_rotate, channel_mixer, white_balance)
    - Each reference function has a doc comment citing the external validation source
    - VALIDATION.md documents the methodology and per-filter validation status
    - Procedural test input generators (gradient, solid, checkerboard, noise)
    - Pipeline crate tests/filter_reference.rs uses rasmcore-reference as dev-dep
    - All reference tests pass comparing our filters against reference implementations
    - No committed binary test images or golden files
  out_of_scope: |
    - Spatial filter references (separate expansion track)
    - Enhancement filter references (separate expansion track)
    - GPU shader validation (CPU reference only)
    - Performance — reference implementations are intentionally slow
    - External tool integration in CI (validation is one-time manual)
  technical_notes: |
    Crate structure:
      crates/rasmcore-reference/
        Cargo.toml          # no dependencies beyond std
        src/
          lib.rs            # re-exports + test input generators
          point_ops.rs      # brightness, contrast, gamma, etc.
          color_ops.rs      # sepia, saturate, hue_rotate, etc.
        VALIDATION.md       # per-filter validation audit trail

    Each reference function signature mirrors the filter:
      pub fn brightness(input: &[f32], w: u32, h: u32, amount: f32) -> Vec<f32>

    VALIDATION.md format per filter:
      ## brightness
      - Formula: out[c] = in[c] + amount (RGB only, alpha preserved)
      - Color space: linear f32 (pipeline working space)
      - Reference: ImageMagick 7.1.1-38 `-colorspace Linear -evaluate Add {amount}`
      - Reference: vips 8.15 `vips linear input.v output.v 1.0 {amount} --linear`
      - Tolerance: <1e-7 (exact match in f32)
      - Status: VALIDATED
      - Notes: IM must be in linear space; default sRGB would apply gamma

    Test input generators in lib.rs:
      pub fn gradient(w, h) -> Vec<f32>     // R=x/w, G=y/h, B=(x+y)/(w+h)
      pub fn solid(w, h, color) -> Vec<f32> // constant fill
      pub fn noise(w, h, seed) -> Vec<f32>  // deterministic pseudo-random

    Integration test in pipeline crate:
      use rasmcore_reference as ref_impl;
      let input = ref_impl::gradient(32, 32);
      let expected = ref_impl::brightness(&input, 32, 32, 0.3);
      let actual = Brightness { amount: 0.3 }.compute(&input, 32, 32).unwrap();
      assert_parity(&actual, &expected, 1e-6);
