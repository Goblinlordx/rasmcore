        done: false
      - text: "Identify filters where the underlying engine already supports higher bit depths but the wrapper downconverts (e.g., distortion filters using process_via_8bit despite EWA sampler supporting f32)"
        done: false
      - text: "Prioritize fix candidates by impact (most-used filters first, easiest fixes first)"
        done: false
      - text: "Document how PS, Affinity Photo, GIMP/GEGL, Darktable, and libvips handle pipeline precision"
        done: false
