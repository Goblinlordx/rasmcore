id: fuse-clut-chains_20260406053300Z
title: Implement CLUT chain fusion optimizer
type: feature
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: 'Wire up fuse_clut_chains() to find consecutive ClutOp-capable nodes

    and replace them with a single FusedClutNode via compose_cluts().

    Adds CLUT detection to FilterNode so the optimizer can find fusable chains.

    '
  context: 'The fusion optimizer already fuses consecutive analytic point-ops (brightness,

    contrast, gamma) into a single expression tree + 1D LUT. The equivalent for

    3D color operations (curves, CDL, lift/gamma/gain, split toning, hue-vs-sat,

    external LUTs) is CLUT fusion: compose multiple 3D LUTs into one.


    All the building blocks exist:

    - ClutOp trait (build_clut() -> Clut3D) — implemented by 12+ grading filters

    - Clut3D struct with sample() and from_fn()

    - compose_cluts(outer, inner) -> Clut3D — composes two CLUTs

    - FusedClutNode — wraps a composed Clut3D as a pipeline Node


    What''s missing: fuse_clut_chains() is a TODO stub. The graph walker that

    detects consecutive ClutOp-capable nodes and replaces them hasn''t been

    implemented. Also, FilterNode always reports clut: false — it doesn''t

    detect whether the wrapped filter implements ClutOp.

    '
  codebase_analysis: "fusion.rs:\n- fuse_clut_chains() at line 813 — TODO stub\n- fuse_analytic_chains() at ~line 715 — working\
    \ reference implementation\n- compose_cluts() at line 575 — working, tested\n- FusedClutNode at line 655 — working, tested\n\
    - optimize() calls fuse_analytic_chains + fuse_clut_chains\n\nfilter_node.rs:\n- FilterNode always returns clut: false\
    \ in capabilities()\n- Analytic detection uses analytic_expression() returning Option — same\n  pattern should work for\
    \ CLUT\n\nops.rs Filter trait:\n- analytic_expression() -> Option<PointOpExpr> exists (default None)\n- No equivalent\
    \ for CLUT — need to add build_clut() -> Option<Clut3D>\n\nfilters/color.rs:\n- ClutOp trait: fn build_clut(&self) ->\
    \ Clut3D\n- Implemented by: hue_rotate, saturate, vibrance, sepia, colorize,\n  white_balance_temperature, photo_filter,\
    \ lab_adjust, modulate,\n  selective_color, replace_color\n\nfilters/grading.rs:\n- ClutOp implemented by: CurvesMaster,\
    \ CurvesRed/Green/Blue,\n  AscCdl, LiftGammaGain, SplitToning, HueVsSat, HueVsLum,\n  LumVsSat, SatVsSat, ApplyCubeLut,\
    \ ApplyHaldLut, TonemapReinhard\n"
  acceptance_criteria:
  - Filter trait has build_clut() method (default None)
  - Filters implementing ClutOp also override build_clut() on Filter
  - FilterNode detects clut capability at runtime via build_clut().is_some()
  - fuse_clut_chains() walks graph finding consecutive clut-capable nodes
  - Consecutive clut nodes replaced with single FusedClutNode
  - compose_cluts chains correctly (A -> B -> C becomes compose(C, compose(B, A)))
  - Non-clut nodes break the chain (spatial ops, scopes, etc.)
  - Mixed chains work correctly (point-ops fuse separately, then clut-ops fuse)
  - 3+ grading filters in sequence produce identical output whether fused or not
  - Performance improvement measurable on 5-filter grading chain
  out_of_scope: 'GPU CLUT application shader (future — upload composed CLUT as 3D texture).

    CLUT + point-op cross-fusion (composing 1D LUT into 3D CLUT).

    Automatic quality selection for grid size.

    '
  technical_notes: "Detection pattern (same as analytic):\n1. Add to Filter trait: fn build_clut(&self) -> Option<Clut3D>\
    \ { None }\n2. Filters with ClutOp override: fn build_clut(&self) -> Option<Clut3D> {\n     Some(ClutOp::build_clut(self))\n\
    \   }\n3. FilterNode::capabilities() checks self.filter.build_clut().is_some()\n   for the clut flag\n4. FilterNode exposes\
    \ build_clut() to the node level for the walker\n\nWalker pattern (mirror fuse_analytic_chains):\n1. Walk nodes in reverse\
    \ order (sink to source)\n2. If node has clut capability, start collecting chain\n3. Walk upstream — if upstream also\
    \ has clut, extend chain\n4. Stop at first non-clut node\n5. If chain length >= 2, compose CLUTs and replace with FusedClutNode\n\
    6. Composition order: innermost (upstream) first, outermost (downstream) last\n\nThe filter author never thinks about\
    \ fusion. They implement ClutOp\n(which they already do for 20+ filters) and add one line to their\nFilter impl. The optimizer\
    \ does the rest.\n\nNote: build_clut() is potentially expensive (samples the function at\n33^3 grid points). The walker\
    \ should only call it once per node during\nfusion, not on every frame. The fused CLUT is cached in the FusedClutNode.\n"
