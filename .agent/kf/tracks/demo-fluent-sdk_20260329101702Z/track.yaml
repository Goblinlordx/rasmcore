id: demo-fluent-sdk_20260329101702Z
title: Auto-Generated Fluent TypeScript SDK — rcimage Chainable API
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: >
    Auto-generate the fluent rcimage TypeScript SDK from jco output types.
    A codegen script reads the generated ImagePipeline .d.ts and produces
    the RcImage chainable wrapper. No hand-written SDK methods.
  context: |
    The current chain:
      #[register_filter] → build.rs → WIT → jco transpile → ImagePipeline class

    The missing last step:
      ImagePipeline .d.ts → codegen → RcImage fluent wrapper

    This must be auto-generated so new filters/codecs appear in the SDK
    automatically when the WASM is rebuilt. A hand-written wrapper would
    require manual updates for every new operation — defeating the purpose
    of the extensibility system.

    Also: build.rs must detect duplicate operation names at compile time
    and fail with a clear error, preventing ambiguous SDK generation.
  codebase_analysis: |
    jco transpile produces demo/sdk/interfaces/rasmcore-image-pipeline.d.ts:
      export class ImagePipeline {
        constructor()
        read(data: Buffer): NodeId;
        blur(source: NodeId, radius: number): NodeId;
        resize(source: NodeId, width: number, height: number, filter: ResizeFilter): NodeId;
        writeJpeg(source: NodeId, config: JpegWriteConfig, metadata: MetadataSet | undefined): Buffer;
        ...
      }

    The codegen script parses this .d.ts and generates:
      export class RcImage {
        blur(radius: number): RcImage { ... }
        resize(width: number, height: number, filter?: ResizeFilter): RcImage { ... }
        toJpeg(config?: { quality?: number }): Uint8Array { ... }
        ...
      }

    Every pipeline method that takes (source: NodeId, ...params) → NodeId
    becomes a chainable method that takes (...params) → RcImage.

    Every pipeline method that takes (source: NodeId, ...config) → Buffer
    becomes a terminal method that takes (...config) → Uint8Array.
  acceptance_criteria:
    - Codegen script reads ImagePipeline .d.ts and produces rcimage.ts automatically
    - RcImage class has typed methods for every pipeline operation
    - New filters added via #[register_filter] appear in SDK after rebuild (no manual step)
    - Duplicate operation names detected at build.rs compile time with clear error
    - rcimage.load().blur(3).resize(800,600).toJpeg() works end-to-end
    - fork() creates branch from current pipeline state
    - info getter returns dimensions/format without computing pixels
    - Package exports as { rcimage } from @rasmcore/sdk
    - TypeScript types fully typed (no any)
    - All operations from current WIT are present in generated SDK
  out_of_scope: |
    Streaming output (documented as future). Worker thread integration.
    rcaudio/rcvideo (future media types). npm publishing.
  technical_notes: |
    Codegen approach:

    1. DUPLICATE DETECTION (build.rs enhancement):
       build.rs already scans #[register_filter] annotations.
       Add: collect all names into a HashSet, panic if duplicate found.
       Error message: "Duplicate filter name 'blur' registered by:
         rasmcore_filter_spatial::blur (crates/rasmcore-filter-spatial/src/lib.rs)
         my_custom_crate::blur (my-crate/src/lib.rs)
       Rename one to resolve the conflict."

    2. SDK CODEGEN SCRIPT (scripts/generate-fluent-sdk.ts or .js):
       Input: demo/sdk/interfaces/rasmcore-image-pipeline.d.ts
       Output: sdk/typescript/src/rcimage.ts

       Algorithm:
       a) Parse the .d.ts file (regex or ts-morph)
       b) For each method on ImagePipeline:
          - If returns NodeId → chainable method (→ RcImage)
          - If returns Buffer → terminal method (→ Uint8Array)
          - Skip: constructor, read (handled by static load())
          - Strip first param (source: NodeId) from signature
       c) Generate RcImage class with:
          - private pipeline: ImagePipeline
          - private nodeId: number
          - static load(data: Uint8Array): RcImage
          - One method per pipeline operation
          - fork(): RcImage
          - get info(): ImageInfo

    3. BUILD INTEGRATION:
       demo/build.sh updated to:
         cargo component build → jco transpile → generate-fluent-sdk
       npm run demo:build does all three steps.

    4. NAMING:
       Package: @rasmcore/sdk
       Export: import { rcimage } from '@rasmcore/sdk'
       The rcimage namespace is a factory: rcimage.load(bytes)

    Method categorization from pipeline.d.ts:
      Chainable (NodeId → NodeId):
        resize, crop, rotate, flip, convertFormat, iccToSrgb, autoOrient,
        blur, sharpen, brightness, contrast, grayscale, convolve, median,
        sobel, canny, composite
      Terminal (NodeId → Buffer):
        writeJpeg, writePng, writeWebp, writeAvif, writeTiff, writeBmp,
        writeIco, writeQoi, writeGif, write
      Info (NodeId → ImageInfo):
        nodeInfo
