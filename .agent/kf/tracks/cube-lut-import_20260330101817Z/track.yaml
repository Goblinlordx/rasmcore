id: cube-lut-import_20260330101817Z
title: "External 3D LUT Import (.cube / HALD)"
type: feature
status: pending
created: 2026-03-30
updated: 2026-03-30
spec:
  summary: >
    Parse Adobe .cube and HALD PNG 3D LUT files and apply via existing
    ColorLut3D infrastructure. Enables DaVinci Resolve / Photoshop color grades.
  context: |
    The codebase has a full 3D LUT system (ColorLut3D with tetrahedral
    interpolation, composition, shaper curves) but it only generates LUTs
    internally from ColorOp chains. Users cannot load external LUT files
    from color grading tools like DaVinci Resolve (.cube), Flame (.3dl),
    or ImageMagick HALD CLUTs. This is a critical gap for professional
    color workflows.
  codebase_analysis: |
    - ColorLut3D in color_lut.rs: 33x33x33 grid, tetrahedral lookup, identity/from_fn
    - compose_cluts() and absorb_1d_pre/post() for LUT composition
    - gradient_map() uses 1D LUT (256-entry), different from 3D LUT
    - IM reference: -hald-clut applies a HALD CLUT image as 3D color transform
    - .cube format: text-based, TITLE/DOMAIN_MIN/DOMAIN_MAX/LUT_3D_SIZE header + RGB triplets
    - HALD PNG: NxN image where N = grid_size^2, pixels encode the identity LUT
      colored by the grading transform
  acceptance_criteria:
    - Parse .cube files (Adobe/Resolve format) into ColorLut3D
    - Parse HALD PNG images into ColorLut3D
    - apply_cube_lut filter registered with lut_data (embedded) parameter
    - Round-trip test (identity .cube produces identity output)
    - IM parity test (apply same HALD CLUT via IM and our code, MAE < 1.0)
    - Supports arbitrary grid sizes (17, 33, 65 common)
    - Error handling for malformed .cube / wrong-size HALD images
  out_of_scope: |
    .3dl (Flame/Lustre) format. 1D LUT file import (separate concern).
    LUT export / writing. ICC profile-based LUT generation.
  technical_notes: |
    .cube format (Resolve/Adobe):
      TITLE "My LUT"
      DOMAIN_MIN 0.0 0.0 0.0
      DOMAIN_MAX 1.0 1.0 1.0
      LUT_3D_SIZE 33
      0.000000 0.000000 0.000000
      0.031250 0.000000 0.000000
      ...
    R varies fastest, then G, then B (same as our ColorLut3D storage order).

    HALD PNG:
      A HALD CLUT of level N is an image of N^2 x N^2 pixels.
      The identity HALD for level 8 is 64x64 = 4096 pixels encoding
      a 8x8x8 LUT. Color grading tools modify the HALD image to bake
      their grade, then the HALD is applied as a 3D LUT.
      Generate identity: magick -size 8 hald: identity_hald8.png
      Apply: magick input.jpg identity_hald8.png -hald-clut output.jpg
