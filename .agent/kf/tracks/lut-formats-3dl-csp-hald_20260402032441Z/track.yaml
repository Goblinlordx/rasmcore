id: lut-formats-3dl-csp-hald_20260402032441Z
title: LUT format support — .3dl, .csp read/write + Hald CLUT write
type: feature
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: 'Add read/write support for Autodesk .3dl and CineSpace .csp LUT formats,

    plus Hald CLUT PNG write. All formats route through existing ColorLut3D

    infrastructure and pipeline short-circuit (no pixel execution for LUT I/O).

    '
  context: "rasmcore currently supports .cube (R/W) and Hald CLUT (read-only) for LUT\nfiles. The LUT encoder/decoder infrastructure\
    \ was just added — .cube format\nshort-circuits the pixel pipeline via fuse_color_ops() + serialize.\n\nProfessional color\
    \ grading workflows use multiple LUT formats:\n- .3dl (Autodesk Lustre/Flame) — dominant in post-production\n- .csp (CineSpace/Rising\
    \ Sun Research) — used in VFX pipelines (ShotGrid/RV),\n  uniquely supports preLUT shaper curves (1D pre-curve + 3D LUT)\n\
    - Hald CLUT (PNG image) — used by darktable, RawTherapee for LUT sharing\n\nAdding these 3 formats gives rasmcore comprehensive\
    \ LUT format coverage\nacross film/TV post-production, VFX, and open-source photography tools.\n"
  codebase_analysis: "EXISTING INFRASTRUCTURE (all in place):\n- ColorLut3D struct with identity(), from_fn(), lookup(), apply(),\
    \ compose_cluts()\n- parse_cube_lut() and serialize_cube() — .cube R/W\n- parse_hald_lut() — Hald read (needs write counterpart)\n\
    - Pipeline short-circuit in sink.rs write_tiled() for format==\"cube\"\n- detect_format() in decoder/mod.rs with is_cube_lut()\
    \ detection\n- decode_cube() returns ColorLut3D from bytes\n- NodeGraph::add_clut_source() injects CLUT as pipeline source\n\
    - absorb_1d_pre() / absorb_1d_post() — shaper curve composition (for .csp)\n\n.3DL FORMAT (Autodesk Lustre/Flame):\n-\
    \ Text file, integer values (0-1023 for 10-bit, 0-4095 for 12-bit)\n- First line: mesh header (grid vertex positions,\
    \ optional)\n- Subsequent lines: R G B triplets (space-separated integers)\n- Grid sizes: 17, 33, or 65 (cube root of\
    \ entry count)\n- R varies fastest (same as ColorLut3D storage order)\n- No formal published spec — reverse-engineered\
    \ from Autodesk docs + examples\n- Reference: Autodesk Lustre Color Management User Guide\n\n.CSP FORMAT (CineSpace v1.0):\n\
    - Text file with formal spec (published PDF)\n- Header: \"CSPLUTV100\" + \"1D\" or \"3D\" on second line\n- PreLUT section\
    \ (lines 3-11): per-channel shaper curves\n  - 3 blocks of 3 lines each (R, G, B)\n  - Line 1: count of preLUT entries\n\
    \  - Line 2: input values (space-separated floats)\n  - Line 3: output values (space-separated floats)\n- 3D LUT data:\
    \ grid size on one line, then N^3 RGB triplets\n- Red varies fastest (same as our internal order)\n- Values are space-delimited\
    \ floats in [0.0, 1.0]\n- PreLUT maps to absorb_1d_pre() — bake shaper into CLUT on import,\n  or export as separate 1D\
    \ curve on write\n\nHALD CLUT WRITE:\n- Square PNG image where dimension = level^3\n- Grid size = level^2\n- Standard\
    \ levels: 4 (grid 16, 64x64 image), 6 (grid 36, 216x216),\n  8 (grid 64, 512x512 image — most common)\n- Pixel order:\
    \ R fastest, G middle, B slowest (left-to-right, top-to-bottom)\n- Output via existing PNG encoder\n"
  acceptance_criteria:
  - parse_3dl() reads Autodesk .3dl files into ColorLut3D (10-bit and 12-bit)
  - serialize_3dl() writes ColorLut3D to .3dl format (10-bit default)
  - parse_csp() reads CineSpace .csp files into ColorLut3D (absorbs preLUT)
  - serialize_csp() writes ColorLut3D to .csp format (identity preLUT)
  - serialize_hald() writes ColorLut3D to Hald CLUT PNG image
  - detect_format() recognizes .3dl and .csp headers
  - Pipeline write short-circuit works for format=="3dl" and format=="csp"
  - Round-trip tests pass for each format (parse then serialize, compare)
  - Cross-format test passes (.cube -> .3dl -> .csp -> .cube, verify equivalence)
  - All existing LUT tests pass (no regressions)
  - cargo build + cargo component build succeed
  out_of_scope: 'spi1d/spi3d (no formal spec — defer to future track).

    Generic .lut format (ambiguous, app-dependent).

    1D-only LUT read/write (project uses 3D CLUTs for full color transform fidelity).

    LUT visualization or preview UI.

    '
  technical_notes: "APPROACH:\nAll three formats convert to/from the existing ColorLut3D struct.\nNo new data structures needed\
    \ — just parsing/serialization functions.\n\n.3DL IMPLEMENTATION:\n- Parser: skip optional mesh header line (starts with\
    \ integer count),\n  read R G B integer triplets, normalize to [0.0, 1.0] by dividing\n  by max value (auto-detect 1023\
    \ for 10-bit, 4095 for 12-bit)\n- Writer: multiply [0.0, 1.0] by 1023, write as integer triplets\n- Detection: first non-comment\
    \ line contains only integers\n\n.CSP IMPLEMENTATION:\n- Parser: check CSPLUTV100 header, read 3D/1D type,\n  parse preLUT\
    \ section (3 channels x 3 lines = 9 lines),\n  parse 3D LUT data. If preLUT is non-identity, compose via\n  absorb_1d_pre()\
    \ to bake shaper into the 3D CLUT.\n- Writer: write CSPLUTV100 header + \"3D\",\n  write identity preLUT (2 entries per\
    \ channel: 0.0->0.0, 1.0->1.0),\n  write grid size + RGB triplets\n- Detection: first line is \"CSPLUTV100\"\n\nHALD WRITE:\n\
    - Generate square RGB8 image from ColorLut3D\n- level = ceil(grid_size^(1/2)) — find smallest level where level^2 >= grid_size\n\
    - Resample CLUT to level^2 grid if needed\n- Write pixels left-to-right, top-to-bottom via PNG encoder\n- Detection: N/A\
    \ (Hald is a PNG image, detected as PNG, identified by structure)\n\nPIPELINE INTEGRATION:\n- Add format==\"3dl\" and\
    \ format==\"csp\" branches to sink.rs short-circuit\n- Add format detection for .3dl and .csp in decoder/mod.rs\n- Add\
    \ decode_3dl() and decode_csp() convenience functions\n"
