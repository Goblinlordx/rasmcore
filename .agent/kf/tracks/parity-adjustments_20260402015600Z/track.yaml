id: parity-adjustments_20260402015600Z
title: Parity tests for adjustment operations — contrast, gamma, levels, invert, posterize, sigmoidal_contrast
type: chore
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: 'Add reference-validated parity tests for core adjustment panel operations

    against numpy/Pillow. These are fundamental PS-equivalent operations with

    no current validation.

    '
  context: 'The adjustment category has only 33% parity coverage (3/9 operations tested).

    Missing: contrast, gamma, levels, invert, posterize, sigmoidal_contrast.

    These are the most basic image editing operations — every user expects them

    to produce correct results. Without validation, regressions go undetected.

    '
  codebase_analysis: 'Existing implementations in crates/rasmcore-image/src/domain/filters/adjustment/:

    - contrast.rs: linear contrast stretch

    - gamma.rs: gamma curve (power law)

    - levels.rs: input/output levels mapping (black point, white point, midtone gamma)

    - invert.rs: channel inversion (255 - pixel)

    - posterize.rs: reduce bit depth per channel

    - sigmoidal_contrast.rs: S-curve contrast enhancement


    Existing parity test infrastructure:

    - tests/filter_reference_parity.rs: Python venv with numpy/Pillow, exact MAE comparison

    - Pattern: run Python script → compare raw bytes → assert MAE < threshold


    All operations are point ops (per-pixel, no spatial neighborhood) so exact

    match (MAE=0) is expected for most, with MAE < 0.5 for rounding differences.

    '
  acceptance_criteria:
  - Parity test for contrast against numpy (linear stretch)
  - Parity test for gamma against numpy power law
  - Parity test for levels against Pillow autocontrast / numpy equivalent
  - Parity test for invert — exact match (MAE=0) against numpy 255-pixel
  - Parity test for posterize against Pillow posterize
  - Parity test for sigmoidal_contrast against ImageMagick -sigmoidal-contrast
  - All tests use the existing venv Python infrastructure
  - 100% adjustment operation coverage (6/6)
  out_of_scope: 'Fixing any bugs found (separate bug-fix tracks if needed).

    Encoder/decoder parity.

    '
  technical_notes: 'Use filter_reference_parity.rs pattern with venv Python.

    Point ops should be pixel-exact (MAE=0) or within MAE < 0.5.

    Test on gradient + random pixel data to cover full value range.

    '
