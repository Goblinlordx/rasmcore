id: cpu-render-audit_20260404053003Z
title: CPU render optimization audit (SIMD, LUT baking, fused ops)
type: chore
status: pending
created: '2026-04-04'
updated: '2026-04-07'
spec:
  summary: 'Audit and optimize V2 CPU fallback path: LUT baking for fused point ops,

    SIMD for hot filters, eliminate recursive tree evaluation. Low priority.

    '
  context: 'V2 CPU path has zero SIMD intrinsics — pure scalar f32 loops everywhere.

    FusedPointOpNode::compute() uses recursive PointOpExpr::evaluate() per pixel

    per channel despite lower_to_lut() existing but never being called.

    Individual filters (brightness, contrast, blur) are scalar loops.

    V1 rasmcore-kernel has vectorized tetrahedral interpolation that V2 does not use.

    This is low priority since GPU dispatch is the primary path, but CPU fallback

    should still be reasonable for environments without GPU.

    '
  codebase_analysis: "- FusedPointOpNode::compute() (fusion.rs:460-475): lower_to_closure() clones\n  expression tree, evaluates\
    \ recursively per pixel per channel\n- lower_to_lut() exists (fusion.rs:192-194) but is NEVER called in CPU path\n- PointOpExpr::evaluate()\
    \ (ops.rs:309-339): recursive match with O(tree_depth) per call\n- Brightness compute(): 3 scalar adds per pixel (no SIMD)\n\
    - GaussianBlur compute(): nested accumulation loops (no SIMD)\n- Existing benchmarks: benches/gpu_pipeline.rs, CPU-only,\
    \ Criterion\n- No std::arch, packed_simd, std::simd, or target_feature in V2 pipeline\n"
  acceptance_criteria:
  - FusedPointOpNode uses LUT for point op chains (lower_to_lut instead of lower_to_closure)
  - Hot point-op filters use SIMD-friendly patterns (compiler auto-vectorizes)
  - Gaussian blur uses SIMD accumulation where possible
  - Benchmark suite covers CPU path at 400px and 4K with before/after comparison
  - At minimum 2x speedup on fused CPU path via LUT baking
  out_of_scope: 'GPU dispatch (separate track). Layer cache (separate track).

    Full SIMD rewrite of every filter. Parallelization (rayon).

    '
  technical_notes: "Priority order:\n1. LUT baking for FusedPointOpNode — biggest single win. lower_to_lut() already\n   exists,\
    \ just needs to be called in compute() instead of lower_to_closure().\n   4096-entry LUT with linear interpolation = O(1)\
    \ per channel per pixel.\n2. SIMD-friendly loop patterns — restructure hot loops to process 4 pixels at a\n   time using\
    \ [f32; 4] arrays that LLVM can auto-vectorize.\n3. Gaussian blur — separate horizontal/vertical passes already done,\
    \ but inner\n   accumulation loop should use array-of-structs to array-of-arrays transform.\n4. Audit remaining filters\
    \ for obvious scalar bottlenecks.\n"
