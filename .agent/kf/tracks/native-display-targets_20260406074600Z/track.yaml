id: native-display-targets_20260406074600Z
title: Native SDK display targets — zero-copy GPU blit to wgpu surfaces
type: feature
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: 'Add optional display target support to rasmcore-sdk-v2. Consumers

    provide wgpu surfaces (from their own windows); the SDK blits GPU

    compute results directly to them — zero CPU readback for display.

    '
  context: 'The browser SDK has addDisplay(name, canvas) which attaches render

    targets to pipeline nodes. The GPU blit shader maps the compute

    output buffer directly to the canvas texture. This is the zero-copy

    display path that makes interactive editing fast.


    The native SDK (rasmcore-sdk-v2) currently only supports headless

    compute: execute → readback → Vec<f32>. For native apps that want

    real-time preview (like a Rust GUI editor using egui/winit), they

    need the same zero-copy display path: compute result stays on GPU,

    blit shader maps it to a window surface.


    The SDK should NOT own windows. The consumer creates a wgpu::Surface

    from their own windowing system and passes it in. The SDK manages

    the blit pipeline, viewport uniforms, and display registration.

    Same separation of concerns as browser: host owns canvas, SDK

    owns the blit.

    '
  codebase_analysis: "Browser GpuHandlerV2 (gpu-handler-v2.ts):\n- displays: Map<string, DisplayRegistration>\n- addDisplay(name,\
    \ canvas, hdr): creates GPUCanvasContext, configures,\n  creates viewport uniform buffer\n- appendBlitPass(encoder, name,\
    \ pixelBuf): render pass reading from\n  storage buffer, writing to canvas texture via blit shader\n- display-blit.wgsl:\
    \ fullscreen triangle, viewport pan/zoom, tone mapping\n\nNative WgpuExecutorV2 (rasmcore-gpu-native):\n- Has device/queue\
    \ but no display surface support\n- execute() returns Vec<f32> via staging buffer readback\n- No blit pipeline, no surface\
    \ management\n\nrasmcore-sdk-v2:\n- Pipeline wraps Graph + GPU executor\n- render() does readback, write() encodes\n-\
    \ No display target concept yet\n\nWhat needs to be added:\n- Blit shader (port display-blit.wgsl to Rust-side)\n- DisplayTarget\
    \ struct: surface, context, viewport uniform, blit pipeline\n- Pipeline::add_display(name, surface) or similar API\n-\
    \ Pipeline::display(name) to blit current result to surface\n- Viewport update for pan/zoom\n"
  acceptance_criteria:
  - Pipeline::add_display(name, surface_config) registers a display target
  - Pipeline::blit(name) blits the current GPU result to the named surface
  - Zero CPU readback in the display path (compute buffer → blit → surface)
  - Viewport uniforms support pan/zoom/tone mapping per target
  - Multiple simultaneous display targets (viewport + scope panels)
  - Consumer provides wgpu::Surface — SDK does not create windows
  - Optional feature flag (display) — headless SDK has no surface deps
  - Works with winit, egui, SDL2, or any wgpu surface provider
  out_of_scope: 'Window creation, event loop, UI framework integration.

    That is the consumer''s responsibility.

    WebGPU browser display (already handled by GpuHandlerV2).

    '
  technical_notes: "Feature: rasmcore-sdk-v2 gets a \"display\" feature flag.\nWhen enabled, adds surface management and blit\
    \ pipeline.\n\nAPI sketch:\n  let mut pipe = Pipeline::open(&bytes)?\n      .brightness(0.15)?;\n\n  // Consumer creates\
    \ surface from their window\n  let surface = instance.create_surface(&window)?;\n\n  // Register as display target\n \
    \ pipe.add_display(\"viewport\", surface, &surface_config);\n\n  // On each frame: blit GPU result to surface (zero readback)\n\
    \  pipe.blit(\"viewport\");\n\n  // Pan/zoom\n  pipe.update_viewport(\"viewport\", pan_x, pan_y, zoom);\n\nBlit shader:\
    \ port display-blit.wgsl from web-ui.\nSame fullscreen-triangle approach, same viewport uniform layout.\n\nDisplayTarget\
    \ struct:\n  surface: wgpu::Surface\n  config: wgpu::SurfaceConfiguration\n  viewport_buf: wgpu::Buffer\n  blit_pipeline:\
    \ wgpu::RenderPipeline\n  blit_bind_group_layout: wgpu::BindGroupLayout\n\nThe blit pipeline is created once per display\
    \ target.\nEach blit() call: get current texture, create bind group with\ncompute output buffer + viewport uniform, render\
    \ pass, present.\n"
