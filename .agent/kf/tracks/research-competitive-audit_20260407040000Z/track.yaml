id: research-competitive-audit_20260407040000Z
title: "Research: competitive feature audit vs Lightroom, Photoshop, DaVinci Resolve, Nuke"
type: research
status: pending
created: '2026-04-07'
updated: '2026-04-07'
spec:
  summary: |
    Systematic feature-by-feature comparison of rasmcore against Adobe Lightroom,
    Adobe Photoshop, DaVinci Resolve, The Foundry Nuke, and Affinity Photo.
    Identifies gaps, parity achievements, and areas where rasmcore exceeds competitors.
    Produces a structured gap report with prioritized recommendations.
  context: |
    rasmcore has reached 679 completed tracks covering 140+ filters, GPU pipeline,
    WASM portability, color management, brush engine, text rendering, ML integration,
    and analysis protocols. Time for a rigorous competitive assessment to identify
    what's missing for professional parity and where to focus next.
  acceptance_criteria:
    - Feature matrix covering all products across all categories
    - Gap analysis identifying missing features per competitor
    - Priority ranking of gaps (P0 critical, P1 important, P2 nice-to-have)
    - Architectural assessment of what gaps require new infrastructure vs filter additions
    - Recommendations for next development phase
  out_of_scope: |
    Implementation of identified gaps (separate tracks).
    Performance benchmarking (separate effort).
    UI/UX comparison (rasmcore is an engine, not an app).
  technical_notes: |
    Assessment categories should cover:
    - Adjustment/correction (levels, curves, exposure, WB, HSL, tone mapping)
    - Color grading (CDL, LGG, color wheels, LUT support, ACES pipeline)
    - Spatial filters (blur, sharpen, denoise, detail enhancement)
    - Transform/geometry (crop, resize, perspective, lens correction, warp)
    - Compositing (blend modes, masking, alpha, keying)
    - Retouching (clone, heal, frequency separation, content-aware)
    - Drawing/paint (brush engine, shapes, text, patterns)
    - Analysis (histogram, scopes, focus peaking, zebra)
    - I/O (codec support, metadata, batch, RAW)
    - Color management (ICC, ACES, OCIO, working spaces)
    - GPU/performance (real-time preview, tiling, caching)
    - Automation (scripting, actions, presets, batch)
    - ML/AI (upscaling, denoise, segmentation, style transfer)
