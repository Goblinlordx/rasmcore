id: ml-wit-interface_20260407002600Z
title: Revise ml.wit interface with capability discovery and param schema
type: feature
status: pending
created: 2026-04-07
updated: 2026-04-07
spec:
  summary: |
    Update wit/core/ml.wit with refined schema: ml-output-kind (image/mask),
    reuse param-descriptor for model params, add display-name/category to
    capability info. Wire as import in pipeline world. Add apply-ml() to
    pipeline.wit.
  context: |
    The pipeline needs AI/ML support as a host-provided capability. The host
    declares available models at runtime via ml-capabilities(). Each model
    has typed parameters (reusing param-descriptor from the filter registry),
    output kind (image or mask), and dimension behavior (same size or scaled).

    An existing ml.wit stub exists but needs revision:
    - ml-capability-info lacks param descriptors, display name, category
    - ml-op uses list<u8> for tensor I/O (correct for cross-boundary)
    - ml-op uses string key-value params (should use typed param-descriptor)
    - No ml-output-kind enum
    - Not imported by the pipeline world

    The param-descriptor type already exists in pipeline.wit and is used by
    all 175+ filters. ML models should use the same schema so the SDK can
    auto-generate UI controls identically to filter controls.
  codebase_analysis: |
    Files to modify:
    - wit/core/ml.wit: revise records, add ml-output-kind enum
    - wit/v2/world.wit: add import ml (currently only exports pipeline-v2)
    - wit/v2/pipeline.wit: add apply-ml() method to image-pipeline-v2,
      add list-ml-models() for discovery
    - crates/rasmcore-v2-wasm/src/lib.rs: stub the WIT adapter methods

    Existing param-descriptor (pipeline.wit:50-58):
      record param-descriptor {
        name, value-type (param-type enum), min, max, step, default-val, hint
      }
    param-type covers: f32, f64, u32, i32, bool, string, rect

    The ml.wit interface should import param-descriptor from the pipeline
    or define a compatible type. Since ml.wit is in core/ (separate package),
    it may need its own copy or a shared types package.
  acceptance_criteria:
    - ml-output-kind enum with image and mask variants
    - ml-input-spec record with fixed-size, overlap, padding mode
    - ml-capability-info includes display-name, category, output-kind, output-scale, input-spec, params
    - ml-op designed for single-tile execution (pipeline handles tiling)
    - ml-execute return type supports GPU buffer path (not just raw bytes)
    - world.wit imports ml interface (optional import for backwards compat)
    - pipeline.wit has apply-ml(source, model-name, params) method
    - pipeline.wit has list-ml-models() discovery method
    - ml-stage added to stage-input variant for GPU plan integration
    - WASM adapter compiles with stub implementations
    - Existing pipeline functionality unaffected (ml import is optional)
  out_of_scope: |
    Implementing actual ML execution. SDK/host side. Model loading.
    GPU buffer interop. This track is WIT contract + WASM adapter stubs only.
  technical_notes: |
    Revised ml.wit schema (key changes from current stub):

    enum ml-output-kind { image, mask }

    enum ml-padding-mode { mirror, zero, clamp }

    // Model input requirements — pipeline uses this for tiling strategy.
    // tileMode distinguishes convolutional models (can tile) from global
    // context models (need full image). Pipeline handles tiling; host
    // just runs single-tile inference via ml-execute.
    //
    // Validated via Real-ESRGAN PoC (April 2026):
    // - Qualcomm ONNX export: fixed 128x128 (tileable)
    // - RMBG-1.4: full-image (1024x1024 resize)
    // - MiDaS: full-image (384x384 resize)

    enum ml-tile-mode {
      tileable,    // convolutional — can be split, overlap blends seams
      full-image,  // needs global context — resize to target-size, run once
    }

    record ml-input-spec {
      tile-mode: ml-tile-mode,
      // For tileable: preferred tile size, minimum tile size
      preferred-size: option<tuple<u32, u32>>,
      min-size: option<tuple<u32, u32>>,
      // For full-image: target resize dimensions
      target-size: option<tuple<u32, u32>>,
      overlap: u32,
      padding: ml-padding-mode,
    }

    record ml-capability-info {
      model: model-ref,
      display-name: string,
      category: string,           // enhancement, segmentation, upscale, generation
      output-kind: ml-output-kind,
      output-scale: option<u32>,  // None=same dims, Some(4)=4x upscale
      input-spec: ml-input-spec,  // tiling requirements
      input-desc: tensor-desc,    // tensor shape/dtype
      output-desc: tensor-desc,
      params: list<ml-param-descriptor>,
      backend: string,
      estimated-ms-per-tile: u32, // hint for UI progress estimation
    }

    record ml-param-descriptor {
      name: string,
      value-type: ml-param-type,
      min: option<f64>,
      max: option<f64>,
      step: option<f64>,
      default-val: option<f64>,
      hint: option<string>,
    }

    The apply-ml() method in pipeline.wit follows the same pattern as
    apply-filter(): takes source node, model name, serialized params buffer,
    returns new node-id. The graph node handles tensor conversion internally.

    Optional import pattern for backwards compat:
    - If host provides ml interface: ML features available
    - If host does not: apply-ml returns not-available error
    - SDK detects and hides ML UI when not available
