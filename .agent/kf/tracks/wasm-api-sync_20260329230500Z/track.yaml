title: Fix WASM Component Build and Integration Tests
type: bug
status: pending
created: '2026-03-30'
updated: '2026-03-29'
spec:
  summary: 'Implement 6 missing metadata trait methods in pipeline_adapter.rs and

    update 9 call sites in wasm-integration tests to match current API

    signatures. Restores demo/build.sh and validate.sh steps 5-6.

    '
  context: "The WASM component build (cargo component build -p rasmcore-image) fails\nwith E0046: GuestImagePipeline impl\
    \ in pipeline_adapter.rs:244 is missing\n6 metadata trait methods that were added to the WIT interface but never\nimplemented:\
    \ metadata_dump, metadata_read, keep_metadata, set_metadata,\nload_metadata, strip_metadata.\n\nThe wasm-integration test\
    \ crate also fails to compile with 9 errors:\n- wasm_bench.rs (6 errors): write/write_jpeg/write_png called with wrong\n\
    \  arg count (missing MetadataSet param), missing progressive field in\n  JpegEncodeConfig, missing filter_type in PngEncodeConfig\n\
    - wasm_parity.rs (3 errors): call_composite missing BlendMode arg,\n  call_write_png missing MetadataSet arg, missing\
    \ filter_type field\n\nThis blocks demo/build.sh (step 1: cargo component build) and\nvalidate.sh steps 5-6 (WASM build\
    \ + integration tests).\n"
  codebase_analysis: "- crates/rasmcore-image/src/adapter/pipeline_adapter.rs:244 — impl\n  GuestImagePipeline for PipelineResource\
    \ is missing 6 methods. The\n  trait definition lives in the generated bindings (bindings.rs) from\n  the WIT interface.\n\
    \n- tests/wasm-integration/tests/wasm_bench.rs — 6 call sites need\n  updated signatures:\n  - sink::write() needs 5th\
    \ arg Option<&MetadataSet>\n  - sink::write_jpeg() needs 4th arg\n  - sink::write_png() needs 4th arg\n  - JpegEncodeConfig\
    \ needs progressive: bool field\n  - PngEncodeConfig needs filter_type field (u8 or enum)\n\n- tests/wasm-integration/tests/wasm_parity.rs\
    \ — 3 call sites:\n  - call_composite() needs 7th arg Option<BlendMode>\n  - call_write_png() needs 5th arg Option<&MetadataSet>\n\
    \  - PngEncodeConfig needs filter_type field\n"
  acceptance_criteria:
  - cargo component build -p rasmcore-image succeeds (debug and release)
  - cargo test -p wasm-integration --no-run compiles without errors
  - demo/build.sh completes through step 2 (SDK generation)
  - validate.sh step 5 (WASM build) passes
  - Metadata trait methods return sensible defaults (empty/no-op for now)
  - No regressions in cargo test --workspace --lib
  out_of_scope: 'Full metadata pipeline implementation. The 6 trait methods should be

    stub implementations (return empty/error) sufficient to compile. Full

    metadata support is a separate track.

    '
  technical_notes: "1. Read the WIT-generated trait in bindings.rs to find exact signatures\n   for the 6 missing methods.\n\
    2. Implement stubs in pipeline_adapter.rs (e.g., return empty vec or\n   Err(\"not implemented\")).\n3. For wasm_bench.rs:\
    \ add the missing arguments to each call site.\n   Use None or default values for MetadataSet params.\n4. For wasm_parity.rs:\
    \ add missing BlendMode and MetadataSet args.\n5. Add missing struct fields (progressive, filter_type) with defaults.\n\
    6. Verify with cargo component build and cargo test --no-run.\n"
