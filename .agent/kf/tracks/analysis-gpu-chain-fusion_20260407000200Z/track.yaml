id: analysis-gpu-chain-fusion_20260407000200Z
title: GPU analysis→render chain fusion — zero-readback cross-node dispatch
type: feature
status: pending
created: 2026-04-07
updated: '2026-04-06'
spec:
  summary: 'Wire the analysis buffer foundation into the graph walker and GPU dispatch.

    collect_gpu_chain() learns to walk through analysis nodes and merge their

    shaders with downstream render nodes. GPU-default, zero CPU readback for

    analysis results that stay as GPU buffers.

    '
  context: "After Track 1 (foundation), nodes can declare analysis buffer\noutputs/inputs and gpu_shaders_with_context() accepts\
    \ resolved buffer IDs.\nThis track wires that into the actual execution path.\n\nCurrent execution (graph.rs:629-688):\n\
    \  request_region(node_id) →\n    collect_gpu_chain(node_id) → walks backwards, collects gpu_shaders()\n    request_region(source_id)\
    \ → gets input pixels\n    executor.execute(chain, pixels) → one GPU submit\n\ncollect_gpu_chain() (graph.rs:595-627)\
    \ stops at any node that:\n- Returns None from gpu_shaders()\n- Has 0 or 2+ upstreams\n\nThe change: collect_gpu_chain()\
    \ now does a two-step collection:\n1. Walk backwards as before, but also check analysis_outputs()/analysis_inputs()\n\
    2. When encountering an analysis node (has analysis_outputs and gpu_shaders),\n   include it in the chain rather than\
    \ stopping\n3. When the downstream render node has analysis_inputs(), use\n   gpu_shaders_with_context() instead of gpu_shaders()\
    \ to get resolved IDs\n4. Run negotiate_analysis_buffers() on the merged node list\n5. Rebuild the shader chain with resolved\
    \ buffer IDs\n\nThe execution path in request_region() stays the same structure —\nit just gets a longer chain that includes\
    \ analysis + render shaders\nsubmitted as one execute() call.\n\nReference: .agent/kf/_reports/analysis-render-pass-design.md\n"
  codebase_analysis: "Files modified:\n\n1. graph.rs — collect_gpu_chain():\n   - Currently stops at analysis nodes. Needs\
    \ to recognize them via\n     analysis_outputs() and continue walking.\n   - After collection, calls negotiate_analysis_buffers()\
    \ to get context.\n   - Calls gpu_shaders_with_context() instead of gpu_shaders() for nodes\n     that have analysis_inputs().\n\
    \   - Returns the merged chain as before — request_region() doesn't change.\n\n2. graph.rs — request_region():\n   - Minimal\
    \ change: the GPU dispatch block (lines 664-688) may need to\n     pass AnalysisBufferContext when collecting chains.\n\
    \   - The actual execute() call is unchanged — it already handles\n     ReductionBuffer IDs across the full ops slice.\n\
    \n3. graph.rs — render_gpu_plan() and render_multi_gpu_plan():\n   - Same pattern: use context-aware chain collection.\n\
    \   - Multi-output plans with shared analysis sources work via\n     StageInput::PriorStage (pixel sharing) + shared buffer\
    \ IDs.\n\nFiles NOT modified:\n- gpu.rs (GpuExecutor trait unchanged)\n- WgpuExecutorV2 (executor handles buffers correctly\
    \ already)\n- staged.rs (CPU path is separate track)\n- Any filter implementations (migration is separate track)\n- WASM\
    \ executor (same execute() contract)\n\nRisk areas:\n- collect_gpu_chain() is on the critical render path. Changes must\
    \ be\n  carefully tested. Default behavior (no analysis nodes) must produce\n  identical chains to current code.\n- Buffer\
    \ ID collision between a node's internal reduction buffers and\n  cross-node negotiated IDs. Negotiation uses IDs starting\
    \ at 1000 to\n  avoid collision with typical 0-based internal IDs.\n"
  acceptance_criteria:
  - collect_gpu_chain() walks through analysis nodes instead of stopping
  - Merged chains include analysis reduction passes + render apply passes
  - Buffer IDs are globally unique via negotiate_analysis_buffers()
  - Single execute() call for analysis→render pairs (zero CPU readback)
  - Existing GPU chains (no analysis nodes) produce identical results
  - request_region() GPU dispatch works with merged chains
  - render_gpu_plan() and render_multi_gpu_plan() support merged chains
  - Regression test suite passes — all existing GPU dispatch paths unchanged
  - Performance test — merged chain is faster than separate execute() calls
  - Chain with analysis→render→analysis→render fuses into stages correctly
  out_of_scope: '- CPU fallback for geometry-changing analysis (Track 3)

    - Concrete filter implementations using the new protocol (Track 4)

    - GpuExecutor trait changes (not needed — executor already handles this)

    - WASM-specific changes (same execute() contract)

    '
  technical_notes: "The key insight: collect_gpu_chain() change is small but critical.\n\nCurrent logic (pseudocode):\n  walk\
    \ backwards from sink:\n    if node.gpu_shaders().is_some() && node.upstream_ids().len() == 1:\n      prepend shaders\
    \ to chain\n      continue walking\n    else:\n      stop\n\nNew logic:\n  walk backwards from sink:\n    if node.has_analysis_inputs():\n\
    \      use gpu_shaders_with_context(w, h, &context) instead\n    if node.gpu_shaders().is_some() && node.upstream_ids().len()\
    \ == 1:\n      prepend shaders to chain\n      if node.has_analysis_outputs():\n        mark as analysis node (for negotiation)\n\
    \      continue walking\n    else:\n      stop\n\n  after collection:\n    if any analysis nodes found:\n      context\
    \ = negotiate_analysis_buffers(chain_nodes)\n      rebuild shaders using gpu_shaders_with_context for affected nodes\n\
    \nTwo-pass approach for safety:\n1. First pass: collect nodes as before (identify the chain)\n2. If analysis nodes present:\
    \ second pass with context to get resolved shaders\n3. If no analysis nodes: identical to current behavior (no overhead)\n\
    \nThe \"no analysis nodes\" fast path ensures zero performance regression\nfor existing pipelines.\n\nFor sequential analysis→render→analysis→render\
    \ chains:\nThe entire chain CAN be one execute() call if:\n- All analysis results are GPU buffers (not geometry changes)\n\
    - Each analysis's reduction passes output=input (passthrough pixels)\n- The render passes between analyses transform pixels\
    \ normally\n- Each analysis→render pair uses distinct buffer ID ranges\n\nIf an analysis produces a geometry change (needs\
    \ CPU), the chain\nsplits at that point. This is handled by Track 3 (staged CPU path).\n"
