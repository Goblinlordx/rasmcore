id: gpu-filter-attribute_20260402042202Z
title: "GPU registration via filter attribute — eliminate gpu_impls.rs scanning"
type: refactor
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: |
    Add gpu_shader attribute to #[register_filter] so GPU capability is declared
    at the filter level. Codegen generates GpuCapable impls from the attribute
    instead of scanning a separate gpu_impls.rs file at build time.
  context: |
    Currently GPU support is registered via manual impl blocks in a separate
    gpu_impls.rs file, and build.rs scans that file for impl patterns to populate
    a hashset. This is fragile (regex-based scanning) and requires editing
    a central file for every new GPU filter.

    The filter macro already has point_op and color_op flags. Adding gpu_shader
    follows the same pattern — declare capability at the source, let codegen
    handle the wiring.
  acceptance_criteria:
    - '#[register_filter(gpu_shader = "blur.wgsl")]' attribute supported
    - Codegen generates GpuCapable impl for annotated filters
    - gpu_impls.rs eliminated (or reduced to non-filter GPU nodes only)
    - build.rs GPU scanning phase simplified or removed
    - All existing GPU parity tests pass unchanged
    - WASM + native builds succeed
  out_of_scope: |
    Changing GPU shader implementations. Adding new GPU filters.
    Codec or transform registration changes.
