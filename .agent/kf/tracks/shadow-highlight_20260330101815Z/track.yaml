id: shadow-highlight_20260330101815Z
title: Shadow/Highlight Adjustment
type: feature
status: pending
created: 2026-03-30
updated: '2026-03-30'
spec:
  summary: 'Add shadow/highlight local tone adjustment — independently lighten shadows and darken highlights. The last major
    missing Photoshop Image > Adjustments operation.

    '
  context: 'Photoshop''s Shadow/Highlight is one of its most-used adjustments for

    recovering detail in over/underexposed images. It works by detecting

    local luminance and applying different tone curves to shadow vs highlight

    regions. Unlike global brightness/contrast, it preserves mid-tones.

    No direct ImageMagick equivalent exists — vips has lab-based approaches.

    '
  codebase_analysis: "- Existing tone adjustments: brightness, contrast, gamma, levels, curves,\n  sigmoidal_contrast, auto_level,\
    \ equalize, normalize — all GLOBAL\n- split_toning exists but tints by hue, doesn't adjust luminance\n- tonemap_reinhard/drago/filmic\
    \ exist for HDR but are global tonemappers\n- ColorLut3D infrastructure could bake shadow/highlight as a 3D LUT\n- blur()\
    \ available for computing local luminance (low-frequency component)\n- frequency_high/low separation already exists for\
    \ similar decomposition\n- Bilateral filter exists for edge-preserving smoothing (useful for mask)\n"
  acceptance_criteria:
  - shadow_highlight filter registered with shadow_amount, highlight_amount, radius params
  - shadow_amount=0 and highlight_amount=0 is identity
  - Shadows lightened without blowing out highlights
  - Highlights darkened without crushing shadows
  - Edge-aware (no halo artifacts at strong settings)
  - Supports RGB8, RGBA8, Gray8 (alpha preserved)
  - Reference validation against manual Photoshop comparison or GIMP equivalent
  - ConfigParams with proper param hints
  out_of_scope: 'Per-channel shadow/highlight. Tone width / color correction sub-controls

    (Photoshop''s advanced mode). HDR toning.

    '
  technical_notes: "Algorithm (Photoshop-style local tone mapping):\n1. Convert to luminance channel (BT.709)\n2. Blur luminance\
    \ with large radius (edge-preserving via bilateral or gaussian)\n   to get local brightness map\n3. For each pixel, compute\
    \ shadow weight = smoothstep(0, threshold, local_lum)\n   and highlight weight = smoothstep(threshold, 1, local_lum)\n\
    4. Apply tonal boost/cut: shadow regions get lightened, highlight regions darkened\n5. Blend back with original using\
    \ the weight masks\n\nAlternative simpler approach: unsharp-mask-style local contrast\n- low_freq = blur(image, radius)\n\
    - shadow_boost = max(0, low_freq - image) * shadow_amount\n- highlight_cut = max(0, image - low_freq) * highlight_amount\n\
    - output = image + shadow_boost - highlight_cut\n\nReference: GIMP Colors > Shadows-Highlights uses a similar bilateral\
    \ approach.\nValidate via GIMP Script-Fu or by visual comparison with known PS output.\n"
