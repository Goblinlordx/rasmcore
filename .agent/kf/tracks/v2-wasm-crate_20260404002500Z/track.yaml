spec:
  summary: 'New crate rasmcore-v2-wasm that implements the WIT pipeline interface using exclusively V2 Graph + create_filter_node()
    + codecs-v2. Zero V1.

    '
  context: 'The V2 pipeline exists (Graph, Filter, 88 filter structs, codecs-v2) but

    has no WASM component delivery path. The only WASM component (rasmcore-image)

    uses V1 exclusively. V2 needs its own WASM crate that builds independently.

    '
  acceptance_criteria:
  - New crate crates/rasmcore-v2-wasm/ with Cargo.toml
  - Implements WIT pipeline interface (read, node_info, filters, write)
  - Uses V2 Graph as pipeline state (not V1 NodeGraph)
  - read() decodes via codecs-v2 to f32 source node
  - Filters dispatch via create_filter_node() (V2 registry)
  - write() encodes via codecs-v2 (f32 -> gamma -> quantize -> format)
  - cargo component build produces valid WASM
  - brightness +0.5 then -0.5 produces no information loss (f32 precision)
  - Zero V1 code in execution path
  out_of_scope: 'Auto-generated WIT (hand-written for now). Full 200+ filter coverage.

    GPU dispatch. Web UI integration.

    '
  technical_notes: 'Start with a minimal WIT interface: read, node_info, brightness, write.

    Prove the V2-only path works end-to-end. Then expand filter coverage.

    WIT can reuse existing wit/image/ declarations or create wit/v2/.

    '
