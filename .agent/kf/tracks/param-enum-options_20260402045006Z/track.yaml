id: param-enum-options_20260402045006Z
title: Add per-option descriptions to enum params in param-manifest
type: feature
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: 'Extend #[param] attribute to support per-option descriptions for enum/choice

    parameters, so the manifest and UI can display rich info about each choice.

    '
  context: 'Filters with method/mode parameters (e.g., colorize method: "w3c" vs "lab")

    need user-facing descriptions explaining how each option behaves differently.

    Currently the manifest emits bare value strings with no descriptions.


    This is needed before colorize can expose a method parameter with

    meaningful documentation about the W3C vs CIELAB approaches.

    '
  codebase_analysis: "Current param infrastructure:\n- #[param(min, max, step, default, hint)] on struct fields\n- Doc comments\
    \ (///) become \"label\" in manifest\n- hint = \"rc.enum\" tells UI to render dropdown\n- ParamField struct in codegen/types.rs\
    \ has: name, type, min, max, step,\n  default_val, label, hint\n- Manifest generation in codegen/generate/manifest.rs\
    \ emits field_to_json()\n\nWhat needs to change:\n1. Add options field to ParamField (Vec of {value, description})\n2.\
    \ Parse #[param(options = \"val1:desc1,val2:desc2\")] or a cleaner syntax\n3. Emit \"options\" array in manifest JSON\n\
    4. Update param-hints.md style guide\n\nFiles affected:\n- crates/rasmcore-codegen/src/types.rs (ParamField struct)\n\
    - crates/rasmcore-codegen/src/parse/mod.rs (parse #[param] options)\n- crates/rasmcore-codegen/src/generate/manifest.rs\
    \ (emit options in JSON)\n- crates/rasmcore-macros/ (ConfigParams derive macro — parse new attr)\n- .agent/kf/code_styleguides/param-hints.md\
    \ (document the new attribute)\n"
  acceptance_criteria:
  - param(options) syntax parsed by ConfigParams derive macro
  - ParamField carries options as Vec<(String, String)>
  - param-manifest.json emits options array with value + description per entry
  - Existing filters without options are unaffected (backwards compatible)
  - At least one filter uses the new options syntax (colorize method is the target consumer)
  - param-hints.md updated with options documentation
  out_of_scope: 'UI rendering of option descriptions (separate frontend concern).

    Validation that param values match declared options at runtime.

    '
  technical_notes: "Proposed syntax (inline, simple):\n  #[param(default = \"w3c\", hint = \"rc.enum\",\n          options\
    \ = \"w3c:PS/W3C standard|lab:CIELAB perceptual\")]\nUsing | as separator (not comma) to avoid conflicts with description\
    \ text.\n\nAlternative (more verbose but cleaner):\n  #[param_option(value = \"w3c\", description = \"PS/W3C standard...\"\
    )]\n  #[param_option(value = \"lab\", description = \"CIELAB perceptual...\")]\nThis is more Rust-idiomatic but requires\
    \ parsing multiple attributes.\n\nRecommend the inline syntax for simplicity — it matches the existing\n#[param] pattern\
    \ and doesn't require new attribute registration.\n"
