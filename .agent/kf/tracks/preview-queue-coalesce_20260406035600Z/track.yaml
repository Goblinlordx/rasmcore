id: preview-queue-coalesce_20260406035600Z
title: Fix preview render queue to coalesce stale requests
type: bug
status: pending
created: 2026-04-06
updated: '2026-04-06'
spec:
  summary: 'The single-slot queue in usePreviewWorker drains after every render

    completion, causing sequential rendering of intermediate slider values.

    After releasing a slow-filter slider, the UI renders many stale states

    instead of jumping to the latest. Fix with generation-counter staleness

    detection and rAF-based input coalescing.

    '
  context: "When dragging a slider on a slow filter (e.g., bilateral, NLM denoise),\nthe UI continues rendering intermediate\
    \ values sequentially after the\nslider is released. Expected behavior: at most 2 renders after release\n(the one currently\
    \ executing + the latest queued state).\n\nProfessional image editors solve this with either:\n1. Generation counters\
    \ (Photoshop) — each request gets a monotonic ID,\n   worker skips any request whose generation is not the latest\n2.\
    \ rAF coalescing (Figma) — slider input events are batched per frame,\n   only the last value per frame dispatches a render\
    \ request\n\nBoth approaches are complementary and should be applied together.\n"
  codebase_analysis: "usePreviewWorker.ts (lines 34, 99-106, 202-215):\n  Single-slot queue via queuedChainRef. When processing\
    \ completes,\n  queue drains immediately. Each slider onChange replaces the queued\n  chain, but if the render is fast\
    \ enough, the queue drains before\n  the next event arrives — causing sequential execution of values\n  that arrived while\
    \ the previous render was in flight.\n\nEffectStack.tsx (line 70):\n  onParamChange calls onSchedulePreview() immediately\
    \ — no debounce.\n\nApp.tsx (lines 226-231):\n  schedulePreview() calls preview.processMulti() directly. Comment\n  says\
    \ \"single-slot queue handles backpressure\" but this is only\n  true when renders are fast relative to input rate.\n\n\
    useWorker.ts (lines 29, 156-176):\n  Full-resolution pipeline worker has same single-slot pattern.\n\nv2-preview-worker.ts\
    \ (lines 571-611):\n  Worker processes each message synchronously, no generation check.\n"
  acceptance_criteria:
  - After releasing a slider, at most 2 renders execute (current + latest queued)
  - Slider drag on slow filters (bilateral, NLM) feels responsive — no stale render cascade
  - Fast filters (brightness, contrast) still render on every frame (no added latency)
  - Generation counter visible in worker message protocol for debugging
  - useWorker.ts (full-res pipeline) gets the same fix
  out_of_scope: '- Proxy/downscale rendering during drag (separate optimization)

    - GPU acceleration of slow filters (separate track)

    - Cancellation of in-flight WASM computation (not possible without threads)

    '
  technical_notes: "Two complementary fixes:\n\n1. rAF coalescing on the dispatch side (App.tsx / schedulePreview):\n   Instead\
    \ of calling processMulti() on every onChange, set a dirty\n   flag and schedule a rAF callback. The rAF callback reads\
    \ the\n   latest state and dispatches once per frame. This limits dispatch\n   to ~60Hz regardless of input event rate.\n\
    \n   let rafId = 0;\n   const schedulePreview = () => {\n     if (rafId) return; // already scheduled\n     rafId = requestAnimationFrame(()\
    \ => {\n       rafId = 0;\n       preview.processMulti(serializeChain(), [selectedScope]);\n     });\n   };\n\n2. Generation\
    \ counter on the queue side (usePreviewWorker.ts):\n   Add a monotonic generation counter. Each processMulti() call\n\
    \   increments the generation and includes it in the message. When\n   a render completes and the queue is drained, check\
    \ if the queued\n   generation matches the current generation. If not, skip it and\n   drain again until latest.\n\n \
    \  Actually simpler: the single-slot queue already replaces previous\n   entries. The real fix is ensuring the queue is\
    \ ONLY drained once\n   after completion, not re-entered. The rAF coalescing is the\n   primary fix — it prevents the\
    \ queue from being filled faster\n   than it drains.\n\nThe rAF approach is sufficient alone but the generation counter\n\
    adds defense in depth for edge cases (e.g., programmatic param\nchanges that bypass rAF).\n"
