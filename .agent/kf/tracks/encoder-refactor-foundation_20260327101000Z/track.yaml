id: encoder-refactor-foundation_20260327101000Z
title: Image Codec Per-Format Foundation — Directory Structure & WIT Pattern
type: refactor
status: pending
created: 2026-03-27
updated: '2026-03-28'
spec:
  summary: 'Split monolithic encoder.rs and decoder.rs into per-format module directories,

    establish WIT convention for per-format config records and encode/decode

    functions. Generic encode()/decode() preserved as convenience wrappers.

    '
  context: 'Both the encoder and decoder currently use monolithic files with match

    statements dispatching to different formats. The project decision is to use

    precisely defined typed config records per format, with each format in its

    own module file. This covers both encoding AND decoding — each codec is a

    full encode+decode pair.


    This foundation track establishes the directory structure and WIT pattern for

    both encoder/ and decoder/ directories. Individual codec tracks (JPEG, PNG,

    WebP) will add format-specific parameters and standards-aligned behavior.

    '
  codebase_analysis: '- domain/encoder.rs: 80 lines, 3 formats (PNG/JPEG/WebP), one match statement

    - domain/decoder.rs: 258 lines, 9 formats, match-based dispatch

    - wit/image/encoder.wit: single encode(format, quality) function

    - wit/image/decoder.wit: generic decode/detect-format/decode-as functions

    - adapter/mod.rs: thin passthrough for both encoder and decoder

    - 10 domain encoder tests, 15 domain decoder tests

    - Parity tests in Rust WASM integration and TS SDK suites

    '
  acceptance_criteria:
  - domain/encoder.rs replaced by domain/encoder/ directory with mod.rs + per-format files
  - domain/decoder.rs replaced by domain/decoder/ directory with mod.rs + per-format files
  - Each existing encode format (jpeg.rs, png.rs, webp.rs) has its own encoder file
  - Each existing decode format has its own decoder file (or grouped logically)
  - WIT encoder.wit updated with per-format encode function stubs
  - WIT decoder.wit updated with per-format decode-config records where relevant
  - Generic encode() and decode() wrappers preserved for backward compatibility
  - Adapter layer updated to dispatch per-format WIT calls
  - All existing tests pass unchanged
  out_of_scope: '- Adding new format-specific parameters (per-codec track work)

    - Adding new formats beyond existing ones

    - Standards alignment (per-codec track work)

    '
  technical_notes: "The split should be mechanical — move existing code into per-format files\nwithout changing behavior.\n\
    \nEncoder pattern per format:\n- WIT record: {format}-encode-config\n- WIT function: encode-{format}(pixels, info, config)\
    \ -> result<buffer, error>\n- Domain struct: {Format}EncodeConfig\n- Domain function: encode(pixels, info, config) ->\
    \ Result<Vec<u8>, ImageError>\n\nDecoder pattern per format:\n- WIT record: {format}-decode-config (where relevant, e.g.,\
    \ JPEG color management)\n- WIT function: decode-{format}(data, config) -> result<decoded-image, error>\n- Most formats\
    \ need no decode config initially — the per-format decode function\n  with default config is still useful for dispatch\
    \ clarity\n\nKeep format detection (detect_format) in the decoder mod.rs — it spans all formats.\n"
