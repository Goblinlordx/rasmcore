id: codegen-encoder-adapters_20260331015558Z
title: Auto-Generate Pipeline Write Methods from Registered Encoders
type: refactor
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: 'Replace the 10 hard-coded write_jpeg/write_png/... pipeline adapter

    methods with auto-generated code from #[register_encoder] annotations.

    Adding a new encoder should automatically produce a pipeline write

    method and WIT declaration — no manual adapter wiring.

    '
  context: 'The pipeline adapter has 10 hand-written write methods (write_jpeg,

    write_png, write_webp, write_bmp, write_ico, write_qoi, write_gif,

    write_avif, write_tiff, write). Each one manually maps WIT config

    types to domain config structs and calls the corresponding sink

    function. This means adding a new encoder requires:

    1. Add the domain encoder function

    2. Add a WIT write config record

    3. Add a WIT write method to image-pipeline

    4. Add an adapter method in pipeline_adapter.rs

    5. Wire the WIT config mapping


    Steps 2-5 should be auto-generated from the encoder registration,

    the same way filter methods are auto-generated from #[register_filter].

    The rasmcore-codegen crate already parses #[register_encoder] — it

    just needs a new generation target for pipeline write methods.

    '
  codebase_analysis: "CURRENT STATE:\n- 10 write methods in pipeline_adapter.rs (lines 480-640)\n- Each maps WIT config ->\
    \ domain config -> sink::write_xxx()\n- WIT pipeline.wit has 10 write-xxx functions + 10 config records\n- rasmcore-codegen\
    \ parses #[register_encoder] but only generates\n  encoder adapter code, not pipeline write methods\n\nENCODER REGISTRATIONS:\n\
    - #[register_encoder(name, format, mime, extensions)]\n- Each encoder has a typed config struct (JpegEncodeConfig, etc.)\n\
    - Sink module has write_xxx functions for each format\n\nCODEGEN INTEGRATION:\n- rasmcore-codegen/src/parse/filters.rs\
    \ handles register_filter\n- Need: rasmcore-codegen/src/parse/encoders.rs for register_encoder\n- rasmcore-codegen/src/generate/\
    \ needs pipeline_write.rs generator\n- build.rs already calls rasmcore_codegen — just needs new output\n\nWHAT TO GENERATE:\n\
    1. WIT write config records (from encoder ConfigParams)\n2. WIT write-xxx methods on image-pipeline resource\n3. Adapter\
    \ methods mapping WIT config -> domain config -> sink call\n4. Each generated method includes finalize_layer_cache() call\n"
  acceptance_criteria:
  - All 10 existing write methods replaced with generated code
  - Generated from
  - Adding a new encoder with registration auto-generates pipeline write method
  - Generated WIT declarations match current ones (backward compatible)
  - Generated adapter code includes finalize_layer_cache() calls
  - Pipeline tests pass unchanged
  - WASM component builds with generated write methods
  out_of_scope: 'Decoder pipeline registration (read methods). Filter method generation

    changes (already working). New encoder implementations.

    '
  technical_notes: "GENERATION PIPELINE:\n\n1. Parse #[register_encoder] from encoder files:\n   - Extract: name, format,\
    \ mime, extensions\n   - Find matching encode config struct (e.g., JpegEncodeConfig)\n   - Parse config struct fields\
    \ as typed params\n\n2. Generate WIT write config records:\n   record jpeg-write-config {\n       quality: option<u8>,\n\
    \       progressive: option<bool>,\n   }\n\n3. Generate WIT write methods:\n   write-jpeg: func(source: node-id, config:\
    \ jpeg-write-config,\n                    metadata: option<metadata-set>)\n               -> result<buffer, rasmcore-error>;\n\
    \n4. Generate adapter methods:\n   fn write_jpeg(&self, source: NodeId, config: JpegWriteConfig, ...)\n       -> Result<Vec<u8>,\
    \ RasmcoreError> {\n       let cfg = to_domain_config(&config);\n       let result = sink::write_jpeg(&mut self.graph.borrow_mut(),\
    \ ...);\n       self.finalize_cache();\n       result\n   }\n\nNEW CODEGEN MODULE:\nrasmcore-codegen/src/generate/pipeline_write.rs\n\
    - generate_wit_write_configs(encoders) -> String\n- generate_wit_write_methods(encoders) -> String\n- generate_adapter_write_methods(encoders)\
    \ -> String\n\nENCODER CONFIG MAPPING:\nEach encoder's config struct is parsed the same way as ConfigParams.\nThe WIT\
    \ type mapping is: Rust f32->f32, u8->u8, bool->bool, etc.\nOptional fields become option<T> in WIT.\n"
