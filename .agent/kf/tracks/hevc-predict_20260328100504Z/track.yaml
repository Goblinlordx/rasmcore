id: hevc-predict_20260328100504Z
title: HEVC Intra Prediction — 35 Angular Modes + DC + Planar
type: feature
status: pending
created: '2026-03-28'
updated: '2026-03-28'
spec:
  summary: Implement all 35 HEVC intra prediction modes for luma and chroma. Generates predicted blocks from neighboring reference
    samples for each PU.
  context: 'Intra prediction generates the predicted block that residuals are added to. For HEIC (I-frame only), this is the
    only prediction mode. 35 modes: Planar(0), DC(1), Angular(2-34). Reference sample construction from neighboring reconstructed
    pixels.'
  codebase_analysis: Depends on hevc-params for SPS config (bit depth, block sizes). Similar to rasmcore-webp predict.rs (VP8
    has 4 intra modes for 16x16, 10 for 4x4) but HEVC has 35 modes with angular projections at specific angles. rasmcore-webp
    predict.rs is 823 LOC — HEVC predict will be ~2500 LOC due to more modes and block sizes.
  acceptance_criteria:
  - Reference sample construction from neighboring reconstructed pixels (top, left, top-left, top-right, bottom-left)
  - Reference sample filtering (strong intra smoothing for large blocks)
  - Planar mode (mode 0) prediction for all block sizes
  - DC mode (mode 1) prediction with DC filter
  - Angular modes (2-34) with correct angle lookup and reference sample projection
  - Chroma intra prediction mode derivation from luma mode
  - Unit tests for each mode class with known reference outputs
  out_of_scope: Inter prediction (motion vectors, merge mode) — not needed for HEIC I-frames. Strong intra smoothing filter
    is included.
  technical_notes: 'ITU-T H.265 Section 8.4.4. Block sizes: 4x4 through 32x32. Mode 0 (Planar): bilinear interpolation. Mode
    1 (DC): average of reference samples. Modes 2-34 (Angular): directional projection at angles from -135 to +45 degrees.
    Reference sample construction: filter flag based on mode and block size. Reference sample substitution when neighbors
    unavailable.'
plan:
- phase: Reference Samples
  tasks:
  - text: Implement reference sample construction — gather top, left, top-left, top-right, bottom-left neighbors from reconstructed
      frame buffer
    done: true
  - text: Implement reference sample substitution for unavailable neighbors (edge/corner blocks)
    done: true
  - text: Implement reference sample filtering (3-tap filter for applicable modes, strong intra smoothing for large blocks)
    done: true
- phase: Prediction Modes
  tasks:
  - text: Implement Planar mode (mode 0) — bilinear interpolation using top-right and bottom-left endpoints
    done: true
  - text: Implement DC mode (mode 1) — average of reference samples with boundary filter
    done: true
  - text: Implement Angular modes (2-34) — angle table lookup, reference index/fraction computation, projection with linear
      interpolation
    done: true
  - text: Implement chroma intra prediction mode derivation (DM mode, angular mapping from luma)
    done: true
- phase: Verification
  tasks:
  - text: Unit tests for reference sample construction (interior block, edge block, corner block)
    done: true
  - text: Unit tests for Planar and DC modes with known 4x4 and 8x8 blocks
    done: true
  - text: Unit tests for angular modes at key angles (horizontal, vertical, diagonal)
    done: true
  - text: Determinism test — same input always produces same prediction
    done: true
