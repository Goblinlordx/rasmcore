id: mask-blend-if_20260330114037Z
title: Mask Apply & Blend-If Conditional Compositing
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Add mask_apply (grayscale mask to alpha) and blend_if (PS-style conditional

    blending by luminosity range). Two compositing building blocks missing from

    the alpha/compositing toolset.

    '
  context: 'mask_apply converts a grayscale image into an alpha channel mask — fundamental

    for selective editing workflows. IM uses -compose CopyOpacity. blend_if is

    Photoshop''s Blend If slider: it blends two layers conditionally based on

    luminosity ranges (e.g., only affect highlights, protect shadows). Both are

    essential compositing primitives.

    '
  codebase_analysis: 'EXISTING COMPOSITING:

    - alpha_composite_over() in composite.rs — standard Porter-Duff over

    - blend() in filters.rs — 19 blend modes (multiply, screen, overlay, etc.)

    - premultiply/unpremultiply — alpha state management

    - flatten — composite over solid background


    MISSING:

    - mask_apply: no function to set alpha from external grayscale mask

    - blend_if: no luminosity-range conditional blending


    INFRASTRUCTURE:

    - PixelFormat::Rgba8 is the standard compositing format

    - BT.709 luminance used throughout (0.2126R + 0.7152G + 0.0722B)

    - Sigmoid/smooth-step transitions available in sigmoidal_contrast

    '
  acceptance_criteria:
  - mask_apply takes image + grayscale mask, outputs RGBA with alpha = mask value
  - mask_apply works with different-size masks (resized to match image)
  - blend_if takes two images + luminosity range params, produces conditional blend
  - blend_if has smooth feathering at range boundaries (not hard cutoff)
  - blend_if params match PS convention (this_layer_black, this_layer_white, underlying_black, underlying_white)
  - Both registered with ConfigParams
  - IM parity test for mask_apply vs -compose CopyOpacity (EXACT tier)
  - Both support RGB8 and RGBA8 input
  out_of_scope: 'Per-channel blend-if (R/G/B separate). Mask painting/generation.

    Layer group blending. Clipping masks.

    '
  technical_notes: 'MASK APPLY:

    - Convert input to RGBA8 if not already

    - For each pixel: output.alpha = mask_gray_value

    - If mask is different size, nearest-neighbor resize to match

    - IM: magick image mask -compose CopyOpacity -composite output


    BLEND IF:

    - For each pixel, compute luminosity of both layers

    - this_layer range: [black, white] defines where THIS layer is visible

    - underlying range: [black, white] defines where UNDERLYING layer shows through

    - Feather width (e.g., 10 levels) creates smooth sigmoid transition

    - Output = lerp(underlying, this_layer, blend_factor)

    - blend_factor = smoothstep(this_luma, range) * smoothstep(under_luma, range)

    '
