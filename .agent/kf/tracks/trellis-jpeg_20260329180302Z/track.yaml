id: trellis-jpeg_20260329180302Z
title: JPEG Trellis Integration — Optimal Coefficient Quantization (mozjpeg-Style)
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-28'
spec:
  summary: 'Implement TrellisContext for JPEG Huffman coding and wire into the JPEG encoder.

    JPEG trellis optimizes the 64 DCT coefficients per 8x8 block against Huffman

    encoding cost. This is the core optimization that makes mozjpeg produce 10-15%

    smaller files than libjpeg at the same quality.

    '
  context: 'JPEG uses Huffman coding for coefficient entropy. The token cost model is simpler

    than VP8 — each non-zero coefficient costs a Huffman category code + extra bits,

    and runs of zeros before it cost a run-length code. Trellis optimizes the tradeoff

    between coefficient precision and Huffman encoding efficiency.


    mozjpeg''s trellis quantization is the gold standard for JPEG quality optimization.

    It considers that zeroing a coefficient extends the zero-run for the next non-zero

    coefficient, which may have a cheaper Huffman code at a longer run length.

    '
  codebase_analysis: 'rasmcore-jpeg/src/quantize.rs: quantize() maps 64 i32 DCT coefficients to i16

    quantized values using division by quantization table entries. No trellis.


    rasmcore-jpeg/src/entropy.rs: Huffman encoding uses magnitude categories (0-11)

    and zero run-length encoding (run, category) pairs. The cost model for trellis

    needs to compute bits per (run, level) combination.


    The JPEG context model is different from VP8:

    - State = current zero run length (0-15)

    - Token = (run_length, category) Huffman code + extra bits

    - EOB = special (0,0) symbol

    '
  acceptance_criteria:
  - JpegTrellisContext implements TrellisContext using Huffman code costs
  - Context state tracks zero run length for run-length encoding
  - Wire trellis into JPEG encode path (quantize.rs or lib.rs encode pipeline)
  - File size reduction >= 5% vs non-trellis at same PSNR
  - Three-way parity vs image crate maintains or improves
  - All existing JPEG tests pass
  out_of_scope: 'Progressive JPEG trellis (spectral selection bands). DC coefficient trellis

    (DC is DPCM-coded, different model). Optimized Huffman table generation

    (orthogonal optimization). Custom quantization table design.

    '
  technical_notes: "JPEG Huffman cost model:\n  For a coefficient at position pos with zero_run preceding zeros:\n    if level\
    \ == 0: extends the run (no immediate cost, but affects next coeff)\n    if level != 0:\n      category = magnitude_category(level)\
    \  // 0-11\n      run_category_code = huffman_code_length(run, category)  // from AC Huffman table\n      extra_bits =\
    \ category  // bits to encode exact value within category\n      total_bits = run_category_code + extra_bits\n    if run\
    \ >= 16: emit ZRL (15,0) symbol, cost = huffman_code_length(15, 0)\n\nJpegTrellisContext:\n  const NUM_STATES: usize =\
    \ 16;  // zero run length 0-15\n\n  fn token_cost(&self, level, position, state) -> u32 {\n      // state = current zero\
    \ run length\n      if level == 0: return 0  // just extends the run (state transitions)\n      let cat = magnitude_category(level);\n\
    \      huffman_bits(state, cat) * 256 + cat * 256  // code + extra bits\n  }\n\n  fn next_state(&self, level, state) ->\
    \ usize {\n      if level == 0 { (state + 1).min(15) } else { 0 }  // reset run on non-zero\n  }\n"
