id: simd-spatial-accum_20260404235001Z
title: SIMD f32x4 accumulation for V2 spatial filter inner loops
type: chore
status: pending
created: 2026-04-04
updated: '2026-04-05'
spec:
  summary: 'Replace scalar sum[c] += kw * input[idx+c] accumulation in gaussian blur,

    box blur, convolve, motion blur, and bilateral with [f32; 4] array

    patterns for auto-vectorization on all targets.

    '
  context: 'V2 spatial filters use a common inner-loop pattern for neighborhood

    accumulation: iterate kernel taps, multiply-accumulate into sum[0..4].

    Currently this is a scalar for c in 0..4 loop inside the kernel loop.

    Restructuring to use [f32; 4] array multiply-accumulate gives LLVM a

    clear f32x4 vectorization target — the 4-channel accumulation becomes

    a single f32x4 FMA instruction per kernel tap.


    The cpu-render-audit track already split gaussian blur into boundary

    and interior paths. This track builds on that by vectorizing the

    accumulation in both paths.

    '
  codebase_analysis: "All in crates/rasmcore-pipeline-v2/src/filters/spatial.rs:\n\nGaussianBlur — H pass boundary (lines\
    \ 75-101), H pass interior (107-119),\n  V pass boundary (127-156), V pass interior (162-177)\n  Pattern: sum[c] += kw\
    \ * input[idx + c] for c in 0..4\n  Already split into boundary/interior by cpu-render-audit track.\n\nBoxBlur — H pass\
    \ (212-227), V pass (231-246)\n  Pattern: sum[c] += input[idx + c] for c in 0..4\n\nConvolve — generic 2D kernel (359-378)\n\
    \  Pattern: sum[c] += k * input[idx + c] for c in 0..4\n\nMotionBlur — directional accumulation (478-495)\n  Pattern:\
    \ sum[c] += input[idx + c] for c in 0..4\n\nBilateral — weighted accumulation (409-446)\n  Pattern: sum[c] += weight *\
    \ input[idx + c] for c in 0..3\n\nTarget pattern for all:\n  let src: [f32; 4] = input[idx..idx+4].try_into().unwrap();\n\
    \  sum[0] += kw * src[0];\n  sum[1] += kw * src[1];\n  sum[2] += kw * src[2];\n  sum[3] += kw * src[3];\nThis compiles\
    \ to f32x4 load + f32x4 fma on all targets.\n"
  acceptance_criteria:
  - All spatial filter accumulation loops use [f32; 4] multiply-accumulate pattern
  - Existing spatial filter tests pass unchanged
  - GaussianBlur benchmark shows measurable speedup vs pre-SIMD baseline
  - No explicit std::arch intrinsics (auto-vectorization only)
  - WASM component build clean
  out_of_scope: '- Median filter (per-channel sort, not vectorizable)

    - Point-op filters (separate track)

    - Explicit SIMD intrinsics (auto-vec only)

    - Tiled/cache-aware blur (future optimization)

    '
  technical_notes: "The accumulation pattern is identical across all spatial filters.\nConsider extracting a helper:\n\n \
    \ #[inline(always)]\n  fn accum4(sum: &mut [f32; 4], src: &[f32], weight: f32) {\n      sum[0] += weight * src[0];\n \
    \     sum[1] += weight * src[1];\n      sum[2] += weight * src[2];\n      sum[3] += weight * src[3];\n  }\n\nThis gives\
    \ LLVM maximum visibility for vectorization and reduces\ncode duplication across 6+ filter implementations.\n\nFor bilateral\
    \ filter, the weight changes per pixel (data-dependent),\nbut the accumulate-with-weight pattern is still f32x4-friendly.\n"
