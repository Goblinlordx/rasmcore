id: gpu-shaders-spatial_20260402020003Z
title: GPU shaders — spatial ops, distortions, and fused affine transforms
type: feature
status: pending
created: '2026-04-02'
updated: '2026-04-01'
spec:
  summary: 'Write WGSL compute shaders for expensive spatial ops (blur, bilateral,

    spin blur, etc.), distortion ops (spherize, swirl, barrel, etc.), and

    fused affine transforms (resize+rotate+flip as single matrix resample).

    Implement GpuCapable for each filter node.

    '
  context: 'These are the highest-impact GPU ops based on PoC results:

    - Blur: 36x speedup

    - Spin blur: 58x speedup

    - Spherize: 145x speedup

    - Bilateral: expensive on CPU, should be massive GPU win


    Affine fusion: the pipeline already has AffineOp trait for composing

    consecutive resize/rotate/flip into a single transform matrix. On GPU,

    this becomes a single shader that applies the fused matrix + bilinear

    resample in one pass — no intermediate buffers between transforms.

    '
  acceptance_criteria:
  - WGSL shaders for blur (separable H+V), box_blur, sharpen, median
  - WGSL shaders for spin_blur, motion_blur, zoom_blur, tilt_shift
  - WGSL shaders for bilateral, guided_filter
  - WGSL shaders for spherize, swirl, barrel, ripple, wave, polar, depolar
  - WGSL shader for fused affine transform (single matrix + bilinear resample)
  - GpuCapable impl for each filter node
  - Param pack functions for each shader uniform layout
  - Fused affine node provides single GpuOp with composed matrix
  - GPU output matches CPU output within acceptable tolerance
  - All shaders validate with naga (compile-time check in build.rs)
  out_of_scope: '- Point op shaders (Track 5 handles those via fused 3D LUT)

    - Edge detection, morphology, threshold shaders

    - Non-browser GPU hosts

    '
  technical_notes: "Shader patterns:\n\n1. Separable blur: two passes (H, V), shared memory tile with halo\n2. Multi-tap sampling\
    \ (spin, motion, zoom): per-pixel N samples\n3. Distortion: per-pixel inverse coord transform + bilinear sample\n4. Bilateral/guided:\
    \ neighborhood with per-sample weighting\n5. Fused affine: mat3x3 transform + bilinear resample, one dispatch\n\nAffine\
    \ fusion on GPU:\n- Pipeline's fuse_affine_ops() composes resize+rotate+flip matrices\n- The fused AffineNode provides\
    \ a single GpuOp with the 3x3 matrix\n- WGSL shader: for each output pixel, multiply by inverse matrix,\n  bilinear sample\
    \ from input. One pass, one dispatch.\n- This replaces separate resize+rotate+flip GPU dispatches\n\nShader embedding:\
    \ include_str!(\"shaders/blur_h.wgsl\") per filter.\nFiles live alongside the Rust implementation in filters/spatial/shaders/.\n"
