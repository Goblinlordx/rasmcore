id: native-rust-sdk_20260406070101Z
title: Native Rust SDK with codegen fluent API + wgpu host integration
type: feature
status: pending
created: '2026-04-06'
updated: '2026-04-06'
spec:
  summary: 'Auto-generated Rust fluent SDK from the filter registry (same pattern

    as the TS SDK codegen). Typed methods for every registered filter.

    Native host integration via wgpu GPU executor bundled in.

    '
  context: 'The TS fluent SDK is auto-generated by scripts/generate-v2-fluent-sdk.mjs

    from registered_operations(). It produces typed config interfaces and

    chainable methods for every filter. The Rust native SDK should follow

    the same pattern: a build.rs or codegen script that reads the filter

    registry and generates typed Rust methods.


    The SDK wraps Graph + PipelineResource + native wgpu executor so that

    Rust consumers get: Pipeline::open(bytes).brightness(0.5).write("png").

    Same code path as WASM except the host (GPU executor, file I/O) is

    native Rust instead of browser JS.

    '
  codebase_analysis: 'TS codegen pattern (scripts/generate-v2-fluent-sdk.mjs):

    - Reads registered_operations() from the WASM module

    - For each filter: generates config interface + chainable method

    - Method serializes params to binary, calls applyFilter on raw pipeline

    - Pipeline class wraps raw WIT resource


    Rust equivalent:

    - build.rs or proc-macro reads registered_filter_registrations()

    - For each filter: generates a typed method on Pipeline struct

    - Method constructs ParamMap from typed args, calls apply_filter

    - Pipeline struct wraps Graph directly (no WIT boundary needed)


    Existing native GPU executor: WgpuExecutorV2 in rasmcore-cli

    (to be extracted into rasmcore-gpu-native by prerequisite track)


    Key difference from TS SDK:

    - No WIT serialization boundary (direct Rust calls)

    - No binary param encoding (direct ParamMap construction)

    - GPU executor bundled (wgpu), not host-provided

    - Can run in cargo test for integration testing

    '
  acceptance_criteria:
  - Codegen produces typed method per registered filter
  - Pipeline::open(bytes) decodes image and creates Graph
  - Chainable filter methods with typed params (not stringly-typed)
  - Pipeline::write(format, quality) encodes output
  - Pipeline::render() returns raw f32 pixels
  - Native wgpu GPU executor auto-initialized when available
  - Falls back to CPU when GPU unavailable
  - ref() and branch() supported for multi-output
  - build.rs regenerates on filter registry changes
  - cargo test exercises the generated API
  out_of_scope: 'WIT/WASM interface changes. Browser JS SDK changes.

    The Rust SDK is a native-only consumer, parallel to the TS SDK.

    '
  technical_notes: "Crate: crates/rasmcore-sdk/ (or rasmcore-sdk-native/)\n\nGenerated code pattern:\n  // Auto-generated\
    \ by build.rs — do not edit\n  impl Pipeline {\n      pub fn brightness(&self, amount: f32) -> Pipeline {\n          let\
    \ mut params = ParamMap::new();\n          params.floats.insert(\"amount\".into(), amount);\n          let id = self.graph.borrow_mut()\n\
    \              .add_node(create_filter_node(\"brightness\", self.node, self.info(), &params).unwrap());\n          Pipeline\
    \ { graph: self.graph.clone(), node: id }\n      }\n\n      pub fn gaussian_blur(&self, radius: f32) -> Pipeline { ...\
    \ }\n      // ... 90+ more methods\n  }\n\nbuild.rs approach:\n- Depends on rasmcore-pipeline-v2 (for registry access)\n\
    - At build time: iterates registered_filter_registrations()\n- For each filter: emits a method with typed params from\
    \ ParamDescriptor\n- Writes generated code to OUT_DIR\n\nAlternative: proc-macro approach (derive on a marker struct)\n\
    - More Rust-idiomatic but harder to debug\n- build.rs is simpler and more transparent\n\nRuntime:\n- Pipeline holds Rc<RefCell<Graph>>\
    \ + current node_id\n- On construction: tries WgpuExecutorV2::try_new(), injects into Graph\n- write() calls request_full()\
    \ then encode\n- All filter operations are zero-copy (direct ParamMap, no serialization)\n"
