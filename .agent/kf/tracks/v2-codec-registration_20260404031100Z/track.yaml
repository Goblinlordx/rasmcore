id: v2-codec-registration_20260404031100Z
title: "V2 codec auto-registration — PNG as proof of concept"
type: feature
status: pending
created: "2026-04-04"
updated: "2026-04-04"
spec:
  summary: >
    Establish V2 codec registration pattern with PNG. Codec implementation is
    separate from f32 conversion. Adapter wires them together via derive macro.
    Same zero-wiring pattern as V2Filter.
  context: |
    V2 filters use #[derive(V2Filter)] for auto-registration. Encoders and
    decoders need the same pattern. Currently codecs-v2 wraps V1 decoders
    with manual registration. The new pattern:

    Layer 1: Codec implementation (pure PNG encode/decode, native pixel format)
    Layer 2: Conversion helpers (f32 linear <-> sRGB u8, in pipeline-v2)
    Layer 3: Adapter (derive macro generates, wires codec + conversion, auto-registers)

    The codec implementation does NOT contain f32 conversion. The adapter uses
    pipeline conversion helpers to bridge between f32 pipeline and native codec.
  acceptance_criteria:
    - Conversion helpers in pipeline-v2 (f32_linear_to_srgb_u8, srgb_u8_to_f32_linear)
    - V2Encoder derive macro generates EncoderFactoryRegistration
    - V2Decoder derive macro generates DecoderFactoryRegistration
    - PNG encoder adapter registered via derive macro with zero manual wiring
    - PNG decoder adapter registered via derive macro with zero manual wiring
    - Encode/decode discoverable via registry (like filters)
    - V2 WASM listOperations includes PNG encoder/decoder
    - Round-trip test passes (decode PNG -> f32 -> encode PNG)
  out_of_scope: |
    Migrating all codecs. Only PNG as proof of concept. Other codecs follow
    the same pattern once proven.
  technical_notes: |
    The PNG codec (rasmcore crate or png crate directly) handles:
    - Decode: PNG bytes -> ImageInfo + Vec<u8> (Rgb8/Rgba8)
    - Encode: Vec<u8> (Rgb8/Rgba8) + ImageInfo -> PNG bytes

    The adapter (generated by derive) handles:
    - Decode adapter: PNG bytes -> codec decode -> u8 pixels -> srgb_u8_to_f32_linear() -> f32
    - Encode adapter: f32 -> f32_linear_to_srgb_u8() -> u8 pixels -> codec encode -> PNG bytes

    The derive macro on the adapter struct:
    - Reads #[codec(name, format, native_format)] attributes
    - Generates factory function that calls codec + conversion
    - Registers via inventory

    Conversion helpers in pipeline-v2:
    - f32_linear_to_srgb_u8(pixels: &[f32]) -> Vec<u8>
    - srgb_u8_to_f32_linear(pixels: &[u8], format: NativeFormat) -> Vec<f32>
    - Handle alpha channel passthrough (no gamma on alpha)
    - Handle Rgb8 vs Rgba8 (3 vs 4 channels)
