      - text: Implement addDisplay(name, canvas, hdr) and removeDisplay(name)
        done: false
      - text: Migrate canvasCtx/viewportBuf to displays.get viewport
        done: false
      - text: Migrate origCtx/origViewportBuf to displays.get original
        done: false
  - phase: Multi-Target Operations
    tasks:
      - text: Implement blitTo(name, pixelBuf) for named display blit
        done: false
      - text: Implement updateViewport(name, ...) for per-display viewport
        done: false
      - text: Implement displayOnly(name) for re-blit without recompute
        done: false
      - text: Implement executeMulti(stages) with prior-stage buffer reuse
        done: false
  - phase: Verification
    tasks:
      - text: Test addDisplay registers and configures canvas correctly
        done: false
      - text: Test executeMulti with 2 stages sharing a buffer
        done: false
      - text: Verify existing single-display path still works unchanged
        done: false
