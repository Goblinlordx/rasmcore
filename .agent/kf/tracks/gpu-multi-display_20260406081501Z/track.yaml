id: gpu-multi-display_20260406081501Z
title: GpuHandler multi-display target registry
type: feature
status: pending
created: '2026-04-06'
updated: '2026-04-07'
spec:
  summary: 'Refactor GpuHandlerV2 to support N named display targets via

    addDisplay(name, canvas). Migrate existing canvasCtx/origCtx into

    a display map. Add executeMulti() for multi-stage GPU plans.

    '
  context: 'GpuHandlerV2 currently has two hardcoded display surfaces:

    canvasCtx (processed view) and origCtx (original view). Each has

    its own OffscreenCanvas, GPUCanvasContext, and viewport uniform.

    The multi-output design needs N displays (viewport + N scopes).


    The codebase already proves multi-canvas from one GPUDevice works.

    This track generalizes the pattern into a registry.

    '
  codebase_analysis: 'GpuHandlerV2 (gpu-handler-v2.ts):

    - displayCanvas/canvasCtx/viewportBuf — processed view

    - origCanvas/origCtx/origViewportBuf — original view

    - blitPipeline shared across both — same shader, different bind groups

    - appendBlitPass(encoder, pixelBuf) blits to canvasCtx

    - blitOriginal() blits sourcePixelBuf to origCtx

    - lastOutputBuf persists GPU output for displayOnly() re-blit


    Pattern per display target:

    - OffscreenCanvas

    - GPUCanvasContext (configure with device + format)

    - GPUBuffer for viewport uniforms

    - Reference to which pixel buffer to blit from


    executeMulti() would iterate stages, execute compute passes, then

    blit each stage''s output to its registered display target.

    '
  acceptance_criteria:
  - DisplayRegistration type with name, canvas, ctx, viewportBuf
  - displays Map<string, DisplayRegistration> replaces hardcoded fields
  - addDisplay(name, canvas, hdr) registers a named target
  - removeDisplay(name) cleans up a target
  - Existing canvasCtx/origCtx migrated into display map
  - blitTo(name, pixelBuf) blits a buffer to a named display
  - executeMulti(stages) executes ordered stages with display blits
  - displayOnly(name) re-blits without recompute
  - updateViewport(name, ...) updates a specific display viewport
  - Backward compatible — existing executeAndDisplay still works
  out_of_scope: 'Graph refs. GPU plan extraction from Rust. Worker integration.

    '
  technical_notes: "DisplayRegistration interface:\n  { name: string, canvas: OffscreenCanvas, ctx: GPUCanvasContext,\n  \
    \  viewportBuf: GPUBuffer, lastPixelBuf: GPUBuffer | null,\n    imageWidth: number, imageHeight: number }\n\nMigration:\
    \ replace private canvasCtx/origCtx/viewportBuf with\ndisplays.get(\"viewport\") and displays.get(\"original\").\nsetDisplayCanvas()\
    \ becomes addDisplay(\"viewport\", canvas, hdr).\nsetOriginalDisplayCanvas() becomes addDisplay(\"original\", canvas,\
    \ hdr).\n\nexecuteMulti(stages: MultiStage[]):\n  type MultiStage = {\n    name: string,          // display target name\n\
    \    shaders: GpuShader[],  // compute chain (empty = passthrough)\n    input: { tag: 'pixels', data: Float32Array }\n\
    \         | { tag: 'prior', name: string },\n    width: number, height: number,\n  }\n\nExecution: single command encoder,\
    \ stages in order.\nprior-stage input binds the output buffer from a previous stage.\n"
