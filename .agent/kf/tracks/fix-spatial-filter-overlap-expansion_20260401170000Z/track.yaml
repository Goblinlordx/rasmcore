id: fix-spatial-filter-overlap-expansion_20260401170000Z
title: Restore overlap expansion for spatial filters in rect-request model
type: bug
status: pending
created: '2026-04-01'
updated: '2026-03-31'
spec:
  summary: 'Spatial filters must expand their upstream request rect by their overlap

    radius, then crop the result back to the original request. Currently all

    filters pass request unchanged, causing edge artifacts in tiled pipelines.

    '
  context: 'The rect-request migration (filter-rect-request-foundation track) changed

    all filter signatures from (pixels, info, config) to (request, upstream, info, config).

    The migration intentionally deferred overlap expansion: "Making spatial filters

    actually request expanded rects (future -- for now they just do upstream(request)

    same as point ops)."


    This causes 7 tiled parity test failures and breaks real tiled pipeline execution.

    The old codegen did this expansion automatically via input_rect_body() -- that code

    was removed during cleanup. Now each filter is responsible for its own expansion.

    '
  codebase_analysis: "CURRENT STATE:\n- Generated compute_region just calls: filters::blur(request, &mut upstream, info, config)\n\
    - blur() does: let pixels = upstream(request)? -- NO expansion\n- Tiled execution requests e.g. a 256x256 tile -- blur\
    \ gets exactly 256x256 pixels\n- Blur needs N extra pixels on each side (where N = ceil(radius * 3) * 2 + 1) / 2\n- Without\
    \ them, edge pixels are computed from missing/clamped data -> artifacts\n\nFAILING TESTS (7):\n- tiled_parity_blur, tiled_parity_sharpen,\
    \ tiled_parity_median\n- tiled_parity_bilateral, tiled_parity_guided_filter\n- tiled_parity_erode, tiled_parity_motion_blur\n\
    \nPASSING TESTS (3):\n- tiled_parity_point_op (brightness -- no expansion needed)\n- tiled_parity_contrast (point op --\
    \ no expansion needed)\n- tiled_parity_canny (mapper -- separate codegen, still has old expansion)\n\nFILTERS NEEDING\
    \ EXPANSION (spatial filters):\n- blur (radius-based)\n- sharpen (fixed small radius -- uses blur internally)\n- smart_sharpen\
    \ (radius-based)\n- median (radius-based)\n- bilateral (diameter-based)\n- guided_filter (radius-based)\n- box_blur (radius-based)\n\
    - convolve (kernel-size-based)\n- bokeh_blur (radius-based)\n- motion_blur (length-based)\n- zoom_blur (factor-based,\
    \ technically full image)\n- spin_blur (angle-based, technically full image)\n- erode/dilate (radius-based)\n- morph_*\
    \ (radius-based, via erode/dilate)\n- oil_paint (radius-based)\n- kuwahara (radius-based)\n- rank_filter (radius-based)\n\
    - gaussian_blur_cv (ksize-based)\n\nAPPROACH:\nEach spatial filter should:\n1. Compute its overlap from its config params\n\
    2. Call upstream(request.expand_uniform(overlap, info.width, info.height))\n3. Run the filter on the expanded region\n\
    4. Crop the result back to the original request dimensions\n\nFor filters using _impl (blur, sharpen, guided_filter, emboss):\n\
    The wrapper function handles expansion, _impl processes the expanded region.\n\nThe Rect type already has expand_uniform()\
    \ and expand() methods.\nThe crop_region() helper in graph.rs can extract a sub-rect from pixel data.\n\nIMPORTANT: The\
    \ preamble pattern must change for spatial filters:\nOLD (current, wrong for spatial):\n  let pixels = upstream(request)?;\n\
    \  let info = &ImageInfo { width: request.width, height: request.height, ..*info };\n  let pixels = pixels.as_slice();\n\
    NEW (correct for spatial):\n  let overlap = compute_overlap_from_config(config);\n  let expanded = request.expand_uniform(overlap,\
    \ info.width, info.height);\n  let pixels = upstream(expanded)?;\n  let expanded_info = &ImageInfo { width: expanded.width,\
    \ height: expanded.height, ..*info };\n  let pixels = pixels.as_slice();\n  // ... run filter on expanded pixels ...\n\
    \  // ... crop result back to request dimensions ...\n"
  acceptance_criteria:
  - All 7 failing tiled_parity tests pass
  - Point op tests still pass (no regression)
  - cargo build + cargo component build pass
  - Tiled and non-tiled execution produce identical results for all spatial filters
  out_of_scope: 'Optimizing overlap amounts (e.g., blur could use tighter bounds).

    Adding overlap to distortion filters (barrel, swirl, etc.) -- these need

    full-image access and are correctly handled as GlobalTwoPass.

    Changing the _impl function internals.

    '
  technical_notes: 'For blur_impl-style filters: the registered wrapper (blur) handles expansion

    before calling blur_impl. blur_impl stays unchanged.


    For directly-migrated spatial filters (convolve, median, etc.): the preamble

    inside the function body must change from upstream(request) to

    upstream(expanded_request), then crop after processing.


    The crop can use crop_region() from pipeline::graph or a simple slice op

    since the output is always in row-major pixel order.

    '
