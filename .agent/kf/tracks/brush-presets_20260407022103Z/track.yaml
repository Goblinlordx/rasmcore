id: brush-presets_20260407022103Z
title: Standard brush presets library
type: feature
status: pending
created: '2026-04-07'
updated: '2026-04-07'
spec:
  summary: 'Built-in brush presets: pencil, pen, airbrush, watercolor, chalk. Each preset configures brush-params with appropriate
    tip texture, dynamics curves, spacing, and hardness.'
  context: With the brush engine functional, users need ready-to-use brush presets. This track creates a built-in preset library
    that maps familiar brush names to brush-params configurations. Each preset defines tip texture, dynamics curves, spacing,
    hardness, and other parameters tuned for the intended feel.
  codebase_analysis: ''
  acceptance_criteria:
  - 'Pencil preset: small diameter, high hardness, pressure-to-size, low spacing'
  - 'Pen preset: medium diameter, full hardness, pressure-to-opacity, low spacing'
  - 'Airbrush preset: large diameter, low hardness (soft falloff), pressure-to-flow, high spacing'
  - 'Watercolor preset: medium diameter, soft edge, velocity-to-size, scatter enabled'
  - 'Chalk preset: medium diameter, custom texture tip, tilt-to-size, scatter enabled'
  - Presets discoverable via registry (list-brush-presets WIT method or similar)
  - Each preset produces visually distinct output when tested with identical stroke path
  out_of_scope: User-defined custom brushes. Brush import/export. UI for brush editing.
  technical_notes: ''
plan:
- phase: Preset Infrastructure
  tasks:
  - text: Create BrushPreset struct wrapping brush-params with name and description
    done: true
  - text: Create preset registry (inventory-based, same pattern as filter registry)
    done: true
- phase: Presets
  tasks:
  - text: Pencil preset - small diameter, high hardness, steep pressure-to-size curve, 10% spacing
    done: true
  - text: Pen preset - medium diameter, full hardness, pressure-to-opacity, 5% spacing
    done: true
  - text: Airbrush preset - large diameter, low hardness (soft), pressure-to-flow, 25% spacing
    done: true
  - text: Watercolor preset - medium diameter, soft edge, velocity-to-size, scatter 0.3
    done: true
  - text: Chalk preset - medium diameter, embedded grain texture tip, tilt-to-size, scatter 0.2
    done: true
- phase: Discovery
  tasks:
  - text: Add list-brush-presets and get-brush-preset WIT methods
    done: true
  - text: Wire preset lookup in WASM adapter
    done: true
- phase: Verification
  tasks:
  - text: Each preset produces visually distinct output with identical stroke path
    done: true
  - text: All presets discoverable via list-brush-presets
    done: true
