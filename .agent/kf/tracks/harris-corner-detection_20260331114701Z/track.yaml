id: harris-corner-detection_20260331114701Z
title: Harris corner detection + template matching
type: feature
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: |
    Harris/Shi-Tomasi corner detection and normalized cross-correlation
    template matching. Core feature detection primitives for the analysis toolkit.
  context: |
    ImageMagick provides -morphology ConvexHull and various feature detection.
    OpenCV's cornerHarris and matchTemplate are standard reference implementations.

    rasmcore has Hough line detection but no corner detection or template
    matching. These are fundamental building blocks for image alignment,
    stitching, object detection, and registration.
  codebase_analysis: |
    EXISTING:
    - hough_lines() in filters.rs: probabilistic line detection (OpenCV port)
    - sobel/scharr: gradient computation (needed for Harris)
    - convolve(): arbitrary kernel convolution
    - CvRng: OpenCV-compatible PRNG already ported

    APPROACH:
    - Harris: compute Ix, Iy gradients (Sobel), build structure tensor,
      compute R = det(M) - k*trace(M)^2, threshold, non-max suppression
    - Template matching: normalized cross-correlation (NCC) sliding window
    - Both follow OpenCV formulations for parity testing
  acceptance_criteria:
    - harris_corners(pixels, info, k, threshold, block_size) returns Vec<(x,y,response)>
    - Non-maximum suppression to avoid clustered detections
    - template_match(image, template) returns (x, y, score) of best match
    - Deterministic output
    - Validated against OpenCV cornerHarris for basic test images
  out_of_scope: |
    FAST, ORB, SIFT, SURF. Sub-pixel refinement. Multi-scale detection.
    Feature descriptors or matching pipelines.
  technical_notes: |
    Harris corner response: R = det(M) - k * trace(M)^2
    where M = [sum(Ix*Ix) sum(Ix*Iy); sum(Ix*Iy) sum(Iy*Iy)] over block_size window.

    Template matching: NCC = sum((I-mean_I)*(T-mean_T)) / sqrt(sum((I-mean_I)^2) * sum((T-mean_T)^2))

    Reference: OpenCV cornerHarris (imgproc/corner.cpp), matchTemplate (imgproc/templmatch.cpp)
