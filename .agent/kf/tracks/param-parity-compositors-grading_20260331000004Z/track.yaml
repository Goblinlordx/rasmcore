id: param-parity-compositors-grading_20260331000004Z
title: Phase 1+2 — Compositor & Grading Parameter Parity & Multi-Setting Validation
type: chore
status: pending
created: '2026-03-31'
updated: '2026-03-30'
spec:
  summary: 'Audit compositor (blend modes, composite offset, mask) and grading (tonemap, curves, CDL, LUT) params against
    IM/ffmpeg. Multi-setting validation for each operation.

    '
  context: 'Blend modes are already tested against W3C spec (20 modes). But

    composite offset, mask application, and blend_if are less well-tested.

    Grading operations (tonemap, curves, ASC CDL, split toning) have

    limited or no reference validation. LUT import was just validated

    against ffmpeg/IM but only at one setting.

    '
  codebase_analysis: 'Compositors:

    - composite (Porter-Duff over, offset params)

    - blend (18 modes) — W3C parity exists

    - mask_apply (luminance mask, invert flag)

    - blend_if (Photoshop Blend-If, luminosity ranges)


    Grading:

    - asc_cdl (slope/offset/power per channel)

    - lift_gamma_gain (3-way corrector)

    - split_toning (highlight/shadow hue + balance)

    - curves (spline-interpolated tone curve)

    - tonemap_reinhard/drago/filmic (HDR tone mapping)

    - apply_cube_lut (3D LUT) — tested vs ffmpeg at 1 setting

    - apply_hald_lut (HALD CLUT) — tested vs IM at 1 setting

    '
  acceptance_criteria:
  - Composite tested at 3+ offset positions vs IM -compose Over -geometry
  - Blend modes tested at 2+ opacity levels (not just 100%) vs IM -compose
  - mask_apply tested with 2+ mask patterns vs IM CopyOpacity
  - ASC CDL tested at 3+ slope/offset/power combos vs ffmpeg colorbalance
  - Curves tested at 2+ different control point sets vs IM -curve
  - Tonemap Reinhard tested at 2+ settings vs reference Python implementation
  - LUT import tested at 2+ different LUT files vs ffmpeg lut3d
  - All MAE results documented
  out_of_scope: 'New blend mode implementations. New grading algorithms.

    Performance optimization. VMAF/perceptual metrics.

    '
  technical_notes: 'Composite reference:

    - magick bg.png fg.png -compose Over -geometry +10+20 -composite output.png


    Blend mode reference (W3C already validated, extend to opacity):

    - magick bg.png fg.png -compose Multiply -define compose:args=75 -composite output.png


    ASC CDL reference (ffmpeg):

    - ffmpeg -i input.png -vf "colorbalance=rs=0.1:gs=-0.1:bs=0.05" output.png


    Tonemap reference (Python colour-science):

    - colour.tonemapping.reinhard(img, key=0.18, l_white=1.0)

    '
