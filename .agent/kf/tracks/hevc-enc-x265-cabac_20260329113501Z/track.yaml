id: hevc-enc-x265-cabac_20260329113501Z
title: x265 Port — CABAC Arithmetic Encoder + Context Models
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: 'Direct port of x265 4.1 CABAC entropy encoder to Rust. Covers the binary arithmetic coding engine, all 159 context
    models, coefficient coding, and syntax element binarization. Validated bin-by-bin against x265 trace output.

    '
  context: 'CABAC encoding is the reverse of the decoder we built — instead of reading bins

    from a bitstream, we write bins to produce a bitstream. The arithmetic engine

    maintains range/low state and outputs bytes as the range narrows.


    The decoder experience showed that context model initialization and state

    transitions must match exactly. The encoder uses the same context tables

    (Tables 9-5 through 9-37) and state machine. We already have the decoder''s

    context infrastructure; the encoder adds the encoding direction.


    This is the most complex single component. Every syntax element (split_cu_flag,

    pred_mode, cbf, sig_coeff_flag, coeff_abs_greater1/2, etc.) has specific

    binarization and context derivation rules that must match x265 exactly.

    '
  codebase_analysis: "x265 4.1 source files to port:\n- encoder/entropy.cpp/h — CABAC encoder: encodeBin(), encodeBinEP(),\n\
    \  encodeBinTrm(), all syntax element coding functions (codeSplitFlag,\n  codePredMode, codeCoeffNxN, etc.)\n- common/contexts.h\
    \ — Context model definitions, init values, state tables\n\nExisting decoder infrastructure in rasmcore-hevc:\n- cabac/decoder.rs\
    \ — CabacDecoder (the inverse operation)\n- cabac/context.rs — ContextModel, init tables (reusable for encoder)\n- cabac/tables.rs\
    \ — RANGE_TAB_LPS, RENORM_TABLE (decoder-side, encoder uses\n  different tables but same state machine)\n- syntax.rs —\
    \ Context offsets (SPLIT_CU_CTX_OFFSET, etc.) — shared\n\nRef: x265 4.1 encoder/entropy.cpp (~4000 lines)\n"
  acceptance_criteria:
  - CABAC encoder produces valid bitstream decodable by our CABAC decoder
  - Encode-then-decode roundtrip preserves all syntax element values
  - Coefficient coding (codeCoeffNxN) matches x265 output for known coefficient blocks
  - Context state after encoding a known sequence matches x265 context state
  - Bin-by-bin trace comparison against x265 for a simple test case (flat 64x64)
  - Any differences documented with x265 4.1 entropy.cpp line citations
  - clippy clean, cargo test passes
  out_of_scope: 'Bitstream writer (previous track). Intra prediction. Transform/quantization.

    Full CTU encoding loop. Rate control. ISOBMFF container.

    '
  technical_notes: "Port strategy (follows x265 entropy.cpp structure):\n\n1. CABAC arithmetic engine: port encodeBin(), encodeBinEP(),\n\
    \   encodeBinTrm(), finish(). These are the core arithmetic operations\n   that maintain range/low and output bytes.\n\
    \n2. Context model encoding: reuse the decoder's ContextModel type.\n   The encoder uses the same state transition (MPS\
    \ probability update)\n   but in the encoding direction (range subdivision, not comparison).\n\n3. Syntax element functions\
    \ — port in dependency order:\n   a. codeSplitFlag, codePredMode, codePartSize (CU structure)\n   b. codePrevIntraLumaDir,\
    \ codeIntraDir (intra modes)\n   c. codeTransformSkipFlags, codeQtCbfLuma, codeQtCbfChroma (transform)\n   d. codeCoeffNxN\
    \ (coefficient coding — the most complex function)\n   e. codeLastSignificantXY (last significant position)\n\n4. Validation\
    \ approach:\n   - Use the CABAC trace feature from the decoder to capture bin sequences\n   - Encode a known input, decode\
    \ it, compare bin traces\n   - For coefficient coding: encode known coefficient arrays, decode,\n     verify exact coefficient\
    \ match\n\nThe x265 CABAC uses the same RANGE_TAB_LPS and state transition as our\ndecoder. The encoding direction reverses\
    \ the range subdivision:\n- Decoder: compare offset against range split point\n- Encoder: choose range subdivision based\
    \ on the symbol to encode\n\nRef: x265 4.1 encoder/entropy.cpp — encodeBin() at line ~120\nRef: x265 4.1 common/contexts.h\
    \ — context model definitions\n"
