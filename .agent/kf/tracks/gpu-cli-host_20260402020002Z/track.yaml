id: gpu-cli-host_20260402020002Z
title: "GPU CLI host — wgpu executor with auto-detect for native pipeline"
type: feature
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: |
    Implement the native GPU host for the CLI using wgpu. Auto-detects
    GPU availability, compiles WGSL shaders, executes compute dispatches.
    The CLI automatically uses GPU when available, falls back to CPU.
  context: |
    The CLI runs native Rust (not WASM). It can use wgpu directly without
    the WIT boundary. The GpuCapable trait returns GpuOps with WGSL source
    and params — the CLI executor compiles and runs them via wgpu.

    wgpu auto-selects the best backend: Vulkan (Linux), Metal (macOS),
    DX12 (Windows). No user configuration needed.
  acceptance_criteria:
    - wgpu added as optional dependency (gpu feature flag)
    - GpuExecutor struct wraps wgpu device, shader cache, buffer pool
    - Auto-detects GPU on startup (adapter request, device creation)
    - Shader compilation cached by source hash
    - Ping-pong buffer management for multi-op batches
    - CLI --gpu flag to force GPU, --no-gpu to force CPU
    - Default behavior auto-detects GPU availability
    - 3D LUT shader for fused color ops supported
    - Graceful fallback to CPU if GPU init fails
  out_of_scope: |
    - Browser WebGPU host (Track 2)
    - Multi-GPU support
    - Async/streaming GPU execution
  technical_notes: |
    The CLI executor is a Rust struct that directly calls wgpu APIs:

    pub struct GpuExecutor {
        device: wgpu::Device,
        queue: wgpu::Queue,
        shader_cache: HashMap<u64, wgpu::ComputePipeline>,
    }

    impl GpuExecutor {
        pub fn new() -> Result<Self, GpuError> { ... }
        pub fn execute(&self, ops: &[GpuOp], input: &[u8], w: u32, h: u32) -> Result<Vec<u8>, GpuError> { ... }
    }

    The graph walker calls executor.execute() instead of the WIT import.
    Same batch detection logic, different dispatch path.
