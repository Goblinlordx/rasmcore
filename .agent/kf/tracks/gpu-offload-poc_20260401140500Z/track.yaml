id: gpu-offload-poc_20260401140500Z
title: 'Research + PoC: GPU offload via host-injected WebGPU handler'
type: research
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Build a minimal proof-of-concept to test whether GPU offload via WebGPU

    compute shaders is faster than the current WASM SIMD pipeline for image

    operations. Measures transfer overhead, shader execution time, and

    end-to-end latency for representative ops.

    '
  context: "The current pipeline processes everything in WASM with SIMD128 intrinsics.\nThe hypothesis is that for spatial\
    \ ops (blur, sharpen, bilateral) and\nchains of many ops, WebGPU compute shaders could be significantly faster\nby avoiding\
    \ per-pixel CPU iteration and leveraging GPU parallelism.\n\nHowever, GPU acceleration has transfer overhead: CPU→GPU\
    \ upload, shader\ndispatch, GPU→CPU readback. For small images or trivial ops, this\noverhead may exceed the compute savings.\
    \ For the CLUT-fused color ops,\nthe CPU path is already O(1) per pixel with a single table lookup.\n\nThis PoC will answer:\n\
    1. What is the baseline transfer overhead for a 1024x1024 RGBA image?\n2. How fast are compute shaders for blur (spatial),\
    \ sepia (point op),\n   and a 5-op chain vs the WASM SIMD path?\n3. At what image size does GPU become faster than WASM\
    \ SIMD?\n4. Is the host callback pattern (WASM imports a GPU handler) viable\n   in practice with SharedArrayBuffer for\
    \ zero-copy transfer?\n"
  codebase_analysis: 'The PoC is standalone — it does NOT modify the rasmcore pipeline.

    It lives in a separate directory (e.g., experiments/gpu-poc/) with

    its own HTML + JS + WGSL files. It benchmarks:


    A) Pure WebGPU: upload buffer → run compute shader → readback

    B) Pure WASM: the existing rasmcore filter via pipeline worker

    C) Transfer overhead: just upload + readback, no compute


    The PoC uses the web-ui Vite dev server for CORS/SharedArrayBuffer

    headers. It imports the rasmcore WASM SDK for the WASM baseline.


    Key files to create:

    - experiments/gpu-poc/index.html

    - experiments/gpu-poc/benchmark.js (orchestrates tests)

    - experiments/gpu-poc/shaders/blur.wgsl

    - experiments/gpu-poc/shaders/sepia.wgsl

    - experiments/gpu-poc/shaders/chain.wgsl (fused 5-op chain)

    '
  acceptance_criteria:
  - Benchmark page loads and runs in Chrome/Edge (WebGPU required)
  - Measures GPU transfer overhead (upload + readback) in ms
  - Measures GPU compute time for blur, sepia, and 5-op chain in ms
  - Measures equivalent WASM SIMD time for the same ops
  - Compares at multiple resolutions (256, 512, 1024, 2048, 4096)
  - Outputs results as a table with speedup ratios
  - Documents findings in a report (feasibility assessment)
  out_of_scope: '- Modifying the rasmcore pipeline or WIT interfaces

    - Implementing the full GPU handler callback protocol

    - Shader implementations for all 150+ filters

    - Native/non-browser GPU paths

    '
  technical_notes: "WebGPU compute shader approach:\n- Storage buffers for input (RGBA8 pixels) and output\n- Workgroup size\
    \ 16x16 (256 threads) — standard for image processing\n- Blur: shared memory tile with halo for neighborhood access\n\
    - Point ops (sepia, contrast): trivially parallel, no shared memory\n- Chain: single shader with all ops fused (avoids\
    \ intermediate buffers)\n\nTransfer patterns to test:\n1. mappedAtCreation: create buffer pre-mapped, memcpy, unmap\n\
    2. writeBuffer: queue.writeBuffer() for upload\n3. mapAsync: for readback (the expensive part)\n\nSharedArrayBuffer consideration:\n\
    - If WASM linear memory is a SharedArrayBuffer, the GPU could\n  potentially read from it directly via a mapped buffer\n\
    - This avoids the copy but requires COOP/COEP headers (already set)\n- Test if this is actually faster than explicit writeBuffer\n\
    \nBenchmark methodology:\n- Warm up: 3 runs discarded\n- Measure: 10 runs, report median + p95\n- Separate GPU timing\
    \ (timestamp queries) from CPU timing\n- Compare: GPU total (upload + compute + readback) vs WASM total\n"
