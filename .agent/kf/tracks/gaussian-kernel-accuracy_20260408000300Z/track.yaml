id: gaussian-kernel-accuracy_20260408000300Z
title: Professional Gaussian kernel accuracy — 5-sigma truncation, configurable threshold
type: refactor
status: pending
created: 2026-04-08
updated: '2026-04-07'
spec:
  summary: 'Increase Gaussian kernel truncation from 3*sigma (OpenCV default) to

    5*sigma (99.9999% energy capture). Add configurable truncation threshold.

    Update reference implementation and AUTHORITY.md.

    '
  context: "Current gaussian_kernel_1d() at spatial.rs:57-74 uses sigma*6+1 = 3*sigma\nper side. This matches OpenCV's default\
    \ but NOT professional VFX tools.\n\nProfessional tool behavior:\n- Nuke (Foundry): Blur node defaults to \"infinite\"\
    \ support, practically\n  truncated when kernel weight drops below a threshold (~4.4*sigma for\n  99.99% energy). Nuke\
    \ quality setting controls this.\n- DaVinci Resolve: Uses 4*sigma for Gaussian blur in Fusion.\n- Photoshop: Uses iterative\
    \ box blur approximation (3-pass box blur\n  approximates Gaussian via central limit theorem), effective support\n  similar\
    \ to 4*sigma.\n\nEnergy captured by truncation:\n- 3*sigma: 99.73% (current)\n- 4*sigma: 99.9937%\n- 5*sigma: 99.99994%\
    \ (effectively perfect for f32 precision)\n- 6*sigma: 99.9999998% (overkill)\n\nDecision: reference uses 5*sigma (matches\
    \ f32 precision limit).\nOptimized filter uses 4*sigma (matches Resolve) with option to increase.\nThe reference is correctness-first\
    \ — it captures all perceptible energy.\n\nThe kernel size increase is 10/6 = 1.67x more taps. For a separable\n2-pass\
    \ filter this is 1.67x slowdown, acceptable for correctness.\nGPU shaders can use the smaller kernel with documented quality\
    \ flag.\n"
  codebase_analysis: "gaussian_kernel_1d() at spatial.rs:57:\n  ksize = ((sigma * 6.0 + 1.0).round() as usize) | 1\nThis is\
    \ the only place kernel size is determined. All Gaussian-based\nfilters (gaussian_blur, sharpen unsharp mask, high_pass)\
    \ use this.\n\nGPU shaders for gaussian_blur use a 2-pass separable approach with\nthe same kernel size. Changing the\
    \ kernel function changes both paths.\n\nAffected filters: gaussian_blur, sharpen (uses Gaussian), high_pass\n(subtracts\
    \ Gaussian), bokeh_blur (disc, different), lens_blur (different).\n"
  acceptance_criteria:
  - gaussian_kernel_1d() uses 5*sigma truncation by default
  - Configurable truncation multiplier parameter (default 5.0)
  - Reference implementation in rasmcore-reference uses 5*sigma
  - Existing filter behavior changes only in the tails (pixels beyond 3*sigma)
  - GPU shader kernel size updated to match
  - AUTHORITY.md updated to cite Nuke/Resolve behavior not OpenCV
  - Energy capture documented in code comments
  - Test that 5*sigma kernel sums to within 1e-7 of 1.0
  out_of_scope: 'FFT-based convolution (separate optimization track).

    Box blur approximation of Gaussian (different algorithm).

    Non-Gaussian blur kernels (bilateral, median).

    '
  technical_notes: "Change at spatial.rs:59:\n  Before: let ksize = ((sigma * 6.0 + 1.0).round() as usize) | 1;\n  After:\
    \  let ksize = ((sigma * 10.0 + 1.0).round() as usize) | 1;\n\nThis is a one-line core change. The rest is updating tests\
    \ that\ndepend on exact kernel sizes, and updating documentation.\n\nFor GPU shaders that hardcode kernel size in the\
    \ dispatch:\nThe kernel weights are passed as an extra_buffer, so the GPU path\nautomatically gets the larger kernel.\
    \ Dispatch count increases.\n"
