id: kuwahara-rank-filter_20260330080629Z
title: Kuwahara Filter & Generalized Rank Filter
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Add Kuwahara (edge-preserving painterly smoothing) and generalized rank

    filter (local min/max/mean/median by radius and rank). Both are standard

    ImageMagick/vips spatial operations. Validated against IM -kuwahara and

    -statistic references.

    '
  context: 'Kuwahara is a popular edge-preserving smoothing filter that produces a

    painterly effect. It divides each pixel''s neighborhood into quadrants,

    computes mean and variance per quadrant, and selects the quadrant with

    lowest variance. This is more sophisticated than oil_paint and matches

    IM''s -kuwahara. The rank filter generalizes the existing median filter

    to support any rank (min, max, mean, or arbitrary percentile), matching

    IM''s -statistic and vips_rank. These fill the last major spatial filter gaps.

    '
  codebase_analysis: 'EXISTING SPATIAL FILTERS:

    - blur (libblur, Gaussian): SIMD, registered

    - median: histogram-based, registered — rank=50% only

    - bilateral: edge-preserving, registered — different algorithm from Kuwahara

    - oil_paint: histogram-mode filter — simpler/different from Kuwahara

    - guided_filter: edge-preserving — different algorithm

    - convolve: generic kernel — not adaptive like Kuwahara


    MEDIAN IMPLEMENTATION (filters.rs):

    - Uses histogram-based approach for O(1) per-pixel (sliding window)

    - Could be generalized to rank filter by selecting different percentile


    WHERE TO ADD:

    - Kuwahara: new function in filters.rs, O(r^2) per pixel (4 quadrant stats)

    - Rank filter: generalize existing median or new implementation

    - Both registered with ConfigParams

    - Target crate: rasmcore-filter-spatial


    SIMD:

    - Kuwahara: SIMD for quadrant mean/variance computation

    - Rank filter: histogram-based approach naturally vectorizes per-row updates

    '
  acceptance_criteria:
  - kuwahara filter registered with radius param, produces edge-preserving smooth
  - rank_filter registered with radius and rank params (0.0=min, 0.5=median, 1.0=max)
  - rank_filter at rank=0.5 matches existing median filter output
  - rank_filter at rank=0.0 produces local minimum (erosion-like)
  - rank_filter at rank=1.0 produces local maximum (dilation-like)
  - Kuwahara reference parity vs IM -kuwahara within ALGORITHM tier (MAE < 5.0)
  - Rank filter min/max parity vs IM -statistic Minimum/Maximum within CLOSE tier
  - Both support RGB8 and RGBA8 (alpha preserved)
  - SIMD inner loops for both filters
  - Re-exported via rasmcore-filter-spatial crate
  out_of_scope: 'Anisotropic Kuwahara (orientation-aware). Multi-scale Kuwahara.

    Weighted rank filter. 3D rank filter for video.

    '
  technical_notes: 'KUWAHARA:

    - For each pixel, define 4 overlapping quadrants of size (r+1)x(r+1)

    - Quadrants: top-left, top-right, bottom-left, bottom-right

    - Compute mean RGB and variance per quadrant

    - Output = mean of quadrant with lowest variance

    - Variance = sum((pixel - mean)^2) / count, computed per channel

    - SIMD: compute 4 quadrant sums in parallel using integral image

    - IM equivalent: -kuwahara {radius}


    RANK FILTER:

    - Generalization of median: sort neighborhood, pick rank-th element

    - rank=0.0 -> minimum, rank=0.5 -> median, rank=1.0 -> maximum

    - Histogram-based: maintain sliding histogram, find rank by cumsum

    - For rank=0 or rank=1, optimize with min/max sliding window (deque)

    - IM equivalent: -statistic Minimum/Maximum/Median {radius}x{radius}

    '
