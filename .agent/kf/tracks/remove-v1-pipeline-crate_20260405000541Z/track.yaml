        done: false
  - phase: Deletion
    tasks:
      - text: Remove crates/rasmcore-pipeline/ directory entirely
        done: false
      - text: Remove rasmcore-pipeline from workspace Cargo.toml members list
        done: false
      - text: Remove rasmcore-pipeline dependency from rasmcore-image Cargo.toml
        done: false
      - text: Delete crates/rasmcore-image/src/domain/pipeline/ (V1 graph engine, dispatch, nodes)
        done: false
      - text: Delete crates/rasmcore-image/src/domain/filters/ (V1 filter implementations, 56 files)
        done: false
      - text: Update rasmcore-image lib.rs to remove domain/pipeline and domain/filters module declarations
        done: false
  - phase: Cleanup and Verification
    tasks:
      - text: Fix any remaining compilation errors in rasmcore-image, rasmcore-ffi, or other crates
        done: false
      - text: Verify full workspace builds — cargo build, cargo component build -p rasmcore-v2-wasm, web UI build
        done: false
