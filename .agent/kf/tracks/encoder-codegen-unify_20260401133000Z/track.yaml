  tasks:
  - text: Add metadata fields to EncoderConfig struct in codegen types (mime_type, extensions, supports_sequence)
    done: true
  - text: Update parse/encoders.rs to extract MIME and extensions from doc comments or struct attributes
    done: true
  - text: Add MIME + extensions annotations to each encoder config struct (jpeg, png, webp, gif, tiff, bmp, ico, qoi, tga,
      hdr, pnm, exr, dds, jp2, fits, heic)
    done: true
- phase: Code Generation
  tasks:
  - text: Generate static ENCODER_REGISTRY table with FormatInfo entries (name, MIME, extensions)
    done: true
  - text: Generate supported_encode_formats() from registry
    done: true
  - text: Generate format_info() and all_format_info() from registry
    done: true
  - text: Generate encode() dispatch function from registry
    done: true
  - text: Generate mime_type() and extensions() lookup functions from registry
    done: true
- phase: Integration
  tasks:
  - text: Replace encoder/mod.rs SUPPORTED_FORMATS + encode() match with generated code
    done: true
  - text: Replace codec.rs mime_type() + extensions() matches with generated lookups
    done: true
  - text: Update build.rs to pass encoder metadata through codegen pipeline
    done: true
- phase: Verification
  tasks:
  - text: Verify cargo test passes for all encoder tests
    done: true
  - text: Verify WASM component build succeeds
    done: true
  - text: Verify web-ui format discovery still works (supportedWriteFormats, allFormatInfo)
    done: true
