id: encoder-codegen-unify_20260401133000Z
title: Codegen-driven encoder registry — eliminate hardcoded format lists, MIME types, extensions
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: 'Replace hardcoded encoder metadata (format names, MIME types, extensions,

    dispatch match statements) with codegen-generated registry from encoder

    config annotations. Adding a new encoder should require only the config

    struct + encode function — no other files need manual edits.

    '
  context: "The encoder adapter has format metadata hardcoded in 4+ places:\n- encoder/mod.rs: SUPPORTED_FORMATS const, encode()\
    \ dispatch match,\n  encode_sequence() dispatch match\n- codec.rs: mime_type() match, extensions() match,\n  supported_decode_formats(),\
    \ supported_encode_formats()\n\nAdding a new encoder requires editing 6+ locations manually. The codegen\nalready handles\
    \ config struct parsing and WIT generation (pipeline_write.rs),\nbut format metadata (MIME, extensions) and dispatch logic\
    \ are still manual.\n\nThe fix: extend the encoder config annotation (or a new register_encoder\nmacro) to declare format\
    \ name, MIME type, and extensions. The codegen\ngenerates a static registry table and dispatch functions. The domain\n\
    encoder mod.rs and codec.rs become thin wrappers over the generated code.\n"
  codebase_analysis: "Current hardcoded locations:\n1. encoder/mod.rs:44 — SUPPORTED_FORMATS const (16 formats)\n2. encoder/mod.rs:59-125\
    \ — encode() match dispatcher\n3. encoder/mod.rs:156-180 — encode_sequence() match dispatcher\n4. codec.rs:132-155 — mime_type()\
    \ match (20+ arms)\n5. codec.rs:157-181 — extensions() match (20+ arms)\n6. codec.rs:106-119 — supported_decode/encode_formats()\n\
    \nAlready codegen-driven:\n- Config struct parsing (parse/encoders.rs)\n- WIT config records (pipeline_write.rs)\n- Per-format\
    \ WIT encode methods (pipeline_write.rs)\n- Stateless encoder adapter (generated_encoder_adapter.rs)\n- Pipeline write\
    \ adapter (generated_pipeline_write_adapter.rs)\n\nEncoder config struct pattern (e.g., jpeg.rs):\n  pub struct JpegEncodeConfig\
    \ { quality: u8, progressive: bool }\n  pub fn encode_jpeg(pixels, info, config) -> Result<Vec<u8>, ImageError>\n\nThe\
    \ parse/encoders.rs already extracts: format name (from struct suffix),\nconfig fields, default values. It needs to also\
    \ extract: MIME type,\nfile extensions, and whether the format supports sequences.\n"
  acceptance_criteria:
  - Each encoder declares its metadata (MIME type, extensions) via annotation or doc comment
  - Codegen generates a static format registry with name, MIME, extensions for all encoders
  - SUPPORTED_FORMATS derived from codegen, not hardcoded
  - encode() dispatch generated from codegen, not manual match
  - mime_type() and extensions() generated from codegen, not manual match
  - supported_encode_formats() derived from codegen registry
  - format_info() and all_format_info() use codegen registry
  - Adding a new encoder requires only the config struct + encode function
  - WASM component builds successfully
  - Existing encoder tests pass
  out_of_scope: '- Decoder registry (separate concern, similar pattern)

    - Encoder quality/feature parity improvements

    - New encoder implementations

    '
  technical_notes: "Approach: extend encoder config annotation with metadata fields.\n\nOption A: Doc comment metadata (matches\
    \ existing pattern for defaults):\n  /// (mime: image/jpeg)\n  /// (extensions: jpg, jpeg)\n  pub struct JpegEncodeConfig\
    \ { ... }\n\nOption B: Attribute macro:\n  #[register_encoder(name=\"jpeg\", mime=\"image/jpeg\", ext=\"jpg,jpeg\")]\n\
    \  pub struct JpegEncodeConfig { ... }\n\nOption B is cleaner. Add a register_encoder proc macro or parse custom\nattributes\
    \ in build.rs. The codegen then emits:\n1. A static ENCODER_REGISTRY array with FormatInfo entries\n2. A dispatch function\
    \ that replaces the encode() match\n3. Generated supported_formats(), mime_type(), extensions() functions\n\nFiles to\
    \ modify:\n- parse/encoders.rs: extract MIME + extensions from annotation\n- generate/pipeline_write.rs: generate registry\
    \ table + dispatch\n- build.rs: pass new metadata through codegen pipeline\n- encoder/mod.rs: replace hardcoded with generated\
    \ code\n- codec.rs: replace hardcoded with generated lookups\n- Each encoder .rs file: add metadata annotation\n"
plan:
