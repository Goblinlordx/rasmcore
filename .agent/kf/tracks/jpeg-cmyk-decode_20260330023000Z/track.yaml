id: jpeg-cmyk-decode_20260330023000Z
title: JPEG Decoder — CMYK/YCCK 4-Component Support
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Add CMYK and YCCK (4-component) JPEG decode to rasmcore-jpeg. This is the only decode coverage gap vs zune-jpeg/image
    crate. Used in print workflows (Photoshop CMYK export).

    '
  context: 'rasmcore-jpeg was wired as the default JPEG decoder, replacing the image

    crate''s zune-jpeg backend. The coverage audit (COVERAGE.md) identified

    CMYK/YCCK as the only feature gap. CMYK JPEGs are rare in web/consumer

    contexts but exist in professional print workflows (Photoshop, InDesign).

    '
  codebase_analysis: "The decoder's scan/MCU/plane machinery already handles 4 components\ngenerically -- the SOF parser,\
    \ block decoder, scan processor, and\nupsample function all work with arbitrary num_components. The gap is\nentirely in\
    \ the output path:\n\n1. decode.rs:661-700 -- hardcodes 3-component YCbCr->RGB conversion.\n   Panics if components.len()\
    \ != 1 and != 3 (no 4-component path).\n2. decode.rs:1037-1074 -- same hardcoding in progressive decoder output.\n3. decode_arith.rs:147\
    \ -- same in arithmetic decoder output.\n4. No APP14 (Adobe) marker parsing -- needed to detect CMYK vs YCCK\n   and whether\
    \ values are inverted (Adobe convention: 255-C, 255-M, 255-Y, 255-K).\n5. color.rs -- only has ycbcr_to_rgb_fixed, no\
    \ CMYK/YCCK conversions.\n\nGood news: the heavy lifting (entropy decode, IDCT, upsampling) all works.\nThe fix is concentrated\
    \ in 3 output functions + 1 marker parser + 2 color\nconversion functions.\n"
  acceptance_criteria:
  - Decode 4-component CMYK JPEGs (non-Adobe and Adobe-inverted)
  - Decode 4-component YCCK JPEGs (YCbCr + K channel)
  - APP14 marker parsed to detect Adobe color transform (0=CMYK, 2=YCCK)
  - Adobe CMYK inversion handled automatically (255-value)
  - Output as CMYK raw bytes (4 channels) or converted to RGB (3 channels)
  - Progressive CMYK decode works (SOF2 + 4 components)
  - Arithmetic CMYK decode works (SOF9/SOF10 + 4 components)
  - Parity test vs ImageMagick on real CMYK JPEG test images
  - Update COVERAGE.md to mark CMYK/YCCK as supported
  out_of_scope: '12-bit sample precision (SOF1) -- separate track if needed.

    Lossless JPEG (SOF3/7/11/15) -- largely superseded by JPEG-LS.

    CMYK JPEG encoding (not common; decode is the priority).

    '
  technical_notes: "IMPLEMENTATION ORDER:\n\nPhase 1 -- Refactor output path:\n  The 3 output functions (sequential, progressive,\
    \ arithmetic) each have\n  a hardcoded 3-component YCbCr->RGB block. Refactor to dispatch based on\n  num_components:\
    \ 1=grayscale, 3=YCbCr->RGB, 4=CMYK/YCCK.\n  Extract a shared output_pixels() function to avoid 3x duplication.\n\nPhase\
    \ 2 -- APP14 parsing:\n  Parse APP14 marker (0xFFEE) during marker scan. Look for \"Adobe\"\n  signature (bytes 0-4 of\
    \ payload). Read color_transform byte (byte 11):\n    0 = Unknown (treat as CMYK if 4 components)\n    1 = YCbCr (standard\
    \ 3-component)\n    2 = YCCK (YCbCr encoding of CMYK)\n  Store as field on JpegFrame or in a decode context struct.\n\n\
    Phase 3 -- Color conversions:\n  YCCK->CMYK: Apply YCbCr->RGB conversion to first 3 components, keep K.\n    C = 255 -\
    \ R, M = 255 - G, Y = 255 - B (where R,G,B from YCbCr)\n  CMYK->RGB (for final output):\n    R = 255 - min(255, C * (255-K)/255\
    \ + K)  (or simpler: R = (255-C)*(255-K)/255)\n    G = (255-M)*(255-K)/255\n    B = (255-Y)*(255-K)/255\n  Adobe inversion:\
    \ if APP14 color_transform==0 and 4 components,\n    invert all channels: C=255-C, M=255-M, Y=255-Y, K=255-K before\n\
    \    CMYK->RGB conversion.\n\nPhase 4 -- Parity validation:\n  Generate CMYK JPEG test images via ImageMagick:\n    magick\
    \ convert input.png -colorspace CMYK output_cmyk.jpg\n  Decode with both rasmcore-jpeg and ImageMagick, compare RGB output.\n\
    \  Use Photoshop-exported CMYK JPEGs if available for real-world testing.\n\nPIXEL FORMAT:\n  Add PixelFormat::Cmyk8 or\
    \ output as Rgba8 with CMYK->RGB conversion.\n  For maximum flexibility, support both: raw CMYK output and auto-converted\n\
    \  RGB output. The decoder should default to RGB output (most consumers\n  expect RGB) but allow CMYK passthrough via\
    \ a decode option.\n"
plan:
- phase: Refactor output path
  tasks:
  - text: Extract shared output_pixels() function from sequential decoder (decode.rs:661-700)
    done: true
  - text: Wire output_pixels() into progressive decoder output (decode.rs:1037-1074)
    done: true
  - text: Wire output_pixels() into arithmetic decoder output (decode_arith.rs:147)
    done: true
  - text: Add 4-component dispatch in output_pixels (return error for now)
    done: true
- phase: APP14 marker parsing
  tasks:
  - text: Parse APP14 marker during marker scan -- detect Adobe signature and color_transform byte
    done: true
  - text: Store adobe_color_transform on JpegFrame or decode context
    done: true
- phase: CMYK/YCCK color conversion
  tasks:
  - text: Implement YCCK-to-RGB conversion in color.rs (YCbCr on 3 channels + K pullout)
    done: true
  - text: Implement CMYK-to-RGB conversion in color.rs (standard formula)
    done: true
  - text: Implement Adobe CMYK inversion (255-value for all 4 channels)
    done: true
  - text: Wire conversions into output_pixels 4-component path
    done: true
- phase: Validation
  tasks:
  - text: Generate CMYK and YCCK test JPEGs via ImageMagick
    done: true
  - text: Add parity test -- decode CMYK JPEG, compare RGB output vs ImageMagick
    done: true
  - text: Add parity test -- decode YCCK JPEG (Adobe Photoshop style)
    done: true
  - text: Test progressive CMYK decode (SOF2 + 4 components)
    done: true
  - text: Update COVERAGE.md to mark CMYK/YCCK as supported
    done: true
