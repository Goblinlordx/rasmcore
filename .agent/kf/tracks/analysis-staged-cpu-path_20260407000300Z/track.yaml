spec:
  summary: 'Implement StagedPipeline.execute() for the CPU opt-in path where analysis

    results change graph topology (crop rects, output dimensions). Handles

    sequential analysisâ†’renderâ†’analysisâ†’render chains where intermediate

    pixel output is needed between stages.

    '
  context: 'The GPU-default path (Track 2) handles analysis results that stay as GPU

    buffers â€” histogram, min/max, channel stats. But some analyses produce

    results that change graph structure:


    - smart_crop â†’ Rect that changes crop dimensions

    - face_detect â†’ Rect for ROI extraction

    - auto_rotate â†’ Matrix that changes output orientation


    These CANNOT be pure GPU because the graph topology (output dimensions,

    node configuration) must change between stages, which is a CPU decision.


    This is the "CPU opt-in" path. It uses StagedPipeline to orchestrate:

    1. Render up to analysis node (GPU-accelerated)

    2. Read back pixels (full image at tile barrier)

    3. Run analysis (CPU or GPU with small readback)

    4. Bind result to downstream node params

    5. Repeat for next analysisâ†’render pair

    6. Final render produces output


    Current staged.rs state:

    - AnalysisNode trait exists but analyze() is CPU-only

    - ParamBinding, type checking, constraint validation all work

    - StagedPipeline.execute() is NOT implemented

    - add_analysis_node() has ownership placeholder


    The user''s example: smart_crop â†’ emboss â†’ smart_crop

    - Stage 1: analyze input â†’ crop rect

    - Stage 2: render crop + emboss â†’ pixels

    - Stage 3: analyze embossed output â†’ second crop rect

    - Stage 4: render second crop â†’ final output


    Each stage uses the normal Graph.request_full() which already dispatches

    to GPU when possible. The CPU work is only the analysis + param binding.


    Reference: .agent/kf/_reports/analysis-render-pass-design.md

    '
  codebase_analysis: "Files modified:\n\n1. staged.rs â€” Major changes:\n   - Fix add_analysis_node() ownership (line 230 placeholder)\n\
    \   - Implement topological wave scheduler\n   - Implement execute() loop\n\n2. node.rs â€” Minor addition:\n   - Add analyze()\
    \ default method to Node trait (returns None)\n   - AnalysisNode implementations override to return Some(AnalysisResult)\n\
    \   - This avoids the double-ownership problem: graph owns Node,\n     staged pipeline calls node.analyze() through the\
    \ graph\n\n3. graph.rs â€” Minor additions:\n   - Add set_node_param(node_id, name, value) public method\n   - Add get_node_analyze(node_id,\
    \ pixels, w, h) public method\n   - These let StagedPipeline interact with the graph cleanly\n\nFiles NOT modified:\n\
    - gpu.rs, GpuExecutor (GPU path unchanged)\n- collect_gpu_chain (Track 2 handles this)\n- Any existing filter implementations\n\
    - Any existing test files\n\nThe staged CPU path and the GPU chain fusion (Track 2) are complementary:\n- GPU fusion:\
    \ analysis result stays on GPU (histogram â†’ auto_levels)\n- Staged CPU: analysis result changes topology (smart_crop â†’\
    \ crop)\n- A pipeline can have BOTH: GPU-fused histogram + staged smart_crop\n"
  acceptance_criteria:
  - StagedPipeline.execute() implemented and functional
  - Supports sequential analysisâ†’render chains of arbitrary depth
  - Each analysis stage receives actual pixel output from prior render
  - Analysis results bind to downstream params via ParamBinding
  - Type checking validates result type against param type
  - Value constraints validated (RectWithinUpstream, Range, etc.)
  - Topological wave scheduler handles diamond dependencies
  - Error propagation â€” analysis failure stops with clear error
  - GPU render stages work within staged pipeline (no regression)
  - Integration test â€” analysisâ†’renderâ†’analysisâ†’render chain
  - All existing tests pass (no changes to current execution paths)
  out_of_scope: '- GPU-only analysis path (Track 2 handles this)

    - Concrete AnalysisNode filter implementations (Track 4)

    - Multi-output staged pipelines (single sink for now)

    - Parallel analysis execution within a wave

    - Tile-based analysis (full-image only)

    '
  technical_notes: "Execution model â€” topological waves:\n\n1. Build dependency graph from ParamBindings:\n   - For each binding:\
    \ source_node (analysis) â†’ target_node (render)\n   - If target_node's upstream feeds into another analysis, that analysis\n\
    \     is in a later wave\n\n2. Sort into execution waves:\n   Wave 0: analysis nodes with no render dependencies\n   Bind\
    \ 0: apply Wave 0 results to target params\n   Wave 1: render producing pixels for next analysis\n   Wave 2: analysis\
    \ nodes needing Wave 1 pixels\n   Bind 2: apply Wave 2 results\n   Wave 3: final render\n   ...\n\n3. For each analysis\
    \ wave:\n   - graph.request_full(analysis_upstream) â†’ pixels (GPU-accelerated)\n   - node.analyze(pixels, w, h) â†’ AnalysisResult\n\
    \   - Store result\n\n4. For each bind step:\n   - Apply AnalysisResult to target_node params via set_param()\n   - Validate\
    \ constraints\n\n5. Final wave: graph.request_full(sink_node) â†’ output pixels\n\nOwnership solution:\n- Add analyze()\
    \ to Node trait with default None return\n- StagedPipeline doesn't own separate AnalysisNode objects\n- It calls graph.get_node(id).analyze()\
    \ through the graph\n- ParamBindings reference node IDs, not trait objects\n\nMemory: each analysis wave materializes\
    \ full upstream image.\nSpatial cache reuse means repeated requests for unchanged data are free.\n"
