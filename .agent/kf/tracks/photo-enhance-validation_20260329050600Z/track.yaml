title: Photo Enhancement Reference Validation — Dehaze, Clarity, Local Laplacian vs References
type: chore
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: >
    Validate dehaze, clarity, and Local Laplacian against external reference
    implementations using real-world test images. Confirms correctness with
    pixel-level comparisons, not just self-referential smoke tests.
  context: |
    The photo-enhance track implemented three operations (dehaze, clarity,
    Local Laplacian) with only self-referential tests (output exists, alpha
    preserved, stats reasonable). No comparison against known-good references.

    Reference implementations:
    - Dehaze: OpenCV cv2.xphoto or Python reimplementation of He et al. 2009
    - Clarity: Darktable / Python USM with midtone weighting
    - Local Laplacian: libvips vips_locallaplacian (only open-source impl)

    The filter-reference-realign track already built the Python test harness
    (python_ref_available, run_python_ref helpers in reference_audit.rs).
    This track uses that infrastructure.
  codebase_analysis: |
    Current photo enhancement tests (filters.rs photo_enhance_tests module):
    - dehaze_produces_output: checks output exists and range increases
    - dehaze_rgba_preserves_alpha: checks alpha channel unchanged
    - clarity_enhances_midtones: checks stddev not dramatically reduced
    - clarity_zero_amount_is_near_identity: checks MAE < 1.0
    - local_laplacian_preserves_dimensions: checks output size
    - local_laplacian_sigma_1_near_identity: checks MAE < 30.0
    - local_laplacian_small_sigma_produces_output: checks pixels changed
    - local_laplacian_rgba_preserves_alpha: checks alpha unchanged

    None compare against external references. No real photograph test images.

    Test infrastructure available in reference_audit.rs:
    - python_ref_available() (from filter-reference-realign track)
    - run_python_ref() helper
    - write_png(), read_png_rgb(), mae() helpers
    - magick_available(), magick_op() for ImageMagick comparisons

    libvips CLI: vips locallaplacian input.png output.png sigma
  acceptance_criteria:
    - Dehaze compared against Python He et al. 2009 reimplementation on synthetic hazy image
    - Dehaze transmission map values within reasonable range (0.1-1.0)
    - Clarity compared against Python large-radius USM with midtone weighting on gradient image
    - Local Laplacian compared against vips locallaplacian (if vips CLI available)
    - Local Laplacian pyramid reconstruction is lossless at sigma=infinity (identity)
    - All tests use deterministic synthetic test images (reproducible)
    - Tests skip gracefully when Python/vips not available
    - REFERENCE.md updated with reference and PASS status for all 3 operations
  out_of_scope: |
    Real photograph datasets (copyright concerns). Neural-network-based comparisons.
    Performance benchmarking (separate track). Fixing any bugs found (separate bug tracks).
  technical_notes: |
    Test images (deterministic, generated in Rust):
    1. Hazy scene: gradient image with additive haze (I_hazy = I*t + A*(1-t), t=0.3, A=0.8)
    2. Midtone gradient: values concentrated in 64-192 range for clarity testing
    3. Detail-rich pattern: checkerboard + gradient for Local Laplacian

    Dehaze reference (Python):
      Dark channel prior reimplementation in numpy:
      - dark_channel = min over RGB in patch (cv2.erode with rect kernel)
      - atmospheric_light from top 0.1% brightest dark channel pixels
      - transmission = 1 - omega * dark_channel(I/A)
      - No guided filter refinement (compare raw transmission map)
      Compare: transmission map MAE and recovered scene MAE

    Clarity reference (Python):
      - blur = cv2.GaussianBlur(img, (0,0), sigma)
      - detail = img - blur
      - luma = 0.2126*R + 0.7152*G + 0.0722*B (normalized 0-1)
      - weight = 4 * luma * (1 - luma) * amount
      - output = img + detail * weight
      Compare: output MAE (should be < 2.0 for matching formula)

    Local Laplacian reference:
      Option A: vips locallaplacian (if vips available)
        vips locallaplacian input.png output.png sigma
      Option B: Python pyramid implementation
        Build Gaussian pyramid, remap, reconstruct
      Compare: MAE at matched sigma values

    Expected MAE thresholds:
    - Dehaze transmission: MAE < 5.0 (guided filter refinement differs)
    - Dehaze scene recovery: MAE < 10.0 (refinement propagates)
    - Clarity: MAE < 2.0 (exact formula match possible)
    - Local Laplacian vs vips: MAE < 15.0 (algorithm variants differ)
