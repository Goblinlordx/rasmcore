id: encoder-png_20260327101002Z
title: PNG Codec — Wire Compression Config, Add Filter Type, Parity Tests
type: feature
status: pending
created: 2026-03-27
updated: '2026-03-28'
spec:
  summary: 'Fix the PNG encoder to actually apply compression_level (currently ignored),

    add filter-type enum, enforce determinism, and validate against ImageMagick.

    The image crate''s PNG encoder with fdeflate is already a good backend —

    it is faster AND produces better compression than libpng. No backend swap

    needed, just wire up the config and test thoroughly.

    '
  context: 'PNG encoder landscape:

    1. image crate with fdeflate — faster AND better than libpng (current)

    2. Standard zlib/libpng — baseline

    3. Zopfli — 3-8% smaller, 80x slower (not worth it for default)

    4. oxipng — optimizer, good but overkill for encode-time


    The image crate is already the right choice for PNG. The problem is

    not the backend — it is that the config is not wired up.


    BUG — config not applied:

    - png.rs line 26: encode uses _config (underscore = unused!)

    - Calls img.write_to with ImageFormat::Png and NO config

    - compression_level has zero effect on output


    What is missing:

    - Wire compression_level to image::codecs::png::PngEncoder

    - Add filter-type enum (NoFilter, Sub, Up, Avg, Paeth, Adaptive)

    - Compression curve validation against ImageMagick

    - Determinism assertion


    Standards: ISO/IEC 15948 (PNG), RFC 1950/1951 (zlib/DEFLATE)


    Determinism: PNG encoding is fully deterministic. DEFLATE with fdeflate

    is deterministic for given settings. No PRNG involved.

    '
  codebase_analysis: '- png.rs line 29: uses img.write_to(&mut cursor, ImageFormat::Png) — ignores config

    - image crate PngEncoder supports CompressionType and FilterType

    - CompressionType: Default, Fast, Best, Huffman, Rle

    - FilterType: NoFilter, Sub, Up, Avg, Paeth, Adaptive

    - Fix: replace write_to with PngEncoder::new_with_quality(compression, filter)

    - image crate fdeflate already provides better compression than libpng

    - We expect to match or beat ImageMagick on file size since fdeflate is superior

    - Perceptual metrics not needed for PNG (lossless) — pixel-exact + file size

    '
  acceptance_criteria:
  - PNG encode function uses PngEncoder with compression and filter settings
  - compression_level (u8) actually affects output file size
  - WIT png-encode-config adds filter-type enum
  - WIT png-write-config adds filter-type field
  - Domain PngEncodeConfig adds filter_type field
  - Adapter and pipeline adapter updated for filter-type
  - Determinism test: encode same input twice, output is byte-identical
  - All PNG roundtrips are pixel-exact (lossless — no exceptions)
  - Compression curve: file sizes decrease monotonically with higher compression
  - File sizes equal to or smaller than ImageMagick at each compression level
  - Decoded pixels from both rasmcore and ImageMagick are identical (lossless)
  - All existing tests continue to pass
  out_of_scope: '- APNG (animated PNG)

    - PNG interlacing (Adam7)

    - ICC profile embedding — covered by p0-icc-profiles track

    - PNG text/metadata chunks

    - Zopfli optimization (80x slower for 3-8% gain — not default)

    '
  technical_notes: "Fix approach for png.rs encode():\n  let compression = match config.compression_level {\n      0 => CompressionType::Default,\n\
    \      1..=3 => CompressionType::Fast,\n      4..=6 => CompressionType::Default,\n      7..=9 => CompressionType::Best,\n\
    \      _ => CompressionType::Default,\n  };\n  let filter = match config.filter_type { ... };\n  let encoder = PngEncoder::new_with_quality(&mut\
    \ cursor, compression, filter);\n  img.write_with_encoder(encoder)?;\n\nNo backend swap needed. The image crate fdeflate\
    \ implementation is already\nbest-in-class for PNG. We just need to wire the config through.\n\nTesting strategy:\n1.\
    \ Determinism: encode(input, config) twice = identical bytes\n2. Pixel-exact roundtrip at every compression and filter\
    \ setting\n3. File sizes vs ImageMagick (expect equal or better due to fdeflate)\n4. If compression mapping is wrong (e.g.,\
    \ level 9 not smaller than 0),\n   adjust the CompressionType mapping\n"
