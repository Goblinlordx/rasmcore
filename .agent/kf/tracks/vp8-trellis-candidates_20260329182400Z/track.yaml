id: vp8-trellis-candidates_20260329182400Z
title: VP8 Trellis Candidate Fix — Codec-Aware Quantize + Wire Integration
type: bug
status: pending
created: '2026-03-29'
updated: '2026-03-28'
spec:
  summary: 'Fix the trellis candidate generation to use VP8''s actual quantization formula

    ((|c| + bias) * iq >> 16) instead of the generic (c / step). Then wire

    trellis_optimize into encode_macroblock, completing the trellis-webp track.

    '
  context: 'The trellis-webp track implemented Vp8TrellisContext (rate estimation) but

    the integration failed because rasmcore-trellis::generate_candidates uses

    generic integer division (coeff / quant_step) which doesn''t match VP8''s

    quantization formula. VP8 uses: level = (|coeff| + bias[i]) * iq[i] >> 16

    with per-position bias and inverse-quantizer tables. The mismatch caused

    quality to DROP from 19dB to 14dB on photo content when trellis was wired in.

    '
  codebase_analysis: "rasmcore-trellis/src/lib.rs generate_candidates():\n  - Uses round_down = abs_orig / q, round_up = round_down\
    \ + 1\n  - Distortion = (orig - level * dq)^2\n  - This produces WRONG candidates for VP8 (different levels than quantize_block)\n\
    \nrasmcore-webp/src/quant.rs:\n  - QuantMatrix has iq[] (inverse quantizer), bias[] (rounding bias), q[] (step)\n  - quantize_block:\
    \ level = (|c| + bias[i]) * iq[i] >> 16\n  - dequantize_block: recon = level * q[i]\n  - The bias is ~half the step size,\
    \ tuned per VP8 spec\n\nrasmcore-trellis needs either:\n  a) A codec-specific candidate generation callback, OR\n  b)\
    \ Accept pre-generated candidates as input\n\nOption (a) is cleaner: add a CandidateGenerator trait or closure parameter.\n"
  acceptance_criteria:
  - Trellis candidates match VP8 quantize_block output for round-to-nearest
  - Trellis produces equal or better quality than greedy rdo_prune_block
  - Quality ratio vs cwebp >= 0.65 for gradient Q75 (at least matches greedy RDO)
  - Photo content PSNR does not regress from pre-trellis baseline
  - All existing WebP tests pass
  - File sizes reasonable (within 2x of cwebp)
  out_of_scope: 'Trellis-aware intra mode selection. Adaptive lambda per macroblock.

    SIMD optimization of trellis inner loop.

    '
  technical_notes: "Approach: add a generate_candidates closure parameter to trellis_optimize\nso the codec controls candidate\
    \ level generation.\n\nVP8 candidate generator:\n  fn vp8_candidates(orig: i16, matrix: &QuantMatrix, pos: usize) -> Vec<Candidate>\
    \ {\n      let abs_c = orig.unsigned_abs() as u32;\n      let sign = if orig < 0 { -1 } else { 1 };\n      // Round-to-nearest\
    \ (same as quantize_block)\n      let level_rtn = ((abs_c + matrix.bias[pos]) * matrix.iq[pos]) >> 16;\n      // Dequantized\
    \ reconstruction\n      let recon_rtn = level_rtn as i32 * matrix.q[pos] as i32;\n      candidates.push(Candidate { level:\
    \ sign * level_rtn, distortion: (orig - recon)^2 });\n      // Round-down (one less)\n      if level_rtn > 1: push level_rtn\
    \ - 1\n      // Zero\n      push zero candidate\n  }\n\nThen wire trellis_optimize with the VP8 candidate generator into\n\
    encode_macroblock, replacing all 4 rdo_prune_block call sites.\n"
