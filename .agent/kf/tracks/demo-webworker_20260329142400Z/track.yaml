id: demo-webworker_20260329142400Z
title: Demo Web Worker — Off-Thread Pipeline Processing with Single-Slot Queue
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: 'Move all WASM pipeline processing to a Web Worker so the UI never freezes. Single-slot queue ensures only the
    latest chain config runs, with a processing indicator and no duplicate in-flight operations.

    '
  context: "Currently the demo runs all WASM processing on the main thread. Large images\nor complex chains freeze the UI\
    \ during processing — slider drags stutter,\nthe page becomes unresponsive.\n\nMoving to a Web Worker:\n- UI stays 100%\
    \ responsive during processing\n- Processing indicator shows when worker is busy\n- Single-slot queue: new requests replace\
    \ any pending (not accumulate)\n- ArrayBuffer transfer is zero-copy (Transferable)\n\nThe single-slot queue design:\n\
    - Slot 1 (active): currently processing in worker — never interrupted\n- Slot 2 (queued): latest chain config — replaces\
    \ on every new user action\n- When active finishes → if queued exists, promote and run; else idle\n- This ensures the\
    \ worker always processes the most recent user intent,\n  never wastes time on stale intermediate states\n"
  codebase_analysis: 'Current processing in demo/src/pipeline.js:

    - processChain() creates Pipeline, builds chain, encodes PNG

    - applyFullChain() does the same at full resolution

    - previewEditing() runs on thumbnail

    - All synchronous on main thread


    Worker architecture — two dedicated workers:

    - demo/src/main-worker.js: always running, full-res apply + export

    - demo/src/preview-worker.js: ephemeral, thumbnail preview during edit mode

    - Preview worker created when user enters edit, terminated on Apply/Cancel

    - Each worker loads its own SDK instance (WASM module shared via cache)

    - Communication: postMessage with Transferable ArrayBuffer

    - No SharedArrayBuffer needed (simpler, no COOP/COEP headers required)


    Benefits of separate workers:

    - Thumbnail preview never blocks full-res processing

    - Full-res apply never blocks UI or preview

    - Preview worker doesn''t consume memory when not editing

    - Each has its own single-slot queue

    '
  acceptance_criteria:
  - All pipeline processing runs in Web Worker (zero main thread blocking)
  - Processing indicator visible while worker is busy (spinner or progress bar)
  - Single-slot queue — new chain config replaces any pending, never accumulates
  - UI remains responsive during large image processing
  - Thumbnail preview also runs in worker (fast, but still off-thread)
  - Full-resolution apply runs in worker
  - Export/download runs in worker
  - ArrayBuffer transfer used for image data (zero-copy)
  - Worker initialization shows loading state until SDK is ready
  - Error from worker displayed in UI (not silent failure)
  out_of_scope: 'SharedArrayBuffer streaming.

    Progress reporting during single operation (would need WASM cooperation).

    '
  technical_notes: "Worker protocol (postMessage):\n\nMain → Worker:\n  { type: 'init' }\n    Worker loads SDK, responds {\
    \ type: 'ready' }\n\n  { type: 'load', imageBytes: ArrayBuffer }\n    Worker stores image + creates thumbnail\n    Responds\
    \ { type: 'loaded', info: { width, height, format } }\n\n  { type: 'process', chain: [{ op: 'blur', params: { radius:\
    \ 3 } }, ...], mode: 'thumb' | 'full' }\n    Worker builds pipeline from chain, encodes PNG\n    Responds { type: 'result',\
    \ png: ArrayBuffer, timings: [...], totalMs: N, mode }\n\n  { type: 'export', chain: [...], format: 'jpeg', quality: 85\
    \ }\n    Worker encodes in requested format\n    Responds { type: 'exported', data: ArrayBuffer, mime: 'image/jpeg' }\n\
    \nWorker → Main:\n  { type: 'ready' }\n  { type: 'loaded', info }\n  { type: 'result', png, timings, totalMs, mode }\n\
    \  { type: 'exported', data, mime }\n  { type: 'error', message }\n\nSingle-slot queue implementation:\n  let activeRequest\
    \ = null;   // currently being processed\n  let queuedRequest = null;   // latest pending (replaces on new)\n  let isProcessing\
    \ = false;\n\n  function requestProcess(chain, mode) {\n    if (isProcessing) {\n      queuedRequest = { chain, mode };\
    \  // replace, don't accumulate\n      return;\n    }\n    isProcessing = true;\n    activeRequest = { chain, mode };\n\
    \    worker.postMessage({ type: 'process', ...activeRequest });\n  }\n\n  worker.onmessage = (e) => {\n    if (e.data.type\
    \ === 'result') {\n      isProcessing = false;\n      renderResult(e.data);\n      if (queuedRequest) {\n        const\
    \ next = queuedRequest;\n        queuedRequest = null;\n        requestProcess(next.chain, next.mode);\n      }\n    }\n\
    \  };\n\nProcessing indicator:\n  Show spinner/pulsing border on preview canvas while isProcessing.\n  Hide when result\
    \ arrives.\n  If queued: show \"Queued...\" text alongside spinner.\n\nArrayBuffer transfer:\n  worker.postMessage({ type:\
    \ 'load', imageBytes }, [imageBytes]);\n  // imageBytes is transferred (zero-copy), becomes detached on main thread\n\n\
    \  // Worker responds:\n  self.postMessage({ type: 'result', png }, [png]);\n  // png ArrayBuffer transferred back to\
    \ main thread\n"
