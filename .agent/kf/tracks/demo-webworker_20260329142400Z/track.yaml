id: demo-webworker_20260329142400Z
title: Demo Web Worker — Off-Thread Pipeline Processing with Single-Slot Queue
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: >
    Move all WASM pipeline processing to a Web Worker so the UI never freezes.
    Single-slot queue ensures only the latest chain config runs, with a processing
    indicator and no duplicate in-flight operations.
  context: |
    Currently the demo runs all WASM processing on the main thread. Large images
    or complex chains freeze the UI during processing — slider drags stutter,
    the page becomes unresponsive.

    Moving to a Web Worker:
    - UI stays 100% responsive during processing
    - Processing indicator shows when worker is busy
    - Single-slot queue: new requests replace any pending (not accumulate)
    - ArrayBuffer transfer is zero-copy (Transferable)

    The single-slot queue design:
    - Slot 1 (active): currently processing in worker — never interrupted
    - Slot 2 (queued): latest chain config — replaces on every new user action
    - When active finishes → if queued exists, promote and run; else idle
    - This ensures the worker always processes the most recent user intent,
      never wastes time on stale intermediate states
  codebase_analysis: |
    Current processing in demo/src/pipeline.js:
    - processChain() creates Pipeline, builds chain, encodes PNG
    - applyFullChain() does the same at full resolution
    - previewEditing() runs on thumbnail
    - All synchronous on main thread

    Worker architecture — two dedicated workers:
    - demo/src/main-worker.js: always running, full-res apply + export
    - demo/src/preview-worker.js: ephemeral, thumbnail preview during edit mode
    - Preview worker created when user enters edit, terminated on Apply/Cancel
    - Each worker loads its own SDK instance (WASM module shared via cache)
    - Communication: postMessage with Transferable ArrayBuffer
    - No SharedArrayBuffer needed (simpler, no COOP/COEP headers required)

    Benefits of separate workers:
    - Thumbnail preview never blocks full-res processing
    - Full-res apply never blocks UI or preview
    - Preview worker doesn't consume memory when not editing
    - Each has its own single-slot queue
  acceptance_criteria:
    - All pipeline processing runs in Web Worker (zero main thread blocking)
    - Processing indicator visible while worker is busy (spinner or progress bar)
    - Single-slot queue — new chain config replaces any pending, never accumulates
    - UI remains responsive during large image processing
    - Thumbnail preview also runs in worker (fast, but still off-thread)
    - Full-resolution apply runs in worker
    - Export/download runs in worker
    - ArrayBuffer transfer used for image data (zero-copy)
    - Worker initialization shows loading state until SDK is ready
    - Error from worker displayed in UI (not silent failure)
  out_of_scope: |
    SharedArrayBuffer streaming.
    Progress reporting during single operation (would need WASM cooperation).
  technical_notes: |
    Worker protocol (postMessage):

    Main → Worker:
      { type: 'init' }
        Worker loads SDK, responds { type: 'ready' }

      { type: 'load', imageBytes: ArrayBuffer }
        Worker stores image + creates thumbnail
        Responds { type: 'loaded', info: { width, height, format } }

      { type: 'process', chain: [{ op: 'blur', params: { radius: 3 } }, ...], mode: 'thumb' | 'full' }
        Worker builds pipeline from chain, encodes PNG
        Responds { type: 'result', png: ArrayBuffer, timings: [...], totalMs: N, mode }

      { type: 'export', chain: [...], format: 'jpeg', quality: 85 }
        Worker encodes in requested format
        Responds { type: 'exported', data: ArrayBuffer, mime: 'image/jpeg' }

    Worker → Main:
      { type: 'ready' }
      { type: 'loaded', info }
      { type: 'result', png, timings, totalMs, mode }
      { type: 'exported', data, mime }
      { type: 'error', message }

    Single-slot queue implementation:
      let activeRequest = null;   // currently being processed
      let queuedRequest = null;   // latest pending (replaces on new)
      let isProcessing = false;

      function requestProcess(chain, mode) {
        if (isProcessing) {
          queuedRequest = { chain, mode };  // replace, don't accumulate
          return;
        }
        isProcessing = true;
        activeRequest = { chain, mode };
        worker.postMessage({ type: 'process', ...activeRequest });
      }

      worker.onmessage = (e) => {
        if (e.data.type === 'result') {
          isProcessing = false;
          renderResult(e.data);
          if (queuedRequest) {
            const next = queuedRequest;
            queuedRequest = null;
            requestProcess(next.chain, next.mode);
          }
        }
      };

    Processing indicator:
      Show spinner/pulsing border on preview canvas while isProcessing.
      Hide when result arrives.
      If queued: show "Queued..." text alongside spinner.

    ArrayBuffer transfer:
      worker.postMessage({ type: 'load', imageBytes }, [imageBytes]);
      // imageBytes is transferred (zero-copy), becomes detached on main thread

      // Worker responds:
      self.postMessage({ type: 'result', png }, [png]);
      // png ArrayBuffer transferred back to main thread
