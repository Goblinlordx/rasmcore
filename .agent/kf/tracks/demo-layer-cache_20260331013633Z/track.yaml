id: demo-layer-cache_20260331013633Z
title: Demo UI — Layer Cache Integration for Interactive Editing
type: feature
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: 'Update the demo web UI to create a LayerCache on startup and reuse it

    across pipeline invocations. When the user adjusts a single filter

    parameter, only the changed node and downstream recompute — upstream

    nodes serve from cache. Show cache stats in the UI.

    '
  context: 'The demo UI (demo/src/) builds a new pipeline for every parameter

    change. Currently each change recomputes the entire chain from source

    through all filters. With the LayerCache, the pipeline can skip

    recomputing unchanged upstream nodes.


    User experience improvement: adjusting brightness on the last filter

    of a 5-filter chain should feel near-instant instead of reprocessing

    decode + resize + blur + sharpen + brightness from scratch.

    '
  codebase_analysis: 'DEMO ARCHITECTURE:

    - demo/src/main.js — UI controls, dispatches to pipeline worker

    - demo/src/pipeline.js — builds pipeline from param state, calls WASM

    - demo/src/pipeline-worker.js — web worker running WASM component

    - demo/pipeline.html — pipeline builder UI


    CURRENT FLOW (no caching):

    1. User changes a slider

    2. JS rebuilds pipeline params object

    3. Worker receives params, creates new ImagePipeline

    4. Adds source, filters, writes output

    5. Returns encoded image to UI

    6. Pipeline dropped, all state lost


    WITH LAYER CACHE:

    1. Worker creates LayerCache on init (once, persists across messages)

    2. User changes a slider

    3. Worker creates pipeline WITH cache reference

    4. Unchanged upstream nodes hit cache — skip computation

    5. Only changed node + downstream recompute

    6. Pipeline dropped, cache persists for next change


    SDK INTEGRATION:

    - jco-generated JS bindings expose layer-cache resource

    - Worker holds cache instance as module-level variable

    - Pipeline constructor passes cache handle

    '
  acceptance_criteria:
  - LayerCache created once in web worker on initialization
  - Pipeline constructor receives cache reference on every invocation
  - Adjusting the last filter in a chain is measurably faster (2nd+ run)
  - Cache stats displayed in demo UI (entries, hits, misses, memory usage)
  - Cache enable/disable toggle (enabled by default, subtle placement)
  - Cache clear button (near toggle, small)
  - When disabled, pipeline runs without cache (no LayerCache passed)
  - Toggle state persists in localStorage
  - Existing demo functionality unchanged (just faster when enabled)
  out_of_scope: 'Cache persistence across page reloads (pixel data, not toggle state).

    Cache size configuration UI. Visual diff showing cached vs recomputed.

    '
  technical_notes: "WORKER CHANGES (pipeline-worker.js):\n\n```js\n// Module-level cache (persists across messages)\nlet layerCache\
    \ = null;\n\n// On init:\nlayerCache = new LayerCache(64); // 64 MB budget\n\n// On pipeline execution:\nconst pipeline\
    \ = new ImagePipeline(layerCache);\n// ... add nodes, write output\n// Pipeline dropped, cache persists\n\n// On cache\
    \ clear message:\nlayerCache.clear();\n```\n\nUI CHANGES (pipeline.html or main.js):\n- Small cache panel in bottom-right\
    \ or sidebar footer (not prominent)\n- Contains: toggle switch (on/off), stats line, clear button\n- Style: muted colors,\
    \ small font, collapses to just the toggle when idle\n- Example layout:\n  [Cache: ON] 3 entries | 12 hits | 4.2 MB  [Clear]\n\
    - Toggle sends message to worker: { type: 'cache-toggle', enabled: bool }\n- Worker creates/drops LayerCache based on\
    \ toggle state\n- Toggle state saved to localStorage('rasmcore-demo-cache-enabled')\n- Add \"Clear Cache\" button\n- Stats\
    \ updated after each pipeline execution\n\nPERFORMANCE MEASUREMENT:\n- Log pipeline execution time (performance.now())\n\
    - Show in UI: \"Pipeline: 45ms (3 cache hits, 1 miss)\"\n"
