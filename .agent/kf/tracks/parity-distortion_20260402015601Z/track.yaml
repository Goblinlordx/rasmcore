id: parity-distortion_20260402015601Z
title: Parity tests for distortion filters — barrel, spherize, swirl, ripple, wave, polar
type: chore
status: pending
created: '2026-04-02'
updated: '2026-04-02'
spec:
  summary: |
    Add reference parity tests for the distortion filter suite against OpenCV
    and ImageMagick. Currently at 12% coverage — only mesh_warp is validated.
  context: |
    Distortion filters are high-impact creative effects (PS Liquify, Lens
    Correction, etc.). 7 of 8 distortion operations have no reference validation.
    These filters involve coordinate transforms + interpolation — subtle bugs
    (off-by-one, wrong interpolation order, incorrect center normalization)
    are common and invisible without reference testing.
  codebase_analysis: |
    Implementations in crates/rasmcore-image/src/domain/filters/distortion/:
    - barrel.rs: barrel/pincushion distortion (k1, k2 coefficients)
    - spherize.rs: spherical bulge/pinch
    - swirl.rs: angular rotation proportional to radius
    - ripple.rs: radial sinusoidal displacement
    - wave.rs: horizontal/vertical sinusoidal displacement
    - polar.rs: cartesian to polar coordinate transform
    - depolar.rs: polar to cartesian coordinate transform

    All use apply_distortion() helper with EWA sampling (CPU) or bilinear (GPU).
    Reference tools:
    - OpenCV: remap, warpPolar (for polar/depolar)
    - ImageMagick: -distort Barrel, -distort Arc, -distort SRT
    - scipy.ndimage: map_coordinates for arbitrary distortion

    Known: GPU spherize uses a different formula (asin-based) than CPU (powf-based).
    MAE ~1.3 between GPU and CPU is documented and acceptable.
  acceptance_criteria:
    - Barrel distortion parity test against OpenCV undistort or scipy map_coordinates
    - Spherize parity test against ImageMagick -distort Barrel equivalent
    - Swirl parity test against scipy swirl or ImageMagick -swirl
    - Ripple parity test against scipy sinusoidal displacement
    - Wave parity test against numpy/scipy sinusoidal shift
    - Polar/depolar roundtrip test (polar then depolar recovers original within tolerance)
    - All tests MAE < 2.0 (interpolation differences expected)
  out_of_scope: |
    GPU vs CPU parity (already covered in gpu_parity.rs).
    mesh_warp (already has parity test).
    Fixing interpolation algorithms (document differences if found).
  technical_notes: |
    Distortion filters have inherent differences from references due to:
    - Different interpolation methods (EWA vs bilinear vs bicubic)
    - Different border handling (clamp vs reflect vs black)
    - Different center normalization conventions

    Use MAE < 2.0 as threshold (not exact match). For polar/depolar, test
    roundtrip identity within MAE < 3.0 (two interpolation passes).

    scipy.ndimage.map_coordinates is the most flexible reference — can
    implement any distortion via coordinate arrays.
