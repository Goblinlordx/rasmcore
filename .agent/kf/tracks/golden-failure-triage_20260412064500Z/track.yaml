id: golden-failure-triage_20260412064500Z
title: Triage golden validation failures — root cause + authority decisions
type: chore
status: pending
created: 2026-04-12
updated: '2026-04-12'
spec:
  summary: 'Investigate each golden validation failure, determine root cause,

    and decide: fix our implementation, fix our reference, or change

    the external authority tool.

    '
  context: "Golden validation (pipeline + reference vs external tool output)\nfound 10 failures across color ops. Each failure\
    \ needs individual\ninvestigation to determine:\n\n1. Is our pipeline wrong? (fix pipeline)\n2. Is our reference wrong?\
    \ (fix reference)\n3. Is the golden generator wrong? (fix golden, different external tool)\n4. Are we and the external\
    \ tool using different algorithms intentionally?\n   (choose which is correct for our design goals, document in AUTHORITY.md)\n\
    \nCurrent failures (from golden-color-ops track):\n\nA. white_balance_temperature (diff=0.59, both ref+pipe fail)\n  \
    \ - Our CAT16 vs colour-science's CAT16\n   - Likely: different xy→XYZ normalization or adaptation degree\n\nB. lab_adjust\
    \ (ref diff=0.00007, pipe diff=0.24)\n   - Our Lab matrices vs colour-science's\n   - Reference almost matches, pipeline\
    \ way off\n\nC. vibrance (ref diff=0.21-0.24, pipe passes)\n   - Pipeline matches golden, reference doesn't\n   - Reference\
    \ formula is wrong\n\nD. selective_color (ref diff=0.04, pipe diff=0.45)\n   - Cosine falloff formula differences\n  \
    \ - Both wrong relative to golden\n\nE. replace_color (ref diff=0.31, pipe diff=0.66)\n   - Same issue as selective_color\n\
    \nF. quantize (ref diff=0.07-0.33, pipe diff=0.69)\n   - Pipeline uses median-cut palette, golden uses floor quantize\n\
    \   - Fundamentally different algorithms\n\nG. aces_cct_to_cg (ref diff=0.00003, pipe diff=0.0017)\n   - Small precision\
    \ diff in ACEScct log transfer constants\n\nH. aces_cg_to_cct (pipe diff=0.00002)\n   - Inverse of G, same precision issue\n"
  acceptance_criteria:
  - Each failure has documented root cause
  - Each failure has a decision (fix pipeline / fix reference / change authority)
  - Decisions documented in AUTHORITY.md with rationale
  - All fixable failures are fixed (golden tests pass)
  - Unfixable differences have documented justification
  out_of_scope: 'Adding golden tests for new filter categories (spatial, enhancement, etc.)

    Those are in separate golden-* tracks.

    '
  technical_notes: "Investigation approach per failure:\n\n1. Print actual values from pipeline, reference, and golden at\
    \ the\n   failing pixel. Identify WHERE the values diverge.\n2. For matrix differences (CAT16, Lab): compare our matrix\
    \ constants\n   against colour-science's source code. Check if they use different\n   standards (CIE 2006 vs CIE 1931,\
    \ different whitepoint, etc.).\n3. For algorithm differences (quantize): determine which algorithm\n   our pipeline actually\
    \ implements, and choose a golden generator\n   that matches. If our pipeline uses median-cut, the golden should\n   test\
    \ median-cut behavior, not floor quantization.\n4. For formula differences (selective_color, vibrance): compare the\n\
    \   exact formula step by step between pipeline, reference, and golden.\n   Find the specific step where they diverge.\n"
