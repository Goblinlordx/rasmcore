id: bench-ref-comparisons_20260330032100Z
title: Benchmark Reference Comparisons — ImageMagick for Color, Edge, Threshold, Blend
type: chore
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: 'Add ImageMagick benchmark comparisons to perf.rs for all operations that currently only measure rasmcore throughput
    without a reference baseline.

    '
  context: "The benchmark suite has 63 benchmarks across color_tone, edge, threshold,\nand alpha_blend groups, but only 3\
    \ have ImageMagick comparisons (brightness,\nsobel, and the codec groups). Without reference comparisons, we can measure\n\
    throughput but cannot make competitive performance claims.\n\nImageMagick 7.1.x supports equivalents for nearly every\
    \ operation:\n  - contrast: -sigmoidal-contrast 5,50%\n  - hue_rotate: -modulate 100,100,X (where X = degrees/360*200)\n\
    \  - saturate: -modulate 100,X,100\n  - sepia: -sepia-tone 80%\n  - scharr/laplacian: -morphology Convolve Scharr/Laplacian\n\
    \  - canny: -canny 0x1+10%+30%\n  - otsu: -auto-threshold OTSU\n  - adaptive_threshold: N/A (no direct IM equivalent,\
    \ skip)\n  - premultiply: N/A (internal alpha state, not a standalone IM op)\n  - blend: -compose Multiply/Screen -composite\n\
    \  - vignette: -vignette 0x10\n  - pad: -border 10 -bordercolor black\n  - trim: -trim\n\nThe existing magick_pipeline()\
    \ helper in ref_tools.rs handles all of these.\nThe adjusted comparison methodology (subtract decode+encode baseline)\
    \ is\ndocumented in RESULTS-2026-03-30.md.\n"
  codebase_analysis: "Existing IM comparisons in perf.rs:\n  - decoder group: all codecs (JPEG, PNG, WebP, TIFF, GIF, BMP,\
    \ AVIF)\n  - encoder group: all codecs\n  - filter group: resize, blur, sharpen, grayscale\n  - transform group: crop,\
    \ rotate_90, flip_horizontal\n  - geometric group: perspective_warp, affine\n  - color_tone group: brightness only\n\n\
    Missing IM comparisons (operations WHERE IM has an equivalent):\n  - color_tone: contrast, hue_rotate, saturate, sepia\n\
    \  - edge: scharr, laplacian, canny (sobel already has IM)\n  - threshold: otsu (IM has -auto-threshold OTSU)\n  - alpha_blend:\
    \ blend_multiply, blend_screen (IM has -compose)\n  - alpha_blend: vignette_powerlaw (IM has -vignette)\n  - transform:\
    \ pad, trim (from the earlier benchmark track)\n\nref_tools.rs already has magick_pipeline() which accepts arbitrary ops.\n\
    No new helper functions needed — just new bench_function calls.\n"
  acceptance_criteria:
  - ImageMagick comparison for contrast (sigmoidal-contrast)
  - ImageMagick comparison for hue_rotate (modulate)
  - ImageMagick comparison for saturate (modulate)
  - ImageMagick comparison for sepia (sepia-tone)
  - ImageMagick comparison for canny (-canny)
  - ImageMagick comparison for scharr (-morphology Convolve)
  - ImageMagick comparison for laplacian (-morphology Convolve)
  - ImageMagick comparison for otsu (-auto-threshold OTSU)
  - ImageMagick comparison for blend_multiply and blend_screen (-compose)
  - ImageMagick comparison for vignette (-vignette)
  - ImageMagick comparison for pad (-border) and trim (-trim)
  - All benchmarks compile and pass --test mode
  out_of_scope: 'Adding new benchmark groups or operations.

    Parity validation tests (that is the companion track).

    adaptive_threshold, premultiply, unpremultiply, pyr_down, pyr_up

    (no direct ImageMagick equivalent).

    retinex, dehaze, clarity, mertens_fusion (no IM equivalent).

    displacement_map (no IM equivalent).

    '
  technical_notes: "All additions follow the existing pattern in perf.rs:\n  if ref_tools::has_tool(\"magick\") {\n      let\
    \ p = png_path_str.clone();\n      group.bench_function(BenchmarkId::new(\"op/imagemagick\", size), |b| {\n          b.iter(||\
    \ ref_tools::magick_pipeline(&p, &[...], \"png\", None));\n      });\n  }\n\nFor edge detectors, IM needs grayscale input.\
    \ The existing edge group\nalready decodes to grayscale — the IM comparison should also convert\nto grayscale first (-colorspace\
    \ Gray) before applying the edge op.\n\nFor blend modes, IM needs two input images. Use the same self-blend\napproach:\
    \ magick convert fg.png bg.png -compose Multiply -composite out.png\n\nFor threshold (otsu), IM outputs a binary image.\
    \ The benchmark measures\nthroughput, not output comparison — different output format is fine.\n"
