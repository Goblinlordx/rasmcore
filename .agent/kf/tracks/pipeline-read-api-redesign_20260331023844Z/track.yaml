id: pipeline-read-api-redesign_20260331023844Z
title: Pipeline Metadata Architecture — Flowing Metadata, Immediate Read, Vips-Parity
type: refactor
status: pending
created: '2026-03-31'
updated: '2026-03-31'
spec:
  summary: |
    Redesign the pipeline so metadata flows as a first-class value alongside
    pixels through every node. Read() parses metadata immediately. Nodes
    consume, update, or pass through metadata. Eliminates explicit metadata
    parameter passing (ICC profiles, orientation, etc.). Vips API parity.
  context: |
    Currently metadata is a sidecar stashed on the pipeline resource,
    parsed lazily from cloned raw bytes. ICC profiles and EXIF orientation
    are passed as explicit parameters to operations that need them. This
    creates awkward "extract then pass back" patterns.

    The fix: make metadata a generic dictionary that flows through the
    pipeline graph. Each node receives upstream metadata and can read,
    modify, or pass it through. Operations that need metadata (icc_to_srgb,
    auto_orient, DPI-aware resize) read it from the flowing state instead
    of taking it as a parameter.

    This matches how libvips works: every VipsImage carries a metadata
    dictionary, and operations propagate/update it automatically.
  codebase_analysis: |
    CURRENT METADATA HANDLING:
    - Pipeline stashes raw source bytes for lazy metadata parsing
    - ICC profile: extracted by decoder, passed explicitly to icc_to_srgb()
    - EXIF orientation: passed explicitly to auto_orient()
    - keep-metadata/set-metadata: sidecar flags on pipeline resource
    - Metadata not visible to filter nodes

    WHAT CHANGES:
    - ImageNode trait gains metadata in/out
    - NodeGraph tracks metadata per node (not per tile — metadata is global)
    - read() parses metadata immediately, attaches to source node
    - Each node receives upstream metadata, returns (possibly modified) metadata
    - icc_to_srgb reads metadata["icc_profile"] instead of taking it as param
    - auto_orient reads metadata["exif.Orientation"] instead of taking it as param
    - write() reads final metadata state to embed in output
    - Helper functions for typed access: metadata.icc_profile(), metadata.exif_orientation()

    METADATA STRUCTURE:
    - Generic: HashMap<String, MetadataValue>
    - MetadataValue: String, Int(i64), Float(f64), Bytes(Vec<u8>), Bool
    - Namespaced keys: "exif.Orientation", "iptc.Caption", "xmp.Creator", "icc_profile"
    - Format-specific helpers for typed access

    VIPS COMPARISON:
    - vips_image_get/set_string/int/double/blob — typed metadata access
    - vips_image_get_fields() — list all metadata keys
    - Metadata propagated automatically through operations
    - Operations update metadata (e.g., resize updates width/height)
    - VipsImage is both pixels + metadata — not separate

    NODE METADATA FLOW:
    - Most nodes: pass through unchanged (blur, sharpen, brightness)
    - auto_orient: reads exif.Orientation, applies transform, sets to 1
    - icc_to_srgb: reads icc_profile, converts, removes from metadata
    - resize: updates exif.Width, exif.Height
    - crop: updates exif.Width, exif.Height
    - set_metadata: adds/overwrites a key
    - strip_metadata: removes a key or namespace
    - write: reads final metadata state for embedding

    CACHE IMPLICATIONS:
    - Layer cache hash should include metadata state
    - For pass-through nodes: metadata hash is same as upstream (no invalidation)
    - For metadata-modifying nodes: hash changes (correct invalidation)
  acceptance_criteria:
    - Metadata is a generic Map type flowing through every node
    - read() returns metadata immediately (parsed from headers at read time)
    - icc_to_srgb no longer takes icc_profile parameter (reads from metadata)
    - auto_orient no longer takes orientation parameter (reads from metadata)
    - Metadata state is different at each pipeline step (correct mutation)
    - Helper functions for typed access (icc_profile, exif_orientation, etc.)
    - keep-metadata/set-metadata/strip-metadata work on the flowing metadata
    - write embeds final metadata state in output
    - Width/height/format available immediately from read-result
    - Non-fatal metadata parse errors collected as warnings
    - Memory usage reduced (no duplicate buffer)
    - Vips field access coverage benchmark
    - All existing pipeline tests pass (with updated API calls)
  out_of_scope: |
    Per-tile metadata (metadata is per-node, not per-region).
    Streaming metadata (metadata fully available at node creation).
    Custom metadata types beyond string/int/float/bytes/bool.
    Metadata validation schemas.
  technical_notes: |
    METADATA TYPE:

    ```rust
    #[derive(Debug, Clone)]
    pub enum MetadataValue {
        String(String),
        Int(i64),
        Float(f64),
        Bytes(Vec<u8>),
        Bool(bool),
    }

    #[derive(Debug, Clone, Default)]
    pub struct Metadata {
        entries: HashMap<String, MetadataValue>,
    }

    impl Metadata {
        pub fn get(&self, key: &str) -> Option<&MetadataValue> { ... }
        pub fn set(&mut self, key: &str, value: MetadataValue) { ... }
        pub fn remove(&mut self, key: &str) -> Option<MetadataValue> { ... }
        pub fn keys(&self) -> impl Iterator<Item = &str> { ... }

        // Typed helpers
        pub fn icc_profile(&self) -> Option<&[u8]> { ... }
        pub fn exif_orientation(&self) -> Option<u32> { ... }
        pub fn width(&self) -> Option<u32> { ... }
        pub fn height(&self) -> Option<u32> { ... }
    }
    ```

    IMAGENODE TRAIT CHANGE:

    ```rust
    // Current:
    trait ImageNode {
        fn info(&self) -> ImageInfo;
        fn compute_region(&self, request, upstream_fn) -> Result<Vec<u8>>;
    }

    // New: metadata flows alongside
    trait ImageNode {
        fn info(&self) -> ImageInfo;
        fn metadata(&self) -> &Metadata;  // this node's output metadata
        fn compute_region(&self, request, upstream_fn) -> Result<Vec<u8>>;
    }
    ```

    Metadata is set at node creation time (from upstream) and stored
    on the node. compute_region doesn't change — it only handles pixels.
    The metadata flow is determined when the graph is built, not during
    tile execution.

    NODE CREATION FLOW:
    ```rust
    // Adding a blur node:
    fn add_blur(&mut self, source: NodeId, radius: f32) -> NodeId {
        let upstream_meta = self.node_metadata(source).clone();
        // Blur doesn't modify metadata — pass through
        let node = BlurNode::new(source, src_info, radius, upstream_meta);
        self.add_node(Box::new(node))
    }

    // Adding auto_orient:
    fn add_auto_orient(&mut self, source: NodeId) -> NodeId {
        let mut meta = self.node_metadata(source).clone();
        let orientation = meta.exif_orientation().unwrap_or(1);
        meta.set("exif.Orientation", MetadataValue::Int(1)); // reset after applying
        let node = AutoOrientNode::new(source, src_info, orientation, meta);
        self.add_node(Box::new(node))
    }
    ```

    WIT CHANGES:
    ```wit
    record read-result {
        source: node-id,
        format: string,
        width: u32,
        height: u32,
        warnings: list<string>,
    }

    // read returns structured result
    read: func(data: buffer) -> result<read-result, rasmcore-error>;

    // Metadata access at any node (reads flowing metadata state)
    node-metadata-dump: func(node: node-id) -> result<string, rasmcore-error>;
    node-metadata-read: func(node: node-id, path: string) -> result<option<string>, rasmcore-error>;

    // icc_to_srgb simplified (reads ICC from metadata)
    icc-to-srgb: func(source: node-id) -> result<node-id, rasmcore-error>;

    // auto_orient simplified (reads orientation from metadata)
    auto-orient: func(source: node-id) -> result<node-id, rasmcore-error>;
    ```
