id: metadata-only-decode_20260409104202Z
title: Metadata-only decode path (no pixel decoding)
type: feature
status: pending
created: '2026-04-09'
updated: '2026-04-09'
spec:
  summary: Add decode_metadata_only to Decoder trait that parses metadata (EXIF, ICC, XMP, dimensions) without decoding pixel
    data. Useful for file browsers, batch metadata extraction, and pre-flight color space detection.
  context: Current decoders must fully decode pixel data to get metadata. For file browsers, batch metadata extraction, and
    pre-flight color space detection, we need a fast path that parses only headers/metadata without decoding compressed pixel
    data. V1 decoders already have the parsing logic — this adds a trait method that stops after metadata extraction.
  codebase_analysis: ''
  acceptance_criteria:
  - Decoder trait has decode_metadata method returning MetadataSet + dimensions without pixel data
  - JPEG metadata-only parses APP markers (EXIF, ICC, XMP) without Huffman decoding
  - PNG metadata-only parses chunks before IDAT (cICP, iCCP, tEXt, eXIf)
  - WebP metadata-only parses RIFF chunks (ICCP, EXIF, XMP) without VP8 decoding
  - Metadata-only path is at least 10x faster than full decode for large images
  - WIT probe-metadata method exposed on pipeline resource
  out_of_scope: Parsing EXIF fields into structured data. Streaming metadata from partial file reads. Metadata editing/modification.
  technical_notes: ''
plan:
