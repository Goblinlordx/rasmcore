id: trellis-webp_20260329180301Z
title: VP8 Trellis Integration — Wire Shared Engine into WebP Encoder
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-28'
spec:
  summary: 'Implement TrellisContext for VP8 using the token probability tables, and replace

    the greedy RDO pruning in rdo.rs with full trellis quantization from

    rasmcore-trellis. Expected to push quality ratio from ~0.63 to ~0.8+ vs cwebp.

    '
  context: 'The rdo.rs greedy pruning makes locally optimal decisions per coefficient.

    Trellis quantization finds the globally optimal combination by considering

    that zeroing coefficient N changes the context for N+1. VP8 has 3 context

    states (zero, one, large) and 4 block types with separate probability tables.

    '
  codebase_analysis: 'token.rs: DEFAULT_COEFF_PROBS[1056] as [4 types][8 bands][3 ctx][11 nodes].

    get_coeff_probs(type, band, ctx) returns the 11-node probability slice.

    BANDS[17] maps position to band index.


    rdo.rs: estimate_token_cost() already walks the probability tree — this logic

    moves into the VP8 TrellisContext::token_cost() implementation.


    bitstream.rs: encode_macroblock calls rdo_prune_block after quantize_block.

    Replace with trellis_optimize() which does quantization + optimization in one pass.


    quant.rs: QuantMatrix has q[] (step sizes) and iq[]/bias[] for quantization.

    The trellis needs q[] for dequantization and iq[]/bias[] for candidate generation.

    '
  acceptance_criteria:
  - Vp8TrellisContext implements TrellisContext trait using VP8 token probability tables
  - VP8 context states map to 3 states (zero/one/large)
  - Replace rdo_prune_block calls with trellis_optimize in encode_macroblock
  - Quality ratio vs cwebp >= 0.75 for gradient at Q75 (up from ~0.63)
  - Checkerboard PSNR >= 30 dB (up from 25.6 dB)
  - File size within 2x of cwebp for all test patterns
  - All parity tests pass with updated thresholds
  - Encode time overhead acceptable (< 5x baseline)
  out_of_scope: 'Trellis-aware mode selection (separate track). Adaptive lambda per MB.

    VP8 inter-frame trellis. SIMD optimization of trellis inner loop.

    '
  technical_notes: "Vp8TrellisContext implementation:\n  struct Vp8TrellisContext {\n      block_type: u8,  // 0=Y-AC, 1=Y2,\
    \ 2=UV, 3=Y-with-DC\n  }\n\n  impl TrellisContext for Vp8TrellisContext {\n      const NUM_STATES: usize = 3;  // 0=zero/eob,\
    \ 1=one, 2=large\n\n      fn token_cost(&self, level, position, state) -> u32 {\n          let band = BANDS[position];\n\
    \          let probs = get_coeff_probs(self.block_type, band, state);\n          // Walk VP8 token tree for this level\n\
    \      }\n\n      fn next_state(&self, level, _state) -> usize {\n          match level.unsigned_abs() {\n           \
    \   0 => 0,  // zero\n              1 => 1,  // one\n              _ => 2,  // large\n          }\n      }\n\n      fn\
    \ eob_cost(&self, position, state) -> u32 {\n          // Cost of the EOB token at this position\n          let band =\
    \ BANDS[position + 1]; // EOB uses next position's band\n          let probs = get_coeff_probs(self.block_type, band,\
    \ state);\n          prob_cost(probs[0])  // probability of \"zero\" at is_nonzero node\n      }\n  }\n\nIntegration:\
    \ in encode_macroblock, replace:\n  quantize_block(&coeffs, &matrix, &mut quantized);\n  rdo_prune_block(&mut quantized,\
    \ &coeffs, &matrix, block_type, lambda);\nwith:\n  let ctx = Vp8TrellisContext { block_type };\n  trellis_optimize(&coeffs,\
    \ &matrix.q, &matrix.q, &ctx, &config, &mut quantized);\n"
