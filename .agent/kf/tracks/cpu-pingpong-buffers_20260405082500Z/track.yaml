  - text: Graph holds BufferPool, resizes on first request_full based on image dimensions
    done: true
- phase: Execution Path
  tasks:
  - text: Update request_region to use pooled buffers for intermediate results instead of fresh allocations
    done: true
  - text: SourceNode.compute writes into pre-allocated buffer via memcpy instead of clone
    done: true
  - text: FusedPointOpNode.compute writes into pre-allocated buffer instead of allocating
    done: true
  - text: Spatial cache store takes ownership of buffer (no clone) or uses Rc sharing
    done: true
- phase: Verification
  tasks:
  - text: Benchmark brightness 640x427 — verify render drops from ~12ms to <3ms
    done: true
  - text: Test multi-node chains (brightness + contrast + blur) produce correct output
    done: true
  - text: Test image size change (load different image) triggers buffer resize
    done: true
