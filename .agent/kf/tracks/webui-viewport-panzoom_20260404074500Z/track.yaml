id: webui-viewport-panzoom_20260404074500Z
title: 'Web UI: viewport-filling canvas with pan/zoom and split view fix'
type: feature
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: 'Make the image canvas fill all available viewport space, add mouse wheel

    zoom and click-drag pan, and fix the broken split view mode.

    '
  context: 'Currently the canvas is centered in a flex container with max-width/max-height

    CSS constraints. It does not fill available space — there are gaps around the

    image. There is no pan or zoom. Split view mode (original vs processed) is

    broken and crashes the UI. The canvas area is the primary editing workspace

    and should behave like a professional image editor viewport.

    '
  codebase_analysis: "Layout: App.tsx renders a three-part vertical layout (toolbar 40px, main flex,\nstatus 28px). Main is\
    \ horizontal flex: canvas-area (flex:1) + right panel (320px).\n\nCanvas sizing: Canvas.tsx sets canvas DOM width/height\
    \ to image intrinsic dims.\nCSS max-width:100% and max-height:calc(100vh-140px) constrain display. Browser\nscales down\
    \ large images via CSS, not programmatically.\n\nCurrent canvas styles (.canvas-area canvas):\n  max-width: 100%; max-height:\
    \ calc(100vh - 140px);\n  border: 1px solid #222; border-radius: 4px;\n\nNo event listeners for mouse wheel, pan, or pinch\
    \ on canvas.\nNo transform/translate state management.\n\nSplit view (Canvas.tsx): Uses viewMode state (current/original/split).\n\
    Split mode positions two canvases (preview + original) with clip-path\ninset and a draggable divider. The split view is\
    \ broken — likely because\ncanvas dimensions change when worker results arrive, causing the clip-path\nand absolute positioning\
    \ to become inconsistent.\n\nStyling: Plain CSS in index.html style block. No Tailwind.\n"
  acceptance_criteria:
  - Canvas fills all available viewport space (no dead space around image)
  - Image is displayed at fit-to-viewport zoom by default (letterboxed if aspect differs)
  - Mouse wheel zooms in/out centered on cursor position
  - Click-drag pans when zoomed in (cursor changes to grab/grabbing)
  - Zoom level indicator shown (e.g. 50%, 100%, Fit)
  - Double-click or keyboard shortcut resets to fit-to-viewport
  - Split view works correctly — original vs processed side by side with draggable divider
  - Pan/zoom state is preserved when switching between current/original/split views
  - Works with images of any aspect ratio and size
  out_of_scope: 'Preview overlay system (separate track). Touch/pinch gestures (future).

    Pixel-level inspection tools. Ruler/guides.

    '
  technical_notes: "Approach:\n1. Replace CSS max-width/max-height constraint with a container-filling approach.\n   Canvas\
    \ container measures its available space (ResizeObserver or useLayoutEffect).\n   Canvas CSS is set to fill the container.\
    \ A CSS transform (scale + translate)\n   controls zoom and pan — the canvas DOM resolution stays at image size.\n\n2.\
    \ Pan/zoom state: { zoom: number, panX: number, panY: number }\n   - zoom = 1.0 means fit-to-viewport (default)\n   -\
    \ Wheel event: deltaY controls zoom, centered on mouse position\n   - MouseDown + MouseMove: pan (only when zoomed > fit)\n\
    \   - Clamp zoom to reasonable range (0.1x to 32x)\n\n3. CSS transform approach (not canvas re-render):\n   - Wrap canvas\
    \ in a div with overflow:hidden\n   - Apply transform: scale(zoom) translate(panX, panY) to canvas\n   - No re-rendering\
    \ of pixels — pure CSS transform\n   - transform-origin: 0 0 (top-left), compute offset for center-on-cursor zoom\n\n\
    4. Split view fix: Both canvases must share the same zoom/pan state and\n   container dimensions. Use the same transform\
    \ approach. Clip-path for\n   split uses percentage of viewport, not pixel positions.\n\n5. Fit-to-viewport calculation:\
    \ min(containerW/imageW, containerH/imageH)\n"
