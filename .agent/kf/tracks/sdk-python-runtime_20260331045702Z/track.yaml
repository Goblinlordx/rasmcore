id: sdk-python-runtime_20260331045702Z
title: "Python SDK — Dynamic Runtime + Typegen CLI"
type: feature
status: pending
created: "2026-03-31"
updated: "2026-03-31"
spec:
  summary: |
    Build the Python SDK as a PyPI package with dynamic runtime (loads any
    WASM module via wasmtime-py + manifest introspection) and a typegen CLI
    that generates typed wrappers with full type hints.
  context: |
    Same two-layer architecture as TypeScript SDK but in Python.
    Dynamic runtime uses wasmtime-py to load WASM components.
    Typed layer generates a Python class with methods, docstrings with
    param ranges/defaults, and .pyi stub files for IDE autocomplete.
    Typegen runs in pure Python — no Rust or Node needed.
  codebase_analysis: |
    sdks/python/ (after restructure):
    - rasmcore/runtime.py — RcImageDynamic class (dynamic, universal)
    - rasmcore/types.py — FilterManifest, ParamMeta dataclasses
    - rasmcore/typegen.py — CLI: python -m rasmcore.typegen ./module.wasm
    - pyproject.toml — rasmcore package, console_scripts entry

    Consumer workflow:
    - pip install rasmcore
    - Dynamic: from rasmcore import RcImage; img = RcImage.load(wasm_path, data).apply('blur', radius=3)
    - Typed: python -m rasmcore.typegen ./rasmcore.wasm > rasmcore_typed.py
             from rasmcore_typed import RcImage; img = RcImage.load(wasm_path, data).blur(radius=3)
  acceptance_criteria:
    - sdks/python/rasmcore/runtime.py implements RcImageDynamic with apply() and encode()
    - Runtime loads WASM module via wasmtime-py, discovers filters via get_filter_manifest()
    - Runtime validates params against manifest metadata
    - "python -m rasmcore.typegen generates typed RcImage class with docstrings"
    - Generated .pyi stub file provides IDE autocomplete
    - Generated class embeds manifest hash for version validation
    - Terminal methods generated from registered encoders
    - Basic smoke test passes
    - Package publishable as rasmcore on PyPI
  out_of_scope: |
    Go/Rust SDKs. async API. Numpy/PIL integration. Publishing to PyPI.
  technical_notes: |
    RUNTIME:
    ```python
    class RcImageDynamic:
        @classmethod
        def load(cls, wasm_path: str, data: bytes) -> 'RcImageDynamic': ...
        def apply(self, filter_name: str, **params) -> 'RcImageDynamic': ...
        def encode(self, format: str, **config) -> bytes: ...
        @property
        def manifest(self) -> FilterManifest: ...
    ```

    TYPEGEN OUTPUT:
    ```python
    class RcImage(RcImageDynamic):
        def blur(self, radius: float = 3.0) -> 'RcImage':
            '''Gaussian blur. radius: 0.0-100.0'''
            return self.apply("blur", radius=radius)
        def to_jpeg(self, quality: int = 85) -> bytes:
            '''Encode as JPEG.'''
            return self.encode("jpeg", quality=quality)
    ```
