spec:
  summary: Extract convolve, interpolation, color_spaces, color_lut, and math helpers into a new rasmcore-kernel crate. Pure
    computation — no pipeline dependencies.
  context: filters.rs is 24K lines. Many filters share convolve(), color space conversions, LUT infrastructure, and interpolation
    math. These are pure computation with no pipeline coupling — ideal for a shared crate that rasmcore-image and future crates
    depend on.
  codebase_analysis: 'EXTRACT TARGETS:

    - convolve() from filters.rs (~200 lines) — N×N convolution with separability detection, WASM SIMD128

    - color_spaces.rs (1109 lines) — RGB↔LAB, RGB↔OKLab, Bradford adaptation, delta-E, white balance

    - color_lut.rs (1099 lines) — 3D CLUT infrastructure, compose, apply, ColorLut3D

    - point_ops.rs (1477 lines) — LUT composition, build_lut, compose_luts, apply_lut

    - ewa.rs (960 lines) — interpolation kernels, bilinear/bicubic/Lanczos

    - Shared math helpers scattered across files'
  acceptance_criteria:
  - New crate crates/rasmcore-kernel/ with Cargo.toml
  - convolve module with WASM SIMD128 support
  - color_spaces module (all conversions preserved)
  - color_lut module (3D CLUT infrastructure)
  - interpolation module (EWA kernels)
  - rasmcore-image depends on rasmcore-kernel, all existing tests pass
  - cargo build + cargo component build succeed
  - WASM component validates: all operations still registered in WIT and param-manifest.json
  out_of_scope: Splitting filters.rs into per-file modules (separate tracks). Native-only SIMD (SSE/NEON) — WASM SIMD128 only
    for now.
  technical_notes: ''
