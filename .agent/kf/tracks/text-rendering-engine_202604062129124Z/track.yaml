id: text-rendering-engine_20260406212914Z
title: Text rendering with injectable Font resource
type: feature
status: pending
created: 2026-04-07
updated: 2026-04-07
spec:
  summary: |
    Font as a WIT resource (same pattern as Source) — consumer provides
    TTF/OTF bytes, pipeline creates Font with parsed glyphs and cached
    atlas. draw_text accepts Font reference. No fonts embedded in binary.
  context: |
    draw_text is registered but needs a font engine. The Font resource
    pattern follows Source: consumer provides bytes externally, pipeline
    caches parsed data. Tests use fixture font files, never bundled fonts.

    WIT type:
      resource font {
        constructor(data: buffer);
        info: func() -> font-info;
      }

    SDK:
      const font = new Font(ttfBytes);
      pipe.drawText({ font, text, x, y, size, color });
  acceptance_criteria:
    - Font WIT resource with constructor(bytes)
    - TTF/OTF parsing via ttf-parser or ab_glyph (no system fonts)
    - Glyph rasterization to texture atlas (cached on Font resource)
    - GPU blit from atlas to canvas (instanced quads per glyph)
    - SIMD CPU fallback (scanline rasterization)
    - No fonts embedded in WASM binary
    - Tests use fixture font files from tests/fixtures/
  out_of_scope: |
    Complex text shaping (bidi, ligatures, kerning tables)
    System font discovery
    Rich text / HTML rendering
  technical_notes: |
    Font resource lifecycle:
    1. Consumer: new Font(ttfBytes) — parse TTF, extract glyph outlines
    2. First drawText: rasterize needed glyphs to atlas texture (GPU or CPU)
    3. Subsequent drawText: reuse cached atlas, only rasterize new glyphs
    4. GPU path: upload atlas as texture, instanced quad per glyph
    5. CPU path: direct scanline rasterization per glyph
