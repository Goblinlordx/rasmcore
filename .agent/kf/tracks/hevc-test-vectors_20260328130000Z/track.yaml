id: hevc-test-vectors_20260328130000Z
title: HEVC Test Vectors — Golden Reference Data from libde265/x265
type: chore
status: pending
created: '2026-03-28'
updated: '2026-03-28'
spec:
  summary: Generate golden test fixtures from reference encoder/decoder for all HEVC subsystems. Encode small HEIC files with
    x265, decode with libde265 extracting per-stage intermediates, store as test fixtures for subsystem validation.
  context: Each HEVC subsystem track (predict, transform, filter, syntax, CABAC) needs to validate against known-good reference
    data, not just hand-crafted inputs. This track generates golden test vectors by encoding small images with x265 and decoding
    with libde265, capturing intermediate values at each decode stage. All subsystem tracks depend on these fixtures.
  codebase_analysis: 'rasmcore already has a test fixture pattern: tests/fixtures/ directory with generate.sh script and test
    images. libde265 provides a C API with hooks for extracting intermediate decode state. x265 CLI can encode with controlled
    parameters (QP, CTU size, intra-only). The hevc-parity track was planned for end-to-end comparison, but per-stage validation
    catches errors earlier.'
  acceptance_criteria:
  - x265 encoding script generates HEVC I-frame bitstreams at multiple QP values
  - libde265 extraction tool captures per-stage intermediate values
  - 'At least 3 test cases: flat 8x8 (simplest), gradient 16x16 (AC content), checkerboard 64x64 (complex prediction)'
  - Parameter set fixtures with verified SPS/PPS field values
  - Per-CTU syntax element fixtures (prediction modes, coefficient levels)
  - Prediction block fixtures (reference samples + predicted output for each CU)
  - Transform coefficient fixtures (dequantized coefficients + spatial residuals)
  - Loop filter fixtures (pre/post deblocking, pre/post SAO pixel values)
  - Final output fixtures (YCbCr planes + RGB conversion)
  - Generation script is reproducible (deterministic output from same input)
  - Binary fixture data is gitignored — only scripts and version manifest are committed
  - Tool versions pinned in TOOLS.toml with exact version and hash
  - Tests skip gracefully when fixtures are not yet generated
  out_of_scope: Writing the subsystem implementations — this track only generates test data. End-to-end parity testing (hevc-parity
    track handles that). Performance benchmarking.
  technical_notes: "Test vector generation pipeline:\n1. Pin exact versions of tools in a manifest (e.g., x265 3.6, libde265\
    \ 1.0.15, ffmpeg 7.x)\n2. Create small test images (8x8, 16x16, 64x64) with known pixel patterns as raw YUV\n3. Encode\
    \ with x265 at controlled settings (--preset ultrafast --keyint 1 --qp {22,37})\n4. Decode with libde265 debug tool, capturing\
    \ per-stage intermediates\n5. Store generated fixtures in tests/fixtures/hevc/ (GITIGNORED — never committed)\n6. Commit\
    \ only: generation script, tool version manifest, .gitignore entry\n7. CI/developer runs generate.sh once, fixtures are\
    \ cached locally\n8. Tests skip gracefully if fixtures are not generated (like existing parity test pattern)\n\nFixture\
    \ format: one directory per test case, containing:\n  - input.hevc (Annex B bitstream)\n  - params.json (SPS/PPS field\
    \ values)\n  - syntax.json (per-CTU decoded syntax elements)\n  - prediction_{ctu}_{cu}.bin (predicted block pixels)\n\
    \  - residual_{ctu}_{cu}.bin (dequantized residuals)\n  - recon_pre_filter.bin, recon_post_deblock.bin, recon_final.bin\n\
    \  - output_rgb.bin (final RGB pixels)\n\nTool version pinning: tests/fixtures/hevc/TOOLS.toml\n  [tools]\n  x265 = {\
    \ version = \"3.6\", sha256 = \"...\" }\n  libde265 = { version = \"1.0.15\", sha256 = \"...\" }\n\nThis follows the same\
    \ pattern as tests/fixtures/generate.sh — binary data is generated, not committed."
