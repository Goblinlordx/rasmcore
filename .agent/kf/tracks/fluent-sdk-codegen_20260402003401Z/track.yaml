id: fluent-sdk-codegen_20260402003401Z
title: Fluent SDK codegen from unified manifest (Go + Python)
type: feature
status: pending
created: 2026-04-02
updated: '2026-04-02'
spec:
  summary: 'Build a codegen tool that reads the unified param-manifest.json and generates

    language-specific fluent Chain APIs. Start with Go, then Python. Include

    wasmtime compile pre-warm for cold-start elimination.

    '
  context: 'The process-chain WIT function enables any language to use the pipeline via

    wasmtime CLI, but the raw Op{Name, Params} API is untyped. A codegen step

    can read the complete manifest (filters + transforms + encoders) and generate

    typed fluent methods per language. This gives users IDE autocomplete, type

    safety, and discoverable APIs while the underlying transport remains the same.

    '
  codebase_analysis: "- param-manifest.json (after unified-manifest track) contains all operations\n- Current Go SDK at packages/go-sdk/rcimg/pipeline.go\
    \ uses Process(input, ops, output)\n- Python SDK at packages/python-sdk/ uses wasmtime-py directly (not process-chain\
    \ yet)\n- The codegen tool should be a standalone Go program (or script) that reads\n  the manifest JSON and emits language-specific\
    \ source files\n- Go fluent API pattern: Chain type with method per op, terminal Write methods\n- Python fluent API pattern:\
    \ same Chain pattern with __getattr__ or explicit methods\n- wasmtime compile produces a .cwasm precompiled module for\
    \ near-zero cold start\n"
  acceptance_criteria:
  - Codegen tool reads param-manifest.json and outputs Go source files
  - Generated Go API provides a Chain type with a typed method per operation
  - Generated Go API provides terminal Write methods (WritePNG, WriteJPEG, etc.)
  - Generated code compiles and passes tests
  - Pipeline.Compile() method pre-compiles WASM via wasmtime compile
  - Process() uses .cwasm when available for fast startup
  - Codegen also outputs Python fluent wrapper
  - go generate command wired up to run codegen
  out_of_scope: '- Modifying the WASM component or WIT interface

    - Adding new operations to the pipeline

    - PHP/Perl/Ruby codegen (future tracks)

    - GPU integration in the SDK

    '
  technical_notes: 'Codegen tool at packages/go-sdk/cmd/generate/main.go reads manifest JSON,

    emits packages/go-sdk/rcimg/chain_generated.go with Chain type and methods.

    Each filter method returns *Chain (builder pattern). Terminal methods call

    Process() internally. Pipeline.Compile() runs wasmtime compile, Process()

    checks for .cwasm and uses --allow-precompiled flag.


    Go method naming: snake_case manifest names -> PascalCase Go methods.

    Params: each param becomes a named argument with its Go type.

    No-param ops: method takes no arguments.


    Python output: packages/python-sdk/rasmcore/chain_generated.py with same

    pattern adapted to Python conventions.

    '
