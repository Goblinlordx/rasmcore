spec:
  summary: |
    Move all 8 draw-category filters from the monolithic filters.rs
    to individual files under src/domain/filters/draw/<name>.rs.
  context: |
    filters.rs is 24K lines with 152 registered filters. This track moves
    the draw category (8 filters) to a per-file structure.
    Each file contains one pub fn, one ConfigParams, one registration macro.
    Tests move alongside their functions.
  codebase_analysis: |
    Filters to move: all functions in filters.rs with category="draw".
    Each filter becomes src/domain/filters/draw/<snake_name>.rs.
    Category mod.rs re-exports all public items.
    Shared imports come from rasmcore-kernel (convolve, color_spaces, etc.).
  acceptance_criteria:
  - All 8 draw filters exist as individual files in filters/draw/
  - Each file has one registered filter function + ConfigParams
  - Tests preserved and passing
  - No remaining draw filters in the monolithic filters.rs
  - cargo build + cargo component build succeed
  - WASM component validates: all moved filters appear in param-manifest.json and WIT interface
  out_of_scope: |
    Other filter categories (handled by their own tracks).
    Changing filter behavior or signatures — pure file reorganization.
  technical_notes: |
    Mechanical refactor: move function + ConfigParams + tests to new file.
    AGENT STRATEGY: Use subagents with worktree isolation to move filters
    in parallel. Each subagent moves 3-5 filters, parent reviews diffs
    and runs full verification after merging all.
    Update mod.rs re-exports. Update any cross-filter imports.
    Shared computation (convolve, color spaces) comes from rasmcore-kernel.
