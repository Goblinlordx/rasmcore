spec:
  summary: Scharr edge detector (rotationally symmetric), Laplacian second-order derivative, and distance transform (Euclidean/L1/L-inf).
    All testable against OpenCV 4.13.
  context: ''
  codebase_analysis: ''
  acceptance_criteria:
  - All operations validated against reference implementation (OpenCV/colour-science/GIMP)
  - Reference parity tests added to opencv_parity.rs with fixtures
