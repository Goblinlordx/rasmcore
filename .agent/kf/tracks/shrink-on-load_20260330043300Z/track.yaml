    done: true
  - text: Implement inverse_dct_quarter (8x8 -> 2x2) in dct.rs
    done: true
  - text: Implement inverse_dct_eighth (8x8 -> 1x1, DC-only) in dct.rs
    done: true
  - text: Add unit tests for scaled IDCT vs reference (full IDCT + downsample)
    done: true
- phase: Decoder Integration
