id: fix-mapper-pipeline_20260331085200Z
title: "Fix format-changing filters in pipeline (mapper codegen)"
type: bug
status: pending
created: 2026-03-31
updated: 2026-03-31
spec:
  summary: >
    Pipeline nodes ignore format changes from Gray8-outputting filters
    (charcoal, sobel, canny, grayscale, flatten). Extend codegen to
    generate mapper pipeline nodes and re-register affected filters.
  context: |
    Six filters output a different pixel format than their input but are
    registered as #[register_filter] instead of #[register_mapper]. The
    pipeline node codegen only generates nodes for filters (which pass
    through source_info unchanged). Downstream nodes receive wrong
    bytes_per_pixel, causing data corruption.

    Affected filters: charcoal, sobel, scharr, laplacian, canny (all
    output Gray8), grayscale (outputs Gray8), flatten (outputs RGB8 from
    RGBA8).

    Existing mappers (add_alpha, remove_alpha) are correctly registered
    but cannot be used in pipelines because codegen doesn't generate
    mapper pipeline nodes.

    Ignored test at pipeline/tests.rs:147 confirms the bug.
  codebase_analysis: |
    CODEGEN:
    - rasmcore-codegen/src/parse/simple_regs.rs: Already parses
      #[register_mapper] annotations into CodegenData::mappers
    - rasmcore-codegen/src/generate/pipeline.rs: Only generates
      nodes from data.filters, NOT data.mappers
    - rasmcore-codegen/src/generate/mod.rs: Prints mapper count
      but skips pipeline node generation for them
    - Generated nodes use source_info.clone() for info() — no format update

    FILTERS TO CONVERT:
    - grayscale_registered (filters.rs:8858) — wraps fn returning
      DecodedImage with Gray8
    - flatten_registered (filters.rs:8869) — wraps fn returning
      (Vec<u8>, ImageInfo) with RGB8
    - charcoal, sobel, scharr, laplacian, canny — output Gray8 but
      return Vec<u8> only, need signature change

    MACRO:
    - #[register_mapper] requires Result<(Vec<u8>, ImageInfo), ImageError>
    - StaticMapperRegistration in filter_registry.rs lines 366-379
    - inventory::collect! already set up for mappers
  acceptance_criteria:
    - Codegen generates pipeline nodes for mappers (not just filters)
    - Mapper nodes return correct output ImageInfo (format, dimensions)
    - grayscale, flatten re-registered as mappers with correct signatures
    - charcoal, sobel, scharr, laplacian, canny converted to mapper signatures
    - Pipeline test pipeline_grayscale_chain un-ignored and passes
    - Pipeline chain charcoal -> blur works correctly (Gray8 blur)
    - Existing mapper filters (add_alpha, remove_alpha) work in pipelines
    - param-manifest.json still includes all mappers with kind=mapper
  out_of_scope: |
    Converting non-format-changing filters. Pipeline performance optimization.
  technical_notes: |
    Two-part fix:
    1. CODEGEN: Add generate_mapper_nodes() that produces pipeline node
       structs for mappers. Key difference: info() returns ImageInfo from
       the mapper output tuple, not source_info.
    2. FILTERS: Convert affected filters to mapper signature — change
       return from Result<Vec<u8>> to Result<(Vec<u8>, ImageInfo)>.
plan:
