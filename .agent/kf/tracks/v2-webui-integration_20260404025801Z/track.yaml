id: v2-webui-integration_20260404025801Z
title: Wire web UI to V2 pipeline — replace V1 SDK import
type: feature
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: 'Update web UI workers to import V2 fluent SDK. Replace V1 API calls with V2 typed methods. Remove V1 SDK dependency
    from web UI.

    '
  context: 'Web UI workers (preview-worker.ts, pipeline-worker.ts) currently import

    the V1 SDK (rasmcore-image.js) and call V1 methods. After the fluent SDK

    track, the V2 SDK provides typed chainable methods.


    This track switches the import and updates all call sites.

    '
  acceptance_criteria:
  - Web UI workers import V2 fluent SDK (not V1 rasmcore-image.js)
  - All filter calls use V2 typed methods
  - All encode calls use typed encoder methods (writePng, writeJpeg, etc.)
  - Image loading works end-to-end in browser
  - Fusion verified in browser (brightness +0.5 -0.5 = no loss)
  - V1 SDK no longer imported by web UI
  out_of_scope: 'GPU WebGPU dispatch. Full filter coverage testing. V1 removal.

    '
  technical_notes: "The web UI build (Vite) needs to resolve the V2 SDK module.\nThe V2 SDK is generated to sdk/typescript/v2-generated/\
    \ then\nthe fluent wrapper is at sdk/typescript/v2-fluent/.\n\npreview-worker.ts and pipeline-worker.ts change from:\n\
    \  import { pipeline } from '../sdk/rasmcore-image.js'\nto:\n  import { Pipeline } from '../sdk/v2-fluent/index.js'\n\n\
    applyStep() changes from pipe[name](node, config) to\npipe[name](config) (chainable, node is implicit).\n"
plan:
