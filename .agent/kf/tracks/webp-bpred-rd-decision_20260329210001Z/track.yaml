id: webp-bpred-rd-decision_20260329210001Z
title: VP8 B_PRED RD Decision — Replace Hardcoded Bias with Full Cost
type: bug
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: |
    Replace the hardcoded B_PRED decision (bpred_sad + 128 < i16_sad) with
    full RD cost comparison. Encode both I16x16 and B_PRED fully, compare
    total RD cost (SSD + lambda * bits).
  context: |
    Spec audit Bug #2. The 128-unit SAD bias is arbitrary — it may force
    I16x16 when B_PRED would produce better quality, or allow B_PRED when
    I16x16 is more efficient. cwebp uses full RD evaluation for this decision.
  codebase_analysis: |
    bitstream.rs line 642: use_bpred = bpred_sad + 128 < i16_sad
    The B_PRED path already computes all 16 sub-block coefficients (lines 650-663).
    The I16x16 path already computes all coefficients (lines 680-694).
    Both paths produce quantized coefficients — just need to compute total RD
    cost for each and compare.
  acceptance_criteria:
    - B_PRED vs I16x16 chosen by minimum RD cost (not SAD + bias)
    - Photo content (Perlin texture) PSNR improves by at least 2dB
    - Mode distribution changes visibly (more B_PRED on texture, more I16x16 on smooth)
    - All tests pass
  out_of_scope: Per-4x4 RD mode selection (that is Track 3).
  technical_notes: |
    Approach: after computing both B_PRED and I16x16 coefficients (which the
    encoder already does), compute total RD cost for each:
      rd_bpred = ssd(original, recon_bpred) + lambda * bits_bpred
      rd_i16x16 = ssd(original, recon_i16x16) + lambda * bits_i16x16
    
    bits_bpred includes 16 sub-block mode headers + all coefficients.
    bits_i16x16 includes 1 mode header + Y2 block + all AC blocks.
    
    Pick whichever has lower RD cost.
