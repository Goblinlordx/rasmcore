id: sdk-self-contained-package_20260410113237Z
title: Self-contained SDK package — build once, import anywhere
type: refactor
status: pending
created: 2026-04-10
updated: '2026-04-10'
spec:
  summary: 'Restructure SDK build to produce a single self-contained npm package that

    bundles WASM binary, jco bindings, fluent Pipeline API, preview2-shim, and

    helper libs. Consumers just import — no separate jco step, no path hacks.

    '
  context: "The current SDK has three fundamental problems making it unusable for\nexternal consumers:\n\n1. No self-contained\
    \ package. @rasmcore/image (sdks/typescript/) is a thin\n   runtime wrapper requiring consumers to separately obtain jco-transpiled\n\
    \   WASM, preview2-shim, and fluent SDK. No single importable artifact.\n\n2. Build artifacts scattered across 4+ locations\
    \ (sdk/typescript/v2-generated/,\n   sdk/typescript/v2-fluent/, sdk/v2/lib/, target/...wasm) with fragile\n   copy+sed\
    \ scripts stitching them into web-ui/sdk/v2/ and docs/site/public/sdk/v2/.\n\n3. Path rewriting is brittle. build-v2-webui.sh\
    \ rewrites import paths via sed.\n   Makefile rewrites preview2-shim imports via sed. Any directory change breaks\n  \
    \ everything.\n\nThe docs site initially failed because the Makefile copied jco output but not\nthe TypeScript lib files\
    \ (gpu-handler, render-target) that docs imports.\n"
  codebase_analysis: 'Key files in current build pipeline:

    - scripts/generate-v2-sdk.sh — jco transpile with 17 -M mappings pointing to ./preview2-shim/

    - scripts/generate-v2-fluent-sdk.mjs — generates Pipeline class from registry dump

    - scripts/build-v2-webui.sh — copies + sed-rewrites paths for web-ui consumption

    - Makefile — orchestrates sdk/docs/web-ui builds with sentinel files

    - sdks/typescript/ — v1 SDK (@rasmcore/image) with RcImage runtime, never compiled (no dist/)

    - sdk/typescript/v2-generated/ — jco output, gitignored

    - sdk/typescript/v2-fluent/ — fluent SDK, gitignored

    - sdk/v2/lib/ — hand-written helpers (gpu-handler.ts, render-target.ts, ml-provider.ts)

    - web-ui/sdk/v2/ — assembled copy consumed by Vite (@sdk alias)

    - docs/site/public/sdk/v2/ — assembled copy consumed by Next.js docs


    Consumer currently needs: cargo + cargo-component + jco + preview2-shim + manual

    path configuration. Goal: npm install (or copy) one directory and import.

    '
  acceptance_criteria:
  - make sdk produces sdk/dist/ containing package.json, WASM binary, jco bindings, fluent Pipeline, RcImage runtime, preview2-shim,
    and lib/ helpers
  - sdk/dist/package.json has correct exports map for main, pipeline, runtime subpaths
  - No sed-based import path rewriting in any build script
  - jco transpile -M mappings point directly to final shim/ paths within the package
  - web-ui builds cleanly by copying sdk/dist/ (single cp -r, no transforms)
  - docs site builds cleanly by copying sdk/dist/ (single cp -r, no transforms)
  - A consumer can copy sdk/dist/ to their project, import Pipeline or RcImage, and use without additional setup
  out_of_scope: '- npm publish automation (future track)

    - CI/CD pipeline changes

    - WASM binary size optimization

    - Changing the WIT interface or pipeline API

    - Native SDK (Rust/Go/Python) packaging

    '
  technical_notes: "Target package structure:\n  sdk/dist/\n  ├── package.json          (exports map, type: module)\n  ├──\
    \ rasmcore.js           (main entry re-exporting Pipeline + RcImage)\n  ├── rasmcore.d.ts\n  ├── pipeline.js         \
    \  (fluent Pipeline, auto-generated)\n  ├── pipeline.d.ts\n  ├── runtime.js            (RcImage dynamic runtime)\n  ├──\
    \ runtime.d.ts\n  ├── wasm/                 (jco bindings + WASM binary)\n  ├── shim/                 (vendored preview2-shim)\n\
    \  └── lib/                  (gpu-handler, render-target, ml-provider)\n\njco transpile mappings change from ./preview2-shim/\
    \ to ../shim/ (relative\nto wasm/ subdirectory). This eliminates the Makefile sed rewrite.\n\nThe fluent SDK generator\
    \ (generate-v2-fluent-sdk.mjs) needs its import\npath template updated from ../v2-generated/interfaces/ to the final\n\
    package-internal path.\n\nFor web-ui: cp -r sdk/dist/ web-ui/sdk/ + update Vite alias.\nFor docs: cp -r sdk/dist/ docs/site/public/sdk/\
    \ + update imports.\nFor npm: npm publish sdk/dist/ (future track).\n"
plan:
- phase: Package structure
  tasks:
  - text: Design sdk/dist/package.json with exports map covering main, pipeline, runtime, and wasm subpaths
    done: true
  - text: 'Create unified build script scripts/build-sdk.sh: cargo component build -> jco transpile -> fluent codegen -> preview2-shim
      vendor -> lib/ compile -> assemble into sdk/dist/'
    done: true
  - text: Configure jco transpile -M mappings to use ../shim/ paths (eliminating post-hoc sed rewriting)
    done: true
  - text: Update generate-v2-fluent-sdk.mjs output import paths to target package-internal structure
    done: true
- phase: Build integration
  tasks:
  - text: Update Makefile sdk target to call the new unified build script
    done: true
  - text: Update build-v2-webui.sh to copy sdk/dist/ into web-ui/sdk/ (single copy, no sed)
    done: true
  - text: Update Makefile DOCS_SDK target to copy from sdk/dist/ (including lib/ and shim/)
    done: true
  - text: Remove old scattered output directories (sdk/typescript/v2-generated/, sdk/typescript/v2-fluent/) from build flow
    done: true
- phase: Consumer update
  tasks:
  - text: Update web-ui/ imports to reference new SDK paths from sdk/dist/
    done: true
  - text: Update web-ui/vite.config.ts alias to point at the new package location
    done: true
  - text: Update docs/site/ imports and wasm-loader to use new SDK paths
    done: true
  - text: Update docs/site/ Makefile targets for new copy source
    done: true
  - text: Migrate sdks/typescript/src/runtime.ts (RcImage) into the new package as alternative entry point
    done: true
- phase: Verification
  tasks:
  - text: 'Smoke test: make sdk produces self-contained sdk/dist/ with all files, correct imports, no broken references'
    done: true
  - text: 'Smoke test: make web-ui builds cleanly using new SDK — dev server loads and processes an image'
    done: true
  - text: 'Smoke test: make docs builds cleanly — docs site playground can instantiate SDK'
    done: true
