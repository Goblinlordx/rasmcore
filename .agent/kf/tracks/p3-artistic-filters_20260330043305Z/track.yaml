id: p3-artistic-filters_20260330043305Z
title: P3 Artistic Filters (Solarize, Emboss, Oil Paint, Charcoal)
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: >
    Implement the 4 remaining missing artistic filters — solarize, emboss, oil paint,
    and charcoal — closing the last filter gaps vs ImageMagick.
  context: |
    The updated parity matrix shows only 4 truly missing filters, all P3 artistic
    effects. Implementing these achieves 100% coverage of commonly-used IM/vips
    filter operations.
  codebase_analysis: |
    All 4 are straightforward algorithms:
    - solarize: per-pixel op — invert pixels above threshold. Formula: if val > threshold then 255 - val. LUT-collapsible.
    - emboss: 3x3 convolution kernel. Can use existing convolve() infrastructure. Typical kernel: [[-2,-1,0],[-1,1,1],[0,1,2]]
    - oil_paint: neighborhood mode filter. For each pixel, find most common intensity in radius. Similar complexity to median filter.
    - charcoal: edge detection (Sobel or Canny) + Gaussian blur + threshold inversion. Can compose existing filters.

    Related infrastructure:
    - convolve() registered filter handles custom kernels — emboss could just be a preset
    - Point ops (gamma, invert, posterize) in point_ops.rs show LUT-collapsible pattern
    - median filter shows neighborhood-based pattern for oil_paint

    All should be registered with #[register_filter] and ConfigParams.
  acceptance_criteria:
    - solarize(threshold) registered filter, LUT-collapsible
    - emboss() registered filter using 3x3 convolution
    - oil_paint(radius) registered filter
    - charcoal(radius, sigma) registered filter
    - All 4 appear in param-manifest.json
    - Visual quality matches IM output subjectively (not pixel-exact — artistic ops vary)
  out_of_scope: |
    Parity testing against IM (artistic effects are implementation-dependent).
    Additional artistic effects beyond these 4 (pencil sketch, watercolor, etc).
  technical_notes: |
    solarize: trivial LUT — build_lut with threshold check. ~20 LOC.
    emboss: call existing convolve() with emboss kernel. ~10 LOC + registration.
    oil_paint: for each pixel, compute intensity histogram in NxN window,
    find mode (most frequent bin), output that pixel color. ~80-100 LOC.
    O(r^2) per pixel like median. Optimization: use histogram sliding.
    charcoal: compose sobel() + blur() + invert(). ~30 LOC wrapper.
