id: distortion-tile-aware_20260401083000Z
title: "Unified distortion engine — tile-aware with inverse bounding box"
type: bug
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: |
    Distortion filters produce wrong output during tiled execution (each tile
    treated as standalone image). Fix by creating a unified apply_distortion()
    function that handles inverse bounding box, EWA sampling, and tile cropping.
    Each filter reduces to just its inverse transform + Jacobian closures.
  context: |
    All 7 distortion filters (swirl, spherize, barrel, wave, ripple, polar,
    depolar) follow identical structure: compute center, create EwaSampler,
    loop pixels, compute inverse (sx,sy), compute Jacobian, sample, write.
    50+ lines of boilerplate repeated 7 times.

    They all have the same tiling bug: the preamble overwrites info with tile
    dimensions, so center = tile center instead of image center.

    The fix and the abstraction are the same work — build a unified distortion
    engine that handles tiling correctly, then migrate each filter to use it.
  codebase_analysis: |
    CURRENT PATTERN (repeated 7 times):
      fn distortion(request, upstream, info, config) {
          let pixels = upstream(request)?;                    // BUG: tile only
          let info = &ImageInfo { width: request.width, .. }; // BUG: tile dims
          let sampler = EwaSampler::new(pixels, w, h, ch);
          for y in 0..h {                                     // BUG: tile-local coords
              for x in 0..w {
                  let (sx, sy) = inverse_transform(x, y, params);  // unique per filter
                  let j = jacobian(x, y, params);                   // unique per filter
                  for c in 0..ch {
                      out[off+c] = sampler.sample(sx, sy, &j, c).clamp(0, 255);
                  }
              }
          }
      }

    UNIFIED REPLACEMENT:
      fn apply_distortion(
          request: Rect,
          upstream: &mut UpstreamFn,
          info: &ImageInfo,           // full image info (NOT overwritten)
          inverse_fn: impl Fn(f32, f32) -> (f32, f32),
          jacobian_fn: impl Fn(f32, f32) -> [[f32; 2]; 2],
          overlap_mode: OverlapMode,  // Uniform(px) or BoundingBox(sample_density)
      ) -> Result<Vec<u8>, ImageError>

    Each filter becomes ~10 lines: extract params, define closures, call apply_distortion.

    OVERLAP MODES:
    - Uniform(amount): wave/ripple — constant max displacement
    - BoundingBox(density): swirl/spherize/barrel — sample inverse at tile boundary
    - FullImage: polar/depolar — every output pixel can map to any input

    INVERSE BOUNDING BOX ALGORITHM:
    For each output tile, sample the inverse transform at points along all 4 edges
    (+ interior points near transform center for high-curvature areas). The bounding
    box of all source coordinates = required upstream rect.

    PERFORMANCE OPTIMIZATIONS (enabled by unified engine):
    1. WASM SIMD in sampling loop — process 4 output pixels per iteration
    2. Jacobian interpolation — for smooth transforms, compute Jacobian every Nth
       pixel and lerp between (Jacobian changes slowly for most distortions)
    3. EWA-to-bilinear downgrade — when |det(J)| is near 1.0 (no scaling), use
       cheaper bilinear instead of full EWA (saves ~3x per pixel)
    4. Row-major prefetch — iterate output rows, predictable source access pattern

    KEY FILES:
    - crates/rasmcore-image/src/domain/filters.rs — all 7 distortion filters
    - crates/rasmcore-image/src/domain/ewa.rs — EwaSampler, jacobian functions
  acceptance_criteria:
    - Unified apply_distortion() function handles tiling + sampling
    - Swirl produces single centered swirl (not per-tile swirls)
    - All 7 distortion filters migrated to apply_distortion()
    - Each filter body is under 20 lines (closures + call)
    - Tiled output matches non-tiled output for all 7 filters
    - New tiled_parity tests for swirl, spherize, wave, ripple
    - WASM e2e test for swirl correctness
    - All existing tests pass
  out_of_scope: |
    Adding center_x/center_y parameters to swirl/spherize/barrel.
    SIMD optimization of the sampling loop (can be a follow-up).
    Jacobian interpolation optimization (follow-up).
    New distortion filter types.
  technical_notes: |
    IMPLEMENTATION ORDER:

    Phase 1 — Build apply_distortion() engine:
      - Accepts inverse_fn, jacobian_fn, and overlap mode
      - Computes required source rect based on overlap mode
      - Requests expanded upstream, creates EwaSampler
      - Iterates output pixels using IMAGE-SPACE coordinates (not tile-local)
      - Accounts for source_rect offset when indexing into pixel buffer
      - Crops result to request rect

    Phase 2 — Migrate simple filters:
      - wave: inverse_fn is trivial (sinusoidal offset), OverlapMode::Uniform(amplitude)
      - ripple: inverse_fn uses center + radial sine, OverlapMode::Uniform(amplitude)
      These two also use bilinear (wave) or EWA (ripple) — engine supports both

    Phase 3 — Migrate complex filters:
      - swirl: inverse_fn is rotation with falloff, BoundingBox(16)
      - spherize: inverse_fn is power-law radial, BoundingBox(16)
      - barrel: inverse_fn is Brown-Conrady polynomial, BoundingBox(16)

    Phase 4 — Migrate coordinate transforms:
      - polar: may need FullImage mode (output row 0 maps to circle of pixels)
      - depolar: may need FullImage mode (atan2 maps to full angular range)
      - OR: test if BoundingBox(32) with high density captures polar correctly

    Phase 5 — Verify:
      - Tiled parity tests (tiled = untiled)
      - WASM e2e for swirl
      - Existing test suite

    JACOBIAN FUNCTIONS:
    Each filter already has a Jacobian function in ewa.rs or inline:
    - swirl: jacobian_swirl()
    - spherize: jacobian_spherize()
    - barrel: numerical finite-difference Jacobian
    - polar/depolar: analytical Jacobians
    - ripple: jacobian_ripple()
    - wave: identity (no Jacobian — uses bilinear)
