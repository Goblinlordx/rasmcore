id: distortion-tile-aware_20260401083000Z
title: "Fix distortion filters for tiled execution — inverse bounding box"
type: bug
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: |
    Distortion filters (swirl, spherize, barrel, wave, ripple, polar, depolar)
    produce wrong output during tiled execution because they treat each tile as
    a standalone image. Fix by computing the required source region via inverse
    bounding box analysis — sample the inverse transform at tile boundary points
    to determine the upstream rect needed.
  context: |
    All distortion filters currently do:
      let pixels = upstream(request)?;
      let info = ImageInfo { width: request.width, height: request.height, .. };

    This makes each tile think it IS the full image. Swirl computes center as
    (tile_width/2, tile_height/2) instead of (image_width/2, image_height/2).
    Result: multiple small swirls (one per tile) instead of one big swirl.

    The standard fix (used by GEGL, Nuke, OIIO) is inverse bounding box analysis:
    evaluate the inverse transform at tile boundary sample points, compute the
    bounding box of source coordinates, request that region from upstream.
  codebase_analysis: |
    AFFECTED FILTERS (all in filters.rs):
    - swirl (~line 18450): rotation around center, quadratic falloff
    - spherize (~line 18530): power-law radial remapping from center
    - barrel (~line 18615): Brown-Conrady polynomial from center
    - polar (~line 18719): Cartesian-to-polar coordinate transform
    - depolar (~line 18779): Polar-to-Cartesian coordinate transform
    - wave (~line 18870): sinusoidal linear displacement
    - ripple (~line 18955): sinusoidal radial displacement from center

    EACH FILTER ALREADY HAS the inverse transform — thats what the per-pixel
    loop computes. For each output (x,y), it computes source (sx,sy). We just
    need to evaluate this at the tile boundary points to get the bounding box.

    APPROACH FOR EACH FILTER:

    1. Compute the inverse transform at N sample points around the tile boundary
       (4 corners + 4 edge midpoints = 8 points minimum, more for high curvature)

    2. Take the bounding box of all source coordinates

    3. Expand by 2 pixels for interpolation margin

    4. Clamp to image bounds

    5. Request that expanded rect from upstream

    6. Run the filter using FULL IMAGE coordinates (info stays at full image dims)
       but only output pixels for the requested tile

    KEY CHANGE: The preamble must NOT overwrite info with tile dimensions.
    Instead:
      let source_rect = compute_required_source_rect(request, info, config);
      let pixels = upstream(source_rect)?;
      // info stays at FULL IMAGE dimensions for coordinate computation
      // Filter computes for all pixels in request, sampling from source_rect
      // Output is request-sized

    SIMPLIFIED APPROACH FOR WAVE/RIPPLE:
    These have constant max displacement = amplitude. So overlap = ceil(amplitude) + 1.
    No need for bounding box sampling — just expand uniformly by amplitude.

    FULL BOUNDING BOX APPROACH FOR SWIRL/SPHERIZE/BARREL/POLAR/DEPOLAR:
    These have position-dependent displacement. Need boundary sampling.

    HELPER FUNCTION:
    fn inverse_bounding_box(
        output_tile: Rect,
        image_info: &ImageInfo,
        inverse_fn: impl Fn(f32, f32) -> (f32, f32), // (out_x, out_y) -> (src_x, src_y)
        sample_density: u32, // points per edge (8-16 typical)
    ) -> Rect {
        let mut min_x = f32::MAX;
        let mut min_y = f32::MAX;
        let mut max_x = f32::MIN;
        let mut max_y = f32::MIN;

        // Sample along all 4 edges of the output tile
        for edge in 0..4 {
            for i in 0..=sample_density {
                let t = i as f32 / sample_density as f32;
                let (ox, oy) = match edge {
                    0 => (lerp(tile.x, tile.right(), t), tile.y as f32),          // top
                    1 => (lerp(tile.x, tile.right(), t), tile.bottom() as f32),   // bottom
                    2 => (tile.x as f32, lerp(tile.y, tile.bottom(), t)),          // left
                    3 => (tile.right() as f32, lerp(tile.y, tile.bottom(), t)),    // right
                    _ => unreachable!()
                };
                let (sx, sy) = inverse_fn(ox, oy);
                min_x = min_x.min(sx);
                min_y = min_y.min(sy);
                max_x = max_x.max(sx);
                max_y = max_y.max(sy);
            }
        }

        // Also sample a few interior points for highly non-linear transforms
        // (swirl center might have extreme displacement not captured by edges)

        Rect from (floor(min_x)-2, floor(min_y)-2) to (ceil(max_x)+2, ceil(max_y)+2)
        clamped to image bounds
    }
  acceptance_criteria:
    - Swirl produces single swirl centered on full image (not per-tile swirls)
    - Spherize produces single bulge centered on full image
    - Barrel produces single radial distortion centered on full image
    - Wave phase is continuous across tile boundaries
    - Ripple center is at the correct image-space position
    - Polar/depolar produce correct full-image transforms
    - All tiled_parity tests pass (add new ones for distortion)
    - Tiled output matches non-tiled output for all 7 distortion filters
    - WASM e2e test for swirl produces correct output
  out_of_scope: |
    Adding center_x/center_y parameters to swirl/spherize/barrel.
    Changing the distortion algorithms themselves.
    GPU acceleration.
  technical_notes: |
    IMPLEMENTATION ORDER:
    1. Add inverse_bounding_box helper function
    2. Fix wave and ripple (simple — uniform overlap = amplitude)
    3. Fix swirl (boundary sampling with interior center point)
    4. Fix spherize (boundary sampling)
    5. Fix barrel (boundary sampling)
    6. Fix polar/depolar (these may need full-image — every output pixel can
       map to any input pixel. Bounding box of boundary samples covers this.)
    7. Add tiled parity tests for each

    FILTER BODY RESTRUCTURE:
    Each filter needs to change from:
      fn swirl(request, upstream, info, config) {
          let pixels = upstream(request)?;
          let info = &ImageInfo { width: request.width, ... };
          // compute swirl on "tile-as-image"
      }
    To:
      fn swirl(request, upstream, info, config) {
          let source_rect = compute_source_rect_for_swirl(request, info, config);
          let pixels = upstream(source_rect)?;
          let source_info = &ImageInfo { width: source_rect.width, height: source_rect.height, .. };
          // compute swirl using FULL IMAGE coordinates
          // but only output pixels within request
          // source_rect.x/y provides the offset into the source buffer
          crop_to_request(&result, source_rect_as_output, request, info.format)
      }

    The per-pixel loop changes from iterating (0..info.width, 0..info.height)
    to iterating (request.x..request.right(), request.y..request.bottom()),
    and source coordinate lookups account for source_rect offset.
