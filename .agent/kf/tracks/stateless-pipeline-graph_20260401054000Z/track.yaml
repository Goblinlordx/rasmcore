id: stateless-pipeline-graph_20260401054000Z
title: Stateless pipeline graph — serialized description with validation
type: refactor
status: pending
created: '2026-04-01'
updated: '2026-04-01'
spec:
  summary: |
    Replace the stateful pipeline resource with a serialized graph description.
    Each pipeline method appends a node descriptor to a growing graph. The graph
    is validated at each step and again before execution. Execution is a pure
    function: graph description + source data in, encoded output out.
  context: |
    Currently the pipeline is a stateful resource (PipelineResource) holding a
    mutable NodeGraph. Node-ids are indexes into internal state. Problems:

    1. Building two chains then executing one can destroy the other
       (auto_cleanup invalidates node-ids).
    2. The graph cant be serialized, cached, replayed, or inspected.
    3. Invalid configurations (crop > source) only caught at execution time.

    DESIGN DECISIONS (agreed with user):

    1. SERIALIZED FORMAT: Nodes array + adjacency list (implicit in upstream
       references per node). Each node descriptor = type tag + config bytes +
       upstream index(es). Self-contained, no mutable internal state.

    2. DAG GUARANTEE: Sequential allocation means upstream_id < current_id.
       One-line validation at node creation — no topological sort needed.
       No splits (each node has one downstream consumer) means the graph
       is always a tree. Cycles are impossible if upstream_id < current_id.

    3. NODE DEDUP WITHIN A GRAPH: A node appears once in the description.
       Multiple downstream nodes can reference the same upstream index.
       Example: source → blur AND source → crop → both reference node 0.
       At runtime, the cache ensures source is decoded once.

    4. GRAPH INSTANCES ARE INDEPENDENT: Two graph descriptions from the same
       source data are separate graphs with separate executions. No implicit
       cross-graph sharing.

    5. READ DOES NOT DECODE: read(data) extracts metadata from container
       headers (dimensions, format, ICC profile, EXIF) without decoding
       pixels. This provides ImageInfo for downstream validation. Pixel
       decode happens on demand during execution.

    6. EACH METHOD VALIDATES + APPENDS: Each pipeline method (resize, blur,
       crop, etc.) validates the operation against the upstream nodes known
       ImageInfo, computes the output ImageInfo, and appends a node descriptor
       to the serialized graph.

    7. PRE-EXECUTION VALIDATION: Before execute/write, the full graph is
       re-validated (all upstream references valid, terminal node exists).
  codebase_analysis: |
    CURRENT ARCHITECTURE:

    PipelineResource (adapter/pipeline_adapter.rs):
    - graph: RefCell<NodeGraph> — mutable internal state
    - Node-ids are u32 indexes into graph.nodes Vec
    - auto_cleanup destroys graph state after write

    NodeGraph (domain/pipeline/graph.rs):
    - nodes: Vec<Box<dyn ImageNode>>
    - cache: SpatialCache — pixel cache for reuse
    - add_node() returns u32 index
    - request_region() — demand-driven pixel computation

    ImageNode trait:
    - info() -> ImageInfo — dimensions/format (no pixel computation)
    - compute_region(request, upstream_fn) — pixels on demand
    - derive_metadata(upstream) -> Option<Metadata>

    PROPOSED ARCHITECTURE:

    GraphDescription (new, serializable):
    - nodes: Vec<NodeDescriptor>
    - Each NodeDescriptor: kind (u8) + config (bytes) + upstreams (Vec<u32>)
    - Each node stores its computed output ImageInfo (from build-time validation)

    Build phase (pipeline methods):
    - Each method validates upstream info, appends NodeDescriptor, returns node index
    - No pixel computation, no mutable graph — just descriptor accumulation
    - DAG enforced: upstream_id < current_id

    Execute phase:
    - Takes GraphDescription + source data blobs
    - Reconstructs live NodeGraph from descriptors
    - Runs demand-driven execution (existing spatial cache + request_region)
    - Returns encoded output
    - Graph description is NOT consumed — can be re-executed
  acceptance_criteria:
    - Pipeline methods produce a serialized graph description (append node descriptors)
    - Each node creation validates against upstream ImageInfo (dimensions, format)
    - DAG enforced at creation time (upstream_id < current_id)
    - Pre-execution validation checks all references and terminal node
    - read() extracts metadata without decoding pixels
    - Shared upstream nodes (fan-out) work correctly with runtime cache
    - Graph descriptions are independent across instances
    - Graph description can be inspected (list nodes, edges, configs)
    - Execution is repeatable (same description + data = same output)
    - cargo build + cargo component build succeed
    - All existing pipeline tests pass
  out_of_scope: |
    Distributed execution across processes.
    Graph optimization passes (LUT fusion, affine composition — keep existing, apply at execute time).
    Streaming output. GPU acceleration.
  technical_notes: |
    NODE DESCRIPTOR FORMAT:

    struct NodeDescriptor {
        kind: NodeKind,           // Source, Filter, Transform, Mapper, Write
        name: String,             // operation name (e.g., "blur", "resize")
        config: Vec<u8>,          // serialized config (format-specific)
        upstreams: Vec<u32>,      // upstream node indices (1 for most, 2 for composite)
        output_info: ImageInfo,   // computed at build time from upstream + operation
    }

    DAG VALIDATION:
    - At creation: assert!(upstream_id < nodes.len())
    - This is sufficient because nodes are allocated sequentially
    - A node can never reference a future node or itself
    - Combined with no-splits property, guarantees tree structure

    MIGRATION PATH:
    Phase 1: Add validation to existing pipeline (no API change)
    Phase 2: Extract NodeDescriptor alongside existing NodeGraph
    Phase 3: Make execute work from descriptors
    Phase 4: Remove internal NodeGraph from build phase
