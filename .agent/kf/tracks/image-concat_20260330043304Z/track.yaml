id: image-concat_20260330043304Z
title: Image Concatenation (Horizontal, Vertical, Grid)
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-30'
spec:
  summary: >
    Add image concatenation operations — horizontal append, vertical append,
    and grid layout — matching libvips arrayjoin and IM append functionality.
  context: |
    libvips has arrayjoin (grid layout), join (2 images), and insert.
    ImageMagick has append (+append / -append) and montage.
    rasmcore has no way to combine multiple images side-by-side or in grids.
    This is useful for comparison views, contact sheets, sprite sheets, and
    before/after layouts.
  codebase_analysis: |
    No concatenation functions exist in the codebase. Related code:
    - pad() in transform.rs adds borders — could reuse for spacing
    - alpha_composite_over() places one image on another — different use case
    - Pipeline is single-image: nodes process one image at a time

    For grid layout, need to handle:
    - Images of different sizes (resize to match, or pad with background)
    - Configurable gap/spacing between images
    - Background fill color for gaps and size mismatches

    These are multi-image operations that take Vec<DecodedImage> as input.
    Can be implemented as standalone functions in transform.rs.
  acceptance_criteria:
    - concat_horizontal(images, gap, bg_color) joins images left-to-right
    - concat_vertical(images, gap, bg_color) joins images top-to-bottom
    - concat_grid(images, columns, gap, bg_color) arranges in grid with N columns
    - Handles images of different sizes (scales to match tallest/widest)
    - Configurable gap size and background color
    - All functions exposed through domain API
  out_of_scope: |
    Filter registration (multi-image ops need pipeline multi-input).
    Montage with labels/captions. Sprite sheet with metadata output.
    Complex layouts (only horizontal, vertical, and grid).
  technical_notes: |
    Implementation in transform.rs or new domain/concat.rs:
    - concat_horizontal: calculate total width, max height, allocate output,
      copy each image at appropriate x offset, pad shorter images with bg
    - concat_vertical: similar but stack vertically
    - concat_grid: calculate columns x rows, cell size = max(w) x max(h),
      copy each image centered in its cell
    For size mismatch: resize smaller images to match cell dimensions using
    existing resize() function, or pad with background color.
