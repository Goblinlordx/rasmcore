id: multi-image-pipeline_20260330001200Z
title: Multi-Image Pipeline — Blend Modes in Composite + Fluent SDK Support
type: feature
status: pending
created: '2026-03-30'
updated: '2026-03-29'
spec:
  summary: 'Add blend mode parameter to pipeline composite node and WIT interface. Expose composite() and blend() in the fluent
    SDK so users can combine multiple images in a single chain.

    '
  context: "Multi-image composition is a core image processing capability — watermarking,\ncollages, layered effects, HDR\
    \ stacking. The raw blend mode math (9 modes)\nand Porter-Duff composite are fully implemented in domain/filters.rs and\n\
    domain/composite.rs. But the pipeline interface only exposes basic\ncomposite(fg, bg, x, y) with no blend mode selection,\
    \ and the fluent SDK\nhas no multi-image methods at all.\n\nTarget API:\n  const result = rcimage.load(bgBytes)\n    .composite(rcimage.load(fgBytes).blur(2.0),\
    \ { x: 10, y: 10, blend: 'over' })\n    .toJpeg({ quality: 85 });\n\nThe inner rcimage.load(fg).blur() chain evaluates\
    \ lazily within the same\npipeline DAG — both image sources feed into a single CompositeNode.\n"
  codebase_analysis: "Existing:\n  domain/composite.rs — alpha_composite_over() with offset, clipping, tests\n  domain/filters.rs\
    \ — BlendMode enum (9 modes), blend() function, blend_channel()\n  domain/filters.rs — premultiply, unpremultiply, flatten,\
    \ add_alpha, remove_alpha\n  domain/pipeline/nodes/composite.rs — CompositeNode (hardcoded to Porter-Duff over)\n  wit/image/pipeline.wit\
    \ — composite(fg, bg, x, y) -> node-id\n  wit/image/filters.wit — blend-mode enum already defined\n\nMissing:\n  Pipeline\
    \ composite does not accept blend mode parameter\n  CompositeNode only calls alpha_composite_over, not blend modes\n \
    \ Fluent SDK (rcimage.ts) has no multi-image methods\n  generate-fluent-sdk.cjs skips composite (SPECIAL_METHODS set)\n"
  acceptance_criteria:
  - Pipeline composite accepts optional blend mode parameter
  - All 9 blend modes usable via pipeline (multiply, screen, overlay, darken, lighten, soft-light, hard-light, difference,
    exclusion)
  - Default blend mode is Porter-Duff over (backwards compatible)
  - Fluent SDK exposes composite(other, opts) where other is an RcImage
  - Inner RcImage chain (the foreground) evaluates within the same pipeline
  - Composite options include x, y offset and blend mode
  - Works with RGBA images (premultiply handled internally)
  - Works with RGB images (auto-adds alpha if needed for blend)
  - Code generation (Get Code) handles composite correctly
  out_of_scope: 'Demo UI for composition (separate track). Mask-based composition.

    Layer opacity control (beyond what blend modes provide).

    Panorama stitching or HDR merge algorithms.

    '
  technical_notes: "WIT change:\n  composite(fg: node-id, bg: node-id, x: s32, y: s32, mode: option<blend-mode>) -> node-id\n\
    \  The blend-mode enum already exists in filters.wit — import it in pipeline.wit.\n  option<blend-mode> with None meaning\
    \ Porter-Duff over (default).\n\nCompositeNode change:\n  Add BlendMode field. When mode is Some, use blend() with offset\
    \ handling\n  instead of alpha_composite_over(). Need to handle offset + different-size\n  images for blend modes (currently\
    \ blend() requires same-size).\n\nFluent SDK:\n  composite(other: RcImage, opts?: { x?: number, y?: number, blend?: BlendMode\
    \ }): RcImage\n  The other RcImage shares the same internal Pipeline instance.\n  Implementation: merge the other's nodeId\
    \ into this pipeline's composite call.\n\nSDK generator change:\n  Remove composite from SPECIAL_METHODS. Generate it\
    \ with the RcImage\n  parameter type instead of NodeId.\n"
plan:
