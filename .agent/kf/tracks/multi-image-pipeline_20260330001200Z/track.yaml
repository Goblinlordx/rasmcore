    done: true
  - text: Update pipeline adapter to pass blend mode from WIT to CompositeNode
    done: true
  - text: Test composite with each blend mode via pipeline
    done: true
- phase: Fluent SDK
  tasks:
  - text: Add composite(other, opts) method to RcImage in generate-fluent-sdk.cjs
    done: true
  - text: Handle shared pipeline instance — other RcImage merges into same pipeline
    done: true
  - text: Update code generation to handle composite with RcImage argument
    done: true
  - text: Test fluent SDK composite chain in TypeScript
    done: true
- phase: Verification
  tasks:
  - text: Verify default composite (no blend mode) is backwards compatible
    done: true
  - text: Verify all 9 blend modes produce correct output via pipeline
    done: true
  - text: Verify WASM component build succeeds with updated WIT
    done: true
