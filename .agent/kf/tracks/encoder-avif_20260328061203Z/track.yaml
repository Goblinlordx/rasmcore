id: encoder-avif_20260328061203Z
title: "AVIF Encode — rav1e Backend, Quality/Speed Config, Parity Tests"
type: feature
status: pending
created: 2026-03-28
updated: '2026-03-28'
spec:
  summary: |
    Wire the image crate's AVIF encoder (backed by rav1e) into rasmcore
    with quality and speed config. Full WIT interface, pipeline sink,
    and parity tests vs ImageMagick.
  context: |
    AVIF is a modern image format based on AV1 video codec, offering
    superior compression vs JPEG at equivalent quality. It's supported by
    all modern browsers and is the recommended format for web images.

    The image crate already includes AVIF encode support via the ravif crate
    (rav1e backend). The avif feature is already enabled in Cargo.toml.
    AVIF decode already works in rasmcore.

    Patent status: AOM Patent License 1.0 (royalty-free). Safe to ship.
  codebase_analysis: |
    - AVIF feature already enabled in Cargo.toml
    - image crate uses ravif internally for AVIF encoding
    - AvifEncoder accepts quality (1-100) and speed (1-10) params
    - AVIF supports alpha channel (RGBA input preserved)
    - Pattern: follow jpeg.rs encoder module pattern (quality-based config)
    - WASM note: rav1e WASM support is experimental and slow without SIMD.
      This is a known limitation — encode will work but be slower than native.
    - Files to create: domain/encoder/avif.rs
    - Files to modify: domain/encoder/mod.rs, wit/image/encoder.wit,
      wit/image/pipeline.wit, adapter/mod.rs, adapter/pipeline_adapter.rs,
      domain/pipeline/nodes/sink.rs
  acceptance_criteria:
    - AVIF encode works with configurable quality (1-100, default 75)
    - Speed parameter configurable (1-10, default 6)
    - WIT avif-encode-config and avif-write-config records defined
    - Adapter encode_avif and pipeline write_avif wired
    - RGB8 and RGBA8 input formats supported
    - Roundtrip test (encode then decode, PSNR > 30dB at quality 80)
    - File size comparison vs ImageMagick AVIF at same quality
    - cargo test passes, cargo component build succeeds
  out_of_scope: |
    - AVIF animation (future track)
    - Lossless AVIF mode
    - 10-bit / HDR AVIF
    - AVIF tiling configuration
  technical_notes: |
    image crate AVIF API:
      AvifEncoder::new_with_speed_quality(writer, speed, quality)
      where speed: 1 (slowest/best) to 10 (fastest/worst)
      and quality: 1 (worst) to 100 (best)

    The encoder handles YUV conversion internally.
    Alpha channel is preserved when input is RGBA.

    WASM performance: rav1e is pure Rust and compiles to WASM, but without
    hardware SIMD it will be significantly slower than native. This is
    acceptable for initial support — users can encode natively for production
    workloads. Document this limitation.
