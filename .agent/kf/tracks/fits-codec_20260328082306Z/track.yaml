id: fits-codec_20260328082306Z
title: "FITS Codec — Astronomy Image Format Read/Write"
type: feature
status: pending
created: 2026-03-28
updated: "2026-03-28"
spec:
  summary: |
    Implement FITS (Flexible Image Transport System) read and write for
    scientific/astronomy image support. Pure Rust implementation of the
    FITS 4.0 standard for image HDUs.
  context: |
    FITS is the standard format in astronomy, supported by both ImageMagick
    and libvips. It stores multi-dimensional arrays with extensive metadata
    (headers). Used by NASA, ESA, and virtually all observatories.

    The format is simple: ASCII header keywords followed by binary data.
    Supports 8/16/32/64-bit integers and 32/64-bit floats.
  codebase_analysis: |
    - No FITS code in rasmcore
    - FITS magic bytes: 'SIMPLE  =' at offset 0 (ASCII)
    - Header: 80-character keyword=value cards, 2880-byte blocks
    - Data: binary array in row-major order
    - No existing pure Rust FITS library suitable for our needs
    - cfitsio (C) is the reference but we want pure Rust
  acceptance_criteria:
    - FITS format detection (SIMPLE keyword)
    - Read image HDU (Primary HDU with NAXIS=2)
    - Support data types BITPIX 8, 16, 32, -32, -64 (int and float)
    - Write FITS with standard header keywords
    - BZERO/BSCALE scaling applied on read
    - Map FITS pixels to rasmcore pixel formats (Gray8, Gray16, Rgb8)
    - Multi-extension FITS reads first image HDU
    - Parity test against cfitsio reference
    - Wire into decoder/encoder dispatch
  out_of_scope: |
    - FITS tables (binary and ASCII table extensions)
    - FITS compression (tile-compressed FITS)
    - World Coordinate System (WCS) interpretation
    - Multi-HDU compositing
  technical_notes: |
    FITS structure:
    - Header: 80-char cards in 2880-byte blocks
      SIMPLE  = T            / Standard FITS
      BITPIX  = 16           / Bits per pixel
      NAXIS   = 2            / Number of axes
      NAXIS1  = 1024         / Width
      NAXIS2  = 1024         / Height
      BZERO   = 32768.0      / Zero point
      BSCALE  = 1.0          / Scale factor
      END

    - Data: NAXIS1 * NAXIS2 * |BITPIX|/8 bytes, big-endian
    - Padded to 2880-byte boundary

    BITPIX values:
      8  → u8
      16 → i16 (apply BZERO/BSCALE for unsigned)
      32 → i32
      -32 → f32 (IEEE 754)
      -64 → f64 (IEEE 754)

    For display: normalize float data to 0-255 range using
    DATAMIN/DATAMAX or computed min/max.
