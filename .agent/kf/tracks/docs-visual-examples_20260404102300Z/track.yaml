id: docs-visual-examples_20260404102300Z
title: 'Docs: visual before/after split-view examples per operation'
type: feature
status: pending
created: '2026-04-04'
updated: '2026-04-04'
spec:
  summary: 'During docs build, render each operation on a reference image and embed a

    before/after split-view widget in each operation page. Auto-generate code

    examples from registry metadata.

    '
  context: 'The docs site (op-docs-macro track) generates per-operation HTML pages with

    AsciiDoc prose and param tables. But there are no visual examples showing

    what each operation actually does. A before/after split-view per operation

    would let users see the effect immediately — like Photoshop filter previews.


    The build already has access to the full native pipeline (dump_registry runs

    cargo). A render-examples binary can apply each operation with default params

    to a canonical reference image, producing before/after PNGs that get embedded

    in the HTML pages.


    Code examples should also be auto-generated from registry metadata — the

    builder knows the operation name and default param values, so it can produce

    a TypeScript snippet automatically without manual authoring.

    '
  codebase_analysis: 'Existing docs infrastructure:

    - scripts/build-docs.mjs — SSG that reads registry JSON, renders .adoc + param tables

    - dump_registry binary — outputs JSON with name, params, doc_path per operation

    - Reference: V2 pipeline is fully native-runnable (cargo run)

    - ParamDescriptor has default values for all params


    For rendering examples:

    - Need a native binary that loads reference image, applies one filter, writes output PNG

    - rasmcore-pipeline-v2 + rasmcore-codecs-v2 can do this natively

    - Output: docs/build/assets/examples/{op-name}-after.png per operation

    - Before image: same reference for all, copied once to assets


    For split-view widget:

    - Pure CSS/HTML: two <img> elements, clip-path on the "after" image

    - Draggable divider (minimal JS, ~20 lines)

    - No framework dependency

    '
  acceptance_criteria:
  - Reference image at docs/assets/reference.png used for all examples
  - render-examples binary applies each filter with default params to reference image
  - Before/after PNGs generated to docs/build/assets/examples/
  - Each operation page has a split-view widget showing before vs after
  - Split-view has draggable divider (CSS + minimal JS)
  - Code example auto-generated from registry (op name + default params as TypeScript)
  - Operations without meaningful visual effect (e.g., identity at default=0) show gracefully
  - build-docs.sh orchestrates both render-examples and SSG
  out_of_scope: 'Custom example params per operation (future — use defaults for now).

    Animated examples. Multiple reference images. Video examples.

    '
  technical_notes: "Architecture:\n\n1. render-examples binary (crates/rasmcore-v2-wasm/src/bin/render_examples.rs):\n   -\
    \ Loads docs/assets/reference.png\n   - Iterates registered filters via inventory\n   - For each filter with params: creates\
    \ pipeline, applies with defaults, writes PNG\n   - For paramless filters: applies directly\n   - Output: /tmp/docs-examples/{name}-after.png\n\
    \   - Also outputs the reference as {name}-before.png (or just one shared before.png)\n   - Skips filters where default\
    \ params produce identity (amount=0, etc.)\n\n2. Auto-generated code example:\n   - build-docs.mjs reads registry params\
    \ with defaults\n   - Generates TypeScript snippet per operation:\n     ```typescript\n     Pipeline.open(imageBytes)\n\
    \       .brightness({ amount: 0.3 })\n       .writePng();\n     ```\n   - Uses non-default \"showcase\" values (e.g.,\
    \ amount=0.3 not 0.0)\n   - Injected into HTML page below the split-view\n\n3. Split-view HTML widget:\n   - Two overlapping\
    \ <img> elements in a container\n   - After image clipped with clip-path: inset(0 50% 0 0)\n   - Draggable divider updates\
    \ clip-path percentage\n   - ~20 lines of inline JS, no dependencies\n   - Falls back gracefully if JS disabled (shows\
    \ after image only)\n\n4. Build pipeline update:\n   - build-docs.sh: cargo run --bin render_examples → node build-docs.mjs\n\
    \   - build-docs.mjs copies example PNGs to docs/build/assets/examples/\n   - Operation page template includes split-view\
    \ if example exists\n"
