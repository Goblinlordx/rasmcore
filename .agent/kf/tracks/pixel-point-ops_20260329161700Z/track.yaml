id: pixel-point-ops_20260329161700Z
title: Pixel Point Operations — LUT-Based Gamma, Invert, Threshold, Posterize, Clamp with Pipeline Fusion
type: feature
status: pending
created: '2026-03-29'
updated: '2026-03-29'
spec:
  summary: Per-pixel point operations implemented as composable 256-entry LUTs. Individual ops
    (gamma, invert, threshold, posterize, clamp) each generate a [u8; 256] lookup table.
    The pipeline optimizer fuses consecutive point-op nodes into a single combined LUT,
    reducing N operations to one memory pass regardless of chain length.
  context: |
    libvips provides vips_gamma(), vips_invert(), vips_relational_const() (threshold).
    ImageMagick provides --auto-gamma, --negate, --threshold, --posterize, --clamp.
    These are fundamental per-pixel ops used as building blocks by higher-level
    operations (auto-level, normalize). All are u8->u8 mappings expressible as LUTs.

    Key insight: every point op is a pure function from input byte to output byte.
    When the user chains gamma -> contrast -> posterize, the pipeline can compose
    the three LUTs at graph-build time into a single fused LUT, then apply it in
    one pass at execution time. This is how libvips optimizes point-op chains.
  codebase_analysis: |
    filters.rs already has contrast() which builds a [u8; 256] LUT internally.
    brightness() does a per-pixel add. Both are point ops that fit this pattern.
    The pipeline (pipeline/nodes/) uses an ImageNode trait with compute_region().
    A FusedLutNode can implement ImageNode and compose with any upstream point-op
    nodes. The optimization pass runs at graph construction time (before execution),
    walking the node chain and collapsing adjacent LUT-compatible nodes.

    Existing brightness() should be refactored to use the LUT infrastructure too,
    since brightness(amount) = LUT[i] = clamp(i + offset, 0, 255). Similarly,
    contrast() already uses a LUT and can be migrated to the shared infrastructure.
  acceptance_criteria:
    - PointOp enum with variants for Gamma, Invert, Threshold, Posterize, Clamp, Brightness, Contrast
    - build_lut(op) -> [u8; 256] generates a LUT for any single PointOp
    - compose_luts(a, b) -> [u8; 256] fuses two LUTs (b applied after a)
    - apply_lut(pixels, info, lut) applies a LUT to all color channels, preserving alpha
    - Pipeline FusedLutNode collapses consecutive point-op nodes into one LUT + one pass
    - Individual functions gamma(), invert(), threshold(), posterize(), clamp() for direct use
    - All ops support RGB8, RGBA8, Gray8 (alpha channel preserved)
    - Output matches ImageMagick reference within MAE < 0.5 for all test patterns
    - Chained ops (e.g., gamma -> invert -> posterize) produce identical output whether fused or applied separately
    - Performance within 2x of ImageMagick for single ops; faster for fused chains on 4K images
  out_of_scope: |
    Auto-gamma (needs histogram — handled by histogram-analysis track).
    Per-channel LUTs (all ops here are channel-uniform). 3D CLUTs / Hald CLUTs.
    Custom arbitrary LUT loading from file.
  technical_notes: |
    Core types:
      enum PointOp { Gamma(f32), Invert, Threshold(u8), Posterize(u8), Clamp(u8,u8), Brightness(f32), Contrast(f32) }
      fn build_lut(op: PointOp) -> [u8; 256]
      fn compose_luts(first: &[u8; 256], second: &[u8; 256]) -> [u8; 256]  // fused[i] = second[first[i]]
      fn apply_lut(pixels: &[u8], info: &ImageInfo, lut: &[u8; 256]) -> Vec<u8>

    LUT formulas:
      Gamma:     LUT[i] = round(255 * (i/255)^(1/gamma))
      Invert:    LUT[i] = 255 - i
      Threshold: LUT[i] = if i >= level { 255 } else { 0 }
      Posterize: LUT[i] = round(round(i*(n-1)/255) * 255/(n-1))
      Clamp:     LUT[i] = i.clamp(min, max)
      Brightness: LUT[i] = (i as i16 + offset).clamp(0, 255) as u8
      Contrast:  LUT[i] = ((factor * (i as f32 - 128.0)) + 128.0).clamp(0, 255) as u8

    Pipeline fusion: walk node graph, detect maximal runs of consecutive
    PointOpNode nodes. Any non-point-op node (blur, sharpen, resize, median,
    crop, etc.) acts as a fusion barrier — it breaks the chain because it
    needs spatial context, not just the current pixel value. Example:
      brightness -> blur -> contrast -> invert -> posterize
    becomes:
      FusedLut1 -> blur -> FusedLut2
    Two LUT passes + one blur pass instead of four point-op passes + one blur.
    Each fused run collapses to one FusedLutNode with a pre-composed [u8; 256].
    O(256) composition cost per node at plan time, O(1) per pixel at runtime.

    For RGBA: apply LUT to R, G, B channels only; copy alpha unchanged.
    Reference: ImageMagick CLI for output parity, libvips for perf target.
