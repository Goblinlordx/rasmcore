# Tech Stack — rasmcore

language:
  primary: rust
  note: "Core modules written in Rust, compiled to WASM"

compilation_target:
  primary: wasm32-wasip2
  note: "WASI 0.2 now, design for 0.3 migration"

interface_definition:
  format: wit
  tooling:
    - cargo-component
    - wasm-tools
    - wit-bindgen (via cargo-component)

host_sdks:
  - language: typescript
    tooling: jco
    status: production-ready
  - language: rust
    tooling: wasmtime
    status: production-ready
  - language: go
    tooling: N/A
    status: "no Component Model host — consumer-side limitation"
  - language: python
    tooling: componentize-py (guest only)
    status: partial

confirmed_crates:
  image:
    - image (default-features = false, WASM-ready)
    - photon-rs (WASM-first image processing)
    - resvg (SVG rendering, optional)
  video:
    - rav1e (AV1 encoder)
    - rav1d (AV1 decoder, ISRG-backed)
  data:
    - polars (default-features = false for WASM)
    - parquet-wasm
    - serde ecosystem (json, csv, msgpack, cbor)
  gpu:
    - wgpu (browser WebGPU now, wasi-gfx later)

project_tooling:
  documentation: markdown
  track_management: kiloforge
  build: cargo-component
  validation: wasm-tools validate
  composition: wasm-tools compose
  distribution: wkg (OCI registries)
