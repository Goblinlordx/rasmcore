# Product Definition — rasmcore
name: rasmcore
tagline: "Modular WASM Component Ecosystem for Media & Data Processing"
description: |
  A set of interoperable Rust modules compiled to WebAssembly (WASI 0.2/0.3 Component Model)
  providing best-in-class image, video, and data processing with simple cross-language APIs.

  The project eliminates C/C++ FFI security risks, achieves seamless portability, and enables
  modular plugin distribution — including a sidecar pattern for patent-encumbered codecs.

vision: |
  Build a "Universal Pure-Rust WASM Engine" — an ecosystem of interoperable components that
  provide image processing, video processing, and data transformation capabilities across
  any platform and language through standardized WIT interfaces.

goals:
  - Seamless cross-platform, cross-language portability via WASM Component Model
  - Security-first design — eliminate C/C++ parser vulnerabilities
  - Modular plugin architecture with WIT interface governance
  - Support for large file streaming via WASI-IO (no full-file memory loading)
  - GPU acceleration via wgpu/WebGPU where available
  - Patent-encumbered codec support via sidecar plugin distribution

domains:
  - name: image-processing
    description: "Image format handling, conversion, filtering, and manipulation"
  - name: video-processing
    description: "Video encoding, decoding, transcoding, and frame manipulation"
  - name: data-processing
    description: "Data transformation, format conversion, and high-performance analytics"
  - name: core-runtime
    description: "Shared types, buffer management, stream interfaces, and plugin hosting"

target_users:
  - "Application developers needing portable media/data processing"
  - "Cross-language teams (Go, TypeScript, Python, Rust)"
  - "High-security environments (government, military, enterprise)"

current_phase: implementation

technical_requirements:
  architecture:
    - name: hexagonal-architecture
      description: |
        All modules use ports/adapters (hexagonal) architecture. WIT exports are
        thin adapters that convert types and delegate to domain logic. Domain logic
        has zero WIT dependencies and is fully exercisable via native Rust tests.
    - name: domain-defined-errors
      description: |
        Domain layer defines its own explicit error types. The adapter layer
        translates domain errors to WIT rasmcore-error at the boundary.
        Domain errors are never leaked through the interface layer untranslated.

  development_process:
    - name: tdd-at-domain-boundaries
      description: |
        Development follows TDD style. Domain tests are written FIRST and drive
        implementation. Tests exercise domain logic at domain function boundaries
        (not models in isolation, not at the WIT/WASM adapter layer). The domain
        test suite is the feature completeness definition — if it's not tested
        at the domain boundary, it's not done.
    - name: parity-and-benchmark-testing
      description: |
        Every module has parity tests comparing output against best-in-class native
        reference implementations (e.g., ImageMagick for image, FFmpeg for video).
        Benchmark tests measure WASM vs native performance. These are the ONLY tests
        that run at the WASM/adapter layer — they validate the full stack against
        external references.

  testing_hierarchy:
    primary: "Domain unit tests at domain boundaries (TDD, native cargo test)"
    secondary: "Parity tests against reference implementations (WASM integration)"
    tertiary: "Benchmark tests comparing WASM vs native performance"
