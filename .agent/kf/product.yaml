# Product Definition — rasmcore
name: rasmcore
tagline: "Professional-Grade Media Processing — Portable, GPU-Accelerated, f32 Everywhere"
description: |
  A professional-grade media processing engine built in pure Rust, compiled to WebAssembly
  (WASI 0.2/0.3 Component Model). Provides image, audio, and video processing with
  Photoshop/DaVinci Resolve-level quality through f32 GPU-accelerated pipelines.

  Runs anywhere — browser, edge, cloud, native — with a single binary and clean
  cross-language APIs. No C/C++ dependencies, no FFI risks, no platform lock-in.

  Nothing else combines professional quality + universal portability + open source.

vision: |
  Build the universal media processing engine — professional-grade image, audio, and
  video processing that runs on any platform, in any language, through a single portable
  package. The quality bar is Photoshop for image, Pro Tools for audio, DaVinci Resolve
  for video — or better.

  Phase 1 (current): Image — f32 GPU pipeline, 140+ filters, PS-level quality
  Phase 2 (future):  Audio — f32 sample pipeline, SIMD DSP, professional mixing/mastering
  Phase 3 (future):  Video — f32 frame pipeline, per-frame image processing + temporal ops

  The pipeline architecture, GPU acceleration, caching, and tiling infrastructure are
  designed to be domain-agnostic — the same node graph engine handles pixels, samples,
  and frames.

goals:
  - Professional quality — f32 compute everywhere, matching PS/Resolve precision
  - GPU-first processing — WebGPU/wgpu primary, CPU f32 fallback always available
  - Seamless cross-platform, cross-language portability via WASM Component Model
  - Security-first design — pure Rust, WASM sandbox, zero C/C++ parser vulnerabilities
  - Demand-driven tile pipeline — bounded memory, works on low-spec devices
  - Adaptive memory management — cache quantization (Q16/Q8), GPU tiled streaming, proxy scaling
  - Modular plugin architecture with WIT interface governance
  - Feature parity with Photoshop for image operations (filters, adjustments, compositing)
  - Patent-encumbered codec support via sidecar plugin distribution
  - Future-ready for audio and video processing using the same pipeline architecture

domains:
  - name: image-processing
    description: "Professional image editing — f32 GPU pipeline, 140+ filters, format codecs, compositing"
    status: active
  - name: audio-processing
    description: "Professional audio processing — f32 sample pipeline, DSP ops, mixing, mastering"
    status: future
  - name: video-processing
    description: "Professional video processing — per-frame image pipeline, temporal ops, codec integration"
    status: future
  - name: core-runtime
    description: "Shared pipeline engine, GPU executor, cache, tiling, WIT interfaces, plugin hosting"
    status: active

target_users:
  - "Application developers building media editing tools (web, desktop, mobile)"
  - "Cross-language teams (Go, TypeScript, Python, Rust) needing embeddable media processing"
  - "SaaS platforms needing server-side or edge media processing"
  - "High-security environments (government, military, enterprise) requiring WASM sandboxing"
  - "Creative professionals who need PS/Resolve quality in portable tooling"

current_phase: implementation

technical_requirements:
  architecture:
    - name: hexagonal-architecture
      description: |
        All modules use ports/adapters (hexagonal) architecture. WIT exports are
        thin adapters that convert types and delegate to domain logic. Domain logic
        has zero WIT dependencies and is fully exercisable via native Rust tests.
    - name: domain-defined-errors
      description: |
        Domain layer defines its own explicit error types. The adapter layer
        translates domain errors to WIT rasmcore-error at the boundary.
        Domain errors are never leaked through the interface layer untranslated.
    - name: demand-driven-tile-pipeline
      description: |
        Image processing uses a pull-based pipeline. write() drives execution by
        requesting tiles backward through a node graph. Each node requests
        dynamically-sized regions from upstream with appropriate kernel overlap.
        A spatial cache with ref-counted borrowing ensures overlap regions are
        computed once and reused. No fixed tile grid — write sink format determines
        output chunk geometry (JPEG MCU rows, PNG scanlines, TIFF native tiles).
        Design doc: .agent/kf/_reports/pipeline-architecture.md
    - name: dual-level-api
      description: |
        Level 1: Pipeline resource — component owns graph, cache, execution.
        Single-threaded, works everywhere. User-facing API uses read/write naming.
        Level 2: Stateless compute kernels — pure functions (pixels in, pixels out).
        Host can dispatch to N WASM instances in parallel with shared native cache.
        The orchestrator (graph + cache + dispatch) is pure Rust that compiles to
        both native (host-driven Phase 2) and WASM (wasi-threads Phase 3).
    - name: per-format-codec-modules
      description: |
        Each image format (JPEG, PNG, WebP, etc.) is its own module with precisely
        defined typed config records. No stringly-typed params. Each codec covers
        both read (decode) and write (encode) with standards-aligned behavior.

  development_process:
    - name: tdd-at-domain-boundaries
      description: |
        Development follows TDD style. Domain tests are written FIRST and drive
        implementation. Tests exercise domain logic at domain function boundaries
        (not models in isolation, not at the WIT/WASM adapter layer). The domain
        test suite is the feature completeness definition — if it's not tested
        at the domain boundary, it's not done.
    - name: parity-and-benchmark-testing
      description: |
        Every module has parity tests comparing output against best-in-class native
        reference implementations (e.g., ImageMagick for image, FFmpeg for video).
        Benchmark tests measure WASM vs native performance. These are the ONLY tests
        that run at the WASM/adapter layer — they validate the full stack against
        external references.
    - name: three-way-codec-validation
      description: |
        Every native codec MUST pass three-way reference validation before
        completion. For each encode variant:
          A = our_encode(original) → our_decode
          B = our_encode(original) → ref_decode (image crate)
          C = ref_encode(original) → ref_decode
        Lossless: B == original bit-exact, A == B bit-exact.
        Lossy: B ≈ original at same quality as C ≈ original, A == B.
        See code_styleguides/codec-validation.md for full methodology.
    - name: registration-before-completion
      description: |
        Every new, changed, or removed filter or codec MUST be properly
        registered via project annotations before a track is considered
        complete. This is a hard gate — not optional cleanup.

        Filters: add #[rasmcore_macros::register_filter(name, category)] and
        a matching #[derive(ConfigParams)] struct with #[param(...)] fields.
        The build script auto-generates WIT declarations, adapter glue, and
        param-manifest.json from these annotations. If a filter exists as a
        pub fn but lacks registration, it is invisible to WASM consumers,
        the SDK, and the demo UI.

        Codecs: encoder/decoder functions must be registered in the codec
        module's WIT interface and adapter. New formats must appear in
        SUPPORTED_FORMATS and have write/read methods wired.

        Removals: if a filter or codec is removed, its registration,
        ConfigParams, and any WIT/adapter references must also be removed.

        Verification: after implementation, confirm the filter/codec appears
        in the generated param-manifest.json (filters) or
        supportedFormats()/supportedWriteFormats() output (codecs). If it
        doesn't, the track is not done.

  testing_hierarchy:
    primary: "Domain unit tests at domain boundaries (TDD, native cargo test)"
    secondary: "Three-way codec parity tests against reference implementations"
    tertiary: "Benchmark tests comparing WASM vs native performance"
