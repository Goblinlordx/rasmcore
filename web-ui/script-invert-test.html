<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Script Invert Self-Inverse Validation</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1rem; }
  .info { color: #666; margin-bottom: 1.5rem; font-size: 0.9rem; }
  button { padding: 0.6rem 1.4rem; font-size: 1rem; cursor: pointer; border: 1px solid #333; border-radius: 4px; background: #f8f8f8; }
  button:hover { background: #eee; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  #log { margin-top: 1.5rem; font-family: monospace; font-size: 0.85rem; white-space: pre-wrap; line-height: 1.6; }
  .pass { color: #2a7; }
  .fail { color: #c33; }
  .info-line { color: #555; }
  #summary { margin-top: 1rem; padding: 0.8rem; border-radius: 4px; font-weight: bold; font-size: 1.1rem; display: none; }
  #summary.pass { background: #d4edda; color: #155724; display: block; }
  #summary.fail { background: #f8d7da; color: #721c24; display: block; }
</style>
</head>
<body>

<h1>Script Invert Self-Inverse Validation</h1>
<p class="info">
  Loads a custom <code>my_script_invert</code> Rhai script via <code>loadScripts()</code>,
  applies it once (should invert), applies it twice (should return to original).
  Tests fusable strategy through the WASM pipeline.<br><br>
  <strong>Prerequisites:</strong> <code>npm run demo:build</code> then <code>cd web-ui && npm run dev</code>
</p>
<button id="run" disabled>Loading SDK...</button>
<div id="summary"></div>
<div id="log"></div>

<script type="module">
// Import SDK via Vite — resolves bare specifiers through node_modules
const sdk = await import('./sdk/rasmcore-image.js');

const logEl = document.getElementById('log');
const summaryEl = document.getElementById('summary');
const btn = document.getElementById('run');

function log(msg, cls = '') {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
}

function arraysEqual(a, b) {
  if (a.length !== b.length) return false;
  for (let i = 0; i < a.length; i++) {
    if (a[i] !== b[i]) return false;
  }
  return true;
}

function createTestPng() {
  const w = 8, h = 8;
  const pixels = new Uint8Array(w * h * 3);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const i = (y * w + x) * 3;
      pixels[i]     = Math.floor(x * 255 / w);
      pixels[i + 1] = Math.floor(y * 255 / h);
      pixels[i + 2] = 128;
    }
  }
  return sdk.encoder.encode(pixels, {
    width: w, height: h, format: 'rgb8', colorSpace: 'srgb',
  }, 'png', undefined);
}

const INVERT_SCRIPT = `
//! name: my_script_invert
//! category: test
//! strategy: fusable

fn lut(input, channel, params) {
    255.0 - input
}
`;

let passed = 0;
let failed = 0;

function assert(condition, label) {
  if (condition) {
    log('  PASS: ' + label, 'pass');
    passed++;
  } else {
    log('  FAIL: ' + label, 'fail');
    failed++;
  }
}

function runTest() {
  btn.disabled = true;
  logEl.textContent = '';
  summaryEl.className = '';
  summaryEl.style.display = 'none';
  passed = 0;
  failed = 0;

  const Pipeline = sdk.pipeline.ImagePipeline;

  try {
    log('--- Test 1: Load custom script ---', 'info-line');
    const p1 = new Pipeline();
    p1.loadScripts([INVERT_SCRIPT]);
    const scriptNames = p1.listScriptFilters();
    assert(scriptNames.includes('my_script_invert'), 'Script "my_script_invert" registered');
    log('  Registered scripts: [' + scriptNames.join(', ') + ']', 'info-line');

    // Each pipeline gets one write — auto-cleanup invalidates the graph after write.
    // Use separate pipelines for original vs inverted comparisons.

    log('--- Test 2: Single apply (odd) should differ from original ---', 'info-line');
    const testPng = createTestPng();
    const pOrig = new Pipeline();
    const originalPng = pOrig.writePng(pOrig.read(testPng), {}, undefined);

    const pInv = new Pipeline();
    pInv.loadScripts([INVERT_SCRIPT]);
    const srcInv = pInv.read(testPng);
    const invertedPng = pInv.writePng(pInv.applyScriptFilter('my_script_invert', srcInv, []), {}, undefined);
    assert(!arraysEqual(originalPng, invertedPng), 'Inverted output differs from original');

    log('--- Test 3: Double apply (even) should match original ---', 'info-line');
    const pDouble = new Pipeline();
    pDouble.loadScripts([INVERT_SCRIPT]);
    const s3 = pDouble.read(testPng);
    const once = pDouble.applyScriptFilter('my_script_invert', s3, []);
    const twice = pDouble.applyScriptFilter('my_script_invert', once, []);
    const twicePng = pDouble.writePng(twice, {}, undefined);
    assert(arraysEqual(originalPng, twicePng), 'Double invert matches original (identity)');

    log('--- Test 4: Script invert matches built-in invert ---', 'info-line');
    const pScript = new Pipeline();
    pScript.loadScripts([INVERT_SCRIPT]);
    const s4s = pScript.read(testPng);
    const scriptResult = pScript.writePng(pScript.applyScriptFilter('my_script_invert', s4s, []), {}, undefined);

    const pBuiltin = new Pipeline();
    const builtinResult = pBuiltin.writePng(pBuiltin.invert(pBuiltin.read(testPng)), {}, undefined);
    assert(arraysEqual(scriptResult, builtinResult), 'Script invert == built-in invert');

  } catch (e) {
    log('ERROR: ' + e.message, 'fail');
    if (e.stack) log(e.stack, 'fail');
    failed++;
  }

  if (failed === 0) {
    summaryEl.textContent = 'ALL ' + passed + ' TESTS PASSED';
    summaryEl.className = 'pass';
  } else {
    summaryEl.textContent = failed + ' FAILED, ' + passed + ' passed';
    summaryEl.className = 'fail';
  }

  btn.disabled = false;
}

// Ready
btn.textContent = 'Run Test';
btn.disabled = false;
btn.onclick = runTest;
log('SDK loaded — click "Run Test" to begin.', 'info-line');
</script>
</body>
</html>
