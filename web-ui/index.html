<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rasmcore — pipeline builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #e0e0e0; height: 100vh; overflow: hidden; }

    /* ─── Toolbar ─── */
    .toolbar { height: 40px; background: #12122a; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; padding: 0 12px; gap: 4px; }
    .toolbar .brand { font-size: 0.9rem; font-weight: 600; margin-right: 12px; }
    .toolbar .badge { font-size: 0.6rem; padding: 2px 6px; border-radius: 8px; background: #8b5cf6; color: white; margin-right: 16px; }

    /* Dropdown menus */
    .menu-btn { padding: 4px 10px; background: transparent; color: #c0c0e0; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; position: relative; }
    .menu-btn:hover { background: #1a1a3a; }
    .menu-btn.active { background: #1a1a3a; }
    .dropdown { display: none; position: absolute; top: 100%; left: 0; background: #16162e; border: 1px solid #2a2a4a; border-radius: 6px; min-width: 200px; max-height: 400px; overflow-y: auto; z-index: 50; box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 4px 0; }
    .dropdown.open { display: block; }
    .dropdown-header { padding: 6px 12px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.08em; color: #666; }
    .dropdown-item { padding: 6px 12px; font-size: 0.75rem; cursor: pointer; transition: background 0.1s; }
    .dropdown-item:hover { background: #1a1a3a; }
    .dropdown-group { padding: 4px 12px; font-size: 0.7rem; color: #8888bb; cursor: pointer; }
    .dropdown-group:hover { background: #1a1a3a; }
    .dropdown-sub { padding-left: 24px; }
    .dropdown-divider { height: 1px; background: #2a2a4a; margin: 4px 0; }

    .toolbar-spacer { flex: 1; }
    .toolbar button { padding: 4px 10px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
    .toolbar button:hover { background: #2563eb; }
    .toolbar button.secondary { background: #333; }
    .toolbar button.secondary:hover { background: #444; }

    /* ─── Main Layout ─── */
    .main-layout { display: flex; height: calc(100vh - 40px - 28px); }

    /* ─── Canvas Area ─── */
    .canvas-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; position: relative; background: #080818; min-width: 0; }
    .canvas-area canvas { max-width: 100%; max-height: calc(100vh - 140px); border: 1px solid #222; border-radius: 4px; }
    #drop-zone { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #drop-zone.has-image { pointer-events: none; }
    .drop-prompt { border: 2px dashed #333; border-radius: 12px; padding: 3rem 4rem; text-align: center; color: #555; font-size: 0.9rem; }
    .drop-prompt:hover { border-color: #3b82f6; color: #888; cursor: pointer; }

    /* ─── Right Panel ─── */
    .right-panel { width: 320px; background: #0c0c1e; border-left: 1px solid #2a2a4a; display: flex; flex-direction: column; overflow: hidden; transition: width 0.2s; flex-shrink: 0; }
    .right-panel.collapsed { width: 0; border-left: none; }
    .panel-toggle { position: absolute; right: 320px; top: 50%; transform: translateY(-50%); z-index: 10; background: #1a1a3a; border: 1px solid #2a2a4a; border-right: none; border-radius: 6px 0 0 6px; color: #888; cursor: pointer; padding: 8px 4px; font-size: 0.7rem; transition: right 0.2s; }
    .right-panel.collapsed ~ .panel-toggle { right: 0; }

    .panel-section { border-bottom: 1px solid #1a1a2e; }
    .panel-section-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 10px 4px; cursor: pointer; user-select: none; }
    .panel-section-header h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.06em; color: #666; margin: 0; }
    .panel-section-header .section-toggle { font-size: 0.55rem; color: #555; transition: transform 0.2s; }
    .panel-section-header .section-toggle.collapsed { transform: rotate(-90deg); }
    .panel-section-body { padding: 0 0 4px; }
    .panel-section-body.collapsed { display: none; }
    .panel-scroll { flex: 1; overflow-y: auto; }

    /* ─── Layer Cards ─── */
    .layer-card { background: #12122a; border: 1px solid #2a2a4a; border-radius: 6px; margin: 4px 8px; transition: border-color 0.2s; }
    .layer-card.active { border-color: #8b5cf6; }
    .layer-card-header { display: flex; align-items: center; gap: 6px; padding: 6px 8px; cursor: pointer; }
    .layer-thumb { width: 32px; height: 32px; object-fit: cover; border-radius: 3px; border: 1px solid #333; flex-shrink: 0; }
    .layer-name { flex: 1; font-weight: 600; font-size: 0.72rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-vis { cursor: pointer; font-size: 0.75rem; opacity: 0.6; flex-shrink: 0; }
    .layer-vis:hover { opacity: 1; }
    .layer-vis.hidden { opacity: 0.3; }
    .layer-delete { cursor: pointer; color: #666; font-size: 0.7rem; flex-shrink: 0; padding: 2px; }
    .layer-delete:hover { color: #f87171; }
    .layer-controls { padding: 4px 8px 6px; display: flex; gap: 4px; flex-wrap: wrap; }
    .layer-controls select, .layer-controls input { font-size: 0.65rem; padding: 2px 4px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; }
    .layer-controls input[type="number"] { width: 50px; }
    #add-layer-btn { width: calc(100% - 16px); margin: 4px 8px; background: #1a1a3a; border: 1px dashed #333; font-size: 0.65rem; color: #888; padding: 6px; border-radius: 4px; cursor: pointer; }
    #add-layer-btn:hover { border-color: #3b82f6; color: #e0e0e0; }

    /* ─── Effect Stack (Chain/Operations) ─── */
    .node-card { background: #16162e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 0; margin: 4px 8px; position: relative; transition: border-color 0.2s; }
    .node-card.editing { border-color: #3b82f6; background: #1a1a3a; }
    .node-card.pending { border-color: #f59e0b; border-style: dashed; }
    .node-card .node-header { display: flex; align-items: center; gap: 4px; padding: 6px 8px; }
    .node-card .drag-handle { width: 16px; cursor: grab; color: #444; font-size: 0.75rem; text-align: center; user-select: none; flex-shrink: 0; }
    .node-card .drag-handle:hover { color: #888; }
    .node-card .drag-handle:active { cursor: grabbing; }
    .node-card .node-name { font-size: 0.75rem; font-weight: 600; flex: 1; }
    .node-card .node-actions { display: flex; gap: 6px; align-items: center; }
    .node-card .node-remove { cursor: pointer; color: #666; font-size: 0.8rem; }
    .node-card .node-remove:hover { color: #f87171; }
    .node-card .node-timing { font-size: 0.6rem; color: #4ade80; }
    .node-card .node-body { padding: 4px 8px 8px; }

    /* Param rows */
    .param-row { margin-top: 6px; }
    .param-row label { display: block; font-size: 0.65rem; color: #888; margin-bottom: 2px; }
    .param-row label .param-value { float: right; color: #3b82f6; font-family: monospace; font-size: 0.65rem; }
    .param-row input[type="range"] { width: 100%; accent-color: #3b82f6; }
    .param-row select { width: 100%; padding: 3px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.7rem; }

    /* Smart controls */
    .param-row .spinner-input { width: 100%; padding: 3px 6px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.7rem; font-family: monospace; }
    .param-row .text-input { width: 100%; padding: 3px 6px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.65rem; font-family: monospace; }
    .param-row .toggle-switch { width: 32px; height: 16px; accent-color: #3b82f6; cursor: pointer; }
    .param-row .log-slider { width: 100%; accent-color: #22c55e; }
    .param-row .signed-slider { width: 100%; accent-color: #f59e0b; }
    .param-row .temperature-slider { width: 100%; accent-color: #f97316; }
    .param-row .opacity-wrap { display: flex; gap: 6px; align-items: center; }
    .param-row .opacity-slider { flex: 1; accent-color: #8b5cf6; }
    .param-row .opacity-number { width: 48px; padding: 2px 4px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.65rem; font-family: monospace; text-align: right; }

    /* Export section (sidebar bottom) */
    .export-section { padding: 6px 8px; border-top: 1px solid #2a2a4a; background: #0e0e20; }
    .export-section .export-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
    .export-section select { font-size: 0.7rem; padding: 3px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; }
    .export-section input[type="range"] { width: 60px; accent-color: #3b82f6; }
    .export-section button { padding: 3px 8px; font-size: 0.65rem; }

    /* ─── Bottom Status Bar ─── */
    .status-bar { height: 28px; background: #0e0e20; border-top: 1px solid #2a2a4a; display: flex; align-items: center; padding: 0 12px; gap: 16px; font-size: 0.65rem; color: #666; flex-shrink: 0; }
    .status-bar .status-dims { color: #888; }
    .status-bar .status-time { color: #4ade80; }
    .status-bar .status-ops { color: #60a5fa; }
    .status-bar .status-error { color: #f87171; }
    .status-bar .status-spacer { flex: 1; }

    /* Buttons */
    button { padding: 5px 14px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
    button:hover { background: #2563eb; }
    button.sm { padding: 3px 10px; font-size: 0.65rem; }

    /* Code modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#16162e; border:1px solid #3b82f6; border-radius:8px; padding:1.5rem; max-width:640px; width:90%; max-height:80vh; overflow:auto; }
    .modal h3 { margin-bottom:0.75rem; font-size:0.9rem; }
    .modal pre { background:#0a0a1a; padding:1rem; border-radius:4px; overflow-x:auto; font-size:0.75rem; line-height:1.5; color:#e0e0e0; }
    .modal pre .kw { color:#c084fc; }
    .modal pre .str { color:#4ade80; }
    .modal pre .num { color:#fbbf24; }
    .modal pre .fn { color:#60a5fa; }
    .modal-actions { margin-top:1rem; display:flex; gap:8px; }
  </style>
</head>
<body>
  <!-- Toolbar -->
  <div class="toolbar">
    <span class="brand">rasmcore</span>
    <span class="badge">Pipeline Builder</span>

    <!-- Operation dropdown menus (populated by JS) -->
    <div id="menu-filters" class="menu-btn" style="position:relative">
      Filters ▾
      <div class="dropdown" id="dropdown-filters"></div>
    </div>
    <div id="menu-transforms" class="menu-btn" style="position:relative">
      Transform ▾
      <div class="dropdown" id="dropdown-transforms"></div>
    </div>
    <div id="menu-effects" class="menu-btn" style="position:relative">
      Effects ▾
      <div class="dropdown" id="dropdown-effects"></div>
    </div>
    <div id="menu-grading" class="menu-btn" style="position:relative">
      Grading ▾
      <div class="dropdown" id="dropdown-grading"></div>
    </div>

    <div class="toolbar-spacer"></div>
    <button id="compare-btn" class="secondary" style="display:none">Before/After</button>
    <button id="code-btn" class="secondary">{ } Code</button>
  </div>

  <!-- Main layout: canvas + right panel -->
  <div class="main-layout">
    <div class="canvas-area" id="canvas-area">
      <div id="drop-zone">
        <div class="drop-prompt" id="drop-prompt">Drop an image to start<br><span style="font-size:0.7rem;color:#444">or click to browse</span></div>
      </div>
      <canvas id="preview-canvas" style="display:none"></canvas>
      <canvas id="original-canvas" style="display:none"></canvas>
    </div>

    <div class="right-panel" id="right-panel">
      <div class="panel-scroll">
        <!-- Layers Panel -->
        <div class="panel-section" id="layers-section">
          <div class="panel-section-header" data-section="layers">
            <h3>Layers</h3>
            <span class="section-toggle">&#9660;</span>
          </div>
          <div class="panel-section-body" id="layers-body">
            <div id="layers"></div>
            <button id="add-layer-btn">+ Add Layer</button>
            <input type="file" id="layer-file-input" accept="image/*" style="display:none">
          </div>
        </div>

        <!-- Effect Stack Panel -->
        <div class="panel-section" id="effects-section">
          <div class="panel-section-header" data-section="effects">
            <h3>Effect Stack <span id="active-layer-label" style="color:#8b5cf6;font-size:0.55rem"></span></h3>
            <span class="section-toggle">&#9660;</span>
          </div>
          <div class="panel-section-body" id="effects-body">
            <div id="chain"></div>
            <div id="drop-hint" style="display:none;padding:12px;text-align:center;color:#555;font-size:0.7rem">Select an operation from the toolbar</div>
          </div>
        </div>
      </div>

      <!-- Export (pinned to bottom) -->
      <div class="export-section">
        <div class="export-row">
          <select id="export-format">
            <option value="jpeg">JPEG</option>
            <option value="png">PNG</option>
            <option value="webp">WebP</option>
          </select>
          <input type="range" id="quality" min="1" max="100" value="85" title="Quality">
          <span id="quality-val" style="font-size:0.6rem;color:#888;width:24px">85</span>
          <button id="download-btn" class="sm">Download</button>
        </div>
      </div>
    </div>
    <button class="panel-toggle" id="panel-toggle">&#9664;</button>
  </div>

  <!-- Bottom Status Bar -->
  <div class="status-bar" id="status-bar">
    <span class="status-dims" id="status-dims"></span>
    <span class="status-time" id="status-time"></span>
    <span class="status-ops" id="status-ops"></span>
    <span class="status-spacer"></span>
    <span class="status-error" id="status-error"></span>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none">

  <div class="modal-overlay" id="code-modal">
    <div class="modal">
      <h3>SDK Code</h3>
      <pre id="code-output"></pre>
      <div class="modal-actions">
        <button id="copy-code-btn">Copy to Clipboard</button>
        <button id="close-modal-btn" style="background:#333">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/pipeline.ts"></script>
</body>
</html>
