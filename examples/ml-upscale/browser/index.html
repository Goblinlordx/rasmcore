<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Upscale PoC — Real-ESRGAN x4plus</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
  h1 { margin-bottom: 10px; font-size: 1.4em; }
  .subtitle { color: #888; margin-bottom: 20px; font-size: 0.9em; }
  .panel { background: #16213e; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
  .status { font-family: monospace; font-size: 0.85em; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  .status .ok { color: #4ade80; }
  .status .warn { color: #facc15; }
  .status .err { color: #f87171; }
  .status .info { color: #60a5fa; }
  .images { display: flex; gap: 16px; flex-wrap: wrap; }
  .images canvas, .images img { max-width: 100%; border: 1px solid #333; border-radius: 4px; }
  .image-box { flex: 1; min-width: 200px; }
  .image-box h3 { margin-bottom: 8px; font-size: 0.95em; }
  button { background: #0f3460; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1em; margin-right: 8px; }
  button:hover { background: #1a4f8a; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input[type="file"] { display: none; }
  .controls { margin-bottom: 16px; display: flex; align-items: center; gap: 12px; }
  .timing { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 16px; font-family: monospace; font-size: 0.85em; }
  .timing .label { color: #888; }
  .timing .value { color: #4ade80; text-align: right; }
</style>
</head>
<body>

<h1>ML Upscale PoC</h1>
<p class="subtitle">Real-ESRGAN x4plus via ONNX Runtime Web — validates ML inference execution path</p>

<div class="panel">
  <h3 style="margin-bottom: 8px;">Backend Detection</h3>
  <div id="backends" class="status">Detecting...</div>
</div>

<div class="controls">
  <button onclick="document.getElementById('fileInput').click()">Choose Image</button>
  <button onclick="useTestImage()">Use Test Image (64x64)</button>
  <select id="backendSelect" style="background: #0f3460; color: white; border: 1px solid #333; padding: 8px; border-radius: 6px; font-size: 0.9em;">
    <option value="auto">Backend: auto-detect</option>
    <option value="webnn-gpu">WebNN GPU</option>
    <option value="webnn-cpu">WebNN CPU</option>
    <option value="webgpu">WebGPU (ORT)</option>
    <option value="wasm">WASM CPU</option>
  </select>
  <button id="runBtn" onclick="runUpscale()" disabled>Run Upscale (4x)</button>
  <input type="file" id="fileInput" accept="image/*" onchange="loadFile(event)">
  <span id="inputInfo" style="color: #888; font-size: 0.9em;"></span>
</div>

<div class="images">
  <div class="image-box">
    <h3>Input</h3>
    <canvas id="inputCanvas" width="0" height="0"></canvas>
  </div>
  <div class="image-box">
    <h3>Output (4x)</h3>
    <canvas id="outputCanvas" width="0" height="0"></canvas>
  </div>
</div>

<div class="panel" style="margin-top: 16px;">
  <h3 style="margin-bottom: 8px;">Timing</h3>
  <div id="timing" class="timing">
    <span class="label">Waiting for input...</span>
  </div>
</div>

<div class="panel">
  <h3 style="margin-bottom: 8px;">Log</h3>
  <div id="log" class="status"></div>
</div>

<!-- ONNX Runtime Web from CDN -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.21.0/dist/ort.all.min.js"></script>

<script>
// Local model — drop Real-ESRGAN-x4plus.onnx in the same directory as this HTML.
// In production, the host serves models from its own CDN / storage.
const MODEL_URL = './Real-ESRGAN-x4plus.onnx';
const SCALE = 4;

let inputImageData = null;
let session = null;
let selectedBackend = 'wasm'; // default fallback

const logEl = document.getElementById('log');
const backendsEl = document.getElementById('backends');
const timingEl = document.getElementById('timing');

function log(msg, cls = '') {
  const span = document.createElement('span');
  span.className = cls;
  span.textContent = msg + '\n';
  logEl.appendChild(span);
  logEl.scrollTop = logEl.scrollHeight;
}

function setTiming(entries) {
  timingEl.innerHTML = entries.map(([k, v]) =>
    `<span class="label">${k}</span><span class="value">${v}</span>`
  ).join('');
}

// ── Backend Detection ──────────────────────────────────────────────
async function detectBackends() {
  const results = [];

  // WebNN check — createContext takes an options object per W3C spec
  if (typeof navigator !== 'undefined' && navigator.ml) {
    results.push('<span class="ok">WebNN API: available (navigator.ml exists)</span>');
    for (const deviceType of ['gpu', 'npu', 'cpu']) {
      try {
        const ctx = await navigator.ml.createContext({ deviceType });
        results.push('<span class="ok">  WebNN ' + deviceType.toUpperCase() + ': available</span>');
      } catch (e) {
        results.push('<span class="warn">  WebNN ' + deviceType.toUpperCase() + ': ' + e.message + '</span>');
      }
    }
  } else {
    results.push('<span class="warn">WebNN API: not available</span>');
    results.push('<span class="info">  Enable: chrome://flags → Web Machine Learning Neural Network API</span>');
  }

  // WebGPU check
  if (navigator.gpu) {
    try {
      const adapter = await navigator.gpu.requestAdapter();
      if (adapter) {
        // adapter.info is the modern API (requestAdapterInfo is deprecated)
        const info = adapter.info || {};
        const desc = info.description || info.vendor || info.architecture || 'unknown';
        results.push('<span class="ok">WebGPU: available (' + desc + ')</span>');
        selectedBackend = 'webgpu';
      } else {
        results.push('<span class="warn">WebGPU: no adapter returned</span>');
      }
    } catch (e) {
      results.push('<span class="warn">WebGPU: ' + e.message + '</span>');
    }
  } else {
    results.push('<span class="warn">WebGPU: not available (requires HTTPS or localhost)</span>');
  }

  // WASM always available
  results.push('<span class="ok">WASM SIMD: available (universal fallback)</span>');

  results.push('');
  results.push('<span class="info">Selected backend for ORT: ' + selectedBackend + '</span>');

  backendsEl.innerHTML = results.join('\n');
}

// ── Image Loading ──────────────────────────────────────────────────
function loadFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => setInputImage(img);
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function useTestImage() {
  // Generate a 64x64 gradient test image
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  for (let y = 0; y < 64; y++) {
    for (let x = 0; x < 64; x++) {
      ctx.fillStyle = `rgb(${x * 4}, ${y * 4}, ${(x + y) * 2})`;
      ctx.fillRect(x, y, 1, 1);
    }
  }
  const img = new Image();
  img.onload = () => setInputImage(img);
  img.src = canvas.toDataURL();
}

function setInputImage(img) {
  const canvas = document.getElementById('inputCanvas');
  canvas.width = img.width;
  canvas.height = img.height;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, 0, 0);
  inputImageData = ctx.getImageData(0, 0, img.width, img.height);
  document.getElementById('inputInfo').textContent = `${img.width}x${img.height} → ${img.width * SCALE}x${img.height * SCALE}`;
  document.getElementById('runBtn').disabled = false;
  log(`Loaded image: ${img.width}x${img.height}`, 'info');
}

// ── Tensor Conversion ──────────────────────────────────────────────
function rgbaToNchw(imageData) {
  const { width, height, data } = imageData;
  const tensor = new Float32Array(3 * height * width);
  const plane = height * width;

  for (let y = 0; y < height; y++) {
    for (let x = 0; x < width; x++) {
      const srcIdx = (y * width + x) * 4;
      const dstIdx = y * width + x;
      tensor[dstIdx]             = data[srcIdx]     / 255.0; // R
      tensor[plane + dstIdx]     = data[srcIdx + 1] / 255.0; // G
      tensor[2 * plane + dstIdx] = data[srcIdx + 2] / 255.0; // B
    }
  }

  return new ort.Tensor('float32', tensor, [1, 3, height, width]);
}

function nchwToCanvas(outputTensor, canvas) {
  const [, , outH, outW] = outputTensor.dims;
  canvas.width = outW;
  canvas.height = outH;
  const ctx = canvas.getContext('2d');
  const imgData = ctx.createImageData(outW, outH);
  const data = outputTensor.data;
  const plane = outH * outW;

  for (let y = 0; y < outH; y++) {
    for (let x = 0; x < outW; x++) {
      const srcIdx = y * outW + x;
      const dstIdx = (y * outW + x) * 4;
      imgData.data[dstIdx]     = Math.round(Math.min(1, Math.max(0, data[srcIdx])) * 255);
      imgData.data[dstIdx + 1] = Math.round(Math.min(1, Math.max(0, data[plane + srcIdx])) * 255);
      imgData.data[dstIdx + 2] = Math.round(Math.min(1, Math.max(0, data[2 * plane + srcIdx])) * 255);
      imgData.data[dstIdx + 3] = 255;
    }
  }

  ctx.putImageData(imgData, 0, 0);
}

// ── Main Upscale Flow ──────────────────────────────────────────────
async function runUpscale() {
  if (!inputImageData) return;

  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = 'Running...';
  const timings = [];

  try {
    // Step 1: Load model
    log('Loading model...', 'info');
    const t0 = performance.now();

    if (!session) {
      // Determine backend from dropdown or auto-detect
      const pick = document.getElementById('backendSelect').value;
      const backend = pick === 'auto' ? selectedBackend : pick;

      // Map backend name to ORT execution provider config
      const epMap = {
        'webnn-gpu': [{ name: 'webnn', deviceType: 'gpu', powerPreference: 'high-performance' }],
        'webnn-cpu': [{ name: 'webnn', deviceType: 'cpu' }],
        'webgpu':    ['webgpu'],
        'wasm':      ['wasm'],
      };
      const eps = epMap[backend] || ['wasm'];
      const opts = { executionProviders: eps };
      log(`  Backend: ${backend}`, 'info');
      log(`  Execution providers: ${JSON.stringify(eps)}`, 'info');
      log(`  Model URL: ${MODEL_URL}`, 'info');

      // Fetch model as ArrayBuffer for progress tracking
      const response = await fetch(MODEL_URL);
      const contentLength = response.headers.get('Content-Length');
      const totalBytes = contentLength ? parseInt(contentLength) : 0;
      log(`  Model size: ${totalBytes ? (totalBytes / 1048576).toFixed(1) + ' MB' : 'unknown'}`, 'info');

      const arrayBuffer = await response.arrayBuffer();
      const modelLoadTime = performance.now() - t0;
      timings.push(['Model download', `${modelLoadTime.toFixed(0)}ms`]);
      log(`  Downloaded in ${modelLoadTime.toFixed(0)}ms`, 'ok');

      const t1 = performance.now();
      session = await ort.InferenceSession.create(arrayBuffer, opts);
      const sessionCreateTime = performance.now() - t1;
      timings.push(['Session create', `${sessionCreateTime.toFixed(0)}ms`]);
      log(`  Session created in ${sessionCreateTime.toFixed(0)}ms`, 'ok');
      log(`  Input names: ${session.inputNames}`, 'info');
      log(`  Output names: ${session.outputNames}`, 'info');
    } else {
      timings.push(['Model download', 'cached']);
      timings.push(['Session create', 'cached']);
      log('  Using cached session', 'ok');
    }

    // Step 2: Preprocess
    const t2 = performance.now();
    const inputTensor = rgbaToNchw(inputImageData);
    const preprocessTime = performance.now() - t2;
    timings.push(['Preprocess', `${preprocessTime.toFixed(1)}ms`]);
    log(`Preprocess: RGBA ${inputImageData.width}x${inputImageData.height} -> NCHW [1,3,${inputImageData.height},${inputImageData.width}] (${preprocessTime.toFixed(1)}ms)`, 'ok');

    // Step 3: Inference
    const t3 = performance.now();
    const feeds = {};
    feeds[session.inputNames[0]] = inputTensor;
    const results = await session.run(feeds);
    const inferenceTime = performance.now() - t3;
    timings.push(['Inference', `${inferenceTime.toFixed(0)}ms`]);

    const outputTensor = results[session.outputNames[0]];
    log(`Inference: ${inferenceTime.toFixed(0)}ms — output shape [${outputTensor.dims}]`, 'ok');

    // Step 4: Postprocess
    const t4 = performance.now();
    const outputCanvas = document.getElementById('outputCanvas');
    nchwToCanvas(outputTensor, outputCanvas);
    const postprocessTime = performance.now() - t4;
    timings.push(['Postprocess', `${postprocessTime.toFixed(1)}ms`]);
    log(`Postprocess: NCHW -> canvas ${outputTensor.dims[3]}x${outputTensor.dims[2]} (${postprocessTime.toFixed(1)}ms)`, 'ok');

    const totalTime = performance.now() - t0;
    timings.push(['Total', `${totalTime.toFixed(0)}ms`]);
    log(`\nDone! Total: ${totalTime.toFixed(0)}ms`, 'ok');

    setTiming(timings);

  } catch (e) {
    log(`ERROR: ${e.message}`, 'err');
    log(e.stack || '', 'err');
    console.error(e);

    // If non-WASM backend failed, retry with WASM as final fallback
    const pick = document.getElementById('backendSelect').value;
    const triedBackend = pick === 'auto' ? selectedBackend : pick;
    if (triedBackend !== 'wasm' && !session) {
      log(`\n${triedBackend} failed. Retrying with WASM backend...`, 'warn');
      document.getElementById('backendSelect').value = 'wasm';
      session = null;
      btn.disabled = false;
      btn.textContent = 'Run Upscale (4x)';
      runUpscale();
      return;
    }
  }

  btn.disabled = false;
  btn.textContent = 'Run Upscale (4x)';
}

// ── Init ───────────────────────────────────────────────────────────
detectBackends();
log('Ready. Choose an image or use the test image, then click Run Upscale.', 'info');
</script>

</body>
</html>
