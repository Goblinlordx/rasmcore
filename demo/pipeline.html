<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rasmcore — pipeline builder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0a0a1a; color: #e0e0e0; height: 100vh; overflow: hidden; }
    header { padding: 0.75rem 1.5rem; background: #12122a; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header .badge { font-size: 0.65rem; padding: 2px 8px; border-radius: 10px; background: #8b5cf6; color: white; }
    header a { color: #60a5fa; font-size: 0.8rem; text-decoration: none; margin-left: auto; }
    .layout { display: flex; height: calc(100vh - 44px); }

    /* Palette */
    .palette { width: 220px; padding: 0.75rem; overflow-y: auto; background: #0e0e20; border-right: 1px solid #2a2a4a; }
    .palette h3 { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.08em; color: #666; margin: 0.75rem 0 0.3rem; }
    .palette-item { padding: 6px 10px; margin: 2px 0; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: background 0.15s; }
    .palette-item:hover { background: #1a1a3a; }
    .palette-item .cat { font-size: 0.6rem; color: #666; }
    .palette-group { margin: 2px 0; }
    .palette-group-header { padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; color: #b0b0d0; transition: background 0.15s; user-select: none; }
    .palette-group-header:hover { background: #1a1a3a; }
    .palette-group-arrow { display: inline-block; width: 12px; font-size: 0.55rem; color: #666; transition: transform 0.15s; }
    .palette-variant { padding-left: 24px; font-size: 0.75rem; color: #c0c0e0; }

    /* Chain */
    .chain-area { width: 320px; padding: 0.75rem; overflow-y: auto; background: #0c0c1e; border-right: 1px solid #2a2a4a; }
    .chain-area h3 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; color: #888; margin-bottom: 0.5rem; }
    #drop-hint { border: 2px dashed #333; border-radius: 8px; padding: 2rem 1rem; text-align: center; color: #555; font-size: 0.8rem; cursor: pointer; }
    #drop-hint:hover { border-color: #3b82f6; color: #888; }

    .node-card { background: #16162e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 8px 12px; margin-bottom: 6px; position: relative; cursor: grab; transition: border-color 0.2s; }
    .node-card:active { cursor: grabbing; }
    .node-card.editing { border-color: #3b82f6; background: #1a1a3a; }
    .node-card.source { border-color: #3b82f6; }
    .node-card .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .node-card .node-name { font-size: 0.8rem; font-weight: 600; }
    .node-card .node-remove { cursor: pointer; color: #666; font-size: 0.9rem; }
    .node-card .node-remove:hover { color: #f87171; }
    .node-card .node-timing { font-size: 0.65rem; color: #4ade80; }
    .node-param { margin-top: 4px; }
    .node-param label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #aaa; }
    .node-param label span { color: #3b82f6; font-family: monospace; }
    .node-param input[type="range"] { width: 100%; accent-color: #3b82f6; }
    .node-param select { width: 100%; padding: 3px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.75rem; }

    /* Smart controls */
    .spinner-input { width: 100%; padding: 3px 6px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.75rem; font-family: monospace; }
    .text-input { width: 100%; padding: 3px 6px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.7rem; font-family: monospace; }
    .toggle-switch { width: 36px; height: 18px; accent-color: #3b82f6; cursor: pointer; }
    .toggle-label { font-size: 0.7rem; color: #aaa; }
    .log-slider { width: 100%; accent-color: #22c55e; }
    .signed-slider { width: 100%; accent-color: #f59e0b; }
    .temperature-slider { width: 100%; accent-color: #f97316; background: linear-gradient(to right, #4466cc, #ffaa44); border-radius: 4px; }
    .opacity-wrap { display: flex; gap: 6px; align-items: center; }
    .opacity-slider { flex: 1; accent-color: #8b5cf6; }
    .opacity-number { width: 52px; padding: 2px 4px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; font-size: 0.7rem; font-family: monospace; text-align: right; }

    /* Layers */
    .layer-panel { margin-bottom: 8px; }
    .layer-card { background: #12122a; border: 1px solid #2a2a4a; border-radius: 6px; padding: 6px 10px; margin-bottom: 4px; }
    .layer-card.active { border-color: #8b5cf6; }
    .layer-card .layer-header { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; }
    .layer-card .layer-thumb { width: 32px; height: 32px; object-fit: cover; border-radius: 3px; border: 1px solid #333; }
    .layer-card .layer-name { flex: 1; font-weight: 600; font-size: 0.75rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .layer-card .layer-controls { margin-top: 4px; display: flex; gap: 4px; flex-wrap: wrap; }
    .layer-card .layer-controls select, .layer-card .layer-controls input { font-size: 0.65rem; padding: 2px 4px; background: #1a1a2e; color: #e0e0e0; border: 1px solid #333; border-radius: 3px; }
    .layer-card .layer-controls input[type="number"] { width: 50px; }
    .layer-vis { cursor: pointer; font-size: 0.8rem; opacity: 0.6; }
    .layer-vis:hover { opacity: 1; }
    .layer-vis.hidden { opacity: 0.3; }
    #add-layer-btn { width: 100%; margin-top: 4px; background: #1a1a3a; border: 1px dashed #333; font-size: 0.7rem; color: #888; }
    #add-layer-btn:hover { border-color: #3b82f6; color: #e0e0e0; }

    /* Export row */
    .export-row { background: #12122a; border: 1px solid #2a2a4a; border-radius: 6px; padding: 8px 12px; margin-top: 8px; }
    .export-row .node-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .export-row select, .export-row input { font-size: 0.75rem; }
    button { padding: 5px 14px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
    button:hover { background: #2563eb; }
    button.sm { padding: 3px 10px; font-size: 0.7rem; }

    /* Preview */
    .preview { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
    .preview canvas { max-width: 100%; max-height: 80vh; border: 1px solid #222; border-radius: 4px; }
    .preview-info { font-size: 0.7rem; color: #888; margin-top: 6px; }
    #total-time { color: #4ade80; font-size: 0.75rem; margin-top: 4px; }

    /* Code modal */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal { background:#16162e; border:1px solid #3b82f6; border-radius:8px; padding:1.5rem; max-width:640px; width:90%; max-height:80vh; overflow:auto; }
    .modal h3 { margin-bottom:0.75rem; font-size:0.9rem; }
    .modal pre { background:#0a0a1a; padding:1rem; border-radius:4px; overflow-x:auto; font-size:0.8rem; line-height:1.5; color:#e0e0e0; }
    .modal pre .kw { color:#c084fc; }
    .modal pre .str { color:#4ade80; }
    .modal pre .num { color:#fbbf24; }
    .modal pre .fn { color:#60a5fa; }
    .modal-actions { margin-top:1rem; display:flex; gap:8px; }
  </style>
</head>
<body>
  <header>
    <h1>rasmcore</h1>
    <span class="badge">Pipeline Builder</span>
    <a href="/">← Simple Demo</a>
  </header>

  <div class="layout">
    <div class="palette" id="palette">
      <h3>Operations</h3>
      <div id="palette-items">Loading SDK...</div>
    </div>

    <div class="chain-area">
      <div class="layer-panel">
        <h3>Layers</h3>
        <div id="layers"></div>
        <button id="add-layer-btn" class="sm">+ Add Layer</button>
        <input type="file" id="layer-file-input" accept="image/*" style="display:none">
      </div>

      <h3>Processing Chain <span id="active-layer-label" style="color:#8b5cf6;font-size:0.6rem"></span></h3>
      <div id="chain"></div>
      <div id="drop-hint" style="display:none">Click an operation to add it</div>

      <div class="export-row">
        <div class="node-header">
          <span class="node-name" style="font-size:0.8rem">Export</span>
          <button id="download-btn" class="sm">Download</button>
          <button id="code-btn" class="sm" style="background:#8b5cf6">{ } Code</button>
        </div>
        <div class="node-param">
          <select id="export-format">
            <option value="jpeg">JPEG</option>
            <option value="png">PNG</option>
            <option value="webp">WebP</option>
          </select>
        </div>
        <div class="node-param">
          <label>Quality <span id="quality-val">85</span></label>
          <input type="range" id="quality" min="1" max="100" value="85">
        </div>
      </div>
    </div>

    <div class="preview">
      <canvas id="preview-canvas"></canvas>
      <canvas id="original-canvas" style="display:none"></canvas>
      <div style="display:flex;gap:8px;margin-top:6px;align-items:center">
        <div class="preview-info" id="preview-info">Drop an image to start</div>
        <button id="compare-btn" class="sm" style="background:#333;display:none">Before/After</button>
      </div>
      <div id="total-time"></div>
    </div>
  </div>

  <input type="file" id="file-input" accept="image/*" style="display:none">

  <div class="modal-overlay" id="code-modal">
    <div class="modal">
      <h3>SDK Code</h3>
      <pre id="code-output"></pre>
      <div class="modal-actions">
        <button id="copy-code-btn">Copy to Clipboard</button>
        <button id="close-modal-btn" style="background:#333">Close</button>
      </div>
    </div>
  </div>

  <script type="module" src="/src/pipeline.js"></script>
</body>
</html>
