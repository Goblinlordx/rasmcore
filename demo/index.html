<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rasmcore demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #0a0a1a;
      color: #e0e0e0;
      min-height: 100vh;
    }
    header {
      padding: 1rem 2rem;
      background: #12122a;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 600; }
    header .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
    }
    #status {
      margin-left: auto;
      font-size: 0.8rem;
      color: #888;
    }
    .container { display: flex; height: calc(100vh - 52px); }
    .sidebar {
      width: 280px;
      padding: 1rem;
      overflow-y: auto;
      background: #0e0e20;
      border-right: 1px solid #2a2a4a;
    }
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .canvas-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      gap: 1rem;
      overflow: hidden;
    }
    .canvas-wrap {
      position: relative;
      max-width: 48%;
      max-height: 100%;
    }
    .canvas-wrap canvas {
      max-width: 100%;
      max-height: 60vh;
      border: 1px solid #333;
      border-radius: 4px;
    }
    .canvas-label {
      text-align: center;
      font-size: 0.75rem;
      color: #888;
      margin-top: 4px;
    }
    .bottom-bar {
      padding: 0.75rem 1.5rem;
      background: #12122a;
      border-top: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.8rem;
    }
    #timing { color: #4ade80; }
    #image-info { color: #60a5fa; }

    /* Drop zone */
    #drop-zone {
      border: 2px dashed #444;
      border-radius: 8px;
      padding: 3rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    #drop-zone:hover, #drop-zone.dragover { border-color: #3b82f6; }
    #drop-zone p { color: #888; margin-top: 0.5rem; font-size: 0.85rem; }

    /* Controls */
    .section-title {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      margin: 1rem 0 0.5rem;
    }
    .control {
      margin-bottom: 0.75rem;
    }
    .control label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      margin-bottom: 2px;
    }
    .control label span { color: #3b82f6; font-family: monospace; }
    .control input[type="range"] {
      width: 100%;
      accent-color: #3b82f6;
    }
    .control select {
      width: 100%;
      padding: 4px;
      background: #1a1a2e;
      color: #e0e0e0;
      border: 1px solid #333;
      border-radius: 4px;
    }
    button {
      padding: 6px 16px;
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: default; }
    button.secondary { background: #333; }
    button.secondary:hover { background: #444; }
  </style>
</head>
<body>
  <header>
    <h1>rasmcore</h1>
    <span class="badge">WASM</span>
    <a href="/pipeline.html" style="color:#8b5cf6;font-size:0.8rem;text-decoration:none;margin-left:1rem">Pipeline Builder →</a>
    <span id="status" style="margin-left:auto">Loading SDK...</span>
  </header>

  <div class="container">
    <div class="sidebar" id="sidebar">
      <div id="drop-zone">
        <div>Drop image here</div>
        <p>or click to browse</p>
        <input type="file" id="file-input" accept="image/*" style="display:none">
      </div>

      <div id="controls" style="display:none">
        <div class="section-title">Filters</div>

        <div class="control">
          <label>Blur <span id="blur-val">0</span></label>
          <input type="range" id="blur" min="0" max="20" step="0.5" value="0">
        </div>
        <div class="control">
          <label>Sharpen <span id="sharpen-val">0</span></label>
          <input type="range" id="sharpen" min="0" max="5" step="0.1" value="0">
        </div>
        <div class="control">
          <label>Brightness <span id="brightness-val">0</span></label>
          <input type="range" id="brightness" min="-1" max="1" step="0.05" value="0">
        </div>
        <div class="control">
          <label>Contrast <span id="contrast-val">0</span></label>
          <input type="range" id="contrast" min="-1" max="1" step="0.05" value="0">
        </div>

        <div class="section-title">Transform</div>

        <div class="control">
          <label>Resize Width <span id="resize-val">auto</span></label>
          <input type="range" id="resize" min="0" max="2000" step="10" value="0">
        </div>

        <div class="section-title">Export</div>

        <div class="control">
          <select id="export-format">
            <!-- Populated dynamically from supportedWriteFormats() -->
          </select>
        </div>
        <div class="control">
          <label>Quality <span id="quality-val">85</span></label>
          <input type="range" id="quality" min="1" max="100" value="85">
        </div>
        <button id="download-btn">Download</button>
        <button id="reset-btn" class="secondary" style="margin-left:8px">Reset</button>
      </div>
    </div>

    <div class="main">
      <div class="canvas-area">
        <div class="canvas-wrap">
          <canvas id="original"></canvas>
          <div class="canvas-label">Original</div>
        </div>
        <div class="canvas-wrap">
          <canvas id="processed"></canvas>
          <div class="canvas-label">Processed</div>
        </div>
      </div>
    </div>
  </div>

  <div class="bottom-bar">
    <span id="image-info">No image loaded</span>
    <span id="timing"></span>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
