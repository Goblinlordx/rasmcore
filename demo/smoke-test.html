<!DOCTYPE html>
<html>
<head>
  <title>rasmcore demo - smoke test</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #1a1a2e; color: #e0e0e0; }
    #log { white-space: pre-wrap; line-height: 1.6; }
    .pass { color: #4ade80; }
    .fail { color: #f87171; }
    .info { color: #60a5fa; }
    canvas { border: 1px solid #333; margin: 0.5rem; }
  </style>
</head>
<body>
  <h2>rasmcore WASM smoke test</h2>
  <div id="log"></div>
  <div id="canvases"></div>

  <script type="module">
    const log = document.getElementById('log');
    const canvases = document.getElementById('canvases');

    function print(msg, cls = '') {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = msg + '\n';
      log.appendChild(span);
    }

    try {
      print('Loading SDK...', 'info');
      const sdk = await import('./sdk/rasmcore-image.js');
      const { pipeline, decoder, filters } = sdk;
      print('SDK loaded successfully', 'pass');

      // Check supported formats
      const readFormats = pipeline.supportedReadFormats();
      print(`Read formats: ${readFormats.join(', ')}`, 'info');
      const writeFormats = pipeline.supportedWriteFormats();
      print(`Write formats: ${writeFormats.join(', ')}`, 'info');

      // Create a test image: 64x64 gradient PNG
      print('\nCreating test image (64x64 gradient)...', 'info');
      const pipe = new pipeline.ImagePipeline();

      // Generate a small PNG to test decode
      // Use encoder to create one from raw pixels
      const w = 64, h = 64;
      const pixels = new Uint8Array(w * h * 3);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const i = (y * w + x) * 3;
          pixels[i] = (x * 255 / w) | 0;
          pixels[i+1] = (y * 255 / h) | 0;
          pixels[i+2] = 128;
        }
      }

      // Encode as PNG via stateless encoder
      const info = { width: w, height: h, format: 'rgb8', colorSpace: 'srgb' };
      const pngConfig = {};
      const pngBytes = sdk.encoder.encodePng(pixels, info, pngConfig, undefined);
      print(`Encoded PNG: ${pngBytes.length} bytes`, 'pass');

      // Decode via pipeline
      const src = pipe.read(pngBytes);
      const srcInfo = pipe.nodeInfo(src);
      print(`Decoded: ${srcInfo.width}x${srcInfo.height} ${srcInfo.format}`, 'pass');

      // Apply blur
      const t0 = performance.now();
      const blurred = pipe.blur(src, 3.0);
      const blurResult = pipe.writePng(blurred, {}, undefined);
      const t1 = performance.now();
      print(`Blur (r=3): ${blurResult.length} bytes, ${(t1-t0).toFixed(1)}ms`, 'pass');

      // Apply brightness
      const bright = pipe.brightness(src, 0.2);
      const brightResult = pipe.writePng(bright, {}, undefined);
      print(`Brightness (+0.2): ${brightResult.length} bytes`, 'pass');

      // Apply grayscale
      const gray = pipe.grayscale(src);
      const grayResult = pipe.writePng(gray, {}, undefined);
      print(`Grayscale: ${grayResult.length} bytes`, 'pass');

      // Resize
      const resized = pipe.resize(src, 32, 32, 'lanczos3');
      const resizeResult = pipe.writePng(resized, {}, undefined);
      const resizeInfo = pipe.nodeInfo(resized);
      print(`Resize 64→32: ${resizeInfo.width}x${resizeInfo.height}, ${resizeResult.length} bytes`, 'pass');

      // Chain: blur → brightness → resize → JPEG
      const chained = pipe.resize(pipe.brightness(pipe.blur(src, 2.0), 0.1), 48, 48, 'bilinear');
      const chainResult = pipe.writeJpeg(chained, { quality: 85 }, undefined);
      print(`Chain (blur→bright→resize→jpeg): ${chainResult.length} bytes`, 'pass');

      // Display results on canvas
      function showImage(label, pngData) {
        const blob = new Blob([pngData], { type: 'image/png' });
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => {
          const c = document.createElement('canvas');
          c.width = img.width; c.height = img.height;
          c.title = label;
          c.getContext('2d').drawImage(img, 0, 0);
          const lbl = document.createElement('div');
          lbl.textContent = label;
          lbl.style.fontSize = '0.8rem';
          const wrap = document.createElement('div');
          wrap.style.display = 'inline-block';
          wrap.style.textAlign = 'center';
          wrap.style.margin = '0.5rem';
          wrap.appendChild(c);
          wrap.appendChild(lbl);
          canvases.appendChild(wrap);
          URL.revokeObjectURL(url);
        };
        img.src = url;
      }

      // Render orignal encoded as PNG for display
      const origPng = pipe.writePng(src, {}, undefined);
      showImage('Original', origPng);
      showImage('Blur r=3', blurResult);
      showImage('Bright +0.2', brightResult);
      showImage('Grayscale', grayResult);
      showImage('Resize 32x32', resizeResult);

      print('\n=== ALL SMOKE TESTS PASSED ===', 'pass');

    } catch (e) {
      print(`FAILED: ${e.message}`, 'fail');
      print(e.stack, 'fail');
    }
  </script>
</body>
</html>
