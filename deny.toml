# cargo-deny configuration — license compliance CI guard
#
# Run: cargo deny check licenses
# Install: cargo install cargo-deny
#
# Rejects problematic licenses (AGPL, GPL) in dependencies while
# allowing them via explicit exceptions for dev-only or dual-licensed crates.

[licenses]
confidence-threshold = 0.8

# Licenses we accept. Any crates.io dep NOT matching this list is rejected
# unless explicitly excepted below.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "Unicode-3.0",
    "CC0-1.0",
    "Unlicense",
    "NCSA",
    "LGPL-2.1-or-later",
]

# Crates with non-allowed licenses that we explicitly accept
exceptions = [
    # zenjpeg is AGPL — TEMPORARY until replaced by rasmcore-jpeg
    # Track: jpeg-encoder-own_20260328064600Z
    { allow = ["AGPL-3.0-or-later"], crate = "zenjpeg" },

    # dssim-core is AGPL — dev-dependency only (test quality metrics, never shipped)
    { allow = ["AGPL-3.0"], crate = "dssim-core" },

    # ittapi is "GPL-2.0-only OR BSD-3-Clause" — we use under BSD-3-Clause
    { allow = ["GPL-2.0-only"], crate = "ittapi" },
    { allow = ["GPL-2.0-only"], crate = "ittapi-sys" },
]

# Treat private/unpublished workspace crates as acceptable
[licenses.private]
ignore = true
registries = []
