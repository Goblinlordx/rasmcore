[package]
name = "rasmcore-image"
version.workspace = true
edition.workspace = true

[dependencies]
rasmcore-pipeline = { path = "../rasmcore-pipeline" }
fast_image_resize = "5"
libblur = "0.15"
moxcms = "0.8"
wit-bindgen-rt = "0.41.0"
image = { workspace = true, features = [
    "png", "jpeg", "gif", "webp", "bmp", "tiff", "avif", "ico", "qoi",
    "tga", "hdr", "pnm", "exr", "dds",
] }
zenjpeg = { version = "0.6", features = ["trellis"] }
exif = { version = "0.6.1", package = "kamadak-exif" }
xmp-writer = "0.3.2"
quick-xml = "0.39.2"
tiff = "0.11"

[lib]
crate-type = ["cdylib", "rlib"]

[dev-dependencies]
butteraugli = "0.9"
dssim-core = "3.4"
imgref = "1.12.0"
rgb = "0.8.53"

[package.metadata.component]
package = "rasmcore:image"
target.path = "../../wit/image"

[package.metadata.component.target.dependencies]
"rasmcore:core" = { path = "../../wit/core" }
