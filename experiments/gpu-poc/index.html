<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>rasmcore GPU Offload PoC — Benchmark</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0a0a1a; color: #e0e0e0; padding: 2rem; }
    h1 { font-size: 1.4rem; margin-bottom: 1rem; }
    .status { color: #4ade80; font-size: 0.85rem; margin-bottom: 1rem; }
    .error { color: #f87171; }
    button { padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin: 4px; }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    table { border-collapse: collapse; margin-top: 1rem; width: 100%; max-width: 900px; }
    th, td { padding: 6px 12px; text-align: right; border: 1px solid #333; font-size: 0.8rem; }
    th { background: #1a1a3a; text-align: center; }
    td:first-child { text-align: left; font-weight: 600; }
    .faster { color: #4ade80; font-weight: 700; }
    .slower { color: #f87171; }
    pre { background: #12122a; padding: 1rem; border-radius: 4px; font-size: 0.75rem; overflow-x: auto; margin-top: 1rem; max-height: 400px; overflow-y: auto; }
  </style>
</head>
<body>
  <h1>rasmcore GPU Offload PoC</h1>
  <div class="status" id="status">Initializing...</div>
  <div>
    <button id="btn-run" disabled>Run Full Benchmark</button>
    <button id="btn-transfer" disabled>Transfer Only</button>
    <select id="size-select">
      <option value="512">512x512</option>
      <option value="1024" selected>1024x1024</option>
      <option value="2048">2048x2048</option>
      <option value="4096">4096x4096</option>
    </select>
  </div>
  <div id="results"></div>
  <pre id="log"></pre>

  <script type="module" src="benchmark.js"></script>
</body>
</html>
